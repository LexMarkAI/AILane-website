  <script>
    (function() {
      var SUPABASE_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';

      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function fail() {
        window.location.replace('/login/');
      }

      function succeed(session) {
        try {
          var token = session.access_token;
          var payload = JSON.parse(atob(token.split('.')[1]));
          var userId = payload.sub;
          var email = payload.email || '';

          // Set user object immediately — page reveals NOW
          window.__ailaneUser = {
            id: userId,
            email: email,
            token: token,
            tier: 'loading'
          };

          document.body.style.visibility = 'visible';

          // Fetch tier AFTER page is visible (non-blocking)
          fetch(
            SUPABASE_URL + '/rest/v1/kl_account_profiles?user_id=eq.' + userId + '&select=subscription_tier',
            {
              headers: {
                'Authorization': 'Bearer ' + token,
                'apikey': SUPABASE_ANON_KEY
              }
            }
          )
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data[0] && data[0].subscription_tier) {
              window.__ailaneUser.tier = data[0].subscription_tier;
              // Dispatch event so React can update tier badge
              window.dispatchEvent(new CustomEvent('ailane-tier-loaded', { detail: { tier: data[0].subscription_tier } }));
            }
          })
          .catch(function(e) {
            console.warn('Tier fetch failed (non-blocking):', e);
          });

        } catch (e) {
          fail();
        }
      }

      sb.auth.getSession().then(function(result) {
        if (result.data && result.data.session) {
          succeed(result.data.session);
        } else {
          var resolved = false;
          var timeout = setTimeout(function() {
            if (!resolved) { resolved = true; fail(); }
          }, 6000);

          sb.auth.onAuthStateChange(function(event, session) {
            if (!resolved && session) {
              resolved = true;
              clearTimeout(timeout);
              succeed(session);
            }
          });
        }
      }).catch(function() {
        fail();
      });
    })();
  </script>

  <style>
    /* ── CSS Variables ── */
    :root {
      --kl-bg: #0A1628;
      --kl-surface: #0F172A;
      --kl-surface-raised: #1E293B;
      --kl-border: rgba(14,165,233,0.15);
      --kl-border-hover: #0EA5E9;
      --kl-text: #E2E8F0;
      --kl-text-muted: #94A3B8;
      --kl-text-bright: #F1F5F9;
      --kl-cyan: #0EA5E9;
      --kl-cyan-soft: #38BDF8;
      --kl-cyan-glow: rgba(14,165,233,0.25);
      --kl-amber: #D97706;
      --kl-red: #EF4444;
      --kl-green: #10B981;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--kl-bg);
      color: var(--kl-text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--kl-bg); }
    ::-webkit-scrollbar-thumb { background: var(--kl-surface-raised); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }

    /* ── Screen Reader Only ── */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* ── App Layout ── */
    .kl-app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    .kl-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--kl-border);
      flex-shrink: 0;
    }
    .kl-header-left, .kl-header-right { flex: 0 0 auto; }
    .kl-header-center { flex: 1; text-align: center; }
    .kl-header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--kl-text-bright);
      letter-spacing: 0.02em;
    }

    /* ── Tier Badge ── */
    .kl-tier-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .kl-badge-operational {
      background: rgba(14,165,233,0.12);
      color: var(--kl-cyan);
      border: 1px solid rgba(14,165,233,0.25);
    }
    .kl-badge-governance {
      background: rgba(139,92,246,0.12);
      color: #A78BFA;
      border: 1px solid rgba(139,92,246,0.25);
    }
    .kl-badge-institutional {
      background: rgba(241,245,249,0.08);
      color: var(--kl-text-bright);
      border: 1px solid rgba(241,245,249,0.2);
    }

    /* ── Logo ── */
    .kl-logo { height: 28px; opacity: 0.9; }

    /* ── New Chat Button ── */
    .kl-new-chat-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--kl-border);
      border-radius: 8px;
      color: var(--kl-text-muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .kl-new-chat-btn:hover {
      border-color: var(--kl-cyan);
      color: var(--kl-cyan);
    }

    /* ── Main ── */
    .kl-main { flex: 1; display: flex; flex-direction: column; }

    /* ── Welcome State ── */
    .kl-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 0 32px;
      flex: 1;
    }
    .kl-welcome-nexus { margin-bottom: 24px; }
    .kl-welcome-greeting {
      font-size: 24px;
      font-weight: 600;
      color: var(--kl-text-bright);
      margin-bottom: 28px;
      text-align: center;
    }
    .kl-welcome-input { width: 100%; max-width: 640px; margin-bottom: 40px; }

    /* ── Nexus Canvas ── */
    .kl-nexus-canvas { display: block; }

    /* ── Input Bar ── */
    .kl-input-bar {
      display: flex;
      align-items: center;
      background: var(--kl-surface);
      border: 1px solid var(--kl-border);
      border-radius: 12px;
      padding: 4px;
      transition: border-color 0.2s;
    }
    .kl-input-bar:focus-within { border-color: var(--kl-cyan); }
    .kl-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 16px;
      color: var(--kl-text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    .kl-input::placeholder { color: var(--kl-text-muted); }
    .kl-send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--kl-cyan);
      border: none;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .kl-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .kl-send-btn:not(:disabled):hover { opacity: 0.85; }

    /* ── Topic Cards Grid ── */
    .kl-topics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 40px;
    }

    /* ── Topic Card ── */
    .kl-topic-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 12px;
      background: var(--kl-surface);
      border: 1px solid var(--kl-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      color: var(--kl-text);
      text-align: center;
    }
    .kl-topic-card:hover {
      border-color: var(--kl-cyan);
      transform: scale(1.02);
    }
    .kl-card-icon { color: var(--kl-cyan); display: flex; }
    .kl-card-label { font-size: 13px; font-weight: 500; line-height: 1.3; }

    /* ── Crown Jewels ── */
    .kl-crown {
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
      text-align: center;
    }
    .kl-crown-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--kl-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .kl-crown-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .kl-chip {
      display: inline-flex;
      padding: 4px 12px;
      background: rgba(14,165,233,0.08);
      border: 1px solid rgba(14,165,233,0.15);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--kl-cyan-soft);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Horizon Alert ── */
    .kl-horizon {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      max-width: 720px;
      padding: 14px 16px;
      background: rgba(217,119,6,0.06);
      border-left: 3px solid var(--kl-amber);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: var(--kl-text);
      line-height: 1.5;
    }
    .kl-horizon-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Conversation State ── */
    .kl-conversation {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* ── Advisory Banner ── */
    .kl-advisory {
      padding: 12px 16px;
      background: rgba(217,119,6,0.08);
      border-left: 3px solid var(--kl-amber);
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: var(--kl-text);
      line-height: 1.5;
      margin: 16px 0;
      flex-shrink: 0;
    }

    /* ── Messages ── */
    .kl-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 200px;
      max-height: calc(100vh - 320px);
    }

    /* ── Message (shared) ── */
    .kl-msg { display: flex; gap: 12px; animation: klFadeIn 0.3s ease; }
    .kl-msg-user { justify-content: flex-end; }
    .kl-msg-avatar { flex-shrink: 0; margin-top: 4px; }

    .kl-msg-eileen .kl-msg-content {
      background: var(--kl-surface);
      border-left: 3px solid var(--kl-cyan);
      border-radius: 0 12px 12px 12px;
      padding: 14px 18px;
      max-width: 85%;
    }
    .kl-msg-user .kl-msg-content {
      background: var(--kl-surface-raised);
      border-radius: 12px 0 12px 12px;
      padding: 14px 18px;
      max-width: 75%;
    }
    .kl-msg-sender {
      font-size: 12px;
      font-weight: 600;
      color: var(--kl-cyan);
      margin-bottom: 4px;
    }
    .kl-msg-body {
      font-size: 15px;
      line-height: 1.7;
      color: var(--kl-text);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .kl-msg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(14,165,233,0.08);
    }
    .kl-msg-stats {
      font-size: 12px;
      color: var(--kl-text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .kl-save-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--kl-border);
      border-radius: 6px;
      color: var(--kl-text-muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .kl-save-btn:hover {
      border-color: var(--kl-cyan);
      color: var(--kl-cyan);
    }

    /* ── Typing Indicator ── */
    .kl-typing-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 4px;
    }
    .kl-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--kl-cyan);
      animation: klPulse 1.4s ease-in-out infinite;
    }
    .kl-dot:nth-child(2) { animation-delay: 0.2s; }
    .kl-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── Conversation Input ── */
    .kl-conversation-input {
      padding: 16px 0;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .kl-footer {
      padding: 24px 0;
      border-top: 1px solid var(--kl-border);
      text-align: center;
      flex-shrink: 0;
    }
    .kl-footer-legal {
      font-size: 12px;
      color: var(--kl-text-muted);
      margin-bottom: 6px;
    }
    .kl-footer-links {
      display: flex;
      gap: 8px;
      justify-content: center;
      font-size: 12px;
    }
    .kl-footer-links a {
      color: var(--kl-text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .kl-footer-links a:hover { color: var(--kl-cyan); }
    .kl-footer-links span { color: var(--kl-text-muted); }

    /* ── Animations ── */
    @keyframes klFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes klPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Responsive: Tablet ── */
    @media (max-width: 1023px) {
      .kl-topics-grid { grid-template-columns: repeat(2, 1fr); }
      .kl-welcome-greeting { font-size: 22px; }
    }

    /* ── Responsive: Mobile ── */
    @media (max-width: 767px) {
      .kl-app { padding: 0 14px; }
      .kl-topics-grid { grid-template-columns: 1fr; max-width: 400px; }
      .kl-welcome { padding: 24px 0; }
      .kl-welcome-greeting { font-size: 20px; margin-bottom: 20px; }
      .kl-msg-eileen .kl-msg-content, .kl-msg-user .kl-msg-content { max-width: 95%; }
      .kl-messages { max-height: calc(100vh - 280px); }
      .kl-header-title { font-size: 14px; }
    }
  </style>
</body>
</html>
