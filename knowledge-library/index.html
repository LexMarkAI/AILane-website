  <style>
    /* ── TOKENS ──────────────────────────────────────────────────── */
    :root {
      --navy:         #0A2342;
      --navy-l:       #112B4E;
      --navy-m:       #163659;
      --navy-d:       #071A30;
      --border:       #1E3A5F;
      --border-l:     #243F66;
      --cyan:         #06B6D4;
      --cyan-l:       #22D3EE;
      --cyan-dim:     rgba(6,182,212,.10);
      --cyan-glow:    rgba(6,182,212,.20);
      --text-1:       #F8FAFC;
      --text-2:       #94A3B8;
      --text-3:       #64748B;
      --text-4:       #475569;
      --success:      #22C55E;
      --success-dim:  rgba(34,197,94,.10);
      --error:        #EF4444;
      --error-dim:    rgba(239,68,68,.10);
      --amber:        #F59E0B;
      --amber-dim:    rgba(245,158,11,.10);
      --amber-border: rgba(245,158,11,.25);
      --purple:       #8B5CF6;
      --purple-dim:   rgba(139,92,246,.10);
      --teal:         #0D9488;
      --teal-dim:     rgba(13,148,136,.10);

      /* Layout */
      --top-h:        60px;
      --nav-w:        240px;
      --rail-w:       52px;
      --drawer-w:     440px;
      --drawer-split: 780px;

      /* Tier colours */
      --tier-guest:        var(--text-3);
      --tier-per-session:  var(--cyan);
      --tier-operational:  var(--cyan);
      --tier-governance:   var(--purple);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy-d);
      color: var(--text-1);
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ───────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: var(--top-h) 1fr;
      grid-template-columns: var(--nav-w) 1fr var(--rail-w);
      height: 100vh;
      overflow: hidden;
    }

    /* ── TOP BAR ─────────────────────────────────────────────────── */
    .top-bar {
      grid-column: 1 / -1;
      background: var(--navy);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px 0 0;
      gap: 0;
      z-index: 200;
    }
    .top-logo {
      width: var(--nav-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-right: 1px solid var(--border);
      height: 100%;
      text-decoration: none;
      color: var(--text-1);
    }
    .logo-mark {
      width: 30px; height: 30px; background: var(--cyan);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 12px;
      color: var(--navy); flex-shrink: 0;
    }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .logo-sub  { font-size: 10px; color: var(--text-3); letter-spacing: .3px; text-transform: uppercase; }

    .top-search {
      flex: 1;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-wrap {
      flex: 1;
      max-width: 560px;
      position: relative;
    }
    .search-input {
      width: 100%;
      background: var(--navy-l);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-1);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 36px 8px 36px;
      outline: none;
      transition: border-color .2s;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:focus { border-color: var(--cyan); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
    }
    .search-kbd {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--text-3); background: var(--navy-m);
      border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace;
    }

    .top-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px 0 0;
    }
    .session-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--navy-l);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
    }
    .session-dot {
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--success);
    }
    .session-tier { font-weight: 700; color: var(--cyan); }
    .session-timer { color: var(--amber); font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .session-timer.urgent { color: var(--error); }

    .top-icon-btn {
      width: 34px; height: 34px; border: 1px solid var(--border);
      background: var(--navy-l); border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); transition: all .15s; flex-shrink: 0;
    }
    .top-icon-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── LEFT NAV ────────────────────────────────────────────────── */
    .left-nav {
      background: var(--navy);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .nav-section-hd {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      padding: 14px 16px 6px;
      flex-shrink: 0;
    }
    .nav-items { overflow-y: auto; flex: 1; padding-bottom: 12px; }
    .nav-items::-webkit-scrollbar { width: 3px; }
    .nav-items::-webkit-scrollbar-track { background: transparent; }
    .nav-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .nav-cat {
      border-radius: 0;
      overflow: hidden;
    }
    .nav-cat-btn {
      width: 100%; display: flex; align-items: center; gap: 9px;
      padding: 9px 16px; border: none; background: transparent;
      cursor: pointer; color: var(--text-2); font-family: inherit;
      font-size: 13px; font-weight: 500; transition: all .15s;
      text-align: left;
    }
    .nav-cat-btn:hover { background: var(--navy-l); color: var(--text-1); }
    .nav-cat-btn.active { background: var(--cyan-dim); color: var(--cyan); }
    .nav-cat-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .nav-cat-label { flex: 1; }
    .nav-cat-count {
      font-size: 10px; background: var(--border); color: var(--text-3);
      padding: 2px 6px; border-radius: 10px; font-weight: 600;
    }
    .nav-cat-btn.active .nav-cat-count { background: var(--cyan-glow); color: var(--cyan); }
    .nav-cat-chevron {
      transition: transform .2s; font-size: 11px;
      color: var(--text-3); flex-shrink: 0;
    }
    .nav-cat-btn.open .nav-cat-chevron { transform: rotate(90deg); }

    .nav-sub-items { display: none; }
    .nav-sub-items.open { display: block; }
    .nav-sub-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px 7px 42px; cursor: pointer;
      color: var(--text-3); font-size: 12px; transition: all .15s;
      border-left: 2px solid transparent; border-left-color: transparent;
    }
    .nav-sub-item:hover { color: var(--text-2); background: rgba(255,255,255,.02); }
    .nav-sub-item.active { color: var(--cyan-l); border-left-color: var(--cyan); background: var(--cyan-dim); }
    .nav-sub-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: .5; }
    .nav-sub-item.active .nav-sub-dot { opacity: 1; }

    .nav-era-badge {
      font-size: 9px; font-weight: 700; background: var(--amber-dim);
      color: var(--amber); border: 1px solid var(--amber-border);
      padding: 1px 5px; border-radius: 3px; letter-spacing: .3px;
      text-transform: uppercase;
    }

    .nav-bottom {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      flex-shrink: 0;
    }
    .nav-upgrade-btn {
      width: 100%; background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      border: 1px solid var(--border-l); border-radius: 9px;
      padding: 10px 12px; cursor: pointer; color: var(--text-1);
      font-family: inherit; font-size: 12px; font-weight: 600;
      text-align: left; display: flex; align-items: center; gap: 8px;
      transition: all .2s;
    }
    .nav-upgrade-btn:hover { border-color: var(--cyan); }
    .nav-upgrade-icon { font-size: 16px; }
    .nav-upgrade-sub { font-size: 10px; color: var(--text-3); font-weight: 400; margin-top: 1px; }

    /* ── MAIN CONTENT ────────────────────────────────────────────── */
    .main-content {
      background: var(--navy-d);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-track { background: transparent; }
    .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Breadcrumb */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px 0;
      font-size: 12px; color: var(--text-3);
      flex-shrink: 0;
    }
    .bc-sep { opacity: .4; }
    .bc-item { cursor: pointer; transition: color .15s; }
    .bc-item:hover { color: var(--cyan); }
    .bc-item.current { color: var(--text-2); cursor: default; }

    /* Category Overview */
    .cat-overview { padding: 20px 24px; }
    .cat-title { font-size: 22px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
    .cat-desc  { font-size: 13px; color: var(--text-2); margin-bottom: 20px; max-width: 620px; line-height: 1.6; }
    .cat-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }

    .instrument-card {
      background: var(--navy-l);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .instrument-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--border); transition: background .2s;
    }
    .instrument-card:hover { border-color: var(--border-l); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    .instrument-card:hover::before { background: var(--cyan); }
    .instrument-card.era { background: linear-gradient(135deg, var(--navy-l), rgba(245,158,11,.04)); }
    .instrument-card.era::before { background: var(--amber); }

    .inst-type {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-3); margin-bottom: 7px;
      display: flex; align-items: center; gap: 7px;
    }
    .inst-era-tag {
      background: var(--amber-dim); color: var(--amber);
      border: 1px solid var(--amber-border);
      font-size: 9px; padding: 1px 6px; border-radius: 3px;
    }
    .inst-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; letter-spacing: -.2px; }
    .inst-short { font-size: 11px; font-weight: 600; color: var(--cyan); margin-bottom: 8px; }
    .inst-desc  { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 12px; }
    .inst-meta  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .inst-tag {
      font-size: 10px; background: var(--navy-m); color: var(--text-3);
      border: 1px solid var(--border); padding: 2px 7px; border-radius: 10px;
    }
    .inst-tag.acei { background: var(--cyan-dim); color: var(--cyan); border-color: var(--cyan-glow); }

    /* Statute Viewer */
    .statute-viewer { padding: 20px 24px; }
    .statute-header {
      background: var(--navy-l);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 20px;
    }
    .statute-type-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .statute-type-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
      background: var(--cyan-dim); color: var(--cyan); border: 1px solid var(--cyan-glow);
      padding: 3px 9px; border-radius: 20px;
    }
    .statute-type-badge.si { background: var(--teal-dim); color: var(--teal); border-color: rgba(13,148,136,.25); }
    .statute-type-badge.era { background: var(--amber-dim); color: var(--amber); border-color: var(--amber-border); }
    .statute-jurisdiction {
      font-size: 11px; color: var(--text-3);
      display: flex; align-items: center; gap: 4px;
    }
    .statute-title  { font-size: 20px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 6px; }
    .statute-short  { font-size: 13px; font-weight: 600; color: var(--cyan); margin-bottom: 10px; }
    .statute-desc   { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 14px; }
    .statute-meta-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .statute-meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-3);
    }
    .statute-meta-val { font-weight: 600; color: var(--text-2); }
    .statute-actions {
      display: flex; align-items: center; gap: 8px;
      margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    }
    .act-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600;
      background: var(--navy-m); border: 1px solid var(--border);
      color: var(--text-2); padding: 6px 12px; border-radius: 7px;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .act-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .act-btn.primary { background: var(--cyan); color: var(--navy); border-color: var(--cyan); font-weight: 700; }
    .act-btn.primary:hover { background: var(--cyan-l); }

    /* Part / Section accordion */
    .statute-parts { display: flex; flex-direction: column; gap: 10px; }
    .statute-part {
      background: var(--navy-l);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .part-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; cursor: pointer;
      transition: background .15s;
    }
    .part-header:hover { background: rgba(255,255,255,.03); }
    .part-header.open { border-bottom: 1px solid var(--border); }
    .part-num {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      background: var(--navy-m); border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 5px; flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .part-title { flex: 1; font-size: 14px; font-weight: 700; }
    .part-section-count { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
    .part-chevron {
      color: var(--text-3); transition: transform .2s; flex-shrink: 0;
      font-size: 12px;
    }
    .part-header.open .part-chevron { transform: rotate(90deg); color: var(--cyan); }

    .part-body { display: none; padding: 4px 0; }
    .part-body.open { display: block; }

    .section-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 18px; cursor: pointer;
      border-bottom: 1px solid rgba(30,58,95,.4);
      transition: background .15s;
    }
    .section-item:last-child { border-bottom: none; }
    .section-item:hover { background: rgba(6,182,212,.04); }
    .section-item.open { background: rgba(6,182,212,.06); }
    .sec-num {
      font-size: 12px; font-weight: 700; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0; width: 40px; margin-top: 1px;
    }
    .section-item.open .sec-num { color: var(--cyan); }
    .sec-content { flex: 1; }
    .sec-title  { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .sec-summary { font-size: 12px; color: var(--text-2); line-height: 1.5; }

    .sec-full-text {
      display: none;
      background: var(--navy-d);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-1);
    }
    .sec-full-text.open { display: block; }
    .sec-sub { margin-left: 18px; margin-top: 6px; padding-left: 14px; border-left: 2px solid var(--border); }
    .sec-sub-num { font-weight: 600; color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .stat-ref {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--cyan-dim); color: var(--cyan);
      border: 1px solid var(--cyan-glow); font-size: 11px; font-weight: 600;
      padding: 1px 6px; border-radius: 4px; cursor: pointer;
      transition: background .15s;
    }
    .stat-ref:hover { background: var(--cyan-glow); }
    .era-marker {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--amber-dim); color: var(--amber);
      border: 1px solid var(--amber-border); font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px; margin-left: 8px;
    }
    .sec-actions {
      display: flex; align-items: center; gap: 7px;
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .sec-action-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text-3); cursor: pointer;
      background: var(--navy-l); border: 1px solid var(--border);
      padding: 4px 9px; border-radius: 5px; transition: all .15s;
      font-family: inherit;
    }
    .sec-action-btn:hover { color: var(--cyan); border-color: var(--cyan); }

    /* Welcome state */
    .welcome-state { padding: 40px 24px; }
    .welcome-hero { margin-bottom: 32px; }
    .welcome-hero h2 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 8px; }
    .welcome-hero h2 span { color: var(--cyan); }
    .welcome-hero p { font-size: 14px; color: var(--text-2); line-height: 1.6; max-width: 560px; }
    .quick-cats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px;
      margin-bottom: 28px;
    }
    .quick-cat-btn {
      background: var(--navy-l); border: 1px solid var(--border);
      border-radius: 11px; padding: 14px 16px; cursor: pointer;
      transition: all .2s; text-align: left; display: flex;
      align-items: flex-start; gap: 12px; font-family: inherit;
    }
    .quick-cat-btn:hover { border-color: var(--cyan); transform: translateY(-1px); }
    .qc-icon { font-size: 22px; flex-shrink: 0; }
    .qc-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; color: var(--text-1); }
    .qc-count { font-size: 11px; color: var(--text-3); }

    .welcome-prompt {
      background: linear-gradient(135deg, var(--navy-l), rgba(6,182,212,.04));
      border: 1px solid var(--border-l);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .prompt-eileen {
      width: 44px; height: 44px; background: var(--cyan-dim);
      border: 1px solid var(--cyan-glow); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .prompt-text { flex: 1; }
    .prompt-text strong { font-size: 13px; color: var(--text-1); display: block; margin-bottom: 3px; }
    .prompt-text span { font-size: 12px; color: var(--text-2); }
    .prompt-btn {
      background: var(--cyan); color: var(--navy); border: none;
      border-radius: 8px; font-family: inherit; font-size: 12px;
      font-weight: 700; padding: 8px 14px; cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .prompt-btn:hover { background: var(--cyan-l); }

    /* Search results overlay */
    .search-results {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--navy);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px 20px;
      z-index: 50;
    }
    .search-results.active { display: block; }
    .sr-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .sr-title { font-size: 13px; font-weight: 600; }
    .sr-close { cursor: pointer; color: var(--text-3); font-size: 18px; }
    .sr-group-hd { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); margin-bottom: 8px; margin-top: 14px; }
    .sr-items { display: flex; flex-direction: column; gap: 3px; }
    .sr-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 11px; border-radius: 8px; cursor: pointer;
      transition: background .15s;
    }
    .sr-item:hover { background: var(--navy-l); }
    .sr-item-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .sr-item-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .sr-item-sub   { font-size: 11px; color: var(--text-3); }
    mark { background: var(--amber-dim); color: var(--amber); border-radius: 2px; padding: 0 2px; }

    /* ── RIGHT RAIL ──────────────────────────────────────────────── */
    .right-rail {
      background: var(--navy);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
      z-index: 150;
    }
    .rail-icon-btn {
      width: 38px; height: 38px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 9px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); font-size: 17px;
      transition: all .15s;
      position: relative;
      flex-shrink: 0;
    }
    .rail-icon-btn:hover { background: var(--navy-l); color: var(--text-2); border-color: var(--border); }
    .rail-icon-btn.active { background: var(--cyan-dim); color: var(--cyan); border-color: var(--cyan-glow); box-shadow: -2px 0 0 var(--cyan) inset; }
    .rail-badge {
      position: absolute; top: 3px; right: 3px;
      width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid var(--navy);
    }
    .rail-badge.amber  { background: var(--amber); }
    .rail-badge.cyan   { background: var(--cyan); }
    .rail-badge.red    { background: var(--error); }
    .rail-badge.green  { background: var(--success); }
    .rail-divider { width: 24px; height: 1px; background: var(--border); margin: 5px 0; }
    .rail-tooltip {
      position: absolute; right: calc(100% + 10px); top: 50%; transform: translateY(-50%);
      background: var(--navy-l); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; font-size: 12px; font-weight: 600; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity .15s;
      z-index: 999;
    }
    .rail-icon-btn:hover .rail-tooltip { opacity: 1; }

    /* ── PANEL DRAWER ────────────────────────────────────────────── */
    .panel-drawer {
      position: fixed;
      top: var(--top-h);
      right: var(--rail-w);
      bottom: 0;
      width: var(--drawer-w);
      background: var(--navy);
      border-left: 1px solid var(--border);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s ease-out;
    }
    .panel-drawer.open { transform: translateX(0); }
    .panel-drawer.split { width: var(--drawer-split); }

    .drawer-header {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      height: 50px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-panel-icon { font-size: 18px; }
    .drawer-panel-name { font-size: 14px; font-weight: 700; flex: 1; }
    .drawer-mode-btn {
      background: var(--navy-l); border: 1px solid var(--border);
      color: var(--text-3); font-size: 11px; font-weight: 600;
      padding: 4px 9px; border-radius: 6px; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .drawer-mode-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .drawer-close {
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); background: transparent; border: none;
      font-size: 16px; transition: all .15s;
    }
    .drawer-close:hover { background: var(--navy-l); color: var(--text-1); }

    .drawer-body {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      display: flex;
    }
    .drawer-body::-webkit-scrollbar { width: 3px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .panel-pane {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; overflow: hidden;
    }
    .panel-pane + .panel-pane {
      border-left: 1px solid var(--border);
    }
    .panel-pane-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      color: var(--text-2);
    }
    .panel-pane-body { flex: 1; overflow-y: auto; padding: 14px; }
    .panel-pane-body::-webkit-scrollbar { width: 3px; }
    .panel-pane-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Panel: Notes */
    .notes-toolbar {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
      padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .notes-tool {
      width: 28px; height: 28px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; border-radius: 5px;
      color: var(--text-3); font-size: 13px; font-weight: 700;
      border: none; background: transparent; font-family: inherit;
      transition: all .15s;
    }
    .notes-tool:hover  { background: var(--navy-l); color: var(--text-1); }
    .notes-tool.active { background: var(--cyan-dim); color: var(--cyan); }
    .notes-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }
    .notes-editor {
      flex: 1; padding: 14px; outline: none;
      font-size: 13px; line-height: 1.7; color: var(--text-1);
      min-height: 200px;
      caret-color: var(--cyan);
    }
    .notes-editor[contenteditable]:empty::before {
      content: attr(data-placeholder); color: var(--text-3); pointer-events: none;
    }
    .notes-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-3); flex-shrink: 0;
    }
    .notes-save-state { display: flex; align-items: center; gap: 5px; }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .save-dot.unsaved { background: var(--amber); }

    /* Panel: Eileen */
    .eileen-panel { display: flex; flex-direction: column; height: 100%; }
    .eileen-header-inner {
      text-align: center; padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .eileen-nexus {
      width: 48px; height: 48px; background: var(--cyan-dim);
      border: 1.5px solid var(--cyan-glow); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin: 0 auto 8px;
    }
    .eileen-name { font-size: 15px; font-weight: 700; }
    .eileen-mode { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .eileen-advisory {
      background: var(--amber-dim); border: 1px solid var(--amber-border);
      border-radius: 7px; padding: 7px 10px; margin: 10px 14px 0;
      font-size: 11px; color: var(--amber); line-height: 1.5;
      flex-shrink: 0;
    }
    .eileen-messages {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .eileen-messages::-webkit-scrollbar { width: 3px; }
    .eileen-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg { max-width: 88%; }
    .msg.user { align-self: flex-end; }
    .msg.eileen { align-self: flex-start; }
    .msg-bubble {
      padding: 10px 13px; border-radius: 10px;
      font-size: 13px; line-height: 1.6;
    }
    .msg.user   .msg-bubble { background: var(--cyan); color: var(--navy); font-weight: 500; border-radius: 10px 10px 2px 10px; }
    .msg.eileen .msg-bubble { background: var(--navy-l); color: var(--text-1); border: 1px solid var(--border); border-radius: 10px 10px 10px 2px; }
    .msg-save {
      font-size: 10px; color: var(--text-3); cursor: pointer; margin-top: 4px;
      display: flex; align-items: center; gap: 4px; transition: color .15s;
    }
    .msg-save:hover { color: var(--cyan); }
    .eileen-quick-actions {
      display: flex; flex-direction: column; gap: 6px;
      padding: 0 14px 10px; flex-shrink: 0;
    }
    .quick-action-btn {
      background: var(--navy-l); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; cursor: pointer;
      color: var(--text-2); font-family: inherit; font-size: 12px;
      text-align: left; transition: all .15s;
    }
    .quick-action-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .eileen-input-area {
      padding: 10px 14px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .eileen-input-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .eileen-input {
      flex: 1; background: var(--navy-d); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text-1); font-family: inherit;
      font-size: 13px; padding: 9px 12px; resize: none;
      outline: none; transition: border-color .2s; line-height: 1.5;
      max-height: 100px; overflow-y: auto;
    }
    .eileen-input::placeholder { color: var(--text-3); }
    .eileen-input:focus { border-color: var(--cyan); }
    .eileen-send {
      width: 36px; height: 36px; background: var(--cyan); border: none;
      border-radius: 8px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .15s; color: var(--navy);
    }
    .eileen-send:hover { background: var(--cyan-l); }
    .eileen-send:disabled { opacity: .4; cursor: not-allowed; }
    .eileen-upsell {
      margin: 10px 14px 14px;
      background: linear-gradient(135deg, var(--cyan-dim), var(--purple-dim));
      border: 1px solid var(--border-l); border-radius: 10px;
      padding: 14px 16px; text-align: center;
    }
    .eileen-upsell strong { display: block; font-size: 13px; margin-bottom: 4px; }
    .eileen-upsell p { font-size: 11px; color: var(--text-2); margin-bottom: 10px; line-height: 1.5; }
    .eileen-upsell-btn {
      background: var(--cyan); color: var(--navy); border: none;
      border-radius: 7px; font-family: inherit; font-size: 12px;
      font-weight: 700; padding: 8px 16px; cursor: pointer;
    }

    /* Panel: Document Vault */
    .vault-upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px; padding: 18px;
      text-align: center; cursor: pointer;
      transition: all .2s; margin-bottom: 14px;
    }
    .vault-upload-zone:hover, .vault-upload-zone.drag { border-color: var(--cyan); background: var(--cyan-dim); }
    .vault-upload-icon { font-size: 24px; margin-bottom: 6px; }
    .vault-upload-text { font-size: 12px; color: var(--text-2); }
    .vault-upload-sub  { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .vault-doc-list { display: flex; flex-direction: column; gap: 8px; }
    .vault-doc-item {
      background: var(--navy-d); border: 1px solid var(--border);
      border-radius: 9px; padding: 11px 13px; cursor: pointer; transition: all .15s;
    }
    .vault-doc-item:hover { border-color: var(--border-l); }
    .vault-doc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .vault-doc-icon { font-size: 16px; flex-shrink: 0; }
    .vault-doc-name { font-size: 13px; font-weight: 600; flex: 1; }
    .vault-score {
      font-size: 12px; font-weight: 700; padding: 2px 8px;
      border-radius: 5px; flex-shrink: 0;
    }
    .vault-score.red    { background: var(--error-dim); color: var(--error); }
    .vault-score.amber  { background: var(--amber-dim); color: var(--amber); }
    .vault-score.green  { background: var(--success-dim); color: var(--success); }
    .vault-score.none   { background: var(--navy-l); color: var(--text-3); font-weight: 400; font-size: 11px; }
    .vault-doc-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-3); }

    /* Panel: Clipboard */
    .clip-items { display: flex; flex-direction: column; gap: 8px; }
    .clip-item {
      background: var(--navy-d); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
    }
    .clip-source { font-size: 10px; color: var(--cyan); font-weight: 600; margin-bottom: 5px; }
    .clip-text   { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 8px; }
    .clip-actions { display: flex; gap: 6px; }
    .clip-btn {
      font-size: 11px; background: var(--navy-l); border: 1px solid var(--border);
      color: var(--text-3); padding: 3px 8px; border-radius: 5px;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .clip-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* Panel: Calendar */
    .cal-section-hd { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); margin-bottom: 10px; margin-top: 4px; }
    .cal-events { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .cal-event {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--navy-d); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all .15s;
    }
    .cal-event:hover { border-color: var(--border-l); }
    .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .cal-dot.amber { background: var(--amber); }
    .cal-dot.teal  { background: var(--teal); }
    .cal-dot.red   { background: var(--error); }
    .cal-event-date { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
    .cal-event-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .cal-event-src  { font-size: 11px; color: var(--text-3); }

    /* Panel: Contract Planner (locked for non-governance) */
    .planner-locked {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 30px 20px; gap: 14px;
    }
    .planner-lock-icon { font-size: 40px; opacity: .5; }
    .planner-lock-title { font-size: 16px; font-weight: 700; }
    .planner-lock-desc  { font-size: 13px; color: var(--text-2); line-height: 1.6; }
    .planner-upgrade-btn {
      background: var(--purple-dim); border: 1px solid rgba(139,92,246,.3);
      color: var(--purple); border-radius: 9px; font-family: inherit;
      font-size: 13px; font-weight: 700; padding: 10px 20px; cursor: pointer;
    }

    /* ── UPLOAD MODAL ────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(7,26,48,.85); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--navy-l); border: 1px solid var(--border);
      border-radius: 16px; width: 480px; max-width: 95vw; overflow: hidden;
    }
    .modal-header {
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { cursor: pointer; color: var(--text-3); font-size: 20px; background: none; border: none; }
    .modal-body { padding: 20px; }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 32px; text-align: center; cursor: pointer;
      transition: all .2s; margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--cyan); background: var(--cyan-dim); }
    .drop-icon  { font-size: 36px; margin-bottom: 10px; }
    .drop-text  { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .drop-sub   { font-size: 12px; color: var(--text-3); }
    .modal-footer {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .modal-btn {
      padding: 9px 18px; border-radius: 8px; font-family: inherit;
      font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    }
    .modal-btn.cancel { background: var(--navy); color: var(--text-2); }
    .modal-btn.primary { background: var(--cyan); color: var(--navy); }

    /* ── LOADING ─────────────────────────────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0; background: var(--navy-d);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; z-index: 9999;
    }
    .loading-screen.hidden { display: none; }
    .ls-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ls-text { font-size: 14px; color: var(--text-2); }

    /* ── TOAST ───────────────────────────────────────────────────── */
    .toast-stack {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      z-index: 9000; pointer-events: none;
    }
    .toast {
      background: var(--navy-l); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 16px; font-size: 13px;
      font-weight: 500; display: flex; align-items: center; gap: 8px;
      animation: toastIn .2s ease-out; pointer-events: all;
    }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .toast.success { border-color: rgba(34,197,94,.3); color: var(--success); }
    .toast.info    { border-color: rgba(6,182,212,.3);  color: var(--cyan); }

    /* ── SCROLLBAR GLOBAL ────────────────────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* ── RESPONSIVE ──────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      :root { --nav-w: 200px; }
    }
    @media (max-width: 768px) {
      .left-nav { display: none; }
      :root { --nav-w: 0px; }
      .app { grid-template-columns: 1fr var(--rail-w); }
      .top-logo { display: none; }
    }
  </style>
</head>

<!-- Auth guard: body hidden until session validated -->
<body style="visibility:hidden">

  <!-- Loading screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="ls-spinner"></div>
    <div class="ls-text">Verifying your session…</div>
  </div>

  <!-- App shell -->
  <div class="app" id="app">

    <!-- TOP BAR -->
    <header class="top-bar">
      <a href="/" class="top-logo">
        <div class="logo-mark">AI</div>
        <div>
          <div class="logo-text">Ailane</div>
          <div class="logo-sub">Knowledge Library</div>
        </div>
      </a>

      <div class="top-search">
        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search legislation, guidance, ACAS codes…" autocomplete="off">
          <span class="search-kbd">⌘K</span>
        </div>
      </div>

      <div class="top-controls">
        <div class="session-badge" id="session-badge">
          <div class="session-dot"></div>
          <span class="session-tier" id="session-tier-label">Guest</span>
          <span class="session-timer hidden" id="session-timer"></span>
        </div>
        <button class="top-icon-btn" title="Upload document" onclick="openUploadModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="top-icon-btn" title="Help" onclick="openPanel('eileen')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
      </div>
    </header>

    <!-- LEFT NAVIGATION -->
    <nav class="left-nav">
      <div class="nav-items" id="nav-items">
        <!-- Populated by JS -->
      </div>
      <div class="nav-bottom" id="nav-bottom">
        <!-- Populated by JS based on tier -->

  // ── SESSION TIMER (pass holders) ─────────────────────────────────
  function startTimer() {
    const timerEl = document.getElementById('session-timer');
    timerEl.classList.remove('hidden');
    function tick() {
      const now = new Date();
      const diff = SESSION.expiresAt - now;
      if (diff <= 0) { timerEl.textContent = 'Expired'; timerEl.classList.add('urgent'); return; }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      timerEl.textContent = h > 0 ? `${h}h ${m}m` : `${m}:${String(s).padStart(2,'0')}`;
      if (diff < 1800000) timerEl.classList.add('urgent');
    }
    tick();
    setInterval(tick, 1000);
  }

  async function sendEilleen() {
    const inp = document.getElementById('eileen-input');

  function addEileenUserMsg(text) {

  async function callEilleen(query) {
    const canAsk = SESSION.hasEileen;
    const sendBtn = document.getElementById('eileen-send');
    if (sendBtn) sendBtn.disabled = true;

    // Add typing indicator
    eileenMessages.push({ role:'eileen', text:'…', typing: true });
    refreshEileenMessages();

    try {
      let responseText;

      if (canAsk) {
        // Full Eileen via kl_ai_assistant Edge Function
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        const { data: { session } } = await sb.auth.getSession().catch(() => ({ data: { session: null } }));
        const token = session?.access_token;

        const resp = await fetch(KL_AI_FN, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token || SUPABASE_ANON}`,
            'apikey': SUPABASE_ANON
          },
          body: JSON.stringify({
            messages: eileenMessages.filter(m => !m.typing).map(m => ({ role: m.role === 'eileen' ? 'assistant' : 'user', content: m.text })),
            tier: SESSION.tier
          })
        });

        if (resp.ok) {
          const data = await resp.json();
          responseText = data.response || data.message || 'I encountered an issue responding. Please try again.';
        } else {
          responseText = 'I\'m having trouble connecting right now. Please try again in a moment.';
        }
      } else {
        // Basic mode — helpful but limited
        responseText = getBasicEileenResponse(query);
      }

      // Remove typing indicator
      eileenMessages = eileenMessages.filter(m => !m.typing);
      eileenMessages.push({ role:'eileen', text: responseText });

    } catch (e) {
      eileenMessages = eileenMessages.filter(m => !m.typing);
      eileenMessages.push({ role:'eileen', text:'I\'m having trouble connecting. Please check your connection and try again.' });
    }

    refreshEileenMessages();
    if (sendBtn) sendBtn.disabled = false;
  }

  function getBasicEileenResponse(query) {
    const q = query.toLowerCase();
    if (q.includes('unfair dismissal') || q.includes('dismiss'))
      return 'Unfair dismissal rights are governed by Part X of the Employment Rights Act 1996 (ERA 1996). Currently employees need 2 years\' service before they can claim unfair dismissal — though ERA 2025 will change this to Day 1 rights once commenced. You can find the full statutory text in the Legislation section. For a full analysis, upgrade to a Pro Pass to access my complete AI capabilities.';
    if (q.includes('equality') || q.includes('discrimination') || q.includes('protected'))
      return 'The Equality Act 2010 sets out nine protected characteristics: age, disability, gender reassignment, marriage and civil partnership, pregnancy and maternity, race, religion or belief, sex, and sexual orientation. You can explore the full Act in the Legislation section. For detailed analysis and case law guidance, upgrade to a Pro Pass.';
    if (q.includes('era 2025') || q.includes('employment rights act 2025'))
      return 'ERA 2025 received Royal Assent on 18 December 2025. Key changes include: removing the 2-year qualifying period for unfair dismissal, new rights for zero hours workers, SSP from day 1, and stronger trade union rights. Most provisions are not yet in force — commencement dates are set by secondary legislation. Open ERA 2025 in the Legislation section for the full detail. Upgrade to Pro for Eileen\'s complete ERA 2025 analysis.';
    if (q.includes('working time') || q.includes('annual leave') || q.includes('holiday'))
      return 'Working time rights are governed by the Working Time Regulations 1998. Key entitlements: 5.6 weeks\' annual leave, max 48-hour average working week (with opt-out), 20-minute rest break for shifts over 6 hours. You can find WTR 1998 in the Legislation section.';
    return `That\'s a great question about UK employment law. As a basic session, I can direct you to the relevant legislation and guidance in this library. You\'ll find the answer in the ${q.includes('acas') ? 'ACAS Guidance' : 'Legislation'} section. Upgrade to a Pro Pass to access my full AI capabilities for detailed analysis.`;
  }

  // ── SEARCH ────────────────────────────────────────────────────────
  function initSearch() {
    const inp = document.getElementById('search-input');
    inp.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
    inp.addEventListener('input', e => {
      const q = e.target.value.trim();
      if (q.length < 2) { closeSearch(); return; }
      doSearch(q);
    });
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); inp.focus(); }
    });
  }

  function doSearch(query) {
    const q = query.toLowerCase();
    const results = [];

    // Search statutes
    Object.entries(STATUTES).forEach(([id, s]) => {
      if (s.title.toLowerCase().includes(q) || s.short.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)) {
        results.push({ type:'legislation', id, title: s.title, sub: s.short, catId:'legislation' });
      }
      s.parts.forEach(part => {
        part.sections.forEach(sec => {
          if (sec.title.toLowerCase().includes(q) || sec.summary.toLowerCase().includes(q)) {
            results.push({ type:'section', id, secNum: sec.num, title: `${sec.num} — ${sec.title}`, sub: s.short, catId:'legislation' });
          }
        });
      });
    });

    // Search nav categories
    NAV_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        if (item.label.toLowerCase().includes(q)) {
          results.push({ type:'guidance', id: item.id, title: item.label, sub: cat.label, catId: cat.id });
        }
      });
    });

    const sr = document.getElementById('search-results');
    const body = document.getElementById('sr-body');
    document.getElementById('sr-title').textContent = `${results.length} result${results.length !== 1 ? 's' : ''} for "${query}"`;

    const groups = {};
    results.forEach(r => { if (!groups[r.type]) groups[r.type] = []; groups[r.type].push(r); });

    const typeLabels = { legislation:'Legislation', section:'Sections', guidance:'Guidance' };
    body.innerHTML = Object.entries(groups).map(([type, items]) => `
      <div class="sr-group-hd">${typeLabels[type] || type}</div>
      <div class="sr-items">
        ${items.slice(0,5).map(item => `
          <div class="sr-item" onclick="loadContent('${item.catId}','${item.id}');closeSearch()">
            <div class="sr-item-icon">${type === 'legislation' || type === 'section' ? '📚' : '📋'}</div>
            <div>
              <div class="sr-item-title">${item.title.replace(new RegExp(query,'gi'), m => `<mark>${m}</mark>`)}</div>
              <div class="sr-item-sub">${item.sub}</div>
            </div>
          </div>`).join('')}
      </div>`).join('');

    sr.classList.add('active');
  }

  function closeSearch() {
    document.getElementById('search-results').classList.remove('active');
    document.getElementById('search-input').value = '';
  }

  function closeUploadModal() { document.getElementById('upload-modal').classList.remove('open'); pendingFile = null; }

  function handleFileSelect(input) {
    const file = input.files?.[0];
    if (!file) return;
    if (!['application/pdf','application/vnd.openxmlformats-officedocument.wordprocessingml.document'].includes(file.type)) {
      showToast('Please upload a PDF or DOCX file', 'info'); return;
    }
    if (file.size > 10 * 1024 * 1024) { showToast('File must be under 10MB', 'info'); return; }
    pendingFile = file;
    const status = document.getElementById('upload-status');
    status.style.display = 'block';
    status.textContent = `Selected: ${file.name} (${(file.size/1024).toFixed(0)}KB)`;
    const btn = document.getElementById('upload-confirm-btn');
    btn.disabled = false; btn.style.opacity = '1';
  }

  function handleDroppedFile(file) { handleFileSelect({ files: [file] }); openUploadModal(); }

  function confirmUpload() {
    if (!pendingFile) return;
    showToast(`${pendingFile.name} added to Document Vault`, 'success');
    closeUploadModal();
    // If vault panel is open, re-render it
    if (activePanel === 'vault') openPanel('vault');
  }

    clipboardItems.unshift({ source: `${source} — ${title}`, text: title });

    if (badge) badge.classList.add('cyan');

    clipboardItems.unshift({ source: title, text });
    if (clipboardItems.length > 50) clipboardItems.pop();
    showToast('Saved to Clipboard', 'success');

  }

    // Simple filter on research panel
  }

  // ── TOAST ─────────────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const stack = document.getElementById('toast-stack');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    stack.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── KEYBOARD SHORTCUTS ────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('panel-drawer').classList.contains('open')) closeDrawer();
    if ((e.metaKey || e.ctrlKey) && e.key >= '1' && e.key <= '8') {
      e.preventDefault();
      const idx = parseInt(e.key) - 1;
      const panel = PANELS.filter(p => p)[idx];
      if (panel) openPanel(panel.id);
    }

  // ── FETCH CONTENT ─────────────────────────────────────────────────
  // Fetches /knowledge-library/content/[id].json
  // Returns parsed content object or null on failure.
  // Caches result — subsequent calls are instant.
  async function fetchContent(itemId) {
    if (CONTENT_CACHE[itemId]) return CONTENT_CACHE[itemId];
    try {
      const resp = await fetch(`${CONTENT_BASE}${itemId}.json`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      CONTENT_CACHE[itemId] = data;
      try { gtag('event', 'kl_content_load', { item_id: itemId, tier: SESSION.tier }); } catch(e){}
      return data;
    } catch(e) {
      console.error(`[KL] Failed to load content: ${itemId}`, e);
      return null;
    }
  }

    document.querySelectorAll('.nav-sub-item').forEach(el => el.classList.remove('active'));
    const navItem = document.getElementById(`navitem-${itemId}`);
    if (navItem) navItem.classList.add('active');

    // Show loading skeleton instantly
    showContentSkeleton(itemId);

    // Fetch content
    const content = await fetchContent(itemId);

    if (!content) {
      renderContentError(itemId);
      return;
    }

    // Render by type
    const cat = content.cat || catId;
    if (cat === 'legislation') {
      renderStatute(content);
    } else if (cat === 'acas') {
      renderGuidance(content);
    } else if (cat === 'hse' || cat === 'ico') {
      renderGuidance(content);
    } else if (cat === 'training') {
      renderTraining(content);
    } else if (cat === 'caselaw') {
      renderCaseLaw(content);
    } else if (cat === 'horizon') {
      renderHorizon(content);
    } else {
      renderGuidance(content);
    }
  }

        </div>
        <div class="statute-parts">
          ${(h.items||[]).map((item,i) => `
            <div class="statute-part">
              <div class="part-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                <span class="part-num" style="background:${item.status==='Not In Force'?'var(--amber-dim)':item.status==='In Force'?'var(--success-dim)':'var(--border)'};color:${item.status==='Not In Force'?'var(--amber)':item.status==='In Force'?'var(--success)':'var(--text-3)'};border-color:transparent;font-size:10px;width:auto;padding:3px 8px">${item.status||'Pending'}</span>
                <span class="part-title">${item.title}</span>
                <span class="part-section-count" style="color:var(--amber)">${item.expectedDate||''}</span>
                <span class="part-chevron">&#8250;</span>
              </div>
              <div class="part-body">
                <div class="section-item" style="cursor:default">
                  <div class="sec-content">
                    <div style="font-size:13px;line-height:1.8;color:var(--text-1)">${item.detail||''}</div>
                    ${item.aceiImpact ? `<div style="margin-top:10px;padding:10px 12px;background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:7px;font-size:12px;color:var(--amber)"><strong>ACEI Impact:</strong> ${item.aceiImpact}</div>` : ''}
                    ${(item.refs||[]).length ? `<div class="sec-actions" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">${item.refs.map(r=>`<span class="stat-ref">&#10230; ${r}</span>`).join(' ')}</div>` : ''}
                  </div>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    document.getElementById('main-content').scrollTop = 0;
  }

  // ── LOAD CATEGORY — updated to use registry ───────────────────────
  function loadCategory(catId) {
    const cat = NAV_CATEGORIES.find(c => c.id === catId);
    if (!cat) return;
    const btn  = document.getElementById(`navcat-${catId}`);
    const sub  = document.getElementById(`navsub-${catId}`);
    if (btn && !btn.classList.contains('open')) {
      document.querySelectorAll('.nav-sub-items.open').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.nav-cat-btn.open').forEach(el => el.classList.remove('open'));
      btn.classList.add('open'); sub.classList.add('open');
    }
    setBreadcrumb(['Knowledge Library', cat.label]);
    const instruments = cat.items.map(item => {
      const reg = CONTENT_REGISTRY[item.id] || {};
      return { id: item.id, title: reg.title || item.label, short: reg.short || item.short || '', type: reg.type || '', acei: reg.acei || [], isERA: reg.isERA || item.era || false };
    });
    document.getElementById('content-area').innerHTML = `
      <div class="cat-overview">
        <div class="cat-title">${cat.icon} ${cat.label}</div>
        <div class="cat-desc">${getCatDesc(catId)}</div>
        <div class="cat-grid">
          ${instruments.map(inst => `
            <div class="instrument-card ${inst.isERA ? 'era' : ''}" onclick="loadContent('${catId}','${inst.id}')">
              <div class="inst-type">${inst.type}${inst.isERA ? '<span class="inst-era-tag" style="margin-left:8px">ERA 2025</span>' : ''}</div>
              <div class="inst-title">${inst.title}</div>
              ${inst.short ? `<div class="inst-short">${inst.short}</div>` : ''}
              <div class="inst-meta">${inst.acei.slice(0,3).map(a=>`<span class="inst-tag acei">${a}</span>`).join('')}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // ── SEARCH — updated to use registry for metadata ─────────────────
  function doSearch(query) {
    const q = query.toLowerCase();
    const results = [];
    Object.entries(CONTENT_REGISTRY).forEach(([id, meta]) => {
      if (meta.title.toLowerCase().includes(q) || (meta.short||'').toLowerCase().includes(q) || (meta.acei||[]).some(a=>a.toLowerCase().includes(q))) {
        results.push({ type: meta.cat, id, title: meta.title, sub: meta.short||meta.type, catId: meta.cat });
      }
    });
    NAV_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        if (!results.find(r=>r.id===item.id) && item.label.toLowerCase().includes(q)) {
          results.push({ type: cat.id, id: item.id, title: item.label, sub: cat.label, catId: cat.id });
        }
      });
    });
    const sr   = document.getElementById('search-results');
    const body = document.getElementById('sr-body');
    document.getElementById('sr-title').textContent = `${results.length} result${results.length!==1?'s':''} for "${query}"`;
    const groups = {};
    results.forEach(r => { if (!groups[r.catId]) groups[r.catId]=[]; groups[r.catId].push(r); });
    const catIcons = { legislation:'&#128218;', acas:'&#128203;', hse:'&#127981;', ico:'&#128274;', horizon:'&#128225;', training:'&#127891;', caselaw:'&#9878;' };
    body.innerHTML = Object.entries(groups).map(([catId, items]) => `
      <div class="sr-group-hd">${getCatLabel(catId)}</div>
      <div class="sr-items">
        ${items.slice(0,5).map(item => `
          <div class="sr-item" onclick="loadContent('${item.catId}','${item.id}');closeSearch()">
            <div class="sr-item-icon">${catIcons[item.catId]||'&#128209;'}</div>
            <div>
              <div class="sr-item-title">${item.title.replace(new RegExp(query,'gi'),m=>`<mark>${m}</mark>`)}</div>
              <div class="sr-item-sub">${item.sub}</div>
            </div>
          </div>`).join('')}
      </div>`).join('');
    sr.classList.add('active');
  }

  console.log('[KL] JSON fetch architecture active. Content served from /knowledge-library/content/');
  </script>

</body>
