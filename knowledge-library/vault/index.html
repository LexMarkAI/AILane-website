  <!-- ==========================================================================
       KL VAULT — layout & styling parity with operational/documents/index.html
       (AILANE-CC-BRIEF-KL-VAULT-PARITY-001, spec KLUI-001/AMD-262). The card grid,
       Exposure Report card, Solicitor Pack pane and slot chrome REUSE the exact
       operational vault classes verbatim (.dcard / .dcard-body grid / .dpane /
       .report-collapsed / .mini-ring / .slot-*), so the two pages are visually
       indistinguishable in structure. KL differs ONLY where it is point-in-time,
       not continuously monitored: the monitoring explainer, forward-notice,
       Notification Settings, Monitored/Attested/History chips and the
       solicitor-approved/revised lifecycle are absent (brief §2). Counters are
       relabelled to session credits (§1) and the pack is session-scoped (§4).
       ========================================================================== -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: var(--surface-void, #050c18); }
    body {
      background: var(--surface-void, #050c18);
      color: var(--text-body, #e2e8f0);
      font-family: var(--font-body, 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif);
      min-height: 100vh; line-height: 1.55; -webkit-font-smoothing: antialiased;
    }
    a { color: var(--tier-operational, #22d3ee); }
    h1, h2, h3 { font-family: var(--font-display, 'DM Serif Display', Georgia, serif); font-weight: 400; }

    /* ---- Top bar (operational parity) ---- */
    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
      padding: 14px 24px;
      background: var(--surface-deep, #06080f);
      border-bottom: 1px solid var(--border-mid, rgba(148,163,184,0.2));
    }
    .brand {
      font-family: var(--font-display, 'DM Serif Display', Georgia, serif);
      font-size: 1.32rem; color: var(--text-prime, #f1f5f9); letter-spacing: 0.01em;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .topbar-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.86rem; font-weight: 600; text-decoration: none;
      color: var(--tier-operational, #22d3ee);
      padding: 6px 12px; border-radius: 999px;
      border: 1px solid var(--border-mid, rgba(148,163,184,0.2));
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .topbar-back:hover { border-color: var(--tier-operational, #22d3ee); background: rgba(34,211,238,0.08); }
    .topbar-back:focus-visible { outline: 2px solid var(--tier-operational, #22d3ee); outline-offset: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .tier-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 999px;
      font-size: 0.74rem; font-weight: 600; letter-spacing: 0.04em;
      border: 1px solid var(--border-mid, rgba(148,163,184,0.2));
      color: var(--tier-operational, #22d3ee); background: var(--surface-glass, rgba(30,41,59,0.5));
    }
    .tier-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    /* Session check-credit counter — relabelled from the operational "— of 5 monitored". */
    .credit-counter {
      font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
      font-size: 0.8rem; color: var(--text-sec, #94a3b8); letter-spacing: 0.02em;
    }

    .wrap { max-width: 1240px; margin: 0 auto; padding: 24px 24px 80px; }

    /* ---- Standing disclaimer (KEEP verbatim, brief §2) ---- */
    .disclaimer-banner {
      margin: 6px 0 24px; padding: 16px 18px;
      border: 1px solid var(--border-mid, rgba(148,163,184,0.2));
      border-left: 3px solid var(--tier-operational, #22d3ee);
      border-radius: var(--card-radius-sm, 8px);
      background: var(--surface-raised, rgba(15,23,42,0.8));
      color: var(--text-body, #e2e8f0); font-size: 0.92rem; line-height: 1.6;
    }
    .disclaimer-banner strong { color: var(--text-prime, #f1f5f9); }

    /* ---- Panes / layout ---- */
    .section-head {
      font-family: var(--font-body, 'DM Sans', sans-serif);
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-mute, #64748b); font-weight: 600;
      margin: 0 0 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border-dim, rgba(148,163,184,0.12));
    }
    .section-head.spaced { margin-top: 30px; }
    .pane {
      background: var(--surface-card, #0c1525);
      border: 1px solid var(--border-dim, rgba(148,163,184,0.12));
      border-radius: var(--card-radius-lg, 16px);
      padding: 20px 20px 24px;
    }

    /* ---- States ---- */
    .state-msg { padding: 32px 16px; text-align: center; color: var(--text-mute, #64748b); font-size: 0.92rem;
      border: 1px dashed var(--border-dim, rgba(148,163,184,0.12)); border-radius: var(--card-radius, 12px); }
    .spinner { width: 26px; height: 26px; margin: 0 auto 14px; border: 3px solid rgba(34,211,238,0.15);
      border-top-color: var(--tier-operational, #22d3ee); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       Per-slot document-set cards — COPIED VERBATIM from the
       operational vault (DOCV-ROOM-003 §B4): header strip + a
       side-by-side grid of panes (Exposure Report · Contract ·
       Solicitors Preparation Bundle). This is the core parity fix.
       ============================================================ */
    #vault-cards { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
    .dcard {
      background: var(--surface-card, #0c1525);
      border: 1px solid var(--border-dim, rgba(148,163,184,0.12));
      border-radius: var(--card-radius-lg, 16px);
      overflow: hidden; transition: border-color 0.15s ease;
    }
    .dcard.selected { border-color: rgba(34,211,238,0.55); }
    .dcard.empty { border-style: dashed; }
    .dcard-head {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border-dim, rgba(148,163,184,0.12));
      background: var(--surface-base, #0a0e1a);
      scroll-margin-top: 72px;
    }
    .dcard-head:focus-visible { outline: 2px solid var(--tier-operational, #22d3ee); outline-offset: -2px; }
    .ring-dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto;
      background: var(--text-mute, #64748b); box-shadow: 0 0 0 3px rgba(100,116,139,0.12); }
    .dcard-filename { font-weight: 600; color: var(--text-prime, #f1f5f9); font-size: 0.95rem; word-break: break-word; min-width: 0; }
    .dcard-checked { font-size: 0.72rem; color: var(--text-mute, #64748b);
      font-family: var(--font-mono, 'JetBrains Mono', monospace); letter-spacing: 0.01em; }
    /* Session credit counter on the card header — relabelled from the operational
       "Contract 1/3" slot counter (brief §1/§2). */
    .slot-credit { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.02em;
      color: var(--text-sec, #94a3b8); border: 1px solid var(--border-mid, rgba(148,163,184,0.2));
      background: var(--surface-glass, rgba(30,41,59,0.5)); border-radius: 999px; padding: 3px 10px;
      font-family: var(--font-mono, 'JetBrains Mono', monospace); }
    .dcard-head-spacer { flex: 1 1 auto; }
    .dcard-body { display: grid; grid-template-columns: 1.35fr 1fr 1fr; align-items: start; }
    .dpane { padding: 14px 16px 16px; min-width: 0; border-left: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }
    .dpane:first-child { border-left: none; }
    @media (max-width: 900px) {
      .dcard-body { grid-template-columns: 1fr; }
      .dpane { border-left: none; border-top: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }
      .dpane:first-child { border-top: none; }
    }
    .dpane-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      margin-bottom: 10px; font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-mute, #64748b); font-weight: 600;
    }
    .report-collapsed { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .mini-ring {
      width: 36px; height: 36px; border-radius: 50%; flex: 0 0 auto;
      border: 4px solid var(--text-mute, #64748b);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.92rem; line-height: 1; color: var(--text-prime, #f1f5f9);
    }
    .report-counts { font-size: 0.84rem; color: var(--text-sec, #94a3b8); line-height: 1.45; min-width: 0; }
    .report-counts strong { color: var(--text-prime, #f1f5f9); }
    .report-expanded { margin-top: 12px; }
    .pane-note { font-size: 0.78rem; color: var(--text-mute, #64748b); line-height: 1.5; }
    .pack-generated-line { font-size: 0.8rem; color: var(--text-sec, #94a3b8); margin-bottom: 10px;
      font-family: var(--font-mono, 'JetBrains Mono', monospace); }

    /* ---- Slot chrome (operational parity) ---- */
    .slot-type-tag {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--tier-operational, #22d3ee);
      border: 1px solid var(--border-mid, rgba(148,163,184,0.2)); border-radius: 999px; padding: 3px 9px;
    }
    .slot-filename { font-weight: 600; color: var(--text-prime, #f1f5f9); font-size: 0.95rem; word-break: break-word; }
    .slot-meta { margin-top: 3px; font-size: 0.74rem; color: var(--text-mute, #64748b);
      font-family: var(--font-mono, 'JetBrains Mono', monospace); letter-spacing: 0.01em; }
    .slot-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-mini {
      font-family: inherit; font-size: 0.74rem; font-weight: 600; cursor: pointer;
      padding: 5px 11px; border-radius: 999px; background: transparent;
      border: 1px solid var(--border-mid, rgba(148,163,184,0.2)); color: var(--text-sec, #94a3b8);
      transition: all 0.15s ease;
    }
    .btn-mini:hover { border-color: var(--tier-operational, #22d3ee); color: var(--tier-operational, #22d3ee); }
    .btn-mini.danger:hover { border-color: var(--status-err, #ef4444); color: var(--status-err, #ef4444); }
    .btn-mini:disabled { opacity: 0.5; cursor: not-allowed; }
    .slot-empty-body { padding: 10px 4px; }
    .slot-empty-plus { font-size: 1.5rem; line-height: 1; color: var(--tier-operational, #22d3ee); }
    .slot-empty-label { margin-top: 6px; font-weight: 600; color: var(--text-prime, #f1f5f9); font-size: 0.92rem; }
    .slot-empty-hint { margin-top: 3px; font-size: 0.74rem; color: var(--text-mute, #64748b); }
    .slot-work { margin-top: 12px; text-align: left; }
    .chooser-title { font-size: 0.84rem; font-weight: 600; color: var(--text-body, #e2e8f0); margin-bottom: 10px; }
    /* ---- Per-slot type chooser (brief §3) — COPIED VERBATIM from operational/documents ---- */
    .chooser-opts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .chooser-opt {
      font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer;
      padding: 7px 12px; border-radius: 999px; background: transparent;
      border: 1px solid var(--border-mid, rgba(148,163,184,0.2)); color: var(--text-sec, #94a3b8);
      transition: all 0.15s ease;
    }
    .chooser-opt:hover { border-color: var(--tier-operational, #22d3ee); color: var(--tier-operational, #22d3ee); }
    .chooser-opt.sel { border-color: var(--tier-operational, #22d3ee); color: var(--tier-operational, #22d3ee); background: rgba(34,211,238,0.08); }
    .work-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .work-actions .btn-primary, .work-actions .btn-secondary { padding: 9px 16px; font-size: 0.82rem; }
    .file-input { width: 100%; font-family: inherit; font-size: 0.82rem; color: var(--text-sec, #94a3b8); padding: 8px 0; }
    .slot-hint { font-size: 0.76rem; color: var(--text-mute, #64748b); margin: 6px 0; line-height: 1.5; }
    .slot-status { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 0.8rem; color: var(--text-sec, #94a3b8); }
    .mini-spinner { width: 14px; height: 14px; border: 2px solid rgba(34,211,238,0.18);
      border-top-color: var(--tier-operational, #22d3ee); border-radius: 50%; animation: spin 0.8s linear infinite; flex: 0 0 auto; }
    .row-error { font-size: 0.76rem; color: var(--status-err, #ef4444); margin-top: 8px; line-height: 1.45; }

    /* ---- Exposure Report — expanded findings (operational parity) ---- */
    .status-block { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
    .ring {
      width: 76px; height: 76px; border-radius: 50%; flex: 0 0 auto;
      border: 8px solid var(--text-mute, #64748b);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; line-height: 1; color: var(--text-prime, #f1f5f9);
    }
    .status-label { font-size: 1.18rem; font-weight: 700; color: var(--text-prime, #f1f5f9);
      font-family: var(--font-body, 'DM Sans', sans-serif); }
    .status-sub { margin-top: 4px; font-size: 0.84rem; color: var(--text-sec, #94a3b8); line-height: 1.5; }
    .magnitude { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 26px; }
    .mag-cell { text-align: center; padding: 12px 6px; border-radius: var(--card-radius-sm, 8px);
      background: var(--surface-base, #0a0e1a); border: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }
    .mag-num { display: block; font-size: 1.5rem; font-weight: 700;
      font-family: var(--font-mono, 'JetBrains Mono', monospace); color: var(--text-prime, #f1f5f9); }
    .mag-lbl { display: block; margin-top: 2px; font-size: 0.68rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-mute, #64748b); }
    .finding { padding: 16px 0; border-top: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }
    .finding:first-of-type { border-top: none; }
    .finding-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .sev { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 999px; color: #fff; }
    .sev-critical { background: #991B1B; }
    .sev-major    { background: #B4640A; }
    .sev-minor    { background: #8a6d1a; }
    .sev-aligned  { background: #176B3C; }
    .finding-cat { font-size: 0.86rem; font-weight: 600; color: var(--text-body, #e2e8f0); }
    .grad-bar { display: flex; width: 100%; height: 12px; border-radius: 999px; overflow: hidden;
      background: var(--surface-base, #0a0e1a); margin-bottom: 10px; }
    .grad-seg { height: 100%; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .chip { display: inline-flex; align-items: center; gap: 7px; padding: 4px 10px; border-radius: 999px;
      background: var(--surface-glass, rgba(30,41,59,0.5)); border: 1px solid var(--border-dim, rgba(148,163,184,0.12));
      font-size: 0.74rem; color: var(--text-body, #e2e8f0); }
    .chip .swatch { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 auto; }
    .finding-detail { font-size: 0.92rem; color: var(--text-body, #e2e8f0); margin-bottom: 8px; }
    .statutory { font-size: 0.82rem; color: var(--text-sec, #94a3b8); }
    .statutory .lbl { color: var(--text-mute, #64748b); }
    .solicitor-points { margin-top: 8px; font-size: 0.82rem; color: var(--text-sec, #94a3b8);
      border-left: 2px solid var(--tier-operational, #22d3ee); padding-left: 10px; }
    .gso-band { margin-top: 26px; padding: 18px; border-radius: var(--card-radius, 12px);
      background: rgba(71,85,105,0.10); border: 1px solid #475569; }
    .gso-band h3 { font-size: 1.02rem; color: var(--text-prime, #f1f5f9); margin-bottom: 4px; }
    .gso-band .band-sub { font-size: 0.8rem; color: var(--text-sec, #94a3b8); margin-bottom: 14px; }
    .gso-item { padding: 12px 0; border-top: 1px solid rgba(71,85,105,0.4); }
    .gso-item:first-of-type { border-top: none; }
    .gso-cluster { display: inline-block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: #cbd5e1; background: #475569; padding: 3px 9px; border-radius: 999px; margin-bottom: 8px; }
    .report-foot { margin-top: 18px; padding-top: 12px;
      border-top: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }

    /* ---- Buttons ---- */
    .btn-primary {
      padding: 11px 20px; border: none; border-radius: var(--card-radius-sm, 8px);
      background: var(--tier-operational, #22d3ee); color: #042027; font-family: inherit; font-weight: 700;
      font-size: 0.88rem; cursor: pointer; transition: opacity 0.15s ease; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary {
      padding: 11px 20px; border: 1px solid var(--border-mid, rgba(148,163,184,0.2));
      border-radius: var(--card-radius-sm, 8px); background: transparent;
      color: var(--text-sec, #94a3b8); font-family: inherit; font-weight: 600; font-size: 0.88rem; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-secondary:hover { border-color: var(--tier-operational, #22d3ee); color: var(--tier-operational, #22d3ee); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-msg { font-size: 0.82rem; margin-top: 12px; line-height: 1.5; }
    .form-msg.err { color: var(--status-err, #ef4444); }
    .form-msg.ok { color: var(--status-ok, #10b981); }

    /* ---- Solicitors Preparation Bundle — session buy-more panel (brief §4) ---- */
    .pack-lead { font-size: 0.9rem; color: var(--text-body, #e2e8f0); line-height: 1.6; margin-bottom: 6px; }
    .pack-included { display: inline-flex; align-items: center; gap: 7px; margin: 4px 0 16px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      color: #34d399; border: 1px solid rgba(23,107,60,0.7);
      background: rgba(23,107,60,0.14); border-radius: 999px; padding: 4px 11px; }
    .upsell-sub { font-size: 0.84rem; color: var(--text-sec, #94a3b8); line-height: 1.55; margin-bottom: 12px; }
    .upsell-line { display: flex; align-items: baseline; gap: 12px; padding: 10px 0;
      border-top: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }
    .upsell-line:first-of-type { border-top: none; }
    .upsell-price { font-family: var(--font-mono, 'JetBrains Mono', monospace); font-weight: 700;
      font-size: 1.05rem; color: var(--tier-institutional, #D97706); flex: 0 0 auto; min-width: 46px; }
    .upsell-desc { font-size: 0.86rem; color: var(--text-body, #e2e8f0); line-height: 1.5; }
    .pack-actions { margin-top: 18px; }

    /* ---- Delivered reports (brief §1) — the persisted Exposure Report + Solicitors
       Preparation Bundle PDFs, grouped one entry per delivery pair. ---- */
    .delivered-entry { padding: 14px 0; border-top: 1px solid var(--border-dim, rgba(148,163,184,0.12)); }

      }

      // ---- Filled card: header strip + Exposure Report · Contract · Solicitor Pack ----
      function buildFilledCard(doc, idx) {
        // A filled slot keeps the type it was uploaded with (brief §3.2) — the stored
        // chosen type, falling back to the positional default for legacy rows.
        var type = readType(doc.id) || slotTypeAt(idx);
        var card = el('div', 'dcard');
        card.setAttribute('data-doc-id', doc.id);

        // Header strip — RAG dot · type tag · session-credit counter · filename · checked date.
        // (Monitored / Attested / History / change chips REMOVED — brief §2.)
        var head = el('div', 'dcard-head');
        head.setAttribute('role', 'button');
        head.setAttribute('tabindex', '0');
        head.setAttribute('aria-label', 'Toggle report for ' + (doc.filename || 'document'));
        var dot = el('span', 'ring-dot'); dot.title = 'No analysis yet';
        head.appendChild(dot);
        head.appendChild(el('span', 'slot-type-tag', slotTypeLabel(type)));
        head.appendChild(el('span', 'slot-credit', 'Check ' + (idx + 1) + ' of ' + allowed));
        head.appendChild(el('span', 'dcard-filename', doc.filename || 'Untitled document'));
        var checked = el('span', 'dcard-checked', 'Added ' + fmtDate(doc.created_at));
        head.appendChild(checked);
        head.appendChild(el('span', 'dcard-head-spacer'));
        card.appendChild(head);

        var body = el('div', 'dcard-body');

        // ① Exposure Report — collapsed-first (accordion). Same card + styling as operational.
        var repPane = el('div', 'dpane dpane-report');
        var repHead = el('div', 'dpane-head');
        repHead.appendChild(el('span', null, 'Exposure Report'));
        var pdfBtn = el('button', 'btn-mini', 'PDF'); pdfBtn.type = 'button'; pdfBtn.disabled = true;
        pdfBtn.title = 'Download exposure report (PDF)';
        repHead.appendChild(pdfBtn);
        repPane.appendChild(repHead);
        var collapsed = el('div', 'report-collapsed');
        var miniRing = el('div', 'mini-ring', '·');
        collapsed.appendChild(miniRing);
        var counts = el('div', 'report-counts', 'Loading the report…');
        collapsed.appendChild(counts);
        var expandBtn = el('button', 'btn-mini', 'Expand report'); expandBtn.type = 'button';
        expandBtn.disabled = true;
        expandBtn.setAttribute('aria-expanded', 'false');
        collapsed.appendChild(expandBtn);
        repPane.appendChild(collapsed);
        var expanded = el('div', 'report-expanded'); expanded.hidden = true;
        repPane.appendChild(expanded);
        var pdfMsg = el('div', 'form-msg'); pdfMsg.hidden = true;
        repPane.appendChild(pdfMsg);
        body.appendChild(repPane);

        // ② Contract (the uploaded document) — Replace / Remove. "Checked" (point-in-time), not "Monitored".
        var conPane = el('div', 'dpane dpane-contract');
        var conHead = el('div', 'dpane-head');
        conHead.appendChild(el('span', null, slotTypeLabel(type)));
        conPane.appendChild(conHead);
        conPane.appendChild(el('div', 'slot-filename', doc.filename || 'Untitled document'));
        var slotMeta = el('div', 'slot-meta', 'Added ' + fmtDate(doc.created_at));
        conPane.appendChild(slotMeta);
        var actions = el('div', 'slot-actions');
        var rep = el('button', 'btn-mini', 'Replace'); rep.type = 'button';
        rep.addEventListener('click', function (e) { e.stopPropagation(); openReplace(doc, card); });
        var rem = el('button', 'btn-mini danger', 'Remove'); rem.type = 'button';
        rem.addEventListener('click', function (e) { e.stopPropagation(); confirmRemove(doc); });
        actions.appendChild(rep); actions.appendChild(rem);
        conPane.appendChild(actions);
        var work = el('div', 'slot-work'); work.style.display = 'none';
        work.addEventListener('click', function (e) { e.stopPropagation(); });
        conPane.appendChild(work);
        body.appendChild(conPane);

        // ③ Solicitors Preparation Bundle — session-scoped (brief §4).
        var packPane = el('div', 'dpane dpane-pack');
        var packHead = el('div', 'dpane-head');
        packHead.appendChild(el('span', null, 'Solicitors Preparation Bundle'));
        packPane.appendChild(packHead);
        var packBody = el('div');
        packBody.appendChild(el('div', 'pane-note', 'Checking this document…'));
        packPane.appendChild(packBody);
        body.appendChild(packPane);

        card.appendChild(body);

        cardState[doc.id] = cardState[doc.id] || {};
        cardState[doc.id].els = {
          card: card, dot: dot, checked: checked, slotMeta: slotMeta,
          miniRing: miniRing, counts: counts, expandBtn: expandBtn, expanded: expanded,
          pdfBtn: pdfBtn, pdfMsg: pdfMsg, packBody: packBody, repBtn: rep
        };
        // Restore accordion open state across a re-render.
        if (expandedDocId === doc.id) {
          expandBtn.textContent = 'Collapse report';
          expandBtn.setAttribute('aria-expanded', 'true');
          expanded.hidden = false;
        }

        function toggle() { toggleReport(doc.id); }
        head.addEventListener('click', toggle);
        head.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
        });
        expandBtn.addEventListener('click', function (e) { e.stopPropagation(); toggleReport(doc.id); });

        loadCardData(doc);
        return card;
      }

      // ---- Empty slot — "+ Add a document to check" (operational affordance) ----
      function buildEmptyCard(idx) {
        var type = slotTypeAt(idx);
        var canAdd = remaining > 0 && idx < allowed;
        var card = el('div', 'dcard empty');
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', canAdd ? '0' : '-1');

        var head = el('div', 'dcard-head');
        head.style.cursor = canAdd ? 'pointer' : 'default';
        head.appendChild(el('span', 'slot-type-tag', slotTypeLabel(type)));
        head.appendChild(el('span', 'slot-credit', 'Check ' + (idx + 1) + ' of ' + allowed));
        head.appendChild(el('span', 'dcard-checked', 'Empty slot'));
        card.appendChild(head);

        var bodyEl = el('div', 'slot-empty-body');
        bodyEl.style.cssText = 'padding:14px 16px 18px;text-align:center;';
        bodyEl.appendChild(el('div', 'slot-empty-plus', '+'));
        // Type is chosen per slot in the chooser (brief §3), so the empty prompt is generic.
        bodyEl.appendChild(el('div', 'slot-empty-label', 'Add a document to check'));
        bodyEl.appendChild(el('div', 'slot-empty-hint', canAdd
          ? 'PDF or Word (.docx), up to 10 MB.'
          : 'Your session checks are used — add another below.'));
        card.appendChild(bodyEl);

        var work = el('div', 'slot-work'); work.style.display = 'none';
        work.style.padding = '0 16px 16px';
        work.addEventListener('click', function (e) { e.stopPropagation(); });
        card.appendChild(work);

        if (canAdd) {
          function open() {
            if (work.style.display === 'block') return;
            openChooser(card, idx, type);
          }
          card.addEventListener('click', open);
          card.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
          });
        }
        return card;
      }

      // ===========================================================
      //  Exposure Report data wiring — reads the check overlay + findings
      //  exactly as the operational vault does (vault_contract_records →
      //  upload_id → compliance_findings). KL is point-in-time, so any
      //  forward-looking rows are dropped (no Legislative Horizon; brief §2).
      //  Check execution / the write-side model is owned by the KL fulfilment
      //  flow — this vault manages documents and DISPLAYS their results.
      // ===========================================================
      function loadCardData(doc) {
        var st = cardState[doc.id];
        if (!st || !st.els) return;
        return Promise.all([
          getJson('/vault_contract_records?document_id=eq.' + doc.id +
                  '&select=status_band,critical_gaps,upload_id,created_at&order=created_at.desc&limit=1')
            .then(function (r) { return (r && r[0]) || null; })
            .catch(function (e) { console.error('[kl-vault] contract-record read failed', { document_id: doc.id, error: String((e && e.message) || e) }); return null; }),
          getJson('/vault_solicitor_packs?document_id=eq.' + doc.id +
                  '&superseded_at=is.null&select=upload_id,created_at&order=created_at.desc&limit=1')
            .then(function (r) { return (r && r[0]) || null; })
            .catch(function (e) { console.error('[kl-vault] solicitor-pack read failed', { document_id: doc.id, error: String((e && e.message) || e) }); return null; })
        ]).then(function (res) {
          st.overlay = res[0]; st.pack = res[1];
          if (st.overlay && st.overlay.upload_id) {
            return getJson('/compliance_findings?upload_id=eq.' + st.overlay.upload_id +
                    '&select=severity,clause_category,statutory_ref,finding_detail,acei_weights,gso_cluster,is_forward_looking&order=severity.asc')
              .catch(function () { return []; });
          }
          return [];
        }).then(function (findings) {
          st.findings = (findings || []).filter(function (f) { return !f.is_forward_looking; });
          paintCard(doc);
        });
      }

      function deriveStatus(overlay, findings) {
        if (!overlay) return null; // no analysis yet
        // Point-in-time engine assessment. Green is not reachable in a KL session
        // (the solicitor-attestation lifecycle is operational-only — brief §2).
        if (overlay.status_band === 'red') return 'red';
        var red = (findings || []).some(function (f) { return f.severity === 'critical'; });
        if (!red && (overlay.critical_gaps || 0) > 0) red = true;
        return red ? 'red' : 'amber';
      }
      function packIsGenerated(st) {
        return !!(st && st.pack && st.overlay && st.overlay.upload_id && st.pack.upload_id === st.overlay.upload_id);
      }

      function paintCard(doc) {
        var st = cardState[doc.id];
        if (!st || !st.els) return;
        var e = st.els;
        var status = deriveStatus(st.overlay, st.findings);

        if (status) {
          e.dot.style.background = RING_HEX[status];
          e.dot.style.boxShadow = '0 0 0 3px ' + RING_HEX[status] + '33';
          e.dot.title = status === 'red' ? 'Significant gaps identified' : 'Reviewed — engine assessment';
        } else {
          e.dot.style.background = ''; e.dot.style.boxShadow = '';
          e.dot.title = 'No analysis yet';
        }

        // "Last checked" → "Checked" (point-in-time, brief §2).
        var checkedText = (st.overlay && st.overlay.created_at)
          ? 'Checked ' + fmtDate(st.overlay.created_at)
          : 'Added ' + fmtDate(doc.created_at);
        e.checked.textContent = checkedText;
        e.slotMeta.textContent = checkedText;

        paintReportPane(doc);
        renderPackPane(doc);
      }

      // ---- Exposure Report — collapsed strip (ring + counts + Expand) ----
      function paintReportPane(doc) {
        var st = cardState[doc.id]; var e = st.els;
        var status = deriveStatus(st.overlay, st.findings);
        if (status === 'red') { e.miniRing.style.borderColor = RING_HEX.red; e.miniRing.textContent = '!'; }
        else if (status === 'amber') { e.miniRing.style.borderColor = RING_HEX.amber; e.miniRing.textContent = '◐'; }
        else { e.miniRing.style.borderColor = ''; e.miniRing.textContent = '·'; }

        if (!st.overlay || !st.overlay.upload_id) {
          clear(e.counts);
          e.counts.appendChild(document.createTextNode('This document has not been checked yet.'));
          e.expandBtn.disabled = true;
          e.pdfBtn.disabled = true;
          if (expandedDocId === doc.id) collapseReport(doc.id);
          return;
        }

        var sig = (st.findings || []).filter(function (f) { return f.severity === 'critical'; }).length;
        var reviewed = (st.findings || []).length;
        clear(e.counts);
        var line = el('div');
        line.appendChild(el('strong', null, String(sig)));
        line.appendChild(document.createTextNode(' significant gap' + (sig === 1 ? '' : 's') + ' · '));
        line.appendChild(el('strong', null, String(reviewed)));
        line.appendChild(document.createTextNode(' area' + (reviewed === 1 ? '' : 's') + ' reviewed'));
        e.counts.appendChild(line);
        e.expandBtn.disabled = false;
        e.pdfBtn.disabled = false;
        if (!e.pdfWired) {
          e.pdfWired = true;
          e.pdfBtn.addEventListener('click', function (ev) {
            ev.stopPropagation();
            var cur = cardState[doc.id];
            if (cur && cur.overlay && cur.overlay.upload_id) downloadPdf(cur.overlay.upload_id, e.pdfBtn, e.pdfMsg);
          });
        }
        if (expandedDocId === doc.id) renderReportInto(doc.id);
      }

      // ---- Accordion (one report open at a time) ----
      function toggleReport(docId) {
        if (expandedDocId === docId) { collapseReport(docId); return; }
        if (expandedDocId) collapseReport(expandedDocId);
        var st = cardState[docId];
        if (!st || !st.els || !st.overlay || !st.overlay.upload_id) return;
        expandedDocId = docId;
        st.els.expandBtn.textContent = 'Collapse report';
        st.els.expandBtn.setAttribute('aria-expanded', 'true');
        renderReportInto(docId);
        st.els.expanded.hidden = false;
      }
      function collapseReport(docId) {
        var st = cardState[docId];
        if (st && st.els) {
          st.els.expanded.hidden = true;
          clear(st.els.expanded);
          st.els.expandBtn.textContent = 'Expand report';
          st.els.expandBtn.setAttribute('aria-expanded', 'false');
        }
        if (expandedDocId === docId) expandedDocId = null;
      }
      function renderReportInto(docId) {
        var st = cardState[docId];
        if (!st || !st.els) return;
        var host = st.els.expanded;
        clear(host);
        var findings = st.findings || [];
        var status = deriveStatus(st.overlay, findings);
        host.appendChild(buildStatusBlock(status));
        var gsoFindings = findings.filter(function (f) { return !!f.gso_cluster; });
        var riskFindings = findings.filter(function (f) { return !f.gso_cluster; });
        host.appendChild(buildMagnitude(findings));
        var packGen = packIsGenerated(st);
        sortBySeverity(riskFindings).forEach(function (f) { host.appendChild(buildFinding(f, packGen)); });
        if (gsoFindings.length) host.appendChild(buildGsoBand(gsoFindings));

        var foot = el('div', 'report-foot');
        var footBtn = el('button', 'btn-mini', 'Collapse report');
        footBtn.type = 'button';
        footBtn.setAttribute('aria-expanded', 'true');
        footBtn.addEventListener('click', function (ev) {
          ev.stopPropagation();
          toggleReport(docId);
          var cur = cardState[docId];
          if (cur && cur.els) {
            var headEl = cur.els.card.querySelector('.dcard-head');
            if (headEl) headEl.scrollIntoView({ block: 'start' });
            cur.els.expandBtn.focus();
          }
        });
        foot.appendChild(footBtn);
        host.appendChild(foot);
      }

      function buildStatusBlock(status) {
        var block = el('div', 'status-block');
        var ring = el('div', 'ring');
        var label = el('div', 'status-label');
        var sub = el('div', 'status-sub');
        if (status === 'red') {
          ring.style.borderColor = RING_HEX.red; ring.textContent = '!';
          label.textContent = 'Significant gaps identified';
          sub.textContent = 'Engine assessment — not solicitor-verified';
        } else if (status === 'amber') {
          ring.style.borderColor = RING_HEX.amber; ring.textContent = '◐';
          label.textContent = 'Ready for solicitor review';
          sub.textContent = 'Engine assessment — prepare a Solicitors Preparation Bundle to take this further';
        } else {
          ring.textContent = '·';
          label.textContent = 'Not yet checked';
          sub.textContent = 'No analysis on record for this document yet.';
        }
        var txt = el('div');
        txt.appendChild(label);
        if (sub.textContent) txt.appendChild(sub);
        block.appendChild(ring); block.appendChild(txt);
        return block;
      }

      var SEV_RANK = { critical: 0, major: 1, minor: 2, aligned: 3 };
      function sortBySeverity(arr) {
        return arr.slice().sort(function (a, b) {
          var ra = SEV_RANK[a.severity] != null ? SEV_RANK[a.severity] : 9;
          var rb = SEV_RANK[b.severity] != null ? SEV_RANK[b.severity] : 9;
          return ra - rb;
        });
      }
      function buildMagnitude(items) {
        var counts = { critical: 0, major: 0, minor: 0, aligned: 0 };
        items.forEach(function (f) { if (counts.hasOwnProperty(f.severity)) counts[f.severity]++; });
        var grid = el('div', 'magnitude');
        [['critical', 'Critical'], ['major', 'Major'], ['minor', 'Minor'], ['aligned', 'Aligned']].forEach(function (s) {
          var cell = el('div', 'mag-cell');
          cell.appendChild(el('span', 'mag-num', String(counts[s[0]])));
          cell.appendChild(el('span', 'mag-lbl', s[1]));
          grid.appendChild(cell);
        });
        return grid;
      }
      function buildFinding(f, packGenerated) {
        var box = el('div', 'finding');
        var head = el('div', 'finding-head');
        var sevKey = SEV_RANK[f.severity] != null ? f.severity : 'minor';
        head.appendChild(el('span', 'sev sev-' + sevKey, (f.severity || 'finding')));
        if (f.clause_category) head.appendChild(el('span', 'finding-cat', String(f.clause_category)));
        box.appendChild(head);

        var weights = normWeights(f.acei_weights);
        var resolved = weights.map(function (w) {
          var a = resolveAcei(w.key);
          return { weight: w.weight, hex: a ? a.hex : GSO_HEX, label: a ? a.label : String(w.key) };
        }).filter(function (w) { return w.weight > 0; });
        if (resolved.length) {
          var total = resolved.reduce(function (s, w) { return s + w.weight; }, 0) || 1;
          var bar = el('div', 'grad-bar');
          resolved.forEach(function (w) {
            var seg = el('span', 'grad-seg');
            seg.style.width = (w.weight / total * 100) + '%';
            seg.style.background = w.hex;
            seg.title = w.label + ' ' + Math.round(w.weight * 100) + '%';
            bar.appendChild(seg);
          });
          box.appendChild(bar);
          var chips = el('div', 'chips');
          resolved.forEach(function (w) {
            var chip = el('div', 'chip');
            var sw = el('span', 'swatch'); sw.style.background = w.hex;
            chip.appendChild(sw);
            chip.appendChild(el('span', null, w.label + ' ' + Math.round(w.weight * 100) + '%'));
            chips.appendChild(chip);
          });
          box.appendChild(chips);
        }

        if (f.finding_detail) box.appendChild(el('div', 'finding-detail', String(f.finding_detail)));
        if (f.statutory_ref) {
          var st = el('div', 'statutory');
          st.appendChild(el('span', 'lbl', 'Statutory basis: '));
          st.appendChild(document.createTextNode(String(f.statutory_ref)));
          box.appendChild(st);
        }
        if (f.severity && f.severity !== 'aligned' && f.severity !== 'compliant') {
          box.appendChild(el('div', 'solicitor-points', packGenerated
            ? 'Solicitor guidance for this finding is prepared in your Solicitors Preparation Bundle.'
            : 'Solicitor guidance for this finding is available in the Solicitors Preparation Bundle — prepare it from this document’s card.'));
        }
        return box;
      }
      function buildGsoBand(items) {
        var band = el('div', 'gso-band');
        band.appendChild(el('h3', null, 'Governance & statutory obligations'));
        band.appendChild(el('div', 'band-sub', 'Standing obligations — listed for completeness, not colour-risk-graded.'));
        sortBySeverity(items).forEach(function (f) {
          var it = el('div', 'gso-item');
          it.appendChild(el('span', 'gso-cluster', gsoMap.get(f.gso_cluster) || String(f.gso_cluster)));
          if (f.finding_detail) it.appendChild(el('div', 'finding-detail', String(f.finding_detail)));
          if (f.statutory_ref) {
            var st = el('div', 'statutory');
            st.appendChild(el('span', 'lbl', 'Statutory basis: '));
            st.appendChild(document.createTextNode(String(f.statutory_ref)));
            it.appendChild(st);
          }
          band.appendChild(it);
        });
        return band;
      }

      function triggerDownload(url, name) {
        var a = document.createElement('a');
        a.href = url; a.download = name || '';
        document.body.appendChild(a); a.click();
        setTimeout(function () { try { URL.revokeObjectURL(url); } catch (e) {} a.remove(); }, 1500);
      }
      function downloadPdf(uploadId, btn, msgEl) {
        var old = btn.textContent;
        btn.disabled = true; btn.textContent = 'Preparing…';
        if (msgEl) msgEl.hidden = true;
        authHeaders().then(function (h) {
          return fetch(FN + '/generate-vault-report-pdf', {
            method: 'POST', headers: h, body: JSON.stringify({ upload_id: uploadId })
          });
        })
          .then(function (r) {
            if (!r.ok) throw new Error('http ' + r.status);
            var name = 'Ailane_Vault_Exposure_Report.pdf';
            var cd = r.headers.get('Content-Disposition');
            if (cd) { var m = /filename\*?=(?:UTF-8'')?"?([^";]+)"?/i.exec(cd); if (m && m[1]) { try { name = decodeURIComponent(m[1]); } catch (e) { name = m[1]; } } }
            return r.blob().then(function (b) { return { blob: b, name: name }; });
          })
          .then(function (o) {
            triggerDownload(URL.createObjectURL(o.blob), o.name);
            btn.disabled = false; btn.textContent = old;
          })
          .catch(function () {
            btn.disabled = false; btn.textContent = old;
            if (msgEl) showMsg(msgEl, 'Could not prepare the PDF right now. Please try again.', 'err');
          });
      }

      // ===========================================================
      //  ③ Solicitors Preparation Bundle — per-document pane (brief §4).
      //  Session framing ("Included with your <pass>"); the per-document
      //  "Prepare Solicitors Preparation Bundle" control is the same as operational.
      //  The retired £15 is NOT rendered; the £19/£29 in-session buy-more
      //  lives in the session panel below (non-charging, pre-revenue).
      // ===========================================================
      function renderPackPane(doc) {
        var st = cardState[doc.id];
        if (!st || !st.els) return;
        var host = st.els.packBody;
        clear(host);

        if (!st.overlay || !st.overlay.upload_id) {
          host.appendChild(el('div', 'pane-note',
            'Run a check on this document first — the pack is prepared from its exposure findings.'));
          host.appendChild(el('div', 'pane-note', 'Included with your ' + productLabel(product) + '.'));
          return;
        }

        var pmsg = el('div', 'form-msg'); pmsg.hidden = true;
        if (packIsGenerated(st)) {
          host.appendChild(el('div', 'pack-generated-line', 'Generated ' + fmtDate(st.pack.created_at)));
          var openBtn = el('button', 'btn-primary', 'Open pack (PDF)'); openBtn.type = 'button';
          openBtn.addEventListener('click', function (ev) { ev.stopPropagation(); requestPack(doc, openBtn, pmsg); });
          host.appendChild(openBtn);
        } else {
          host.appendChild(el('div', 'pane-note', 'Included with your ' + productLabel(product) + '.'));
          var genBtn = el('button', 'btn-primary', 'Prepare Solicitors Preparation Bundle'); genBtn.type = 'button';
          genBtn.addEventListener('click', function (ev) { ev.stopPropagation(); requestPack(doc, genBtn, pmsg); });
          host.appendChild(genBtn);
        }
        host.appendChild(pmsg);
        host.appendChild(el('div', 'pane-note',
          'This is groundwork for instructing a solicitor, not legal advice.'));
      }

      function requestPack(doc, btn, pmsg) {
        var st = cardState[doc.id];
        if (!st) return;
        var old = btn.textContent;
        btn.disabled = true; btn.textContent = 'Preparing…'; pmsg.hidden = true;
        authHeaders().then(function (h) {
          return fetch(FN + '/generate-solicitor-pack', { method: 'POST', headers: h, body: JSON.stringify({ document_id: doc.id }) });
        })
          .then(function (r) {
            var ct = r.headers.get('Content-Type') || '';
            if (r.status === 200 && ct.indexOf('application/json') !== -1) {
              return r.json().then(function (d) {
                if (!d || !d.pdf_url) throw new Error('pack json');
                return fetch(d.pdf_url)
                  .then(function (fr) { if (!fr.ok) throw new Error('pack fetch ' + fr.status); return fr.blob(); })
                  .then(function (b) {
                    triggerDownload(URL.createObjectURL(b), 'Ailane_Solicitors_Preparation_Bundle.pdf');
                    btn.disabled = false; btn.textContent = old;
                    st.pack = { upload_id: (st.overlay && st.overlay.upload_id) || null,
                                created_at: d.generated_at || (st.pack && st.pack.created_at) || null };
                    renderPackPane(doc);
                  });
              });
            }
            if (r.status === 200) {
              var name = 'Ailane_Solicitors_Preparation_Bundle.pdf';
              var cd = r.headers.get('Content-Disposition');
              if (cd) { var m = /filename\*?=(?:UTF-8'')?"?([^";]+)"?/i.exec(cd); if (m && m[1]) { try { name = decodeURIComponent(m[1]); } catch (e) { name = m[1]; } } }
              return r.blob().then(function (b) {
                triggerDownload(URL.createObjectURL(b), name);
                st.pack = { upload_id: (st.overlay && st.overlay.upload_id) || null, created_at: new Date().toISOString() };
                renderPackPane(doc);
                if (expandedDocId === doc.id) renderReportInto(doc.id);
              });
            }
            if (r.status === 409) {
              btn.disabled = false; btn.textContent = old;
              showMsg(pmsg, 'Run a check on this document first.', 'err');
              return;
            }
            throw new Error('pack ' + r.status);
          })
          .catch(function () {
            btn.disabled = false; btn.textContent = old;
            showMsg(pmsg, 'Could not prepare the pack right now. Please try again.', 'err');
          });
      }

      // ===========================================================
      //  Add / Replace / Remove (kl_vault_documents, kl-document-vault
      //  storage). Point-in-time: no `monitored` flag is set (brief §2).
      // ===========================================================
      function uploadToStorage(file) {
        var path = uid + '/' + cryptoId() + '_' + safeName(file.name);
        return authHeaders({ 'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' })
          .then(function (h) {
            return fetch(REST + '/storage/v1/object/kl-document-vault/' + encodeURIComponent(path), {
              method: 'POST', headers: h, body: file
            });
          }).then(function (r) { if (!r.ok) throw new Error('storage ' + r.status); return path; });
      }

      // Build an Error that carries the bridge's actual status + structured body, and
      // surfaces its own `message` to the user (brief §3.1). The bridge returns e.g.
      // 403 {error:'check_limit_reached', message:…}, 400 {error:'pending', message:…},
      // 403 {message:'Document not found or access denied'} — `message` is the line we show.
      function bridgeError(status, body) {
        var e = new Error('bridge ' + status + (body && body.error ? (' ' + body.error) : ''));
        e.status = status;
        e.body = body;
        e.userMessage = (body && body.message) ? String(body.message) : '';
        return e;
      }
      // Persist the failure so it is diagnosable after the fact (brief §3.3).
      // analysis_status is a plain-text diagnostic column (verified — nothing gates
      // rendering on it). Best-effort: a failed PATCH here is only logged, never
      // masking the failure we are already surfacing.
      function markCheckFailed(documentId) {
        return authHeaders().then(function (h) {
          return fetch(RESTU + '/kl_vault_documents?id=eq.' + documentId, {
            method: 'PATCH', headers: h, body: JSON.stringify({ analysis_status: 'failed' })
          });
        }).then(function (r) {
          if (!r.ok) console.error('[kl-vault] could not persist analysis_status=failed', { document_id: documentId, status: r.status });
        }).catch(function (e) {
          console.error('[kl-vault] markCheckFailed error', { document_id: documentId, error: String((e && e.message) || e) });
        });
      }
      // Turn a check failure into a user-facing line (brief §3.4 / RULE 15): say plainly
      // that the check did not complete and the document was saved; surface the bridge's
      // own message when present (it is the actionable part — limit reached, access
      // denied, still pending). No banned product language; no promise of a retry
      // control that does not exist.
      function checkFailMessage(err) {
        var saved = 'Your document has been saved to your vault.';
        var m = err && err.userMessage;
        if (m && typeof m === 'string' && m.trim()) {
          return 'The compliance check didn’t complete: ' + m.trim() + ' ' + saved;
        }
        return 'The compliance check didn’t complete. ' + saved;
      }

      // Fix 1 (brief §3) — the check pipeline, now (a) authenticated PER REQUEST via
      // authHeaders() so a refreshed JWT is never stale at the verify_jwt gateway, and
      // (b) NON-SILENT: every failure is logged (console.error), carries the bridge's
      // status + message, and REJECTS rather than resolving null. The saved document is
      // preserved by the CALLER (doUpload), not by swallowing the error here.
      // Pipeline: kl_document_extract → kl-compliance-bridge {action:'start'} → poll.
      function runBridge(documentId, type) {
        // Step 1 — extraction. Authenticated; a failure here is LOGGED but not fatal on
        // its own — the bridge validates extraction server-side and is the arbiter.
        return authHeaders().then(function (h) {
          return fetch(FN + '/kl_document_extract', {
            method: 'POST', headers: h, body: JSON.stringify({ document_id: documentId })
          }).then(function (r) {
            if (!r.ok) {
              return r.text().catch(function () { return ''; }).then(function (b) {
                console.error('[kl-vault] extract failed', { endpoint: '/kl_document_extract', document_id: documentId, status: r.status, body: b });
              });
            }
          });
        }).catch(function (e) {
          if (isNoSession(e)) throw e; // no live session — never proceed unauthenticated
          console.error('[kl-vault] extract request error', { endpoint: '/kl_document_extract', document_id: documentId, error: String((e && e.message) || e) });
          // swallow transient extract errors — the bridge reports if extraction is missing
        }).then(function () {
          return authHeaders();
        }).then(function (h) {
          // Step 2 — start the check. A non-2xx (or missing upload_id) is a REAL failure:
          // logged, and thrown with the bridge's own message for the user (brief §3).
          return fetch(FN + '/kl-compliance-bridge', {
            method: 'POST', headers: h,
            body: JSON.stringify({ document_id: documentId, document_type: type, action: 'start' })
          }).then(function (r) {
            return r.json().catch(function () { return {}; }).then(function (d) {
              if (r.status < 200 || r.status >= 300 || !(d && d.upload_id)) {
                console.error('[kl-vault] bridge start failed', { endpoint: '/kl-compliance-bridge', document_id: documentId, status: r.status, body: d });
                throw bridgeError(r.status, d);
              }
              return d.upload_id;
            });
          });
        }).then(function (uploadId) {
          // Step 3 — poll to completion (authenticated per tick, non-silent).
          return pollBridge(documentId, uploadId, 0);
        });
      }
      function pollBridge(documentId, uploadId, n) {
        if (n >= 36) { // ~3 min ceiling — surface it rather than giving up in silence.
          console.error('[kl-vault] bridge poll timed out', { endpoint: '/kl-compliance-bridge', document_id: documentId, upload_id: uploadId, polls: n });
          var te = new Error('poll timeout'); te.userMessage = 'The check is taking longer than expected.';
          return Promise.reject(te);
        }
        return new Promise(function (resolve) { setTimeout(resolve, 5000); })
          .then(function () { return authHeaders(); })
          .then(function (h) {
            return fetch(FN + '/kl-compliance-bridge', {
              method: 'POST', headers: h,
              body: JSON.stringify({ document_id: documentId, upload_id: uploadId, action: 'poll' })
            }).then(function (r) {
              return r.json().catch(function () { return {}; }).then(function (d) {
                if (r.status < 200 || r.status >= 300) {
                  console.error('[kl-vault] bridge poll failed', { endpoint: '/kl-compliance-bridge', document_id: documentId, status: r.status, body: d });
                  throw bridgeError(r.status, d);
                }
                if (d && d.status === 'processing') return pollBridge(documentId, uploadId, n + 1);
                if (d && (d.status === 'failed' || d.status === 'error')) {
                  console.error('[kl-vault] bridge reported check failure', { endpoint: '/kl-compliance-bridge', document_id: documentId, body: d });
                  throw bridgeError(r.status, d);
                }
                return d; // terminal: the check reported a result
              });
            });
          })
          .catch(function (e) {
            // A no-session, an already-logged bridge error, or the poll timeout must
            // propagate (not retry, not fall through). Only genuine transient network
            // errors are retried — and even those are logged, never silent.
            if (isNoSession(e) || (e && e.status != null) || (e && e.message === 'poll timeout')) throw e;
            console.error('[kl-vault] bridge poll request error', { endpoint: '/kl-compliance-bridge', document_id: documentId, poll: n, error: String((e && e.message) || e) });
            return pollBridge(documentId, uploadId, n + 1);
          });
      }

      function setSlotStatus(work, m) {
        var s = work.querySelector('.slot-status');
        if (!m) { if (s) s.remove(); return; }
        work.style.display = 'block';
        if (!s) { s = el('div', 'slot-status'); work.appendChild(s); }
        clear(s);
        s.appendChild(el('span', 'mini-spinner'));
        s.appendChild(document.createTextNode(m));
      }

      // Empty-slot type chooser (brief §3) — 3 options, default designation pre-selected.
      // Ported from operational/documents openChooser; classes/markup reused verbatim.
      function openChooser(card, idx, defaultType) {
        var emptyBody = card.querySelector('.slot-empty-body');
        var work = card.querySelector('.slot-work');
        if (emptyBody) emptyBody.style.display = 'none';
        clear(work); work.style.display = 'block';

        work.appendChild(el('div', 'chooser-title', 'What kind of document is this?'));
        var opts = el('div', 'chooser-opts');
        var chosen = { type: defaultType };
        var btns = [];
        TYPE_OPTIONS.forEach(function (o) {
          var b = el('button', 'chooser-opt' + (o[0] === defaultType ? ' sel' : ''), o[1]); b.type = 'button';
          b.addEventListener('click', function (e) {
            e.stopPropagation(); chosen.type = o[0];
            btns.forEach(function (x) { x.classList.remove('sel'); });
            b.classList.add('sel');
          });
          btns.push(b); opts.appendChild(b);
        });
        work.appendChild(opts);
        work.appendChild(el('div', 'slot-hint', 'This sets which UK requirement set we check the document against.'));

        var row = el('div', 'work-actions');
        var confirm = el('button', 'btn-primary', 'Confirm'); confirm.type = 'button';
        confirm.addEventListener('click', function (e) { e.stopPropagation(); openUpload(card, chosen.type); });
        var cancel = el('button', 'btn-secondary', 'Cancel'); cancel.type = 'button';
        cancel.addEventListener('click', function (e) { e.stopPropagation(); renderSlots(); });
        row.appendChild(confirm); row.appendChild(cancel);
        work.appendChild(row);
      }

      function openUpload(card, type) {
        var work = card.querySelector('.slot-work');
        var emptyBody = card.querySelector('.slot-empty-body');
        if (emptyBody) emptyBody.style.display = 'none';
        clear(work); work.style.display = 'block';
        work.appendChild(el('div', 'chooser-title', slotTypeLabel(type) + ' — choose a file'));
        work.appendChild(el('div', 'slot-hint', 'Upload the document you want to run a Contract Compliance Check on. PDF or Word (.docx), up to 10 MB.'));
        var input = el('input'); input.type = 'file'; input.accept = '.pdf,.docx'; input.className = 'file-input';
        work.appendChild(input);
        var msgEl = el('div', 'form-msg'); msgEl.hidden = true;
        var row = el('div', 'work-actions');
        var go = el('button', 'btn-primary', 'Add document'); go.type = 'button';
        var cancel = el('button', 'btn-secondary', 'Cancel'); cancel.type = 'button';
        go.addEventListener('click', function (e) {
          e.stopPropagation();
          var f = input.files && input.files[0];
          var v = validateFile(f);
          if (!v.ok) { showMsg(msgEl, v.error, 'err'); return; }
          doUpload(work, type, f, go, cancel, msgEl);
        });
        cancel.addEventListener('click', function (e) { e.stopPropagation(); renderSlots(); });
        row.appendChild(go); row.appendChild(cancel);
        work.appendChild(row); work.appendChild(msgEl);
      }

      function doUpload(work, type, file, goBtn, cancelBtn, msgEl) {
        goBtn.disabled = true; cancelBtn.disabled = true; msgEl.hidden = true;
        setSlotStatus(work, 'Uploading…');
        uploadToStorage(file)
          .then(function (path) {
            setSlotStatus(work, 'Saving to your vault…');
            var body = {
              user_id: uid, filename: file.name, storage_path: path,
              file_size_bytes: file.size, mime_type: file.type || 'application/octet-stream'
            };
            return authHeaders({ 'Prefer': 'return=representation' }).then(function (h) {
              return fetch(RESTU + '/kl_vault_documents', {
                method: 'POST', headers: h, body: JSON.stringify(body)
              });
            }).then(function (r) {
              if (r.status < 200 || r.status >= 300) throw new Error('insert ' + r.status);
              return r.json();
            });
          })
          .then(function (rep) {
            // The document is now SAVED. Run the check — but a failure must be SURFACED
            // (brief §3), not swallowed, while the saved document is KEPT (brief §1.5).
            // runBridge REJECTS on a real failure carrying the bridge's message; on
            // success it resolves and we re-render so the Exposure Report card paints.
            var id = rep && rep[0] && rep[0].id;
            if (!id) throw new Error('no id');
            storeType(id, type);
            setSlotStatus(work, 'Running the Contract Compliance Check…');
            return runBridge(id, type).then(function () {
              setSlotStatus(work, '');
              return loadDocs();
            }, function (err) {
              // Check FAILED. Log it, persist analysis_status=failed, and tell the user —
              // but keep the saved document. We deliberately do NOT re-render on this path
              // (that would wipe the message); the saved document appears as a card on the
              // next load. Block a duplicate re-add, and let Cancel/Close reveal the card.
              console.error('[kl-vault] compliance check did not complete', {
                document_id: id, status: err && err.status, body: err && err.body,
                error: String((err && err.message) || err)
              });
              return markCheckFailed(id).then(function () {
                setSlotStatus(work, '');
                // Document is already saved — block a duplicate re-add.
                goBtn.disabled = true; goBtn.textContent = 'Check didn’t complete';
                // Replace Cancel with a clean "Close" that reloads the list so the saved
                // document shows as a card (the original handler's renderSlots() would use
                // a stale docs array that predates this upload).
                var closeBtn = cancelBtn.cloneNode(true);
                closeBtn.disabled = false; closeBtn.textContent = 'Close';
                if (cancelBtn.parentNode) cancelBtn.parentNode.replaceChild(closeBtn, cancelBtn);
                closeBtn.addEventListener('click', function (ev) { ev.stopPropagation(); loadDocs(); });
                showMsg(msgEl, isNoSession(err)
                  ? 'Your session has ended. Please sign in again.'
                  : checkFailMessage(err), 'err');
              });
            });
          })
          .catch(function (e) {
            // Upload / insert failure — the document was NOT saved. Surface it (now logged
            // too, not silent) and let the user retry adding it.
            console.error('[kl-vault] add-document failed before check', { error: String((e && e.message) || e) });
            setSlotStatus(work, '');
            goBtn.disabled = false; cancelBtn.disabled = false;
            showMsg(msgEl, 'Could not add this document right now. Please try again.', 'err');
          });
      }

      // Replace — swap the document in place (no monthly gate; KL is point-in-time).
      function openReplace(doc, card) {
        var work = card.querySelector('.slot-work');
        clear(work); work.style.display = 'block';
        work.appendChild(el('div', 'chooser-title', 'Replace this document'));
        work.appendChild(el('div', 'slot-hint', 'Upload the new version below. It replaces the document checked in this slot.'));
        var input = el('input'); input.type = 'file'; input.accept = '.pdf,.docx'; input.className = 'file-input';
        work.appendChild(input);
        var msgEl = el('div', 'form-msg'); msgEl.hidden = true;
        var row = el('div', 'work-actions');
        var go = el('button', 'btn-primary', 'Replace document'); go.type = 'button';
        var cancel = el('button', 'btn-secondary', 'Cancel'); cancel.type = 'button';
        go.addEventListener('click', function (e) {
          e.stopPropagation();
          var f = input.files && input.files[0];
          var v = validateFile(f);
          if (!v.ok) { showMsg(msgEl, v.error, 'err'); return; }
          doReplace(doc, work, f, go, cancel, msgEl);
        });
        cancel.addEventListener('click', function (e) { e.stopPropagation(); work.style.display = 'none'; clear(work); });
        row.appendChild(go); row.appendChild(cancel);
        work.appendChild(row); work.appendChild(msgEl);
      }
      function doReplace(doc, work, file, goBtn, cancelBtn, msgEl) {
        goBtn.disabled = true; cancelBtn.disabled = true; msgEl.hidden = true;
        setSlotStatus(work, 'Uploading the new version…');
        uploadToStorage(file)
          .then(function (path) {
            setSlotStatus(work, 'Updating your vault…');
            var body = {
              filename: file.name, storage_path: path,
              file_size_bytes: file.size, mime_type: file.type || 'application/octet-stream',
              last_replaced_at: new Date().toISOString()
            };
            return authHeaders().then(function (h) {
              return fetch(RESTU + '/kl_vault_documents?id=eq.' + doc.id, {
                method: 'PATCH', headers: h, body: JSON.stringify(body)
              });
            }).then(function (r) {
              if (r.status < 200 || r.status >= 300) throw new Error('patch ' + r.status);
              return true;
            });
          })
          .then(function () { return loadDocs(); })
          .catch(function () {
            setSlotStatus(work, '');
            goBtn.disabled = false; cancelBtn.disabled = false;
            showMsg(msgEl, 'Could not replace this document right now. Please try again.', 'err');
          });
      }

      // Remove — soft delete (frees the document from the session).
      function confirmRemove(doc) {
        if (!window.confirm('Remove this document from your session?')) return;
        authHeaders().then(function (h) {
          return fetch(RESTU + '/kl_vault_documents?id=eq.' + doc.id, {
            method: 'PATCH', headers: h, body: JSON.stringify({ deleted_at: new Date().toISOString() })
          });
        }).then(function (r) {
          if (r.status < 200 || r.status >= 300) throw new Error('remove ' + r.status);
          if (cardState[doc.id]) delete cardState[doc.id];
          clearType(doc.id);
          return loadDocs();
        }).catch(function () { window.alert('Could not remove this document right now. Please try again.'); });
      }

      // ===========================================================
      //  Delivered reports (brief §1) — the Exposure Report + Solicitors
      //  Preparation Bundle PDFs that the delivery loop (send-report-email)
      //  persisted to the private kl-reports bucket + kl_report_history.
      //  Read owner-scoped with the RULE 2 raw fetch (Bearer user JWT + apikey);
      //  downloads REUSE the kl-document-vault storage pattern (§0a) against the
      //  kl-reports bucket, whose read policy scopes to auth.uid()::text.
      // ===========================================================
      function buildDeliveredReports() {
        var wrap = document.createElement('div');
        wrap.appendChild(el('h2', 'section-head spaced', 'Delivered reports'));
        var pane = el('section', 'pane');
        pane.setAttribute('aria-label', 'Delivered reports');
        pane.id = 'vault-delivered';
        pane.appendChild(loadingBox('Loading your delivered reports…'));
        wrap.appendChild(pane);
        loadDeliveredReports(pane);
        return wrap;
      }

      function reportKind(row) {
        var sp = row.storage_path || '';
        if (sp.indexOf('Exposure_Report') !== -1) return 'exposure';
        if (sp.indexOf('Solicitors_Preparation_Bundle') !== -1) return 'bundle';
        return null;
      }

      function loadDeliveredReports(pane) {
        getJson('/kl_report_history?user_id=eq.' + uid +
                '&report_type=eq.compliance_report&generation_status=eq.complete' +
                '&order=created_at.desc' +
                '&select=id,storage_path,emailed_at,expires_at,created_at,session_id')
          .then(function (rows) {
            clear(pane);
            if (!rows || !rows.length) {
              // Zero rows → the panel's empty state (brief §1).
              pane.appendChild(el('p', 'pane-note',
                'No delivered reports yet. Run a Contract Compliance Check and your Exposure Report and Solicitors Preparation Bundle are delivered by email and kept here.'));
              return;
            }
            // Rows arrive in delivery pairs sharing an emailed_at (one Exposure_Report,
            // one Solicitors_Preparation_Bundle). Group by emailed_at; keep newest first.
            var groups = {};
            var order = [];
            rows.forEach(function (row) {
              var key = row.emailed_at || ('row-' + row.id);
              if (!groups[key]) { groups[key] = { when: row.emailed_at || row.created_at, rows: [] }; order.push(key); }
              groups[key].rows.push(row);
            });
            order.forEach(function (key) { pane.appendChild(renderDeliveredEntry(groups[key])); });
          })
          .catch(function () {
            clear(pane);
            pane.appendChild(el('p', 'pane-note',
              'Could not load your delivered reports right now. Please refresh to try again.'));
          });
      }

      function reportLabel(kind) {
        if (kind === 'exposure') return 'Exposure Report (PDF)';
        if (kind === 'bundle') return 'Solicitors Preparation Bundle (PDF)';
        return 'Delivered report';
      }
      function renderDeliveredEntry(group) {
        var entry = el('div', 'delivered-entry');
        entry.appendChild(el('div', 'delivered-date',
          group.when ? ('Delivered ' + fmtDate(group.when)) : 'Delivered'));

        var actions = el('div', 'delivered-actions');
        // Order the pair deterministically — Exposure Report, then Solicitors
        // Preparation Bundle, then anything unclassified. Every row is rendered
        // (never hidden, brief §1): a persisted PDF (storage_path set) becomes a
        // download button; a null storage_path shows "Delivered by email".
        var RANK = { exposure: 0, bundle: 1 };
        var rows = group.rows.slice().sort(function (a, b) {
          var ra = RANK[reportKind(a)], rb = RANK[reportKind(b)];
          return (ra == null ? 2 : ra) - (rb == null ? 2 : rb);
        });
        rows.forEach(function (row) {
          var label = reportLabel(reportKind(row));
          if (row.storage_path) {
            var btn = el('button', 'btn-primary', label); btn.type = 'button';
            btn.addEventListener('click', function (ev) {
              ev.stopPropagation(); downloadDeliveredReport(row.storage_path, btn);
            });
            actions.appendChild(btn);
          } else {
            actions.appendChild(el('span', 'delivered-emailed', label + ' — Delivered by email'));
          }
        });
        entry.appendChild(actions);

        // Availability line (brief §4) — beneath the download buttons.
        entry.appendChild(el('div', 'delivered-availability',
          'Delivered by email and kept in your document vault for 90 days.'));
        return entry;
      }

      function downloadDeliveredReport(storagePath, btn) {
        var old = btn.textContent;
        btn.disabled = true; btn.textContent = 'Preparing…';
        authHeaders().then(function (h) {
          return fetch(REST + '/storage/v1/object/kl-reports/' + encodeURIComponent(storagePath), { headers: h });
        })
          .then(function (r) { if (!r.ok) throw new Error('storage ' + r.status); return r.blob(); })
          .then(function (b) {
            var name = (storagePath.split('/').pop()) || 'Ailane_Report.pdf';
            triggerDownload(URL.createObjectURL(b), name);
            btn.disabled = false; btn.textContent = old;
          })
          .catch(function () {
            btn.disabled = false; btn.textContent = old;
          });
      }

      // ===========================================================
      //  Solicitors Preparation Bundle — session buy-more panel (brief §4).
      //  Session framing + the £19 / £29 in-session buy-more. The retired
      //  £15 is not rendered. Each option starts a real Checkout Session via
      //  create-checkout (kl_check_addon £19 / kl_check_addon_bundle £29),
      //  passing the signed-in user's email so the webhook credits the right
      //  KL session. Both products stay dark (is_active=false) until the
      //  Director's go-live flip — until then create-checkout returns 404 and
      //  the inline error shows (expected pre-go-live behaviour, not a bug).
      // ===========================================================
      function buildPackBuyMore() {
        var wrap = document.createElement('div');
        wrap.appendChild(el('h2', 'section-head spaced', 'Solicitors Preparation Bundle'));
        var pane = el('section', 'pane');
        pane.setAttribute('aria-label', 'Solicitors Preparation Bundle');

        pane.appendChild(el('p', 'pack-lead',
          'The guidance layer — your findings converted into a prioritised review agenda for your solicitor. Prepare one from any checked document’s card above.'));
        pane.appendChild(el('span', 'pack-included', 'Included with your ' + productLabel(product)));

        pane.appendChild(el('div', 'upsell-sub',
          'Your bundled Contract Compliance Checks are used first. Once they’re used, you can add more within your active session:'));

        var l1 = el('div', 'upsell-line');
        l1.appendChild(el('span', 'upsell-price', '£19'));
        l1.appendChild(el('span', 'upsell-desc', 'One additional Contract Compliance Check — Exposure Report.'));
        pane.appendChild(l1);
        var l2 = el('div', 'upsell-line');
        l2.appendChild(el('span', 'upsell-price', '£29'));
        var d2 = el('span', 'upsell-desc');
        d2.appendChild(document.createTextNode('One additional check '));
        var strong = el('strong', null, 'plus'); strong.style.color = 'var(--text-body, #e2e8f0)';
        d2.appendChild(strong);
        d2.appendChild(document.createTextNode(' a Solicitors Preparation Bundle.'));
        l2.appendChild(d2);
        pane.appendChild(l2);

        // Buy-more actions (brief §1) — two options, each starting a real Checkout
        // Session via create-checkout with its product_type + the signed-in user's
        // email (Content-Type only, mirroring the anonymous create-checkout contract —
        // no apikey/Authorization). The webhook credits the buyer's active KL session
        // by email hash, so the email is required for the credit to land correctly.
        var actions = el('div', 'pack-actions');
        var buyRow = el('div');
        buyRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px;align-items:center;';
        var buyErr = el('div', 'form-msg'); buyErr.hidden = true; buyErr.setAttribute('role', 'alert');
        var addOne = el('button', 'btn-primary', 'Coming soon'); addOne.type = 'button';
        addOne.setAttribute('aria-disabled', 'true'); addOne.setAttribute('data-payments-offline', '1'); addOne.setAttribute('data-po-action', "startCheckAddon('kl_check_addon')");
        var addBundle = el('button', 'btn-primary', 'Coming soon'); addBundle.type = 'button';
        addBundle.setAttribute('aria-disabled', 'true'); addBundle.setAttribute('data-payments-offline', '1'); addBundle.setAttribute('data-po-action', "startCheckAddon('kl_check_addon_bundle')");

        function startCheckAddon(productType) {
          var email = '';
          try { email = JSON.parse(atob(token.split('.')[1])).email || ''; } catch (e) {}
          if (window.gtag) window.gtag('event', 'begin_checkout', { item_id: productType });
          addOne.disabled = true; addBundle.disabled = true; buyErr.hidden = true;
          fetch(FN + '/create-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_type: productType, email: email })
          })
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d && d.url) { window.location.href = d.url; return; }
              throw new Error((d && d.error) || 'no url');
            })
            .catch(function () {
              addOne.disabled = false; addBundle.disabled = false;
              showMsg(buyErr, 'Checkout is temporarily unavailable — please try again in a moment.', 'err');
            });
        }

        // PAYMENTS-OFFLINE-001: checkout bindings removed — buttons show "Coming soon" (data-po-action preserves the original action). Restored by git revert.
        buyRow.appendChild(addOne); buyRow.appendChild(addBundle);
        actions.appendChild(buyRow); actions.appendChild(buyErr);
        pane.appendChild(actions);

        wrap.appendChild(pane);
        return wrap;
      }

      // ===========================================================
      //  Notes — writes into kl_workspace_notes (KEEP, brief §2).
      // ===========================================================
      function renderNotes() {
        var host = document.getElementById('vault-notes');
        if (!host) return;
        clear(host);
        host.appendChild(el('p', 'notif-intro',
          'Jot a note about your documents. Notes you save here appear in your Knowledge Library Notes.'));

        var ta = el('textarea', 'notes-area'); ta.setAttribute('rows', '4');
        ta.placeholder = 'A note for your Knowledge Library Vault…';
        host.appendChild(ta);
        var saveBtn = el('button', 'btn-primary', 'Save note'); saveBtn.type = 'button';
        host.appendChild(saveBtn);
        var nmsg = el('div', 'form-msg'); nmsg.hidden = true;
        host.appendChild(nmsg);
        var recent = el('div', 'notes-recent');
        host.appendChild(recent);
        loadRecentNotes(recent);

        saveBtn.addEventListener('click', function () {
          var content = ta.value.trim();
          if (!content) { showMsg(nmsg, 'Please write something first.', 'err'); return; }
          saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; nmsg.hidden = true;
          authHeaders({ 'Prefer': 'return=representation' }).then(function (h) {
            return fetch(RESTU + '/kl_workspace_notes', {
              method: 'POST', headers: h,
              body: JSON.stringify({ user_id: uid, title: 'Knowledge Library Vault — note',
                                     content_plain: content, note_type: 'note', source_attribution: 'Knowledge Library Vault' })
            });
          })
            .then(function (r) { if (r.status < 200 || r.status >= 300) throw new Error('note ' + r.status); return true; })
            .then(function () {
              saveBtn.disabled = false; saveBtn.textContent = 'Save note';
              ta.value = '';
              showMsg(nmsg, 'Saved to your Notes.', 'ok');
              loadRecentNotes(recent);
            })
            .catch(function () {
              saveBtn.disabled = false; saveBtn.textContent = 'Save note';
              showMsg(nmsg, 'Could not save your note right now. Please try again.', 'err');
            });
        });
      }
      function loadRecentNotes(host) {
        clear(host);
        getJson('/kl_workspace_notes?user_id=eq.' + uid + '&source_attribution=eq.Knowledge%20Library%20Vault' +
                '&select=id,title,content_plain,updated_at&order=updated_at.desc&limit=5')
          .then(function (rows) {
            if (!rows || !rows.length) return;
            host.appendChild(el('div', 'notes-recent-head', 'Recent vault notes'));
            rows.forEach(function (n) {
              var item = el('div', 'note-item');
              item.appendChild(el('div', 'note-title', n.title || 'Note'));
              if (n.content_plain) item.appendChild(el('div', 'note-body', String(n.content_plain)));
              host.appendChild(item);
            });
          })
          .catch(function () { /* read-back is optional */ });
      }
    };
  })();
  </script>
