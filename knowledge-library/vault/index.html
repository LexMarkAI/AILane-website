  <script>

    function fail() { if (settled) return; settled = true; window.location.replace('/kl-access/'); }

    // Poll for the Supabase CDN to load.

      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      sb.auth.getSession().then(function (gs) {
        if (gs && gs.data && gs.data.session) { verify(gs.data.session); return; }
        // Fallback: session may still be hydrating — listen with a 6s timeout.

  <!-- APP — vanilla JS, no build step. All server text is treated as data (textContent / safe DOM). -->
  <script>
  (function () {
    function el(tag, cls, text) {
      var n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text;
      return n;
    }
    function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function fmtDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.getUTCDate() + ' ' + MONTHS[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
    }
    function safeName(name) {
      return String(name || 'document').replace(/[^a-zA-Z0-9._-]+/g, '_').slice(0, 120) || 'document';
    }
    function cryptoId() {
      try { if (window.crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {}
      return 'id-' + new Date().getTime() + '-' + (window.performance ? Math.floor(performance.now()) : 0);
    }
    function validateFile(f) {
      if (!f) return { ok: false, error: 'Choose a PDF or Word (.docx) file first.' };
      var okType = /\.pdf$|\.docx$/i.test(f.name || '');
      if (!okType) return { ok: false, error: 'Upload a PDF or Word (.docx) document.' };
      if (f.size > 10 * 1024 * 1024) return { ok: false, error: 'That file is over 10 MB. Please upload a smaller document.' };
      return { ok: true };
    }

    var PRODUCT_LABEL = {
      kl_quick_session: 'Quick Session',
      kl_day_pass: 'Day Pass',
      kl_research_week: 'Research Week'
    };
    function productLabel(p) {
      if (!p) return 'Knowledge Library';
      if (PRODUCT_LABEL[p]) return PRODUCT_LABEL[p];
      return String(p).replace(/^kl[_-]/, '').replace(/[_-]+/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    // ---- No active session empty state (brief §2 gate: link to /kl-access/) ----
    window.renderNoSession = function () {
      var root = document.getElementById('vault-root');
      if (!root) return;
      clear(root);
      var box = el('div', 'empty-state');
      box.appendChild(el('h1', null, 'No active Knowledge Library session'));
      box.appendChild(el('p', null,
        'You don’t have an active Knowledge Library session right now. Start a session to open your vault, add documents for a Contract Compliance Check, and prepare a Solicitor Preparation Pack.'));
      var cta = el('a', 'btn-primary', 'Go to Knowledge Library access');
      cta.href = '/kl-access/';
      box.appendChild(cta);
      root.appendChild(box);
    };

    // ---- Populated vault ----
    window.initKLVault = function (token, ANON, uid, REST, ent) {
      var RESTU = REST + '/rest/v1';
      var H = { 'apikey': ANON, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

      var badgeEl = document.getElementById('product-badge');
      var countEl = document.getElementById('credit-counter');
      badgeEl.textContent = productLabel(ent.product_type);
      badgeEl.hidden = false;
      var used = (typeof ent.checks_used === 'number') ? ent.checks_used : 0;
      var allowed = (typeof ent.checks_allowed === 'number') ? ent.checks_allowed : 0;
      countEl.textContent = 'Checks used: ' + used + ' of ' + allowed + ' this session';
      countEl.hidden = false;

      var root = document.getElementById('vault-root');
      clear(root);

      // Standing disclaimer (regulatory intelligence — not legal advice).
      var disc = el('div', 'disclaimer-banner');
      disc.setAttribute('role', 'note');
      var dstrong = el('strong', null, 'This is regulatory intelligence to support your decisions — not legal advice. ');
      disc.appendChild(dstrong);
      disc.appendChild(document.createTextNode(
        'It is not a complete record of all applicable law, and the absence of an item here is not assurance that nothing has changed. For advice on your own situation, consult a qualified professional.'));
      root.appendChild(disc);

      // Documents section.
      root.appendChild(el('h2', 'section-head', 'Documents for this session'));
      var listEl = el('section', null); listEl.id = 'vault-cards';
      listEl.setAttribute('aria-label', 'Documents');
      listEl.appendChild(loadingRow('Loading your documents…'));
      root.appendChild(listEl);

      // Solicitor Preparation Pack section (session-scoped).
      root.appendChild(buildPackPane(ent));

      loadDocs();

      function loadingRow(m) {
        var box = el('div', 'state-msg');
        box.appendChild(el('div', 'spinner'));
        box.appendChild(document.createTextNode(m));
        return box;
      }
      function getJson(path) {
        return fetch(RESTU + path, { headers: H })
          .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); });
      }

      // KL documents are point-in-time (not monitored): read the session's non-deleted
      // documents. The write-side document model / check execution is owned by the KL
      // fulfilment flow — this vault manages which documents the session's checks apply to.
      function loadDocs() {
        return getJson('/kl_vault_documents?user_id=eq.' + uid + '&deleted_at=is.null' +
                '&select=id,filename,mime_type,file_size_bytes,analysis_status,created_at,last_replaced_at' +
                '&order=created_at.asc')
          .then(function (rows) { docs = rows || []; renderDocs(); })
          .catch(function () {
            clear(listEl);
            listEl.appendChild(el('div', 'state-msg', "Couldn’t load your documents right now. Please refresh."));
          });
      }

      function renderDocs() {
        clear(listEl);
        docs.forEach(function (doc) { listEl.appendChild(buildDocCard(doc)); });
        listEl.appendChild(buildAddCard());
      }

      function buildDocCard(doc) {
        var card = el('div', 'dcard');
        card.setAttribute('data-doc-id', doc.id);

        var head = el('div', 'dcard-head');
        head.appendChild(el('span', 'slot-type-tag', 'Contract Compliance Check'));
        head.appendChild(el('span', 'dcard-filename', doc.filename || 'Untitled document'));
        head.appendChild(el('span', 'dcard-head-spacer'));
        card.appendChild(head);

        var bodyEl = el('div', 'dcard-body');
        var metaBits = ['Added ' + fmtDate(doc.created_at)];
        if (doc.last_replaced_at) metaBits.push('Replaced ' + fmtDate(doc.last_replaced_at));
        if (doc.analysis_status) metaBits.push(String(doc.analysis_status));
        bodyEl.appendChild(el('div', 'slot-meta', metaBits.join(' · ')));

        // Replace / Remove — KEPT as-is (brief §2): swap which document is checked in the session.
        var actions = el('div', 'slot-actions');
        var rep = el('button', 'btn-mini', 'Replace'); rep.type = 'button';
        rep.addEventListener('click', function () { openReplace(doc, card); });
        var rem = el('button', 'btn-mini danger', 'Remove'); rem.type = 'button';
        rem.addEventListener('click', function () { confirmRemove(doc); });
        actions.appendChild(rep); actions.appendChild(rem);
        bodyEl.appendChild(actions);

        var work = el('div', 'slot-work'); work.style.display = 'none';
        bodyEl.appendChild(work);
        card.appendChild(bodyEl);
        return card;
      }

      function buildAddCard() {
        var card = el('div', 'dcard empty');
        var bodyEl = el('div', 'dcard-body');
        bodyEl.appendChild(el('div', 'slot-empty-plus', '+'));
        bodyEl.appendChild(el('div', 'slot-empty-label', 'Add a document to check'));
        bodyEl.appendChild(el('div', 'slot-empty-hint', 'PDF or Word (.docx), up to 10 MB.'));
        var work = el('div', 'slot-work'); work.style.display = 'none';
        bodyEl.appendChild(work);
        card.appendChild(bodyEl);
        bodyEl.addEventListener('click', function () {
          if (work.style.display === 'block') return;
          openUpload(card, work);
        });
        return card;
      }

      // ---- Storage upload → kl-document-vault (private). Path: <uid>/<uuid>_<safeName>. ----
      function uploadToStorage(file) {
        var path = uid + '/' + cryptoId() + '_' + safeName(file.name);
        return fetch(REST + '/storage/v1/object/kl-document-vault/' + encodeURIComponent(path), {
          method: 'POST',
          headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + token,
                     'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
          body: file
        }).then(function (r) { if (!r.ok) throw new Error('storage ' + r.status); return path; });
      }

      function openUpload(card, work) {
        clear(work); work.style.display = 'block';
        work.appendChild(el('div', 'chooser-title', 'Add a document'));
        work.appendChild(el('div', 'slot-hint', 'Upload the contract, policy or handbook you want to run a Contract Compliance Check on.'));
        var input = el('input'); input.type = 'file'; input.accept = '.pdf,.docx'; input.className = 'file-input';
        work.appendChild(input);
        var msgEl = el('div', 'form-msg'); msgEl.hidden = true;
        var row = el('div', 'work-actions');
        var go = el('button', 'btn-primary', 'Add document'); go.type = 'button';
        var cancel = el('button', 'btn-secondary', 'Cancel'); cancel.type = 'button';
        go.addEventListener('click', function () {
          var f = input.files && input.files[0];
          var v = validateFile(f);
          if (!v.ok) { showMsg(msgEl, v.error, 'err'); return; }
          doUpload(work, f, go, cancel, msgEl);
        });
        cancel.addEventListener('click', function () { work.style.display = 'none'; clear(work); });
        row.appendChild(go); row.appendChild(cancel);
        work.appendChild(row); work.appendChild(msgEl);
      }

      function doUpload(work, file, goBtn, cancelBtn, msgEl) {
        goBtn.disabled = true; cancelBtn.disabled = true; msgEl.hidden = true;
        setStatus(work, 'Uploading…');
        uploadToStorage(file)
          .then(function (path) {
            setStatus(work, 'Saving to your vault…');
            var body = {
              user_id: uid, filename: file.name, storage_path: path,
              file_size_bytes: file.size, mime_type: file.type || 'application/octet-stream'
            };
            return fetch(RESTU + '/kl_vault_documents', {
              method: 'POST', headers: Object.assign({ 'Prefer': 'return=representation' }, H), body: JSON.stringify(body)
            }).then(function (r) {
              if (r.status < 200 || r.status >= 300) throw new Error('insert ' + r.status);
              return r.json();
            });
          })
          .then(function () { return loadDocs(); })
          .catch(function () {
            clearStatus(work);
            goBtn.disabled = false; cancelBtn.disabled = false;
            showMsg(msgEl, 'Could not add this document right now. Please try again.', 'err');
          });
      }

      // ---- Replace — swap the document in place (no monitoring / no monthly gate) ----
      function openReplace(doc, card) {
        var work = card.querySelector('.slot-work');
        clear(work); work.style.display = 'block';
        work.appendChild(el('div', 'chooser-title', 'Replace this document'));
        work.appendChild(el('div', 'slot-hint', 'Upload the new version below. It replaces the document checked in this slot.'));
        var input = el('input'); input.type = 'file'; input.accept = '.pdf,.docx'; input.className = 'file-input';
        work.appendChild(input);
        var msgEl = el('div', 'form-msg'); msgEl.hidden = true;
        var row = el('div', 'work-actions');
        var go = el('button', 'btn-primary', 'Replace document'); go.type = 'button';
        var cancel = el('button', 'btn-secondary', 'Cancel'); cancel.type = 'button';
        go.addEventListener('click', function () {
          var f = input.files && input.files[0];
          var v = validateFile(f);
          if (!v.ok) { showMsg(msgEl, v.error, 'err'); return; }
          doReplace(doc, work, f, go, cancel, msgEl);
        });
        cancel.addEventListener('click', function () { work.style.display = 'none'; clear(work); });
        row.appendChild(go); row.appendChild(cancel);
        work.appendChild(row); work.appendChild(msgEl);
      }

      function doReplace(doc, work, file, goBtn, cancelBtn, msgEl) {
        goBtn.disabled = true; cancelBtn.disabled = true; msgEl.hidden = true;
        setStatus(work, 'Uploading the new version…');
        uploadToStorage(file)
          .then(function (path) {
            setStatus(work, 'Updating your vault…');
            var body = {
              filename: file.name, storage_path: path,
              file_size_bytes: file.size, mime_type: file.type || 'application/octet-stream',
              last_replaced_at: new Date().toISOString()
            };
            return fetch(RESTU + '/kl_vault_documents?id=eq.' + doc.id, {
              method: 'PATCH', headers: H, body: JSON.stringify(body)
            }).then(function (r) {
              if (r.status < 200 || r.status >= 300) throw new Error('patch ' + r.status);
              return true;
            });
          })
          .then(function () { return loadDocs(); })
          .catch(function () {
            clearStatus(work);
            goBtn.disabled = false; cancelBtn.disabled = false;
            showMsg(msgEl, 'Could not replace this document right now. Please try again.', 'err');
          });
      }

      // ---- Remove — soft delete (frees the document from the session) ----
      function confirmRemove(doc) {
        if (!window.confirm('Remove this document from your session?')) return;
        fetch(RESTU + '/kl_vault_documents?id=eq.' + doc.id, {
          method: 'PATCH', headers: H, body: JSON.stringify({ deleted_at: new Date().toISOString() })
        }).then(function (r) {
          if (r.status < 200 || r.status >= 300) throw new Error('remove ' + r.status);
          return loadDocs();
        }).catch(function () { window.alert('Could not remove this document right now. Please try again.'); });
      }

      function setStatus(work, m) {
        clearStatus(work);
        var s = el('div', 'slot-status'); s.setAttribute('data-status', '1');
        s.appendChild(el('div', 'mini-spinner'));
        s.appendChild(document.createTextNode(m));
        work.appendChild(s);
      }
      function clearStatus(work) {
        var ex = work.querySelector('[data-status]'); if (ex) ex.remove();
      }
      function showMsg(node, text, kind) {
        node.textContent = text; node.className = 'form-msg ' + (kind || ''); node.hidden = false;
      }

      // ---- Solicitor Preparation Pack — session-scoped, with the in-KL £19/£29 upsell ----
      function buildPackPane(ent) {
        var wrap = document.createElement('div');
        wrap.appendChild(el('h2', 'section-head spaced', 'Solicitor Preparation Pack'));
        var pane = el('section', 'pane');
        pane.setAttribute('aria-label', 'Solicitor Preparation Pack');

        pane.appendChild(el('p', 'pack-lead',
          'A Solicitor Preparation Pack packages your Contract Compliance Check findings so a qualified solicitor can review your position quickly.'));
        pane.appendChild(el('span', 'pack-included', 'Included with your ' + productLabel(ent.product_type)));

        pane.appendChild(el('div', 'upsell-sub',
          'Your bundled Contract Compliance Checks are used first. Once they’re used, you can add more within your active session:'));

        // Ratified in-session upsell copy: £19 (check) / £29 (check + Solicitor Pack) only.
        // The retired standalone add-on price is not surfaced anywhere on this page.
        var l1 = el('div', 'upsell-line');
        l1.appendChild(el('span', 'upsell-price', '£19'));
        l1.appendChild(el('span', 'upsell-desc', 'One additional Contract Compliance Check.'));
        pane.appendChild(l1);
        var l2 = el('div', 'upsell-line');
        l2.appendChild(el('span', 'upsell-price', '£29'));
        var d2 = el('span', 'upsell-desc');
        d2.appendChild(document.createTextNode('One additional check '));
        var strong = el('strong', null, 'plus'); strong.style.color = 'var(--text-body, #e2e8f0)';
        d2.appendChild(strong);
        d2.appendChild(document.createTextNode(' a Solicitor Preparation Pack.'));
        l2.appendChild(d2);
        pane.appendChild(l2);

        // The "additional" action points at the in-KL upsell. WIRE-UP (fulfilment brief):
        // in-session upsell £19 (check) / £29 (check + Solicitor Pack) reuse the standalone
        // Price IDs; this front-end brief creates no Stripe object and invents no Price ID.
        var actions = el('div', 'pack-actions');
        var add = el('a', 'btn-primary', 'Add a check');
        add.href = '/kl-access/';
        actions.appendChild(add);
        pane.appendChild(actions);

        wrap.appendChild(pane);
        return wrap;
      }
    };
  })();
  </script>
</body>
