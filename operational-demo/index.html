.createRadialGradient(r.x,r.y,0,r.x,r.y,r.r*3),E=r.ring<.4;U.addColorStop(0,E?`rgba(56,189,248,${D*(l?.9:.6)})`:`rgba(34,197,94,${D*(l?.8:.5)})`),U.addColorStop(1,"rgba(0,0,0,0)"),s.fillStyle=U,s.beginPath(),s.arc(r.x,r.y,r.r*3,0,Math.PI*2),s.fill(),s.fillStyle=E?`rgba(56,189,248,${D})`:`rgba(34,197,94,${D})`,s.beginPath(),s.arc(r.x,r.y,r.r*(l?1:.8),0,Math.PI*2),s.fill()}),W.current=requestAnimationFrame(N)}return N(),()=>cancelAnimationFrame(W.current)},[o,l,m]),React.createElement("canvas",{ref:x,style:{width:o,height:o,borderRadius:"50%"}})}const ORG={name:"Northerly Hill Facilities Management Ltd",sector:"Facilities Management",hq:"Cardiff",depots:"Swansea, Bristol, Birmingham",emp:238,sic:"81210/81220/81300",ch:"NH-2014-0347"},ACEI_D={domain:64,band:"Elevated",velocity:"rising",delta:"+3",refresh:"14 March 2026",est:{tri:"130,854",emp:"78,699",leg:"47"}},CATS=[{id:1,n:"Unfair Dismissal & Termination",s:71,t:"rising",c:2847,i:"Day-one protections under ERA 2025 will significantly change qualifying periods. Your contracts reference two-year qualifying period \u2014 this will need updating when commencement orders are made."},{id:2,n:"Discrimination & Equal Treatment",s:58,t:"stable",c:1923,i:"Stable. Reasonable adjustments and third-party harassment provisions under review. Worker Protection Act 2023 now in force."},{id:3,n:"Wages & Financial Obligations",s:68,t:"rising",c:2104,i:"Travel time and NMW compliance increasingly scrutinised for FM sector. HMRC enforcement action in your region."},{id:4,n:"Whistleblowing & Protected Disclosures",s:42,t:"stable",c:412,i:"Low volume but high-value area. Your handbook section doesn't cover all six qualifying categories."},{id:5,n:"Working Time & Leave",s:73,t:"rising",c:1856,i:"Highest category score. Flexible working changes, holiday pay calculations, and ERA 2025 provisions converge here."},{id:6,n:"Redundancy & Restructuring",s:55,t:"declining",c:987,i:"Declining \u2014 TUPE protections stable but redundancy consultation thresholds under review in ERA 2025."},{id:7,n:"Parental & Family Rights",s:61,t:"rising",c:1134,i:"Neonatal care leave provisions commenced April 2025. ERA 2025 extends day-one rights to paternity and parental leave."},{id:8,n:"Trade Union & Collective Rights",s:38,t:"stable",c:389,i:"Low at your scale. ERA 2025 introduces access agreements and electronic balloting \u2014 monitor if workforce grows."},{id:9,n:"Breach of Contract & Notice",s:66,t:"stable",c:1567,i:"Notice disputes common in FM. Your contracts are broadly compliant on notice periods."},{id:10,n:"Health & Safety Protections",s:70,t:"rising",c:567,i:"COSHH, lone worker provisions, and multi-site risk assessments are key for FM. HSE enforcement active in your region."},{id:11,n:"Data Protection & Privacy",s:45,t:"rising",c:234,i:"Employee monitoring, DSAR compliance, and biometric data handling increasingly tested at tribunal."},{id:12,n:"Business Transfers & Insolvency",s:52,t:"stable",c:678,i:"TUPE is endemic in FM. Your contracts should address transfer provisions explicitly."}],DOCS=[{id:1,name:"Standard FT Contract (Operative)",type:"contract",score:62,gaps:4,crit:1,uploaded:"10 Mar 2026",status:"flagged"},{id:2,name:"Fixed-Term Contract (Supervisor)",type:"contract",score:78,gaps:2,crit:0,uploaded:"10 Mar 2026",status:"ok"},{id:3,name:"Employee Handbook v4.1",type:"handbook",score:54,gaps:7,crit:2,uploaded:"10 Mar 2026",status:"flagged"},{id:null,type:"empty"},{id:null,type:"empty"}],TICKER_D=[{id:1,date:"14 Mar 2026",cat:"Working Time & Leave",sig:72,title:"HMRC enforcement: \xA32.1m NMW arrears recovered from FM companies \u2014 travel time classification cited",type:"enforcement"},{id:2,date:"13 Mar 2026",cat:"Unfair Dismissal & Termination",sig:85,title:"ERA 2025 \u2014 statutory instrument laid for day-one unfair dismissal rights commencement",type:"legislative"},{id:3,date:"12 Mar 2026",cat:"Health & Safety",sig:68,title:"HSE prosecution: lone worker fatality in commercial cleaning \u2014 risk assessment failures cited",type:"enforcement"},{id:4,date:"11 Mar 2026",cat:"Discrimination",sig:55,title:"EHRC guidance: reasonable adjustments in multi-site workforces \u2014 FM sector referenced",type:"legislative"},{id:5,date:"10 Mar 2026",cat:"Parental & Family Rights",sig:61,title:"Neonatal care leave \u2014 first tribunal decisions expected Q2 2026",type:"legislative"}],LEGIS_D=[{name:"Employment Rights Act 2025",stage:"Commencement Pending",cats:[1,5,7],cd:"Phased 2026\u20132028",sig:"Critical"},{name:"Neonatal Care Act 2023",stage:"Partially Commenced",cats:[7],cd:"Apr 2025",sig:"Medium"},{name:"Worker Protection Act 2023",stage:"In Force",cats:[2],cd:"In force",sig:"Medium"},{name:"Retained EU Law Act 2023",stage:"In Force",cats:[5,3],cd:"In force",sig:"High"}],TRIB_D=[{cat:"Unfair Dismissal",claims:2847,avg:"\xA314,670",t:"rising"},{cat:"Discrimination",claims:1923,avg:"\xA322,340",t:"stable"},{cat:"Wages",claims:2104,avg:"\xA34,890",t:"rising"},{cat:"Working Time",claims:1856,avg:"\xA33,210",t:"rising"},{cat:"Redundancy",claims:987,avg:"\xA311,450",t:"declining"}],ALERTS_D=[{id:1,date:"14 Mar",type:"Document",msg:"Handbook v4.1 \u2014 2 critical findings require review",sev:"critical"},{id:2,date:"13 Mar",type:"Legislative",msg:"ERA 2025 affects 3 of your stored documents",sev:"high"},{id:3,date:"12 Mar",type:"Ticker",msg:"HSE enforcement action \u2014 your sector and region",sev:"medium"}],KL_I=["Employment Rights Act 1996","Employment Rights Act 2025","Equality Act 2010","Working Time Regulations 1998","TUPE Regulations 2006","Health & Safety at Work Act 1974","National Minimum Wage Act 1998","Data Protection Act 2018","ACAS Code: Disciplinary & Grievance","ACAS Code: Flexible Working","Public Interest Disclosure Act 1998","Trade Union & Labour Relations Act 1992"],STAT_MAP={hra:{name:"Human Rights Act 1998",inKL:!0,cats:[2],text:"The Human Rights Act 1998 incorporates Convention rights into UK domestic law. For employment purposes, the most relevant articles are Article 8 (right to respect for private life \u2014 relevant to workplace monitoring and data protection), Article 9 (freedom of thought, conscience and religion \u2014 relevant to discrimination claims), Article 10 (freedom of expression \u2014 relevant to whistleblowing), and Article 11 (freedom of assembly \u2014 relevant to trade union rights). The HRA doesn't create standalone employment claims, but it influences how tribunals interpret other legislation, particularly the Equality Act 2010 and whistleblowing protections."},"hra 1998":{name:"Human Rights Act 1998",inKL:!0,cats:[2],alias:"hra"},"human rights act":{name:"Human Rights Act 1998",inKL:!0,cats:[2],alias:"hra"},"human rights":{name:"Human Rights Act 1998",inKL:!0,cats:[2],alias:"hra"},"era 1996":{name:"Employment Rights Act 1996",inKL:!0,cats:[1,3,5,7],alias:"era"},era:{name:"Employment Rights Act 1996",inKL:!0,cats:[1,3,5,7],text:"The Employment Rights Act 1996 is the cornerstone of UK employment protection. It covers unfair dismissal (Part X), redundancy payments (Part XI), protection of wages (Part II), working time and leave rights, maternity and parental rights (Part VIII), and flexible working. Most unfair dismissal claims require a qualifying period \u2014 currently two years under s.108, though ERA 2025 will reduce this to day one for core protections. The Act also establishes the right not to suffer detriment for exercising statutory rights. For your business, ERA 1996 is the single most relevant statute across multiple ACEI categories."},"era 2025":{name:"Employment Rights Act 2025",inKL:!0,cats:[1,5,7],text:"ERA 2025 is the most significant employment legislation in a generation. Key provisions include day-one unfair dismissal rights (replacing the two-year qualifying period), reformed fire and rehire protections, extended flexible working rights, zero-hours contract regulations, and strengthened trade union access. Commencement is phased \u2014 most provisions expected between 2026 and 2028 via statutory instruments. For your contracts, the qualifying period change is the most immediately impactful provision to monitor."},"employment rights act":{name:"Employment Rights Act 1996",inKL:!0,cats:[1,3,5,7],alias:"era"},wtr:{name:"Working Time Regulations 1998",inKL:!0,cats:[5],text:"The Working Time Regulations 1998 implement the EU Working Time Directive in UK law. They establish the 48-hour maximum working week (with opt-out), minimum rest periods (11 hours daily, 24 hours weekly), 20 minutes break for 6+ hour shifts, and 5.6 weeks annual leave. For FM specifically, the treatment of travel time between sites is a major compliance area \u2014 recent HMRC enforcement has focused on whether travel time counts as working time for NMW purposes. The Regulations also cover night work limits and health assessments for night workers."},wtd:{name:"Working Time Regulations 1998",inKL:!0,cats:[5],alias:"wtr"},"working time regulations":{name:"Working Time Regulations 1998",inKL:!0,cats:[5],alias:"wtr"},"working time directive":{name:"Working Time Regulations 1998",inKL:!0,cats:[5],alias:"wtr"},tupe:{name:"TUPE Regulations 2006",inKL:!0,cats:[12,6],text:"TUPE protects employees when a business or service provision changes hands. In FM, TUPE is a constant \u2014 every time a contract is won, lost, or transferred, employee rights transfer automatically. The Regulations preserve terms and conditions, protect against dismissal connected to the transfer, and require information and consultation with affected employees. ETO reasons (economic, technical, or organisational) can justify changes, but the threshold is high. Your contracts should explicitly address TUPE transfer provisions."},"tupe regulations":{name:"TUPE Regulations 2006",inKL:!0,cats:[12,6],alias:"tupe"},eqa:{name:"Equality Act 2010",inKL:!0,cats:[2],text:"The Equality Act 2010 consolidates discrimination law. It protects nine characteristics: age, disability, gender reassignment, marriage/civil partnership, pregnancy/maternity, race, religion/belief, sex, and sexual orientation. Key concepts: direct discrimination, indirect discrimination, harassment, victimisation, and the duty to make reasonable adjustments for disability. The Worker Protection Act 2023 has strengthened the preventative duty on employers to take reasonable steps to prevent sexual harassment. For multi-site operations, ensuring consistent policy application across locations is a key compliance consideration."},"ea 2010":{name:"Equality Act 2010",inKL:!0,cats:[2],alias:"eqa"},"equality act":{name:"Equality Act 2010",inKL:!0,cats:[2],alias:"eqa"},nmw:{name:"National Minimum Wage Act 1998",inKL:!0,cats:[3],text:"The National Minimum Wage Act 1998 establishes the legal minimum wage floor. HMRC enforces compliance and can issue penalty notices of up to 200% of arrears. For FM companies, the critical compliance area is what counts as working time for NMW purposes \u2014 travel between sites, time spent on mandatory training, and time waiting at client premises. The recent HMRC enforcement action recovering \xA32.1m from FM companies specifically cited travel time classification failures."},nmwa:{name:"National Minimum Wage Act 1998",inKL:!0,cats:[3],alias:"nmw"},"national minimum wage":{name:"National Minimum Wage Act 1998",inKL:!0,cats:[3],alias:"nmw"},hswa:{name:"Health and Safety at Work Act 1974",inKL:!0,cats:[10],text:"Section 2 places a general duty on employers to ensure, so far as is reasonably practicable, the health, safety and welfare at work of all employees. For FM operations across multiple sites, this includes risk assessments for each site, lone worker provisions, COSHH compliance for cleaning chemicals, and adequate training and supervision. The HSE prosecutes serious breaches \u2014 the recent lone worker fatality prosecution in commercial cleaning underlines the enforcement reality."},hasawa:{name:"Health and Safety at Work Act 1974",inKL:!0,cats:[10],alias:"hswa"},"health and safety at work":{name:"Health and Safety at Work Act 1974",inKL:!0,cats:[10],alias:"hswa"},dpa:{name:"Data Protection Act 2018",inKL:!0,cats:[11],text:"The Data Protection Act 2018 supplements UK GDPR. For employers, it governs how employee personal data is collected, stored, processed, and shared. Key areas: lawful basis for processing employee data, subject access requests (DSARs \u2014 30 calendar day response deadline), data protection impact assessments for monitoring technologies, and breach notification (72 hours to ICO). Employee monitoring \u2014 CCTV, GPS tracking, email monitoring \u2014 requires transparency, proportionality, and usually a DPIA."},"dpa 2018":{name:"Data Protection Act 2018",inKL:!0,cats:[11],alias:"dpa"},"data protection act":{name:"Data Protection Act 2018",inKL:!0,cats:[11],alias:"dpa"},gdpr:{name:"UK GDPR",inKL:!0,cats:[11],text:"UK GDPR applies to all employee personal data processing. The six lawful bases are consent, contract, legal obligation, vital interests, public task, and legitimate interests. For employment, legitimate interests and legal obligation are the most common bases \u2014 consent is generally inappropriate given the power imbalance. Employee rights include access, rectification, erasure (limited in employment context), and portability. Processing special category data (health, trade union membership, biometric) requires an additional condition under Article 9."},"uk gdpr":{name:"UK GDPR",inKL:!0,cats:[11],alias:"gdpr"},acas:{name:"ACAS Code of Practice",inKL:!0,cats:[1,9],text:"The ACAS Codes of Practice \u2014 particularly on Disciplinary and Grievance Procedures \u2014 are not directly legally binding, but tribunals must take them into account. Failure to follow the Code can result in a 25% uplift to compensation awards. The Code requires: written notification of allegations, a meeting to discuss, the right to be accompanied, and a right of appeal. For your handbook, the disciplinary and grievance sections need to align with the current Code provisions."},"acas code":{name:"ACAS Code of Practice",inKL:!0,cats:[1,9],alias:"acas"},pioa:{name:"Public Interest Disclosure Act 1998",inKL:!0,cats:[4],text:"PIDA inserts protections into ERA 1996 for workers who make qualifying disclosures. Six categories of qualifying disclosure: criminal offences, failure to comply with legal obligations, miscarriages of justice, danger to health and safety, damage to the environment, and concealment of any of these. Protection is from day one \u2014 no qualifying period. Compensation is uncapped. Your whistleblowing procedure needs to cover all six categories explicitly."},pida:{name:"Public Interest Disclosure Act 1998",inKL:!0,cats:[4],alias:"pioa"},"public interest disclosure":{name:"Public Interest Disclosure Act 1998",inKL:!0,cats:[4],alias:"pioa"},"flexible working":{name:"Employment Relations (Flexible Working) Act 2023",inKL:!0,cats:[5],text:"The 2023 Act amended ERA 1996 s.80F\u201380I. Key changes: employees can now make two requests per year (previously one), from day one of employment (previously 26 weeks), employers must respond within two months (previously three), and must consult the employee before refusing. Your handbook still references the old 26-week qualifying period \u2014 this needs updating."},tulrca:{name:"Trade Union and Labour Relations (Consolidation) Act 1992",inKL:!0,cats:[8],text:"TULRCA governs trade union recognition, collective bargaining, industrial action, and the right to be accompanied at disciplinary and grievance hearings. ERA 2025 introduces electronic balloting and access agreements. At your current scale (238 employees), mandatory recognition could be triggered if a union demonstrates majority support in a bargaining unit."},"erel a 1999":{name:"Employment Relations Act 1999",inKL:!0,cats:[1,8],text:"The Employment Relations Act 1999 introduced the statutory right to be accompanied at disciplinary and grievance hearings, established the statutory recognition procedure for trade unions, and extended various employment protections. The right to be accompanied allows workers to bring a trade union representative or fellow worker to formal meetings."},"erra 2013":{name:"Enterprise and Regulatory Reform Act 2013",inKL:!1,cats:[1,9],text:"ERRA 2013 introduced several employment law reforms including the requirement for ACAS early conciliation before tribunal claims, changes to the unfair dismissal qualifying period confirmation, and the introduction of settlement agreements (replacing compromise agreements). It also reformed the employment tribunal system and introduced employment judges sitting alone in unfair dismissal cases."},mhswr:{name:"Management of Health and Safety at Work Regulations 1999",inKL:!0,cats:[10],text:"These Regulations require employers to conduct suitable and sufficient risk assessments, implement preventive and protective measures, appoint competent persons to assist with health and safety, provide information and training, and cooperate with other employers sharing a workplace. For multi-site FM operations, risk assessments must be site-specific and regularly reviewed."},coshh:{name:"Control of Substances Hazardous to Health Regulations 2002",inKL:!0,cats:[10],text:"COSHH requires employers to assess risks from hazardous substances, prevent or control exposure, ensure control measures are maintained, monitor exposure, carry out health surveillance, and provide information, instruction and training. In FM, cleaning chemicals are the primary COSHH concern \u2014 each substance needs a safety data sheet and risk assessment."},sar:{name:"Subject Access Request (DPA 2018 / UK GDPR Art. 15)",inKL:!0,cats:[11],text:"A Subject Access Request gives individuals the right to obtain a copy of their personal data. Employers must respond within 30 calendar days (extendable by two months for complex requests). The response must include the personal data, the purposes of processing, categories of data, recipients, retention periods, and the source of the data. Failure to respond adequately can result in ICO enforcement action. In employment disputes, DSARs are frequently used tactically \u2014 responding promptly and comprehensively is important."},dsar:{name:"Subject Access Request (DPA 2018 / UK GDPR Art. 15)",inKL:!0,cats:[11],alias:"sar"},et1:{name:"Employment Tribunal Claim Form (ET1)",inKL:!1,cats:[],text:"The ET1 is the form used to bring a claim to the employment tribunal. It must be submitted within strict time limits \u2014 typically three months less one day from the act complained of (extended by ACAS early conciliation). The form requires details of the claimant, respondent, and the nature of the claim. Missing the deadline is usually fatal to a claim unless the 'not reasonably practicable' exception applies."},et3:{name:"Employment Tribunal Response Form (ET3)",inKL:!1,cats:[],text:"The ET3 is the employer's response to an ET1 claim. It must be filed within 28 days of receiving the claim. Failure to file an ET3 means the tribunal can proceed without your input and issue a default judgment. The response should address each allegation specifically and set out your defence."},ehrc:{name:"Equality and Human Rights Commission",inKL:!1,cats:[2],text:"The EHRC is the statutory body responsible for enforcing equality and human rights legislation in Great Britain. It has powers to conduct investigations, issue unlawful act notices, and enter into binding agreements. Its Codes of Practice on employment are authoritative guidance that tribunals must consider."},hse:{name:"Health and Safety Executive",inKL:!1,cats:[10],text:"The HSE is the UK's workplace health and safety regulator. It has powers to inspect workplaces, issue improvement and prohibition notices, and prosecute for serious breaches. For FM, HSE inspections can be triggered by incidents, complaints, or targeted sector campaigns. Penalties for serious breaches can include unlimited fines and imprisonment."},hmrc:{name:"HM Revenue and Customs",inKL:!1,cats:[3],text:"HMRC enforces National Minimum Wage compliance. It can investigate employers, issue penalty notices of up to 200% of arrears (minimum \xA3100 per worker), and name and shame non-compliant employers. The recent \xA32.1m enforcement action against FM companies in your region specifically targeted travel time classification."}},FIND_SRC={ft:{finding:"Qualifying period reference",clause:"Clause 3.1",statute:"ERA 1996 s.108 (amended by ERA 2025)",explanation:"Your standard operative contract references a two-year qualifying period for unfair dismissal protection. ERA 2025 will reduce this to day one. While the current two-year period remains in force until commencement orders are made, the statutory instrument has been laid \u2014 meaning this contract term will become misleading once commenced.",caseLaw:null,tribunalData:"2,847 unfair dismissal decisions in the last 12 months. Average award: \xA314,670. Trend: rising.",klInstrument:"Employment Rights Act 1996",klSection:"Part X \u2014 Unfair Dismissal, specifically s.108 (qualifying period)"},flex:{finding:"Flexible working pre-dates 2023 Act",clause:"Section 7",statute:"Employment Relations (Flexible Working) Act 2023; ERA 1996 s.80F\u201380I as amended",explanation:"Your handbook's flexible working section still references the old 26-week qualifying period and one request per year. Since 6 April 2024, the right applies from day one with two requests per year and a two-month employer response window.",caseLaw:null,tribunalData:"1,856 working time and leave decisions in the last 12 months. Flexible working claims trending upward.",klInstrument:"Employment Relations (Flexible Working) Act 2023",klSection:"Full Act \u2014 amends ERA 1996 s.80F\u201380I"},whistle:{finding:"Whistleblowing below ACAS Code",clause:"Section 12",statute:"ERA 1996 Part IVA; Public Interest Disclosure Act 1998",explanation:"Your whistleblowing procedure doesn't cover all six categories of qualifying disclosure defined in s.43B ERA 1996. Specifically, it omits environmental damage and miscarriage of justice. It also doesn't make clear that protection applies from day one with no qualifying period.",caseLaw:"Chesterton Global Ltd v Nurmohamed [2017] EWCA Civ 979 \u2014 established that 'public interest' can include matters affecting a section of the public, not just the public at large.",tribunalData:"412 whistleblowing decisions in the last 12 months. Low volume, but average compensation: \xA328,400 \u2014 uncapped.",klInstrument:"Public Interest Disclosure Act 1998",klSection:"Amends ERA 1996 Part IVA \u2014 protected disclosures and qualifying categories"}},PARLIAMENT_PROCESS=`Here's how legislation moves through Parliament \u2014 it's worth understanding because it directly affects when your compliance obligations change.

A Bill starts with a First Reading \u2014 essentially a formal introduction, no debate. Then Second Reading, where the general principles are debated. Committee Stage is where the detailed line-by-line scrutiny happens \u2014 this is often where the provisions that affect employers get refined or amended. Report Stage brings it back to the full House for further amendments, then Third Reading for final approval.

After one House passes it, the process repeats in the other House. If they make changes, it goes to 'ping pong' \u2014 back and forth until both Houses agree.

But here's the part that matters most for your compliance planning: many provisions don't come into force when the Act receives Royal Assent. They require commencement orders \u2014 statutory instruments that bring specific sections into force on specific dates. ERA 2025 is a prime example \u2014 Royal Assent achieved, but the day-one unfair dismissal rights won't apply until the commencement order is made.

That's exactly what the legislative tracker is monitoring for you \u2014 not just whether a law exists, but when it actually takes effect.`,TRIBUNAL_PROCESS=`The employment tribunal process has several stages, and understanding them helps you prepare properly.

First, ACAS Early Conciliation \u2014 mandatory before any claim. The employee contacts ACAS, you get a call, and there's a window to resolve it without a hearing. Many disputes settle here. Time limits are paused during conciliation.

If conciliation doesn't work, the employee files an ET1 claim form. You respond with an ET3 \u2014 and this is critical: you have 28 days. Miss it and the tribunal can issue a default judgment against you.

Then there's typically a Preliminary Hearing to sort out case management \u2014 what the issues are, what documents are needed, witness statements timeline, and the hearing date.

The Full Hearing is where evidence is heard. You'll need witness statements, a bundle of documents (usually agreed with the other side), and your key witnesses available. The tribunal panel \u2014 typically an Employment Judge and two lay members for discrimination claims, or a Judge sitting alone for unfair dismissal \u2014 hears both sides and makes its decision.

Remedies if the employee succeeds: reinstatement (rare), re-engagement (also rare), or compensation. Basic award is calculated like redundancy pay. Compensatory award is capped at the lower of 52 weeks' pay or \xA3115,115 \u2014 but discrimination and whistleblowing claims are uncapped.

The reason this matters for your documents is that tribunals scrutinise your procedures closely. Following the ACAS Code, having clear documentation, and acting fairly and consistently are your strongest defences.`,GRIEVANCE_PROCESS=`When an employee raises a grievance, the process needs to follow the ACAS Code of Practice \u2014 failure to follow it can result in a 25% uplift to any tribunal compensation.

The employee should put their grievance in writing. Then you hold a meeting without unreasonable delay. The employee has the right to be accompanied by a trade union representative or a colleague. You investigate the issues raised \u2014 and the investigation needs to be proportionate and fair.

The employee must have a right of appeal to a more senior manager where possible. The appeal should consider whether the original outcome was reasonable, and should be dealt with impartially.

What matters in practice: document everything. The investigation needs to be thorough and fair, and the employee needs to feel heard even if the outcome isn't what they wanted.

The reason this matters for you specifically is that your handbook's grievance section is one of the areas where the ACAS Code alignment is important. Getting it right protects you if the grievance later becomes a tribunal claim.

If you're dealing with a specific grievance right now, this is one of those areas where speaking to an employment solicitor early can save significant costs down the line. Our professional partner directory will help with that when it's live.`,DISCIPLINARY_PROCESS=`The disciplinary process needs to follow the ACAS Code of Practice \u2014 and the consequences of getting it wrong are real. A 25% uplift to compensation if the tribunal finds you didn't follow the Code.

First, investigate. Gather facts before taking any action. The investigation should be proportionate to the seriousness of the allegation \u2014 a full forensic investigation isn't needed for minor misconduct, but for gross misconduct or potential dismissal, you need to be thorough.

If there is a case to answer, write to the employee setting out the allegations and the evidence. Give them reasonable time to prepare \u2014 the Code doesn't specify a minimum, but a few days is usually expected.

The disciplinary meeting: the employee has the right to be accompanied. Present the evidence, let the employee respond, and adjourn to consider your decision.

Possible outcomes: no action, first written warning, final written warning, or dismissal. The sanction must be proportionate. Summary dismissal (without notice) is only appropriate for gross misconduct \u2014 and you need a clear, non-exhaustive list of what constitutes gross misconduct in your handbook.

Right of appeal \u2014 this is essential. The appeal should be heard by someone more senior who wasn't involved in the original decision.

Your handbook covers the basic structure, but the detail on what constitutes gross misconduct and the procedural steps need to fully align with the current ACAS Code.

For any live disciplinary situation, professional advice at the outset is valuable \u2014 particularly if dismissal is a possible outcome.`,DOC_TYPES=`Good question \u2014 they serve different legal purposes and carry different compliance implications.

Your employment contract is the binding legal agreement between you and each employee. It must contain the statutory particulars required under ERA 1996 s.1 \u2014 including pay, hours, notice periods, and pension. Changes to contractual terms require employee consent or a fair process (consult, explain business reasons, and as a last resort, dismiss and re-engage \u2014 though ERA 2025 tightens this significantly).

Your employee handbook contains the policies and procedures that govern the employment relationship \u2014 disciplinary, grievance, flexible working, whistleblowing, data protection, and so on. Some handbook provisions are contractual (if incorporated into the contract), but most are non-contractual policies that you can update with reasonable notice.

The critical difference: changing a contract term requires employee consent or a fair process. Updating a non-contractual policy requires reasonable notice and communication. Knowing which is which matters when you're acting on compliance findings.

For your documents, the contract findings relate primarily to statutory compliance \u2014 the qualifying period reference and notice provisions. The handbook findings relate to policy alignment \u2014 the flexible working and whistleblowing sections need updating to reflect current law.`,EU_BREXIT=`Since Brexit, EU employment law doesn't directly apply to UK employers anymore \u2014 but its legacy is embedded throughout our domestic framework.

Most EU-derived employment protections were transposed into UK law before exit and are preserved by the Retained EU Law Act 2023 (formerly the European Union (Withdrawal) Act 2018). The Working Time Regulations, TUPE, aspects of discrimination law, and collective consultation requirements all have EU origins.

Where it gets interesting is in interpretation. Pre-exit EU case law from the Court of Justice of the EU (CJEU) is retained as part of UK law, but UK courts can now depart from it. In practice, most tribunals still follow the established interpretations \u2014 but there's increasing scope for UK-specific development.

For your compliance planning, the practical position is: the core protections are still in place, the legal framework is fundamentally the same, but the direction of travel is now set by the UK Parliament rather than EU directives. ERA 2025 is the clearest example of the UK charting its own course on employment rights.`,INTERNATIONAL=`Ailane covers UK employment law \u2014 that's our core. The ACEI, compliance analysis, and Knowledge Library are built around UK statutes, regulations, and tribunal decisions.

If you have employees working internationally, the jurisdictional questions get complex quickly. Which country's law applies depends on where the employee habitually works, where the employer is based, and what the contract says about governing law. Rome I Regulation principles still broadly apply post-Brexit for determining applicable law.

At Institutional tier, we extend into EU regulatory monitoring and some international statute tracking. But for cross-border employment issues, specialist international employment advice is essential \u2014 it's not an area where general guidance is safe to rely on.`,WELSH_LANG=`Good question, and particularly relevant given your Cardiff headquarters.

Four Acts have official Welsh texts with equal legal standing: the Welsh Language Act 1993, the Government of Wales Act 2006, the Welsh Language (Wales) Measure 2011, and the Legislation (Wales) Act 2019.

For employment purposes, the Welsh Language Standards can require bilingual policies, communications, and service delivery depending on your sector and client base. If you provide services to Welsh public bodies, language obligations may flow through your service contracts.

The Knowledge Library includes instruments with Welsh language relevance. Something worth checking with your procurement team \u2014 whether any of your FM contracts include Welsh Language Standard obligations.`,DEVOL_GEN=`Employment law is mostly reserved to Westminster \u2014 the same core legislation applies across England, Wales, and Scotland.

But there are important devolved intersections. Health and safety enforcement can operate differently, procurement requirements vary, and public sector equality duties have devolved elements. The practical impact depends on who your clients are and where your workforce operates.

Northern Ireland is the significant exception \u2014 employment law is substantially devolved there with separate legislation.

For a company operating across Cardiff, Swansea, Bristol, and Birmingham, you're primarily in the unified England and Wales framework with some Welsh-specific considerations around language and public sector procurement.`,DEVOL_SCOT=`Employment law is reserved to Westminster under the Scotland Act 1998 Schedule 5 \u2014 so the core ERA, Equality Act, and TUPE provisions are the same as in England and Wales.

Where Scotland diverges: the tribunal system has some administrative differences, health and safety has devolved aspects, and the legal system itself (Scots law) has distinct procedural traditions. The limitation period for breach of contract claims is five years in Scotland versus six in England \u2014 though tribunal time limits are the same.

If you expand into Scottish operations, the substantive employment law obligations are the same, but local procedural knowledge matters for litigation.`,DEVOL_WALES=`Employment law isn't devolved to the Senedd \u2014 core obligations are the same as in England.

Where Wales differs is in the devolved areas that intersect with employment: the Welsh Language Standards, public sector procurement requirements (the Social Partnership and Public Procurement Act 2023 requires fair work considerations), and health and safety enforcement through the HSE's Welsh operations.

Given that you operate across both Welsh and English sites, the practical impact is mainly around Welsh language obligations in public sector contracts and procurement compliance. Your FM contracts with Welsh public bodies may include specific Welsh language and fair work requirements.`,DEVOL_NI=`Northern Ireland is genuinely different. Employment law is substantially devolved to the Northern Ireland Assembly.

The Employment Rights (Northern Ireland) Order 1996 rather than the ERA 1996. Separate equality legislation \u2014 the Fair Employment and Treatment (Northern Ireland) Order 1998 includes religion and political opinion as protected grounds with specific monitoring and reporting obligations. Different tribunal rules and procedures.
