<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Engagement Status · Legal Oversight Room · Ailane</title>
  <meta name="description" content="Counterparty Deal-Room Experience — Engagement Status (synthetic demonstration).">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://www.googletagmanager.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co; img-src 'self' data: https://cnbsxwtvazfvzmltkuvx.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <link rel="stylesheet" href="../shared/dealroom.css">
  <!-- Google Analytics 4 (G-NTNXWZN31C) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C', { anonymize_ip: true });
  </script>
  <style>
    .st-banner{background:rgba(34,27,8,.97);border:1px solid rgba(245,158,11,.45);border-radius:10px;
      padding:12px 16px;margin-bottom:22px;color:#f6d49a;font-size:13.5px;line-height:1.5}
    .st-banner b{color:#F59E0B}
    .st-kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:26px}
    .st-kv .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--dr-text-muted)}
    .st-kv .v{font-size:14px;color:#F1F5F9;margin-top:3px}
    .st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .st-card{border:1px solid rgba(148,163,184,.2);border-radius:10px;background:var(--dr-bg-card);padding:16px;display:flex;flex-direction:column;gap:9px}
    .st-card .ple{font-family:var(--dr-font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dr-text-muted)}
    .st-card .plt{font-family:"DM Serif Display",Georgia,serif;font-size:1.05rem;color:#F1F5F9}
    .st-pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;width:fit-content}
    .st-pill.ok{background:rgba(52,211,153,.14);color:#34D399;border:1px solid rgba(52,211,153,.3)}
    .st-pill.prog{background:rgba(14,165,233,.12);color:#0EA5E9;border:1px solid rgba(14,165,233,.3)}
    .st-pill.open{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.3)}
    .st-pill.na{background:rgba(148,163,184,.1);color:#94A3B8;border:1px solid rgba(148,163,184,.2)}
    .st-docs{list-style:none;margin:4px 0 0;padding:0;display:flex;flex-direction:column;gap:5px}
    .st-docs li{font-size:12.5px;color:#94A3B8;display:flex;justify-content:space-between;gap:8px}
    .st-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:999px;background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.3);white-space:nowrap}
    .st-sec h2{font-size:1.1rem;color:#F1F5F9;margin:0 0 14px}
  </style>
  <!-- Ailane favicon / app icons — estate head standard (AMD-246) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0e1a">
</head>
<body style="visibility:hidden">
  <div id="drApp"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/reviewer-auth.js"></script>
  <script>
    // Legal Oversight Room — Engagement Status (synthetic Counterparty Deal-Room Experience).
    // Phase & gate progression for the synthetic R&D Simulation Ltd engagement (0/A/B/C),
    // read-only via the reviewer-safe lovr-dealroom-observe. Live-stage gating is indicated,
    // never enforced.
    const esc = window.dealroomAuth.escapeHtml;
    const sb = window.dealroomSupabase;
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.dealroomConfig;

    document.addEventListener('DOMContentLoaded', () => window.dealroomAuth.guard({ onReady: boot }));

    async function observe(payload){
      const { data:{ session } } = await sb.auth.getSession();
      const r = await fetch(`${SUPABASE_URL}/functions/v1/lovr-dealroom-observe`, {
        method:'POST', headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${session ? session.access_token : ''}` },
        body: JSON.stringify(payload) });
      if(!r.ok) throw new Error('observe ' + r.status);
      return r.json();
    }

    function shell(s, inner){
      const email = (s.user && s.user.email) || '';
      return `
        <div class="dr-shell">
          <header class="dr-header">
            <div class="dr-header-brand">
              <div class="dr-header-brand-mark">AL</div>
              <div><div class="dr-header-title">Ailane × ${esc(s.counterparty_name)}</div>
                <div class="dr-header-subtitle">Deal-Room · Phase 0 — Engagement &amp; proposal</div></div>
            </div>
            <div class="dr-header-meta">
              <span class="dr-chip dr-chip-phase_0">Phase 0</span>
              <div class="dr-header-user"><div class="dr-header-user-email">${esc(email)}</div></div>
              <button id="drSignOutBtn" class="dr-btn dr-btn-ghost dr-btn-sm">Sign out</button>
            </div>
          </header>
          <nav class="dr-nav">
            <a href="../" class="dr-nav-link">&larr; Experience</a>
            <a href="../documents/" class="dr-nav-link">Deal Documents</a>
            <a href="../deal-creator/" class="dr-nav-link">Deal Creator</a>
            <a href="../status/" class="dr-nav-link active">Engagement Status</a>
            <a href="../pathway/" class="dr-nav-link">Pathway</a>
            <a href="/legal-oversight/#vault" class="dr-nav-link">Document Vault</a>
          </nav>
          <main class="dr-main">
            <div class="dr-page-header">
              <div class="dr-page-title">Engagement Status</div>
              <div class="dr-page-subtitle">Phase and gate progression for the demonstration engagement. Synthetic — read-only; live-stage gating is indicated, not enforced.</div>
            </div>
            ${inner}
          </main>
          <footer class="dr-footer">
            <div class="dr-footer-strong">AI Lane Limited (trading as Ailane)</div>
            Company No. 17035654 · ICO Reg. 00013389720
            <div class="dr-footer-legal"><a href="/legal/deal-room-privacy/">Privacy Notice &amp; Workspace Terms</a><br><strong>Ailane&reg;</strong> is a registered trademark of AI Lane Limited. Regulatory intelligence, not legal advice. Synthetic demonstration; not for further distribution.</div>
          </footer>
        </div>`;
    }
    function bindSignOut(){
      const b = document.getElementById('drSignOutBtn');
      if(b) b.addEventListener('click', () => window.dealroomAuth.signOut().then(()=> window.location.replace('/legal-oversight/')));
    }

    function banner(){
      return `<div class="st-banner"><b>Demonstration — synthetic data.</b> Simulated deal room (R&amp;D Simulation Ltd). No real counterparty, no live data; the live-delivery gate is OFF.</div>`;
    }
    function overview(p){
      const kv = [['Counterparty',p.legal_name],['Gate state',p.gate_state],['Type',p.type],
        ['Geographic scope',p.geographic_scope],['Term',p.term_months!=null?p.term_months+' months':null],['Exclusivity tier',p.exclusivity_tier]];
      return `<div class="st-kv">${kv.map(([k,v])=>`<div><div class="k">${esc(k)}</div><div class="v">${esc(v==null||v===''?'—':v)}</div></div>`).join('')}</div>`;
    }
    function phaseBoard(list){
      const cards = (list||[]).map((ph,i)=>{
        const out = Number(ph.blockers_outstanding||0), tot = Number(ph.blockers_total||0);
        const cls = tot===0 ? 'na' : (out===0 ? 'ok' : (out<tot ? 'prog' : 'open'));
        const lab = tot===0 ? 'No gates' : (out===0 ? 'Cleared' : out+' outstanding');
        const docs = (ph.documents||[]).map(d=>`<li><span>${esc(d.name||d.doc_code)}</span>${d.blocking?`<span class="st-tag" title="Gated in live engagements — open in Deal Documents">Gated · live</span>`:''}</li>`).join('');
        return `<div class="st-card">
          <div class="ple">${esc(String.fromCharCode(65+i))} · ${esc((ph.phase||'').replace('phase_','Phase '))}</div>
          <div class="plt">${esc(ph.label||ph.phase)}</div>
          <span class="st-pill ${cls}">${esc(lab)}</span>
          <ul class="st-docs">${docs||'<li><span style="color:var(--dr-text-muted)">No documents in this phase.</span></li>'}</ul>
        </div>`;
      }).join('');
      return `<div class="st-sec"><h2>Phase &amp; gate progression</h2>
        <div class="st-grid">${cards||'<div class="dr-empty">No phases defined.</div>'}</div></div>`;
    }

    async function boot(s){
      document.getElementById('drApp').innerHTML = shell(s, `<div class="dr-loading"><span class="dr-spinner"></span> Loading engagement status…</div>`);
      bindSignOut();
      document.body.style.visibility = 'visible';
      try{
        const d = await observe({ action:'overview' });
        const main = document.querySelector('.dr-main');
        const loader = main.querySelector('.dr-loading'); if(loader) loader.remove();
        main.insertAdjacentHTML('beforeend', banner() + overview(d.profile||{}) + phaseBoard(d.phases||[]));
      }catch(err){
        const main = document.querySelector('.dr-main');
        const loader = main && main.querySelector('.dr-loading'); if(loader) loader.remove();
        if(main) main.insertAdjacentHTML('beforeend', `<div class="dr-notice dr-notice-danger">Unable to load engagement status (${esc(err.message||'error')}). If your reviewer access is still being verified, it will appear once confirmed.</div>`);
      }
    }
  </script>
</body>
</html>
