<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal Oversight Room | Ailane</title>
  <meta name="description" content="Restricted workspace for verified legal reviewers." />

  <!-- Not indexed — restricted room (LOVR §6) -->
  <meta name="robots" content="noindex,nofollow" />

  <!-- GA4 Analytics — REQUIRED ON EVERY PAGE, NO EXCEPTIONS -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>

  <!-- CSP — REQUIRED ON EVERY PAGE (SEC-001 §3.2) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://js.stripe.com https://www.googletagmanager.com https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.stripe.com https://www.google-analytics.com; connect-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co https://cnbsxwtvazfvzmltkuvx.functions.supabase.co https://api.stripe.com https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'">

  <!-- Supabase JS (anon client only — RULE 27: no auth logic/secrets beyond the public anon key) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F1B35;
      --navy-mid: #1B2A4A;
      --navy-light: #243356;
      --teal: #0EA5E9;
      --white: #FFFFFF;
      --off-white: #F0F4FA;
      --grey-text: #94A3B8;
      --grey-border: #2A3A5C;
      --body-text: #CBD5E1;
      --danger: #EF4444;
      --success: #10B981;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--navy); color: var(--body-text);
      line-height: 1.7; display: flex; flex-direction: column; min-height: 100vh;
    }
    nav { background: rgba(15,27,53,0.97); border-bottom: 1px solid var(--grey-border); padding: 0 2rem; }
    .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--white); text-decoration: none; letter-spacing: -0.03em; }
    .nav-logo span { color: var(--teal); }
    .nav-tag { font-size: 0.78rem; color: var(--grey-text); text-transform: uppercase; letter-spacing: 0.1em; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card {
      width: 100%; max-width: 460px;
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid var(--grey-border); border-radius: 14px; padding: 2.5rem 2rem;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
    .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; color: var(--teal);
      text-transform: uppercase; letter-spacing: 0.1em; background: rgba(14,165,233,0.1);
      border: 1px solid rgba(14,165,233,0.25); padding: 0.25rem 0.7rem; border-radius: 20px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: var(--white); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .sub { font-size: 0.92rem; color: var(--grey-text); margin-bottom: 1.75rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--off-white); margin-bottom: 0.5rem; }
    input[type="email"] {
      width: 100%; padding: 0.8rem 0.9rem; font-size: 0.95rem; background: var(--navy);
      color: var(--white); border: 1px solid var(--grey-border); border-radius: 8px;
    }
    input:focus { outline: none; border-color: var(--teal); }
    button.primary {
      width: 100%; margin-top: 1.1rem; padding: 0.85rem; background: var(--teal); color: var(--white);
      font-size: 0.95rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s;
    }
    button.primary:hover { opacity: 0.92; }
    button.primary:disabled { opacity: 0.55; cursor: default; }
    .msg { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2em; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--success); }
    .msg.info { color: var(--grey-text); }
    .shell-status { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 600;
      color: var(--success); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
      padding: 0.3rem 0.8rem; border-radius: 20px; margin-bottom: 1.25rem; }
    .shell-status.admin { color: var(--teal); background: rgba(14,165,233,0.1); border-color: rgba(14,165,233,0.3); }
    .shell-status .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .shell-note { margin-top: 1.25rem; padding: 1rem 1.1rem; border-left: 3px solid var(--teal);
      background: rgba(14,165,233,0.06); border-radius: 0 8px 8px 0; font-size: 0.88rem; color: var(--body-text); }
    .linklike { margin-top: 1.5rem; background: none; border: none; color: var(--grey-text); font-size: 0.82rem;
      width: auto; padding: 0; text-decoration: underline; cursor: pointer; }
    .linklike:hover { color: var(--white); }
    footer { border-top: 1px solid var(--grey-border); background: var(--navy-mid); padding: 1.5rem 2rem; text-align: center; }
    .footer-legal { font-size: 0.78rem; color: var(--grey-text); line-height: 1.7; }

    /* Read-only W9 obligations checklist (LOVR P1a §4) */
    .card.workspace { max-width: 760px; }
    .checklist { margin-top: 1.5rem; }
    .checklist-empty { margin-top: 1.5rem; padding: 1rem 1.1rem; border-left: 3px solid var(--grey-border);
      background: rgba(148,163,184,0.06); border-radius: 0 8px 8px 0; font-size: 0.88rem; color: var(--grey-text); }
    .cl-group { margin-bottom: 1.5rem; }
    .cl-group:last-child { margin-bottom: 0; }
    .cl-group-title { font-size: 0.74rem; font-weight: 700; color: var(--grey-text); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--grey-border); }
    .cl-row { background: var(--navy); border: 1px solid var(--grey-border); border-radius: 8px;
      padding: 0.7rem 0.85rem; margin-bottom: 0.5rem; }
    .cl-row:last-child { margin-bottom: 0; }
    .cl-row.has-desc { cursor: pointer; }
    .cl-row.has-desc:hover { border-color: var(--teal); }
    .cl-row.has-desc:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
    .cl-row-head { display: flex; align-items: center; gap: 0.7rem; }
    .cl-code { flex: 0 0 auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8rem; font-weight: 700;
      color: var(--off-white); min-width: 3.2rem; }
    .cl-title { flex: 1 1 auto; font-size: 0.9rem; color: var(--white); }
    .cl-chevron { flex: 0 0 auto; color: var(--grey-text); font-size: 0.7rem; transition: transform 0.15s; }
    .cl-row.open .cl-chevron { transform: rotate(90deg); }
    .cl-badge { flex: 0 0 auto; font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.2rem 0.55rem; border-radius: 20px; white-space: nowrap; border: 1px solid transparent; }
    .cl-badge-open { color: var(--grey-text); background: rgba(148,163,184,0.12); border-color: rgba(148,163,184,0.3); }
    .cl-badge-in-progress { color: #FBBF24; background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); }
    .cl-badge-satisfied { color: var(--success); background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
    .cl-badge-blocked { color: var(--danger); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
    .cl-badge-not-applicable { color: var(--grey-text); background: transparent; border-color: var(--grey-border); }
    .cl-desc { display: none; margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px solid var(--grey-border);
      font-size: 0.85rem; color: var(--body-text); }
    .cl-row.open .cl-desc { display: block; }
    @media (max-width: 540px) {
      .cl-row-head { flex-wrap: wrap; }
      .cl-title { flex: 1 1 100%; order: 3; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="https://ailane.ai/" class="nav-logo">AIL<span>ANE</span></a>
    <span class="nav-tag">Legal Oversight Room</span>
  </div>
</nav>

<main><div id="root" class="card"></div></main>

<footer>
  <p class="footer-legal">
    &copy; 2026 AI Lane Limited &nbsp;&middot;&nbsp; Company No. 17035654 &nbsp;&middot;&nbsp; ICO Reg. No. 00013389720<br/>
    Ailane is a trading name of AI Lane Limited.
  </p>
</footer>

<script>
  // Thin client — anon Supabase client only; no secrets, no auth logic beyond the public anon key
  // (RULE 27). Mirrors the deal-room auth.js guard. Reviewers sign in by magic link routed through
  // /auth/callback/ (the central post-auth router), which then redirects active reviewers here.
  var SB_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
  var DIRECTOR_EMAIL = 'mark@ailane.ai';
  var sb = window.supabase.createClient(SB_URL, SB_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });
  var root = document.getElementById('root');

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderSignIn(){
    root.innerHTML =
      '<span class="badge">Restricted Access</span>' +
      '<h1>Legal Oversight Room</h1>' +
      '<p class="sub">Sign in to continue. A magic link will be sent to your registered email. Access is limited to invited legal reviewers.</p>' +
      '<form id="f" autocomplete="off">' +
        '<label for="email">Registered email</label>' +
        '<input id="email" type="email" required placeholder="you@firm.example" autocomplete="off" />' +
        '<button class="primary" id="btn" type="submit">Send magic link</button>' +
      '</form>' +
      '<p class="msg info" id="m"></p>';
    var form = document.getElementById('f');
    var btn = document.getElementById('btn');
    var m = document.getElementById('m');
    form.addEventListener('submit', function(e){
      e.preventDefault();
      var email = (document.getElementById('email').value || '').trim().toLowerCase();
      if(!email){ m.className='msg error'; m.textContent='Enter your email.'; return; }
      btn.disabled = true; m.className='msg info'; m.textContent='Sending…';
      sb.auth.signInWithOtp({
        email: email,
        options: { shouldCreateUser: false, emailRedirectTo: 'https://ailane.ai/auth/callback/' }
      }).then(function(res){
        btn.disabled = false;
        if(res.error){ m.className='msg error'; m.textContent = res.error.message || 'Sign-in failed. Check the address and try again.'; }
        else { m.className='msg ok'; m.textContent = 'Magic link sent. Check your inbox at ' + email + ' and follow the link to sign in.'; }
      }).catch(function(){ btn.disabled=false; m.className='msg error'; m.textContent='Unable to send right now. Please try again.'; });
    });
  }

  // Category grouping for the read-only W9 obligations checklist (LOVR P1a §4).
  var CHECKLIST_GROUPS = [
    { label: 'W9 Questions',   cats: ['w9-question'] },
    { label: 'Conditions',     cats: ['build', 'live-activation', 'licence-compliance'] },
    { label: 'Folded Tier-1',  cats: ['tier-1-folded'] }
  ];

  function statusLabel(s){
    switch(s){
      case 'open':           return 'Open';
      case 'in-progress':    return 'In progress';
      case 'satisfied':      return 'Satisfied';
      case 'blocked':        return 'Blocked';
      case 'not-applicable': return 'Not applicable';
      default:               return s || 'Open';
    }
  }

  function renderChecklistRow(row){
    var st = row.status || 'open';
    var hasDesc = !!(row.description && String(row.description).trim());
    var attrs = hasDesc ? ' tabindex="0" role="button" aria-expanded="false"' : '';
    return '<div class="cl-row' + (hasDesc ? ' has-desc' : '') + '"' + attrs + '>' +
        '<div class="cl-row-head">' +
          '<span class="cl-code">' + esc(row.code) + '</span>' +
          '<span class="cl-title">' + esc(row.title) + '</span>' +
          (hasDesc ? '<span class="cl-chevron" aria-hidden="true">&#9656;</span>' : '') +
          '<span class="cl-badge cl-badge-' + esc(st) + '">' + esc(statusLabel(st)) + '</span>' +
        '</div>' +
        (hasDesc ? '<div class="cl-desc">' + esc(row.description) + '</div>' : '') +
      '</div>';
  }

  // Returns the grouped section markup injected into the #checklist container (itself the .checklist element).
  function renderChecklist(rows){
    var html = '';
    CHECKLIST_GROUPS.forEach(function(group){
      var groupRows = rows.filter(function(r){ return group.cats.indexOf(r.category) !== -1; });
      if(groupRows.length === 0){ return; }
      html += '<section class="cl-group"><h2 class="cl-group-title">' + esc(group.label) + '</h2>';
      groupRows.forEach(function(r){ html += renderChecklistRow(r); });
      html += '</section>';
    });
    return html;
  }

  function wireChecklistExpanders(container){
    function toggle(rowEl){
      var open = rowEl.classList.toggle('open');
      rowEl.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    container.addEventListener('click', function(e){
      var rowEl = e.target.closest('.cl-row.has-desc');
      if(rowEl){ toggle(rowEl); }
    });
    container.addEventListener('keydown', function(e){
      if(e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar'){ return; }
      var rowEl = e.target.closest('.cl-row.has-desc');
      if(rowEl){ e.preventDefault(); toggle(rowEl); }
    });
  }

  // Read-only checklist fetch — reuses the page's session-bearer PostgREST pattern (RLS-scoped, anon key + access
  // token). No write path; no service key. Empty results or any fetch failure show the neutral "being populated"
  // line rather than an error (the Chairman seeds the checklist post-apply, §5).
  function loadChecklist(token){
    var el = document.getElementById('checklist');
    if(!el){ return; }
    var neutral = '<div class="checklist-empty">The W9 obligations checklist is being populated.</div>';
    fetch(SB_URL + '/rest/v1/lovr_obligation_checklist?select=obligation_id,code,title,description,category,status,display_order&order=display_order.asc,code.asc', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
    }).then(function(r){
      if(!r.ok){ throw new Error('checklist fetch ' + r.status); }
      return r.json();
    }).then(function(rows){
      if(!Array.isArray(rows) || rows.length === 0){ el.innerHTML = neutral; return; }
      el.innerHTML = renderChecklist(rows);
      wireChecklistExpanders(el);
    }).catch(function(err){
      if(window.console && console.warn){ console.warn('LOVR checklist unavailable:', err); }
      el.innerHTML = neutral;
    });
  }

  function renderWorkspace(firm, isAdmin, token){
    root.classList.add('workspace');
    root.innerHTML =
      '<div class="shell-status' + (isAdmin?' admin':'') + '"><span class="dot"></span>' + (isAdmin?'Administrator':'Authenticated') + '</div>' +
      '<h1>Legal Oversight Room</h1>' +
      '<p class="sub">' + esc(firm) + '</p>' +
      '<div id="checklist" class="checklist"><p class="msg info">Loading the W9 obligations checklist&hellip;</p></div>' +
      '<button type="button" class="linklike" id="out">Sign out</button>';
    document.getElementById('out').addEventListener('click', function(){
      sb.auth.signOut().then(function(){ window.location.reload(); });
    });
    loadChecklist(token);
  }

  (async function(){
    try{
      var g = await sb.auth.getSession();
      var session = g && g.data ? g.data.session : null;
      if(!session){ renderSignIn(); return; }

      var email = (session.user && session.user.email ? session.user.email : '').toLowerCase();
      var uid = session.user ? session.user.id : null;

      // Own-row allowlist check (raw fetch; anon key + the user's access token — RLS permits own row).
      var firm = null, isReviewer = false;
      try{
        var r = await fetch(SB_URL + '/rest/v1/legal_reviewer_contacts?user_id=eq.' + uid + '&status=eq.active&select=contact_id,firm_name', {
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + session.access_token, 'Accept': 'application/json' }
        });
        if(r.ok){ var rows = await r.json(); if(Array.isArray(rows) && rows.length>0){ isReviewer = true; firm = rows[0].firm_name; } }
      }catch(e){}

      if(isReviewer){ renderWorkspace(firm || 'Your firm', false, session.access_token); return; }
      if(email === DIRECTOR_EMAIL){ renderWorkspace('Director access — administrator view', true, session.access_token); return; }
      // Authenticated but neither a reviewer nor the Director.
      window.location.replace('/');
    }catch(e){
      renderSignIn();
    }
  })();
</script>

</body>
</html>
