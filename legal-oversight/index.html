<style>

    --text:#E6EDF6; --muted:#93A1B5; --muted-2:#6B7A90;
    --gold:#F59E0B; --gold-soft:rgba(245,158,11,.12); --cyan:#0EA5E9; --cyan-soft:rgba(14,165,233,.12);
    --green:#34D399; --green-soft:rgba(52,211,153,.12); --red:#F87171; --red-soft:rgba(248,113,113,.12);
    --grey:#94A3B8; --grey-soft:rgba(148,163,184,.12);

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px}

  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}

  .topbar .row{display:flex;align-items:center;gap:14px;height:62px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .name{font-weight:600;letter-spacing:.2px}
  .brand .sub{color:var(--muted);font-size:12.5px;border-left:1px solid var(--line);padding-left:11px;margin-left:3px}
  .spacer{flex:1}
  .who{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}
  .who .email{color:var(--text)}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:8px 13px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;
    transition:border-color .15s,background .15s}
  .btn:hover{border-color:#2b3a52;background:#142036}
  .btn.gold{background:var(--gold);color:#1a1205;border-color:var(--gold);font-weight:600}
  .btn.gold:hover{filter:brightness(1.05);background:var(--gold)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .btn:disabled{opacity:.55;cursor:default}

  .context{border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),transparent)}
  .context .row{padding:16px 0 18px}
  .context h1{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 4px;letter-spacing:.2px}
  .context p{margin:0;color:var(--muted);font-size:13.5px;max-width:880px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:4px 10px;background:var(--panel)}
  .tag b{color:var(--text);font-weight:600}

  .main{display:grid;grid-template-columns:340px 1fr;gap:26px;padding:26px 0 60px;align-items:start}
  @media (max-width:980px){.main{grid-template-columns:1fr}}

  .rail{position:sticky;top:78px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);overflow:hidden}

  .rail .head{padding:14px 16px;border-bottom:1px solid var(--line)}
  .rail .head .t{font-weight:600;font-size:14px}
  .rail .head .s{color:var(--muted);font-size:12px;margin-top:2px}
  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:11px 16px;border-bottom:1px solid var(--line-soft)}
  .rail .group{border-bottom:1px solid var(--line-soft)}
  .rail .group:last-child{border-bottom:none}
  .rail .gh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 16px;
    cursor:pointer;user-select:none}
  .rail .gh:hover{background:var(--panel-2)}
  .rail .gh .gt{font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}

  .obl .meta{min-width:0}
  .obl .ot{font-size:12.8px;line-height:1.35}
  .obl .ow{font-size:11px;color:var(--muted-2);margin-top:2px}

  .pill{flex:none;font-size:10.5px;font-weight:600;letter-spacing:.2px;padding:3px 8px;border-radius:999px;
    border:1px solid transparent;white-space:nowrap;text-transform:capitalize}
  .pill.dot{padding:3px 8px 3px 7px;display:inline-flex;align-items:center;gap:6px}
  .pill.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
  .st-satisfied{color:var(--green);background:var(--green-soft);border-color:rgba(52,211,153,.3)}
  .st-open{color:var(--gold);background:var(--gold-soft);border-color:rgba(245,158,11,.3)}

  .st-blocked{color:var(--red);background:var(--red-soft);border-color:rgba(248,113,113,.3)}
  .st-not-applicable{color:var(--grey);background:var(--grey-soft);border-color:rgba(148,163,184,.3)}

  .vault .vh .t{font-family:var(--serif);font-size:18px;font-weight:600}
  .vault .vh .c{color:var(--muted);font-size:12.5px}

  .card .actions{display:flex;gap:7px}

  .signin .sh p{color:var(--muted);font-size:12.8px;margin:0}

  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit}

  .msg.info{display:block;color:var(--muted);background:var(--panel-2);border:1px solid var(--line)}

  @keyframes sp{to{transform:rotate(360deg)}}

  .scrim{position:fixed;inset:0;background:rgba(4,8,15,.66);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .viewer{position:fixed;top:0;right:0;height:100%;width:min(860px,94vw);background:var(--panel-2);

    transition:transform .24s ease;display:flex;flex-direction:column}

  .viewer .vbar{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .viewer .vbar .vt{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.3}
  .viewer .vbar .vm{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .viewer .vbody{flex:1;min-height:0;overflow:auto;background:var(--ink)}
  .viewer .vactions{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line)}
  .viewer .vactions:empty{display:none}

  .vpad{padding:26px 28px;color:var(--muted)}

  .disclaimer{font-size:11px;color:var(--muted-2);padding:9px 18px;border-top:1px solid var(--line-soft)}

  footer{border-top:1px solid var(--line);background:var(--panel-2)}

  .hidden{display:none!important}

  .tabbar{border-bottom:1px solid var(--line);background:var(--panel-2)}
  .tabbar .wrap{display:flex;gap:4px}
  .tab{appearance:none;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);
    font-family:inherit;font-size:13.5px;font-weight:600;padding:14px 16px;cursor:pointer}

  .tab.active{color:var(--text);border-bottom-color:var(--gold)}

  .env-cell{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);padding:12px 14px}
  .env-cell .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2)}
  .env-cell .v{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:4px;color:var(--text)}
  .env-cell.target{border-color:rgba(245,158,11,.45)}
  .env-cell.target .v{color:var(--gold)}
  .note-line{font-size:12.5px;color:var(--muted);margin-top:12px;font-style:italic}
  .phase{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);margin-bottom:12px;overflow:hidden}
  .phase-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
  .phase-head .pl{font-weight:600;font-size:13.5px;color:var(--text)}
  .phase-head .po{font-size:11.5px;color:var(--muted);white-space:nowrap}
  .phase-docs{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
  .s1-doc{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:1px solid transparent}
  .s1-doc.clickable{cursor:pointer}
  .s1-doc.clickable:hover{background:var(--panel-2);border-color:var(--line)}
  .s1-doc.clickable:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .s1-doc .dn{flex:1;min-width:0;font-size:13px;color:var(--text)}
  .s1-doc .dk{font-size:11px;color:var(--muted-2)}
  .s1-doc .arrow{color:var(--cyan);font-size:12px;font-weight:600;white-space:nowrap}
  .tagb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .tagb.block{color:var(--red);background:var(--red-soft);border:1px solid rgba(248,113,113,.3)}
  .eileen{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-left:3px solid var(--cyan);
    border-radius:var(--radius-sm);background:linear-gradient(180deg,var(--cyan-soft),transparent);padding:16px}
  .eileen .ename{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--text)}
  .eileen .erole{font-size:13px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
  .creator-note{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap;
    border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);padding:14px 16px}
</style>

  // ---- Authed Surface 1 fetch + money formatter (pence → GBP) ----
  async function observe(payload){

    const r = await fetch(`${SUPABASE_URL}/functions/v1/${DEALROOM_FN}`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "apikey":SUPABASE_ANON_KEY, "Authorization":`Bearer ${session ? session.access_token : ""}` },
      body: JSON.stringify(payload)
    });
    if(!r.ok) throw new Error("observe "+r.status);
    return r.json();
  }
  const gbp = (p) => p==null ? "—" : (p>=100000000 ? "£"+(p/100/1e6).toFixed(2)+"M" : "£"+(p/100).toLocaleString("en-GB",{minimumFractionDigits:2}));

    openViewer();

    $("v-meta").innerHTML = docCode ? `<span style="color:var(--muted-2)">${esc(docCode)}</span>` : "";

  function statusPill(status){

  function renderChecklist(rows){
    const counts = rows.reduce((a,r)=>{a[r.status]=(a[r.status]||0)+1;return a;},{});
    const total = rows.length, sat = counts["satisfied"]||0;
    let html = `<div class="head"><div class="t">W9 review checklist</div>
      <div class="s">${total} obligations · ${sat} satisfied · ${total-sat} outstanding</div></div>
      <div class="legend">
        <span class="pill dot st-satisfied">Satisfied</span>
        <span class="pill dot st-open">Open</span>
        <span class="pill dot st-blocked">Blocked</span>
        <span class="pill dot st-not-applicable">N/A</span>
      </div>`;
    CHK_GROUPS.forEach((g,gi)=>{
      const items = rows.filter(r=>r.category===g.key);
      if(!items.length) return;
      const gid = "cg-"+gi;
      html += `<div class="group">
        <div class="gh" onclick="LOVR.toggle('${gid}')">
          <span class="gt">${esc(g.label)}</span><span class="ct">${items.length}</span></div>
        <div class="items" id="${gid}">` +
        items.map(it=>`<div class="obl">${statusPill(it.status)}
          <div class="meta"><div class="ot">${esc(it.title||it.code)}</div>
          <div class="ow">${esc(it.owner||"")}</div></div></div>`).join("") +
        `</div></div>`;
    });
    $("rail").innerHTML = html;
  }

  function renderVault(rows){
    const total = rows.length;
    let html = `<div class="vh"><div class="t">Document vault</div><div class="c">${total} artefacts</div></div>`;
    let shown = 0;
    GROUPS.forEach(g=>{
      const items = rows.filter(r=>r.category===g.key);
      if(!items.length) return;
      shown++;
      html += `<div class="section ${g.w9?"w9":""}">
        <div class="sh"><span class="bar"></span><span class="st">${esc(g.label)}</span>
          <span class="sc">${items.length}</span></div>
        <div class="cards">` +
        items.map(cardHtml).join("") + `</div></div>`;
    });
    if(!shown){
      html += `<div class="state"><div class="big">No documents available</div>
        <div>If your reviewer access is still being verified, the vault will populate once confirmed.</div></div>`;

    $("vault").innerHTML = html;

  function mdFrame(markdown){
    const inner = window.marked.parse(markdown||"");
    const doc = `<!doctype html><html><head><meta charset="utf-8">
      <style>
        body{margin:0;padding:30px 34px;background:#fff;color:#1f2733;
          font:15px/1.62 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;max-width:760px}

        h2{font-size:19px} h3{font-size:16px}
        p,li{font-size:15px} code{font-family:ui-monospace,Menlo,Consolas,monospace;background:#f3f5f8;padding:.1em .35em;border-radius:4px;font-size:13px}
        table{border-collapse:collapse;width:100%;margin:1em 0;font-size:13.5px}
        th,td{border:1px solid #dfe3ea;padding:7px 10px;text-align:left;vertical-align:top}
        th{background:#f6f8fb} hr{border:none;border-top:1px solid #e6e9ef;margin:1.6em 0}

        a{color:#0b69b8} em{color:#4a5568}
      </style></head><body>${inner}</body></html>`;
    return `<iframe sandbox srcdoc="${esc(doc)}" title="Document"></iframe>`;
  }

  async function open(artefactId, action){
    openViewer();
    $("v-title").textContent = "Opening…";
    $("v-meta").innerHTML = "";
    $("v-body").innerHTML = `<div class="vpad"><span class="spin"></span>Resolving artefact…</div>`;
    $("v-actions").innerHTML = "";
    try{
      const { data, error } = await sb.functions.invoke(RESOLVE_FN, { body:{ artefact_id:artefactId, action:action||"preview" } });
      if(error){
        let detail = error.message||"Error";
        try{ const ctx = await error.context?.json?.(); if(ctx&&(ctx.error||ctx.detail)) detail = (ctx.error||"")+(ctx.detail?" — "+ctx.detail:""); }catch(_e){}
        $("v-title").textContent = "Unable to open";
        $("v-body").innerHTML = `<div class="vpad"><div class="big">This artefact could not be opened</div><div>${esc(detail)}</div></div>`;
        return;
      }
      gtag('event','lovr_open_artefact',{ doc_code:data.doc_code, content_mode:data.content_mode });
      $("v-title").textContent = data.name || data.doc_code || "Artefact";
      const meta = [];
      if(data.version_label) meta.push(esc(data.version_label));
      if(data.content_source) meta.push(esc(SOURCE_CHIP[data.content_source]||data.content_source));
      if(data.doc_code) meta.push(`<span style="color:var(--muted-2)">${esc(data.doc_code)}</span>`);
      $("v-meta").innerHTML = meta.join(" · ");

      if(data.content_mode==="inline"){
        $("v-body").innerHTML = mdFrame(data.body_markdown);
      } else if(data.content_mode==="signed_url"){
        $("v-body").innerHTML = `<iframe class="docframe" src="${esc(data.signed_url)}" title="Document"></iframe>`;
        $("v-actions").innerHTML =
          `<button class="btn sm" onclick="window.open('${esc(data.signed_url)}','_blank','noopener')">Open in new tab</button>
           <button class="btn sm" onclick="LOVR.open('${esc(artefactId)}','download')">Download</button>`;
      } else if(data.content_mode==="url"){
        $("v-body").innerHTML = `<div class="vpad"><div class="big">${esc(data.name||"Published page")}</div>
          <div>This is a published page. It opens in a new browser tab.</div></div>`;
        $("v-actions").innerHTML = `<button class="btn gold sm" onclick="window.open('${esc(data.url)}','_blank','noopener')">Open page ↗</button>`;
      } else if(data.content_mode==="pending"){
        $("v-body").innerHTML = `<div class="vpad"><div class="big">Document pending upload</div>
          <div>${esc(data.detail||"The authoritative file for this artefact has not yet been uploaded to the vault.")}</div></div>`;
      } else {
        $("v-body").innerHTML = `<div class="vpad"><div class="big">Unsupported</div><div>${esc(String(JSON.stringify(data)).slice(0,300))}</div></div>`;
      }
    }catch(err){
      $("v-title").textContent = "Unable to open";
      $("v-body").innerHTML = `<div class="vpad"><div class="big">Unexpected error</div><div>${esc(err.message||"Error")}</div></div>`;
    }
  }

  window.LOVR = { open, openViewer, closeViewer, toggle, openDealDoc };
  document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeViewer(); });

  // Gate on load: session present → room; absent → sign-in. Also react to magic-link return.
  async function boot(){
    const { data:{ session } } = await sb.auth.getSession();
    session ? showRoom(session.user.email || "Signed in") : showGate();
  }
  sb.auth.onAuthStateChange((_e, session)=>{ setTimeout(()=>{ session ? showRoom(session.user.email || "Signed in") : showGate(); }, 0); });
  boot();
})();
</script>
</body>
</html>
