  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F1B35;
      --navy-mid: #1B2A4A;
      --navy-light: #243356;
      --teal: #0EA5E9;
      --white: #FFFFFF;
      --off-white: #F0F4FA;
      --grey-text: #94A3B8;
      --grey-border: #2A3A5C;
      --body-text: #CBD5E1;
      --danger: #EF4444;
      --success: #10B981;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--navy); color: var(--body-text);
      line-height: 1.7; display: flex; flex-direction: column; min-height: 100vh;
    }
    nav { background: rgba(15,27,53,0.97); border-bottom: 1px solid var(--grey-border); padding: 0 2rem; }
    .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--white); text-decoration: none; letter-spacing: -0.03em; }
    .nav-logo span { color: var(--teal); }
    .nav-tag { font-size: 0.78rem; color: var(--grey-text); text-transform: uppercase; letter-spacing: 0.1em; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card {
      width: 100%; max-width: 460px;
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid var(--grey-border); border-radius: 14px; padding: 2.5rem 2rem;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
    .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; color: var(--teal);
      text-transform: uppercase; letter-spacing: 0.1em; background: rgba(14,165,233,0.1);
      border: 1px solid rgba(14,165,233,0.25); padding: 0.25rem 0.7rem; border-radius: 20px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: var(--white); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .sub { font-size: 0.92rem; color: var(--grey-text); margin-bottom: 1.75rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--off-white); margin-bottom: 0.5rem; }
    input[type="email"] {
      width: 100%; padding: 0.8rem 0.9rem; font-size: 0.95rem; background: var(--navy);
      color: var(--white); border: 1px solid var(--grey-border); border-radius: 8px;
    }
    input:focus { outline: none; border-color: var(--teal); }
    button.primary {
      width: 100%; margin-top: 1.1rem; padding: 0.85rem; background: var(--teal); color: var(--white);
      font-size: 0.95rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s;
    }
    button.primary:hover { opacity: 0.92; }
    button.primary:disabled { opacity: 0.55; cursor: default; }
    .msg { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2em; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--success); }
    .msg.info { color: var(--grey-text); }
    .shell-status { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 600;
      color: var(--success); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
      padding: 0.3rem 0.8rem; border-radius: 20px; margin-bottom: 1.25rem; }
    .shell-status.admin { color: var(--teal); background: rgba(14,165,233,0.1); border-color: rgba(14,165,233,0.3); }
    .shell-status .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .shell-note { margin-top: 1.25rem; padding: 1rem 1.1rem; border-left: 3px solid var(--teal);
      background: rgba(14,165,233,0.06); border-radius: 0 8px 8px 0; font-size: 0.88rem; color: var(--body-text); }
    .linklike { margin-top: 1.5rem; background: none; border: none; color: var(--grey-text); font-size: 0.82rem;
      width: auto; padding: 0; text-decoration: underline; cursor: pointer; }
    .linklike:hover { color: var(--white); }
    footer { border-top: 1px solid var(--grey-border); background: var(--navy-mid); padding: 1.5rem 2rem; text-align: center; }
    .footer-legal { font-size: 0.78rem; color: var(--grey-text); line-height: 1.7; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="https://ailane.ai/" class="nav-logo">AIL<span>ANE</span></a>
    <span class="nav-tag">Legal Oversight Room</span>
  </div>
</nav>

<main><div id="root" class="card"></div></main>

<footer>
  <p class="footer-legal">
    &copy; 2026 AI Lane Limited &nbsp;&middot;&nbsp; Company No. 17035654 &nbsp;&middot;&nbsp; ICO Reg. No. 00013389720<br/>
    Ailane is a trading name of AI Lane Limited.
  </p>
</footer>

<script>
  // Thin client — anon Supabase client only; no secrets, no auth logic beyond the public anon key
  // (RULE 27). Mirrors the deal-room auth.js guard. Reviewers sign in by magic link routed through
  // /auth/callback/ (the central post-auth router), which then redirects active reviewers here.
  var SB_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
  var DIRECTOR_EMAIL = 'mark@ailane.ai';
  var sb = window.supabase.createClient(SB_URL, SB_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });
  var root = document.getElementById('root');

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderSignIn(){
    root.innerHTML =
      '<span class="badge">Restricted Access</span>' +
      '<h1>Legal Oversight Room</h1>' +
      '<p class="sub">Sign in to continue. A magic link will be sent to your registered email. Access is limited to invited legal reviewers.</p>' +
      '<form id="f" autocomplete="off">' +
        '<label for="email">Registered email</label>' +
        '<input id="email" type="email" required placeholder="you@firm.example" autocomplete="off" />' +
        '<button class="primary" id="btn" type="submit">Send magic link</button>' +
      '</form>' +
      '<p class="msg info" id="m"></p>';
    var form = document.getElementById('f');
    var btn = document.getElementById('btn');
    var m = document.getElementById('m');
    form.addEventListener('submit', function(e){
      e.preventDefault();
      var email = (document.getElementById('email').value || '').trim().toLowerCase();
      if(!email){ m.className='msg error'; m.textContent='Enter your email.'; return; }
      btn.disabled = true; m.className='msg info'; m.textContent='Sending…';
      sb.auth.signInWithOtp({
        email: email,
        options: { shouldCreateUser: false, emailRedirectTo: 'https://ailane.ai/auth/callback/' }
      }).then(function(res){
        btn.disabled = false;
        if(res.error){ m.className='msg error'; m.textContent = res.error.message || 'Sign-in failed. Check the address and try again.'; }
        else { m.className='msg ok'; m.textContent = 'Magic link sent. Check your inbox at ' + email + ' and follow the link to sign in.'; }
      }).catch(function(){ btn.disabled=false; m.className='msg error'; m.textContent='Unable to send right now. Please try again.'; });
    });
  }

  function renderWorkspace(firm, isAdmin){
    root.innerHTML =
      '<div class="shell-status' + (isAdmin?' admin':'') + '"><span class="dot"></span>' + (isAdmin?'Administrator':'Authenticated') + '</div>' +
      '<h1>Legal Oversight Room</h1>' +
      '<p class="sub">' + esc(firm) + '</p>' +
      '<div class="shell-note">Your workspace is being prepared. The artefact vault and review surfaces arrive in subsequent phases.</div>' +
      '<button type="button" class="linklike" id="out">Sign out</button>';
    document.getElementById('out').addEventListener('click', function(){
      sb.auth.signOut().then(function(){ window.location.reload(); });
    });
  }

  (async function(){
    try{
      var g = await sb.auth.getSession();
      var session = g && g.data ? g.data.session : null;
      if(!session){ renderSignIn(); return; }

      var email = (session.user && session.user.email ? session.user.email : '').toLowerCase();
      var uid = session.user ? session.user.id : null;

      // Own-row allowlist check (raw fetch; anon key + the user's access token — RLS permits own row).
      var firm = null, isReviewer = false;
      try{
        var r = await fetch(SB_URL + '/rest/v1/legal_reviewer_contacts?user_id=eq.' + uid + '&status=eq.active&select=contact_id,firm_name', {
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + session.access_token, 'Accept': 'application/json' }
        });
        if(r.ok){ var rows = await r.json(); if(Array.isArray(rows) && rows.length>0){ isReviewer = true; firm = rows[0].firm_name; } }
      }catch(e){}

      if(isReviewer){ renderWorkspace(firm || 'Your firm', false); return; }
      if(email === DIRECTOR_EMAIL){ renderWorkspace('Director access — administrator view', true); return; }
      // Authenticated but neither a reviewer nor the Director.
      window.location.replace('/');
    }catch(e){
      renderSignIn();
    }
  })();
</script>

</body>
</html>
