<style>
  :root{
    --ink:#0A0F1A; --panel:#111A2B; --panel-2:#0E1626; --line:#1E293B; --line-soft:#172033;
    --text:#E6EDF6; --muted:#93A1B5; --muted-2:#6B7A90;
    --gold:#F59E0B; --gold-soft:rgba(245,158,11,.12); --cyan:#0EA5E9; --cyan-soft:rgba(14,165,233,.12);
    --green:#34D399; --green-soft:rgba(52,211,153,.12); --red:#F87171; --red-soft:rgba(248,113,113,.12);
    --grey:#94A3B8; --grey-soft:rgba(148,163,184,.12);
    --radius:14px; --radius-sm:10px; --shadow:0 10px 30px rgba(0,0,0,.35);
    --serif:"Iowan Old Style",Palatino,"Palatino Linotype","Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px}
  a{color:var(--cyan);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}

  header.topbar{position:sticky;top:0;z-index:30;background:rgba(10,15,26,.86);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line)}
  .topbar .row{display:flex;align-items:center;gap:14px;height:62px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .name{font-weight:600;letter-spacing:.2px}
  .brand .sub{color:var(--muted);font-size:12.5px;border-left:1px solid var(--line);padding-left:11px;margin-left:3px}
  .spacer{flex:1}
  .who{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}
  .who .email{color:var(--text)}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:8px 13px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;
    transition:border-color .15s,background .15s}
  .btn:hover{border-color:#2b3a52;background:#142036}
  .btn.gold{background:var(--gold);color:#1a1205;border-color:var(--gold);font-weight:600}
  .btn.gold:hover{filter:brightness(1.05);background:var(--gold)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .btn:disabled{opacity:.55;cursor:default}

  .context{border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),transparent)}
  .context .row{padding:16px 0 18px}
  .context h1{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 4px;letter-spacing:.2px}
  .context p{margin:0;color:var(--muted);font-size:13.5px;max-width:880px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:4px 10px;background:var(--panel)}
  .tag b{color:var(--text);font-weight:600}
  .context .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);font-weight:700;margin-bottom:9px}

  /* Four-card nav grid (Documents / Deal Creator / Engagement Status / Pathway) */
  .navsec{padding:22px 0 4px}
  .nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media (max-width:1100px){.nav-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.nav-grid{grid-template-columns:1fr}}
  .nav-card{display:flex;flex-direction:column;gap:9px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);padding:18px 18px 16px;text-decoration:none;color:var(--text);
    transition:border-color .18s,transform .18s,box-shadow .18s}
  .nav-card:hover{border-color:rgba(14,165,233,.4);transform:translateY(-2px);box-shadow:0 12px 28px rgba(14,165,233,.10);text-decoration:none}
  .nav-card .ico{width:34px;height:34px;border-radius:9px;background:var(--cyan-soft);border:1px solid rgba(14,165,233,.3);
    color:var(--cyan);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:15px}
  .nav-card .nt{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text)}
  .nav-card .nd{font-size:12.5px;color:var(--muted);line-height:1.5;flex:1}
  .nav-card .nm{font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.03em}

  .main{display:grid;grid-template-columns:340px 1fr;gap:26px;padding:26px 0 60px;align-items:start}
  @media (max-width:980px){.main{grid-template-columns:1fr}}

  .rail{position:sticky;top:78px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);overflow:hidden}
  @media (max-width:980px){.rail{position:static}}
  .rail .head{padding:14px 16px;border-bottom:1px solid var(--line)}
  .rail .head .t{font-weight:600;font-size:14px}
  .rail .head .s{color:var(--muted);font-size:12px;margin-top:2px}
  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:11px 16px;border-bottom:1px solid var(--line-soft)}
  .rail .group{border-bottom:1px solid var(--line-soft)}
  .rail .group:last-child{border-bottom:none}
  .rail .gh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 16px;
    cursor:pointer;user-select:none}
  .rail .gh:hover{background:var(--panel-2)}
  .rail .gh .gt{font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}
  .rail .gh .ct{font-size:11px;color:var(--muted-2)}
  .rail .items{padding:2px 10px 10px}
  .rail .items.collapsed{display:none}
  .obl{display:flex;gap:9px;align-items:flex-start;padding:8px 8px;border-radius:8px}
  .obl:hover{background:var(--panel-2)}
  .obl .meta{min-width:0}
  .obl .ot{font-size:12.8px;line-height:1.35}
  .obl .ow{font-size:11px;color:var(--muted-2);margin-top:2px}

  .pill{flex:none;font-size:10.5px;font-weight:600;letter-spacing:.2px;padding:3px 8px;border-radius:999px;
    border:1px solid transparent;white-space:nowrap;text-transform:capitalize}
  .pill.dot{padding:3px 8px 3px 7px;display:inline-flex;align-items:center;gap:6px}
  .pill.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
  .st-satisfied{color:var(--green);background:var(--green-soft);border-color:rgba(52,211,153,.3)}
  .st-open{color:var(--gold);background:var(--gold-soft);border-color:rgba(245,158,11,.3)}
  .st-in-progress{color:var(--cyan);background:var(--cyan-soft);border-color:rgba(14,165,233,.3)}
  .st-blocked{color:var(--red);background:var(--red-soft);border-color:rgba(248,113,113,.3)}
  .st-not-applicable{color:var(--grey);background:var(--grey-soft);border-color:rgba(148,163,184,.3)}

  .vault .vh{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 2px 14px}
  .vault .vh .t{font-family:var(--serif);font-size:18px;font-weight:600}
  .vault .vh .c{color:var(--muted);font-size:12.5px}
  .section{margin-bottom:26px}
  .section > .sh{display:flex;align-items:center;gap:10px;margin:0 2px 11px}
  .section > .sh .bar{width:3px;height:16px;border-radius:2px;background:var(--gold)}
  .section.w9 > .sh .bar{background:var(--cyan)}
  .section.consti > .sh .bar{background:var(--green)}
  .section > .sh .st{font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text)}
  .section > .sh .sc{font-size:11.5px;color:var(--muted-2)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);
    padding:14px 14px 12px;display:flex;flex-direction:column;gap:9px;transition:border-color .15s}
  .card:hover{border-color:#2b3a52}
  .card .ct{font-weight:600;font-size:14px;line-height:1.3}
  .card .cd{color:var(--muted);font-size:12.5px;line-height:1.45;flex:1}
  .card .cf{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px}
  .chip{font-size:10.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 8px;
    display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .chip .vd{color:var(--muted-2)}
  .card .actions{display:flex;gap:7px}

  .gate{min-height:64vh;display:flex;align-items:center;justify-content:center;padding:40px 0}
  .signin{width:100%;max-width:400px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
  .signin .sh{padding:22px 24px 6px;text-align:center}
  .signin .sh .nx{margin:0 auto 12px}
  .signin .sh h2{font-family:var(--serif);font-size:19px;margin:0 0 4px}
  .signin .sh p{color:var(--muted);font-size:12.8px;margin:0}
  .signin form{padding:18px 24px 8px;display:flex;flex-direction:column;gap:11px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--cyan)}
  .signin .foot{padding:6px 24px 22px;color:var(--muted-2);font-size:11.5px;text-align:center}
  .msg{font-size:12.5px;padding:9px 12px;border-radius:var(--radius-sm);display:none}
  .msg.err{display:block;color:var(--red);background:var(--red-soft);border:1px solid rgba(248,113,113,.3)}
  .msg.info{display:block;color:var(--muted);background:var(--panel-2);border:1px solid var(--line)}

  .state{border:1px dashed var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted)}
  .state .big{font-size:15px;color:var(--text);margin-bottom:6px;font-weight:600}
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--cyan);border-radius:50%;
    display:inline-block;animation:sp .8s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .scrim{position:fixed;inset:0;background:rgba(4,8,15,.66);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .viewer{position:fixed;top:0;right:0;height:100%;width:min(860px,94vw);background:var(--panel-2);
    z-index:41;border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(100%);
    transition:transform .24s ease;display:flex;flex-direction:column}
  .viewer.open{transform:translateX(0)}
  .viewer .vbar{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .viewer .vbar .vt{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.3}
  .viewer .vbar .vm{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .viewer .vbody{flex:1;min-height:0;overflow:auto;background:var(--ink)}
  .viewer .vactions{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line)}
  .viewer .vactions:empty{display:none}
  .viewer iframe{width:100%;height:100%;border:0;background:#fff;display:block}
  .docframe{width:100%;height:100%;border:0;display:block}
  .vpad{padding:26px 28px;color:var(--muted)}
  .vpad .big{font-size:15px;color:var(--text);font-weight:600;margin-bottom:8px}
  .disclaimer{font-size:11px;color:var(--muted-2);padding:9px 18px;border-top:1px solid var(--line-soft)}

  footer{border-top:1px solid var(--line);background:var(--panel-2)}
  footer .row{padding:22px 0 30px;color:var(--muted-2);font-size:12px;display:flex;flex-direction:column;gap:6px}
  footer .row .l1{color:var(--muted)}
  .hidden{display:none!important}

  /* ---- Deal-room demonstration primitives (now rendered on the sub-pages) ---- */
  .s1{padding:24px 0 60px}
  .synthetic-banner{position:sticky;top:62px;z-index:20;display:flex;gap:10px;align-items:flex-start;
    margin:0 0 22px;padding:12px 16px;border:1px solid rgba(245,158,11,.45);
    background:rgba(34,27,8,.97);backdrop-filter:saturate(140%) blur(4px);
    border-radius:var(--radius-sm);color:#f6d49a;font-size:13px;line-height:1.5}
  .synthetic-banner b{color:var(--gold)}
  .synthetic-banner > span{color:var(--gold);font-size:15px;line-height:1.2;flex:none}
  .kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .kv .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2);margin-bottom:3px}
  .kv .v{font-size:13.5px;color:var(--text)}
  .ladder{width:100%;border-collapse:collapse;font-size:13px;margin-top:2px}
  .ladder th,.ladder td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  .ladder th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2);font-weight:600}
  .ladder td.num,.ladder th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ladder .enrich{font-size:10px;color:var(--cyan);border:1px solid rgba(14,165,233,.3);background:var(--cyan-soft);
    border-radius:999px;padding:1px 7px;margin-left:7px;white-space:nowrap}
  .md{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .mods{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
  .mods li{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:9px 12px;
    border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel)}
  .mods .mn{font-size:13px;color:var(--text)}
  .mods .mv{font-variant-numeric:tabular-nums;color:var(--gold);font-weight:600;white-space:nowrap}
  .envelope{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
  .env-cell{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);padding:12px 14px}
  .env-cell .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2)}
  .env-cell .v{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:4px;color:var(--text)}
  .env-cell.target{border-color:rgba(245,158,11,.45)}
  .env-cell.target .v{color:var(--gold)}
  .note-line{font-size:12.5px;color:var(--muted);margin-top:12px;font-style:italic}
  .phase{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);margin-bottom:12px;overflow:hidden}
  .phase-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
  .phase-head .pl{font-weight:600;font-size:13.5px;color:var(--text)}
  .phase-head .po{font-size:11.5px;color:var(--muted);white-space:nowrap}
  .phase-docs{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
  .s1-doc{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:1px solid transparent}
  .s1-doc.clickable{cursor:pointer}
  .s1-doc.clickable:hover{background:var(--panel-2);border-color:var(--line)}
  .s1-doc.clickable:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .s1-doc .dn{flex:1;min-width:0;font-size:13px;color:var(--text)}
  .s1-doc .dk{font-size:11px;color:var(--muted-2)}
  .s1-doc .arrow{color:var(--cyan);font-size:12px;font-weight:600;white-space:nowrap}
  .tagb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .tagb.block{color:var(--red);background:var(--red-soft);border:1px solid rgba(248,113,113,.3)}
  .eileen{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-left:3px solid var(--cyan);
    border-radius:var(--radius-sm);background:linear-gradient(180deg,var(--cyan-soft),transparent);padding:16px}
  .eileen .ename{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--text)}
  .eileen .erole{font-size:13px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
  .creator-note{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap;
    border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);padding:14px 16px}

  /* ---- Ask Eileen — reviewer chat panel (baseline cyan; no tier gold here) ---- */
  .eileen-fab{position:fixed;right:20px;bottom:20px;z-index:35;display:inline-flex;align-items:center;gap:9px;
    padding:11px 16px 11px 13px;border-radius:999px;border:1px solid rgba(14,165,233,.45);
    background:linear-gradient(180deg,#10243a,#0d1b2c);color:var(--text);font-family:inherit;font-size:13.5px;
    font-weight:600;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s,transform .12s}
  .eileen-fab:hover{border-color:var(--cyan);transform:translateY(-1px)}
  .eileen-panel{position:fixed;right:20px;bottom:20px;z-index:36;width:min(400px,calc(100vw - 40px));
    height:min(620px,calc(100vh - 96px));display:flex;flex-direction:column;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .ep-head{display:flex;align-items:center;gap:11px;padding:13px 14px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--cyan-soft),transparent)}
  .ep-id{flex:1;min-width:0}
  .ep-name{font-weight:600;font-size:14px;color:var(--text)}
  .ep-sub{font-size:11px;color:var(--muted)}
  .ep-close{appearance:none;background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:13px;line-height:1}
  .ep-close:hover{color:var(--text);border-color:#2b3a52}
  .ep-body{flex:1;min-height:0;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .ep-intro{font-size:12.5px;color:var(--muted);line-height:1.5;border:1px dashed var(--line);
    border-radius:var(--radius-sm);padding:11px 12px;background:var(--panel-2)}
  .ep-msg{max-width:88%;font-size:13px;line-height:1.5;border-radius:12px;padding:9px 12px;overflow-wrap:anywhere}
  .ep-user{align-self:flex-end;background:var(--panel-2);border:1px solid var(--line);color:var(--text);white-space:pre-wrap}
  .ep-eileen{align-self:flex-start;background:var(--cyan-soft);border:1px solid rgba(14,165,233,.3);color:var(--text)}
  .ep-error{align-self:flex-start;background:var(--red-soft);border:1px solid rgba(248,113,113,.3);color:var(--red)}
  .ep-eileen > :first-child{margin-top:0}
  .ep-eileen > :last-child{margin-bottom:0}
  .ep-eileen p{margin:.5em 0}
  .ep-eileen ul,.ep-eileen ol{margin:.5em 0;padding-left:1.3em}
  .ep-eileen li{margin:.2em 0}
  .ep-eileen code{font-family:var(--mono);background:rgba(148,163,184,.16);padding:.1em .35em;border-radius:4px;font-size:12px}
  .ep-eileen pre{background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto}
  .ep-eileen pre code{background:none;padding:0}
  .ep-eileen a{color:var(--cyan)}
  .ep-eileen table{border-collapse:collapse;width:100%;margin:.5em 0;font-size:12px}
  .ep-eileen th,.ep-eileen td{border:1px solid var(--line);padding:5px 8px;text-align:left}
  .ep-eileen blockquote{border-left:3px solid var(--cyan);margin:.5em 0;padding:.1em 0 .1em 12px;color:var(--muted)}
  .ep-eileen h1,.ep-eileen h2,.ep-eileen h3,.ep-eileen h4{font-size:14px;margin:.6em 0 .3em;color:var(--text)}
  .ep-typing{align-self:flex-start;display:inline-flex;gap:5px;padding:11px 13px;border-radius:12px;
    background:var(--cyan-soft);border:1px solid rgba(14,165,233,.3)}
  .ep-typing span{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:epb 1s infinite}
  .ep-typing span:nth-child(2){animation-delay:.18s}
  .ep-typing span:nth-child(3){animation-delay:.36s}
  @keyframes epb{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .ep-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);align-items:flex-end}
  .ep-input textarea{flex:1;resize:none;max-height:120px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);border-radius:10px;padding:9px 11px;font-family:inherit;font-size:13px;line-height:1.4}
  .ep-input textarea:focus{outline:none;border-color:var(--cyan)}
  .ep-send{flex:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--cyan);background:var(--cyan);
    color:#04121d;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .ep-send:hover{filter:brightness(1.06)}
  .ep-send:disabled{opacity:.5;cursor:default}
  .ep-foot{font-size:10.5px;color:var(--muted-2);padding:8px 12px 11px;border-top:1px solid var(--line-soft);text-align:center}
  @media (max-width:520px){
    .eileen-panel{right:0;bottom:0;width:100vw;height:100vh;border-radius:0}
    .eileen-fab{right:14px;bottom:14px}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="nexus" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="11" fill="none" stroke="#0EA5E9" stroke-width="1.2" opacity=".55"/>
    <line x1="20" y1="20" x2="31" y2="11" stroke="#0EA5E9" stroke-width="1" opacity=".4"/>
    <line x1="20" y1="20" x2="9"  y2="13" stroke="#0EA5E9" stroke-width="1" opacity=".4"/>
    <line x1="20" y1="20" x2="28" y2="31" stroke="#0EA5E9" stroke-width="1" opacity=".4"/>
    <circle cx="31" cy="11" r="1.8" fill="#0EA5E9"/>
    <circle cx="9"  cy="13" r="1.8" fill="#0EA5E9"/>
    <circle cx="28" cy="31" r="1.8" fill="#0EA5E9"/>
    <circle cx="20" cy="20" r="4.4" fill="#F59E0B"/>
  </symbol>
</svg>

<div id="app"></div>

<div class="scrim" id="scrim" onclick="LOVR.closeViewer()"></div>
<aside class="viewer" id="viewer" aria-hidden="true">
  <div class="vbar">
    <svg width="30" height="30" aria-hidden="true"><use href="#nexus"/></svg>
    <div style="flex:1;min-width:0">
      <div class="vt" id="v-title">—</div>
      <div class="vm" id="v-meta"></div>
    </div>
    <button class="btn ghost sm" onclick="LOVR.closeViewer()" aria-label="Close">Close ✕</button>
  </div>
  <div class="vbody" id="v-body"></div>
  <div class="vactions" id="v-actions"></div>
  <div class="disclaimer">This material is provided for professional review under the Reviewer Access Agreement. It is regulatory intelligence, not legal advice, and is confidential to AI Lane Limited.</div>
</aside>

<!-- Ask Eileen — reviewer chat panel. Reuses the page magic-link session (RULE 27); no second client, no stored history. -->
<button class="eileen-fab hidden" id="eileen-fab" type="button" aria-label="Ask Eileen" aria-expanded="false">
  <svg width="22" height="22" aria-hidden="true"><use href="#nexus"/></svg>
  <span>Ask Eileen</span>
</button>
<section class="eileen-panel hidden" id="eileen-panel" role="dialog" aria-label="Eileen" aria-hidden="true">
  <header class="ep-head">
    <svg width="28" height="28" aria-hidden="true"><use href="#nexus"/></svg>
    <div class="ep-id">
      <div class="ep-name">Eileen</div>
      <div class="ep-sub">Legal Oversight Room</div>
    </div>
    <button class="ep-close" id="eileen-close" type="button" aria-label="Close">&#10005;</button>
  </header>
  <div class="ep-body" id="eileen-body" aria-live="polite"></div>
  <form class="ep-input" id="eileen-form">
    <textarea id="eileen-text" rows="1" placeholder="Ask Eileen about the vault or the W9 checklist&hellip;" aria-label="Message to Eileen"></textarea>
    <button class="ep-send" id="eileen-send" type="submit" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l18-8-8 18-2-7-8-3z" fill="currentColor"/></svg>
    </button>
  </form>
  <div class="ep-foot">Eileen provides regulatory intelligence, not legal advice.</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
(function(){
  "use strict";

  // Public client values. SUPABASE_URL is the stable project URL.
  // CC: replace __AILANE_SUPABASE_ANON_KEY__ with the anon key already present
  // in the live deployed legal-oversight/index.html (do not invent one).
  const SUPABASE_URL = "https://cnbsxwtvazfvzmltkuvx.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g";
  const RESOLVE_FN = "lovr-vault-resolve";
  const DEALROOM_FN = "lovr-dealroom-observe";
  const EILEEN_FN = "eileen-legal";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });

  // Room state — the authed landing surface IS the Vault hub (no tab bar).
  let roomMounted = false, vaultCache = null;
  // Ask Eileen chat — full conversation kept in-memory only (no localStorage/sessionStorage).
  let eileenMessages = [], eileenBusy = false, eileenError = null;

  // Vault grouping — Constitutional-led order (§4 Option B / §7-D2). The
  // 'constitutional' category is created by the Option B migration; until those
  // rows are re-categorised the group is simply empty and skipped by renderVault.
  const GROUPS = [
    { key:"constitutional",          label:"Constitutional & founding documents", w9:false, consti:true },
    { key:"baseline",                label:"Baseline compliance instruments", w9:false },
    { key:"w9a",                     label:"W9(a) — Anonymisation sufficiency", w9:true },
    { key:"w9b",                     label:"W9(b) — Article 14 transparency", w9:true },
    { key:"w9c",                     label:"W9(c) — Computational-analysis licence", w9:true },
    { key:"room-instrument",         label:"Room instruments", w9:false },
    { key:"commercial-instruments",  label:"Commercial & data-processing instruments", w9:false },
    { key:"public-facing",           label:"Public-facing documents", w9:false },
  ];
  const CHK_GROUPS = [
    { key:"w9-question",        label:"W9 questions for counsel" },
    { key:"build",             label:"Build controls" },
    { key:"live-activation",   label:"Live-activation conditions" },
    { key:"licence-compliance",label:"Licence compliance" },
    { key:"tier-1-folded",     label:"Folded Tier-1 questions" },
  ];
  const SOURCE_CHIP = {
    "content-store":"In-room note", "template-pack":"Operative template",
    "live-url":"Published page", "external-url":"External", "storage":"Document",
    "dealroom-render":"Rendered", "document-estate":"Estate"
  };
  const STATUS_LABEL = { "satisfied":"Satisfied","open":"Open","in-progress":"In progress","blocked":"Blocked","not-applicable":"N/A" };

  const esc = (s) => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const $ = (id) => document.getElementById(id);

  function renderGate(prefillInfo){
    $("app").innerHTML = `
      <header class="topbar"><div class="wrap"><div class="row">
        <div class="brand"><svg width="26" height="26"><use href="#nexus"/></svg>
          <span class="name">Ailane</span>
          <span class="sub">Legal Oversight &amp; Vault Room</span></div>
      </div></div></header>
      <div class="wrap"><div class="gate"><div class="signin">
        <div class="sh">
          <svg class="nx" width="46" height="46"><use href="#nexus"/></svg>
          <h2>Restricted access</h2>
          <p>Verified reviewers and the Director only.</p>
        </div>
        <form id="signin-form" autocomplete="on">
          <div class="msg ${prefillInfo?"info":""}" id="signin-msg">${prefillInfo?esc(prefillInfo):""}</div>
          <div class="field"><label for="em">Email</label>
            <input id="em" type="email" inputmode="email" autocomplete="email" required placeholder="you@firm.example" /></div>
          <button class="btn gold" id="signin-btn" type="submit" style="width:100%;margin-top:4px">Send sign-in link</button>
        </form>
        <div class="foot">Access is by invitation. A secure sign-in link is sent to your registered email. This room is confidential to AI Lane Limited and governed by AILANE-AMD-REG-001.</div>
      </div></div></div>`;
    $("signin-form").addEventListener("submit", onSendLink);
  }

  // Sign-in: email only — magic link, no password, no self-signup (RULE 27; SRA enforced server-side).
  async function sendMagicLink(email){
    const { error } = await sb.auth.signInWithOtp({
      email: email.trim().toLowerCase(),
      options: { shouldCreateUser: false, emailRedirectTo: 'https://ailane.ai/legal-oversight/' }
    });
    return error
      ? { ok:false, msg:'We could not start sign-in for that address. Access is by invitation; please use the email your invitation was sent to.' }
      : { ok:true, msg:'Check your email — we have sent a secure sign-in link. It opens this room directly.' };
  }

  async function onSendLink(e){
    e.preventDefault();
    const btn = $("signin-btn"), msg = $("signin-msg"), email = $("em").value;
    if(!email.trim()){ msg.className="msg err"; msg.textContent="Enter your email."; return; }
    btn.disabled = true; btn.textContent = "Sending…"; msg.className="msg";
    try{
      const res = await sendMagicLink(email);
      msg.className = "msg "+(res.ok?"info":"err");
      msg.textContent = res.msg;
      if(res.ok) gtag('event','lovr_magiclink_sent');
    }catch(_e){
      msg.className="msg err"; msg.textContent="Unable to send right now. Please try again.";
    }
    btn.disabled = false; btn.textContent = "Send sign-in link";
  }

  function shell(email){
    $("app").innerHTML = `
      <header class="topbar"><div class="wrap"><div class="row">
        <div class="brand"><svg width="26" height="26"><use href="#nexus"/></svg>
          <span class="name">Ailane</span><span class="sub">Legal Oversight &amp; Vault Room</span></div>
        <div class="spacer"></div>
        <div class="who"><span class="email">${esc(email)}</span>
          <button class="btn sm ghost" id="signout">Sign out</button></div>
      </div></div></header>
      <div id="surface"></div>
      <footer><div class="wrap"><div class="row">
        <span class="l1">AI Lane Limited · trading as Ailane · Company No. 17035654 · ICO Reg. No. 00013389720 · England &amp; Wales</span>
        <span>Governed by AILANE-AMD-REG-001. Confidential. Provided to verified reviewers under the Reviewer Access Agreement. Regulatory intelligence, not legal advice.</span>
      </div></div></footer>`;
    $("signout").addEventListener("click", signOut);
  }

  function showRoom(email){
    if(roomMounted) return;
    roomMounted = true;
    shell(email);
    renderVaultHub();
    eileenReveal(true);
  }
  function showGate(){
    roomMounted = false; vaultCache = null;
    eileenReset();
    renderGate();
  }
  async function signOut(){ try{ await sb.auth.signOut(); }catch(_e){} showGate(); }

  // ===========================================================================
  // Vault hub — the authed landing surface (no tab bar). Hero + W9 context,
  // then the four-card nav grid (cards ABOVE the register, §7-D1), then the
  // document vault + W9 review checklist (loader behaviour unchanged).
  // ===========================================================================
  function navGrid(){
    const cards = [
      ["documents","D","Documents","Every artefact in the room, grouped as in the Vault. Open inline or download.","Registry-driven · walkthrough view"],
      ["deal-creator","C","Deal Creator","Compose the demonstration configuration and read its deterministic indicative envelope.","Synthetic demonstration · no live quote"],
      ["status","S","Engagement Status","Phase and gate progression for the demonstration engagement.","Synthetic demonstration · read-only"],
      ["pathway","P","Pathway","The engagement pathway summary and interactive diagram.","Phase by phase"]
    ];
    return `<div class="nav-grid">`+ cards.map(([slug,ico,t,d,m])=>
      `<a class="nav-card" href="/legal-oversight/${esc(slug)}/">
        <div class="ico">${esc(ico)}</div><div class="nt">${esc(t)}</div>
        <div class="nd">${esc(d)}</div><div class="nm">${esc(m)}</div></a>`).join("") +`</div>`;
  }

  function renderVaultHub(){
    $("surface").innerHTML = `
      <section class="context"><div class="wrap"><div class="row">
        <div class="eyebrow">Reviewer workspace</div>
        <h1>Legal Oversight Document Room</h1>
        <p>This room gives the reviewing solicitor the documents and the open questions for the descoped W9 review of Engine 2 (institutional data licensing). The room <b>captures</b> your review and sign-off; it does not certify. All material is regulatory intelligence, not legal advice.</p>
        <div class="pills">
          <span class="tag"><b>Entity</b> AI Lane Limited · 17035654</span>
          <span class="tag"><b>ICO</b> 00013389720</span>
          <span class="tag"><b>Scope</b> W9(a) anonymisation · W9(b) Article 14 · W9(c) licence</span>
          <span class="tag"><b>Basis</b> AMD-159 · three-track model</span>
        </div>
      </div></div></section>
      <div class="wrap">
        <section class="navsec">${navGrid()}</section>
        <div class="main">
        <aside class="rail" id="rail"><div class="head"><div class="t">W9 review checklist</div>
          <div class="s"><span class="spin"></span>Loading…</div></div></aside>
        <div class="vault" id="vault"><div class="state"><span class="spin"></span>Loading the document vault…</div></div>
      </div></div>`;
    loadVault();
  }

  async function loadVault(){
    if(vaultCache){ renderChecklist(vaultCache.chk); renderVault(vaultCache.reg); return; }
    try{
      const [reg, chk] = await Promise.all([
        sb.from("lovr_artefact_registry").select("artefact_id,doc_code,title,summary,category,constitutional_domain,content_source,version_label,disclaimer_tier,display_order,status").eq("status","active").order("display_order",{ascending:true}),
        sb.from("lovr_obligation_checklist").select("obligation_id,code,title,description,category,status,owner,display_order").order("display_order",{ascending:true})
      ]);
      if(reg.error) throw reg.error;
      const regRows = reg.data||[], chkRows = chk.error?[]:(chk.data||[]);
      vaultCache = { reg: regRows, chk: chkRows };
      renderChecklist(chkRows);
      renderVault(regRows);
    }catch(err){
      $("vault").innerHTML = `<div class="state"><div class="big">Unable to load the vault</div>
        <div>${esc(err.message||"Error")}. If your reviewer access is still being verified, it will appear here once confirmed.</div></div>`;
      $("rail").innerHTML = `<div class="head"><div class="t">W9 review checklist</div><div class="s">Unavailable</div></div>`;
    }
  }

  // ===========================================================================
  // Deal-room demonstration renderers migrated to the sub-pages (§3.4):
  //   deal-creator/  — composer overview + indicative pricing + Eileen note
  //   status/        — engagement overview + phase & gate board
  //   pathway/       — pathway summary + interactive diagram
  // The hub renders no deal surface; the Vault is the authoritative register.
  // ===========================================================================

  function statusPill(status){
    const cls = "st-"+String(status||"open").replace(/\s+/g,"-");
    return `<span class="pill dot ${cls}">${esc(STATUS_LABEL[status]||status||"—")}</span>`;
  }

  function renderChecklist(rows){
    const counts = rows.reduce((a,r)=>{a[r.status]=(a[r.status]||0)+1;return a;},{});
    const total = rows.length, sat = counts["satisfied"]||0;
    let html = `<div class="head"><div class="t">W9 review checklist</div>
      <div class="s">${total} obligations · ${sat} satisfied · ${total-sat} outstanding</div></div>
      <div class="legend">
        <span class="pill dot st-satisfied">Satisfied</span>
        <span class="pill dot st-open">Open</span>
        <span class="pill dot st-blocked">Blocked</span>
        <span class="pill dot st-not-applicable">N/A</span>
      </div>`;
    CHK_GROUPS.forEach((g,gi)=>{
      const items = rows.filter(r=>r.category===g.key);
      if(!items.length) return;
      const gid = "cg-"+gi;
      html += `<div class="group">
        <div class="gh" onclick="LOVR.toggle('${gid}')">
          <span class="gt">${esc(g.label)}</span><span class="ct">${items.length}</span></div>
        <div class="items" id="${gid}">` +
        items.map(it=>`<div class="obl">${statusPill(it.status)}
          <div class="meta"><div class="ot">${esc(it.title||it.code)}</div>
          <div class="ow">${esc(it.owner||"")}</div></div></div>`).join("") +
        `</div></div>`;
    });
    $("rail").innerHTML = html;
  }

  function renderVault(rows){
    const total = rows.length;
    let html = `<div class="vh"><div class="t">Document vault</div><div class="c">${total} artefacts</div></div>`;
    let shown = 0;
    GROUPS.forEach(g=>{
      const items = rows.filter(r=>r.category===g.key);
      if(!items.length) return;
      shown++;
      html += `<div class="section ${g.consti?"consti":(g.w9?"w9":"")}">
        <div class="sh"><span class="bar"></span><span class="st">${esc(g.label)}</span>
          <span class="sc">${items.length}</span></div>
        <div class="cards">` +
        items.map(cardHtml).join("") + `</div></div>`;
    });
    if(!shown){
      html += `<div class="state"><div class="big">No documents available</div>
        <div>If your reviewer access is still being verified, the vault will populate once confirmed.</div></div>`;
    }
    $("vault").innerHTML = html;
  }

  function cardHtml(r){
    const isDoc = r.content_source==="storage";
    const isUrl = r.content_source==="live-url"||r.content_source==="external-url";
    const verb = isUrl ? "Open page" : "Open";
    let actions = `<button class="btn gold sm" onclick="LOVR.open('${r.artefact_id}','preview')">${verb}</button>`;
    if(isDoc) actions += `<button class="btn sm" onclick="LOVR.open('${r.artefact_id}','download')">Download</button>`;
    return `<div class="card">
      <div class="ct">${esc(r.title)}</div>
      <div class="cd">${esc(r.summary||"")}</div>
      <div class="cf">
        <span class="chip">${esc(SOURCE_CHIP[r.content_source]||r.content_source)}${r.version_label?` · <span class="vd">${esc(r.version_label)}</span>`:""}</span>
        <span class="actions">${actions}</span>
      </div></div>`;
  }

  function openViewer(){ $("scrim").classList.add("open"); $("viewer").classList.add("open"); $("viewer").setAttribute("aria-hidden","false"); }
  function closeViewer(){ $("scrim").classList.remove("open"); $("viewer").classList.remove("open"); $("viewer").setAttribute("aria-hidden","true"); $("v-body").innerHTML=""; $("v-actions").innerHTML=""; }
  function toggle(id){ const el=$(id); if(el) el.classList.toggle("collapsed"); }

  function mdFrame(markdown){
    const inner = window.marked.parse(markdown||"");
    const doc = `<!doctype html><html><head><meta charset="utf-8">
      <style>
        body{margin:0;padding:30px 34px;background:#fff;color:#1f2733;
          font:15px/1.62 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;max-width:760px}
        h1,h2,h3{font-family:Georgia,"Times New Roman",serif;color:#0f1722;line-height:1.25;margin:1.4em 0 .5em}
        h1{font-size:24px;border-bottom:1px solid #e6e9ef;padding-bottom:.3em}
        h2{font-size:19px} h3{font-size:16px}
        p,li{font-size:15px} code{font-family:ui-monospace,Menlo,Consolas,monospace;background:#f3f5f8;padding:.1em .35em;border-radius:4px;font-size:13px}
        table{border-collapse:collapse;width:100%;margin:1em 0;font-size:13.5px}
        th,td{border:1px solid #dfe3ea;padding:7px 10px;text-align:left;vertical-align:top}
        th{background:#f6f8fb} hr{border:none;border-top:1px solid #e6e9ef;margin:1.6em 0}
        blockquote{border-left:3px solid #d8a23a;margin:1em 0;padding:.2em 0 .2em 14px;color:#5b6470}
        a{color:#0b69b8} em{color:#4a5568}
      </style></head><body>${inner}</body></html>`;
    return `<iframe sandbox srcdoc="${esc(doc)}" title="Document"></iframe>`;
  }

  async function open(artefactId, action){
    openViewer();
    $("v-title").textContent = "Opening…";
    $("v-meta").innerHTML = "";
    $("v-body").innerHTML = `<div class="vpad"><span class="spin"></span>Resolving artefact…</div>`;
    $("v-actions").innerHTML = "";
    try{
      const { data, error } = await sb.functions.invoke(RESOLVE_FN, { body:{ artefact_id:artefactId, action:action||"preview" } });
      if(error){
        let detail = error.message||"Error";
        try{ const ctx = await error.context?.json?.(); if(ctx&&(ctx.error||ctx.detail)) detail = (ctx.error||"")+(ctx.detail?" — "+ctx.detail:""); }catch(_e){}
        $("v-title").textContent = "Unable to open";
        $("v-body").innerHTML = `<div class="vpad"><div class="big">This artefact could not be opened</div><div>${esc(detail)}</div></div>`;
        return;
      }
      gtag('event','lovr_open_artefact',{ doc_code:data.doc_code, content_mode:data.content_mode });
      $("v-title").textContent = data.name || data.doc_code || "Artefact";
      const meta = [];
      if(data.version_label) meta.push(esc(data.version_label));
      if(data.content_source) meta.push(esc(SOURCE_CHIP[data.content_source]||data.content_source));
      if(data.doc_code) meta.push(`<span style="color:var(--muted-2)">${esc(data.doc_code)}</span>`);
      $("v-meta").innerHTML = meta.join(" · ");

      if(data.content_mode==="inline"){
        $("v-body").innerHTML = mdFrame(data.body_markdown);
      } else if(data.content_mode==="signed_url"){
        $("v-body").innerHTML = `<iframe class="docframe" src="${esc(data.signed_url)}" title="Document"></iframe>`;
        $("v-actions").innerHTML =
          `<button class="btn sm" onclick="window.open('${esc(data.signed_url)}','_blank','noopener')">Open in new tab</button>
           <button class="btn sm" onclick="LOVR.open('${esc(artefactId)}','download')">Download</button>`;
      } else if(data.content_mode==="url"){
        $("v-body").innerHTML = `<div class="vpad"><div class="big">${esc(data.name||"Published page")}</div>
          <div>This is a published page. It opens in a new browser tab.</div></div>`;
        $("v-actions").innerHTML = `<button class="btn gold sm" onclick="window.open('${esc(data.url)}','_blank','noopener')">Open page ↗</button>`;
      } else if(data.content_mode==="pending"){
        $("v-body").innerHTML = `<div class="vpad"><div class="big">Document pending upload</div>
          <div>${esc(data.detail||"The authoritative file for this artefact has not yet been uploaded to the vault.")}</div></div>`;
      } else {
        $("v-body").innerHTML = `<div class="vpad"><div class="big">Unsupported</div><div>${esc(String(JSON.stringify(data)).slice(0,300))}</div></div>`;
      }
    }catch(err){
      $("v-title").textContent = "Unable to open";
      $("v-body").innerHTML = `<div class="vpad"><div class="big">Unexpected error</div><div>${esc(err.message||"Error")}</div></div>`;
    }
  }

  // ===========================================================================
  // Ask Eileen — reviewer chat panel. Reuses the page session (RULE 27); the EF
  // is stateless, so the full message array is maintained client-side in memory.
  // ===========================================================================
  const EILEEN_INTRO = "I can help you locate, navigate, and explain what's in the vault and on the W9 checklist. The legal judgement is yours.";

  function eileenReveal(show){
    const fab = $("eileen-fab"); if(fab) fab.classList.toggle("hidden", !show);
  }
  function eileenReset(){
    eileenMessages = []; eileenError = null; eileenBusy = false;
    const p = $("eileen-panel"); if(p){ p.classList.add("hidden"); p.setAttribute("aria-hidden","true"); }
    const fab = $("eileen-fab"); if(fab){ fab.classList.add("hidden"); fab.setAttribute("aria-expanded","false"); }
  }
  function eileenOpen(){
    const p = $("eileen-panel"), fab = $("eileen-fab");
    if(p){ p.classList.remove("hidden"); p.setAttribute("aria-hidden","false"); }
    if(fab){ fab.classList.add("hidden"); fab.setAttribute("aria-expanded","true"); }
    eileenRender();
    const ta = $("eileen-text"); if(ta) setTimeout(()=>ta.focus(), 30);
    gtag('event','eileen_open');
  }
  function eileenCloseP(){
    const p = $("eileen-panel"), fab = $("eileen-fab");
    if(p){ p.classList.add("hidden"); p.setAttribute("aria-hidden","true"); }
    if(fab && roomMounted){ fab.classList.remove("hidden"); fab.setAttribute("aria-expanded","false"); }
  }

  function eileenBubbleEl(kind, content){
    const div = document.createElement("div");
    if(kind==="user"){ div.className = "ep-msg ep-user"; div.textContent = content; }
    else if(kind==="error"){ div.className = "ep-msg ep-error"; div.textContent = content; }
    else { div.className = "ep-msg ep-eileen"; div.innerHTML = eileenMarkdown(content); }
    return div;
  }

  function eileenRender(){
    const body = $("eileen-body"); if(!body) return;
    body.innerHTML = "";
    const intro = document.createElement("div");
    intro.className = "ep-intro"; intro.textContent = EILEEN_INTRO;
    body.appendChild(intro);
    eileenMessages.forEach(m=> body.appendChild(eileenBubbleEl(m.role==="assistant"?"eileen":"user", m.content)));
    if(eileenBusy){
      const t = document.createElement("div");
      t.className = "ep-typing"; t.setAttribute("aria-label","Eileen is responding");
      t.innerHTML = "<span></span><span></span><span></span>";
      body.appendChild(t);
    }
    if(eileenError) body.appendChild(eileenBubbleEl("error", eileenError));
    body.scrollTop = body.scrollHeight;
  }

  function eileenSetSend(enabled){ const b = $("eileen-send"); if(b) b.disabled = !enabled; }
  function eileenAutoSize(ta){ ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 120) + "px"; }

  async function eileenSend(){
    if(eileenBusy) return;
    const ta = $("eileen-text"); if(!ta) return;
    const text = (ta.value || "").trim();
    if(!text) return;
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ eileenError = "Please sign in to use Eileen"; eileenRender(); return; }
    eileenError = null;
    eileenMessages.push({ role:"user", content:text });
    ta.value = ""; eileenAutoSize(ta);
    eileenBusy = true; eileenSetSend(false);
    eileenRender();
    gtag('event','eileen_message');
    try{
      const r = await fetch(`${SUPABASE_URL}/functions/v1/${EILEEN_FN}`, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_ANON_KEY, "Authorization":`Bearer ${session.access_token}` },
        body: JSON.stringify({ messages: eileenMessages })
      });
      if(!r.ok) throw new Error("eileen "+r.status);
      const data = await r.json();
      const reply = (data && typeof data.response === "string") ? data.response : "";
      eileenMessages.push({ role:"assistant", content: reply || "_(No response was returned. Please try again.)_" });
    }catch(_e){
      eileenMessages.pop();            // drop the in-flight turn so the array stays clean
      ta.value = text; eileenAutoSize(ta);   // restore the message for an easy retry
      eileenError = "Eileen is unavailable right now. Please try again.";
    }finally{
      eileenBusy = false; eileenSetSend(true);
      eileenRender();
      if($("eileen-text")) $("eileen-text").focus();
    }
  }

  function eileenMarkdown(md){
    let html = "";
    try{ html = window.marked.parse(String(md==null?"":md)); }
    catch(_e){ html = "<p>"+esc(String(md==null?"":md))+"</p>"; }
    return eileenSanitize(html);
  }
  // Conservative allowlist sanitiser: marked@12 does not sanitise, and this HTML is
  // injected into the page (not a sandboxed iframe), so strip anything executable.
  function eileenSanitize(html){
    const ALLOWED = { P:1,BR:1,STRONG:1,EM:1,B:1,I:1,U:1,DEL:1,CODE:1,PRE:1,UL:1,OL:1,LI:1,A:1,
      H1:1,H2:1,H3:1,H4:1,H5:1,H6:1,BLOCKQUOTE:1,HR:1,TABLE:1,THEAD:1,TBODY:1,TR:1,TH:1,TD:1,SPAN:1 };
    const tpl = document.createElement("template");
    tpl.innerHTML = html;
    const walk = (node)=>{
      Array.prototype.slice.call(node.childNodes).forEach((child)=>{
        if(child.nodeType === 1){
          const tag = child.tagName;
          if(!ALLOWED[tag]){ child.replaceWith(document.createTextNode(child.textContent || "")); return; }
          Array.prototype.slice.call(child.attributes).forEach((a)=>{
            const n = a.name.toLowerCase();
            if(tag === "A" && n === "href" && /^(https?:|mailto:)/i.test((a.value || "").trim())) return;
            child.removeAttribute(a.name);
          });
          if(tag === "A"){ child.setAttribute("target","_blank"); child.setAttribute("rel","noopener noreferrer"); }
          walk(child);
        } else if(child.nodeType === 8){ child.remove(); }
      });
    };
    walk(tpl.content);
    return tpl.innerHTML;
  }

  (function eileenWire(){
    const fab = $("eileen-fab"); if(fab) fab.addEventListener("click", eileenOpen);
    const cl = $("eileen-close"); if(cl) cl.addEventListener("click", eileenCloseP);
    const form = $("eileen-form"); if(form) form.addEventListener("submit", (e)=>{ e.preventDefault(); eileenSend(); });
    const ta = $("eileen-text");
    if(ta){
      ta.addEventListener("input", ()=> eileenAutoSize(ta));
      ta.addEventListener("keydown", (e)=>{ if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); eileenSend(); } });
    }
    document.addEventListener("keydown", (e)=>{
      if(e.key !== "Escape") return;
      const v = $("viewer"); if(v && v.classList.contains("open")) return;   // viewer takes Escape first
      const p = $("eileen-panel"); if(p && !p.classList.contains("hidden")) eileenCloseP();
    });
  })();
  window.EILEEN = { open: eileenOpen, close: eileenCloseP, send: eileenSend };

  window.LOVR = { open, openViewer, closeViewer, toggle };
  document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeViewer(); });

  // Gate on load: session present → room; absent → sign-in. Also react to magic-link return.
  async function boot(){
    const { data:{ session } } = await sb.auth.getSession();
    session ? showRoom(session.user.email || "Signed in") : showGate();
  }
  sb.auth.onAuthStateChange((_e, session)=>{ setTimeout(()=>{ session ? showRoom(session.user.email || "Signed in") : showGate(); }, 0); });
  boot();
})();
</script>
