<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Legal Oversight Room · Ailane</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://www.googletagmanager.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co; img-src 'self' data: https://cnbsxwtvazfvzmltkuvx.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" />

<!-- Google Analytics 4 (G-NTNXWZN31C) -->
<script src="/assets/js/ailane-cookie-consent.js"></script>

<style>
  :root{
    --ink:#0A0F1A; --panel:#111A2B; --panel-2:#0E1626; --line:#1E293B; --line-soft:#172033;
    --text:#E6EDF6; --muted:#93A1B5; --muted-2:#6B7A90;
    --gold:#F59E0B; --gold-soft:rgba(245,158,11,.12); --cyan:#0EA5E9; --cyan-soft:rgba(14,165,233,.12);
    --green:#34D399; --green-soft:rgba(52,211,153,.12); --red:#F87171; --red-soft:rgba(248,113,113,.12);
    --grey:#94A3B8; --grey-soft:rgba(148,163,184,.12);
    --radius:14px; --radius-sm:10px; --shadow:0 10px 30px rgba(0,0,0,.35);
    --serif:"Iowan Old Style",Palatino,"Palatino Linotype","Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px}
  a{color:var(--cyan);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}

  header.topbar{position:sticky;top:0;z-index:30;background:rgba(10,15,26,.86);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line)}
  .topbar .row{display:flex;align-items:center;gap:14px;height:62px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .name{font-weight:600;letter-spacing:.2px}
  .brand .sub{color:var(--muted);font-size:12.5px;border-left:1px solid var(--line);padding-left:11px;margin-left:3px}
  .spacer{flex:1}
  .who{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}
  .who .email{color:var(--text)}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:8px 13px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;
    transition:border-color .15s,background .15s}
  .btn:hover{border-color:#2b3a52;background:#142036}
  .btn.gold{background:var(--gold);color:#1a1205;border-color:var(--gold);font-weight:600}
  .btn.gold:hover{filter:brightness(1.05);background:var(--gold)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .btn:disabled{opacity:.55;cursor:default}

  .context{border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),transparent)}
  .context .row{padding:16px 0 18px}
  .context h1{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 4px;letter-spacing:.2px}
  .context p{margin:0;color:var(--muted);font-size:13.5px;max-width:880px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:4px 10px;background:var(--panel)}
  .tag b{color:var(--text);font-weight:600}
  .context .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);font-weight:700;margin-bottom:9px}

  /* Four-card nav grid (Documents / Deal Creator / Engagement Status / Pathway) */
  .navsec{padding:22px 0 4px}
  .nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media (max-width:1100px){.nav-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.nav-grid{grid-template-columns:1fr}}
  .nav-card{display:flex;flex-direction:column;gap:9px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);padding:18px 18px 16px;text-decoration:none;color:var(--text);
    transition:border-color .18s,transform .18s,box-shadow .18s}
  .nav-card:hover{border-color:rgba(14,165,233,.4);transform:translateY(-2px);box-shadow:0 12px 28px rgba(14,165,233,.10);text-decoration:none}
  .nav-card .ico{width:34px;height:34px;border-radius:9px;background:var(--cyan-soft);border:1px solid rgba(14,165,233,.3);
    color:var(--cyan);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:15px}
  .nav-card .nt{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text)}
  .nav-card .nd{font-size:12.5px;color:var(--muted);line-height:1.5;flex:1}
  .nav-card .nm{font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.03em}

  /* Single portal card into the synthetic Counterparty Deal-Room Experience */
  .portal-card{display:flex;align-items:center;gap:18px;border:1px solid rgba(245,158,11,.4);border-radius:var(--radius);
    background:linear-gradient(180deg,var(--gold-soft),transparent),var(--panel);padding:20px 22px;text-decoration:none;color:var(--text);
    transition:border-color .18s,transform .18s,box-shadow .18s}
  .portal-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 14px 30px rgba(245,158,11,.12);text-decoration:none}
  .portal-card .ico{width:42px;height:42px;flex:none;border-radius:11px;background:var(--gold-soft);border:1px solid rgba(245,158,11,.4);
    color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px}
  .portal-card .pc-body{flex:1;min-width:0}
  .portal-card .pc-t{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--text)}
  .portal-card .pc-d{font-size:13px;color:var(--muted);line-height:1.5;margin-top:3px}
  .portal-card .pc-go{flex:none;color:var(--gold);font-weight:600;font-size:13.5px;white-space:nowrap}
  @media (max-width:560px){.portal-card{flex-wrap:wrap}.portal-card .pc-go{width:100%}}

  /* Director-bypass note + entry acknowledgement gate */
  .dir-note{margin:0 2px 16px;padding:9px 13px;border:1px solid rgba(14,165,233,.3);background:var(--cyan-soft);
    border-radius:var(--radius-sm);color:var(--cyan);font-size:12.5px}
  .gate-read{height:52vh;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;background:var(--ink)}
  .gate-read iframe{width:100%;height:100%;border:0;display:block}
  .gate-act{margin:12px 2px 4px}
  .ackrow{margin:-2px 0 2px}
  .ackbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .ackbadge.ok{color:var(--green);background:var(--green-soft);border:1px solid rgba(52,211,153,.3)}
  .ackbadge.req{color:var(--gold);background:var(--gold-soft);border:1px solid rgba(245,158,11,.3)}

  .main{display:grid;grid-template-columns:340px 1fr;gap:26px;padding:26px 0 60px;align-items:start}
  @media (max-width:980px){.main{grid-template-columns:1fr}}

  .rail{position:sticky;top:78px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);overflow:hidden}
  @media (max-width:980px){.rail{position:static}}
  .rail .head{padding:14px 16px;border-bottom:1px solid var(--line)}
  .rail .head .t{font-weight:600;font-size:14px}
  .rail .head .s{color:var(--muted);font-size:12px;margin-top:2px}
  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:11px 16px;border-bottom:1px solid var(--line-soft)}
  .rail .group{border-bottom:1px solid var(--line-soft)}
  .rail .group:last-child{border-bottom:none}
  .rail .gh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 16px;
    cursor:pointer;user-select:none}
  .rail .gh:hover{background:var(--panel-2)}
  .rail .gh .gt{font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}
  .rail .gh .ct{font-size:11px;color:var(--muted-2)}
  .rail .items{padding:2px 10px 10px}
  .rail .items.collapsed{display:none}
  .obl{display:flex;gap:9px;align-items:flex-start;padding:8px 8px;border-radius:8px}
  .obl:hover{background:var(--panel-2)}
  .obl .meta{min-width:0}
  .obl .ot{font-size:12.8px;line-height:1.35}
  .obl .ow{font-size:11px;color:var(--muted-2);margin-top:2px}

  .pill{flex:none;font-size:10.5px;font-weight:600;letter-spacing:.2px;padding:3px 8px;border-radius:999px;
    border:1px solid transparent;white-space:nowrap;text-transform:capitalize}
  .pill.dot{padding:3px 8px 3px 7px;display:inline-flex;align-items:center;gap:6px}
  .pill.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
  .st-satisfied{color:var(--green);background:var(--green-soft);border-color:rgba(52,211,153,.3)}
  .st-open{color:var(--gold);background:var(--gold-soft);border-color:rgba(245,158,11,.3)}
  .st-in-progress{color:var(--cyan);background:var(--cyan-soft);border-color:rgba(14,165,233,.3)}
  .st-blocked{color:var(--red);background:var(--red-soft);border-color:rgba(248,113,113,.3)}
  .st-not-applicable{color:var(--grey);background:var(--grey-soft);border-color:rgba(148,163,184,.3)}

  .vault .vh{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 2px 14px}
  .vault .vh .t{font-family:var(--serif);font-size:18px;font-weight:600}
  .vault .vh .c{color:var(--muted);font-size:12.5px}
  .section{margin-bottom:26px}
  .section > .sh{display:flex;align-items:center;gap:10px;margin:0 2px 11px}
  .section > .sh .bar{width:3px;height:16px;border-radius:2px;background:var(--gold)}
  .section.w9 > .sh .bar{background:var(--cyan)}
  .section.consti > .sh .bar{background:var(--green)}
  .section > .sh .st{font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text)}
  .section > .sh .sc{font-size:11.5px;color:var(--muted-2)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);
    padding:14px 14px 12px;display:flex;flex-direction:column;gap:9px;transition:border-color .15s}
  .card:hover{border-color:#2b3a52}
  .card .ct{font-weight:600;font-size:14px;line-height:1.3}
  .card .cd{color:var(--muted);font-size:12.5px;line-height:1.45;flex:1}
  .card .cf{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px}
  .chip{font-size:10.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 8px;
    display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .chip .vd{color:var(--muted-2)}
  .card .actions{display:flex;gap:7px}
  /* Action badge on every Vault card (§1.3) — reuses .pill geometry; light text, never --ink */
  .cbadge{text-transform:none;color:var(--text)}
  .cbadge.sign{background:var(--gold-soft);border-color:rgba(245,158,11,.4)}
  .cbadge.ack{background:var(--cyan-soft);border-color:rgba(14,165,233,.4)}
  .cbadge.ref{background:var(--grey-soft);border-color:rgba(148,163,184,.35)}
  .cbadgerow{margin:-2px 0 1px}
  .obl-link{cursor:pointer}
  .obl-link:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .gate{min-height:64vh;display:flex;align-items:center;justify-content:center;padding:40px 0}
  .signin{width:100%;max-width:400px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
  .signin .sh{padding:22px 24px 6px;text-align:center}
  .signin .sh .nx{margin:0 auto 12px}
  .signin .sh h2{font-family:var(--serif);font-size:19px;margin:0 0 4px}
  .signin .sh p{color:var(--muted);font-size:12.8px;margin:0}
  .signin form{padding:18px 24px 8px;display:flex;flex-direction:column;gap:11px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--cyan)}
  .signin .foot{padding:6px 24px 22px;color:var(--muted-2);font-size:11.5px;text-align:center}
  .msg{font-size:12.5px;padding:9px 12px;border-radius:var(--radius-sm);display:none}
  .msg.err{display:block;color:var(--red);background:var(--red-soft);border:1px solid rgba(248,113,113,.3)}
  .msg.info{display:block;color:var(--muted);background:var(--panel-2);border:1px solid var(--line)}

  .state{border:1px dashed var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted)}
  .state .big{font-size:15px;color:var(--text);margin-bottom:6px;font-weight:600}
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--cyan);border-radius:50%;
    display:inline-block;animation:sp .8s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .scrim{position:fixed;inset:0;background:rgba(4,8,15,.66);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .viewer{position:fixed;top:0;right:0;height:100%;width:min(860px,94vw);background:var(--panel-2);
    z-index:41;border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(100%);
    transition:transform .24s ease;display:flex;flex-direction:column}
  .viewer.open{transform:translateX(0)}
  .viewer .vbar{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .viewer .vbar .vt{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.3}
  .viewer .vbar .vm{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .viewer .vbody{flex:1;min-height:0;overflow:auto;background:var(--ink)}
  .viewer .vactions{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line)}
  .viewer .vactions:empty{display:none}
  .viewer iframe{width:100%;height:100%;border:0;background:#fff;display:block}
  .docframe{width:100%;height:100%;border:0;display:block}
  .vpad{padding:26px 28px;color:var(--muted)}
  .vpad .big{font-size:15px;color:var(--text);font-weight:600;margin-bottom:8px}
  .disclaimer{font-size:11px;color:var(--muted-2);padding:9px 18px;border-top:1px solid var(--line-soft)}

  footer{border-top:1px solid var(--line);background:var(--panel-2)}
  footer .row{padding:22px 0 30px;color:var(--muted-2);font-size:12px;display:flex;flex-direction:column;gap:6px}
  footer .row .l1{color:var(--muted)}
  .hidden{display:none!important}

  /* ---- Deal-room demonstration primitives (now rendered on the sub-pages) ---- */
  .s1{padding:24px 0 60px}
  .synthetic-banner{position:sticky;top:62px;z-index:20;display:flex;gap:10px;align-items:flex-start;
    margin:0 0 22px;padding:12px 16px;border:1px solid rgba(245,158,11,.45);
    background:rgba(34,27,8,.97);backdrop-filter:saturate(140%) blur(4px);
    border-radius:var(--radius-sm);color:#f6d49a;font-size:13px;line-height:1.5}
  .synthetic-banner b{color:var(--gold)}
  .synthetic-banner > span{color:var(--gold);font-size:15px;line-height:1.2;flex:none}
  .kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .kv .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2);margin-bottom:3px}
  .kv .v{font-size:13.5px;color:var(--text)}
  .ladder{width:100%;border-collapse:collapse;font-size:13px;margin-top:2px}
  .ladder th,.ladder td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  .ladder th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2);font-weight:600}
  .ladder td.num,.ladder th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ladder .enrich{font-size:10px;color:var(--cyan);border:1px solid rgba(14,165,233,.3);background:var(--cyan-soft);
    border-radius:999px;padding:1px 7px;margin-left:7px;white-space:nowrap}
  .md{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .mods{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
  .mods li{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:9px 12px;
    border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel)}
  .mods .mn{font-size:13px;color:var(--text)}
  .mods .mv{font-variant-numeric:tabular-nums;color:var(--gold);font-weight:600;white-space:nowrap}
  .envelope{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
  .env-cell{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);padding:12px 14px}
  .env-cell .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted-2)}
  .env-cell .v{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:4px;color:var(--text)}
  .env-cell.target{border-color:rgba(245,158,11,.45)}
  .env-cell.target .v{color:var(--gold)}
  .note-line{font-size:12.5px;color:var(--muted);margin-top:12px;font-style:italic}
  .phase{border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);margin-bottom:12px;overflow:hidden}
  .phase-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
  .phase-head .pl{font-weight:600;font-size:13.5px;color:var(--text)}
  .phase-head .po{font-size:11.5px;color:var(--muted);white-space:nowrap}
  .phase-docs{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
  .s1-doc{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:1px solid transparent}
  .s1-doc.clickable{cursor:pointer}
  .s1-doc.clickable:hover{background:var(--panel-2);border-color:var(--line)}
  .s1-doc.clickable:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .s1-doc .dn{flex:1;min-width:0;font-size:13px;color:var(--text)}
  .s1-doc .dk{font-size:11px;color:var(--muted-2)}
  .s1-doc .arrow{color:var(--cyan);font-size:12px;font-weight:600;white-space:nowrap}
  .tagb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .tagb.block{color:var(--red);background:var(--red-soft);border:1px solid rgba(248,113,113,.3)}
  .eileen{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-left:3px solid var(--cyan);
    border-radius:var(--radius-sm);background:linear-gradient(180deg,var(--cyan-soft),transparent);padding:16px}
  .eileen .ename{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--text)}
  .eileen .erole{font-size:13px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
  .creator-note{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap;
    border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);padding:14px 16px}

  /* ---- Ask Eileen — reviewer chat panel (baseline cyan; no tier gold here) ---- */
  .eileen-fab{position:fixed;right:20px;bottom:20px;z-index:35;display:inline-flex;align-items:center;gap:9px;
    padding:11px 16px 11px 13px;border-radius:999px;border:1px solid rgba(14,165,233,.45);
    background:linear-gradient(180deg,#10243a,#0d1b2c);color:var(--text);font-family:inherit;font-size:13.5px;
    font-weight:600;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s,transform .12s}
  .eileen-fab:hover{border-color:var(--cyan);transform:translateY(-1px)}
  .eileen-panel{position:fixed;right:20px;bottom:20px;z-index:36;width:min(400px,calc(100vw - 40px));

  async function mountSurface(){
    directorBypass = await isDirector();
    if(directorBypass){ eileenReveal(true); renderVaultHub(); return; }
    try{
      const [iq, aq] = await Promise.all([
        sb.from("lovr_artefact_registry").select("artefact_id,doc_code,title,summary,version_label,content_source,updated_at,display_order").in("doc_code",INSTRUMENTS).eq("status","active").order("display_order",{ascending:true}),
        sb.from("lovr_instrument_acknowledgement").select("doc_code,artefact_updated_at,acknowledged_at")
      ]);
      if(iq.error) throw iq.error;
      const instruments = iq.data||[], acks = aq.error?[]:(aq.data||[]);
      const pending = instruments.filter(i=> !acks.some(a=> a.doc_code===i.doc_code && sameInstant(a.artefact_updated_at, i.updated_at)));
      if(pending.length===0){ eileenReveal(true); renderVaultHub(); }
      else { eileenReveal(false); renderEntryGate(instruments); }
    }catch(err){
      // Fail safe — never silently unlock the room.
      eileenReveal(false);
      $("surface").innerHTML = `<div class="wrap"><div class="page"><div class="state">
        <div class="big">Entry instruments unavailable</div>
        <div>${esc(err.message||"Error")}. Please refresh; if your reviewer access is still being verified, the room will open once confirmed.</div></div></div></div>`;
    }
  }
  function renderEntryGate(instruments){
    gateInstruments = instruments; gateConfirmed = {};
    const blocks = instruments.map((inst,i)=>`
      <section class="section" id="gi-${i}">
        <div class="sh"><span class="bar"></span><span class="st">${esc(inst.title)}</span>
          <span class="sc">${esc(normVer(inst.version_label))}</span></div>
        <div class="gate-read" id="gr-${i}"><div class="vpad"><span class="spin"></span>Loading…</div></div>
        <div class="gate-act" id="ga-${i}">
          <button class="btn gold" data-ack="${i}">I confirm I have read and understood this document.</button>
        </div>
      </section>`).join("");
    $("surface").innerHTML = `
      <section class="context"><div class="wrap"><div class="row">
        <div class="eyebrow">Entry — acknowledgement required</div>
        <h1>Before you enter the Legal Oversight Room</h1>
        <p>Please read both instruments below and confirm each. The rest of the room opens once both are acknowledged; these two instruments remain readable in the Document Vault at any time. Regulatory intelligence, not legal advice.</p>
      </div></div></section>
      <div class="wrap"><div class="page" id="gate">${blocks}</div></div>`;
    instruments.forEach((inst,i)=> loadInstrumentInto(i, inst));
    document.querySelectorAll("#gate button[data-ack]").forEach(b=>
      b.addEventListener("click", ()=> confirmAck(parseInt(b.getAttribute("data-ack"),10))));
  }
  async function loadInstrumentInto(i, inst){
    const box = $("gr-"+i); if(!box) return;
    try{
      const { data, error } = await sb.functions.invoke(RESOLVE_FN, { body:{ artefact_id:inst.artefact_id, action:"preview" } });
      if(error) throw new Error(error.message||"resolve error");
      if(data.content_mode==="inline"){ box.innerHTML = mdFrame(data.body_markdown); }
      else if(data.content_mode==="signed_url"){ box.innerHTML = `<iframe class="docframe" src="${esc(data.signed_url)}" title="${esc(inst.title)}"></iframe>`; }
      else { box.innerHTML = `<div class="vpad">${esc(data.detail||"This instrument is not currently displayable.")}</div>`; }
    }catch(err){
      box.innerHTML = `<div class="vpad">Unable to load this instrument (${esc(err.message||"error")}). Please refresh to try again.</div>`;
    }
  }
  async function confirmAck(i){
    const inst = gateInstruments[i]; if(!inst) return;
    const ga = $("ga-"+i), btn = ga && ga.querySelector("button[data-ack]");
    if(btn){ btn.disabled = true; btn.textContent = "Recording…"; }
    try{
      const { error } = await sb.from("lovr_instrument_acknowledgement").insert({
        artefact_id: inst.artefact_id, doc_code: inst.doc_code,
        version_label: inst.version_label, artefact_updated_at: inst.updated_at,
        reviewer_identity_snapshot: { email: currentEmail }
      });
      if(error) throw error;
      gateConfirmed[inst.doc_code] = true;
      try{ gtag('event','lovr_instrument_acknowledged',{ doc_code:inst.doc_code }); }catch(_e){}
      if(ga) ga.innerHTML = `<span class="ackbadge ok">Acknowledged &#10003;</span>`;
      if(gateInstruments.every(x=> gateConfirmed[x.doc_code])){
        vaultCache = null; ackState = {}; eileenReveal(true); renderVaultHub();
      }
    }catch(err){
      if(btn){ btn.disabled = false; btn.textContent = "I confirm I have read and understood this document."; }
      if(ga && !ga.querySelector(".ack-err")){
        const e = document.createElement("div"); e.className = "ack-err";
        e.style.cssText = "color:var(--red);font-size:12px;margin-top:8px";
        e.textContent = "Could not record your acknowledgement ("+(err.message||"error")+"). Please try again.";
        ga.appendChild(e);
      }
    }
  }
  function showGate(){
    roomMounted = false; vaultCache = null;
    eileenReset();
    renderGate();
  }
  async function signOut(){ try{ await sb.auth.signOut(); }catch(_e){} showGate(); }

  // then the four-card nav grid (cards ABOVE the register, §7-D1), then the
  // document vault + W9 review checklist (loader behaviour unchanged).
  // ===========================================================================

  // destinations are a menu INSIDE legal-oversight/deal-room/.

  async function loadVault(){
    if(vaultCache){ ackState = vaultCache.ack||{}; renderChecklist(vaultCache.chk); renderVault(vaultCache.reg); return; }
    try{
      const [reg, chk, ack] = await Promise.all([
        sb.from("lovr_artefact_registry").select("artefact_id,doc_code,title,summary,category,constitutional_domain,content_source,version_label,disclaimer_tier,display_order,updated_at,status").eq("status","active").order("display_order",{ascending:true}),
        sb.from("lovr_obligation_checklist").select("obligation_id,code,title,description,category,status,owner,display_order").order("display_order",{ascending:true}),
        sb.from("lovr_instrument_acknowledgement").select("doc_code,artefact_updated_at,acknowledged_at")
      ]);
      if(reg.error) throw reg.error;
      const regRows = reg.data||[], chkRows = chk.error?[]:(chk.data||[]);
      ackState = buildAckState(regRows, ack.error?[]:(ack.data||[]));
      vaultCache = { reg: regRows, chk: chkRows, ack: ackState };
      renderChecklist(chkRows);
      renderVault(regRows);
    }catch(err){
      $("vault").innerHTML = `<div class="state"><div class="big">Unable to load the vault</div>
        <div>${esc(err.message||"Error")}. If your reviewer access is still being verified, it will appear here once confirmed.</div></div>`;
      $("rail").innerHTML = `<div class="head"><div class="t">W9 review checklist</div><div class="s">Unavailable</div></div>`;
    }
  }
  function buildAckState(regRows, ackRows){
    const out = {};
    INSTRUMENTS.forEach(code=>{
      const rr = regRows.find(r=>r.doc_code===code); if(!rr) return;
      const m = ackRows.filter(a=> a.doc_code===code && sameInstant(a.artefact_updated_at, rr.updated_at))
                       .sort((a,b)=> new Date(b.acknowledged_at)-new Date(a.acknowledged_at));
      if(m.length) out[code] = m[0];
    });
    return out;
  }

  // ===========================================================================
  // Deal-room demonstration renderers migrated to the sub-pages (§3.4):
  //   deal-creator/  — composer overview + indicative pricing + Eileen note
  //   status/        — engagement overview + phase & gate board
  //   pathway/       — pathway summary + interactive diagram
  // The hub renders no deal surface; the Vault is the authoritative register.
  // ===========================================================================

  function statusPill(status){
    const cls = "st-"+String(status||"open").replace(/\s+/g,"-");
    return `<span class="pill dot ${cls}">${esc(STATUS_LABEL[status]||status||"—")}</span>`;
  }

  // Map an obligation row to the Vault section it scrolls to (§1.5 — W1 section-scroll;
  // per-row artefact open is W2 via linked_artefact_ids). Deterministic by code, then category.
  function oblTarget(it){
    const code = String(it.code||"").toUpperCase();
    if(code.indexOf("W9-A")===0) return "sec-w9a";
    if(code.indexOf("W9-B")===0) return "sec-w9b";
    if(code.indexOf("W9-C")===0) return "sec-w9c";
    if(code==="C-3"||code==="C-4"||code.indexOf("T1-")===0) return "sec-counsel-instruction";
    if(it.category==="w9-question") return "sec-w9a";
    return "sec-baseline";   // build / licence-compliance / live-activation / default
  }

  function renderChecklist(rows){
    const counts = rows.reduce((a,r)=>{a[r.status]=(a[r.status]||0)+1;return a;},{});
    const total = rows.length, sat = counts["satisfied"]||0;
    let html = `<div class="head"><div class="t">W9 review checklist</div>
      <div class="s">${total} obligations · ${sat} satisfied · ${total-sat} outstanding</div></div>
      <div class="legend">
        <span class="pill dot st-satisfied">Satisfied</span>
        <span class="pill dot st-open">Open</span>
        <span class="pill dot st-blocked">Blocked</span>
        <span class="pill dot st-not-applicable">N/A</span>
      </div>`;
    CHK_GROUPS.forEach((g,gi)=>{
      const items = rows.filter(r=>r.category===g.key);
      if(!items.length) return;
      const gid = "cg-"+gi;
      html += `<div class="group">
        <div class="gh" onclick="LOVR.toggle('${gid}')">
          <span class="gt">${esc(g.label)}</span><span class="ct">${items.length}</span></div>
        <div class="items collapsed" id="${gid}">` +
        items.map(it=>`<div class="obl obl-link" role="link" tabindex="0" title="Open the related Vault section" onclick="LOVR.railScroll('${oblTarget(it)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();LOVR.railScroll('${oblTarget(it)}')}">${statusPill(it.status)}
          <div class="meta"><div class="ot">${esc(it.title||it.code)}</div>
          <div class="ow">${esc(it.owner||"")}</div></div></div>`).join("") +
        `</div></div>`;
    });
    $("rail").innerHTML = html;
  }

  function renderVault(rows){
    const total = rows.length;
    let html = `<div class="vh"><div class="t">Document Vault</div><div class="c">${total} artefacts</div></div>`;
    let shown = 0;
    GROUPS.forEach(g=>{
      const items = rows.filter(r=>r.category===g.key);
      if(!items.length) return;
      shown++;
      html += `<div class="section ${g.consti?"consti":(g.w9?"w9":"")}" id="sec-${esc(g.key)}">
        <div class="sh"><span class="bar"></span><span class="st">${esc(g.label)}</span>
          <span class="sc">${items.length}</span></div>
        <div class="cards">` +
        items.map(cardHtml).join("") + `</div></div>`;
    });
    if(!shown){
      html += `<div class="state"><div class="big">No documents available</div>
        <div>If your reviewer access is still being verified, the vault will populate once confirmed.</div></div>`;
    }
    $("vault").innerHTML = html;
  }

  // Action badge derived from the artefact's category (§1.3). W2 will hang the
  // sign-off / acknowledge / upload controls off these same categories.
  function cardBadge(r){
    const c = r.category;
    if(c==="counsel-instruction")
      return `<span class="pill cbadge sign">Sign-off required</span>`;
    if(c==="room-instrument")
      return `<span class="pill cbadge ack">Acknowledge required</span>`;
    return `<span class="pill cbadge ref">Reference</span>`;
  }

  function cardHtml(r){
    const isDoc = r.content_source==="storage";
    const isUrl = r.content_source==="live-url"||r.content_source==="external-url";
    const verb = isUrl ? "Open page" : "Open";
    let actions = `<button class="btn gold sm" onclick="LOVR.open('${r.artefact_id}','preview')">${verb}</button>`;
    if(isDoc) actions += `<button class="btn sm" onclick="LOVR.open('${r.artefact_id}','download')">Download</button>`;
    // Wet-sign sign-off — master instruction set only (§1.1, AILANE-CC-BRIEF-LOVR-WETSIGN-SITE-001).
    if(r.doc_code==='AILANE-COUNSEL-SET-001')
      actions += `<button class="btn sm" onclick="LOVR.signoff('${r.artefact_id}')">Sign-off</button>`;
    const ackChip = INSTRUMENTS.includes(r.doc_code)
      ? (ackState[r.doc_code]
          ? `<div class="ackrow"><span class="ackbadge ok">Acknowledged ${esc(fmtDate(ackState[r.doc_code].acknowledged_at))}</span></div>`
          : `<div class="ackrow"><span class="ackbadge req">Acknowledgement required</span></div>`)
      : "";
    return `<div class="card">
      <div class="ct">${esc(r.title)}</div>
      <div class="cd">${esc(r.summary||"")}</div>
      <div class="cbadgerow">${cardBadge(r)}</div>
      ${ackChip}
      <div class="cf">
        <span class="chip">${esc(SOURCE_CHIP[r.content_source]||r.content_source)}${r.version_label?` · <span class="vd">${esc(normVer(r.version_label))}</span>`:""}</span>
        <span class="actions">${actions}</span>
      </div></div>`;
  }

  function openViewer(){ $("scrim").classList.add("open"); $("viewer").classList.add("open"); $("viewer").setAttribute("aria-hidden","false"); }
  function closeViewer(){ $("scrim").classList.remove("open"); $("viewer").classList.remove("open"); $("viewer").setAttribute("aria-hidden","true"); $("v-body").innerHTML=""; $("v-actions").innerHTML=""; }
  function toggle(id){ const el=$(id); if(el) el.classList.toggle("collapsed"); }
  // Rail → Vault section-scroll (§1.5, W1). Falls back to the vault top if the
  // target section is not present (e.g. that category has no active artefacts).
  function railScroll(id){ const el=$(id)||$("vault"); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); }

  function mdFrame(markdown){
    const inner = window.marked.parse(markdown||"");
    const doc = `<!doctype html><html><head><meta charset="utf-8">
      <style>
        body{margin:0;padding:30px 34px;background:#fff;color:#1f2733;
          font:15px/1.62 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;max-width:760px}
        h1,h2,h3{font-family:Georgia,"Times New Roman",serif;color:#0f1722;line-height:1.25;margin:1.4em 0 .5em}
        h1{font-size:24px;border-bottom:1px solid #e6e9ef;padding-bottom:.3em}
        h2{font-size:19px} h3{font-size:16px}
        p,li{font-size:15px} code{font-family:ui-monospace,Menlo,Consolas,monospace;background:#f3f5f8;padding:.1em .35em;border-radius:4px;font-size:13px}
        table{border-collapse:collapse;width:100%;margin:1em 0;font-size:13.5px}
        th,td{border:1px solid #dfe3ea;padding:7px 10px;text-align:left;vertical-align:top}
        th{background:#f6f8fb} hr{border:none;border-top:1px solid #e6e9ef;margin:1.6em 0}
        blockquote{border-left:3px solid #d8a23a;margin:1em 0;padding:.2em 0 .2em 14px;color:#5b6470}
        a{color:#0b69b8} em{color:#4a5568}
      </style></head><body>${inner}</body></html>`;
    return `<iframe sandbox srcdoc="${esc(doc)}" title="Document"></iframe>`;
  }

  async function open(artefactId, action){
    openViewer();
    $("v-title").textContent = "Opening…";
    $("v-meta").innerHTML = "";
    $("v-body").innerHTML = `<div class="vpad"><span class="spin"></span>Resolving artefact…</div>`;
    $("v-actions").innerHTML = "";
    try{
      const { data, error } = await sb.functions.invoke(RESOLVE_FN, { body:{ artefact_id:artefactId, action:action||"preview" } });
      if(error){
        let detail = error.message||"Error";
        try{ const ctx = await error.context?.json?.(); if(ctx&&(ctx.error||ctx.detail)) detail = (ctx.error||"")+(ctx.detail?" — "+ctx.detail:""); }catch(_e){}
        $("v-title").textContent = "Unable to open";
        $("v-body").innerHTML = `<div class="vpad"><div class="big">This artefact could not be opened</div><div>${esc(detail)}</div></div>`;
        return;
      }
      gtag('event','lovr_open_artefact',{ doc_code:data.doc_code, content_mode:data.content_mode });
      $("v-title").textContent = data.name || data.doc_code || "Artefact";
      const meta = [];
      if(data.version_label) meta.push(esc(normVer(data.version_label)));
      if(data.content_source) meta.push(esc(SOURCE_CHIP[data.content_source]||data.content_source));
      if(data.doc_code) meta.push(`<span style="color:var(--muted-2)">${esc(data.doc_code)}</span>`);
      $("v-meta").innerHTML = meta.join(" · ");

      if(data.content_mode==="inline"){
        $("v-body").innerHTML = mdFrame(data.body_markdown);
        $("v-actions").innerHTML = `<button class="btn sm" onclick="LOVR.downloadInstrument('${esc(artefactId)}')">Download / print</button>` + ($("v-actions").innerHTML||"");
      } else if(data.content_mode==="signed_url"){
        $("v-body").innerHTML = `<iframe class="docframe" src="${esc(data.signed_url)}" title="Document"></iframe>`;
        $("v-actions").innerHTML =
          `<button class="btn sm" onclick="window.open('${esc(data.signed_url)}','_blank','noopener')">Open in new tab</button>
           <button class="btn sm" onclick="LOVR.open('${esc(artefactId)}','download')">Download</button>`;
      } else if(data.content_mode==="url"){
        $("v-body").innerHTML = `<div class="vpad"><div class="big">${esc(data.name||"Published page")}</div>
          <div>This is a published page. It opens in a new browser tab.</div></div>`;
        $("v-actions").innerHTML = `<button class="btn gold sm" onclick="window.open('${esc(data.url)}','_blank','noopener')">Open page ↗</button>`;
      } else if(data.content_mode==="pending"){
        $("v-body").innerHTML = `<div class="vpad"><div class="big">Document pending upload</div>
          <div>${esc(data.detail||"The authoritative file for this artefact has not yet been uploaded to the vault.")}</div></div>`;
      } else {
        $("v-body").innerHTML = `<div class="vpad"><div class="big">Unsupported</div><div>${esc(String(JSON.stringify(data)).slice(0,300))}</div></div>`;
      }
    }catch(err){
      $("v-title").textContent = "Unable to open";
      $("v-body").innerHTML = `<div class="vpad"><div class="big">Unexpected error</div><div>${esc(err.message||"Error")}</div></div>`;
    }
  }

  async function downloadInstrument(artefactId){
    try{
      const { data, error } = await sb.functions.invoke(RESOLVE_FN, { body:{ artefact_id:artefactId, action:"download" } });
      if(error || !data) throw (error || new Error("resolve failed"));
      // Storage-backed artefacts: open the native signed file directly.
      if(data.content_mode==="signed_url" && data.signed_url){ window.open(data.signed_url, "_blank"); return; }
      // Content-store (markdown) instruments: render to a clean print page → Save as PDF.
      if(data.content_mode!=="inline" || !data.body_markdown) return;
      const bodyHtml = (typeof marked!=="undefined" && marked.parse) ? marked.parse(data.body_markdown) : ("<pre>"+esc(data.body_markdown)+"</pre>");
      const title = esc(data.doc_code || "Instrument");
      const w = window.open("", "_blank");
      if(!w){ alert("Please allow pop-ups to download this document."); return; }
      w.document.write(
        '<!doctype html><html><head><meta charset="utf-8"><title>'+title+'</title>'+
        '<style>@page{size:A4;margin:22mm 18mm}'+
        'body{font:13px/1.55 -apple-system,Segoe UI,Arial,sans-serif;color:#0A0F1A;max-width:760px;margin:0 auto;padding:20px}'+
        'h1{font-size:20px;margin:0 0 6px}h2{font-size:15px;margin:22px 0 8px;border-top:1px solid #ccc;padding-top:12px}'+
        'code{background:#f3f4f6;padding:1px 4px;border-radius:3px}hr{border:none;border-top:1px solid #ccc;margin:18px 0}'+
        'p{margin:8px 0}@media print{.noprint{display:none}}</style></head><body>'+
        '<div class="noprint" style="text-align:right;margin-bottom:10px"><button onclick="window.print()">Print / Save as PDF</button></div>'+
        bodyHtml+'</body></html>'
      );
      w.document.close(); w.focus();
      setTimeout(function(){ try{ w.print(); }catch(_e){} }, 400);
    }catch(e){ console.error("downloadInstrument", e); }
  }

  // ===========================================================================
  // Wet-sign sign-off panel (§1.2/§1.3, AILANE-CC-BRIEF-LOVR-WETSIGN-SITE-001).
  // Master instruction set only. Reuses the viewer overlay and the page's authed
  // `sb` session: download the master → wet-sign offline → upload the signed PDF
  // to the private bucket → record the determination via lovr_record_signoff
  // (validated reviewer + hash-chained server-side). The four status values must
  // match the RPC's accepted set exactly, or it rejects the entry.
  // ===========================================================================
  const SIGNOFF_STATUS = [
    ["clean-approval","Clean approval"],
    ["approval-with-conditions","Approval with conditions"],
    ["blocked","Blocked"],
    ["noted","Noted"]
  ];
  const SIGNOFF_STATUS_LABEL = Object.fromEntries(SIGNOFF_STATUS);

  async function sha256hex(buf){
    const h = await crypto.subtle.digest('SHA-256', buf);
    return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  function signoff(artefactId){
    openViewer();
    $("v-title").textContent = "Sign-off — Master instruction set (all five matters)";
    $("v-meta").innerHTML = `<span style="color:var(--muted-2)">AILANE-COUNSEL-SET-001</span>`;
    $("v-actions").innerHTML = "";
    const opts = SIGNOFF_STATUS.map(([v,l])=>`<option value="${esc(v)}">${esc(l)}</option>`).join("");
    $("v-body").innerHTML = `

  // Upload the signed copy (optional) then record the determination (§1.3).
  async function submitSignoff(artefactId){
    const sel = $("wsig-status"), noteEl = $("wsig-note"), fileEl = $("wsig-file");
    const btn = $("wsig-submit"), msg = $("wsig-msg");
    const status = sel ? sel.value : null;
    const note   = (noteEl && noteEl.value.trim()) ? noteEl.value.trim() : null;
    const file   = (fileEl && fileEl.files && fileEl.files[0]) ? fileEl.files[0] : null;
    let objectPath=null, sha=null, fname=null;
    if(btn){ btn.disabled = true; btn.textContent = "Recording…"; }
    if(msg){ msg.className = "wsig-msg"; msg.textContent = ""; }
    try{
      const { data:{ session } } = await sb.auth.getSession();
      if(!session) throw new Error("no session");
      if(file){
        const buf = await file.arrayBuffer();
        sha = await sha256hex(buf);
        fname = file.name;
        const token = session.access_token;
        const uid = JSON.parse(atob(token.split('.')[1])).sub;
        objectPath = `${uid}/${Date.now()}_${fname.replace(/[^A-Za-z0-9._-]/g,'_')}`;
        const up = await sb.storage.from('lovr-signed-instruments').upload(objectPath, file, { contentType:'application/pdf', upsert:false });
        if(up.error) throw up.error;
      }
      const { data, error } = await sb.rpc('lovr_record_signoff', {
        p_scope_ref: artefactId, p_doc_code: 'AILANE-COUNSEL-SET-001', p_status: status,
        p_note: note, p_signed_object_path: objectPath, p_signed_file_sha256: sha, p_signed_filename: fname
      });
      if(error) throw error;
      if(msg){ msg.className = "wsig-msg ok"; msg.textContent = "Sign-off recorded — reference " + data + (sha ? ", signed copy stored." : "."); }
      try{ gtag('event','lovr_signoff_recorded',{ status: status }); }catch(_e){}
      if(noteEl) noteEl.value = "";
      if(fileEl) fileEl.value = "";
      loadSignoffList(artefactId);
    }catch(e){
      if(msg){ msg.className = "wsig-msg err"; msg.textContent = "We could not record your sign-off. Please review your determination and try again."; }
      console.error('signoff', e);
    }finally{
      if(btn){ btn.disabled = false; btn.textContent = "Record sign-off"; }
    }
  }

  async function eileenSend(){
    if(eileenBusy) return;
    const ta = $("eileen-text"); if(!ta) return;
    const text = (ta.value || "").trim();
    if(!text) return;
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ eileenError = "Please sign in to use Eileen"; eileenRender(); return; }
    eileenError = null;
    eileenMessages.push({ role:"user", content:text });
    ta.value = ""; eileenAutoSize(ta);
    eileenBusy = true; eileenSetSend(false);
    eileenRender();
    gtag('event','eileen_message');
    try{
      const r = await fetch(`${SUPABASE_URL}/functions/v1/${EILEEN_FN}`, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":SUPABASE_ANON_KEY, "Authorization":`Bearer ${session.access_token}` },
        body: JSON.stringify({ messages: eileenMessages })
      });
      if(!r.ok) throw new Error("eileen "+r.status);
      const data = await r.json();
      const reply = (data && typeof data.response === "string") ? data.response : "";
      eileenMessages.push({ role:"assistant", content: reply || "_(No response was returned. Please try again.)_" });
    }catch(_e){
      eileenMessages.pop();            // drop the in-flight turn so the array stays clean
      ta.value = text; eileenAutoSize(ta);   // restore the message for an easy retry
      eileenError = "Eileen is unavailable right now. Please try again.";

  // Conservative allowlist sanitiser: marked@12 does not sanitise, and this HTML is
  // injected into the page (not a sandboxed iframe), so strip anything executable.
  function eileenSanitize(html){
    const ALLOWED = { P:1,BR:1,STRONG:1,EM:1,B:1,I:1,U:1,DEL:1,CODE:1,PRE:1,UL:1,OL:1,LI:1,A:1,
      H1:1,H2:1,H3:1,H4:1,H5:1,H6:1,BLOCKQUOTE:1,HR:1,TABLE:1,THEAD:1,TBODY:1,TR:1,TH:1,TD:1,SPAN:1 };
    const tpl = document.createElement("template");
    tpl.innerHTML = html;
    const walk = (node)=>{
      Array.prototype.slice.call(node.childNodes).forEach((child)=>{
        if(child.nodeType === 1){
          const tag = child.tagName;
          if(!ALLOWED[tag]){ child.replaceWith(document.createTextNode(child.textContent || "")); return; }
          Array.prototype.slice.call(child.attributes).forEach((a)=>{
            const n = a.name.toLowerCase();
            if(tag === "A" && n === "href" && /^(https?:|mailto:)/i.test((a.value || "").trim())) return;
            child.removeAttribute(a.name);
          });
          if(tag === "A"){ child.setAttribute("target","_blank"); child.setAttribute("rel","noopener noreferrer"); }
          walk(child);
        } else if(child.nodeType === 8){ child.remove(); }
      });
    };
    walk(tpl.content);
    return tpl.innerHTML;
  }

  /* === Assurance & Certifications — reviewer-room section (12 Jun 2026) ===
     Feed: security-definer fn legal_oversight_assurance() — aggregates only, no personal data. */
  const ASSURANCE_POSTURE_LABELS = { operating:"Operating", in_progress:"In progress", planned:"Planned", aspirational:"Aspirational" };

  // === Document-estate dual-state (§1.4, RSG-DUAL-STATE-DISPLAY-SITE-P3-001) ===
  // Reads the P0 spine via fn_document_estate_for_spec for each spec the room knows,
  // returning a map spec-key → { active, commencing }. Fully defensive: an absent
  // RPC, an error, or no rows leaves the entry out, so callers render Active only.
  // Never throws; never fabricates a date — only a commencement_date the spine
  // returns produces the amber "Commencing(date)" sibling. Safe before or after P0.
  function normaliseEstateRows(rows){
    if(!Array.isArray(rows) || !rows.length) return null;
    const st = r=> String(r.state||r.status||r.posture||"").toLowerCase();
    const dateOf = r=> r.commencement_date||r.commences_on||r.effective_date||r.commencing_date||null;
    const active = rows.find(r=> /active|current|in[_ -]?force/.test(st(r))) || rows.find(r=> !dateOf(r)) || null;
    const comRow = rows.find(r=> /commenc|forward|pending|future/.test(st(r)) && dateOf(r)) || rows.find(r=> dateOf(r));
    const commencing = (comRow && dateOf(comRow))
      ? { version: comRow.version||comRow.version_label, commencement_date: dateOf(comRow) }
      : null;
    return { active, commencing };
  }
  function normaliseEstateEntry(e){
    if(!e) return null;
    if(e.active || e.commencing){
      const c = e.commencing || null;
      const cd = c && (c.commencement_date||c.commences_on||c.effective_date);
      return { active: e.active||null,
        commencing: cd ? { version:c.version||c.version_label, commencement_date:cd } : null };
    }
    if(Array.isArray(e.rows)) return normaliseEstateRows(e.rows);
    return { active:e, commencing:null };
  }
  async function loadDocumentEstate(feed, currency){
    const out = {};
    // 1) Prefer an estate already surfaced on the assurance feed (P0 may attach it).
    (feed && Array.isArray(feed.document_estate) ? feed.document_estate : []).forEach(e=>{
      const key = e && (e.spec_id||e.spec||e.doc_code||e.page||e.title);
      if(key==null) return;
      const norm = normaliseEstateEntry(e); if(norm) out[key] = norm;
    });
    // 2) Per-spec spine lookups for true spec identifiers not already covered.
    const specs = (Array.isArray(currency)?currency:[])
      .map(p=> p && (p.spec_id||p.spec||p.doc_code))
      .filter(v=> v!=null && out[v]===undefined);
    await Promise.all([...new Set(specs)].map(async (spec)=>{
      try{
        const { data, error } = await sb.rpc("fn_document_estate_for_spec", { p_spec_id: spec });
        if(error || !data) return;
        const rows = Array.isArray(data) ? data
          : (Array.isArray(data.rows) ? data.rows : (Array.isArray(data.estate) ? data.estate : []));
        const entry = normaliseEstateRows(rows);
        if(entry) out[spec] = entry;
      }catch(_e){ /* spine absent — Active only */ }
    }));
    return out;
  }

  async function renderAssurance(){
    let host = document.getElementById("assurance");
    if(!host){
      const v = document.getElementById("vault");
      if(!v) return;
      host = document.createElement("div");
      host.id = "assurance";
      host.style.gridColumn = "1 / -1";
      v.insertAdjacentElement("afterend", host);
    }
    const { data, error } = await sb.rpc("legal_oversight_assurance");
    if(error || !data){ host.innerHTML = ""; return; }
    const progs = data.programmes || [];
    const c2 = data.c2_art14_cohort || null;
    const ev = data.isms_evidence || null;

    // ── Compliance & certification tracker — mirrors the CEO-dash feed
    //    (data.certification_tracker). Replaces the assurance programme cards and
    //    their non-functional "Open the assurance roadmap" links. Document chips
    //    resolve doc_code → Vault artefact at click time, never a dead link.
    const tracker = Array.isArray(data.certification_tracker) ? data.certification_tracker : [];
    const trkPill = (status)=>{
      const s = String(status||"").toLowerCase();
      const cls = s==="in_progress" ? "trk-amber"
        : (s==="complete"||s==="operating") ? "trk-green"
        : s==="blocked" ? "trk-red"
        : "trk-neutral";                          // planned + anything else → neutral
      return `<span class="pill trk-pill ${cls}">${esc(s ? s.replace(/_/g," ") : "—")}</span>`;
    };
    // Distinct AILANE-* doc_codes across evidence_uri + linked_spec_ids.
    const trkDocCodes = (t)=>{
      const blob = [t.evidence_uri].concat(Array.isArray(t.linked_spec_ids)?t.linked_spec_ids:[])
        .filter(Boolean).join(" ");
      return Array.from(new Set(blob.match(/AILANE-[A-Z0-9]+(?:-[A-Z0-9]+)*/g) || []));
    };
    const trackerCards = tracker.map(t=>{
      const pct = (t.progress_pct==null) ? null : Math.max(0, Math.min(100, Number(t.progress_pct)));
      const progressHtml = (pct==null) ? "" :
        `<div class="trk-progress"><div class="trk-bar"><i style="width:${pct}%"></i></div><span class="trk-pct">${pct}%</span></div>`;
      const meta = [];
      if(t.next_milestone) meta.push(`Next: ${esc(t.next_milestone)}`);
      if(t.owner) meta.push(`Owner: ${esc(t.owner)}`);
      const metaHtml = meta.length ? `<div class="trk-meta">${meta.join(" · ")}</div>` : "";
      const codes = trkDocCodes(t);
      const docsHtml = codes.length
        ? `<div class="trk-docs">${codes.map(c=>`<span class="trk-chip" role="button" tabindex="0" data-doc="${esc(c)}" title="Open ${esc(c)}">${esc(c)}</span>`).join("")}</div>`
        : "";
      const notesHtml = t.notes ? `<div class="trk-notes">${esc(t.notes)}</div>` : "";
      return `<div class="card">
        <div class="trk-head"><div class="ct">${esc(t.track||"")}${t.standard?` — ${esc(t.standard)}`:""}</div>${trkPill(t.status)}</div>
        ${progressHtml}${metaHtml}${docsHtml}${notesHtml}
      </div>`;
    }).join("");
    // Programmes the tracker does not surface — keep them visible so none of the
    // assurance programmes is lost. Match on distinctive tokens (≥4-digit standard
    // numbers or scheme words ≥3 chars), ignoring generic standards-body prefixes
    // so e.g. ISO/IEC 42001 is not conflated with the tracker's ISO 27001.
    const TRK_STOP = new Set(["iso","iec","the","and","type","uk","us","high","inc","ltd"]);
    const trkTokens = (s)=>{
      const out = new Set();
      (String(s||"").toLowerCase().match(/[a-z]{3,}|\d{4,}/g)||[]).forEach(x=>{ if(!TRK_STOP.has(x)) out.add(x); });
      return out;
    };
    const trkHay = new Set();
    tracker.forEach(t=>{ trkTokens(t.track).forEach(x=>trkHay.add(x)); trkTokens(t.standard).forEach(x=>trkHay.add(x)); });
    const alsoTracked = progs.filter(p=>{
      for(const x of trkTokens(p.programme)){ if(trkHay.has(x)) return false; }
      return true;
    });
    const alsoTrackedHtml = alsoTracked.length
      ? `<p class="trk-also">Also tracked: ${alsoTracked.map(p=>esc(p.programme||"")+" — "+esc(ASSURANCE_POSTURE_LABELS[p.posture]||p.posture||"")).join("; ")}.</p>`
      : "";
    const c2Line = c2 ? `
      <div class="card">
        <div class="ct">HSE Article 14 cohort — verification state</div>
        <div class="cd">${Number(c2.candidate_rows||0)} candidates · ${Number(c2.identified_cohort||0)} identified natural persons · ${Number(c2.confirmed_non_natural||0)} non-natural · ${Number(c2.unresolvable||0)} unresolvable</div>
        <div class="cd">Addresses captured: ${Number(c2.addresses_captured||0)} · notices prepared: ${Number(c2.notices_prepared||0)} · notices dispatched: ${Number(c2.notices_dispatched||0)}</div>
      </div>` : "";
    const evLine = ev ? `
      <div class="card">
        <div class="ct">ISMS evidence collection</div>
        <div class="cd">${Number(ev.evidence_items||0)} evidence items · ${Number(ev.automated_items||0)} automated · ${Number(ev.controls_with_evidence||0)} control refs</div>
        <div class="cd">Latest collection: ${esc(ev.latest_collected_at||"—")}</div>
      </div>` : "";
    // ── Context renderers (gate / KL / governance / charity) ──
    // Counsel instructions and public-page currency now render as Vault cards
    // (counsel-instruction / public-facing categories, §1.1/§1.4), so their former
    // dashboard renderers were removed here to keep the room de-duplicated (§1.2).
    function gateCards(rows){
      if(!Array.isArray(rows) || !rows.length) return "";
      const cls = s => s==="met"?"sa-green":(s==="not_run"?"sa-grey":(s==="unmet"?"sa-amber":"sa-grey"));
      const items = rows.map(g => `<span class="sa-pill ${cls(g.status)}" title="${esc(g.title||"")}">${esc(g.id)}${g.title?` — ${esc(g.title)}`:""}: ${esc((g.status||"").replace(/_/g," "))}</span>`).join(" ");
      return `<div class="card"><div class="ct">HSE deal-gate status</div>
        <div class="cd" style="margin-top:4px">The release-readiness conditions for HSE-derived intelligence. They gate live commercial use; this room is in review, so most conditions are not yet run.</div>
        <div class="cd" style="margin-top:4px;opacity:.85">Status — met (satisfied) · unmet (open) · not run (not yet assessed). See the Reviewer's Key for what each condition covers.</div>
        <div class="cd" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${items}</div></div>`;
    }
    function klCard(kl){
      if(!kl) return "";
      const lr = kl.licence_register||{}, cr = kl.content_review||{};
      return `<div class="card"><div class="ct">Knowledge Library — licensing & content posture</div>
        <div class="cd">Licence register: ${Number(lr.verified||0)}/${Number(lr.total||0)} verified${lr.pending?` · ${Number(lr.pending)} pending`:""}${lr.rejected?` · ${Number(lr.rejected)} rejected`:""}</div>
        <div class="cd">Content reviews: ${Number(cr.total||0)} · latest ${esc(cr.latest||"—")} · consent records: ${Number(kl.consent_records||0)}</div></div>`;

    function eileenCard(eg){
      if(!eg) return "";
      const bt = eg.by_failure_type ? Object.entries(eg.by_failure_type).map(([k,v])=>`${esc(String(k).replace(/_/g," "))}: ${Number(v)}`).join(" · ") : "";
      return `<div class="card"><div class="ct">Eileen — AI governance (advice-boundary guardrail)</div>
        <div class="cd">Constitutional Compliance Engine catches: ${Number(eg.guardrail_events_total||0)} total${bt?` · ${bt}`:""}</div>
        <div class="cd">Latest: ${esc(eg.latest_event||"—")} · evidences the intelligence-not-advice gate is enforced.</div></div>`;
    }
    function charitySection(c){
      if(!c) return "";
      const bs = c.obligations_by_status ? Object.entries(c.obligations_by_status).map(([k,v])=>`${esc(String(k))}: ${Number(v)}`).join(" · ") : "";
      return `<div class="sh"><span class="bar"></span><span class="st">Charity estate — separate regime</span><span class="sc">${Number(c.obligations_total||0)}</span></div>
        <div class="cards"><div class="card"><div class="ct">Charity obligations</div>
        <div class="cd">${Number(c.obligations_total||0)} obligations${bs?` (${bs})`:""} · next due ${esc(c.next_due||"—")}</div>
        <div class="cd">Contracts in vault: ${Number(c.contract_vault_count||0)} · open statute alerts: ${Number(c.statute_alerts_open||0)}</div>
        <div class="cd" style="opacity:.7">Charity law / Charity Commission regime — distinct from the data-protection estate.</div></div></div>`;
    }
    const gateBlk = gateCards(data.gates);
    const klBlk = klCard(data.knowledge_library);
    const eileenBlk = eileenCard(data.eileen_governance);
    const charityBlk = charitySection(data.charity);

    // ── Solicitor panel + counsel matters + public-page currency + dual-state ──
    //    §1C renderers from AILANE-CC-BRIEF-LOVR-SOLICITOR-PANEL-SITE-001 (the
    //    canonical solicitor format), applied verbatim and reading the existing
    //    legal_oversight_assurance() feed: solicitor_actions / counsel_instructions
    //    / currency. The room's own gateCards already renders data.gates above, so
    //    the canonical gateCards is not re-added here (de-duplicated). Every block
    //    renders only when its data is present — safe to merge before or after P0.
    const counsel = data.counsel_instructions || [];
    const SA_LABEL = { amber:"Awaiting instruction", blue:"Instructed — awaiting opinion", purple:"Acknowledgement required", indigo:"Sign-off required", green:"Returned / received", red:"Overdue / rectification", grey:"Planned" };
    const SA_RANK = { red:0, amber:1, blue:2, purple:3, indigo:4, grey:5, green:6 };
    // §1.2 — a counsel matter as counselCard (ref — title / Status · due / matter /
    // Open instruction). sa-doc resolves doc_code → artefact via the cached Vault
    // rows at click time (same path as the tracker chips), reusing lovr-vault-resolve.
    function counselCard(ci){
      const doc = ci.artefact_doc_code
        ? `<div class="cd"><span class="sa-doc" role="button" tabindex="0" style="cursor:pointer" data-doc="${esc(ci.artefact_doc_code)}" title="Open ${esc(ci.artefact_doc_code)}">Open instruction: ${esc(ci.artefact_doc_code)}</span></div>` : "";
      return `<div class="card">
        <div class="ct">${esc(ci.instruction_ref||"")} — ${esc(ci.title||"")}</div>
        <div class="cd">Status: ${esc((ci.status||"").replace(/_/g," "))}${ci.due_date?` · due ${esc(ci.due_date)}`:""}</div>
        <div class="cd">${esc(ci.matter_plain || ci.scope_summary || "")}</div>${doc}
      </div>`;
    }
    function saPanel(actions){
      if(!Array.isArray(actions) || !actions.length) return "";
      const open = actions.filter(a => a.colour !== "green");
      const topColour = open.sort((a,b)=>(SA_RANK[a.colour]??9)-(SA_RANK[b.colour]??9))[0]?.colour || "green";
      const rows = actions.map(a => `
        <div class="sa-row">
          <div class="sa-main">
            <div class="sa-name">${esc(a.title||a.ref||"")}</div>
            <div class="sa-sub">${esc(a.plain_summary||"")}${a.due_date?` · due ${esc(a.due_date)}`:""}</div>
          </div>
          <span class="sa-pill sa-${esc(a.colour||"grey")}">${esc(SA_LABEL[a.colour]||a.state||"")}</span>
        </div>`).join("");
      return `<div class="sa-panel">
        <div class="sa-hd" style="border-bottom-color:${({amber:'#f59e0b',blue:'#2563eb',purple:'#7c3aed',indigo:'#4f46e5',red:'#dc2626',green:'#16a34a',grey:'#9ca3af'})[topColour]||'#9ca3af'}">
          Solicitor actions <span class="sa-count">${open.length} open</span>
        </div>${rows}
      </div>`;
    }
    // §1.4 — Active (green) always; Commencing (amber) only when a forward-dated
    // spine row with a commencement_date exists for this spec. Else Active only.
    const estate = await loadDocumentEstate(data, data.currency);
    function commencingFor(p){
      const keys = [p&&p.spec_id, p&&p.spec, p&&p.doc_code, p&&p.page, p&&p.title].filter(v=> v!=null);
      for(const k of keys){ const e = estate[k]; if(e && e.commencing && e.commencing.commencement_date) return e.commencing; }
      if(p && p.commencing && p.commencing.commencement_date) return p.commencing;
      if(p && p.commencement_date) return { version:p.commencing_version, commencement_date:p.commencement_date };
      return null;
    }
    function currencyCards(rows){
      if(!Array.isArray(rows) || !rows.length) return "";
      return rows.map(p => {
        const stale = p.last_event && p.last_event !== "director_approved_update" && p.last_event !== "baseline";
        const flag = (p.last_event === "baseline")
          ? `<span class="sa-pill sa-grey">Baseline — review currency</span>`
          : (stale ? `<span class="sa-pill sa-amber">${esc(p.last_event.replace(/_/g," "))}</span>`
                   : `<span class="sa-pill sa-green">Active</span>`);
        const com = commencingFor(p);
        const comPill = com
          ? ` <span class="sa-pill sa-amber" title="Forward-dated change — one ratification stands estate-wide">Commencing (${esc(fmtDate(com.commencement_date)||com.commencement_date)})${com.version?` · ${esc(normVer(com.version))}`:""}</span>`
          : "";
        return `<div class="card"><div class="ct">${esc(p.title||p.page||"")}</div>
          <div class="cd">${esc(normVer(p.version||""))}</div><div class="cd">${flag}${comPill}</div></div>`;
      }).join("");
    }
    const saHtml = saPanel(data.solicitor_actions);
    const counselCards = counsel.map(counselCard).join("");
    const counselSection = counsel.length
      ? `<div class="sh"><span class="bar"></span><span class="st">External counsel — the five matters</span><span class="sc">${counsel.length}</span></div>
         <div class="cards">${counselCards}</div>` : "";
    const currCards = currencyCards(data.currency);
    const currencySection = currCards
      ? `<div class="sh"><span class="bar"></span><span class="st">Public-page currency</span><span class="sc">${(data.currency||[]).length}</span></div>
         <div class="cards">${currCards}</div>` : "";

    host.innerHTML = `
      ${saHtml}
      <details class="ctx-block">
      <summary class="ctx-summary">AI Lane assurance posture &amp; status — context (click to expand)</summary>
      <div class="ctx-body">
      <div class="section">
        <div class="sh"><span class="bar"></span><span class="st">Compliance &amp; certification tracker</span><span class="sc">${tracker.length}</span></div>
        <div class="cards">${trackerCards}</div>
        ${alsoTrackedHtml}
        ${counselSection}
        ${(c2Line||evLine) ? `<div class="sh"><span class="bar"></span><span class="st">Verification &amp; evidence</span></div>
        <div class="cards">${c2Line}${evLine}</div>` : ""}
        ${currencySection}
        ${gateBlk ? `<div class="cards" style="margin-top:14px">${gateBlk}</div>` : ""}
        ${(klBlk||eileenBlk) ? `<div class="sh"><span class="bar"></span><span class="st">Knowledge Library &amp; AI governance</span></div>
        <div class="cards">${klBlk}${eileenBlk}</div>` : ""}
        ${charityBlk}
        <p class="cd" style="opacity:.7;margin-top:8px">Postures shown are programme states, not certification claims. Statuses update live from the governance estate.</p>
      </div></div>
      </details>`;
    // Wire tracker document chips. Resolve doc_code → artefact_id from the cached
    // Vault rows (vaultCache.reg) at click time, so the load order of the Vault vs
    // this section cannot leave a chip unresolved; unknown codes scroll to the
    // assurance Vault section rather than dead-link.
    host.querySelectorAll(".trk-chip[data-doc]").forEach(chip=>{
      const code = chip.getAttribute("data-doc");
      const go = ()=>{
        const row = (vaultCache && Array.isArray(vaultCache.reg)) ? vaultCache.reg.find(r=>r.doc_code===code) : null;
        if(row && row.artefact_id) LOVR.open(row.artefact_id, "preview");
        else LOVR.railScroll("sec-assurance");
      };
      chip.addEventListener("click", go);
      chip.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
    });
    // Wire the counsel-card "Open instruction" references (§1.2). Resolve doc_code →
    // artefact_id from the cached Vault rows at click time (same path as trk-chips),
    // reusing lovr-vault-resolve; unknown codes scroll to the counsel Vault section.
    host.querySelectorAll(".sa-doc[data-doc]").forEach(el=>{
      const code = el.getAttribute("data-doc");
      const go = ()=>{
        const row = (vaultCache && Array.isArray(vaultCache.reg)) ? vaultCache.reg.find(r=>r.doc_code===code) : null;
        if(row && row.artefact_id) LOVR.open(row.artefact_id, "preview");
        else LOVR.railScroll("sec-counsel-instruction");
      };
      el.addEventListener("click", go);
      el.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
    });
  }
  const __rvhOriginal = renderVaultHub;
  renderVaultHub = async function(){
    await __rvhOriginal.apply(this, arguments);
    try { await renderAssurance(); } catch(e){ console.error("assurance section", e); }
  };

  boot();
})();
</script>
</body>
</html>
