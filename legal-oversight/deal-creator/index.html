<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Deal Creator · Legal Oversight Room · Ailane</title>
  <meta name="description" content="Counterparty Deal-Room Experience — Deal Creator (synthetic demonstration).">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://www.googletagmanager.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co; img-src 'self' data: https://cnbsxwtvazfvzmltkuvx.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <link rel="stylesheet" href="../shared/dealroom.css">
  <!-- Google Analytics 4 (G-NTNXWZN31C) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C', { anonymize_ip: true });
  </script>
  <style>
    .dc-banner{background:rgba(34,27,8,.97);border:1px solid rgba(245,158,11,.45);border-radius:10px;
      padding:12px 16px;margin-bottom:22px;color:#f6d49a;font-size:13.5px;line-height:1.5}
    .dc-banner b{color:#F59E0B}
    .dc-alin{display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(148,163,184,.2);
      border-radius:10px;background:rgba(30,41,59,.5);padding:14px 16px;margin-bottom:24px}
    .dc-alin .ic{color:#0EA5E9;font-size:18px;line-height:1}
    .dc-alin p{margin:0;font-size:13px;color:#94A3B8;line-height:1.6}
    .dc-kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-top:4px}
    .dc-kv .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--dr-text-muted)}
    .dc-kv .v{font-size:14px;color:#F1F5F9;margin-top:3px}
    .dc-ladder{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px}
    .dc-ladder th,.dc-ladder td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--dr-border);vertical-align:top}
    .dc-ladder th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--dr-text-muted)}
    .dc-ladder td.num,.dc-ladder th.num{text-align:right;font-family:var(--dr-font-mono);white-space:nowrap}
    .dc-md{font-size:11.5px;color:var(--dr-text-muted);margin-top:3px;line-height:1.45}
    .dc-mods{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
    .dc-mods li{display:flex;justify-content:space-between;gap:12px;padding:9px 12px;border:1px solid rgba(148,163,184,.2);border-radius:8px;background:var(--dr-bg-card)}
    .dc-mods .mv{font-family:var(--dr-font-mono);color:#F59E0B;white-space:nowrap}
    .dc-env{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
    .dc-env .cell{border:1px solid rgba(148,163,184,.2);border-radius:8px;background:var(--dr-bg-card);padding:12px 14px}
    .dc-env .cell.target{border-color:rgba(245,158,11,.45)}
    .dc-env .k{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--dr-text-muted)}
    .dc-env .v{font-size:18px;font-family:var(--dr-font-mono);margin-top:4px;color:#F1F5F9}
    .dc-env .cell.target .v{color:#F59E0B}
    .dc-note{font-size:13px;color:#94A3B8;line-height:1.6;border:1px solid rgba(148,163,184,.2);border-left:3px solid #0EA5E9;border-radius:8px;background:var(--dr-bg-card);padding:14px 16px;margin-top:8px}
    .dc-sec{margin:28px 0}
    .dc-sec h2{font-size:1.1rem;color:#F1F5F9;margin:0 0 12px}
  </style>
</head>
<body style="visibility:hidden">
  <div id="drApp"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/reviewer-auth.js"></script>
  <script>
    // Legal Oversight Room — Deal Creator (synthetic Counterparty Deal-Room Experience).
    // Reconciles to the established deal-room Deal Creator: ALIN identifier baseline +
    // the tier ladder, commercial modifiers and indicative envelope — rendered read-only
    // from the reviewer-safe lovr-dealroom-observe (synthetic R&D Simulation Ltd).
    // Identifier framing is ALIN + Companies House Number only (verified: the modifier
    // set carries no banned identifier).
    const esc = window.dealroomAuth.escapeHtml;
    const sb = window.dealroomSupabase;
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.dealroomConfig;
    const gbp = (p) => p == null ? '—' : (p >= 1e8 ? '£' + (p/100/1e6).toFixed(2) + 'M' : '£' + (p/100).toLocaleString('en-GB',{minimumFractionDigits:2}));

    document.addEventListener('DOMContentLoaded', () => window.dealroomAuth.guard({ onReady: boot }));

    async function observe(payload){
      const { data:{ session } } = await sb.auth.getSession();
      const r = await fetch(`${SUPABASE_URL}/functions/v1/lovr-dealroom-observe`, {
        method:'POST', headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${session ? session.access_token : ''}` },
        body: JSON.stringify(payload) });
      if(!r.ok) throw new Error('observe ' + r.status);
      return r.json();
    }

    function shell(s, inner){
      const email = (s.user && s.user.email) || '';
      return `
        <div class="dr-shell">
          <header class="dr-header">
            <div class="dr-header-brand">
              <div class="dr-header-brand-mark">AL</div>
              <div><div class="dr-header-title">Ailane × ${esc(s.counterparty_name)}</div>
                <div class="dr-header-subtitle">Deal-Room · Phase 0 — Engagement &amp; proposal</div></div>
            </div>
            <div class="dr-header-meta">
              <span class="dr-chip dr-chip-phase_0">Phase 0</span>
              <div class="dr-header-user"><div class="dr-header-user-email">${esc(email)}</div></div>
              <button id="drSignOutBtn" class="dr-btn dr-btn-ghost dr-btn-sm">Sign out</button>
            </div>
          </header>
          <nav class="dr-nav">
            <a href="../" class="dr-nav-link">&larr; Experience</a>
            <a href="../documents/" class="dr-nav-link">Deal Documents</a>
            <a href="../deal-creator/" class="dr-nav-link active">Deal Creator</a>
            <a href="../status/" class="dr-nav-link">Engagement Status</a>
            <a href="../pathway/" class="dr-nav-link">Pathway</a>
            <a href="/legal-oversight/#vault" class="dr-nav-link">Document Vault</a>
          </nav>
          <main class="dr-main">
            <div class="dr-page-header">
              <div class="dr-page-title">Deal Creator</div>
              <div class="dr-page-subtitle">How the deal room composes a configuration and produces its indicative price. Synthetic demonstration — read-only.</div>
            </div>
            ${inner}
          </main>
          <footer class="dr-footer">
            <div class="dr-footer-strong">AI Lane Limited (trading as Ailane)</div>
            Company No. 17035654 · ICO Reg. 00013389720
            <div class="dr-footer-legal"><strong>Ailane&reg;</strong> is a registered trademark of AI Lane Limited. Regulatory intelligence, not legal advice. Synthetic demonstration; not for further distribution.</div>
          </footer>
        </div>`;
    }
    function bindSignOut(){
      const b = document.getElementById('drSignOutBtn');
      if(b) b.addEventListener('click', () => window.dealroomAuth.signOut().then(()=> window.location.replace('/legal-oversight/')));
    }

    function banner(){
      return `<div class="dc-banner"><b>Demonstration — synthetic data.</b> Simulated deal room (R&amp;D Simulation Ltd). No real counterparty, no live data; the live-delivery gate is OFF.</div>`;
    }
    function alin(){
      return `<div class="dc-alin"><span class="ic" aria-hidden="true">&#x2299;</span>
        <p>All records are <strong>ALIN-keyed</strong> (Ailane proprietary identifier) with <strong>Companies House Number</strong> cross-reference where available. Additional cross-reference systems (FCA, Charity Commission, GLEIF) available on request where applicable.</p></div>`;
    }
    function overview(p){
      const kv = [['Type',p.type],['MCA variant',p.mca_variant],['Geographic scope',p.geographic_scope],
        ['Packages',(p.packages||[]).join(', ')],['Exclusivity appetite',p.exclusivity_appetite],
        ['Exclusivity tier',p.exclusivity_tier],['Term',p.term_months!=null?p.term_months+' months':null],['Gate state',p.gate_state]];
      return `<div class="dc-sec"><h2>Configuration — ${esc(p.legal_name||'—')}</h2>
        <div class="dc-kv">${kv.map(([k,v])=>`<div><div class="k">${esc(k)}</div><div class="v">${esc(v==null||v===''?'—':v)}</div></div>`).join('')}</div></div>`;
    }
    function pricing(p, pr){
      const tiers = (pr&&pr.tiers)||[];
      const mods = (pr&&pr.modifiers)||[];
      const table = `<table class="dc-ladder"><thead><tr><th>Enrichment tier</th><th class="num">Cumulative · per record / yr</th></tr></thead><tbody>`+
        tiers.map(t=>`<tr><td>${esc(t.name||t.code)}${t.description?`<div class="dc-md">${esc(t.description)}</div>`:''}</td><td class="num">${gbp(t.cumulative_pence)}</td></tr>`).join('')+`</tbody></table>`;
      const modlist = mods.length ? `<ul class="dc-mods">`+mods.map(m=>{
        const val = m.value_pence!=null ? gbp(m.value_pence) : (m.value_pct!=null ? m.value_pct+'%' : '—');
        return `<li><div><div>${esc(m.name||m.code)}</div>${m.description?`<div class="dc-md">${esc(m.description)}</div>`:''}</div><div class="mv">${esc(val)}</div></li>`;
      }).join('')+`</ul>` : '';
      const env = `<div class="dc-env">
        <div class="cell"><div class="k">Floor</div><div class="v">${gbp(p.envelope_floor_pence)}</div></div>
        <div class="cell target"><div class="k">Target</div><div class="v">${gbp(p.envelope_target_pence)}</div></div>
        <div class="cell"><div class="k">Ceiling</div><div class="v">${gbp(p.envelope_ceiling_pence)}</div></div>
        <div class="cell"><div class="k">Pilot fee</div><div class="v">${gbp(p.pilot_fee_pence)}</div></div></div>`;
      return `<div class="dc-sec"><h2>How the indicative price is produced</h2>${table}${modlist}${env}
        <div class="dc-md" style="margin-top:12px;font-style:italic">Eileen computes the indicative envelope from the data scope and these modifiers; the Director sets final terms. No live quote is produced on this surface.</div></div>`;
    }
    function eileenNote(e){
      return `<div class="dc-sec"><h2>Eileen in the deal room</h2><div class="dc-note">${esc((e&&e.role)||'—')}</div></div>`;
    }
    function creatorNote(dc){
      return `<div class="dc-sec"><h2>How a deal room is created</h2><div class="dc-note">${esc((dc&&dc.note)||'—')}</div></div>`;
    }

    async function boot(s){
      document.getElementById('drApp').innerHTML = shell(s, `<div class="dr-loading"><span class="dr-spinner"></span> Loading the deal creator…</div>`);
      bindSignOut();
      document.body.style.visibility = 'visible';
      try{
        const d = await observe({ action:'overview' });
        const p = d.profile || {};
        document.querySelector('.dr-main').insertAdjacentHTML('beforeend', '');
        const main = document.querySelector('.dr-main');
        // remove the loader, then paint
        const loader = main.querySelector('.dr-loading'); if(loader) loader.remove();
        main.insertAdjacentHTML('beforeend',
          banner() + alin() + overview(p) + pricing(p, d.pricing||{}) + eileenNote(d.eileen||{}) + creatorNote(d.deal_creator||{}));
      }catch(err){
        const main = document.querySelector('.dr-main');
        const loader = main && main.querySelector('.dr-loading'); if(loader) loader.remove();
        if(main) main.insertAdjacentHTML('beforeend', `<div class="dr-notice dr-notice-danger">Unable to load the deal creator (${esc(err.message||'error')}). If your reviewer access is still being verified, it will appear once confirmed.</div>`);
      }
    }
  </script>
</body>
</html>
