<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Ailane</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#060D1B;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;padding:20px}
    .card{width:100%;max-width:400px;background:rgba(10,22,40,0.8);border:1px solid #1e293b;border-radius:16px;padding:40px 32px}
    .brand{text-align:center;margin-bottom:32px}
    .brand h1{font-size:2rem;font-weight:700;letter-spacing:0.2em;color:#fff;margin-bottom:8px}
    .brand p{font-size:0.9rem;color:#64748b}
    .field{margin-bottom:20px}
    .field label{display:block;font-size:0.85rem;color:#94a3b8;margin-bottom:6px}
    .field input{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #1e293b;border-radius:10px;color:#e2e8f0;font-size:1rem;outline:none}
    .field input:focus{border-color:#38bdf8}
    .btn{width:100%;padding:14px;background:#38bdf8;color:#fff;font-size:1rem;font-weight:600;border:none;border-radius:10px;cursor:pointer}
    .btn:hover{background:#0ea5e9}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .btn-alt{background:transparent;border:1px solid #38bdf8;color:#38bdf8;margin-top:10px}
    .btn-alt:hover{background:rgba(56,189,248,0.1)}
    .err{color:#ef4444;font-size:0.85rem;text-align:center;margin-top:12px;min-height:20px}
    .ok{color:#22c55e;font-size:0.85rem;text-align:center;margin-top:12px}
    .link{text-align:center;margin-top:16px}
    .link a{color:#38bdf8;font-size:0.85rem;text-decoration:none;cursor:pointer}
    .link a:hover{text-decoration:underline}
    .back a{color:#64748b}
    .ft{text-align:center;margin-top:24px;font-size:0.8rem;color:#475569}
    .ft a{color:#64748b;text-decoration:none}
    .pf{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:12px;font-size:0.7rem;color:#334155}
    .hide{display:none}
    .sp{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:s .6s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
  <!-- Ailane favicon / app icons — estate head standard (AMD-246) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0e1a">
</head>
<body>
  <div class="card">
    <div class="brand"><h1>AILANE</h1><p id="sub">Sign in to your account</p></div>
    <div id="sf">
      <div class="field"><label for="em">Email address</label><input type="email" id="em" placeholder="you@company.co.uk" autocomplete="email"></div>
      <div class="field"><label for="pw">Password</label><input type="password" id="pw" placeholder="Your password" autocomplete="current-password"></div>
      <button class="btn" id="go" onclick="doLogin()">Sign In</button>
      <div class="err" id="err"></div>
      <!-- Passwordless magic-link sign-in (KLUI-001 / AMD-262) — additive; the password,
           passkey, authenticator and reset flows are unchanged. Uses the email entered above. -->
      <button class="btn btn-alt" id="mlgo" onclick="doMagicLink()">Email me a sign-in link</button>
      <div class="ok hide" id="mlok"></div>
      <div class="link"><a onclick="showReset()">Forgot password?</a></div>
    </div>
    <div id="rf" class="hide">
      <div class="field"><label for="re">Email address</label><input type="email" id="re" placeholder="you@company.co.uk" autocomplete="email"></div>
      <button class="btn" id="rb" onclick="doReset()">Send Reset Link</button>
      <div class="err" id="rerr"></div>
      <div class="ok hide" id="rok">Check your email for a password reset link.</div>
      <div class="link back"><a onclick="showLogin()">Back to sign in</a></div>
    </div>
    <div class="ft"><a href="/terms/">Terms of Service</a> · <a href="/privacy/">Privacy Policy</a></div>
  </div>
  <div class="pf">AI Lane Limited (Company No. 17035654) · ailane.ai</div>
  <script>
  var SB_URL='https://cnbsxwtvazfvzmltkuvx.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
  var sb=window.supabase.createClient(SB_URL,SB_KEY);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
  document.getElementById('em').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('pw').focus()});
  function dest(t){
    if(t==='operational'||t==='operational_readiness')return'/operational/';
    if(t==='governance')return'/governance/';
    if(t==='enterprise'||t==='institutional')return'/enterprise/';
    return'/knowledge-library/';
  }
  async function getTier(token){
    var p=JSON.parse(atob(token.split('.')[1]));
    var r=await fetch(SB_URL+'/rest/v1/kl_account_profiles?select=subscription_tier&user_id=eq.'+p.sub+'&limit=1',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Accept':'application/json'}
    });
    if(!r.ok)return null;
    var rows=await r.json();
    return(rows&&rows.length>0)?rows[0].subscription_tier:null;
  }
  // KL session entitlement (KLUI-001/AMD-262, brief §2). RULE 2 raw-fetch Bearer, mirroring
  // the vault's own gate: same RPC + p_user_id param; live = an entitlement row whose
  // expires_at is in the future. Fails closed to false on any non-OK/parse/network error.
  async function checkKLSession(token){
    try{
      var p=JSON.parse(atob(token.split('.')[1]));
      var r=await fetch(SB_URL+'/rest/v1/rpc/kl_session_entitlement',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({p_user_id:p.sub})
      });
      if(!r.ok)return false;
      var rows=await r.json();
      var ent=Array.isArray(rows)?(rows[0]||null):(rows||null);
      return !!(ent&&ent.expires_at&&new Date(ent.expires_at).getTime()>Date.now());
    }catch(e){return false}
  }
  // Entitlement-aware post-auth routing (subscription-primary) — shared by password and
  // magic-link sign-in and by the on-load session check (brief §2). Never targets index.html.
  async function route(session){
    var tier=await getTier(session.access_token);
    try{if(window.gtag)gtag('event','login',{method:'email',subscription_tier:tier})}catch(e){}
    // Subscribers land exactly where they do today: dest() maps the org tier to its
    // subscription destination; anything other than the KL default means a subscription.
    var subDest=dest(tier);
    if(subDest!=='/knowledge-library/'){window.location.replace(subDest);return}
    // No subscription → an active KL session opens the vault; otherwise the existing default.
    var hasKLSession=await checkKLSession(session.access_token);
    window.location.replace(hasKLSession?'/knowledge-library/vault/':'/knowledge-library/');
  }
  // AAL2-STEPUP-001 (Stage C · C1): a persisted session must pass the same step-up
  // as a fresh sign-in. Auto-routing an MFA-enrolled aal1 session onward left every
  // vault read/write silently RLS-filtered downstream (aal2_required_when_enrolled).
  (async function(){try{var g=await sb.auth.getSession();if(g.data&&g.data.session){document.getElementById('sub').textContent='Checking session...';
    try{
      var aal=await sb.auth.mfa.getAuthenticatorAssuranceLevel();
      if(aal.data && aal.data.nextLevel==='aal2' && aal.data.currentLevel!=='aal2'){
        return showMfaChallenge(g.data.session, null, document.getElementById('err'));
      }
    }catch(e){}
    await route(g.data.session)}}catch(e){}})();
  async function doLogin(){
    var email=document.getElementById('em').value.trim(),pass=document.getElementById('pw').value,err=document.getElementById('err'),btn=document.getElementById('go');
    err.textContent='';
    if(!email){err.textContent='Please enter your email.';return}
    if(!pass){err.textContent='Please enter your password.';return}
    btn.disabled=true;btn.innerHTML='<span class="sp"></span>Signing in...';
    try{
      var res=await sb.auth.signInWithPassword({email:email,password:pass});
      if(res.error){err.textContent=res.error.message;btn.disabled=false;btn.textContent='Sign In';return}
      if(!res.data.session){err.textContent='No session returned. Try again.';btn.disabled=false;btn.textContent='Sign In';return}
      // AAL2 step-up (AILANE-SPEC-AUTH-001)
      try{
        var aal=await sb.auth.mfa.getAuthenticatorAssuranceLevel();
        if(aal.data && aal.data.nextLevel==='aal2' && aal.data.currentLevel!=='aal2'){
          return showMfaChallenge(res.data.session, btn, err);
        }
      }catch(e){}
      btn.innerHTML='<span class="sp"></span>Loading dashboard...';
      await route(res.data.session);
    }catch(e){err.textContent='An error occurred. Please try again.';btn.disabled=false;btn.textContent='Sign In'}
  }
  async function showMfaChallenge(session, btn, err){
    // Determine the available second factor(s) before choosing the prompt.
    var lf=await sb.auth.mfa.listFactors();
    var totpFactor=(lf.data && lf.data.totp && lf.data.totp[0]) ? lf.data.totp[0] : null;
    var webauthnFactor=null;
    if(lf.data){
      var all=lf.data.all||[];
      for(var i=0;i<all.length;i++){
        if(all[i].factor_type==='webauthn' && all[i].status==='verified'){webauthnFactor=all[i];break;}
      }
      // POLISH-001 · F12 (Stage C): VERIFIED passkeys only. The previous fallback to
      // lf.data.webauthn[0] could select an abandoned, unverified enrolment and show
      // a "Use your passkey" button that can never verify — a dead end when no TOTP
      // factor exists. Passkey stays Beta-hidden at enrolment (account/security
      // PASSKEY_BETA_ENABLED=false); an already-verified passkey still works here.
    }
    var canWebAuthn=!!(webauthnFactor && window.PublicKeyCredential && sb.auth.mfa.webauthn);
    // Hide the password form, keep the error line.
    var sf=document.getElementById('sf');
    if(sf){Array.prototype.forEach.call(sf.children,function(c){if(c.id!=='err')c.classList.add('hide')})}
    document.getElementById('err').textContent='';
    if(canWebAuthn && !totpFactor){
      document.getElementById('sub').textContent='Confirm with your passkey';
      renderPasskeyChallenge(session, webauthnFactor, false);
    }else if(canWebAuthn && totpFactor){
      // Both available — passkey is preferred for privileged users; a code is offered too.
      document.getElementById('sub').textContent='Confirm it’s you';
      renderPasskeyChallenge(session, webauthnFactor, true);
    }else{
      // TOTP-only path (unchanged behaviour).
      document.getElementById('sub').textContent='Enter your authenticator code';
      renderTotpChallenge(session);
    }
    if(btn){btn.disabled=false}
  }
  function renderTotpChallenge(session){
    var sf=document.getElementById('sf');
    if(!document.getElementById('mfw')){
      var wrap=document.createElement('div');
      wrap.id='mfw';
      wrap.innerHTML='<div class="field"><label for="mfa">Authenticator code</label><input type="text" id="mfa" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456"></div><button class="btn" id="mgo">Verify</button>';
      var errEl=document.getElementById('err');
      sf.insertBefore(wrap, errEl);
      document.getElementById('mgo').addEventListener('click',function(){verifyMfa(session)});
      document.getElementById('mfa').addEventListener('keydown',function(e){if(e.key==='Enter')verifyMfa(session)});
    }else{
      document.getElementById('mfw').classList.remove('hide');
    }
    document.getElementById('mfa').focus();
  }
  function renderPasskeyChallenge(session, factor, showCodeOption){
    var sf=document.getElementById('sf');
    if(!document.getElementById('pkw')){
      var wrap=document.createElement('div');
      wrap.id='pkw';
      var html='<button class="btn" id="pkgo">Use your passkey</button>';
      if(showCodeOption){html+='<div class="link"><a id="usecode">Use an authenticator code instead</a></div>';}
      wrap.innerHTML=html;
      var errEl=document.getElementById('err');
      sf.insertBefore(wrap, errEl);
      document.getElementById('pkgo').addEventListener('click',function(){verifyWebAuthn(session, factor)});
      if(showCodeOption){
        document.getElementById('usecode').addEventListener('click',function(){
          document.getElementById('pkw').classList.add('hide');
          document.getElementById('sub').textContent='Enter your authenticator code';
          renderTotpChallenge(session);
        });
      }
    }else{
      document.getElementById('pkw').classList.remove('hide');
    }
  }
  // Passkey challenge. webauthn.authenticate() runs the full ceremony per Supabase docs:
  // challenge -> navigator.credentials.get() -> verify. Either factor satisfies AAL2.
  async function verifyWebAuthn(session, factor){
    var pkgo=document.getElementById('pkgo');
    var err=document.getElementById('err');
    err.textContent='';
    if(pkgo){pkgo.disabled=true;pkgo.innerHTML='<span class="sp"></span>Waiting for your device...'}
    try{
      var v=await sb.auth.mfa.webauthn.authenticate({factorId:factor.id, webauthn:{}});
      if(v&&v.error){err.textContent=v.error.message||'Could not confirm your passkey. Please try again.';if(pkgo){pkgo.disabled=false;pkgo.textContent='Use your passkey'}return}
      return route(session);
    }catch(e){
      if(pkgo){pkgo.disabled=false;pkgo.textContent='Use your passkey'}
      err.textContent='Could not confirm your passkey. Please try again.';
    }
  }
  async function verifyMfa(session){
    var code=document.getElementById('mfa').value.trim();
    var mgo=document.getElementById('mgo');
    if(mgo){mgo.disabled=true;mgo.innerHTML='<span class="sp"></span>Verifying...'}
    var lf=await sb.auth.mfa.listFactors();
    var f=(lf.data && lf.data.totp && lf.data.totp[0]) ? lf.data.totp[0] : null;
    if(!f){document.getElementById('err').textContent='No authenticator factor found.';if(mgo){mgo.disabled=false;mgo.textContent='Verify'}return}
    var v=await sb.auth.mfa.challengeAndVerify({ factorId:f.id, code:code });
    if(v.error){document.getElementById('err').textContent=v.error.message;if(mgo){mgo.disabled=false;mgo.textContent='Verify'}return}
    return route(session); // reuse the page's existing post-login routing
  }
  function showReset(){document.getElementById('sf').classList.add('hide');document.getElementById('rf').classList.remove('hide');document.getElementById('sub').textContent='Reset your password';var v=document.getElementById('em').value;if(v)document.getElementById('re').value=v}
  function showLogin(){document.getElementById('rf').classList.add('hide');document.getElementById('sf').classList.remove('hide');document.getElementById('sub').textContent='Sign in to your account';document.getElementById('rerr').textContent='';document.getElementById('rok').classList.add('hide')}
  async function doReset(){
    var email=document.getElementById('re').value.trim(),err=document.getElementById('rerr'),ok=document.getElementById('rok'),btn=document.getElementById('rb');
    err.textContent='';ok.classList.add('hide');
    if(!email){err.textContent='Please enter your email.';return}
    btn.disabled=true;btn.innerHTML='<span class="sp"></span>Sending...';
    try{var res=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/auth/callback/'});if(res.error)err.textContent=res.error.message;else{ok.classList.remove('hide');err.textContent=''}}catch(e){err.textContent='An error occurred.'}
    btn.disabled=false;btn.textContent='Send Reset Link';
  }
  // Passwordless magic-link sign-in (brief §1). Additive to signInWithPassword / passkey /
  // authenticator / resetPasswordForEmail. Uses the email already entered; emailRedirectTo
  // MUST be the allow-listed https://ailane.ai/login/, where the on-load check routes by entitlement.
  async function doMagicLink(){
    var email=document.getElementById('em').value.trim(),err=document.getElementById('err'),ok=document.getElementById('mlok'),btn=document.getElementById('mlgo');
    err.textContent='';ok.classList.add('hide');
    if(!email){err.textContent='Please enter your email.';return}
    btn.disabled=true;btn.innerHTML='<span class="sp"></span>Sending link...';
    try{
      var res=await sb.auth.signInWithOtp({email:email,options:{emailRedirectTo:'https://ailane.ai/login/',shouldCreateUser:true}});
      if(res.error){err.textContent=res.error.message;btn.disabled=false;btn.textContent='Email me a sign-in link';return}
      ok.textContent='Check your email — we’ve sent a sign-in link to '+email+'. It’s valid for a short time.';
      ok.classList.remove('hide');
      btn.disabled=false;btn.textContent='Email me a sign-in link';
    }catch(e){err.textContent='An error occurred. Please try again.';btn.disabled=false;btn.textContent='Email me a sign-in link'}
  }
  </script>
</body>
</html>
