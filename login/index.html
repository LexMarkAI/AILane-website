  <script>
  // ════════════════════════════════════════════════════════════════════
  // AILANE LOGIN — AILANE-SPEC-AUTH-002 v1.0
  // Written from scratch. No patches. No CC code.
  // ════════════════════════════════════════════════════════════════════

  // ── CREDENTIALS (verified by JWT decode — ref matches project) ──
  var SUPABASE_URL  = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzkxNTM5NjAsImV4cCI6MjA1NDcyOTk2MH0.1TYFiSdOeMHLH_dPBR-YB2JlAgrLH3F7G9k7WlDVZ5g';

  // ── SUPABASE CLIENT ──────────────────────────────────────────────
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── DOM REFERENCES ───────────────────────────────────────────────
  var emailEl     = document.getElementById('email');
  var passwordEl  = document.getElementById('password');
  var btnSignIn   = document.getElementById('btn-signin');
  var errorEl     = document.getElementById('error-msg');
  var signinForm  = document.getElementById('signin-form');
  var resetForm   = document.getElementById('reset-form');
  var subtitle    = document.getElementById('form-subtitle');

  // ── ENTER KEY SUPPORT ────────────────────────────────────────────
  passwordEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSignIn();
  });
  emailEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') passwordEl.focus();
  });

  // ════════════════════════════════════════════════════════════════
  // ROUTING MATRIX — AUTH-002 §3
  // This is the single source of truth for post-login destinations.
  // ════════════════════════════════════════════════════════════════
  function getDestination(tier) {
    if (tier === 'operational' || tier === 'operational_readiness') return '/operational/';
    if (tier === 'governance')      return '/governance/';
    if (tier === 'institutional')   return '/institutional/';
    if (tier === 'per_session')     return '/knowledge-library/';
    if (tier === 'monthly')         return '/knowledge-library/';
    if (tier === 'guest_free')      return '/knowledge-library/';
    if (tier === 'guest')           return '/knowledge-library/';
    return null; // no profile — stay on login
  }

  // ════════════════════════════════════════════════════════════════
  // PROFILE QUERY — canonical pattern: raw fetch + Bearer token
  // NEVER use sb.from() for this. It fails at auth-time.
  // ════════════════════════════════════════════════════════════════
  async function queryTier(accessToken) {
    var payload = JSON.parse(atob(accessToken.split('.')[1]));
    var userId  = payload.sub;
    var resp = await fetch(
      SUPABASE_URL + '/rest/v1/kl_account_profiles?select=subscription_tier&user_id=eq.' + userId + '&limit=1',
      {
        headers: {
          'apikey':        SUPABASE_ANON,
          'Authorization': 'Bearer ' + accessToken,
          'Accept':        'application/json'
        }
      }
    );
    if (!resp.ok) return null;
    var rows = await resp.json();
    if (rows && rows.length > 0) return rows[0].subscription_tier;
    return null;
  }

  // ════════════════════════════════════════════════════════════════
  // ROUTE — query tier and redirect
  // ════════════════════════════════════════════════════════════════
  async function routeUser(session) {
    var tier = await queryTier(session.access_token);
    var dest = getDestination(tier);
    if (dest) {
      // GA4 event
      try { if (window.gtag) gtag('event', 'login', { method: 'email', subscription_tier: tier }); } catch(e) {}
      window.location.replace(dest);
    } else {
      // No profile or unrecognised tier — show message
      errorEl.textContent = 'No subscription found for this account. Contact support@ailane.ai.';
      btnSignIn.disabled = false;
      btnSignIn.textContent = 'Sign In';
    }
  }

  // ════════════════════════════════════════════════════════════════
  // BOOT CHECK — if user is already logged in, route them
  // ════════════════════════════════════════════════════════════════
  (async function bootCheck() {
    try {
      var gs = await sb.auth.getSession();
      if (gs.data && gs.data.session) {
        subtitle.textContent = 'Checking your session...';
        await routeUser(gs.data.session);
      }
    } catch(e) {
      // No session — show login form (default state)
    }
  })();

  // ════════════════════════════════════════════════════════════════
  // SIGN IN HANDLER — the core function
  // signInWithPassword returns the session. We use it immediately.
  // No redirect to /auth/callback/. No intermediate page.
  // ════════════════════════════════════════════════════════════════
  async function handleSignIn() {
    var email    = emailEl.value.trim();
    var password = passwordEl.value;
    errorEl.textContent = '';

    // Validation
    if (!email) { errorEl.textContent = 'Please enter your email address.'; return; }
    if (!password) { errorEl.textContent = 'Please enter your password.'; return; }

    // Loading state
    btnSignIn.disabled = true;
    btnSignIn.innerHTML = '<span class="spinner"></span>Signing in...';

    try {
      var result = await sb.auth.signInWithPassword({
        email: email,
        password: password
      });

      // Handle Supabase errors
      if (result.error) {
        errorEl.textContent = result.error.message;
        btnSignIn.disabled = false;
        btnSignIn.textContent = 'Sign In';
        return;
      }

      // Get session
      var session = result.data.session;
      if (!session) {
        errorEl.textContent = 'Sign-in succeeded but no session was returned. Please try again.';
        btnSignIn.disabled = false;
        btnSignIn.textContent = 'Sign In';
        return;
      }

      // Route directly — session is in hand
      btnSignIn.innerHTML = '<span class="spinner"></span>Loading your dashboard...';
      await routeUser(session);

    } catch(err) {
      errorEl.textContent = 'An unexpected error occurred. Please try again.';
      btnSignIn.disabled = false;
      btnSignIn.textContent = 'Sign In';
    }
  }

  // ════════════════════════════════════════════════════════════════
  // FORGOT PASSWORD
  // ════════════════════════════════════════════════════════════════
  function showResetForm() {
    signinForm.classList.add('hidden');
    resetForm.classList.remove('hidden');
    subtitle.textContent = 'Reset your password';
    // Copy email if already entered
    var resetEmailEl = document.getElementById('reset-email');
    if (emailEl.value) resetEmailEl.value = emailEl.value;
  }

  function showSignInForm() {
    resetForm.classList.add('hidden');
    signinForm.classList.remove('hidden');
    subtitle.textContent = 'Sign in to your account';
    document.getElementById('reset-error').textContent = '';
    document.getElementById('reset-success').classList.add('hidden');
  }

  async function handleReset() {
    var resetEmailEl  = document.getElementById('reset-email');
    var resetErrorEl  = document.getElementById('reset-error');
    var resetSuccess  = document.getElementById('reset-success');
    var btnReset      = document.getElementById('btn-reset');
    var email         = resetEmailEl.value.trim();

    resetErrorEl.textContent = '';
    resetSuccess.classList.add('hidden');

    if (!email) { resetErrorEl.textContent = 'Please enter your email address.'; return; }

    btnReset.disabled = true;
    btnReset.innerHTML = '<span class="spinner"></span>Sending...';

    try {
      var result = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/auth/callback/'
      });

      if (result.error) {
        resetErrorEl.textContent = result.error.message;
      } else {
        resetSuccess.classList.remove('hidden');
        resetErrorEl.textContent = '';
      }
    } catch(e) {
      resetErrorEl.textContent = 'An error occurred. Please try again.';
    }

    btnReset.disabled = false;
    btnReset.textContent = 'Send Reset Link';
  }
  </script>
