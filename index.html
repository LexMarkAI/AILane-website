<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in — Ailane</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    .container { text-align: center; color: #fff; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245,158,11,0.2);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,0.6); font-size: 14px; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Signing you in&hellip;</p>
  </div>

  <script>
  (async function() {
    var SUPABASE_URL  = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';

    try {
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      // ── UTM attribution ────────────────────────────────────────────────
      var utmData = {};
      try {
        var stored = sessionStorage.getItem('ailane_utm');
        if (stored) utmData = JSON.parse(stored);
      } catch(e) {}

      // ── Acquire session ────────────────────────────────────────────────
      var session = null;
      var params  = new URLSearchParams(window.location.search);
      var code    = params.get('code');

      if (code) {
        // Magic link / OAuth — PKCE code exchange
        var ex = await sb.auth.exchangeCodeForSession(window.location.search);
        if (ex.error || !ex.data || !ex.data.session) {
          window.location.replace('/account/?error=exchange_failed');
          return;
        }
        session = ex.data.session;
      } else {
        // Password login — try getSession first, then wait for event
        var gs = await sb.auth.getSession();
        if (gs.data && gs.data.session) {
          session = gs.data.session;
        } else {
          session = await new Promise(function(resolve) {
            var t = setTimeout(function() { resolve(null); }, 6000);
            sb.auth.onAuthStateChange(function(event, s) {
              if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && s) {
                clearTimeout(t);
                resolve(s);
              }
            });
          });
        }
      }

      if (!session || !session.access_token) {
        window.location.replace('/account/?error=no_session');
        return;
      }

      // ── Decode JWT — extract user ID without relying on client state ───
      var userId = null;
      var isNewUser = false;
      try {
        var payload = JSON.parse(atob(session.access_token.split('.')[1]));
        userId = payload.sub;
        var created = session.user ? new Date(session.user.created_at) : null;
        isNewUser = created ? (new Date() - created < 15000) : false;
      } catch(e) {
        window.location.replace('/account/?error=jwt_decode_failed');
        return;
      }

      // ── Profile query — raw fetch with Bearer token, bypasses client state
      var tier = null;
      try {
        var resp = await fetch(
          SUPABASE_URL + '/rest/v1/kl_account_profiles?select=subscription_tier&user_id=eq.' + userId + '&limit=1',
          {
            headers: {
              'apikey':        SUPABASE_ANON,
              'Authorization': 'Bearer ' + session.access_token,
              'Accept':        'application/json'
            }
          }
        );
        if (resp.ok) {
          var rows = await resp.json();
          if (rows && rows.length > 0) tier = rows[0].subscription_tier;
        }
      } catch(e) { /* fall through to default */ }

      // ── Routing matrix ─────────────────────────────────────────────────
      var dest = '/account/';
      if (tier === 'per_session' || tier === 'monthly' || tier === 'guest_free' || tier === 'guest') {
        dest = '/account/dashboard/';
      } else if (tier === 'operational') {
        dest = '/intelligence/';
      } else if (tier === 'governance' || tier === 'institutional') {
        dest = '/governance-dashboard/';
      }

      // ── GA4 conversion event ───────────────────────────────────────────
      try {
        if (window.gtag) {
          gtag('event', isNewUser ? 'sign_up' : 'login', {
            method:            utmData.utm_source  || 'direct',
            campaign:          utmData.utm_campaign || 'none',
            subscription_tier: tier || 'none'
          });
        }
      } catch(e) {}

      // ── Redirect ───────────────────────────────────────────────────────
      try {
        var destUrl = new URL(dest, window.location.origin);
        Object.entries(utmData).forEach(function(kv) {
          destUrl.searchParams.set(kv[0], kv[1]);
        });
        sessionStorage.removeItem('ailane_utm');
        window.location.replace(destUrl.toString());
      } catch(e) {
        window.location.replace(dest);
      }

    } catch(err) {
      window.location.replace('/account/?error=router_error');
    }
  })();
  </script>

</body>
</html>
