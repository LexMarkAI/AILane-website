<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>
    <style>
        body {
            color: #333; /* Darker text color */
        }
        .pricing-card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .pricing-card h2 {
            color: #444; /* Darker color for the title */
        }
        .pricing-card p {
            color: #555; /* Darker color for the description */
        }
    </style>
</head>
<body>
    <h1>Our Pricing Plans</h1>
    <div class="pricing-card">
        <h2>Basic Tier</h2>
        <p>Features of the Basic tier...</p>
    </div>
    <div class="pricing-card">
        <h2>Pro Tier</h2>
        <p>Features of the Pro tier...</p>
    </div>
    <!-- Removed Essential Tier pricing card -->
</body>
</html>
