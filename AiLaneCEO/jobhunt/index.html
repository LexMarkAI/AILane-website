// ─── Formatting helpers ───
function labelize(s){if(s==null||s==='')return '—';return String(s).replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());}
function fmtDateTime(s){if(!s)return '—';try{return new Date(s).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return String(s);}}
function fmtDate(s){if(!s)return '—';try{return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return String(s);}}
function fmtComp(row){
  if(row.comp_text)return row.comp_text;
  const cur=row.currency||'GBP';
  if(row.comp_min!=null&&row.comp_max!=null)return cur+' '+Number(row.comp_min).toLocaleString()+'–'+Number(row.comp_max).toLocaleString();
  if(row.comp_min!=null)return cur+' '+Number(row.comp_min).toLocaleString()+'+';

function statusColor(s){
  if(s==='submitted')return 'green';
  if(s==='pack_ready')return 'amber';
  if(s==='drafting')return 'cyan';

}
function bandColor(b){return b==='A'?'green':b==='B'?'cyan':b==='C'?'amber':b==='reject'?'red':'muted';}
function bandLabel(b){return b?(b==='reject'?'Reject':'Band '+b):'unscored';}

function Chip({color,children}){return <span className={'tchip '+(color||'muted')}>{children}</span>;}

// ─── Lightweight Markdown → React (no external lib): #/##/### headings, **bold**, [label](url) links, -/· bullets, blank-line paragraphs ───
// AILANE-CC-BRIEF-CEO-JOBHUNT-ALERTS-CALENDAR-001 §1(a): [label](url) → clickable link (http/https only), tokenised before **bold**.
function renderInline(text,kp){
  return String(text).split(/(\[[^\]]+\]\(https?:\/\/[^\s)]+\)|\*\*[^*]+\*\*)/g).map((p,i)=>{
    if(!p)return null;
    const lm=p.match(/^\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)$/);
    if(lm)return <a key={kp+'-l'+i} href={lm[2]} target="_blank" rel="noopener noreferrer" className="src-link">{lm[1]}</a>;
    const m=p.match(/^\*\*([^*]+)\*\*$/);
    return m?<strong key={kp+'-b'+i}>{m[1]}</strong>:<React.Fragment key={kp+'-t'+i}>{p}</React.Fragment>;
  });
}
function renderMarkdown(md){
  if(!md)return null;
  const lines=String(md).replace(/\r\n/g,'\n').split('\n');
  const out=[];let para=[];let bullets=[];
  const flushPara=()=>{if(para.length){const k='p'+out.length;out.push(<p key={k} className="prep-p">{renderInline(para.join(' '),k)}</p>);para=[];}};
  const flushBullets=()=>{if(bullets.length){const k='u'+out.length;const items=bullets;out.push(<ul key={k} className="prep-ul">{items.map((b,i)=><li key={i}>{renderInline(b,k+'-'+i)}</li>)}</ul>);bullets=[];}};
  lines.forEach(raw=>{
    const t=raw.trim();
    if(t===''){flushPara();flushBullets();return;}
    const h=t.match(/^(#{1,3})\s+(.*)$/);
    if(h){flushPara();flushBullets();const lvl=h[1].length;const k='h'+out.length;out.push(<div key={k} className={'prep-h prep-h'+lvl}>{renderInline(h[2],k)}</div>);return;}
    const b=t.match(/^([-·])\s+(.*)$/);
    if(b){flushPara();bullets.push(b[2]);return;}
    flushBullets();para.push(t);
  });
  flushPara();flushBullets();
  return out;
}

// ─── API layer ───
function authHeaders(token,withJson){
  const h={'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY};
  if(withJson)h['Content-Type']='application/json';
  return h;
}
async function apiGet(token,qs){
  const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-jobhunt-data?${qs}`,{headers:authHeaders(token)});
  if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`Read failed (${r.status})`+(t?': '+t.slice(0,140):''));}
  return r.json();
}
async function apiAction(token,body){
  const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-jobhunt-action`,{method:'POST',headers:authHeaders(token,true),body:JSON.stringify(body)});
  const d=await r.json().catch(()=>({}));
  if(!r.ok||d.ok===false)throw new Error(d.error||`Action failed (${r.status})`);
  return d;
}

// ═══════════════════════════════════════════════
// STATS STRIP  (computed from the loaded rows)
// ═══════════════════════════════════════════════
function StatsStrip({rows}){
  const r=rows||[];
  const total=r.length;
  const sc=(s)=>r.filter(x=>x.status===s).length;
  const bc=(b)=>r.filter(x=>x.band===b).length;
  const open=r.filter(x=>x.status!=='rejected'&&x.status!=='closed').length;
  // §1(d): Actions Needed counts rows flagged action_needed OR still pack_ready (awaiting confirm).
  const actionsNeeded=r.filter(x=>x.action_needed===true||x.status==='pack_ready').length;
  return(
    <div className="kpi-strip">
      <div className="kpi-card"><div className="label">Open Pipeline</div><div className="value" style={{color:'var(--accent-cyan)'}}>{total?open:'—'}</div><div className="sub">{total} tracked total</div></div>
      <div className="kpi-card"><div className="label">Band A / B</div><div className="value" style={{color:'var(--accent-green)'}}>{bc('A')} / {bc('B')}</div><div className="sub">C {bc('C')} · reject {bc('reject')}</div></div>
      <div className="kpi-card"><div className="label">Drafting</div><div className="value" style={{color:'var(--accent-cyan)'}}>{sc('drafting')}</div><div className="sub">packs in progress</div></div>
      <div className={'kpi-card'+(actionsNeeded>0?' alarm':'')}><div className="label">Actions Needed</div><div className="value" style={{color:actionsNeeded>0?'var(--accent-amber)':'var(--text-muted)'}}>{actionsNeeded}</div><div className="sub">action needed · pack ready</div></div>
      <div className="kpi-card"><div className="label">Submitted</div><div className="value" style={{color:'var(--accent-green)'}}>{sc('submitted')}</div><div className="sub">live applications</div></div>
      <div className="kpi-card"><div className="label">Closed / Rejected</div><div className="value" style={{color:'var(--text-muted)'}}>{sc('closed')+sc('rejected')}</div><div className="sub">{sc('closed')} closed · {sc('rejected')} rejected</div></div>
    </div>
  );
}

function Modal({title,sub,onClose,children,wide}){
  useEffect(()=>{
    const onKey=e=>{if(e.key==='Escape')onClose();};
    document.addEventListener('keydown',onKey);
    const prev=document.body.style.overflow;document.body.style.overflow='hidden';
    return()=>{document.removeEventListener('keydown',onKey);document.body.style.overflow=prev;};
  },[]);
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={wide?{maxWidth:880}:null} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">{title}</div>{sub&&<div className="modal-sub">{sub}</div>}</div>
          <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}
function Field({label,children,full}){return <div className={'fg'+(full?' full':'')}><span className="l">{label}</span>{children}</div>;}
function SelectField({label,value,onChange,opts,allowBlank,blankLabel,full}){

    {allowBlank&&<option value="">{blankLabel||'— none —'}</option>}
    {opts.map(o=><option key={o} value={o}>{labelize(o)}</option>)}

}
function TextField({label,value,onChange,placeholder,full,type}){
  return <Field label={label} full={full}><input type={type||'text'} value={value==null?'':value} placeholder={placeholder||''} onChange={e=>onChange(e.target.value)}/></Field>;
}

function AddOpportunityModal({token,onClose,onSaved}){
  const[f,setF]=useState({title:'',employer:'',source:'other',source_url:'',location:'',work_mode:'unknown',comp_text:'',currency:'GBP',status:'lead',next_action:'',notes:''});
  const[busy,setBusy]=useState(false);const[err,setErr]=useState(null);
  const upd=(k,v)=>setF(s=>({...s,[k]:v}));
  async function save(){
    if(!f.title.trim()){setErr('Role title is required.');return;}
    if(!f.employer.trim()){setErr('Employer is required.');return;}
    setBusy(true);setErr(null);
    try{
      const payload={...f,title:f.title.trim(),employer:f.employer.trim()};
      Object.keys(payload).forEach(k=>{if(payload[k]===''||payload[k]==null)delete payload[k];});
      await apiAction(token,{action:'create',payload});
      onSaved();
    }catch(e){setErr(e.message);setBusy(false);}
  }
  return(
    <Modal title="Add opportunity" sub="A new entry starts as a lead. Score it later to assign a fit band." onClose={onClose}>
      <div className="form-grid">
        <TextField label="Role title *" value={f.title} onChange={v=>upd('title',v)} placeholder="e.g. Head of AI"/>
        <TextField label="Employer *" value={f.employer} onChange={v=>upd('employer',v)} placeholder="Organisation name"/>

        <TextField label="Source URL" value={f.source_url} onChange={v=>upd('source_url',v)} placeholder="https://…"/>
        <TextField label="Location" value={f.location} onChange={v=>upd('location',v)} placeholder="e.g. Bristol / hybrid"/>
        <SelectField label="Work mode" value={f.work_mode} onChange={v=>upd('work_mode',v)} opts={WORK_MODES}/>
        <TextField label="Comp (free text)" value={f.comp_text} onChange={v=>upd('comp_text',v)} placeholder="e.g. £116,535–£137,100"/>
        <SelectField label="Currency" value={f.currency} onChange={v=>upd('currency',v)} opts={CURRENCIES}/>
        <SelectField label="Status" value={f.status} onChange={v=>upd('status',v)} opts={STATUSES}/>
        <TextField label="Next action" value={f.next_action} onChange={v=>upd('next_action',v)} placeholder="e.g. score & draft pack"/>
        <Field label="Notes" full><textarea value={f.notes} onChange={e=>upd('notes',e.target.value)} placeholder="Context, rationale, filter decision…"/></Field>
      </div>
      {err&&<div className="err">{err}</div>}
      <div style={{display:'flex',gap:10,marginTop:16}}>
        <button className="btn primary" disabled={busy} onClick={save}>{busy?'Saving…':'Add to pipeline'}</button>
        <button className="btn" onClick={onClose}>Cancel</button>
      </div>
    </Modal>
  );
}

            <div style={{fontSize:'0.74rem',fontWeight:600,color:'var(--accent-green)',marginBottom:4}}>Confirm to submit — the one human gate</div>
            <div className="muted-note" style={{marginTop:0,marginBottom:10}}>Use this only once the application pack has actually been sent. It sets status to <strong>Submitted</strong>, stamps the submission time, and graduates the role to the Job-Applications-Watchlist.</div>
            <button className="btn go" disabled={busy||row.status==='submitted'} onClick={confirmSubmitted}>{row.status==='submitted'?'Already submitted':'✓ Confirm submitted'}</button>
          </div>

          <div className="section-label" style={{marginTop:18}}>Add a note</div>
          <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Append a timestamped note to the activity log…" style={{flex:1}}/>
            <button className="btn" disabled={busy||!note.trim()} onClick={addNote}>Add note</button>
          </div>
        </div>
      )}

      {tab==='score'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="subcard">
            <div className="section-label" style={{paddingTop:0}}>Fit assessment</div>
            <div className="muted-note" style={{marginTop:0,marginBottom:10}}>Set the fit band, an overall 0–100 score, the per-dimension breakdown, and the verbatim evidence span quoted from the posting.</div>
            <div className="form-grid">
              <SelectField label="Band" value={score.band} onChange={v=>setScore(s=>({...s,band:v}))} opts={BANDS} allowBlank blankLabel="— unscored —"/>
              <TextField label="Fit score (0–100)" value={score.fit_score} onChange={v=>setScore(s=>({...s,fit_score:v}))} type="number"/>
              {FIT_KEYS.map(k=>(
                <TextField key={k} label={'Breakdown · '+labelize(k)} value={score.fb[k]} onChange={v=>setScore(s=>({...s,fb:{...s.fb,[k]:v}}))} type="number"/>
              ))}
              <Field label="Evidence (verbatim quoted span)" full><textarea value={score.evidence} onChange={e=>setScore(s=>({...s,evidence:e.target.value}))} placeholder="Paste the exact span from the posting that supports this score…"/></Field>
            </div>
            <div style={{display:'flex',gap:8,marginTop:12,alignItems:'center'}}>
              <button className="btn primary" disabled={busy} onClick={saveScore}>{busy?'Saving…':'Save score'}</button>
              {msg&&<span className={msg.k==='ok'?'ok':'err'}>{msg.t}</span>}
            </div>
          </div>
        </div>
      )}

      {tab==='activity'&&(
        <div>
          <div className="section-label" style={{paddingTop:0}}>Activity log</div>
          {activity==null&&<div className="ts">Loading activity…</div>}
          {activity!=null&&activity.length===0&&<div className="empty">No activity recorded yet.</div>}
          {activity!=null&&activity.map((a,i)=>(
            <div className="act-row" key={a.id||i}>
              <div className="act-when">{fmtDateTime(a.created_at)}</div>
              <div className="act-what">
                <Chip color={a.action==='create'?'green':a.action==='submit'?'green':a.action==='score'?'purple':a.action==='status_change'?'amber':'cyan'}>{labelize(a.action)}</Chip>
                <span style={{marginLeft:8}}>{a.actor_email}</span>
                {a.detail&&a.detail.note&&<div style={{marginTop:4}}>{a.detail.note}</div>}
                {a.detail&&a.detail.status&&<div style={{marginTop:4}}>→ {labelize(a.detail.status)}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='prep'&&(
        <div>
          <div className="section-label" style={{paddingTop:0}}>Prep-for-Next-Stage</div>
          <div style={{marginBottom:12}}>
            <div className="muted-note" style={{marginTop:0,fontSize:'0.72rem'}}>
              <strong style={{color:'var(--text-primary)'}}>Hiring manager:</strong> <span style={{color:'var(--text-secondary)'}}>{row.hiring_manager||'—'}</span>
              {row.prep_generated_at&&<span className="ts"> · Prep generated {fmtDateTime(row.prep_generated_at)}</span>}
            </div>
            {row.recruiter_name&&(
              <div className="muted-note" style={{marginTop:6,fontSize:'0.72rem'}}>
                <strong style={{color:'var(--text-primary)'}}>Recruiter:</strong>{' '}
                {row.recruiter_url
                  ? <a href={row.recruiter_url} target="_blank" rel="noopener noreferrer" className="src-link">{row.recruiter_name}</a>
                  : <span style={{color:'var(--text-secondary)'}}>{row.recruiter_name}</span>}
              </div>
            )}
            {row.follow_up&&(
              <div className="muted-note" style={{marginTop:6,fontSize:'0.72rem'}}>
                <strong style={{color:'var(--text-primary)'}}>Follow-up:</strong> <span style={{color:'var(--text-secondary)'}}>{row.follow_up===true?'Required':row.follow_up}{row.follow_up_due?' · due '+fmtDate(row.follow_up_due):''}</span>
              </div>
            )}
          </div>
          {row.prep_md
            ? <div className="prep-body">{renderMarkdown(row.prep_md)}</div>
            : <div className="muted-note">No prep yet. The daily scout generates a Prep-for-Next-Stage pack automatically once this role is marked submitted.</div>}
        </div>
      )}
    </Modal>
  );
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
function App(){
  const[auth,setAuth]=useState('checking');const[token,setToken]=useState(null);
  const[rows,setRows]=useState(null);
  const[err,setErr]=useState(null);const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(null);const[adding,setAdding]=useState(false);
  const[filters,setFilters]=useState({status:'',band:'',source:'',work_mode:'',q:''});

  // Auth guard — mirrors the established AiLaneCEO room pattern (getSession → JWT email
  // check → else redirect to the hub; onAuthStateChange fallback). Never shows error UI.
  useEffect(()=>{(async()=>{
    const{data:{session}}=await sb.auth.getSession();
    if(session){const p=JSON.parse(atob(session.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(session.access_token);setAuth('ok');return;}}
    const t=setTimeout(()=>{window.location.href='/AiLaneCEO/';},3000);
    sb.auth.onAuthStateChange((ev,sess)=>{if(sess){clearTimeout(t);const p=JSON.parse(atob(sess.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(sess.access_token);setAuth('ok');}else window.location.href='/AiLaneCEO/';}});
  })();},[]);

  const load=useCallback(async()=>{
    if(!token)return;
    setLoading(true);setErr(null);
    try{
      const j=await apiGet(token,'section=all');
      const s=j.sections||{};
      setRows((s.pipeline&&s.pipeline.rows)||[]);
    }catch(e){setErr(e.message);setRows([]);}
    setLoading(false);
  },[token]);
  useEffect(()=>{if(auth==='ok'&&token)load();},[auth,token,load]);

  if(auth==='checking')return<div className="auth-gate"><div className="logo-mark">AILANE</div><div className="pulse-ring"/><div className="ts">Loading external roles room…</div></div>;

  const filtered=(rows||[]).filter(r=>{
    if(filters.status&&r.status!==filters.status)return false;
    if(filters.band&&r.band!==filters.band)return false;
    if(filters.source&&r.source!==filters.source)return false;
    if(filters.work_mode&&r.work_mode!==filters.work_mode)return false;
    if(filters.q){const q=filters.q.toLowerCase();const hay=[r.title,r.employer,r.location].filter(Boolean).join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });

  function onChanged(){setSelected(null);load();}

  return(
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Career / <span>External Roles</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">find → score → draft → confirm → submit → watch</div>
        </div>
      </div>

      <div className="main">
        <ActionBanner rows={rows||[]} onSelect={setSelected}/>
        <StatsStrip rows={rows||[]}/>

        <div className="sec-head"><div className="t">External Job Hunt</div><div className="rule"/></div>

        <FilterBar filters={filters} setFilters={setFilters} onAdd={()=>setAdding(true)} onRefresh={load} count={filtered.length}/>

        {err&&<div className="card"><div className="card-body"><div className="err">{err}</div><div className="muted-note">If the pipeline service has not yet been deployed (Track 2), the board will populate once <span style={{fontFamily:'var(--font-mono)'}}>ceo-jobhunt-data</span> / <span style={{fontFamily:'var(--font-mono)'}}>ceo-jobhunt-action</span> are live.</div></div></div>}

        {loading?<div className="card"><div className="card-body"><div className="ts">Loading pipeline…</div></div></div>
          :!err&&<PipelineTable rows={filtered} onSelect={setSelected}/>}

        {!loading&&!err&&<UpcomingInterviews rows={rows||[]} onSelect={setSelected}/>}

        <div className="disclaimer" style={{marginTop:4}}>
          Internal governance tooling for the external job hunt: every opportunity the daily scout finds, its fit score and
          band, the drafting status of its application pack, and the live status of submitted applications. Confirming a
          submission is the one mandatory human gate — only confirm once the pack has actually been sent. Schema mirrors the
          Job-Opportunities-Register; submitted roles graduate to the Job-Applications-Watchlist.
        </div>
      </div>

      {selected&&<DetailModal token={token} row={selected} onClose={()=>setSelected(null)} onChanged={onChanged}/>}
      {adding&&<AddOpportunityModal token={token} onClose={()=>setAdding(false)} onSaved={()=>{setAdding(false);load();}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
