<style>
:root {
  --bg-void: #050810; --bg-base: #070B14; --bg-surface: #0C1220; --bg-elevated: #111B2E; --bg-hover: #162238; --bg-glass: rgba(12, 18, 32, 0.85);
  --border-subtle: rgba(255,255,255,0.04); --border-default: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.12); --border-accent: rgba(14,165,233,0.3);
  --text-primary: #E2E8F0; --text-secondary: #7A8BA8; --text-muted: #4A5568; --text-accent: #38BDF8;
  --accent-cyan: #0EA5E9; --accent-cyan-dim: rgba(14,165,233,0.15); --accent-green: #10B981; --accent-green-dim: rgba(16,185,129,0.15);
  --accent-red: #EF4444; --accent-red-dim: rgba(239,68,68,0.15); --accent-amber: #F59E0B; --accent-amber-dim: rgba(245,158,11,0.15);
  --accent-purple: #8B5CF6; --accent-purple-dim: rgba(139,92,246,0.15);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.2);
  --font-display: 'Outfit', sans-serif; --font-body: 'IBM Plex Sans', sans-serif; --font-mono: 'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; }
body::before { content:''; position:fixed; inset:0; background: linear-gradient(rgba(14,165,233,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(14,165,233,0.02) 1px, transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }
#root { position: relative; z-index: 1; }

.auth-gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; }
.auth-gate .logo-mark { font-family:var(--font-display); font-size:1.4rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent-cyan); }
.pulse-ring { width:40px; height:40px; border:2px solid var(--accent-cyan); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Top bar */
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--border-subtle); background:var(--bg-glass); backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; }
.top-bar-left { display:flex; align-items:center; gap:12px; }
.back-btn { display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:var(--radius-sm); border:1px solid var(--border-default); background:var(--bg-surface); color:var(--text-secondary); font-family:var(--font-body); font-size:0.75rem; cursor:pointer; text-decoration:none; transition:all 0.2s; }
.back-btn:hover { border-color:var(--border-accent); color:var(--text-accent); }
.page-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--text-primary); }
.page-title span { color:var(--accent-green); }
.top-bar-right { display:flex; align-items:center; gap:10px; }
.status-pill { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:100px; font-size:0.65rem; font-family:var(--font-mono); font-weight:500; }
.status-pill.live { background:var(--accent-green-dim); color:var(--accent-green); border:1px solid rgba(16,185,129,0.2); }
.status-pill .dot { width:5px; height:5px; border-radius:50%; background:currentColor; animation:pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.ts { font-family:var(--font-mono); font-size:0.68rem; color:var(--text-muted); }

/* Main layout */
.main { max-width:1400px; margin:0 auto; padding:20px 28px 60px; display:flex; flex-direction:column; gap:16px; }

/* Section */
.section-title { font-family:var(--font-display); font-size:0.72rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; padding:4px 0; }

/* KPI strip */
.kpi-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kpi-card { background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:16px 18px; }
.kpi-card .label { font-size:0.62rem; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
.kpi-card .value { font-family:var(--font-mono); font-size:1.5rem; font-weight:600; color:var(--text-primary); line-height:1.2; }
.kpi-card .value.positive { color:var(--accent-green); }
.kpi-card .value.negative { color:var(--accent-red); }
.kpi-card .sub { font-size:0.62rem; color:var(--text-muted); font-family:var(--font-mono); margin-top:2px; }

/* Card */
.card { background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-lg); overflow:hidden; }
.card-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 0; }
.card-head-title { font-family:var(--font-display); font-size:0.82rem; font-weight:600; color:var(--text-primary); }
.card-head-badge { font-family:var(--font-mono); font-size:0.6rem; padding:3px 8px; border-radius:100px; background:var(--bg-hover); color:var(--text-muted); border:1px solid var(--border-subtle); }
.card-body { padding:12px 18px 16px; }

/* Two-col grid */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* Cash flow bars */
.cf-chart { display:flex; align-items:flex-end; gap:4px; height:120px; padding-top:8px; }
.cf-day { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; height:100%; justify-content:flex-end; }
.cf-bar { width:100%; border-radius:3px 3px 0 0; min-height:2px; transition:height 0.5s ease; }
.cf-bar.credit { background:var(--accent-green); }
.cf-bar.debit { background:rgba(239,68,68,0.5); }
.cf-label { font-size:0.5rem; color:var(--text-muted); font-family:var(--font-mono); transform:rotate(-45deg); white-space:nowrap; margin-top:4px; }

/* Transaction table */
.tx-table { width:100%; border-collapse:collapse; }
.tx-table th { text-align:left; font-size:0.6rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; padding:8px 8px; border-bottom:1px solid var(--border-default); font-family:var(--font-body); }
.tx-table td { padding:8px 8px; border-bottom:1px solid var(--border-subtle); font-size:0.76rem; vertical-align:middle; }
.tx-table tr:last-child td { border-bottom:none; }
.tx-table tr:hover td { background:var(--bg-hover); }
.tx-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:6px; }
.tx-dot.credit { background:var(--accent-green); }
.tx-dot.debit { background:var(--accent-red); opacity:0.6; }
.tx-amount { font-family:var(--font-mono); font-weight:600; text-align:right; }
.tx-amount.credit { color:var(--accent-green); }
.tx-amount.debit { color:var(--text-secondary); }
.tx-date { font-family:var(--font-mono); font-size:0.68rem; color:var(--text-muted); }
.tx-cat { font-size:0.62rem; padding:2px 7px; border-radius:100px; background:var(--bg-hover); color:var(--text-muted); border:1px solid var(--border-subtle); display:inline-block; }

/* Spend bar */
.spend-row { display:flex; align-items:center; gap:10px; padding:6px 0; }
.spend-row .name { font-size:0.76rem; color:var(--text-primary); min-width:120px; font-weight:500; }
.spend-row .bar-wrap { flex:1; height:18px; background:var(--bg-base); border-radius:3px; overflow:hidden; }
.spend-row .bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
.spend-row .amt { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-secondary); min-width:70px; text-align:right; }

/* Filing timeline */
.filing-item { display:flex; gap:16px; padding:10px 0; border-bottom:1px solid var(--border-subtle); }
.filing-item:last-child { border-bottom:none; }
.filing-date { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-accent); min-width:90px; }
.filing-body { font-size:0.6rem; padding:2px 7px; border-radius:100px; text-transform:uppercase; font-family:var(--font-mono); font-weight:600; }
.filing-body.hmrc { background:var(--accent-red-dim); color:var(--accent-red); }
.filing-body.companies_house { background:var(--accent-cyan-dim); color:var(--accent-cyan); }
.filing-body.ico { background:var(--accent-purple-dim); color:var(--accent-purple); }
.filing-body.internal { background:var(--accent-amber-dim); color:var(--accent-amber); }
.filing-obligation { font-size:0.78rem; color:var(--text-primary); font-weight:500; }
.filing-notes { font-size:0.68rem; color:var(--text-muted); margin-top:2px; line-height:1.4; }

/* Supplier row */
.sup-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-subtle); }
.sup-row:last-child { border-bottom:none; }
.sup-name { font-size:0.78rem; color:var(--text-primary); font-weight:500; }
.sup-domain { font-size:0.65rem; color:var(--text-muted); font-family:var(--font-mono); }
.sup-cat { font-size:0.6rem; padding:2px 7px; border-radius:100px; background:var(--bg-hover); color:var(--text-muted); border:1px solid var(--border-subtle); }

/* Filter bar */
.filter-bar { display:flex; gap:6px; padding:4px 0 8px; flex-wrap:wrap; }
.filter-btn { padding:5px 12px; border-radius:var(--radius-sm); border:1px solid var(--border-default); background:var(--bg-surface); color:var(--text-muted); font-size:0.68rem; font-family:var(--font-body); cursor:pointer; transition:all 0.2s; }
.filter-btn:hover, .filter-btn.active { background:var(--bg-hover); color:var(--text-primary); border-color:var(--border-strong); }

/* VAT card */
.vat-status { display:flex; align-items:center; gap:12px; padding:12px 0; }
.vat-indicator { width:10px; height:10px; border-radius:50%; }
.vat-indicator.safe { background:var(--accent-green); }
.vat-indicator.warning { background:var(--accent-amber); }
.vat-text { font-size:0.78rem; color:var(--text-primary); }
.vat-sub { font-size:0.68rem; color:var(--text-muted); }

/* Responsive */
@media (max-width:900px) { .kpi-strip { grid-template-columns:1fr 1fr; } .two-col { grid-template-columns:1fr; } .main { padding:16px; } .top-bar { padding:10px 16px; } }
@media (max-width:500px) { .kpi-strip { grid-template-columns:1fr; } }

/* Skeleton */
.skeleton { background:linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 50%, var(--bg-elevated) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--radius-sm); }
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
const CEO_EMAIL = 'mark@ailane.ai';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function formatGBP(v) { const n=Number(v); return isNaN(n)?'—':'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function friendlySupplier(name) {
  if(!name) return 'Unknown';
  if(name.includes('Mz-Director L2B')) return 'Director Loan';
  if(name.includes('Ailane Limited')) return 'Stripe Test Charge';
  if(name.includes('Anthropic')) return 'Anthropic API';
  if(name.includes('Information Comm')) return 'ICO Registration';
  if(name.includes('Google')) return 'Google';
  return name;
}
function shortDate(d) { if(!d) return ''; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function daysUntil(d) { const now=new Date(); const target=new Date(d+'T00:00:00'); return Math.ceil((target-now)/(1000*60*60*24)); }

function App() {
  const [auth, setAuth] = useState('checking');
  const [token, setToken] = useState(null);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all'); // all | credits | debits

  useEffect(() => {
    async function checkAuth() {
      const { data:{session} } = await sb.auth.getSession();
      if(session) {
        const p = JSON.parse(atob(session.access_token.split('.')[1]));
        if(p.email===CEO_EMAIL) { setToken(session.access_token); setAuth('ok'); return; }
      }
      const timeout = setTimeout(() => { window.location.href='/AiLaneCEO/'; }, 3000);
      const { data:{subscription} } = sb.auth.onAuthStateChange((ev,sess) => {
        if(sess) {
          clearTimeout(timeout);
          const p = JSON.parse(atob(sess.access_token.split('.')[1]));
          if(p.email===CEO_EMAIL) { setToken(sess.access_token); setAuth('ok'); }
          else window.location.href='/AiLaneCEO/';
        }
      });
      return () => { clearTimeout(timeout); subscription?.unsubscribe(); };
    }
    checkAuth();
  }, []);

  useEffect(() => {
    if(auth!=='ok'||!token) return;
    async function load() {
      setLoading(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/ceo-dashboard-data?section=accounts_detail`, {
          headers: { 'Authorization': `Bearer ${token}`, 'apikey': SUPABASE_ANON_KEY }
        });
        if(res.ok) { const j = await res.json(); setData(j.sections?.accounts_detail || null); }
      } catch(e) { console.error(e); }
      setLoading(false);
    }
    load();
  }, [auth, token]);

  if(auth==='checking') return (
    <div className="auth-gate"><div className="logo-mark">AILANE</div><div className="pulse-ring"/><div className="ts">Loading accounts...</div></div>
  );

  const d = data || {};
  const s = d.summary || {};
  const txs = d.transactions || [];
  const daily = d.daily_breakdown || [];
  const cats = d.spend_by_category || [];
  const sups = d.spend_by_supplier || [];
  const filings = d.filing_calendar || [];
  const suppliers = d.suppliers || [];
  const vat = (d.vat_tracker || [])[0];

  const filteredTx = filter==='all' ? txs : filter==='credits' ? txs.filter(t=>t.is_revenue) : txs.filter(t=>!t.is_revenue);

  // Cash flow chart scaling
  const maxCF = Math.max(...daily.map(d => Math.max(d.credits, d.debits)), 1);
  const maxSpend = Math.max(...cats.map(c => c.total), 1);
  const maxSup = Math.max(...sups.map(s => s.total), 1);

  return (
    <div>
      {/* TOP BAR */}
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
            Hub
          </a>
          <div className="page-title">Business & <span>Accounts</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">AI Lane Limited · Co. 17035654</div>
        </div>
      </div>

      <div className="main">
        {loading ? (
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            <div className="kpi-strip">{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:90}}/>)}</div>
            <div className="skeleton" style={{height:200}}/>
            <div className="skeleton" style={{height:300}}/>
          </div>
        ) : (
          <>
            {/* KPI STRIP */}
            <div className="kpi-strip">
              <div className="kpi-card">
                <div className="label">Net Cash Position</div>
                <div className={`value ${Number(s.net_position)>=0?'positive':'negative'}`}>
                  {Number(s.net_position)<0?'-':''}{formatGBP(s.net_position)}
                </div>
                <div className="sub">Since {shortDate(s.earliest_date)}</div>
              </div>
              <div className="kpi-card">
                <div className="label">Credits In</div>
                <div className="value positive">{formatGBP(s.total_credits)}</div>
                <div className="sub">Director loans</div>
              </div>
              <div className="kpi-card">
                <div className="label">Debits Out</div>
                <div className="value" style={{color:'var(--text-secondary)'}}>{formatGBP(s.total_debits)}</div>
                <div className="sub">Operating + test charges</div>
              </div>
              <div className="kpi-card">
                <div className="label">Transactions</div>
                <div className="value" style={{color:'var(--accent-cyan)'}}>{s.total_transactions || 0}</div>
                <div className="sub">{shortDate(s.earliest_date)} — {shortDate(s.latest_date)}</div>
              </div>
            </div>

            {/* CASH FLOW CHART + SPEND BY CATEGORY */}
            <div className="two-col">
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Daily Cash Flow</div>
                  <div className="card-head-badge">{daily.length} days</div>
                </div>
                <div className="card-body">
                  <div className="cf-chart">
                    {daily.map((day, i) => {
                      const ch = Math.max((day.credits / maxCF) * 100, 3);
                      const dh = Math.max((day.debits / maxCF) * 100, 3);
                      return (
                        <div className="cf-day" key={i} title={`${day.date}: +${formatGBP(day.credits)} / -${formatGBP(day.debits)}`}>
                          {day.credits > 0 && <div className="cf-bar credit" style={{height:`${ch}%`}} />}
                          <div className="cf-bar debit" style={{height:`${dh}%`}} />
                          <div className="cf-label">{shortDate(day.date)}</div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:'flex',gap:'16px',marginTop:'12px',fontSize:'0.65rem',color:'var(--text-muted)'}}>
                    <span><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:'var(--accent-green)',marginRight:4}}/>Credits</span>
                    <span><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:'rgba(239,68,68,0.5)',marginRight:4}}/>Debits</span>
                  </div>
                </div>
              </div>

              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Spend by Category</div>
                  <div className="card-head-badge">{cats.length} categories</div>
                </div>
                <div className="card-body">
                  {cats.map((c, i) => (
                    <div className="spend-row" key={i}>
                      <div className="name">{c.category}</div>
                      <div className="bar-wrap">
                        <div className="bar-fill" style={{width:`${(c.total/maxSpend)*100}%`, background: i===0?'var(--accent-red)':i===1?'var(--accent-amber)':'var(--accent-cyan)'}} />
                      </div>
                      <div className="amt">{formatGBP(c.total)}</div>
                    </div>
                  ))}
                  {cats.length===0 && <div style={{color:'var(--text-muted)',fontSize:'0.75rem',padding:'8px 0'}}>No spend data</div>}
                </div>
              </div>
            </div>

            {/* FULL TRANSACTION LEDGER */}
            <div className="card">
              <div className="card-head">
                <div className="card-head-title">Transaction Ledger</div>
                <div className="card-head-badge">{filteredTx.length} transactions</div>
              </div>
              <div className="card-body">
                <div className="filter-bar">
                  <button className={`filter-btn ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>All ({txs.length})</button>
                  <button className={`filter-btn ${filter==='credits'?'active':''}`} onClick={()=>setFilter('credits')}>Credits ({txs.filter(t=>t.is_revenue).length})</button>
                  <button className={`filter-btn ${filter==='debits'?'active':''}`} onClick={()=>setFilter('debits')}>Debits ({txs.filter(t=>!t.is_revenue).length})</button>
                </div>
                <div style={{overflowX:'auto'}}>
                  <table className="tx-table">
                    <thead>
                      <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th style={{textAlign:'right'}}>Amount</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredTx.map((tx, i) => (
                        <tr key={i}>
                          <td><span className="tx-date">{shortDate(tx.date)}</span></td>
                          <td>
                            <span className={`tx-dot ${tx.is_revenue?'credit':'debit'}`}/>
                            {friendlySupplier(tx.supplier_name)}
                            {tx.stripe_payment_id && <span style={{marginLeft:6,fontSize:'0.58rem',color:'var(--text-muted)'}}>Stripe</span>}
                          </td>
                          <td><span className="tx-cat">{tx.category || 'other'}</span></td>
                          <td className={`tx-amount ${tx.is_revenue?'credit':'debit'}`}>
                            {tx.is_revenue?'+':'-'}{formatGBP(tx.amount)}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* SPEND BY SUPPLIER + SUPPLIER REGISTER */}
            <div className="two-col">
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Spend by Supplier</div>
                </div>
                <div className="card-body">
                  {sups.map((s, i) => (
                    <div className="spend-row" key={i}>
                      <div className="name">{friendlySupplier(s.supplier)}</div>
                      <div className="bar-wrap">
                        <div className="bar-fill" style={{width:`${(s.total/maxSup)*100}%`, background:'var(--accent-cyan)'}} />
                      </div>
                      <div className="amt">{formatGBP(s.total)}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Supplier Register</div>
                  <div className="card-head-badge">{suppliers.length} suppliers</div>
                </div>
                <div className="card-body">
                  {suppliers.map((s, i) => (
                    <div className="sup-row" key={i}>
                      <div>
                        <div className="sup-name">{s.name}</div>
                        <div className="sup-domain">{s.domain}</div>
                      </div>
                      <span className="sup-cat">{s.category}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* FILING CALENDAR + VAT / COMPANY */}
            <div className="two-col">
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Filing Calendar</div>
                  <div className="card-head-badge">{filings.length} obligations</div>
                </div>
                <div className="card-body">
                  {filings.map((f, i) => {
                    const days = daysUntil(f.due_date);
                    return (
                      <div className="filing-item" key={i}>
                        <div>
                          <div className="filing-date">{shortDate(f.due_date)}</div>
                          <div style={{fontSize:'0.58rem',color: days<90?'var(--accent-amber)':'var(--text-muted)',fontFamily:'var(--font-mono)',marginTop:2}}>
                            {days > 0 ? `${days} days` : 'OVERDUE'}
                          </div>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div className="filing-obligation">{f.obligation}</div>
                            <span className={`filing-body ${f.filing_body}`}>{f.filing_body.replace('_',' ')}</span>
                          </div>
                          <div className="filing-notes">{f.notes}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                <div className="card">
                  <div className="card-head">
                    <div className="card-head-title">VAT Status</div>
                  </div>
                  <div className="card-body">
                    <div className="vat-status">
                      <div className="vat-indicator safe" />
                      <div>
                        <div className="vat-text">Not VAT Registered</div>
                        <div className="vat-sub">Revenue: {formatGBP(s.total_credits)} · Threshold: £90,000</div>
                      </div>
                    </div>
                    <div style={{fontSize:'0.68rem',color:'var(--text-muted)',lineHeight:1.5,marginTop:4}}>
                      VAT registration is required when taxable turnover exceeds £90,000 in a rolling 12-month period. 
                      Current revenue is well below threshold. Monitor as client acquisition begins.
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="card-head">
                    <div className="card-head-title">Company Details</div>
                  </div>
                  <div className="card-body" style={{display:'flex',flexDirection:'column',gap:6}}>
                    {[
                      ['Company', 'AI Lane Limited'],
                      ['Company No.', '17035654'],
                      ['ICO Reg.', '00013389720'],
                      ['Incorporated', '16 February 2026'],
                      ['SIC Codes', '62012, 62020, 63110, 63990'],
                      ['Accounting YE', '28 February'],
                      ['Banking', 'Monzo Business'],
                      ['Trademark', 'UK00004347220 — Published'],
                    ].map(([k,v], i) => (
                      <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:i<7?'1px solid var(--border-subtle)':'none'}}>
                        <span style={{fontSize:'0.72rem',color:'var(--text-muted)'}}>{k}</span>
                        <span style={{fontSize:'0.72rem',color:'var(--text-primary)',fontFamily:'var(--font-mono)',fontWeight:500}}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
