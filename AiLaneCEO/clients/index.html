<style>
:root{--bg-void:#050810;--bg-base:#070B14;--bg-surface:#0C1220;--bg-elevated:#111B2E;--bg-hover:#162238;--bg-glass:rgba(12,18,32,0.85);--border-subtle:rgba(255,255,255,0.04);--border-default:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);--border-accent:rgba(14,165,233,0.3);--text-primary:#E2E8F0;--text-secondary:#7A8BA8;--text-muted:#4A5568;--text-accent:#38BDF8;--accent-cyan:#0EA5E9;--accent-cyan-dim:rgba(14,165,233,0.15);--accent-green:#10B981;--accent-green-dim:rgba(16,185,129,0.15);--accent-red:#EF4444;--accent-red-dim:rgba(239,68,68,0.15);--accent-amber:#F59E0B;--accent-amber-dim:rgba(245,158,11,0.15);--accent-purple:#8B5CF6;--accent-purple-dim:rgba(139,92,246,0.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-display:'Outfit',sans-serif;--font-body:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html{font-size:15px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(14,165,233,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
#root{position:relative;z-index:1;}
.auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;}
.auth-gate .logo-mark{font-family:var(--font-display);font-size:1.4rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-cyan);}
.pulse-ring{width:40px;height:40px;border:2px solid var(--accent-cyan);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border-subtle);background:var(--bg-glass);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.top-bar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-body);font-size:0.75rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.back-btn:hover{border-color:var(--border-accent);color:var(--text-accent);}
.page-title{font-family:var(--font-display);font-size:1rem;font-weight:700;}.page-title span{color:var(--accent-cyan);}
.top-bar-right{display:flex;align-items:center;gap:10px;}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:0.65rem;font-family:var(--font-mono);font-weight:500;}
.status-pill.live{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(16,185,129,0.2);}
.status-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.3;}}
.ts{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);}
.main{max-width:1400px;margin:0 auto;padding:20px 28px 60px;display:flex;flex-direction:column;gap:16px;}
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:14px 16px;}
.kpi-card .label{font-size:0.6rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
.kpi-card .value{font-family:var(--font-mono);font-size:1.4rem;font-weight:600;line-height:1.2;}
.kpi-card .sub{font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px;}
.card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;}
.card-head-title{font-family:var(--font-display);font-size:0.82rem;font-weight:600;color:var(--text-primary);}
.card-head-badge{font-family:var(--font-mono);font-size:0.6rem;padding:3px 8px;border-radius:100px;background:var(--bg-hover);color:var(--text-muted);border:1px solid var(--border-subtle);}
.card-body{padding:12px 18px 16px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.section-label{font-family:var(--font-display);font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;padding:8px 0 2px;}
.bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.bar-name{font-size:0.7rem;color:var(--text-primary);min-width:150px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-wrap{flex:1;height:16px;background:var(--bg-base);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.bar-count{font-family:var(--font-mono);font-size:0.65rem;min-width:40px;text-align:right;color:var(--text-muted);}
.pipeline-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-sm);font-size:0.72rem;font-weight:500;margin:3px 3px 3px 0;}
.pipeline-pill.amber{background:var(--accent-amber-dim);color:var(--accent-amber);border:1px solid rgba(245,158,11,0.15);}
.pipeline-pill.green{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(16,185,129,0.15);}
.pipeline-pill.cyan{background:var(--accent-cyan-dim);color:var(--accent-cyan);border:1px solid rgba(14,165,233,0.15);}
.pipeline-pill.purple{background:var(--accent-purple-dim);color:var(--accent-purple);border:1px solid rgba(139,92,246,0.15);}
.tribunal-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-subtle);}
.tribunal-row:last-child{border-bottom:none;}
.tribunal-date{font-family:var(--font-mono);font-size:0.68rem;color:var(--accent-cyan);min-width:60px;}
.tribunal-title{font-size:0.72rem;color:var(--text-primary);font-weight:400;line-height:1.4;flex:1;}
.tribunal-cat{font-size:0.55rem;padding:2px 7px;border-radius:100px;background:var(--bg-hover);color:var(--text-muted);border:1px solid var(--border-subtle);white-space:nowrap;}
.org-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-subtle);}
.org-row:last-child{border-bottom:none;}
.org-name{font-size:0.76rem;color:var(--text-primary);font-weight:500;}
.org-tier{font-size:0.58rem;padding:2px 7px;border-radius:100px;text-transform:capitalize;}
.org-tier.institutional{background:rgba(245,158,11,0.1);color:var(--accent-amber);border:1px solid rgba(245,158,11,0.15);}
.org-tier.operational_readiness{background:var(--accent-cyan-dim);color:var(--accent-cyan);border:1px solid rgba(14,165,233,0.15);}
.skeleton{background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-hover) 50%,var(--bg-elevated) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@media(max-width:1000px){.kpi-strip{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-strip{grid-template-columns:1fr 1fr;}.two-col{grid-template-columns:1fr;}}

/* ═══════ EILEEN INTELLIGENCE ENTITY ═══════ */
.eileen-orb{position:fixed;bottom:28px;right:28px;z-index:500;width:64px;height:64px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(212,160,23,0.15),rgba(14,165,233,0.05));border:1px solid rgba(212,160,23,0.25);transition:all 0.3s ease;box-shadow:0 0 30px rgba(212,160,23,0.12),0 0 60px rgba(14,165,233,0.06);}
.eileen-orb:hover{transform:scale(1.08);border-color:rgba(212,160,23,0.45);box-shadow:0 0 40px rgba(212,160,23,0.2),0 0 80px rgba(14,165,233,0.1);}
.eileen-panel{position:fixed;bottom:28px;right:28px;z-index:501;width:420px;max-width:calc(100vw - 56px);height:560px;max-height:calc(100vh - 100px);background:var(--bg-surface);border:1px solid rgba(212,160,23,0.2);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;animation:eileenUp 0.3s ease-out;box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(212,160,23,0.08);}
@keyframes eileenUp{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.eileen-header{display:flex;align-items:center;gap:12px;padding:16px 18px 12px;border-bottom:1px solid rgba(212,160,23,0.1);background:linear-gradient(135deg,rgba(212,160,23,0.04),rgba(139,92,246,0.02));}
.eileen-header-name{font-family:var(--font-display);font-size:0.88rem;font-weight:700;color:#D4A017;}
.eileen-header-status{font-family:var(--font-mono);font-size:0.58rem;color:var(--text-muted);}
.eileen-close{width:28px;height:28px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-muted);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.eileen-close:hover{border-color:rgba(212,160,23,0.3);color:#D4A017;}
.eileen-messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.eileen-msg{max-width:88%;padding:10px 14px;border-radius:14px;font-size:0.76rem;line-height:1.6;}
.eileen-msg.user{align-self:flex-end;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.15);color:var(--text-primary);}
.eileen-msg.eileen{align-self:flex-start;background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.1);color:var(--text-secondary);}
.eileen-input-bar{display:flex;gap:8px;padding:12px 18px 16px;border-top:1px solid var(--border-subtle);}
.eileen-input{flex:1;padding:10px 14px;border-radius:12px;border:1px solid var(--border-default);background:var(--bg-base);color:var(--text-primary);font-size:0.78rem;font-family:var(--font-body);outline:none;transition:border-color 0.2s;}
.eileen-input:focus{border-color:rgba(212,160,23,0.4);}
.eileen-input::placeholder{color:var(--text-muted);}
.eileen-send{padding:10px 16px;border-radius:12px;border:1px solid rgba(212,160,23,0.25);background:rgba(212,160,23,0.1);color:#D4A017;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all 0.2s;}
.eileen-send:hover{background:rgba(212,160,23,0.18);border-color:rgba(212,160,23,0.4);}
.eileen-typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start;}
.eileen-typing-dot{width:6px;height:6px;border-radius:50%;background:#D4A017;animation:eBounce 1.4s ease-in-out infinite;}
.eileen-typing-dot:nth-child(2){animation-delay:0.2s;}
.eileen-typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes eBounce{0%,80%,100%{opacity:0.3;transform:translateY(0);}40%{opacity:1;transform:translateY(-4px);}}

</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
const CEO_EMAIL = 'mark@ailane.ai';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function formatNum(n){if(!n) return '0';const v=Number(n);if(v>=1000) return (v/1000).toFixed(1)+'K';return v.toLocaleString();}
function shortDate(d){if(!d) return '';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function friendlyCat(c){if(!c) return '';return c.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());}

// Static intelligence — refreshed periodically via data pipeline, not per-request
const EMPLOYER_SECTORS = [
  {name:'Retail & Hospitality',count:5803},{name:'Manufacturing',count:2685},{name:'Construction',count:2122},
  {name:'Professional Services',count:1998},{name:'Healthcare',count:1861},{name:'Business Support',count:1247},
  {name:'Transport & Logistics',count:1212},{name:'Other Services',count:963},{name:'Technology',count:940},
  {name:'Employment Services',count:801},{name:'Media & Entertainment',count:746},{name:'Financial Services',count:729},
  {name:'Real Estate',count:615},{name:'Facilities Management',count:522},{name:'Education',count:510},
];
const EMPLOYER_REGIONS = [
  {name:'South East',count:5529},{name:'London',count:4421},{name:'North West',count:3514},
  {name:'Yorkshire & Humber',count:2114},{name:'West Midlands',count:1804},{name:'Scotland',count:1571},
  {name:'East Midlands',count:1506},{name:'South West',count:1478},{name:'Wales',count:1019},
  {name:'East of England',count:923},{name:'North East',count:799},{name:'Northern Ireland',count:103},
];
const TRIBUNAL_CATEGORIES = [
  {name:'Unfair Dismissal',count:54292},{name:'Wages & Working Time',count:30312},{name:'Discrimination & Harassment',count:29933},
  {name:'Redundancy & Org Change',count:7238},{name:'Whistleblowing',count:3758},{name:'Breach of Contract',count:1948},
  {name:'Employment Status',count:1132},{name:'Health & Safety',count:703},{name:'Parental & Family Rights',count:603},
  {name:'Business Transfers & Insolvency',count:453},{name:'Trade Union & Collective',count:277},
  {name:'Data Protection & Privacy',count:105},{name:'Unclassified',count:100},
];

function App() {
  const [auth, setAuth] = useState('checking');
  const [token, setToken] = useState(null);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [eileenOpen, setEileenOpen] = useState(false);

  useEffect(() => {
    (async()=>{
      const {data:{session}}=await sb.auth.getSession();
      if(session){const p=JSON.parse(atob(session.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(session.access_token);setAuth('ok');return;}}
      const t=setTimeout(()=>{window.location.href='/AiLaneCEO/';},5000);
      sb.auth.onAuthStateChange((ev,sess)=>{if(sess){clearTimeout(t);const p=JSON.parse(atob(sess.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(sess.access_token);setAuth('ok');}else window.location.href='/AiLaneCEO/';}});
    })();
  }, []);

  useEffect(() => {
    if(auth!=='ok'||!token) return;
    (async()=>{
      setLoading(true);
      try{const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-dashboard-data?section=clients_detail`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
      if(r.ok){const j=await r.json();setData(j.sections?.clients_detail||null);}}catch(e){console.error(e);}
      setLoading(false);
    })();
  }, [auth, token]);

  if(auth==='checking') return <div className="auth-gate"><div className="logo-mark">AILANE</div><div className="pulse-ring"/><div className="ts">Loading briefing room...</div></div>;

  const d = data || {};
  const empCount = d.employer_count || 78699;
  const triCount = d.tribunal_count || 130854;
  const orgs = d.organisations || [];
  const users = d.app_users || [];
  const triRecent = d.tribunal_recent || [];
  const compRecent = d.compliance_recent || [];

  const secMax = Math.max(...EMPLOYER_SECTORS.map(s=>s.count),1);
  const regMax = Math.max(...EMPLOYER_REGIONS.map(r=>r.count),1);
  const triMax = Math.max(...TRIBUNAL_CATEGORIES.map(c=>c.count),1);

  const barColors = ['var(--accent-cyan)','var(--accent-green)','var(--accent-amber)','var(--accent-purple)','var(--accent-red)'];

  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Client <span>Briefing Room</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">Intelligence · Pre-Revenue</div>
        </div>
      </div>

      <div className="main">
        {loading ? (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="kpi-strip">{[1,2,3,4,5].map(i=><div key={i} className="skeleton" style={{height:80}}/>)}</div>
            <div className="skeleton" style={{height:300}}/>
          </div>
        ) : (
          <>
            {/* KPI STRIP */}
            <div className="kpi-strip">
              <div className="kpi-card">
                <div className="label">Paying Clients</div>
                <div className="value" style={{color:'var(--text-muted)'}}>0</div>
                <div className="sub">Pre-revenue</div>
              </div>
              <div className="kpi-card">
                <div className="label">Prospect Pool</div>
                <div className="value" style={{color:'var(--accent-cyan)'}}>{formatNum(empCount)}</div>
                <div className="sub">UK employers indexed</div>
              </div>
              <div className="kpi-card">
                <div className="label">Tribunal Intel</div>
                <div className="value" style={{color:'var(--accent-green)'}}>{formatNum(triCount)}</div>
                <div className="sub">Decisions classified</div>
              </div>
              <div className="kpi-card">
                <div className="label">Organisations</div>
                <div className="value" style={{color:'var(--accent-purple)'}}>{orgs.length}</div>
                <div className="sub">Demo + internal</div>
              </div>
              <div className="kpi-card">
                <div className="label">Platform Users</div>
                <div className="value" style={{color:'var(--text-muted)'}}>{users.length}</div>
                <div className="sub">Test accounts only</div>
              </div>
            </div>

            {/* PIPELINE STATUS */}
            <div className="card">
              <div className="card-head">
                <div className="card-head-title">Pipeline Status</div>
                <div className="card-head-badge">Acquisition Phase</div>
              </div>
              <div className="card-body">
                <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:12}}>
                  <span className="pipeline-pill amber">Innovation Wales £75K — April 2026</span>
                  <span className="pipeline-pill green">First Client — Priority Target</span>
                  <span className="pipeline-pill cyan">Google Ads — Live 14 Mar</span>
                  <span className="pipeline-pill purple">Worker Market — 30.3M Payrolled</span>
                </div>
                <div style={{fontSize:'0.72rem',color:'var(--text-secondary)',lineHeight:1.6}}>
                  First paying client conversion before the Innovation Wales panel is the single greatest near-term valuation lever. Two Google Ads campaigns running at £15/day each. Worker market (30.3M payrolled employees) is a major untapped channel requiring different marketing playbook — social, Google Ads, forums — vs employer B2B via LinkedIn, email, and conferences.
                </div>
              </div>
            </div>

            {/* EMPLOYER INTELLIGENCE + REGIONAL DISTRIBUTION */}
            <div className="two-col">
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Employer Intelligence — By Sector</div>
                  <div className="card-head-badge">{formatNum(empCount)} indexed</div>
                </div>
                <div className="card-body">
                  {EMPLOYER_SECTORS.map((s,i) => (
                    <div className="bar-row" key={i}>
                      <div className="bar-name">{s.name}</div>
                      <div className="bar-wrap">
                        <div className="bar-fill" style={{width:`${(s.count/secMax)*100}%`,background:barColors[i%barColors.length]}}/>
                      </div>
                      <div className="bar-count">{formatNum(s.count)}</div>

// ═══════ EILEEN INTELLIGENCE ENTITY ═══════
function EileenNexus({active,size}){
  const canvasRef=React.useRef(null);const frameRef=React.useRef(0);const timeRef=React.useRef(0);
  React.useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;const ctx=canvas.getContext('2d');
    const w=size*2,h=size*2;canvas.width=w;canvas.height=h;const cx=w/2,cy=h/2;
    const nodes=[];const nc=active?18:12;
    for(let i=0;i<nc;i++){const ring=i<5?0.2:i<11?0.55:0.82;const angle=(i/nc)*Math.PI*2+Math.random()*0.5;const r=ring*(w*0.38);
      nodes.push({x:cx+Math.cos(angle)*r,y:cy+Math.sin(angle)*r,bx:cx+Math.cos(angle)*r,by:cy+Math.sin(angle)*r,r:2+Math.random()*3,sp:0.3+Math.random()*0.7,ph:Math.random()*Math.PI*2});}
    function draw(){
      timeRef.current+=active?0.025:0.012;const t=timeRef.current;ctx.clearRect(0,0,w,h);
      const cs=active?28:18;const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,cs*3);
      grd.addColorStop(0,active?'rgba(212,160,23,0.5)':'rgba(212,160,23,0.25)');
      grd.addColorStop(0.4,active?'rgba(139,92,246,0.15)':'rgba(14,165,233,0.08)');grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,cs*3,0,Math.PI*2);ctx.fill();
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,cs);cg.addColorStop(0,'rgba(255,255,255,0.95)');
      cg.addColorStop(0.25,'#D4A017');cg.addColorStop(0.6,active?'#8B5CF6':'rgba(212,160,23,0.5)');
      cg.addColorStop(1,'rgba(212,160,23,0)');ctx.fillStyle=cg;
      ctx.beginPath();ctx.arc(cx,cy,cs*(1+Math.sin(t*1.5)*0.1),0,Math.PI*2);ctx.fill();
      nodes.forEach(n=>{const dr=active?8:3;n.x=n.bx+Math.sin(t*n.sp+n.ph)*dr;n.y=n.by+Math.cos(t*n.sp*0.7+n.ph)*dr;});
      nodes.forEach((a,i)=>{nodes.forEach((b,j)=>{if(j<=i)return;const dx=a.x-b.x,dy=a.y-b.y;const dist=Math.sqrt(dx*dx+dy*dy);const mx=active?w*0.45:w*0.35;
        if(dist<mx){const al=(1-dist/mx)*(active?0.35:0.15);const pu=0.5+Math.sin(t*2+i*0.3)*0.5;
          ctx.strokeStyle='rgba(212,160,23,'+(al*pu)+')';ctx.lineWidth=active?1.2:0.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}});});
      nodes.forEach(n=>{const pu=0.7+Math.sin(t*2+n.ph)*0.3;const na=active?0.9:0.5;
        ctx.fillStyle='rgba(212,160,23,'+(na*pu)+')';ctx.beginPath();ctx.arc(n.x,n.y,n.r*pu,0,Math.PI*2);ctx.fill();});
      frameRef.current=requestAnimationFrame(draw);}
    draw();return()=>cancelAnimationFrame(frameRef.current);
  },[active,size]);
  return React.createElement('canvas',{ref:canvasRef,style:{width:size,height:size}});
}

function EileenChat({token,onClose}){
  const[msgs,setMsgs]=useState([{role:'eileen',text:'Good evening. I have full Gold Clearance access to the intelligence network. What would you like to know?'}]);
  const[input,setInput]=useState('');const[thinking,setThinking]=useState(false);const endRef=React.useRef(null);
  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs,thinking]);
  async function send(){if(!input.trim()||thinking)return;const q=input.trim();setInput('');setMsgs(m=>[...m,{role:'user',text:q}]);setThinking(true);
    try{const r=await fetch(SUPABASE_URL+'/functions/v1/ceo-assistant',{method:'POST',headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify({message:q})});
      if(r.ok){const d=await r.json();setMsgs(m=>[...m,{role:'eileen',text:d.response||d.content||'Response received.'}]);}
      else{setMsgs(m=>[...m,{role:'eileen',text:'I encountered a '+r.status+' response. Try again.'}]);}}
    catch(e){setMsgs(m=>[...m,{role:'eileen',text:'Connection interrupted. Please try again.'}]);}setThinking(false);}
  return React.createElement('div',{className:'eileen-panel'},
    React.createElement('div',{className:'eileen-header'},
      React.createElement(EileenNexus,{active:thinking,size:40}),
      React.createElement('div',{style:{flex:1}},
        React.createElement('div',{className:'eileen-header-name'},'Eileen'),
        React.createElement('div',{className:'eileen-header-status'},thinking?'Processing intelligence...':'CEO Command \u00B7 Gold Clearance')),
      React.createElement('button',{className:'eileen-close',onClick:onClose},'\u00D7')),
    React.createElement('div',{className:'eileen-messages'},
      msgs.map((m,i)=>React.createElement('div',{key:i,className:'eileen-msg '+m.role},m.text)),
      thinking&&React.createElement('div',{className:'eileen-typing'},
        React.createElement('div',{className:'eileen-typing-dot'}),React.createElement('div',{className:'eileen-typing-dot'}),React.createElement('div',{className:'eileen-typing-dot'})),
      React.createElement('div',{ref:endRef})),
    React.createElement('div',{className:'eileen-input-bar'},
      React.createElement('input',{className:'eileen-input',value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(),placeholder:'Ask Eileen anything...'}),
      React.createElement('button',{className:'eileen-send',onClick:send},'Send')));
}
