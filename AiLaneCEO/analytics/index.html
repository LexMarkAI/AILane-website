                ].map((ch,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:i<4?'1px solid var(--border-subtle)':'none'}}>
                    <div><div style={{fontSize:'0.74rem',color:'var(--text-primary)',fontWeight:500}}>{ch.channel}</div><div style={{fontSize:'0.58rem',color:'var(--text-muted)'}}>{ch.audience}</div></div>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <span style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',color:ch.status==='Live'?'var(--accent-green)':'var(--text-muted)'}}>{ch.status}</span>
                      <span style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',padding:'1px 6px',borderRadius:100,background:'var(--bg-hover)',color:'var(--text-muted)',border:'1px solid var(--border-subtle)'}}>{ch.priority}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* DATA PIPELINE HEALTH + SCRAPER STATUS */}
        <div className="two-col">
          <div className="card">
            <div className="card-head"><div className="card-head-title">Data Pipeline Health</div><div className="card-head-badge">Daily runs</div></div>
            <div className="card-body">
              {pipelines.map((p,i)=>(
                <div className="pipeline-row" key={i}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className={`pipeline-status ${p.status}`}>{p.status}</span>
                    <span style={{color:'var(--text-primary)',fontWeight:500}}>{p.pipeline_code.replace(/_/g,' ')}</span>
                  </div>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <span className="ts">{p.records_found||0} found / {p.records_new||0} new</span>
                    <span className="ts">{timeAgo(p.started_at)}</span>
                  </div>
                </div>
              ))}
              {pipelines.length===0&&<div className="ts">No pipeline data</div>}
            </div>
          </div>
          <div className="card">
            <div className="card-head"><div className="card-head-title">Scraper Health</div><div className="card-head-badge">International sources</div></div>
            <div className="card-body">
              {scrapers.map((s,i)=>(
                <div className="pipeline-row" key={i}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className={`pipeline-status ${s.status}`}>{s.status}</span>
                    <span style={{color:'var(--text-primary)',fontWeight:500}}>{s.scraper_name}</span>
                  </div>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <span className="ts">{s.decisions_found||0} found / {s.decisions_new||0} new</span>
                    <span className="ts">{timeAgo(s.started_at)}</span>
                  </div>
                </div>
              ))}
              {scrapers.length===0&&<div className="ts">No scraper data</div>}
              <div className="insight-card" style={{marginTop:12}}>
                <div className="insight-title">Data Acquisition Velocity</div>
                <div className="insight-text">Scraper currency is critical — tribunal data freshness underpins the entire ACEI value proposition. International scrapers (AU, NZ, IE, SG, CA) are infrastructure for future territory expansion. Prioritise UK GOV.UK scraper run frequency before scaling client acquisition.</div>
              </div>
            </div>
          </div>
        </div>

        {/* AI DEEP LEARNING VISION */}
        <div className="card">
          <div className="card-head"><div className="card-head-title">AI Intelligence Roadmap</div><div className="card-head-badge">Future State</div></div>
          <div className="card-body">
            <div className="three-col">
              {[
                {title:'AI Lead Scoring',desc:'Cross-reference employer risk signals (accounts overdue, insolvency, tribunal history, headcount) to produce a propensity-to-buy score for every employer in the 78.7K pool. Prioritise outreach by expected LTV.',phase:'Phase 2'},
                {title:'Predictive Compliance Risk',desc:'Train models on 437+ findings to predict which clause categories will fail for a given sector × region × headcount combination — before the document is even uploaded. Surface as "Your sector typically fails on..."',phase:'Phase 2'},
                {title:'Campaign Attribution Loop',desc:'CAMINT closed-loop: Google Ads click → compliance check → conversion → Stripe revenue. Requires Developer Token (pending). Enables cost-per-acquisition by channel, keyword-level ROI, and automated bid adjustment.',phase:'Phase 1 (blocked)'},
                {title:'Tribunal Trend Detection',desc:'Time-series analysis on 130.9K decisions to detect rising claim categories by sector and region. Alert employers to emerging risks before they materialise. Powers the Ticker intelligence feed.',phase:'Phase 3'},
                {title:'Competitor Intelligence',desc:'Continuous monitoring of competitor tribunal exposure (BrightHR, Peninsula, Croner already in index). Map competitor weaknesses to Ailane strengths for positioning.',phase:'Active'},
                {title:'Territory Expansion Intelligence',desc:'Scraper infrastructure already covers AU, NZ, IE, SG, CA. Build jurisdiction-specific compliance models as tribunal data accumulates. Enter markets with data-first advantage.',phase:'Phase 4'},
              ].map((r,i)=>(
                <div className="insight-card" key={i}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <div className="insight-title" style={{marginBottom:0}}>{r.title}</div>
                    <span style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',padding:'2px 7px',borderRadius:100,background:r.phase==='Active'?'var(--accent-green-dim)':'var(--bg-hover)',color:r.phase==='Active'?'var(--accent-green)':'var(--text-muted)',border:'1px solid var(--border-subtle)'}}>{r.phase}</span>
                  </div>
                  <div className="insight-text">{r.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        </>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
