<style>
:root{--bg-void:#050810;--bg-base:#070B14;--bg-surface:#0C1220;--bg-elevated:#111B2E;--bg-hover:#162238;--bg-glass:rgba(12,18,32,0.85);--border-subtle:rgba(255,255,255,0.04);--border-default:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);--border-accent:rgba(14,165,233,0.3);--text-primary:#E2E8F0;--text-secondary:#AEBACE;--text-muted:#8390A6;--text-accent:#38BDF8;--accent-cyan:#0EA5E9;--accent-cyan-dim:rgba(14,165,233,0.15);--accent-green:#10B981;--accent-green-dim:rgba(16,185,129,0.15);--accent-red:#EF4444;--accent-red-dim:rgba(239,68,68,0.15);--accent-amber:#F59E0B;--accent-amber-dim:rgba(245,158,11,0.15);--accent-purple:#8B5CF6;--accent-purple-dim:rgba(139,92,246,0.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-display:'Outfit',sans-serif;--font-body:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(14,165,233,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
#root{position:relative;z-index:1;}

/* top bar — mirrors sibling AiLaneCEO room pages */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border-subtle);background:var(--bg-glass);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.top-bar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-body);font-size:0.75rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.back-btn:hover{border-color:var(--border-accent);color:var(--text-accent);}
.page-title{font-family:var(--font-display);font-size:1rem;font-weight:700;}
.page-title span{color:var(--accent-cyan);}
.top-bar-right{display:flex;align-items:center;gap:12px;}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:0.65rem;font-family:var(--font-mono);font-weight:500;}
.status-pill.live{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(16,185,129,0.2);}
.status-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.3;}}
.ts{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);}

.main{max-width:1100px;margin:0 auto;padding:20px 28px 60px;display:flex;flex-direction:column;gap:16px;}

/* tabs */
.tabs{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border-default);padding-bottom:0;}
.tab{padding:9px 16px;border:none;background:none;color:var(--text-muted);font-family:var(--font-display);font-size:0.82rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}
.tab:hover{color:var(--text-secondary);}
.tab.active{color:var(--text-accent);border-bottom-color:var(--accent-cyan);}
.tab-spacer{flex:1;}
.refresh-btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-mono);font-size:0.68rem;cursor:pointer;transition:all 0.15s;}
.refresh-btn:hover{border-color:var(--border-accent);color:var(--text-accent);}

.muted-note{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);padding:14px 4px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:0.85rem;border:1px dashed var(--border-default);border-radius:var(--radius-lg);background:var(--bg-surface);}

/* error banner — non-blocking (§4.6) */
.err-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-radius:var(--radius-md);border:1px solid rgba(239,68,68,0.35);border-left:3px solid var(--accent-red);background:linear-gradient(180deg,rgba(239,68,68,0.08),var(--bg-surface));color:#FCA5A5;font-size:0.8rem;font-weight:500;}
.retry-btn{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.12);color:#FCA5A5;font-family:var(--font-mono);font-size:0.68rem;font-weight:600;cursor:pointer;}
.retry-btn:hover{background:rgba(239,68,68,0.2);}

/* alert cards */
.alerts-pane{display:flex;flex-direction:column;gap:12px;}
.alert-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:16px 18px;}
.alert-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.sev-chip{font-family:var(--font-mono);font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;padding:3px 9px;border-radius:100px;}
.type-tag{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-secondary);text-transform:capitalize;}
.alert-time{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);margin-left:auto;}
.status-badge{font-family:var(--font-mono);font-size:0.58rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:3px 9px;border-radius:100px;}
.alert-title{font-family:var(--font-display);font-size:0.95rem;font-weight:700;line-height:1.35;color:var(--text-primary);margin-bottom:6px;}
.alert-body{font-size:0.82rem;line-height:1.6;color:var(--text-secondary);margin-bottom:10px;white-space:pre-wrap;}
.alert-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
.src-link{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-accent);text-decoration:none;border-bottom:1px solid rgba(56,189,248,0.3);}
.src-link:hover{border-bottom-color:var(--text-accent);}
.meta-dim{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);}

.alert-actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-secondary);font-family:var(--font-mono);font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.act-btn:hover:not(:disabled){border-color:var(--border-strong);color:var(--text-primary);}
.act-btn:disabled{opacity:0.45;cursor:default;}
.act-btn.approve{border-color:rgba(16,185,129,0.3);color:#34D399;background:rgba(16,185,129,0.08);}
.act-btn.approve:hover:not(:disabled){background:rgba(16,185,129,0.16);}
.act-btn.dismiss{border-color:rgba(239,68,68,0.3);color:#F87171;background:rgba(239,68,68,0.07);}
.act-btn.dismiss:hover:not(:disabled){background:rgba(239,68,68,0.15);}

.note-box{margin-top:10px;}
.note-area{width:100%;background:var(--bg-base);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:0.8rem;padding:10px 12px;resize:vertical;}
.note-area:focus{outline:none;border-color:var(--border-accent);}
.note-actions{display:flex;gap:8px;margin-top:8px;}
.act-msg{margin-top:10px;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;padding:8px 12px;border-radius:var(--radius-sm);}
.act-msg.ok{background:rgba(16,185,129,0.1);color:#34D399;border:1px solid rgba(16,185,129,0.25);}
.act-msg.warn{background:rgba(245,158,11,0.1);color:#FBBF24;border:1px solid rgba(245,158,11,0.3);}
.act-msg.err{background:rgba(239,68,68,0.1);color:#FCA5A5;border:1px solid rgba(239,68,68,0.3);}

/* registry table */
.reg-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto;}
.reg-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
.reg-table th{text-align:left;font-family:var(--font-display);font-size:0.62rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;padding:12px 16px;border-bottom:1px solid var(--border-default);background:var(--bg-base);position:sticky;top:0;}
.reg-table td{padding:11px 16px;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);vertical-align:top;}
.reg-table tr:last-child td{border-bottom:none;}
.reg-table td.mono{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);white-space:nowrap;}

/* ─── BRIEF-002 v2 additions ─── */
/* estate-status + duplicate chips (§3.1) */
.estate-chip{font-family:var(--font-mono);font-size:0.58rem;font-weight:600;padding:3px 9px;border-radius:100px;display:inline-flex;align-items:center;gap:4px;}
.estate-chip.in-estate{background:var(--accent-green-dim);color:#34D399;border:1px solid rgba(16,185,129,0.3);}
.estate-chip.op{background:rgba(148,163,184,0.12);color:#94A3B8;border:1px solid rgba(148,163,184,0.22);}
.dup-chip{font-family:var(--font-mono);font-size:0.58rem;font-weight:600;padding:3px 8px;border-radius:100px;background:var(--accent-purple-dim);color:#A78BFA;border:1px solid rgba(139,92,246,0.25);cursor:default;}
/* eileen verdict one-liner (§3.1) */
.eileen-verdict{font-style:italic;font-size:0.78rem;line-height:1.45;color:var(--text-secondary);margin:-2px 0 8px;display:flex;gap:7px;align-items:flex-start;}
.eileen-verdict .ev-label{font-style:normal;font-family:var(--font-mono);font-size:0.58rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-purple);padding-top:2px;flex-shrink:0;}
/* ask eileen (§3.2) */
.eileen-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid rgba(139,92,246,0.3);background:var(--accent-purple-dim);color:#A78BFA;font-family:var(--font-mono);font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.eileen-btn:hover:not(:disabled){background:rgba(139,92,246,0.22);}
.eileen-btn:disabled{opacity:0.6;cursor:default;}
.spinner{width:11px;height:11px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;display:inline-block;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.eileen-panel{margin-top:12px;padding:14px 16px;border-radius:var(--radius-md);border:1px solid rgba(139,92,246,0.22);border-left:3px solid var(--accent-purple);background:linear-gradient(180deg,rgba(139,92,246,0.06),var(--bg-base));}
.eileen-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.eileen-headline{font-family:var(--font-display);font-size:0.9rem;font-weight:700;color:var(--text-primary);line-height:1.3;}
.eileen-impact{font-family:var(--font-mono);font-size:0.7rem;color:#A78BFA;margin-bottom:10px;}
.eileen-md{font-size:0.82rem;line-height:1.6;color:var(--text-secondary);}
.eileen-md p{margin:0 0 8px;}
.eileen-md p:last-child{margin-bottom:0;}
.eileen-md h3,.eileen-md h4,.eileen-md h5{font-family:var(--font-display);color:var(--text-primary);margin:10px 0 6px;font-size:0.85rem;}
.eileen-md ul,.eileen-md ol{margin:0 0 8px 18px;}
.eileen-md li{margin:2px 0;}
.eileen-md strong{color:var(--text-primary);font-weight:600;}
.eileen-md em{color:var(--text-secondary);}
.eileen-md code{font-family:var(--font-mono);font-size:0.76rem;background:var(--bg-elevated);padding:1px 5px;border-radius:4px;}
.eileen-md a{color:var(--text-accent);}
.eileen-err{font-family:var(--font-mono);font-size:0.72rem;color:#FCA5A5;display:flex;gap:8px;align-items:center;}
.link-btn{background:none;border:none;padding:0;font-family:var(--font-mono);font-size:0.66rem;color:var(--text-accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.link-btn:hover:not(:disabled){color:var(--text-primary);}
.link-btn:disabled{opacity:0.5;cursor:default;}
/* propagation receipt (§3.3) */
.receipt-block{margin-top:10px;padding:12px 14px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--bg-base);}
.receipt-head{font-family:var(--font-mono);font-size:0.7rem;font-weight:600;margin-bottom:8px;}
.receipt-head.ok{color:#34D399;}
.receipt-head.warn{color:#FBBF24;}
.receipt-surfaces{list-style:none;display:flex;flex-direction:column;gap:5px;}
.receipt-surfaces li{display:flex;align-items:baseline;gap:9px;font-size:0.74rem;color:var(--text-secondary);flex-wrap:wrap;}
.receipt-mark{font-family:var(--font-mono);font-weight:700;width:12px;display:inline-block;text-align:center;flex-shrink:0;}
.receipt-mark.on{color:#34D399;}
.receipt-mark.off{color:var(--text-muted);}
.receipt-surface{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-primary);min-width:130px;}
.receipt-consumers{font-size:0.72rem;color:var(--text-muted);}
.receipt-viewer{margin-top:8px;}
/* history (§3.4) */
.history-list{display:flex;flex-direction:column;gap:10px;}
.history-item{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:13px 16px;display:flex;flex-direction:column;gap:8px;}
.history-main{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.history-title{font-family:var(--font-display);font-size:0.86rem;font-weight:600;color:var(--text-primary);}
.history-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
/* automated ingestion status chip (§3.5) */
.ingest-chip{font-family:var(--font-mono);font-size:0.6rem;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap;}
.ingest-chip.ok{background:var(--accent-green-dim);color:#34D399;border:1px solid rgba(16,185,129,0.3);}
.ingest-chip.warn{background:var(--accent-amber-dim);color:#FBBF24;border:1px solid rgba(245,158,11,0.3);}

/* ─── CEO-ALERTS-READABILITY-001 additions ─── */
/* last-updated meta strip (P0 §1) */
.meta-strip{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:12px 16px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:linear-gradient(180deg,rgba(14,165,233,0.05),var(--bg-surface));}
.meta-strip-main{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:0.8rem;color:var(--text-secondary);}
.meta-live{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;color:var(--accent-green);text-transform:uppercase;letter-spacing:0.04em;}
.meta-live .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse-dot 2s ease-in-out infinite;}
.meta-text{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;}
.meta-text strong{color:var(--text-accent);font-weight:700;}
.meta-sep{color:var(--text-muted);}
.meta-text.warn{color:#FBBF24;}

/* disposition sections (P0 §2) */
.disp-sections{display:flex;flex-direction:column;gap:16px;}
.disp-section{display:flex;flex-direction:column;gap:12px;}
.disp-header{width:100%;display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);cursor:pointer;text-align:left;color:var(--text-primary);font-family:var(--font-display);transition:border-color 0.15s,background 0.15s;}
.disp-header:hover{border-color:var(--border-accent);}
.disp-section.attention .disp-header{border-color:var(--border-accent);background:linear-gradient(180deg,rgba(14,165,233,0.08),var(--bg-surface));}
.disp-caret{font-size:0.7rem;color:var(--text-muted);width:12px;flex-shrink:0;}
.disp-title{font-size:0.92rem;font-weight:700;}
.disp-section.attention .disp-title{color:var(--text-accent);}
.disp-count{margin-left:auto;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;padding:2px 10px;border-radius:100px;background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border-default);}
.disp-section.attention .disp-count{background:var(--accent-cyan-dim);color:var(--text-accent);border-color:var(--border-accent);}
.disp-cards{display:flex;flex-direction:column;gap:12px;}
.disp-empty{padding:6px 4px 2px;color:var(--text-muted);font-size:0.78rem;font-family:var(--font-mono);}

/* recommended-action line (P0 §3 — kept distinct from narrative body) */
.alert-rec{display:flex;gap:8px;align-items:flex-start;font-size:0.8rem;line-height:1.5;color:var(--text-secondary);margin:-2px 0 10px;}
.alert-rec .rec-label{font-family:var(--font-mono);font-size:0.58rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-cyan);padding-top:2px;flex-shrink:0;font-weight:600;}

/* tier-2/3 intelligence-not-advice footer (PLUGIN-001 §14.3) */
.page-disclaimer{margin-top:10px;font-size:0.62rem;color:var(--text-muted);line-height:1.55;font-style:italic;border-top:1px solid var(--border-subtle);padding-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.page-disclaimer a{color:var(--text-accent);text-decoration:none;font-style:normal;}
.page-disclaimer a:hover{text-decoration:underline;}

// ─── RPC helper (RULE 2 — raw fetch, explicit Bearer; never sb.from() for these) ───
async function rpc(token, fn, params){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{ 'Authorization':`Bearer ${token}`, 'apikey':SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(params||{})
  });
  let json=null;
  try{ json = await res.json(); }catch(e){ json=null; }
  return { ok: res.ok, status: res.status, json };
}

// ─── formatting helpers ───
function humanize(s){ return (s==null||s==='') ? '' : String(s).replace(/_/g,' '); }
function fmtTime(t){ if(!t) return ''; const d=new Date(t); return isNaN(d) ? '' : d.toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
// relative "x ago" for the last-updated strip (P0 §1); falls back to absolute for old timestamps
function relativeTime(t){
  if(!t) return '—';
  const d=new Date(t); if(isNaN(d)) return '—';
  const secs=Math.round((Date.now()-d.getTime())/1000);
  if(secs<45) return 'just now';
  if(secs<90) return 'a minute ago';
  const mins=Math.round(secs/60); if(mins<60) return mins+' min ago';
  const hrs=Math.round(mins/60); if(hrs<24) return hrs+' hour'+(hrs===1?'':'s')+' ago';
  const days=Math.round(hrs/24); if(days<30) return days+' day'+(days===1?'':'s')+' ago';
  return fmtTime(t);
}
function sevStyle(sev){
  const s=String(sev||'').toLowerCase();
  if(s==='critical'||s==='action_required') return {background:'rgba(239,68,68,0.15)',color:'#F87171',border:'1px solid rgba(239,68,68,0.35)'};
  if(s==='high') return {background:'rgba(245,158,11,0.15)',color:'#FBBF24',border:'1px solid rgba(245,158,11,0.35)'};
  if(s==='medium') return {background:'rgba(14,165,233,0.15)',color:'#38BDF8',border:'1px solid rgba(14,165,233,0.3)'};
  return {background:'rgba(148,163,184,0.12)',color:'#94A3B8',border:'1px solid rgba(148,163,184,0.25)'};
}
function statusStyle(st){
  const s=String(st||'').toLowerCase();
  if(s==='open') return {background:'rgba(14,165,233,0.14)',color:'#38BDF8'};
  if(s==='approved') return {background:'rgba(16,185,129,0.16)',color:'#34D399'};
  if(s==='dismissed') return {background:'rgba(148,163,184,0.14)',color:'#94A3B8'};
  if(s==='acknowledged') return {background:'rgba(139,92,246,0.16)',color:'#A78BFA'};
  return {background:'rgba(148,163,184,0.12)',color:'#94A3B8'};
}
function isBlocked(o){ return typeof o==='string' && o.indexOf('publish_blocked')===0; }
function friendlyOutcome(o){
  if(o==null) return 'Done';
  const s=String(o);
  if(isBlocked(s)) return s; // surface publish_blocked text verbatim (§2.2)
  const map={ published:'Published', dismissed_unpublished:'Unpublished', dismissed:'Dismissed', acknowledged:'Acknowledged', note_added:'Note added' };
  return map[s] || humanize(s);
}

// ─── minimal, safe markdown → HTML (§3.2; no new CDN — escape first, then format) ───
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdInline(t){
  return t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/__([^_]+)__/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}
function mdToHtml(md){
  const lines = escapeHtml(md).split(/\r?\n/);
  const out=[]; let listType=null;
  const closeList=()=>{ if(listType){ out.push(listType==='ul'?'</ul>':'</ol>'); listType=null; } };
  for(const raw of lines){
    const line = raw.replace(/\s+$/,'');
    if(line.trim()===''){ closeList(); continue; }
    let m;
    if((m=line.match(/^(#{1,6})\s+(.+)$/))){ closeList(); const lvl=Math.min(m[1].length+2,6); out.push('<h'+lvl+'>'+mdInline(m[2])+'</h'+lvl+'>'); continue; }
    if((m=line.match(/^\s*[-*•]\s+(.+)$/))){ if(listType!=='ul'){ closeList(); out.push('<ul>'); listType='ul'; } out.push('<li>'+mdInline(m[1])+'</li>'); continue; }
    if((m=line.match(/^\s*\d+[.)]\s+(.+)$/))){ if(listType!=='ol'){ closeList(); out.push('<ol>'); listType='ol'; } out.push('<li>'+mdInline(m[1])+'</li>'); continue; }
    closeList(); out.push('<p>'+mdInline(line)+'</p>');
  }
  closeList();
  return out.join('');
}

// ─── propagation-receipt helpers (§2.2 act-shape + §2.3 re-read shape) ───
function consumerLabel(c){
  if(c==null) return '';
  if(typeof c==='string') return c;
  if(typeof c==='object') return c.name||c.label||c.consumer||c.surface||c.key||JSON.stringify(c);
  return String(c);
}
function joinConsumers(list){ return Array.isArray(list) ? list.map(consumerLabel).filter(Boolean).join(', ') : ''; }
function normalizeActReceipt(rcpt){ // §2.2 — { surface, table, required, present, consumers }
  const surfaces=(rcpt.surfaces||[]).map(s=>({ key:s.surface, present:s.present, required:s.required, consumers:s.consumers }));
  return { allRequiredPresent: !!rcpt.all_required_present, surfaces };
}
function normalizeReadReceipt(rows){ // §2.3 — { surface_key, surface_table, required, present, consumers }
  const surfaces=(rows||[]).map(r=>({ key:r.surface_key, present:r.present, required:r.required, consumers:r.consumers }));
  const allRequiredPresent = surfaces.filter(s=>s.required).every(s=>s.present===true);
  return { allRequiredPresent, surfaces };
}

// ─── shared receipt block (§3.3) — renders both act + re-read shapes ───
function ReceiptBlock({allRequiredPresent, surfaces}){
  return (
    <div className="receipt-block">
      <div className={'receipt-head '+(allRequiredPresent?'ok':'warn')}>
        Propagated · {allRequiredPresent ? 'all required surfaces verified ✓' : 'review — a required surface is missing'}
      </div>
      {Array.isArray(surfaces) && surfaces.length>0 ? (
        <ul className="receipt-surfaces">
          {surfaces.map((s,i)=>{
            const on = s.present===true;
            const cons = joinConsumers(s.consumers);
            return (
              <li key={s.key||i}>
                <span className={'receipt-mark '+(on?'on':'off')}>{on?'✓':'–'}</span>
                <span className="receipt-surface">{humanize(s.key)||'—'}</span>
                {cons && <span className="receipt-consumers">{cons}</span>}
              </li>
            );
          })}
        </ul>
      ) : <div className="meta-dim">No surfaces recorded.</div>}
    </div>
  );
}

// ─── re-read receipt on demand (§3.3 "View receipt" — used by acted cards + History) ───
function ReceiptViewer({token, alertId}){
  const [open,setOpen]=useState(false);
  const [state,setState]=useState('idle'); // idle | loading | ready | empty | error
  const [data,setData]=useState(null);
  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);
  async function load(){
    setOpen(true); setState('loading');
    try{
      const r=await rpc(token,'fn_ceo_propagation_receipt',{p_alert_id:alertId});
      if(!mounted.current) return;
      if(r.ok && Array.isArray(r.json) && r.json.length){ setData(normalizeReadReceipt(r.json)); setState('ready'); }
      else if(r.ok){ setState('empty'); }
      else { console.error('fn_ceo_propagation_receipt HTTP '+r.status, r.json); setState('error'); }
    }catch(e){ console.error('fn_ceo_propagation_receipt error', e); if(mounted.current) setState('error'); }
  }
  if(!open) return <button className="link-btn" onClick={load}>View receipt</button>;
  if(state==='loading') return <span className="meta-dim">Loading receipt…</span>;
  if(state==='empty') return <span className="meta-dim">No propagation receipt recorded.</span>;
  if(state==='error') return <span className="eileen-err">Receipt unavailable — <button className="link-btn" onClick={load}>retry</button></span>;
  if(state==='ready' && data) return <ReceiptBlock allRequiredPresent={data.allRequiredPresent} surfaces={data.surfaces}/>;
  return null;
}

// ─── one alert card (§4.3 + BRIEF-002 §3.1–3.3) ───
function AlertCard({alert, token, onActed}){
  const [noteOpen,setNoteOpen]=useState(false);
  const [note,setNote]=useState('');
  const [busy,setBusy]=useState(null);
  const [msg,setMsg]=useState(null); // { text, kind: 'ok' | 'warn' | 'err' }
  const [receipt,setReceipt]=useState(null);  // inline receipt from a fresh approve (§3.3)
  const [eState,setEState]=useState('idle');  // 'idle' | 'loading' | 'ready' | 'error'
  const [eileen,setEileen]=useState(null);    // last Ask-Eileen payload
  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  async function act(action){
    if(busy) return;
    setBusy(action); setMsg(null);
    const p_note = note.trim() ? note.trim() : null;
    try{
      const r = await rpc(token, 'fn_ceo_alert_act', { p_alert_id: alert.id, p_action: action, p_note });
      if(!mounted.current) return;
      if(!r.ok){
        console.error('fn_ceo_alert_act HTTP '+r.status, r.json);
        setMsg({ text:'Action failed ('+r.status+'). Try again.', kind:'err' }); setBusy(null); return;
      }
      const outcome = r.json && r.json.outcome;
      const rcpt = r.json && r.json.receipt;
      // §3.3 — non-null receipt (only on publishable approve) renders inline; null + publish_blocked shows verbatim via msg
      if(rcpt && Array.isArray(rcpt.surfaces)) setReceipt(normalizeActReceipt(rcpt));
      setMsg({ text: friendlyOutcome(outcome), kind: isBlocked(outcome) ? 'warn' : 'ok' });
      setBusy(null);
      if(action==='note'){ setNote(''); setNoteOpen(false); }
      onActed(); // re-fetch the list so status / counts refresh (card instance kept via stable key)
    }catch(e){
      console.error('fn_ceo_alert_act error', e);
      if(mounted.current){ setMsg({ text:"Couldn't reach the alerts service — retry", kind:'err' }); setBusy(null); }
    }
  }

  // §3.2 — Ask Eileen (Edge Function). First call computes+caches; refresh:true recomputes.
  async function askEileen(refresh){
    if(eState==='loading') return;
    setEState('loading');
    try{
      const r = await callEileen(token, alert.id, refresh);
      if(!mounted.current) return;
      if(!r.ok || !r.json || (!r.json.verdict && !r.json.assessment_md)){
        console.error('ceo-alert-eileen HTTP '+r.status, r.json); setEState('error'); return;
      }
      setEileen(r.json); setEState('ready');
    }catch(e){
      console.error('ceo-alert-eileen error', e);
      if(mounted.current) setEState('error');
    }
  }

  // §3 — narrative is the body (backend now always populates it); recommended_action stays
  // a distinct line, shown only when present and not identical to the narrative sentence.
  const narrative = alert.narrative || alert.recommended_action || '';
  const rec = (alert.recommended_action && alert.recommended_action!==alert.narrative) ? alert.recommended_action : '';
  const count = Number(alert.action_count)||0;
  const dup = Number(alert.duplicate_count)||0;
  const acted = !!alert.status && String(alert.status).toLowerCase()!=='open';
  return (
    <div className="alert-card">
      <div className="alert-top">
        <span className="sev-chip" style={sevStyle(alert.severity)}>{humanize(alert.severity) || '—'}</span>
        {alert.alert_type && <span className="type-tag">{humanize(alert.alert_type)}</span>}
        <EstateChip alert={alert}/>
        {dup>1 && <span className="dup-chip" title={dup+' near-identical alerts collapsed into this one'}>+{dup-1} similar</span>}
        <span className="alert-time">{fmtTime(alert.created_at)}</span>
        <span className="status-badge" style={statusStyle(alert.status)}>{humanize(alert.status) || '—'}</span>
      </div>
      <div className="alert-title">{alert.title}</div>
      {alert.eileen_verdict && (
        <div className="eileen-verdict"><span className="ev-label">Eileen</span><span>{alert.eileen_verdict}</span></div>
      )}
      {narrative && <div className="alert-body">{narrative}</div>}
      {rec && <div className="alert-rec"><span className="rec-label">Recommended</span><span>{rec}</span></div>}
      <div className="alert-meta">
        {alert.source_link && <a className="src-link" href={alert.source_link} target="_blank" rel="noopener noreferrer">View source ↗</a>}
        {count>0 && <span className="meta-dim">{count} action{count===1?'':'s'}{alert.last_action ? (' · last: '+humanize(alert.last_action)) : ''}{alert.last_action_at ? (' · '+fmtTime(alert.last_action_at)) : ''}</span>}
      </div>
      <div className="alert-actions">
        <button className="act-btn approve" disabled={!!busy} onClick={()=>act('approve')}>{busy==='approve'?'…':'Approve'}</button>
        <button className="act-btn dismiss" disabled={!!busy} onClick={()=>act('dismiss')}>{busy==='dismiss'?'…':'Dismiss'}</button>
        <button className="act-btn note" disabled={!!busy} onClick={()=>setNoteOpen(o=>!o)}>{noteOpen?'Close note':'Add note'}</button>
        <button className="eileen-btn" disabled={eState==='loading'} onClick={()=>askEileen(false)}>
          {eState==='loading' && !eileen ? <span className="spinner"/> : null}
          {eState==='loading' && !eileen ? 'Asking Eileen…' : 'Ask Eileen'}
        </button>
      </div>
      {noteOpen && (
        <div className="note-box">
          <textarea className="note-area" rows={3} value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Note — saved on its own, or attached to an Approve / Dismiss above."/>
          <div className="note-actions">
            <button className="act-btn note" disabled={!!busy || !note.trim()} onClick={()=>act('note')}>{busy==='note'?'Saving…':'Save note'}</button>
          </div>
        </div>
      )}
      {eState==='error' && !eileen && (
        <div className="eileen-panel"><div className="eileen-err">Eileen is unavailable — <button className="link-btn" onClick={()=>askEileen(false)}>retry</button></div></div>
      )}
      {eileen && <EileenPanel data={eileen} refreshing={eState==='loading'} error={eState==='error'} onRefresh={()=>askEileen(true)}/>}
      {msg && <div className={'act-msg '+msg.kind}>{msg.text}</div>}
      {receipt && <ReceiptBlock allRequiredPresent={receipt.allRequiredPresent} surfaces={receipt.surfaces}/>}
      {acted && <div className="receipt-viewer"><ReceiptViewer token={token} alertId={alert.id}/></div>}
    </div>
  );
}

      {acted.map(a=> <HistoryItem key={a.id} alert={a} token={token}/>)}

  );
}

// ─── disposition bucketing (P0 §2) — authoritative `disposition` column ───
function groupByDisposition(list){
  const g={attention:[],in_estate:[],aged:[],handled:[]};
  for(const a of (list||[])){
    const d=String(a.disposition||'').toLowerCase();
    if(d==='in_estate') g.in_estate.push(a);
    else if(d==='aged') g.aged.push(a);
    else if(d==='handled') g.handled.push(a);
    else g.attention.push(a); // 'attention' + any unknown/blank stays visible by default
  }
  return g;
}

  return (

      </button>
      {open && (n>0 ? (
        <div className="disp-cards">
          {alerts.map(a=> <AlertCard key={a.id} alert={a} token={token} onActed={onActed}/>)}
        </div>
      ) : (
        <div className="disp-empty">Nothing here.</div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
function App(){
  const [auth,setAuth]=useState('checking'); // 'checking' | 'ok'
  const [token,setToken]=useState(null);
  const [tab,setTab]=useState('alerts');     // 'alerts' | 'history' | 'ingestion' | 'registry'
  const [alerts,setAlerts]=useState(null);   // null = loading, [] = empty, [..] = rows
  const [alertsErr,setAlertsErr]=useState(false);
  const [meta,setMeta]=useState(null);       // fn_ceo_alerts_meta() single row (P0 §1)
  const [metaErr,setMetaErr]=useState(false);
  const [registry,setRegistry]=useState(null);
  const [registryErr,setRegistryErr]=useState(false);
  const [ingestions,setIngestions]=useState(null);
  const [ingestionsErr,setIngestionsErr]=useState(false);
  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  // Auth guard (§5) — CEO only; body stays hidden until confirmed. Mirrors the sibling
  // AiLaneCEO room idiom (getSession → JWT email check → onAuthStateChange fallback),
  // with the brief's parameters: 6s timeout and silent redirect to '/' on any failure.
  useEffect(()=>{(async()=>{
    const deny=()=>window.location.replace('/');
    const grant=(tok)=>{ if(mounted.current){ setToken(tok); setAuth('ok'); } };
    let session=null;
    try{ const r=await sb.auth.getSession(); session = r && r.data && r.data.session; }
    catch(e){ console.warn('getSession failed', e); }
    if(session){
      try{
        const p=JSON.parse(atob(session.access_token.split('.')[1]));
        if(p.email===CEO_EMAIL){ grant(session.access_token); return; }
      }catch(e){ /* malformed token — deny below */ }
      return deny();
    }
    const t=setTimeout(deny, 6000);
    sb.auth.onAuthStateChange((ev,sess)=>{
      if(sess){
        clearTimeout(t);
        try{
          const p=JSON.parse(atob(sess.access_token.split('.')[1]));
          if(p.email===CEO_EMAIL){ grant(sess.access_token); } else { deny(); }
        }catch(e){ deny(); }
      }
    });
  })();},[]);

  // Reveal the body only after the room is confirmed + committed (no pre-auth flash).
  useEffect(()=>{ if(auth==='ok') document.body.style.visibility='visible'; },[auth]);

  // Alerts feed (§4.3). Does NOT null the list on refresh, so stable-keyed AlertCards keep
  // their inline outcome message while their status badges update from fresh props.
  const loadAlerts=useCallback(async()=>{
    if(!token) return;
    setAlertsErr(false);
    try{
      const r=await rpc(token,'fn_ceo_intelligence_alerts',{p_limit:200});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_ceo_intelligence_alerts HTTP '+r.status, r.json); setAlertsErr(true); return; }
      // Preserve the backend's attention-first ordering (P0 §2) — grouping by disposition
      // is done at render; no client re-sort, so intra-section priority is the server's.
      const arr = Array.isArray(r.json) ? r.json.slice() : [];
      setAlerts(arr);
    }catch(e){ console.error('fn_ceo_intelligence_alerts error', e); if(mounted.current) setAlertsErr(true); }
  },[token]);

  // Last-updated meta (P0 §1) — single-row RPC; PostgREST wraps it in an array.
  const loadMeta=useCallback(async()=>{
    if(!token) return;
    setMetaErr(false);
    try{
      const r=await rpc(token,'fn_ceo_alerts_meta',{});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_ceo_alerts_meta HTTP '+r.status, r.json); setMetaErr(true); return; }
      const row = Array.isArray(r.json) ? r.json[0] : r.json;
      setMeta(row||null);
    }catch(e){ console.error('fn_ceo_alerts_meta error', e); if(mounted.current) setMetaErr(true); }
  },[token]);

  // Manual Refresh control re-calls BOTH RPCs (P0 §1); also used as the post-action re-fetch
  // so the header's needs-attention count tracks Approve / Dismiss.
  const refreshAlertsView=useCallback(()=>{ loadAlerts(); loadMeta(); },[loadAlerts,loadMeta]);

  // Registry (§4.4).
  const loadRegistry=useCallback(async()=>{
    if(!token) return;
    setRegistry(null); setRegistryErr(false);
    try{
      const r=await rpc(token,'fn_ceo_action_registry',{p_limit:200});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_ceo_action_registry HTTP '+r.status, r.json); setRegistryErr(true); return; }
      const arr = Array.isArray(r.json) ? r.json.slice() : [];
      arr.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at)); // newest first
      setRegistry(arr);
    }catch(e){ console.error('fn_ceo_action_registry error', e); if(mounted.current) setRegistryErr(true); }
  },[token]);

  // Automated ingestion (§3.5).
  const loadIngestions=useCallback(async()=>{
    if(!token) return;
    setIngestions(null); setIngestionsErr(false);
    try{
      const r=await rpc(token,'fn_ceo_automated_ingestions',{p_limit:200});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_ceo_automated_ingestions HTTP '+r.status, r.json); setIngestionsErr(true); return; }
      const arr = Array.isArray(r.json) ? r.json.slice() : [];
      arr.sort((a,b)=> new Date(b.propagated_at) - new Date(a.propagated_at)); // newest first
      setIngestions(arr);
    }catch(e){ console.error('fn_ceo_automated_ingestions error', e); if(mounted.current) setIngestionsErr(true); }
  },[token]);

  useEffect(()=>{ if(auth==='ok'&&token) loadAlerts(); },[auth,token,loadAlerts]);
  useEffect(()=>{ if(auth==='ok'&&token) loadMeta(); },[auth,token,loadMeta]);
  useEffect(()=>{ if(auth==='ok'&&token&&tab==='registry') loadRegistry(); },[auth,token,tab,loadRegistry]);
  useEffect(()=>{ if(auth==='ok'&&token&&tab==='ingestion') loadIngestions(); },[auth,token,tab,loadIngestions]);

  if(auth!=='ok') return null; // body hidden during check; redirect handles any failure

  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Intelligence <span>Alerts</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">Director alert inbox · approve · dismiss · note</div>
        </div>
      </div>

      <div className="main">
        <div className="tabs">
          <button className={'tab'+(tab==='alerts'?' active':'')} onClick={()=>setTab('alerts')}>Alerts</button>
          <button className={'tab'+(tab==='history'?' active':'')} onClick={()=>setTab('history')}>History</button>
          <button className={'tab'+(tab==='ingestion'?' active':'')} onClick={()=>setTab('ingestion')}>Automated ingestion</button>
          <button className={'tab'+(tab==='registry'?' active':'')} onClick={()=>setTab('registry')}>Registry</button>
          <div className="tab-spacer"/>
          <button className="refresh-btn" onClick={()=>{ if(tab==='alerts') refreshAlertsView(); else if(tab==='history') loadAlerts(); else if(tab==='ingestion') loadIngestions(); else loadRegistry(); }}>↻ Refresh</button>
        </div>

        {tab==='alerts' && (
          <div className="alerts-pane">
            <MetaStrip meta={meta} err={metaErr} onRefresh={refreshAlertsView}/>
            {alertsErr && <ErrorBanner onRetry={refreshAlertsView}/>}
            {alerts==null && !alertsErr && <div className="muted-note">Loading alerts…</div>}
            {alerts && alerts.length===0 && !alertsErr && <div className="empty-state">No alerts in your inbox.</div>}
            {alerts && alerts.length>0 && (()=>{
              const g=groupByDisposition(alerts);
              return (
                <div className="disp-sections">
                  <DispositionSection title="Needs your decision" alerts={g.attention} token={token} onActed={refreshAlertsView} defaultOpen accent="attention"/>
                  <DispositionSection title="In the estate — for awareness" alerts={g.in_estate} token={token} onActed={refreshAlertsView}/>
                  <DispositionSection title="Older items" alerts={g.aged} token={token} onActed={refreshAlertsView}/>
                  <DispositionSection title="Handled" alerts={g.handled} token={token} onActed={refreshAlertsView}/>
                </div>
              );
            })()}
          </div>
        )}

        {tab==='history' && (
          <div className="history-pane">
            <HistoryPane alerts={alerts} token={token} err={alertsErr} onRetry={loadAlerts}/>
          </div>
        )}

        {tab==='ingestion' && (
          <div className="ingestion-pane">
            <IngestionTable rows={ingestions} err={ingestionsErr} onRetry={loadIngestions}/>
          </div>
        )}

        {tab==='registry' && (
          <div className="registry-pane">
            {registryErr && <ErrorBanner onRetry={loadRegistry}/>}
            {!registryErr && <RegistryTable rows={registry}/>}
          </div>
        )}

        {/* Tier-2/3 intelligence-not-advice disclaimer (AILANE-SPEC-PLUGIN-001 §14.3) */}
        <footer className="page-disclaimer">
          <span>Intelligence for the Director's decision — not legal advice (AILANE-SPEC-PLUGIN-001 Art XIV §14.3).</span>
          <a href="/terms/" target="_blank" rel="noopener noreferrer">Terms</a>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
