<style>
:root{--bg-void:#050810;--bg-base:#070B14;--bg-surface:#0C1220;--bg-elevated:#111B2E;--bg-hover:#162238;--bg-glass:rgba(12,18,32,0.85);--border-subtle:rgba(255,255,255,0.04);--border-default:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);--border-accent:rgba(14,165,233,0.3);--text-primary:#E2E8F0;--text-secondary:#AEBACE;--text-muted:#8390A6;--text-accent:#38BDF8;--accent-cyan:#0EA5E9;--accent-cyan-dim:rgba(14,165,233,0.15);--accent-green:#10B981;--accent-green-dim:rgba(16,185,129,0.15);--accent-red:#EF4444;--accent-red-dim:rgba(239,68,68,0.15);--accent-amber:#F59E0B;--accent-amber-dim:rgba(245,158,11,0.15);--accent-purple:#8B5CF6;--accent-purple-dim:rgba(139,92,246,0.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-display:'Outfit',sans-serif;--font-body:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(14,165,233,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
#root{position:relative;z-index:1;}

/* top bar — mirrors sibling AiLaneCEO room pages */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border-subtle);background:var(--bg-glass);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.top-bar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-body);font-size:0.75rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.back-btn:hover{border-color:var(--border-accent);color:var(--text-accent);}
.page-title{font-family:var(--font-display);font-size:1rem;font-weight:700;}
.page-title span{color:var(--accent-cyan);}
.top-bar-right{display:flex;align-items:center;gap:12px;}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:0.65rem;font-family:var(--font-mono);font-weight:500;}

.status-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse-dot 2s ease-in-out infinite;}

.ts{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);}

.main{max-width:1100px;margin:0 auto;padding:20px 28px 60px;display:flex;flex-direction:column;gap:16px;}

.tab{padding:9px 16px;border:none;background:none;color:var(--text-muted);font-family:var(--font-display);font-size:0.82rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}

.alert-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
.src-link{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-accent);text-decoration:none;border-bottom:1px solid rgba(56,189,248,0.3);}

.alert-actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-secondary);font-family:var(--font-mono);font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.act-btn:hover:not(:disabled){border-color:var(--border-strong);color:var(--text-primary);}
.act-btn:disabled{opacity:0.45;cursor:default;}
.act-btn.approve{border-color:rgba(16,185,129,0.3);color:#34D399;background:rgba(16,185,129,0.08);}
.act-btn.approve:hover:not(:disabled){background:rgba(16,185,129,0.16);}
.act-btn.dismiss{border-color:rgba(239,68,68,0.3);color:#F87171;background:rgba(239,68,68,0.07);}
.act-btn.dismiss:hover:not(:disabled){background:rgba(239,68,68,0.15);}

.note-box{margin-top:10px;}
.note-area{width:100%;background:var(--bg-base);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:0.8rem;padding:10px 12px;resize:vertical;}
.note-area:focus{outline:none;border-color:var(--border-accent);}
.note-actions{display:flex;gap:8px;margin-top:8px;}
.act-msg{margin-top:10px;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;padding:8px 12px;border-radius:var(--radius-sm);}
.act-msg.ok{background:rgba(16,185,129,0.1);color:#34D399;border:1px solid rgba(16,185,129,0.25);}
.act-msg.warn{background:rgba(245,158,11,0.1);color:#FBBF24;border:1px solid rgba(245,158,11,0.3);}
.act-msg.err{background:rgba(239,68,68,0.1);color:#FCA5A5;border:1px solid rgba(239,68,68,0.3);}

/* registry table */
.reg-wrap{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto;}
.reg-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
.reg-table th{text-align:left;font-family:var(--font-display);font-size:0.62rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;padding:12px 16px;border-bottom:1px solid var(--border-default);background:var(--bg-base);position:sticky;top:0;}
.reg-table td{padding:11px 16px;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);vertical-align:top;}
.reg-table tr:last-child td{border-bottom:none;}
.reg-table td.mono{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);white-space:nowrap;}
</style>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ─── Canonical config (RULE 2: raw fetch + Bearer + apikey for the §2 RPCs) ───
// Reuses the established AiLaneCEO Supabase constants — no new values invented (§7).
const SUPABASE_URL='https://cnbsxwtvazfvzmltkuvx.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
const CEO_EMAIL='mark@ailane.ai';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
window.eileenSupabase = sb;

// ─── RPC helper (RULE 2 — raw fetch, explicit Bearer; never sb.from() for these) ───
async function rpc(token, fn, params){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{ 'Authorization':`Bearer ${token}`, 'apikey':SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(params||{})
  });
  let json=null;
  try{ json = await res.json(); }catch(e){ json=null; }
  return { ok: res.ok, status: res.status, json };
}

// ─── formatting helpers ───
function humanize(s){ return (s==null||s==='') ? '' : String(s).replace(/_/g,' '); }
function fmtTime(t){ if(!t) return ''; const d=new Date(t); return isNaN(d) ? '' : d.toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function sevStyle(sev){
  const s=String(sev||'').toLowerCase();
  if(s==='critical'||s==='action_required') return {background:'rgba(239,68,68,0.15)',color:'#F87171',border:'1px solid rgba(239,68,68,0.35)'};
  if(s==='high') return {background:'rgba(245,158,11,0.15)',color:'#FBBF24',border:'1px solid rgba(245,158,11,0.35)'};
  if(s==='medium') return {background:'rgba(14,165,233,0.15)',color:'#38BDF8',border:'1px solid rgba(14,165,233,0.3)'};
  return {background:'rgba(148,163,184,0.12)',color:'#94A3B8',border:'1px solid rgba(148,163,184,0.25)'};
}
function statusStyle(st){
  const s=String(st||'').toLowerCase();
  if(s==='open') return {background:'rgba(14,165,233,0.14)',color:'#38BDF8'};
  if(s==='approved') return {background:'rgba(16,185,129,0.16)',color:'#34D399'};
  if(s==='dismissed') return {background:'rgba(148,163,184,0.14)',color:'#94A3B8'};
  if(s==='acknowledged') return {background:'rgba(139,92,246,0.16)',color:'#A78BFA'};
  return {background:'rgba(148,163,184,0.12)',color:'#94A3B8'};
}
function isBlocked(o){ return typeof o==='string' && o.indexOf('publish_blocked')===0; }
function friendlyOutcome(o){
  if(o==null) return 'Done';
  const s=String(o);
  if(isBlocked(s)) return s; // surface publish_blocked text verbatim (§2.2)
  const map={ published:'Published', dismissed_unpublished:'Unpublished', dismissed:'Dismissed', acknowledged:'Acknowledged', note_added:'Note added' };
  return map[s] || humanize(s);
}

// ─── one alert card (§4.3) ───
function AlertCard({alert, token, onActed}){
  const [noteOpen,setNoteOpen]=useState(false);
  const [note,setNote]=useState('');
  const [busy,setBusy]=useState(null);
  const [msg,setMsg]=useState(null); // { text, kind: 'ok' | 'warn' | 'err' }
  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  async function act(action){
    if(busy) return;
    setBusy(action); setMsg(null);
    const p_note = note.trim() ? note.trim() : null;
    try{
      const r = await rpc(token, 'fn_ceo_alert_act', { p_alert_id: alert.id, p_action: action, p_note });
      if(!mounted.current) return;
      if(!r.ok){
        console.error('fn_ceo_alert_act HTTP '+r.status, r.json);
        setMsg({ text:'Action failed ('+r.status+'). Try again.', kind:'err' }); setBusy(null); return;
      }
      const outcome = r.json && r.json.outcome;
      setMsg({ text: friendlyOutcome(outcome), kind: isBlocked(outcome) ? 'warn' : 'ok' });
      setBusy(null);
      if(action==='note'){ setNote(''); setNoteOpen(false); }
      onActed(); // re-fetch the list so status / counts refresh (card instance kept via stable key)
    }catch(e){
      console.error('fn_ceo_alert_act error', e);
      if(mounted.current){ setMsg({ text:"Couldn't reach the alerts service — retry", kind:'err' }); setBusy(null); }
    }
  }

  const body = alert.narrative || alert.recommended_action || '';
  const count = Number(alert.action_count)||0;
  return (
    <div className="alert-card">
      <div className="alert-top">
        <span className="sev-chip" style={sevStyle(alert.severity)}>{humanize(alert.severity) || '—'}</span>
        {alert.alert_type && <span className="type-tag">{humanize(alert.alert_type)}</span>}
        <span className="alert-time">{fmtTime(alert.created_at)}</span>
        <span className="status-badge" style={statusStyle(alert.status)}>{humanize(alert.status) || '—'}</span>
      </div>
      <div className="alert-title">{alert.title}</div>
      {body && <div className="alert-body">{body}</div>}
      <div className="alert-meta">
        {alert.source_link && <a className="src-link" href={alert.source_link} target="_blank" rel="noopener noreferrer">View source ↗</a>}
        {count>0 && <span className="meta-dim">{count} action{count===1?'':'s'}{alert.last_action ? (' · last: '+humanize(alert.last_action)) : ''}{alert.last_action_at ? (' · '+fmtTime(alert.last_action_at)) : ''}</span>}
      </div>
      <div className="alert-actions">
        <button className="act-btn approve" disabled={!!busy} onClick={()=>act('approve')}>{busy==='approve'?'…':'Approve'}</button>
        <button className="act-btn dismiss" disabled={!!busy} onClick={()=>act('dismiss')}>{busy==='dismiss'?'…':'Dismiss'}</button>
        <button className="act-btn note" disabled={!!busy} onClick={()=>setNoteOpen(o=>!o)}>{noteOpen?'Close note':'Add note'}</button>
      </div>
      {noteOpen && (
        <div className="note-box">
          <textarea className="note-area" rows={3} value={note} onChange={e=>setNote(e.target.value)}
            placeholder="Note — saved on its own, or attached to an Approve / Dismiss above."/>
          <div className="note-actions">
            <button className="act-btn note" disabled={!!busy || !note.trim()} onClick={()=>act('note')}>{busy==='note'?'Saving…':'Save note'}</button>
          </div>
        </div>
      )}
      {msg && <div className={'act-msg '+msg.kind}>{msg.text}</div>}
    </div>
  );
}

// ─── registry table (§4.4) ───
function RegistryTable({rows}){
  if(rows==null) return <div className="muted-note">Loading registry…</div>;
  if(rows.length===0) return <div className="empty-state">No actions recorded yet.</div>;
  return (
    <div className="reg-wrap">
      <table className="reg-table">
        <thead><tr><th>Time</th><th>Action</th><th>Outcome / Result</th><th>Alert</th><th>Note</th></tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={r.log_id||i}>
              <td className="mono">{fmtTime(r.created_at)}</td>
              <td>{humanize(r.action) || '—'}</td>
              <td>{[friendlyOutcome(r.outcome), r.result].filter(Boolean).join(' · ') || '—'}</td>
              <td>{r.alert_title || r.target_ref || '—'}</td>
              <td>{r.note || '—'}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ErrorBanner({onRetry}){
  return (
    <div className="err-banner">
      <span>Couldn't reach the alerts service — retry</span>
      <button className="retry-btn" onClick={onRetry}>Retry</button>
    </div>
  );
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
function App(){
  const [auth,setAuth]=useState('checking'); // 'checking' | 'ok'
  const [token,setToken]=useState(null);
  const [tab,setTab]=useState('alerts');     // 'alerts' | 'registry'
  const [alerts,setAlerts]=useState(null);   // null = loading, [] = empty, [..] = rows
  const [alertsErr,setAlertsErr]=useState(false);
  const [registry,setRegistry]=useState(null);
  const [registryErr,setRegistryErr]=useState(false);
  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  // Auth guard (§5) — CEO only; body stays hidden until confirmed. Mirrors the sibling
  // AiLaneCEO room idiom (getSession → JWT email check → onAuthStateChange fallback),
  // with the brief's parameters: 6s timeout and silent redirect to '/' on any failure.
  useEffect(()=>{(async()=>{
    const deny=()=>window.location.replace('/');
    const grant=(tok)=>{ if(mounted.current){ setToken(tok); setAuth('ok'); } };
    let session=null;
    try{ const r=await sb.auth.getSession(); session = r && r.data && r.data.session; }
    catch(e){ console.warn('getSession failed', e); }
    if(session){
      try{
        const p=JSON.parse(atob(session.access_token.split('.')[1]));
        if(p.email===CEO_EMAIL){ grant(session.access_token); return; }
      }catch(e){ /* malformed token — deny below */ }
      return deny();
    }
    const t=setTimeout(deny, 6000);
    sb.auth.onAuthStateChange((ev,sess)=>{
      if(sess){
        clearTimeout(t);
        try{
          const p=JSON.parse(atob(sess.access_token.split('.')[1]));
          if(p.email===CEO_EMAIL){ grant(sess.access_token); } else { deny(); }
        }catch(e){ deny(); }
      }
    });
  })();},[]);

  // Reveal the body only after the room is confirmed + committed (no pre-auth flash).
  useEffect(()=>{ if(auth==='ok') document.body.style.visibility='visible'; },[auth]);

  // Alerts feed (§4.3). Does NOT null the list on refresh, so stable-keyed AlertCards keep
  // their inline outcome message while their status badges update from fresh props.
  const loadAlerts=useCallback(async()=>{
    if(!token) return;
    setAlertsErr(false);
    try{
      const r=await rpc(token,'fn_ceo_intelligence_alerts',{p_limit:200});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_ceo_intelligence_alerts HTTP '+r.status, r.json); setAlertsErr(true); return; }
      const arr = Array.isArray(r.json) ? r.json.slice() : [];
      arr.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at)); // newest first
      setAlerts(arr);
    }catch(e){ console.error('fn_ceo_intelligence_alerts error', e); if(mounted.current) setAlertsErr(true); }
  },[token]);

  // Registry (§4.4).
  const loadRegistry=useCallback(async()=>{
    if(!token) return;
    setRegistry(null); setRegistryErr(false);
    try{
      const r=await rpc(token,'fn_ceo_action_registry',{p_limit:200});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_ceo_action_registry HTTP '+r.status, r.json); setRegistryErr(true); return; }
      const arr = Array.isArray(r.json) ? r.json.slice() : [];
      arr.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at)); // newest first
      setRegistry(arr);
    }catch(e){ console.error('fn_ceo_action_registry error', e); if(mounted.current) setRegistryErr(true); }
  },[token]);

  useEffect(()=>{ if(auth==='ok'&&token) loadAlerts(); },[auth,token,loadAlerts]);
  useEffect(()=>{ if(auth==='ok'&&token&&tab==='registry') loadRegistry(); },[auth,token,tab,loadRegistry]);

  if(auth!=='ok') return null; // body hidden during check; redirect handles any failure

  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Intelligence <span>Alerts</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">Director alert inbox · approve · dismiss · note</div>
        </div>
      </div>

      <div className="main">
        <div className="tabs">
          <button className={'tab'+(tab==='alerts'?' active':'')} onClick={()=>setTab('alerts')}>Alerts</button>
          <button className={'tab'+(tab==='registry'?' active':'')} onClick={()=>setTab('registry')}>Registry</button>
          <div className="tab-spacer"/>
          <button className="refresh-btn" onClick={()=> tab==='alerts' ? loadAlerts() : loadRegistry()}>↻ Refresh</button>
        </div>

        {tab==='alerts' && (
          <div className="alerts-pane">
            {alertsErr && <ErrorBanner onRetry={loadAlerts}/>}
            {alerts==null && !alertsErr && <div className="muted-note">Loading alerts…</div>}
            {alerts && alerts.length===0 && !alertsErr && <div className="empty-state">No alerts in your inbox.</div>}
            {alerts && alerts.length>0 && alerts.map(a=> <AlertCard key={a.id} alert={a} token={token} onActed={loadAlerts}/>)}
          </div>
        )}

        {tab==='registry' && (
          <div className="registry-pane">
            {registryErr && <ErrorBanner onRetry={loadRegistry}/>}
            {!registryErr && <RegistryTable rows={registry}/>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
