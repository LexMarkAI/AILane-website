                        <td><span className="excl"><b>{num(f.exclusivity_held_count)}</b> / {num(f.exclusivity_available_count)}</span></td>
                        <td><span className={'alloc-pill '+st.cls}><span className="dot2"/>{st.label}</span></td>
                      </tr>
                    );
                  })}
                  {ordered.length===0 && <tr><td colSpan="6"><div className="empty-note">No league families in the current snapshot.</div></td></tr>}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      {selFam && (
        <div className="card" style={{marginTop:14}}>
          <div className="card-head">
            <div className="card-head-title">{selFam.cohort_family} — origination</div>
            <div className="card-head-badge">{selEntities.length} of {num(selFam.entity_count_total)} entities</div>
          </div>
          <div className="card-body">
            <div style={{fontSize:'0.66rem',color:'var(--text-secondary)',lineHeight:1.5,marginBottom:10}}>
              Select a register entity to research it (Action&nbsp;1) and originate a bespoke deal room (Action&nbsp;2, Director-gated).
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
              <span className="meta-chip">Active <b>{num(selFam.entity_count_active)}</b></span>
              <span className="meta-chip">Lapsed <b>{num(selFam.entity_count_lapsed)}</b></span>
              <span className="meta-chip">Dissolved <b>{num(selFam.entity_count_dissolved)}</b></span>
              <span className="meta-chip">Exclusivity held <b>{num(selFam.exclusivity_held_count)}</b> / {num(selFam.exclusivity_available_count)}</span>
            </div>
            {selEntities.length>0 ? (
              <div className="lg-table-wrap">
                <table className="ent-table">
                  <thead><tr><th>ALIN</th><th>Company</th><th>Tier</th><th>Size</th><th>Exposure</th><th>Tribunals</th><th>Sev.Wtd</th></tr></thead>
                  <tbody>
                    {selEntities.map((e,i)=>{
                      const isSelEnt=selEntityAlin===e.alin;
                      return (
                        <tr key={i} className={(e.alin?'ent-row':'')+(isSelEnt?' sel':'')} onClick={e.alin?()=>setSelEntityAlin(isSelEnt?null:e.alin):undefined} style={e.alin?{cursor:'pointer'}:undefined} title={e.alin?'Select for origination':undefined}>
                          <td className="mono" style={{color:'var(--accent-cyan)'}}>{e.alin||'—'}</td>
                          <td><div className="ent-name">{e.company_name||'—'}</div>{e.is_repeat_respondent&&<span className="repeat-flag" style={{marginTop:3,display:'inline-block'}}>repeat respondent</span>}</td>
                          <td>{e.super_league_tier?<span className={'mini-tier '+String(e.super_league_tier).toUpperCase().charAt(0)}>{e.super_league_tier}</span>:'—'}</td>
                          <td>{friendly(e.size_band)}</td>
                          <td>{friendly(e.exposure_band)}</td>
                          <td className="mono">{num(e.tribunal_count)}</td>
                          <td className="mono">{e.severity_weighted!=null?Number(e.severity_weighted).toLocaleString('en-GB',{maximumFractionDigits:1}):'—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            ) : Number(selFam.entity_count_total)>0 ? (
              /* BRIEF §2.A: non-zero headline count but no materialised register rows
                 (e.g. I — origination, 5,585) → search-first universe browser (§2.B). */
              <UniverseBrowser key={selFam.cohort_family} family={selFam.cohort_family} token={token}/>
            ) : <div className="empty-note">No individual register entities for this family in the snapshot.</div>}

            {selEntity && <EntityActions key={selEntity.alin} entity={selEntity} token={token} existingRoomByAlin={existingRoomByAlin}/>}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [auth, setAuth] = useState('checking');
  const [token, setToken] = useState(null);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [drawerClid, setDrawerClid] = useState(null);
  const openDealroom = (clid) => { if(clid) setDrawerClid(clid); };

  // ─── Auth gate (CEO-only; identical pattern to module pages) ───
  useEffect(() => {
    (async()=>{
      const {data:{session}}=await sb.auth.getSession();
      if(session){const p=JSON.parse(atob(session.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(session.access_token);setAuth('ok');return;}}
      const t=setTimeout(()=>{window.location.href='/AiLaneCEO/';},5000);
      sb.auth.onAuthStateChange((ev,sess)=>{if(sess){clearTimeout(t);const p=JSON.parse(atob(sess.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(sess.access_token);setAuth('ok');}else window.location.href='/AiLaneCEO/';}});
    })();
  }, []);

  // ─── Live data from ceo-portfolio-data ───
  useEffect(() => {
    if(auth!=='ok'||!token) return;
    (async()=>{
      setLoading(true);
      try{const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=dealrooms`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
      if(r.ok){const j=await r.json();setData(j.sections?.dealrooms||null);}else{console.error('ceo-portfolio-data',r.status);}}catch(e){console.error(e);}
      setLoading(false);
    })();
  }, [auth, token]);

  if(auth==='checking') return <div className="auth-gate"><div className="logo-mark">AILANE</div><div className="pulse-ring"/><div className="ts">Verifying clearance…</div></div>;

  const d = data || {};
  const summary = d.summary || {};
  const clids = Array.isArray(d.clids) ? d.clids : [];
  const counterparties = Array.isArray(d.counterparties) ? d.counterparties : [];
  const documents = Array.isArray(d.documents) ? d.documents : [];
  const docsByCp = Array.isArray(d.documents_by_counterparty) ? d.documents_by_counterparty : [];

  const clidMap = {};
  clids.forEach(c=>{ if(c.clid) clidMap[c.clid]=c; });
  const sandboxClids = clids.filter(c=>c.is_simulation===true);

  // ─── Origination guard (BRIEF DEALROOMS-ORIGINATION-GUARD-001 §2.1) ───
  // Map a league entity's origin ALIN → its existing live deal room {clid, workspace_path}, so the
  // Cohort Origination league can offer "Open existing room ↗" instead of instantiating a duplicate.
  // Include only counterparties with a non-null origin_cohort_alin whose linked CLID is NOT a
  // simulation (clids[clid].is_simulation !== true). workspace_path is the same target the Live
  // Counterparty card's Workspace ↗ uses (partner_clids.workspace_path, via clidMap).
  const existingRoomByAlin = {};
  counterparties.forEach(cp=>{
    const alin = cp.origin_cohort_alin;
    if(!alin || !cp.clid) return;
    const linked = clidMap[cp.clid];
    if(!linked || linked.is_simulation===true) return;
    existingRoomByAlin[alin] = { clid: cp.clid, workspace_path: linked.workspace_path };
  });

  function docCountFor(code){const r=docsByCp.find(x=>x.counterparty===code);return r?r.count:0;}

  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Data <span>Deal Rooms</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <a href="/admin/counterparty-orchestration/" className="back-btn" style={{textDecoration:'none'}}>Orchestration ↗</a>
        </div>
      </div>

      <div className="main">
        {loading ? (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="kpi-strip">{[1,2,3,4,5].map(i=><div key={i} className="skeleton" style={{height:80}}/>)}</div>
            <div className="cp-grid">{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:320}}/>)}</div>
          </div>
        ) : !data ? (
          <div className="card"><div className="card-body"><div className="empty-note">Unable to load deal-room data. The portfolio service returned no payload for this session.</div></div></div>
        ) : (
          <>
            {/* KPI STRIP */}
            <div className="kpi-strip">
              <div className="kpi-card">
                <div className="label">Live CLIDs</div>
                <div className="value" style={{color:'var(--accent-green)'}}>{num(summary.clids_live)}</div>
                <div className="sub">{num(summary.clids_total)} total · {num(summary.clids_simulation)} sim</div>
              </div>
              <div className="kpi-card">
                <div className="label">Launch Partners</div>
                <div className="value" style={{color:'var(--accent-amber)'}}>{num(summary.launch_partners)}</div>
                <div className="sub">flagged</div>
              </div>
              <div className="kpi-card">
                <div className="label">Counterparties</div>
                <div className="value" style={{color:'var(--accent-cyan)'}}>{num(summary.counterparties_total)}</div>
                <div className="sub">commercial profiles</div>
              </div>
              <div className="kpi-card">
                <div className="label">Documents</div>
                <div className="value" style={{color:'var(--accent-purple)'}}>{num(summary.documents_current)}</div>
                <div className="sub">current snapshots</div>
              </div>
              <div className="kpi-card">
                <div className="label">Eileen Sessions</div>
                <div className="value" style={{color:'var(--text-primary)'}}>{num(d.eileen_sessions_total)}</div>
                <div className="sub">dealroom total</div>
              </div>
            </div>

            {/* CHARITY LEAGUE (promoted per BRIEF §1.A — AILANE-CC-BRIEF-CSO-ROOM-WEB-001 §3,
                scoped CEO approval CEO-RAT-CSO-003 / AILANE-SPEC-CSO-003 §10). Static card; no data wiring. */}
            <div className="section-label">Charity League</div>
            <div className="card">
              <div className="card-head">
                <div className="card-head-title">Charity Onboarding Rooms</div>
                <div className="card-head-badge">1 room</div>
              </div>
              <div className="card-body">
                <div className="doc-row">
                  <div style={{minWidth:0,flex:1}}>
                    <div className="doc-code">The Rudolph Walker Foundation — Charity Onboarding Room</div>
                    <div className="doc-meta">Awaiting counterparty · fee-waived Founding Charity Partner</div>
                  </div>
                  <span className="doc-auth" id="charity-feedback-rwf">feedback —</span>
                  <a className="cp-link" href="/charities/rwf-2026/">Open room ↗</a>
                </div>
              </div>
            </div>

            {/* LIVE COUNTERPARTIES — sub-categorised by counterparty type (BRIEF DEALROOMS-SUBCAT-001 §2).
                Charity rows route to the Charity League section and simulation rows (is_simulation on the
                linked partner_clids record) route to the Sandbox section — both excluded here (§2.2, display-only). */}
            <div className="section-label">Live Counterparties</div>
            {(()=>{
              // Sub-category render order (§2.1); a header shows only when its group has ≥1 member (AC-5).
              const CP_GROUPS = [
                { key:'institutional_licensee', label:'Institutional Licensees' },
                { key:'data_distribution_platform', label:'Data Distribution Platforms' },
                { key:'other', label:'Sovereign & Other' },
              ];
              const grouped = { institutional_licensee:[], data_distribution_platform:[], other:[] };
              counterparties.forEach((cp,i)=>{
                const linked = cp.clid ? clidMap[cp.clid] : null;
                const isSim = cp.is_simulation===true || (linked ? linked.is_simulation===true : false);
                if(isSim) return;                                       // simulation → Sandbox section (§2.2)
                if(String(cp.counterparty_type)==='charity') return;    // charity → Charity League section (§2.2)
                const bucket = (cp.counterparty_type==='institutional_licensee' || cp.counterparty_type==='data_distribution_platform') ? cp.counterparty_type : 'other';
                grouped[bucket].push({ cp, i });
              });
              const total = grouped.institutional_licensee.length + grouped.data_distribution_platform.length + grouped.other.length;
              if(total===0){
                return <div className="card"><div className="card-body"><div className="empty-note">No live counterparty profiles in the current dataset.</div></div></div>;
              }
              const renderCpCard = (cp, i) => {
                  const inst = isInstitutional(cp);
                  const linked = cp.clid ? clidMap[cp.clid] : null;
                  const wsGate = linked ? linked.gate_state : null;        // workspace axis (partner_clids)
                  const comGate = cp.gate_state;                            // commercial axis (counterparty_profile)
                  const differ = wsGate!=null && comGate!=null && String(wsGate)!==String(comGate);
                  const pkgs = Array.isArray(cp.four_surfaced_packages) ? cp.four_surfaced_packages : [];
                  const fl=cp.envelope_floor_pence, tg=cp.envelope_target_pence, cl=cp.envelope_ceiling_pence;
                  const hasEnv = fl!=null && cl!=null && Number(cl)>Number(fl);
                  const tgtPct = hasEnv && tg!=null ? Math.max(2,Math.min(98,(Number(tg)-Number(fl))/(Number(cl)-Number(fl))*100)) : null;
                  const wsPath = linked ? linked.workspace_path : null;
                  const isLP = linked ? linked.is_launch_partner===true : false;
                  const name = cp.counterparty_legal_name_formal || cp.counterparty_legal_name || cp.counterparty_short_name || cp.counterparty_short_code || 'Counterparty';
                  return (
                    <div key={i} className={'cp-card'+(inst?' inst':'')} onClick={cp.clid?()=>openDealroom(cp.clid):undefined} style={cp.clid?{cursor:'pointer'}:undefined} title={cp.clid?'Open deal room':undefined}>
                      <div className="cp-head">
                        <div>
                          <div className="cp-name">{name}</div>
                          <div className="cp-clid">{cp.clid || cp.counterparty_short_code || '—'}</div>
                        </div>
                        <div className="cp-badges">
                          {cp.counterparty_type && <span className="badge type">{friendly(cp.counterparty_type)}</span>}
                          {inst && <span className="badge gold">Institutional</span>}
                          {isLP && <span className="badge lp">Launch Partner</span>}
                        </div>
                      </div>

                      {pkgs.length>0 && (
                        <div>
                          <div className="subhead" style={{marginBottom:5}}>Surfaced Packages</div>
                          <div className="pkg-row">{pkgs.map((p,j)=><span key={j} className="pkg-chip">{p}</span>)}</div>
                        </div>
                      )}

                      <div className="kv-grid">
                        <div className="kv"><div className="k">MCA Variant</div><div className="v mono">{cp.mca_template_variant||'—'}</div></div>
                        <div className="kv"><div className="k">Pricing Family</div><div className="v mono">{cp.pricing_cohort_family||'—'}</div></div>
                        <div className="kv"><div className="k">Exclusivity</div><div className="v">{friendly(cp.exclusivity_appetite)}{cp.pricing_exclusivity_tier?' · '+friendly(cp.pricing_exclusivity_tier):''}</div></div>
                        <div className="kv"><div className="k">Geo Scope</div><div className="v">{friendly(cp.geographic_scope)}</div></div>
                      </div>

                      {/* GATE RECONCILIATION — two axes side by side */}
                      <div>
                        <div className="subhead" style={{marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <span>Gate State</span>
                          {differ ? <span className="axes-differ"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/><circle cx="12" cy="12" r="10"/></svg>axes differ</span>
                                  : (wsGate!=null&&comGate!=null) ? <span className="axes-match">aligned</span> : null}
                        </div>
                        <div className="gate-axes">
                          <div className="gate-box"><div className="gk">Workspace</div><div className="gv">{wsGate!=null?friendly(wsGate):'—'}</div></div>
                          <div className="gate-box"><div className="gk">Commercial</div><div className="gv">{comGate!=null?friendly(comGate):'—'}</div></div>
                        </div>
                      </div>

                      {/* COMMERCIAL ENVELOPE */}
                      {hasEnv && (
                        <div>
                          <div className="subhead" style={{marginBottom:2}}>Commercial Envelope</div>
                          <div className="env-track">
                            <div className="env-fill" style={{width:(tgtPct!=null?tgtPct:50)+'%'}}/>
                            {tgtPct!=null && <div className="env-marker" style={{left:'calc('+tgtPct+'% - 1px)'}}/>}
                          </div>
                          <div className="env-labels">
                            <div className="el"><span className="elk">Floor</span><span className="elv">{penceGBP(fl)}</span></div>
                            <div className="el tgt"><span className="elk">Target</span><span className="elv">{penceGBP(tg)}</span></div>
                            <div className="el cl"><span className="elk">Ceiling</span><span className="elv">{penceGBP(cl)}</span></div>
                          </div>
                        </div>
                      )}

                      <div className="divline"/>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                        <span className="doc-meta">{num(docCountFor(cp.counterparty_short_code))} document{docCountFor(cp.counterparty_short_code)===1?'':'s'} · updated {shortDate(cp.updated_at)}</span>
                        <div className="cp-links" onClick={e=>e.stopPropagation()}>
                          {wsPath && <a className="cp-link" href={wsPath} target="_blank" rel="noopener">Workspace ↗</a>}
                          <a className="cp-link" href="/admin/counterparty-orchestration/" target="_blank" rel="noopener">Orchestration ↗</a>
                        </div>
                      </div>
                    </div>
                  );
              };
              return CP_GROUPS.filter(g=>grouped[g.key].length>0).map(g=>(
                <div key={g.key}>
                  <div className="section-label">{g.label}</div>
                  <div className="cp-grid">{grouped[g.key].map(({cp,i})=>renderCpCard(cp,i))}</div>
                </div>
              ));
            })()}

            {/* COHORT ORIGINATION — BRIEF CEO-DASH-IA-001 §2A (cohort leagues merged into Deal Rooms) */}
            <CohortOrigination token={token} existingRoomByAlin={existingRoomByAlin}/>

            {/* DOCUMENTS */}
            <div className="docs-grid">
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Documents by Counterparty</div>
                  <div className="card-head-badge">{num(summary.documents_current)} current</div>
                </div>
                <div className="card-body">
                  {docsByCp.length>0 ? docsByCp.map((x,i)=>(
                    <div key={i} className="dbc-row">
                      <span className="doc-code">{x.counterparty}</span>
                      <span className="mono" style={{fontFamily:'var(--font-mono)',fontSize:'0.74rem',color:'var(--accent-cyan)'}}>{num(x.count)}</span>
                    </div>
                  )) : <div className="empty-note">No documents recorded.</div>}
                </div>
              </div>
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Current Document Snapshots</div>
                  <div className="card-head-badge">{documents.length} rendered</div>
                </div>
                <div className="card-body">
                  {/* BRIEF §3: show only the latest batch (most recent 10 by snapshot date);
                      collapse the remainder behind a native <details> — nothing deleted. */}
                  {documents.length>0 ? (()=>{
                    const renderSnap=(doc,i)=>(
                      <div key={(doc.counterparty_short_code||'')+'-'+(doc.doc_code||'')+'-'+i} className="doc-row">
                        <div style={{minWidth:0,flex:1}}>
                          <div className="doc-code">{doc.doc_code}</div>
                          <div className="doc-meta">{doc.counterparty_short_code} · {doc.template_key} v{doc.template_version} · {num(doc.rendered_chars)} chars · {shortDate(doc.snapshotted_at)}</div>
                        </div>
                        {doc.amd_authority && <span className="doc-auth">{doc.amd_authority}</span>}
                      </div>
                    );
                    const sorted=documents.slice().sort((a,b)=>new Date(b.snapshotted_at||0)-new Date(a.snapshotted_at||0));
                    const head=sorted.slice(0,10), rest=sorted.slice(10);
                    return (
                      <>
                        {head.map(renderSnap)}
                        {rest.length>0 && (
                          <details style={{marginTop:8}}>
                            <summary style={{cursor:'pointer',fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--text-accent)',padding:'6px 0'}}>Show earlier snapshots ({rest.length})</summary>
                            <div style={{marginTop:6}}>{rest.map(renderSnap)}</div>
                          </details>
                        )}
                      </>
                    );
                  })() : <div className="empty-note">No rendered document snapshots in the current dataset.</div>}
                </div>
              </div>
            </div>

            {/* SANDBOX / SIMULATION (diagnostic — relocated below snapshots per BRIEF §1.B) */}
            {sandboxClids.length>0 && (
              <div className="sandbox-section">
                <div className="sandbox-banner"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/></svg>Sandbox · Simulation — not production deals</div>
                <div className="sb-grid">
                  {sandboxClids.map((c,i)=>(
                    <div key={i} className="sb-card" onClick={c.clid?()=>openDealroom(c.clid):undefined} style={c.clid?{cursor:'pointer'}:undefined} title={c.clid?'Open deal room':undefined}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
                        <div>
                          <div className="sb-name">{c.counterparty_name||c.clid}</div>
                          <div className="sb-clid">{c.clid}</div>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}}>
                          <span className="sb-tag">Simulation</span>
                          {c.is_launch_partner && <span className="sb-tag">Launch Partner</span>}
                        </div>
                      </div>
                      <div className="kv-grid">
                        <div className="kv"><div className="k">Gate State</div><div className="v mono">{friendly(c.gate_state)}</div></div>
                        <div className="kv"><div className="k">Workspace Year</div><div className="v mono">{c.workspace_year||'—'}</div></div>
                        <div className="kv"><div className="k">Package</div><div className="v mono">{c.package_selection||'—'}</div></div>
                        <div className="kv"><div className="k">Director</div><div className="v mono" style={{fontSize:'0.62rem'}}>{c.director_email||'—'}</div></div>
                      </div>
                      {c.launch_partner_rationale && <div style={{fontSize:'0.66rem',color:'var(--text-secondary)',lineHeight:1.5}}>{c.launch_partner_rationale}</div>}
                      {c.notes && <div style={{fontSize:'0.62rem',color:'var(--text-muted)',lineHeight:1.5,fontStyle:'italic'}}>{c.notes}</div>}
                      {c.workspace_path && <div onClick={e=>e.stopPropagation()}><a className="cp-link" href={c.workspace_path} target="_blank" rel="noopener">Sandbox Workspace ↗</a></div>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* DRILL-DOWN DRAWER */}
      {drawerClid&&<DealroomDrawer clid={drawerClid} token={token} onClose={()=>setDrawerClid(null)}/>}

      {/* Eileen mounted globally via /assets/eileen-panel.js */}
    </div>
  );
}

// ═══════ DEAL-ROOM DRILL-DOWN DRAWER (read-only) ═══════
function DealroomDrawer({clid, token, onClose}){
  const [loading,setLoading]=useState(true);
  const [detail,setDetail]=useState(null);
  const [err,setErr]=useState(null);
  const [viewDoc,setViewDoc]=useState(null);
  const [busy,setBusy]=useState(null);            // key of the action in flight — blocks concurrent writes
  const [docMsg,setDocMsg]=useState({});           // per-document inline action error
  const [gate,setGate]=useState({state:null,blocking:[],text:''});
  const [targetPhase,setTargetPhase]=useState('');
  const [noteText,setNoteText]=useState('');
  const [noteMsg,setNoteMsg]=useState(null);
  const mounted=React.useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  // Single fetch path — used on open (with spinner) and silently after each write (no flash, scroll preserved).
  async function loadDetail(silent){
    if(!silent) setLoading(true);
    try{
      const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=dealroom_detail&clid=${encodeURIComponent(clid)}`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
      const j=await r.json();
      if(!mounted.current) return;
      const dd=j?.sections?.dealroom_detail;
      if(!dd){ setErr('No detail returned for this deal room.'); }
      else if(dd.error){ setErr(dd.error==='clid_not_found'?'Deal room not found for this CLID.':friendly(dd.error)); }
      else { setDetail(dd); setErr(null); }
    }catch(e){ if(mounted.current){ console.error(e); setErr('Network error loading deal room.'); } }
    if(!silent && mounted.current) setLoading(false);
  }
  useEffect(()=>{ setDetail(null);setErr(null);setGate({state:null,blocking:[],text:''});setDocMsg({});setNoteMsg(null); loadDetail(false); },[clid]);

  // All writes go ONLY through ceo-dealroom-action, reusing the drawer's CEO session token + anon apikey.
  async function postAction(body){
    const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-dealroom-action`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
    return await r.json();
  }
  function actionErr(j){ if(!j) return 'No response — not applied.'; if(j.outcome==='noop') return j.detail||'No change.'; return j.error||j.detail||('Failed'+(j.code?' ('+j.code+')':'')); }
  function cpName(){ return (detail&&detail.header&&detail.header.counterparty_name)||clid; }

  async function onApprove(doc){
    if(busy) return;
    if(!window.confirm('Mark "'+doc.name+'" as Director-approved?')) return;
    setBusy('doc:'+doc.document_id); setDocMsg(m=>({...m,[doc.document_id]:null}));
    try{ const j=await postAction({action:'approve_release', clid, document_id:doc.document_id});
      if(j&&j.ok){ await loadDetail(true); } else if(mounted.current){ setDocMsg(m=>({...m,[doc.document_id]:actionErr(j)})); }
    }catch(e){ if(mounted.current){ console.error(e); setDocMsg(m=>({...m,[doc.document_id]:'Network error — not applied.'})); } }
    finally{ if(mounted.current) setBusy(null); }
  }
  async function onClearApproval(doc){
    if(busy) return;
    if(!window.confirm('Clear Director approval for "'+doc.name+'"?')) return;
    setBusy('doc:'+doc.document_id); setDocMsg(m=>({...m,[doc.document_id]:null}));
    try{ const j=await postAction({action:'unapprove_release', clid, document_id:doc.document_id});
      if(j&&j.ok){ await loadDetail(true); } else if(mounted.current){ setDocMsg(m=>({...m,[doc.document_id]:actionErr(j)})); }
    }catch(e){ if(mounted.current){ console.error(e); setDocMsg(m=>({...m,[doc.document_id]:'Network error — not applied.'})); } }
    finally{ if(mounted.current) setBusy(null); }
  }
  async function onAdvance(){
    if(busy) return;
    if(!window.confirm('Advance '+cpName()+' to the next phase?')) return;
    setBusy('advance'); setGate({state:null,blocking:[],text:''});
    try{ const j=await postAction({action:'advance_gate', clid});
      if(!mounted.current) return;
      if(j&&j.ok){ await loadDetail(true); setGate({state:null,blocking:[],text:''}); }
      else if(j&&j.outcome==='blocked'){ setGate({state:'blocked',blocking:Array.isArray(j.blocking)?j.blocking:[],text:j.detail||''}); }
      else if(j&&j.outcome==='noop'){ setGate({state:'noop',blocking:[],text:j.detail||'No further phase.'}); }
      else { setGate({state:'error',blocking:[],text:actionErr(j)}); }
    }catch(e){ if(mounted.current){ console.error(e); setGate({state:'error',blocking:[],text:'Network error — not applied.'}); } }
    finally{ if(mounted.current) setBusy(null); }
  }
  async function onSetGate(){
    if(busy) return;
    const tp=targetPhase||(detail&&detail.header&&detail.header.gate_state)||'phase_0';
    const label=PHASE_LABEL[tp]||tp;
    if(!window.confirm('Override: set '+cpName()+' to '+label+'? This bypasses the requirement guard.')) return;
    setBusy('setgate'); setGate({state:null,blocking:[],text:''});
    try{ const j=await postAction({action:'set_gate', clid, target_phase:tp});
      if(!mounted.current) return;
      if(j&&j.ok){ await loadDetail(true); setGate({state:null,blocking:[],text:''}); }
      else { setGate({state:'error',blocking:[],text:actionErr(j)}); }
    }catch(e){ if(mounted.current){ console.error(e); setGate({state:'error',blocking:[],text:'Network error — not applied.'}); } }
    finally{ if(mounted.current) setBusy(null); }
  }
  async function onAddNote(){
    if(busy) return;
    const t=noteText.trim(); if(!t) return;
    if(!window.confirm('Add this note to the deal room?')) return;
    setBusy('note'); setNoteMsg(null);
    try{ const j=await postAction({action:'add_note', clid, note_text:t});
      if(j&&j.ok){ if(mounted.current) setNoteText(''); await loadDetail(true); }
      else if(mounted.current){ setNoteMsg(actionErr(j)); }
    }catch(e){ if(mounted.current){ console.error(e); setNoteMsg('Network error — not applied.'); } }
    finally{ if(mounted.current) setBusy(null); }
  }

  const h = detail?.header || {};
  const docs = Array.isArray(detail?.documents)?detail.documents:[];
  const uploads = Array.isArray(detail?.uploads)?detail.uploads:[];
  const nextActions = Array.isArray(detail?.next_actions)?detail.next_actions:[];
  const sessions = Array.isArray(detail?.eileen_sessions)?detail.eileen_sessions:[];
  const accessLog = Array.isArray(detail?.access_log)?detail.access_log:[];
  const notes = Array.isArray(detail?.notes)?detail.notes:[];
  const sum = detail?.summary || {};
  const contacts = Array.isArray(detail?.public_contacts)?detail.public_contacts:[];
  const curIdx = PHASE_ORDER.indexOf(h.gate_state);

  // Resolve a per-document upload status: uploads.status preferred, then blockers/next_actions.upload_status
  const upStatus={};
  uploads.forEach(u=>{ if(u.document_id && upStatus[u.document_id]==null) upStatus[u.document_id]=u.status; });
  (Array.isArray(detail?.blockers)?detail.blockers:[]).concat(nextActions).forEach(b=>{ if(b.document_id && upStatus[b.document_id]==null) upStatus[b.document_id]=b.upload_status; });

  // Group documents by phase (fixed order), then by display_order
  const byPhase={};
  docs.forEach(dc=>{ const ph=dc.phase||'phase_0'; (byPhase[ph]=byPhase[ph]||[]).push(dc); });
  Object.values(byPhase).forEach(arr=>arr.sort((a,b)=>(Number(a.display_order)||0)-(Number(b.display_order)||0)));

  return (
    <div>
      <div className="dd-overlay" onClick={onClose}/>
      <div className="dd-drawer" role="dialog" aria-modal="true">
        <div className="dd-head">
          <div>
            <h2>{loading?'Loading…':(h.counterparty_name||clid)}</h2>
            <div className="dd-sub">{clid}{h.gate_label?' · '+h.gate_label:''}</div>
          </div>
          <button className="dd-close" onClick={onClose}>×</button>
        </div>
        <div className="dd-body">
          {loading ? (
            <div className="dd-loading"><div className="pulse-ring"/><div className="ts">Loading deal room…</div></div>
          ) : err ? (
            <div className="empty-note">{err}</div>
          ) : (
            <>
              <div className="dd-sec">
                <div className="dd-badges">
                  {h.counterparty_type && <span className="badge type">{friendly(h.counterparty_type)}</span>}
                  {h.is_launch_partner && <span className="badge lp">Launch Partner</span>}
                  {h.is_simulation && <span className="sb-tag">Simulation</span>}
                  {h.pkg4_eligible && <span className="badge">Pkg-4 eligible</span>}
                </div>
                <div className="dd-kv-grid">
                  <div className="dd-kv"><div className="k">Counterparty Type</div><div className="v">{friendly(h.counterparty_type)}</div></div>
                  <div className="dd-kv"><div className="k">MCA Variant</div><div className="v mono">{h.mca_template_variant||'—'}</div></div>
                  <div className="dd-kv"><div className="k">Exclusivity</div><div className="v">{friendly(h.exclusivity_appetite)}</div></div>
                  <div className="dd-kv"><div className="k">Geographic Scope</div><div className="v">{friendly(h.geographic_scope)}</div></div>
                  <div className="dd-kv"><div className="k">Dispatch Branch</div><div className="v mono">{h.dispatch_branch||'—'}</div></div>
                  <div className="dd-kv"><div className="k">Director</div><div className="v mono" style={{fontSize:'0.64rem'}}>{h.director_email||'—'}</div></div>
                </div>
                {h.workspace_path && <div><a className="cp-link" href={h.workspace_path} target="_blank" rel="noopener">Open Workspace ↗</a></div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Commercial</div>
                <div className="dd-kv-grid">
                  <div className="dd-kv"><div className="k">Envelope Floor</div><div className="v mono">{penceGBP(h.envelope_floor_pence)}</div></div>
                  <div className="dd-kv"><div className="k">Envelope Target</div><div className="v mono">{penceGBP(h.envelope_target_pence)}</div></div>
                  <div className="dd-kv"><div className="k">Envelope Ceiling</div><div className="v mono">{penceGBP(h.envelope_ceiling_pence)}</div></div>
                  <div className="dd-kv"><div className="k">Pilot Fee</div><div className="v mono">{penceGBP(h.pilot_fee_amount_pence)}</div></div>
                  <div className="dd-kv"><div className="k">Pricing Package</div><div className="v mono">{h.pricing_package_id||'—'}</div></div>
                  <div className="dd-kv"><div className="k">Term (months)</div><div className="v mono">{h.pricing_term_months!=null?h.pricing_term_months:'—'}</div></div>
                </div>
                {Array.isArray(h.four_surfaced_packages)&&h.four_surfaced_packages.length>0 && (
                  <div className="pkg-row">{h.four_surfaced_packages.map((p,j)=><span key={j} className="pkg-chip">{p}</span>)}</div>
                )}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Contacts</div>
                {contacts.length>0 ? contacts.map((c,i)=>{
                  const k=contactKind(c.contact_kind);
                  return (
                    <div key={c.contact_id||i} className="dd-contact">
                      <div className="dd-contact-line">
                        <span className="dd-contact-name">{c.full_name}</span>
                        {c.role_title && <span className="dd-contact-role">{c.role_title}</span>}
                        <span className={'dchip '+k.cls}>{k.label}</span>
                      </div>
                      <div className="dd-contact-email">{c.email ? <a href={'mailto:'+c.email}>{c.email}</a> : <span className="dd-muted">—</span>}</div>
                      {c.source && <div className="dd-contact-source">{c.source}</div>}
                    </div>
                  );
                }) : <div className="dd-muted">No contacts recorded yet.</div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Lifecycle</div>
                <div className="ladder">
                  {PHASE_LADDER.map(([val,label],idx)=>{
                    const cls = curIdx<0 ? 'future' : idx<curIdx?'done':idx===curIdx?'current':'future';
                    return (
                      <div key={val} className={'ladder-step '+cls}>
                        <div className="ladder-dot">{idx<curIdx?'✓':idx+1}</div>
                        <div className="ladder-label">{label}</div>
                      </div>
                    );
                  })}
                </div>
                <div className="dd-counts">
                  <div className="dd-count"><div className="n">{num(sum.documents_total)}</div><div className="l">Documents</div></div>
                  <div className="dd-count"><div className="n">{num(sum.releases)}</div><div className="l">Releases</div></div>
                  <div className="dd-count"><div className="n">{num(sum.requirements)}</div><div className="l">Requirements</div></div>
                  <div className="dd-count"><div className="n" style={{color:Number(sum.currently_blocking)>0?'var(--accent-red)':'var(--text-primary)'}}>{num(sum.currently_blocking)}</div><div className="l">Blocking</div></div>
                  <div className="dd-count"><div className="n">{num(sum.documents_rendered)}</div><div className="l">Rendered</div></div>
                  <div className="dd-count"><div className="n">{num(sum.documents_director_approved)}</div><div className="l">Approved</div></div>
                </div>
                <div className="dd-gate-controls">
                  <button className="dd-btn primary" disabled={!!busy} onClick={onAdvance}>{busy==='advance'?'Advancing…':'Advance to next phase'}</button>
                  <div className="dd-setgate">
                    <select className="dd-select" value={targetPhase||h.gate_state||'phase_0'} onChange={ev=>setTargetPhase(ev.target.value)} disabled={!!busy}>
                      {PHASE_LADDER.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                    </select>
                    <button className="dd-btn caution" disabled={!!busy} onClick={onSetGate}>{busy==='setgate'?'Setting…':'Set phase'}</button>
                  </div>
                </div>
                {gate.state==='blocked' && (
                  <div className="dd-blocked">
                    <div className="dd-blocked-title">Blocked — outstanding requirements</div>
                    {gate.blocking.length>0 ? gate.blocking.map((b,i)=>(
                      <div key={i} className="dd-list-row"><span style={{color:'var(--text-primary)'}}>{b.name}</span><span className="dd-muted">{friendly(b.status)}</span></div>
                    )) : <div className="dd-muted">{gate.text||'Outstanding requirements remain.'}</div>}
                  </div>
                )}
                {gate.state==='noop' && <div className="dd-act-note">{gate.text}</div>}
                {gate.state==='error' && <div className="dd-act-err" style={{marginTop:8,display:'block'}}>{gate.text}</div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Next Actions</div>
                {nextActions.length>0 ? nextActions.map((a,i)=>{
                  const s=uploadStatusLabel(a.upload_status);
                  return (
                    <div key={i} className="dd-list-row">
                      <div><span className="dchip req">{friendly(a.phase)}</span> <span style={{color:'var(--text-primary)'}}>{a.name}</span></div>
                      <span className="dd-muted">{s==='Awaiting'?'Awaiting counterparty upload':s}</span>
                    </div>
                  );
                }) : <div className="dd-muted">No blocking items at the current gate.</div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Documents</div>
                {docs.length>0 ? PHASE_ORDER.filter(ph=>byPhase[ph]).map(ph=>(
                  <div key={ph} className="dd-phase-group">
                    <div className="dd-phase-label">{PHASE_LABEL[ph]||friendly(ph)}</div>
                    {byPhase[ph].map((dc,i)=>{
                      const isReq = dc.kind==='requirement';
                      const isRel = dc.kind==='release';
                      let statusChip=null;
                      if(isReq){ const s=uploadStatusLabel(upStatus[dc.document_id]); statusChip=<span className={'dchip '+((s==='Uploaded'||s==='Approved')?'ok':s==='Under review'?'rel':'wait')}>{s}</span>; }
                      else if(isRel){ statusChip = dc.is_rendered?<span className="dchip ok">Rendered</span>:dc.has_file?<span className="dchip rel">File</span>:<span className="dchip wait">Pending render</span>; }
                      return (
                        <div key={i} className="dd-doc">
                          <div className="dd-doc-top">
                            <div className="dd-doc-name">{dc.name}</div>
                            {dc.is_rendered && <button className="dd-view-btn" onClick={()=>setViewDoc(dc.doc_code)}>View</button>}
                          </div>
                          <div className="dd-doc-chips">
                            <span className={'dchip '+(isRel?'rel':isReq?'req':'')}>{isRel?'Ailane → counterparty':isReq?'Counterparty → Ailane':friendly(dc.kind)}</span>
                            {dc.is_blocking_phase_advance && <span className="dchip block">Blocking</span>}
                            {statusChip}
                            <span className={'dchip '+(dc.director_approved?'ok':'wait')}>{dc.director_approved?'Approved':'Not approved'}</span>
                            {dc.version_label && <span className="dchip">{dc.version_label}</span>}
                          </div>
                          {isRel && (
                            <div className="dd-doc-actions">
                              {dc.director_approved
                                ? <button className="dd-mini-btn" disabled={!!busy} onClick={()=>onClearApproval(dc)}>{busy==='doc:'+dc.document_id?'…':'Clear approval'}</button>
                                : <button className="dd-mini-btn primary" disabled={!!busy} onClick={()=>onApprove(dc)}>{busy==='doc:'+dc.document_id?'…':'Approve'}</button>}
                              {docMsg[dc.document_id] && <span className="dd-act-err">{docMsg[dc.document_id]}</span>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )) : <div className="dd-muted">No documents in this deal room.</div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Engagement</div>
                <div className="dd-kv"><div className="k">Eileen Sessions</div><div className="v">{num(sessions.length)}{sum.eileen_messages!=null?' · '+num(sum.eileen_messages)+' messages':''}</div></div>
                {sessions.map((s,i)=>(
                  <div key={i} className="dd-list-row">
                    <span className="dd-muted">{s.message_count!=null?num(s.message_count)+' msgs':'—'} · {s.prompt_version||'—'}</span>
                    <span className="dd-muted">{shortDate(s.updated_at)}</span>
                  </div>
                ))}
                <div className="dd-kv" style={{marginTop:8}}><div className="k">Recent Activity</div></div>
                {accessLog.length>0 ? accessLog.slice(0,15).map((a,i)=>(
                  <div key={i} className="dd-list-row">
                    <span style={{color:'var(--text-secondary)'}}>{friendly(a.action)}{a.user_email?' · '+a.user_email:''}</span>
                    <span className="dd-muted">{a.outcome?friendly(a.outcome)+' · ':''}{shortDate(a.created_at)}</span>
                  </div>
                )) : <div className="dd-muted">No recorded activity.</div>}
                <div className="dd-kv" style={{marginTop:8}}><div className="k">Notes</div></div>
                {notes.length>0 ? notes.map((n,i)=>(
                  <div key={i} style={{fontSize:'0.72rem',color:'var(--text-secondary)',lineHeight:1.5,padding:'5px 0',borderBottom:'1px solid var(--border-subtle)'}}>{n.note_text}<span className="dd-muted" style={{display:'block',fontSize:'0.56rem',marginTop:2}}>{shortDate(n.created_at)}</span></div>
                )) : <div className="dd-muted">No notes yet.</div>}
                <div className="dd-note-add">
                  <textarea className="dd-textarea" rows="2" value={noteText} onChange={ev=>setNoteText(ev.target.value)} placeholder="Add a note…" disabled={busy==='note'}/>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}>
                    <button className="dd-btn primary" disabled={!!busy||!noteText.trim()} onClick={onAddNote}>{busy==='note'?'Adding…':'Add note'}</button>
                    {noteMsg && <span className="dd-act-err">{noteMsg}</span>}
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
      {viewDoc && <DocModal clid={clid} docCode={viewDoc} token={token} onClose={()=>setViewDoc(null)}/>}
    </div>
  );
}

// ═══════ RENDERED DOCUMENT MODAL (read-only) ═══════
function DocModal({clid, docCode, token, onClose}){
  const [loading,setLoading]=useState(true);
  const [doc,setDoc]=useState(null);
  const [err,setErr]=useState(null);
  useEffect(()=>{
    let alive=true;
    (async()=>{
      setLoading(true);setErr(null);
      try{
        const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=dealroom_document&clid=${encodeURIComponent(clid)}&doc_code=${encodeURIComponent(docCode)}`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
        const j=await r.json();
        if(!alive) return;
        const dv=j?.sections?.dealroom_document;
        if(!dv){ setErr('No document returned.'); }
        else if(dv.error){ setErr(dv.error==='document_not_rendered'?'This document has not been rendered yet.':friendly(dv.error)); }
        else setDoc(dv);
      }catch(e){ if(alive){ console.error(e); setErr('Network error loading document.'); } }
      if(alive) setLoading(false);
    })();
    return ()=>{alive=false;};
  },[clid,docCode]);
  return (
    <div className="dm-overlay" onClick={onClose}>
      <div className="dm-modal" onClick={e=>e.stopPropagation()}>
        <div className="dm-head">
          <div>
            <div className="dm-title">{doc?.doc_code||docCode}</div>
            <div className="dm-cap">{doc?('v'+(doc.template_version||'?')+' · '+shortDate(doc.snapshotted_at)+(doc.amd_authority?' · '+doc.amd_authority:'')):''}</div>
          </div>
          <button className="dd-close" onClick={onClose}>×</button>
        </div>
        <div className="dm-body">
          {loading?'Loading document…':err?err:(doc?.rendered_body||'No content returned for this document.')}
        </div>
      </div>
    </div>
  );
}



ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
