<style>
:root{--bg-void:#050810;--bg-base:#070B14;--bg-surface:#0C1220;--bg-elevated:#111B2E;--bg-hover:#162238;--bg-glass:rgba(12,18,32,0.85);--border-subtle:rgba(255,255,255,0.04);--border-default:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);--border-accent:rgba(14,165,233,0.3);--text-primary:#E2E8F0;--text-secondary:#AEBACE;--text-muted:#8390A6;--text-accent:#38BDF8;--accent-cyan:#0EA5E9;--accent-cyan-dim:rgba(14,165,233,0.15);--accent-green:#10B981;--accent-green-dim:rgba(16,185,129,0.15);--accent-red:#EF4444;--accent-red-dim:rgba(239,68,68,0.15);--accent-amber:#F59E0B;--accent-amber-dim:rgba(245,158,11,0.15);--accent-purple:#8B5CF6;--accent-purple-dim:rgba(139,92,246,0.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-display:'Outfit',sans-serif;--font-body:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html{font-size:18px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(14,165,233,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
#root{position:relative;z-index:1;}
.auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;}
.auth-gate .logo-mark{font-family:var(--font-display);font-size:1.4rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-cyan);}
.pulse-ring{width:40px;height:40px;border:2px solid var(--accent-cyan);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border-subtle);background:var(--bg-glass);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.top-bar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-body);font-size:0.75rem;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.back-btn:hover{border-color:var(--border-accent);color:var(--text-accent);}
.page-title{font-family:var(--font-display);font-size:1rem;font-weight:700;}.page-title span{color:var(--accent-cyan);}
.top-bar-right{display:flex;align-items:center;gap:10px;}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:0.65rem;font-family:var(--font-mono);font-weight:500;}
.status-pill.live{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(16,185,129,0.2);}
.status-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.3;}}
.ts{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);}
.main{max-width:1400px;margin:0 auto;padding:20px 28px 60px;display:flex;flex-direction:column;gap:16px;}
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:14px 16px;}
.kpi-card .label{font-size:0.6rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
.kpi-card .value{font-family:var(--font-mono);font-size:1.4rem;font-weight:600;line-height:1.2;}
.kpi-card .sub{font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px;}
.card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;}
.card-head-title{font-family:var(--font-display);font-size:0.82rem;font-weight:600;color:var(--text-primary);}
.card-head-badge{font-family:var(--font-mono);font-size:0.6rem;padding:3px 8px;border-radius:100px;background:var(--bg-hover);color:var(--text-muted);border:1px solid var(--border-subtle);}
.card-body{padding:12px 18px 16px;}
.section-label{font-family:var(--font-display);font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;padding:6px 0 2px;display:flex;align-items:center;gap:8px;}
.skeleton{background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-hover) 50%,var(--bg-elevated) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@media(max-width:1000px){.kpi-strip{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-strip{grid-template-columns:1fr 1fr;}}
.empty-note{color:var(--text-muted);font-size:0.74rem;padding:16px 0;text-align:center;}

/* ═══════ DEAL ROOMS ═══════ */
.cp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px;}
@media(max-width:700px){.cp-grid{grid-template-columns:1fr;}}
.cp-card{background:var(--bg-surface);border:1px solid var(--border-default);border-left:3px solid var(--accent-cyan);border-radius:var(--radius-lg);padding:16px 18px;display:flex;flex-direction:column;gap:13px;}
.cp-card.inst{border-left-color:var(--accent-amber);}
.cp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.cp-name{font-family:var(--font-display);font-size:0.95rem;font-weight:700;color:var(--text-primary);line-height:1.25;}
.cp-clid{font-family:var(--font-mono);font-size:0.62rem;color:var(--accent-cyan);margin-top:4px;}
.cp-card.inst .cp-clid{color:var(--accent-amber);}
.cp-badges{display:flex;flex-wrap:wrap;gap:6px;}
.badge{font-family:var(--font-mono);font-size:0.56rem;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-base);color:var(--text-secondary);white-space:nowrap;}
.badge.gold{background:var(--accent-amber-dim);color:var(--accent-amber);border-color:rgba(245,158,11,0.3);}
.badge.lp{background:var(--accent-green-dim);color:var(--accent-green);border-color:rgba(16,185,129,0.2);}
.badge.type{background:var(--accent-cyan-dim);color:var(--accent-cyan);border-color:rgba(14,165,233,0.2);}
.cp-card.inst .badge.type{background:var(--accent-amber-dim);color:var(--accent-amber);border-color:rgba(245,158,11,0.25);}
.pkg-row{display:flex;flex-wrap:wrap;gap:5px;}
.pkg-chip{font-family:var(--font-mono);font-size:0.58rem;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(122,139,168,0.1);color:var(--text-secondary);border:1px solid var(--border-default);}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
.kv .k{font-size:0.53rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:2px;}
.kv .v{font-size:0.74rem;color:var(--text-primary);font-weight:500;word-break:break-word;}
.kv .v.mono{font-family:var(--font-mono);font-size:0.72rem;}
.subhead{font-family:var(--font-display);font-size:0.58rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;}
.gate-axes{display:flex;gap:8px;align-items:stretch;}
.gate-box{flex:1;background:var(--bg-base);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:8px 10px;}
.gate-box .gk{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);}
.gate-box .gv{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-primary);margin-top:3px;}
.axes-differ{display:inline-flex;align-items:center;gap:4px;font-size:0.54rem;font-weight:600;color:var(--accent-amber);font-family:var(--font-mono);background:var(--accent-amber-dim);border:1px solid rgba(245,158,11,0.25);border-radius:5px;padding:2px 7px;}
.axes-match{display:inline-flex;align-items:center;gap:4px;font-size:0.54rem;font-weight:600;color:var(--accent-green);font-family:var(--font-mono);}
.env-track{position:relative;height:9px;background:var(--bg-base);border:1px solid var(--border-subtle);border-radius:100px;margin-top:4px;}
.env-fill{position:absolute;left:0;top:0;bottom:0;border-radius:100px;background:linear-gradient(90deg,rgba(14,165,233,0.2),var(--accent-cyan));}
.cp-card.inst .env-fill{background:linear-gradient(90deg,rgba(245,158,11,0.2),var(--accent-amber));}
.env-marker{position:absolute;top:-4px;width:2px;height:17px;background:var(--text-primary);border-radius:2px;}
.env-labels{display:flex;justify-content:space-between;margin-top:9px;gap:8px;}
.env-labels .el{display:flex;flex-direction:column;}
.env-labels .el.tgt{align-items:center;}
.env-labels .el.cl{align-items:flex-end;}
.env-labels .el .elk{font-size:0.5rem;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.06em;}
.env-labels .el .elv{font-family:var(--font-mono);font-size:0.74rem;font-weight:600;color:var(--text-primary);margin-top:2px;}
.env-labels .el.tgt .elv{color:var(--accent-cyan);}
.cp-card.inst .env-labels .el.tgt .elv{color:var(--accent-amber);}
.cp-links{display:flex;gap:8px;flex-wrap:wrap;}
.cp-link{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-base);color:var(--text-secondary);font-size:0.66rem;text-decoration:none;transition:all 0.2s;}
.cp-link:hover{border-color:var(--border-accent);color:var(--text-accent);}
.divline{height:1px;background:var(--border-subtle);margin:1px 0;}
.sandbox-section{background:rgba(139,92,246,0.04);border:1px dashed rgba(139,92,246,0.35);border-radius:var(--radius-lg);padding:14px 18px 16px;}
.sandbox-banner{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:0.62rem;font-weight:700;color:var(--accent-purple);text-transform:uppercase;letter-spacing:0.1em;}
.sb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;margin-top:12px;}
@media(max-width:700px){.sb-grid{grid-template-columns:1fr;}}
.sb-card{background:var(--bg-surface);border:1px solid rgba(139,92,246,0.25);border-radius:var(--radius-md);padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.sb-name{font-family:var(--font-display);font-size:0.84rem;font-weight:600;color:var(--text-primary);}
.sb-clid{font-family:var(--font-mono);font-size:0.6rem;color:var(--accent-purple);margin-top:3px;}
.sb-tag{font-family:var(--font-mono);font-size:0.55rem;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--accent-purple-dim);color:#B794F6;border:1px solid rgba(139,92,246,0.25);}
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-subtle);gap:10px;}
.doc-row:last-child{border-bottom:none;}
.doc-code{font-family:var(--font-mono);font-size:0.66rem;color:var(--text-primary);font-weight:500;}
.doc-meta{font-size:0.56rem;color:var(--text-muted);font-family:var(--font-mono);}
.doc-auth{font-family:var(--font-mono);font-size:0.55rem;color:var(--accent-cyan);background:var(--accent-cyan-dim);border:1px solid rgba(14,165,233,0.18);border-radius:5px;padding:2px 7px;white-space:nowrap;}
.dbc-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-subtle);}
.dbc-row:last-child{border-bottom:none;}
.docs-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:16px;}
@media(max-width:800px){.docs-grid{grid-template-columns:1fr;}}

/* ═══════ DRILL-DOWN DRAWER + DOC MODAL ═══════ */
.dd-overlay{position:fixed;inset:0;background:rgba(3,6,12,0.66);z-index:600;backdrop-filter:blur(2px);animation:ddFade 0.2s ease;}
@keyframes ddFade{from{opacity:0;}to{opacity:1;}}
.dd-drawer{position:fixed;top:0;right:0;bottom:0;width:620px;max-width:96vw;background:var(--bg-base);border-left:1px solid var(--border-strong);z-index:601;display:flex;flex-direction:column;animation:ddSlide 0.26s cubic-bezier(0.16,1,0.3,1);box-shadow:-24px 0 70px rgba(0,0,0,0.5);}
@keyframes ddSlide{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.dd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 22px 14px;border-bottom:1px solid var(--border-default);background:var(--bg-glass);backdrop-filter:blur(20px);}
.dd-head h2{font-family:var(--font-display);font-size:1.05rem;font-weight:700;color:var(--text-primary);line-height:1.25;}
.dd-head .dd-sub{font-family:var(--font-mono);font-size:0.62rem;color:var(--accent-cyan);margin-top:4px;}
.dd-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-secondary);font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.dd-close:hover{border-color:var(--border-accent);color:var(--text-accent);}
.dd-body{flex:1;overflow-y:auto;padding:18px 22px 44px;display:flex;flex-direction:column;gap:18px;}
.dd-sec{display:flex;flex-direction:column;gap:10px;}
.dd-sec-title{font-family:var(--font-display);font-size:0.62rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;border-bottom:1px solid var(--border-subtle);padding-bottom:6px;}
.dd-kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.dd-kv .k{font-size:0.53rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:2px;}
.dd-kv .v{font-size:0.76rem;color:var(--text-primary);font-weight:500;word-break:break-word;}
.dd-kv .v.mono{font-family:var(--font-mono);font-size:0.72rem;}
.dd-badges{display:flex;flex-wrap:wrap;gap:6px;}
.ladder{display:flex;flex-direction:column;}
.ladder-step{display:flex;align-items:center;gap:12px;padding:6px 0;}
.ladder-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border-strong);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-mono);font-size:0.55rem;font-weight:600;color:var(--text-muted);}
.ladder-step.done .ladder-dot{border-color:var(--accent-green);background:var(--accent-green-dim);color:var(--accent-green);}
.ladder-step.current .ladder-dot{border-color:var(--accent-cyan);background:var(--accent-cyan);color:#021018;box-shadow:0 0 0 4px var(--accent-cyan-dim);}
.ladder-label{font-size:0.74rem;color:var(--text-secondary);}
.ladder-step.current .ladder-label{color:var(--text-primary);font-weight:600;}
.ladder-step.future .ladder-label{color:var(--text-muted);}
.dd-counts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dd-count{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:8px 10px;}
.dd-count .n{font-family:var(--font-mono);font-size:1rem;font-weight:600;color:var(--text-primary);}
.dd-count .l{font-size:0.52rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-top:1px;}
.dd-phase-group{margin-bottom:4px;}
.dd-phase-label{font-family:var(--font-mono);font-size:0.58rem;font-weight:600;color:var(--accent-cyan);text-transform:uppercase;letter-spacing:0.06em;margin:8px 0 5px;}
.dd-doc{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:7px;}
.dd-doc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.dd-doc-name{font-size:0.74rem;color:var(--text-primary);font-weight:500;line-height:1.35;}
.dd-doc-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;align-items:center;}
.dchip{font-family:var(--font-mono);font-size:0.54rem;font-weight:600;padding:2px 7px;border-radius:5px;border:1px solid var(--border-default);background:var(--bg-base);color:var(--text-secondary);white-space:nowrap;}
.dchip.rel{background:var(--accent-cyan-dim);color:var(--accent-cyan);border-color:rgba(14,165,233,0.2);}
.dchip.req{background:var(--accent-purple-dim);color:#B794F6;border-color:rgba(139,92,246,0.2);}
.dchip.block{background:var(--accent-red-dim);color:var(--accent-red);border-color:rgba(239,68,68,0.25);}
.dchip.ok{background:var(--accent-green-dim);color:var(--accent-green);border-color:rgba(16,185,129,0.2);}
.dchip.wait{background:rgba(122,139,168,0.1);color:var(--text-secondary);border-color:var(--border-default);}
.dd-view-btn{font-family:var(--font-body);font-size:0.62rem;font-weight:600;padding:4px 11px;border-radius:6px;border:1px solid var(--border-accent);background:var(--accent-cyan-dim);color:var(--accent-cyan);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.dd-view-btn:hover{background:rgba(14,165,233,0.22);}
.dd-list-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-subtle);font-size:0.7rem;}
.dd-list-row:last-child{border-bottom:none;}
.dd-muted{color:var(--text-muted);font-size:0.72rem;}
.dd-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:70px 0;}
.dd-contact{padding:9px 0;border-bottom:1px solid var(--border-subtle);}
.dd-contact:last-child{border-bottom:none;}
.dd-contact-line{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.dd-contact-name{font-size:0.76rem;font-weight:600;color:var(--text-primary);}
.dd-contact-role{font-size:0.66rem;color:var(--text-secondary);}
.dd-contact-email{margin-top:4px;font-family:var(--font-mono);font-size:0.68rem;}

// ─── COHORT ORIGINATION — BRIEF CEO-DASH-IA-001 §2A ───
// Cohort leagues merged into Deal Rooms as the origination layer (DD-1). Selecting a
// cohort surfaces two Director-gated actions:
//   Action 1 — Research this cohort (Eileen + live RAG) → dated dossier in research_finding_register
//   Action 2 — Create a bespoke deal room (CBI-001 instantiation + pricing-quote "best offering")
// Both action BACK-ENDS are intentionally NOT wired here: research_finding_register has no
// authenticated INSERT (dossier capture needs the research-finding-ingest service-role EF), and
// the cohort→room create path / pricing-quote are not exposed to this surface. Per brief §6.3
// these are presented as staged, never-auto-fired actions pending the follow-on build brief —
// the UX is built; the logic is NOT fabricated.
function cohortStatus(f){
  const total=Number(f.entity_count_total||0), active=Number(f.entity_count_active||0);
  if(total===0) return {cls:'wait',label:'awaiting'};
  if(active>0) return {cls:'rel',label:'active'};
  return {cls:'',label:'populated'};
}

// BRIEF §2.B — identity portion of a research / originate request body. Register entities pass
// entity_id + alin exactly as before (no change to the existing register path). Universe entities
// pass companies_house_number + selection_key + record_source:'universe' with ALIN left null
// (ALIN is minted at instantiation per CPL-002 §4.3.2).
function entityIdentityBody(entity){
  if(entity && entity.record_source==='universe'){
    return { entity_id:null, alin:entity.alin||null, companies_house_number:entity.companies_house_number||null, selection_key:entity.selection_key||null, record_source:'universe' };
  }
  return { entity_id:entity.id||null, alin:entity.alin };
}

// Director-confirm Create modal (Action 2). Calls ceo-cohort-instantiate, which orchestrates the
// verified Director-only instantiate_counterparty_from_cohort RPC (it surfaces the cohort-family
// packages + prices the envelope internally; the room is created at phase_0). The optional config
// (vector/tier/term/package) only drives the envelope — blanks defer it (BDR auto-prices). Never
// auto-fired: creation requires the explicit Confirm here. EF deploy is Path A (held per DD-W5);
// the call degrades gracefully (clear message) until deployed.
function CreateRoomModal({ entity, dossierFindingId, token, onClose }){
  useEffect(()=>{ const k=e=>{ if(e.key==='Escape') onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); },[]);
  const [vector,setVector]=useState('');
  const [tier,setTier]=useState('');
  const [term,setTerm]=useState(12);
  const [pkg,setPkg]=useState('');
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [err,setErr]=useState(null);
  async function create(){
    if(busy) return;
    setBusy(true); setErr(null);
    try{
      const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-cohort-instantiate`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify({...entityIdentityBody(entity),confirm:true,vector:vector||null,exclusivity_tier:tier||null,term_months:Number(term)||12,package_id:pkg||null,dossier_finding_id:dossierFindingId||null})});
      if(r.status===404){ setErr('Create service not deployed yet — ceo-cohort-instantiate is Path A (held per DD-W5; pending Chairman deploy).'); }
      else if(!r.ok){ const t=await r.text().catch(()=>''); setErr('Create failed ('+r.status+'). '+t.slice(0,200)); }
      else { const j=await r.json(); setRes(j); }
    }catch(e){ console.error('ceo-cohort-instantiate',e); setErr('Network error creating deal room.'); }
    setBusy(false);
  }
  const fld={padding:'7px 10px',background:'var(--bg-base)',border:'1px solid var(--border-default)',borderRadius:'var(--radius-sm)',color:'var(--text-primary)',fontSize:'0.72rem',fontFamily:'var(--font-body)',outline:'none',width:'100%'};
  const lbl={fontSize:'0.56rem',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3};

      <div className="dm-modal" onClick={e=>e.stopPropagation()} style={{width:660}}>

          <div><div className="dm-title">Create deal room — {entity.company_name||entity.alin}</div><div className="dm-cap">{entity.cohort_family||''} · Director-gated origination (CBI-001 / AMD-147)</div></div>
          <button className="dd-btn" onClick={onClose}>Close</button>

          {!res ? (
            <div>
              <div style={{fontSize:'0.7rem',color:'var(--text-secondary)',lineHeight:1.55,marginBottom:14}}>

              </div>
              <div style={{fontSize:'0.62rem',color:'var(--text-muted)',marginBottom:10}}>Pricing config (optional — drives the envelope; family BDR auto-prices from size band; leave blank to defer):</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                <div><div style={lbl}>Vector</div><select style={fld} value={vector} onChange={e=>setVector(e.target.value)}><option value="">— (defer)</option><option>A</option><option>B</option><option>C</option></select></div>
                <div><div style={lbl}>Exclusivity tier</div><select style={fld} value={tier} onChange={e=>setTier(e.target.value)}><option value="">— (defer)</option><option>T1</option><option>T2</option><option>T3</option><option>T4</option></select></div>
                <div><div style={lbl}>Term (months)</div><input style={fld} type="number" min="1" max="120" value={term} onChange={e=>setTerm(e.target.value)}/></div>
                <div><div style={lbl}>Flagship package id</div><input style={fld} value={pkg} onChange={e=>setPkg(e.target.value)} placeholder="optional — drives family-A envelope"/></div>
              </div>
              {err && <div className="dd-act-err" style={{marginBottom:10}}>{err}</div>}
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <button className="orig-btn live" onClick={create} disabled={busy} style={{marginTop:0}}>{busy?'Creating…':'Confirm — create deal room'}</button>
                <button className="dd-btn" onClick={onClose} disabled={busy}>Cancel</button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{fontFamily:'var(--font-display)',fontSize:'0.9rem',fontWeight:700,color:'var(--accent-green)',marginBottom:10}}>{res.outcome==='already_instantiated'?'Already instantiated':'Deal room created'}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
                <span className="meta-chip">CLID <b>{res.clid||'—'}</b></span>
                <span className="meta-chip">Short code <b>{res.counterparty_short_code||'—'}</b></span>
                {res.cohort_family&&<span className="meta-chip">Family <b>{res.cohort_family}</b></span>}
                {res.envelope&&res.envelope.ceiling_pence!=null&&<span className="meta-chip">Ceiling <b>{penceGBP(res.envelope.ceiling_pence)}</b></span>}
                {res.pilot_fee_pence!=null&&<span className="meta-chip">Pilot fee <b>{penceGBP(res.pilot_fee_pence)}</b></span>}
                <span className="meta-chip">Dossier <b>{res.dossier_attached?'attached':'—'}</b></span>
              </div>
              {Array.isArray(res.four_surfaced_packages)&&res.four_surfaced_packages.length>0 && <div style={{marginBottom:10}}><div style={lbl}>Surfaced packages</div><div className="pkg-row">{res.four_surfaced_packages.map((p,i)=><span key={i} className="pkg-chip">{p}</span>)}</div></div>}
              <div style={{fontSize:'0.62rem',color:'var(--text-muted)',lineHeight:1.5}}>{res.delivery_note||''}</div>
              {Array.isArray(res.warnings)&&res.warnings.length>0&&<div style={{marginTop:8,fontSize:'0.6rem',color:'var(--accent-red)'}}>{res.warnings.join(' · ')}</div>}
              <div style={{marginTop:14}}><button className="dd-btn primary" onClick={()=>window.location.reload()}>Done — reload deal rooms</button></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Per-entity origination actions. Action 1 (Research) -> ceo-cohort-research (FOLLOWON-001 §1);
// Action 2 (Create) -> ceo-cohort-instantiate via a Director-confirm modal (§2). Both EFs are
// Path A (research deploy now per DD-W1; create deploy held per DD-W5) and degrade gracefully
// (clear message) until deployed.
function EntityActions({ entity, token, existingRoomByAlin }){
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [err,setErr]=useState(null);
  const [open,setOpen]=useState(false);
  const [createOpen,setCreateOpen]=useState(false);
  // Origination guard (BRIEF DEALROOMS-ORIGINATION-GUARD-001 §2.2): if this league entity's ALIN
  // already maps to a live (non-simulation) deal room, offer "Open existing room ↗" instead of
  // "Create a bespoke deal room", which would instantiate a duplicate. Universe entities (null alin)
  // never match. existingRoomByAlin is undefined on the universe path — guarded here.
  const existingRoom = (existingRoomByAlin && entity && entity.alin) ? existingRoomByAlin[entity.alin] : null;
  async function research(){
    if(busy) return;
    setBusy(true); setErr(null);
    try{
      const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-cohort-research`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify(entityIdentityBody(entity))});
      if(r.status===404){ setErr('Research service not deployed yet — ceo-cohort-research is Path A (pending Chairman deploy).'); }
      else if(!r.ok){ const t=await r.text().catch(()=>''); setErr('Research failed ('+r.status+'). '+t.slice(0,160)); }
      else { const j=await r.json(); setRes(j); setOpen(true); }
    }catch(e){ console.error('ceo-cohort-research',e); setErr('Network error running research.'); }
    setBusy(false);
  }
  return (
    <div className="orig-actions" style={{marginTop:16}}>
      <div className="orig-act">
        <div className="orig-act-head"><span className="orig-act-n">1</span><span className="orig-act-t">Research {entity.company_name||entity.alin}</span>{res?<span className="orig-stage" style={{background:'var(--accent-green-dim)',color:'var(--accent-green)',borderColor:'rgba(16,185,129,0.25)'}}>dossier ready</span>:<span className="orig-stage">read-only</span>}</div>
        <div className="orig-act-d">Eileen + live RAG over the estate and live sources — counterparty potential &amp; fit, synergies, business prospects, forward-event / M&amp;A watch. Captured as a dated dossier (research_finding_register). Intelligence, not advice (PLUGIN-001 Art XIV §14.2).</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="orig-btn live" onClick={research} disabled={busy}>{busy?'Researching…':(res?'Re-run research':'Research entity →')}</button>
          {res && <button className="orig-btn live" onClick={()=>setOpen(true)}>View dossier →</button>}
        </div>
        {err && <div className="orig-note" style={{color:'var(--accent-red)'}}>{err}</div>}
      </div>
      <div className="orig-act">
        {existingRoom ? (
          <>
            <div className="orig-act-head"><span className="orig-act-n">2</span><span className="orig-act-t">Open existing room</span><span className="orig-stage" style={{background:'var(--accent-green-dim)',color:'var(--accent-green)',borderColor:'rgba(16,185,129,0.25)'}}>live room</span></div>
            <div className="orig-act-d">A live deal room already exists for this entity (<span style={{fontFamily:'var(--font-mono)',color:'var(--accent-cyan)'}}>{existingRoom.clid}</span>). Open its workspace instead of instantiating a duplicate.</div>
            <a className="orig-btn live" href={existingRoom.workspace_path} target="_blank" rel="noopener" style={{display:'inline-block',textDecoration:'none'}}>Open existing room →</a>
            <div className="orig-note">Origination guard — this register entity already maps to a live room; creation is suppressed to avoid a duplicate (DEALROOMS-ORIGINATION-GUARD-001 §2.2).</div>
          </>
        ) : (
          <>
            <div className="orig-act-head"><span className="orig-act-n">2</span><span className="orig-act-t">Create a bespoke deal room</span><span className="orig-stage gated">Director-gated</span></div>
            <div className="orig-act-d">CBI-001 instantiate (counterparty_profile + room at phase_0) — packages surfaced and the envelope priced internally; the Action&nbsp;1 dossier attaches as room context. Live data delivery stays gated (DDX-001 §5).</div>
            <button className="orig-btn live" onClick={()=>setCreateOpen(true)}>Create deal room →</button>
            <div className="orig-note">Consequential — opens a Director-confirm step; never auto-fired. {res?'A research dossier is ready and will be attached.':'Tip: run Action 1 first to attach a research dossier.'} EF deploy is Path A (held per DD-W5).</div>
          </>
        )}
      </div>
      {open && res && <ResearchModal entity={entity} res={res} onClose={()=>setOpen(false)}/>}
      {createOpen && <CreateRoomModal entity={entity} dossierFindingId={res&&res.dossier_finding_id} token={token} onClose={()=>setCreateOpen(false)}/>}
    </div>
  );
}

// BRIEF §2.B — search-first universe browser for aggregate-only families (a non-zero headline
// count but no materialised register rows, e.g. I — origination at 5,585). Calls
// ceo-portfolio-data?section=cohort_universe with this page's existing CEO bearer pattern; never
// auto-loads all rows. Selecting an entity routes into the same Action 1 / Action 2 flow
// (EntityActions) used for register entities. Degrades to an inert line if the endpoint is not
// yet deployed (§2.C).
function UniverseBrowser({ family, token }){
  const UNIV_LIMIT=50;
  const [term,setTerm]=useState('');
  const [query,setQuery]=useState('');           // term actually searched
  const [offset,setOffset]=useState(0);
  const [loading,setLoading]=useState(false);
  const [data,setData]=useState(null);
  const [err,setErr]=useState(null);
  const [pending,setPending]=useState(false);     // endpoint not deployed (§2.C)
  const [picked,setPicked]=useState(null);

  async function load(searchTerm, off){
    setLoading(true); setErr(null);
    try{
      const url=`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=cohort_universe&family=${encodeURIComponent(family)}&search=${encodeURIComponent(searchTerm||'')}&offset=${off||0}&limit=${UNIV_LIMIT}`;
      const r=await fetch(url,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
      if(r.status===400||r.status===404){ setPending(true); setData(null); setLoading(false); return; }
      if(!r.ok){ setErr('Universe lookup failed ('+r.status+').'); setData(null); setLoading(false); return; }
      const j=await r.json();
      const u=j.sections?.cohort_universe;
      if(!u || u.error==='Invalid section'){ setPending(true); setData(null); setLoading(false); return; }
      setData(u); setOffset(off||0);
    }catch(e){ console.error('cohort_universe',e); setErr('Network error loading universe browser.'); }
    setLoading(false);
  }
  useEffect(()=>{ setPicked(null); load('',0); },[family]);   // first open: page 1, no search term

  function doSearch(){ setQuery(term); setPicked(null); load(term,0); }

  if(pending){
    return <div className="empty-note" style={{textAlign:'left'}}>Universe browser pending backend deploy (cohort_universe).</div>;
  }

  const entities=Array.isArray(data?.entities)?data.entities:[];
  const total=data?.total;
  const hasMore=data?.has_more===true || (total!=null && (offset+entities.length)<Number(total));

  return (
    <div style={{marginTop:6}}>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        <input className="dd-select" style={{flex:1,minWidth:220,maxWidth:'none'}} placeholder="Search company name or number" value={term}
          onChange={e=>setTerm(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') doSearch(); }}/>
        <button className="orig-btn live" style={{marginTop:0}} onClick={doSearch} disabled={loading}>{loading?'Searching…':'Search'}</button>
      </div>
      {err && <div className="dd-act-err" style={{marginBottom:8}}>{err}</div>}
      {total!=null && <div style={{fontSize:'0.6rem',color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:8}}>{num(total)} companies{query?(' · "'+query+'"'):''}</div>}
      {loading && entities.length===0 ? <div className="empty-note">Loading universe…</div> : (
        entities.length>0 ? (
          <div className="lg-table-wrap">
            <table className="ent-table">
              <thead><tr><th>Company</th><th>CH number</th><th>Size</th><th></th></tr></thead>
              <tbody>
                {entities.map((ent,i)=>{
                  const chNum=ent.companies_house_number||ent.company_number||ent.ch_number||null;
                  const selKey=ent.alin||chNum;
                  const isSel=picked && picked.selection_key===selKey;
                  return (
                    <tr key={selKey||i} className={'ent-row'+(isSel?' sel':'')} style={{cursor:'pointer'}} title="Select for origination"
                      onClick={()=>setPicked(isSel?null:{ company_name:ent.company_name, companies_house_number:chNum, alin:ent.alin||null, selection_key:selKey, record_source:'universe', cohort_family:family, size_band:ent.size_band })}>
                      <td><div className="ent-name">{ent.company_name||'—'}</div></td>
                      <td className="mono" style={{color:'var(--text-secondary)'}}>{chNum||'—'}</td>
                      <td>{friendly(ent.size_band)}</td>
                      <td><span className="alloc-pill rel"><span className="dot2"/>active · universe</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        ) : <div className="empty-note">No companies match this search.</div>
      )}
      {(offset>0 || hasMore) && (
        <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center'}}>
          <button className="orig-btn" style={{marginTop:0}} disabled={loading||offset<=0} onClick={()=>{ setPicked(null); load(query,Math.max(0,offset-UNIV_LIMIT)); }}>← Prev</button>
          <button className="orig-btn" style={{marginTop:0}} disabled={loading||!hasMore} onClick={()=>{ setPicked(null); load(query,offset+UNIV_LIMIT); }}>Next →</button>
          {entities.length>0 && <span style={{fontSize:'0.58rem',color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>showing {offset+1}–{offset+entities.length}</span>}
        </div>
      )}
      {picked && <EntityActions key={picked.selection_key} entity={picked} token={token}/>}
    </div>
  );
}

function CohortOrigination({ token, existingRoomByAlin }){
  const [cohort,setCohort]=useState(null);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState(null);
  const [selected,setSelected]=useState(null);
  const [selEntityAlin,setSelEntityAlin]=useState(null);
  useEffect(()=>{ setSelEntityAlin(null); },[selected]);
  useEffect(()=>{ if(!token) return; (async()=>{
    setLoading(true); setErr(null);
    try{
      const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=cohort_leagues`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
      if(r.ok){const j=await r.json();setCohort(j.sections?.cohort_leagues||{});}
      else setErr('Unable to load cohort leagues ('+r.status+').');
    }catch(e){console.error('cohort_leagues',e);setErr('Network error loading cohort leagues.');}
    setLoading(false);
  })(); },[token]);

  const d=cohort||{};
  const summary=d.summary||{};

          <div className="card-head-title">Cohort League Tables</div>
          <div className="card-head-badge">{num(summary.family_count!=null?summary.family_count:families.length)} families · {num(summary.entities_total!=null?summary.entities_total:entities.length)} entities</div>
        </div>

          <div style={{fontSize:'0.66rem',color:'var(--text-secondary)',lineHeight:1.5,marginBottom:12}}>

                        <td><div className="fam-name">{f.cohort_family}</div><div className="fam-sub">{num(f.entity_count_total)} entities</div></td>
                        <td><div className="cluster">
                          <div className="ct"><b style={{color:'var(--text-primary)'}}>{num(f.entity_count_total)}</b><small>total</small></div>
                          <div className="ct"><b style={{color:'var(--accent-green)'}}>{num(f.entity_count_active)}</b><small>active</small></div>
