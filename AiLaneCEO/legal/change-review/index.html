      n.appendChild(typeof c==='string'?document.createTextNode(c):c);}
    return n;
  }
  function shortDate(d){if(!d)return'';var x=new Date(d);return isNaN(x.getTime())?String(d):x.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
  function countWords(s){var m=String(s||'').trim().match(/\S+/g);return m?m.length:0;}
  function safeUrl(u){return (typeof u==='string'&&/^https?:\/\//i.test(u))?u:null;}
  function authHeaders(){return {'Authorization':'Bearer '+AUTH_TOKEN,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'};}

  // ── Auth guard (RULE 26 — AiLaneCEO = mark@ailane.ai only; silent redirect to / on failure) ──
  (function guard(){
    sb.auth.getSession().then(function(res){
      var session=res&&res.data&&res.data.session;
      if(session){
        try{var p=JSON.parse(atob(session.access_token.split('.')[1]));if(p.email===CEO_EMAIL){onAuthed(session.access_token);return;}}catch(e){}
      }
      var t=setTimeout(function(){window.location.href='/';},6000);
      sb.auth.onAuthStateChange(function(ev,sess){
        if(sess){
          clearTimeout(t);
          try{var p=JSON.parse(atob(sess.access_token.split('.')[1]));if(p.email===CEO_EMAIL){onAuthed(sess.access_token);return;}}catch(e){}
          window.location.href='/';
        }
      });
    }).catch(function(){window.location.href='/';});
  })();

  function onAuthed(token){
    AUTH_TOKEN=token;
    renderShell();
    document.body.style.visibility='visible';
    loadAll();
  }

    // Standing note (verbatim) + intelligence-not-advice framing
    main.appendChild(el('div',{class:'standing-note'},

      el('div',{class:'sub'},'Intelligence for your decision — not legal advice.')
    ));

    // ── Lane B — Legal Pages pending review (rendered first; the Director's priority queue) ──
    var laneB=el('div',{id:'sec-laneB',class:'lane-section',style:'display:flex;flex-direction:column;gap:12px;'});
    laneB.appendChild(el('div',{class:'lane-head'},el('div',{class:'t'},'Legal Pages — pending review'),el('div',{class:'rule'})));
    laneB.appendChild(el('div',{class:'lane-note'},'Accept & update ratifies the page’s current live text and re-gates accepted clients. If the page text itself needs editing first (e.g. a new statutory clause), edit the live page before accepting. Mark reviewed clears the item without changing the page. Convene Legal Council escalates this page to a full AI Legal Council review in the Forward-law lane, where you ratify or override the opinion.'));
    laneB.appendChild(el('div',{class:'lane-queue',id:'laneB-queue'},el('div',{class:'empty-state',id:'laneB-status'},'Loading the legal-page review feed…')));
    main.appendChild(laneB);

    // ── Lane A — Forward law (RSG director feed; ported verbatim) ──
    var laneA=el('div',{id:'sec-laneA',class:'lane-section',style:'display:flex;flex-direction:column;gap:12px;'});
    laneA.appendChild(el('div',{class:'lane-head'},el('div',{class:'t'},'Forward law — estate offering'),el('div',{class:'rule'})));
    laneA.appendChild(el('div',{class:'section-label',id:'laneA-label'},'Changes awaiting your review'));
    laneA.appendChild(el('div',{class:'lane-queue',id:'laneA-queue'},el('div',{class:'empty-state',id:'laneA-status'},'Loading the review queue…')));
    main.appendChild(laneA);

    // ── History (collapsible, ratified & resolved) ──
    var hist=el('details',{id:'sec-history',class:'collapse'},
      el('summary',{},'History — ratified & resolved',el('span',{class:'ts'},'')),
      el('div',{class:'collapse-body',id:'history-body'},el('div',{class:'empty-state',id:'history-status'},'Loading history…'))
    );

  function makeFilterBtn(key,label,active){
    return el('button',{class:'filter-btn'+(active?' active':''),type:'button','data-filter':key,onclick:function(){applyFilter(key);}},label);
  }
  function applyFilter(key){
    var btns=document.querySelectorAll('.filter-btn');
    for(var i=0;i<btns.length;i++){btns[i].classList.toggle('active',btns[i].getAttribute('data-filter')===key);}
    var map={laneA:'sec-laneA',laneB:'sec-laneB',history:'sec-history'};
    for(var k in map){if(!map.hasOwnProperty(k))continue;var s=document.getElementById(map[k]);if(!s)continue;
      s.style.display=(key==='all'||key===k)?'':'none';}
  }
  function scrollToLane(key){
    applyFilter('all');
    var map={laneA:'sec-laneA',laneB:'sec-laneB',history:'sec-history'};
    var s=document.getElementById(map[key]);
    if(s){if(s.tagName==='DETAILS')s.open=true;s.scrollIntoView({behavior:'smooth',block:'start'});}
  }

  // ── Summary chip state ──
  function setChip(textId,dotId,text,rag){
    var t=document.getElementById(textId);if(t)t.textContent=text;
    var d=document.getElementById(dotId);if(d)d.className='rag-dot'+(rag?' '+rag:'');
  }
  function updateSummary(){
    // Legal pages — red if any pending, green if zero, neutral if unknown
    if(COUNTS.legal==null)setChip('chip-legal-text','rag-legal','Legal pages — — pending','');
    else setChip('chip-legal-text','rag-legal','Legal pages — '+COUNTS.legal+' pending',COUNTS.legal>0?'red':'green');
    // Forward law — amber if any pending, green if zero, neutral if unknown
    if(COUNTS.forward==null)setChip('chip-forward-text','rag-forward','Forward law — — pending','');
    else setChip('chip-forward-text','rag-forward','Forward law — '+COUNTS.forward+' pending',COUNTS.forward>0?'amber':'green');
    // History — resolved count, green/neutral
    if(COUNTS.history==null)setChip('chip-history-text','rag-history','History — — resolved','');
    else setChip('chip-history-text','rag-history','History — '+COUNTS.history+' resolved','green');
  }

  // ── Orchestrator: re-run all three loads (no auto-poll) ──
  function loadAll(){loadLaneA();loadLaneB();loadHistory();}

  /* ============================================================
     LANE A — Forward law (ported verbatim from legal-compliance)
     rsg-director-feed → buildCardA → rsg-director-action
     ============================================================ */
  function loadLaneA(){
    var s=document.getElementById('laneA-status');
    if(s)s.textContent='Loading the review queue…';
    fetch(FUNCTIONS_URL+'/rsg-director-feed',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){renderQueueA((j&&j.items)||[]);})
      .catch(function(){
        var st=document.getElementById('laneA-status');
        if(st)st.textContent="Couldn't load the review queue. Please refresh.";
        COUNTS.forward=null;updateSummary();
      });
  }

  function renderQueueA(items){
    var queue=document.getElementById('laneA-queue');
    var label=document.getElementById('laneA-label');
    if(!queue)return;
    queue.textContent='';
    COUNTS.forward=items?items.length:0;updateSummary();
    if(!items||items.length===0){
      if(label)label.textContent='Changes awaiting your review';
      queue.appendChild(el('div',{class:'empty-state'},'No changes awaiting your review.'));
      return;
    }
    if(label)label.textContent=items.length+(items.length===1?' change':' changes')+' awaiting your review';
    items.forEach(function(item){queue.appendChild(buildCardA(item));});
  }

  function buildCardA(item){
    var kl=item.kl_legislative_horizon||{};
    var title=kl.legislation_short_name||kl.legislation_title||item.instrument_ref||'(untitled change)';

    var card=el('div',{class:'card review-card'});
    var body=el('div',{class:'card-body'});

    body.appendChild(el('div',{class:'leg-title'},title));

    var chips=el('div',{class:'chip-row'});
    var mat=item.materiality;
    if(mat==='material_client')chips.appendChild(el('span',{class:'mat-chip material'},'Material — client-affecting'));
    else if(mat==='minor_non_client')chips.appendChild(el('span',{class:'mat-chip minor'},'Minor — not client-affecting'));
    else if(mat==='pending')chips.appendChild(el('span',{class:'mat-chip pending'},'Materiality pending'));
    else if(mat)chips.appendChild(el('span',{class:'mat-chip pending'},String(mat).replace(/_/g,' ')));
    if(item.council_required===true)chips.appendChild(el('span',{class:'council-marker'},'Council review'));
    if(chips.childNodes.length)body.appendChild(chips);

    var alertStage=item.director_firm_alerted_at?'Firm alert — commencement known':(item.director_alerted_at?'Provisional alert':null);
    var meta=el('div',{class:'leg-meta'});
    if(item.status)meta.appendChild(el('span',{class:'leg-tag'},String(item.status).replace(/_/g,' ')));
    if(alertStage)meta.appendChild(el('span',{class:'leg-tag'},alertStage));
    if(kl.parliament_stage)meta.appendChild(el('span',{class:'leg-tag'},String(kl.parliament_stage)));
    if(item.commencement_date)meta.appendChild(el('span',{class:'leg-tag'},'Commences '+shortDate(item.commencement_date)));
    if(item.jurisdiction)meta.appendChild(el('span',{class:'leg-tag'},String(item.jurisdiction)));
    if(meta.childNodes.length)body.appendChild(meta);

    if(kl.headline_summary)body.appendChild(el('div',{class:'leg-summary'},kl.headline_summary));

    var src=safeUrl(kl.source_url);
    if(src)body.appendChild(el('a',{class:'source-link',href:src,target:'_blank',rel:'noopener'},'Source ↗'));

    if(kl.disclaimer_text)body.appendChild(el('div',{class:'disclaimer-foot'},kl.disclaimer_text));

    // ── Inline status/error message (shared across this card's controls) ──
    var msg=el('div',{class:'inline-msg'});
    function setMsg(kind,text){msg.className='inline-msg'+(kind?' '+kind:'');msg.textContent=text||'';}

    // ── Shared POST to rsg-director-action (the live ordered state machine, AM-002/AMD-238) ──
    // On HTTP-ok: replace the card with a resolved state showing the returned status.
    // On non-2xx: surface the structured `error` string inline (bad_state, council_posture_required,
    //   review_note_too_short, bad_request, …) and re-enable controls so the Director can retry.
    function postAction(payload,reenable){
      setMsg('','Recording your decision…');
      fetch(FUNCTIONS_URL+'/rsg-director-action',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify(payload)
      }).then(function(r){
        return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});
      }).then(function(res){
        if(res.ok){resolveCard(card,res.body&&res.body.status,statusMessageA(res.body&&res.body.status));}
        else{
          if(reenable)reenable();
          var errText=(res.body&&res.body.error)
            ? 'Action declined: '+String(res.body.error)
            : ("Couldn't record that decision ("+res.status+"). Please try again.");
          setMsg('err',errText);
        }
      }).catch(function(){
        if(reenable)reenable();
        setMsg('err','Network error — your decision was not recorded. Please try again.');
      });
    }

    // ── Review-note block (textarea + live counter). The ≥150-word gate applies ONLY to the
    //    submit_review_note actions (Accept / Reject) — never to convene/record-posture/approve. ──
    function buildNoteBlock(placeholder){
      var note=el('textarea',{class:'review-note',placeholder:placeholder||'Record your review note (minimum 150 words) before deciding…','aria-label':'Review note'});
      var counter=el('div',{class:'word-counter'},'0 / 150 words');
      var block={note:note,counter:counter,onGate:null};
      block.words=function(){return countWords(note.value);};
      block.refresh=function(){
        var n=block.words();
        counter.textContent=n+' / 150 words';
        counter.className='word-counter'+(n>=150?' met':'');
        if(block.onGate)block.onGate(n>=150);
      };
      note.addEventListener('input',block.refresh);
      return block;
    }

    var status=String(item.status||'');
    var preCouncil=(status==='detected'||status==='provisional_alert'||status==='director_review');

    if(preCouncil){
      // Convene Legal Council — ALWAYS enabled, NO word gate → convene_council
      var pcConvene=el('button',{class:'dbtn council',type:'button'},'Convene Legal Council');
      body.appendChild(el('div',{class:'btn-row'},pcConvene));

      // Review note + Reject (≥150 words) → submit_review_note / decision:'reject'. (No Accept here —
      // the backend forbids accept before council returns.)
      var pcNb=buildNoteBlock('Record your review note (minimum 150 words) to reject this change…');
      body.appendChild(pcNb.note);
      body.appendChild(pcNb.counter);
      var pcReject=el('button',{class:'dbtn reject',type:'button',disabled:'disabled'},'Reject');
      body.appendChild(el('div',{class:'btn-row'},pcReject));
      pcNb.onGate=function(met){pcReject.disabled=!met;};

      var pcLock=function(){pcConvene.disabled=true;pcReject.disabled=true;pcNb.note.disabled=true;};
      var pcUnlock=function(){pcConvene.disabled=false;pcNb.note.disabled=false;pcNb.refresh();};
      pcConvene.addEventListener('click',function(){
        pcLock();
        postAction({adaptation_id:item.id,action:'convene_council'},pcUnlock);
      });
      pcReject.addEventListener('click',function(){
        if(pcNb.words()<150)return;
        pcLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'reject',review_note:pcNb.note.value},pcUnlock);
      });
      body.appendChild(msg);
    }
    else if(status==='council_requested'){
      body.appendChild(el('div',{class:'muted-note'},'Council convened. Review the council opinion and proposed version below, then ratify or override the opinion — or reject this change.'));

      // The old posture mini-form (finding selector + summary) is superseded by the ratify/override control in the
      // Adaptation detail panel below (openAdaptationDetail / renderDetail → record_council_posture
      // with decision/ref). The ≥150-word reject path is retained, unchanged.
      body.appendChild(el('div',{class:'section-label'},'Reject this change'));
      var crNb=buildNoteBlock('Record your review note (minimum 150 words) to reject this change…');
      body.appendChild(crNb.note);
      body.appendChild(crNb.counter);
      var crReject=el('button',{class:'dbtn reject',type:'button',disabled:'disabled'},'Reject');
      body.appendChild(el('div',{class:'btn-row'},crReject));
      crNb.onGate=function(met){crReject.disabled=!met;};

      var crLock=function(){crReject.disabled=true;crNb.note.disabled=true;};
      var crUnlock=function(){crNb.note.disabled=false;crNb.refresh();};
      crReject.addEventListener('click',function(){
        if(crNb.words()<150)return;
        crLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'reject',review_note:crNb.note.value},crUnlock);
      });
      body.appendChild(msg);
    }
    else if(status==='council_returned'){
      body.appendChild(el('div',{class:'muted-note'},'Council posture returned — record your review note (minimum 150 words), then accept to stage for commencement, or reject.'));
      var rtNb=buildNoteBlock('Record your review note (minimum 150 words) before deciding…');
      body.appendChild(rtNb.note);
      body.appendChild(rtNb.counter);
      var rtAccept=el('button',{class:'dbtn accept',type:'button',disabled:'disabled'},'Accept (stage for commencement)');
      var rtReject=el('button',{class:'dbtn reject',type:'button',disabled:'disabled'},'Reject');
      body.appendChild(el('div',{class:'btn-row'},rtAccept,rtReject));
      rtNb.onGate=function(met){rtAccept.disabled=!met;rtReject.disabled=!met;};

      var rtLock=function(){rtAccept.disabled=true;rtReject.disabled=true;rtNb.note.disabled=true;};
      var rtUnlock=function(){rtNb.note.disabled=false;rtNb.refresh();};
      rtAccept.addEventListener('click',function(){
        if(rtNb.words()<150)return;
        rtLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'accept',review_note:rtNb.note.value},rtUnlock);
      });
      rtReject.addEventListener('click',function(){
        if(rtNb.words()<150)return;
        rtLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'reject',review_note:rtNb.note.value},rtUnlock);
      });
      body.appendChild(msg);
    }
    else if(status==='drafted'){
      body.appendChild(el('div',{class:'muted-note'},'Documents drafted — approve to stage for commencement.'));
      var apBtn=el('button',{class:'dbtn accept',type:'button'},'Approve documents');
      body.appendChild(el('div',{class:'btn-row'},apBtn));
      apBtn.addEventListener('click',function(){
        apBtn.disabled=true;
        postAction({adaptation_id:item.id,action:'approve_documents'},function(){apBtn.disabled=false;});
      });
      body.appendChild(msg);
    }
    else{
      // accepted / approved_staged / withdrawn / in_force / any other — resolved, no controls.
      card.className='card review-card resolved';
      body.appendChild(el('div',{class:'resolved-note'},el('span',{},'✓'),statusMessageA(status)));
    }

    // ── Adaptation detail — council opinion + proposed version + ratify/override (RSG-SURFACE-RENDER-CEO-001) ──
    // Opens the rsg-adaptation-detail surface for this item. Auto-opens for council_requested /
    // council_returned (the ratify/override + recorded-decision states); on-demand button elsewhere.
    var detailHost=el('div',{class:'rsg-detail-host'});
    var detailOpenBtn=el('button',{class:'dbtn',type:'button'},
      status==='council_requested'?'Review council opinion & proposed version'
        :'View council opinion & proposed version');
    detailOpenBtn.addEventListener('click',function(){detailOpenBtn.style.display='none';openAdaptationDetail(item,detailHost);});
    body.appendChild(el('div',{class:'rsg-detail-sep'}));
    body.appendChild(el('div',{class:'btn-row'},detailOpenBtn));
    body.appendChild(detailHost);
    if(status==='council_requested'||status==='council_returned'){detailOpenBtn.style.display='none';openAdaptationDetail(item,detailHost);}

    card.appendChild(body);
    return card;
  }

  function statusMessageA(status){
    var byStatus={
      detected:'Detected — awaiting your review.',
      provisional_alert:'Provisional alert — awaiting your review.',
      director_review:'Director review — awaiting your decision.',
      council_requested:'Council convened — awaiting council posture.',
      council_returned:'Council posture recorded — awaiting your review.',
      accepted:'Accepted — documents will be drafted.',
      drafted:'Drafted — ready for document approval.',
      approved_staged:'Approved — staged for commencement.',
      withdrawn:'Withdrawn.',
      in_force:'In force.'
    };
    if(status&&byStatus[status])return byStatus[status];
    return 'Decision recorded'+(status?' ('+String(status).replace(/_/g,' ')+')':'')+'.';
  }

  /* ============================================================
     ADAPTATION DETAIL — council opinion + proposed version + ratify/override
     (RSG-SURFACE-RENDER-CEO-001)
     rsg-adaptation-detail (GET) → renderDetail → rsg-director-action (POST)
     Intelligence for the Director's decision — not legal advice.
     ============================================================ */

  // Finding / per-surface posture vocabulary → labelled badge + plain label.
  function findingBadge(v){
    var map={aligned:{t:'Aligned',c:'green'},needs_change:{t:'Needs change',c:'amber'},material_concern:{t:'Material concern',c:'red'}};
    var d=map[v]||{t:String(v||'—').replace(/_/g,' '),c:'neutral'};
    return el('span',{class:'rsg-badge '+d.c},d.t);
  }
  // Recommended-change resolution → human-readable line (§2.4).
  function resolutionText(rc){
    if(rc.resolution==='bulk')return 'Bulk change across cohort '+(rc.bulk_cohort_key||'—');
    if(rc.resolution==='individual')return 'Individual change + re-acceptance for '+(rc.counterparty_short_code||'—');
    return 'Single-document update';
  }
  // Known non-200 responses from rsg-director-action → friendly inline message (never crash).
  function ratifyErrorText(httpStatus,body){
    var e=body&&body.error;
    if(e==='council_opinion_not_ready')return 'The council opinion is not ready yet — please refresh and try again.';
    if(e==='bad_state')return 'This item is not in a state that accepts a council decision'+(body&&body.detail?(' ('+String(body.detail)+')'):'')+'.';
    if(e==='ref_required')return 'A reference of at least '+((body&&body.min_length)||6)+' characters is required.';
    if(e==='final_finding_required')return 'Select a final finding before overriding.';
    if(e==='not_authorised')return 'You are not authorised to record this decision.';
    if(e)return String(e);
    return "Couldn't record that decision ("+httpStatus+"). Please try again.";
  }
  function detailRefreshBtn(item,host,label){
    var b=el('button',{class:'refresh-btn',type:'button'},label||'↻ Refresh');
    b.addEventListener('click',function(){openAdaptationDetail(item,host);});
    return b;
  }

  // GET rsg-adaptation-detail for `item` and render into `host`. Re-callable (refresh / post-decision).
  function openAdaptationDetail(item,host){
    host.textContent='';
    host.appendChild(el('div',{class:'rsg-detail-loading'},'Loading council opinion & proposed version…'));
    fetch(FUNCTIONS_URL+'/rsg-adaptation-detail?adaptation_id='+encodeURIComponent(item.id),{headers:authHeaders()})
      .then(function(r){return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});})
      .then(function(res){
        host.textContent='';
        if(!res.ok){
          var errText=(res.body&&res.body.error)?String(res.body.error):("Couldn't load the council opinion ("+res.status+").");
          host.appendChild(el('div',{class:'inline-msg err'},errText));
          host.appendChild(el('div',{class:'btn-row'},detailRefreshBtn(item,host)));
          return;
        }
        renderDetail(host,item,res.body||{});
      })
      .catch(function(){
        host.textContent='';
        host.appendChild(el('div',{class:'inline-msg err'},'Network error — could not load the council opinion. Please refresh.'));
        host.appendChild(el('div',{class:'btn-row'},detailRefreshBtn(item,host)));
      });
  }

  function renderDetail(host,item,data){
    var adaptation=data.adaptation||{};
    var instrument=data.instrument||{};
    var opinion=data.council_opinion||null;
    var changes=Array.isArray(data.recommended_changes)?data.recommended_changes:[];
    var notes=Array.isArray(data.review_notes)?data.review_notes:[];
    var counts=data.counts||{};
    var status=String(adaptation.status||item.status||'');
    var opinionReady=counts.opinion_ready===true;
    var ratified=!!(opinion&&opinion.director_ratified===true);

    var panel=el('div',{class:'rsg-detail'});

    // Intelligence-not-advice framing (RULE 15 / §5).
    panel.appendChild(el('div',{class:'rsg-detail-disclaimer'},'Regulatory intelligence for the Director’s decision — not legal advice.'));

    // ── Instrument block (§2.2) ──
    var ib=el('div',{class:'rsg-block'});
    ib.appendChild(el('div',{class:'section-label'},'Instrument'));
    ib.appendChild(el('div',{class:'rsg-inst-title'},instrument.legislation_short_name||adaptation.instrument_ref||item.instrument_ref||'(instrument)'));
    var im=el('div',{class:'leg-meta'});
    if(instrument.parliament_stage)im.appendChild(el('span',{class:'leg-tag'},String(instrument.parliament_stage)));
    var enact=instrument.expected_enactment||adaptation.commencement_date;
    if(enact)im.appendChild(el('span',{class:'leg-tag'},'Expected '+shortDate(enact)));
    if(adaptation.staged_effective_date)im.appendChild(el('span',{class:'leg-tag'},'Staged '+shortDate(adaptation.staged_effective_date)));
    if(im.childNodes.length)ib.appendChild(im);
    if(instrument.headline_summary)ib.appendChild(el('div',{class:'leg-summary'},instrument.headline_summary));
    var src=safeUrl(instrument.source_url);
    if(src)ib.appendChild(el('a',{class:'source-link',href:src,target:'_blank',rel:'noopener'},'Source ↗'));
    if(instrument.disclaimer_text)ib.appendChild(el('div',{class:'disclaimer-foot'},instrument.disclaimer_text));
    panel.appendChild(ib);

    // ── AI Legal Council opinion block (§2.3 + §3 state rules) ──
    var ob=el('div',{class:'rsg-block'});
    ob.appendChild(el('div',{class:'section-label'},'AI Legal Council opinion'));
    if(!opinionReady){
      // council_requested + not ready (or null opinion) → generating; any other status → none on file.
      if(status==='council_requested'){
        ob.appendChild(el('div',{class:'muted-note'},'Council opinion is being generated — refresh shortly.'));
        ob.appendChild(el('div',{class:'btn-row'},detailRefreshBtn(item,host)));
      }else{
        ob.appendChild(el('div',{class:'muted-note'},'No council opinion recorded for this item.'));
      }
    }else{
      var fr=el('div',{class:'rsg-finding-row'});
      fr.appendChild(el('span',{class:'rsg-finding-lead'},'Finding'));
      fr.appendChild(findingBadge(opinion.finding));
      ob.appendChild(fr);
      if(opinion.reasoning)ob.appendChild(el('div',{class:'leg-summary'},opinion.reasoning));
      if(opinion.generation_method==='structured_fallback')
        ob.appendChild(el('div',{class:'muted-note'},'Generated by the deterministic fallback (advanced model unavailable at generation time).'));
      var psp=Array.isArray(opinion.per_surface_posture)?opinion.per_surface_posture:[];
      if(psp.length){
        ob.appendChild(el('div',{class:'section-label'},'Per-surface posture'));
        psp.forEach(function(ps){
          var row=el('div',{class:'rsg-surface-row'});
          var head=el('div',{class:'rsg-surface-head'});
          head.appendChild(el('span',{class:'rsg-surface-ref'},String(ps.surface_ref||'—')));
          head.appendChild(findingBadge(ps.posture));
          row.appendChild(head);
          if(ps.note)row.appendChild(el('div',{class:'rsg-surface-note'},String(ps.note)));
          ob.appendChild(row);
        });
      }
      // Recorded Director decision (read-only) once ratified/overridden (§2.3 / §3).
      if(ratified){
        var dec=el('div',{class:'rsg-decision'});
        var decRow=el('div',{class:'rsg-finding-row'});
        decRow.appendChild(el('span',{class:'rsg-finding-lead'},opinion.director_decision==='override'?'Overridden by Director':'Ratified by Director'));
        if(opinion.director_final_finding)decRow.appendChild(findingBadge(opinion.director_final_finding));
        dec.appendChild(decRow);
        var dm=el('div',{class:'leg-meta'});
        if(opinion.director_ref)dm.appendChild(el('span',{class:'leg-tag'},'Ref '+String(opinion.director_ref)));
        if(opinion.director_decided_at)dm.appendChild(el('span',{class:'leg-tag'},shortDate(opinion.director_decided_at)));
        if(dm.childNodes.length)dec.appendChild(dm);
        ob.appendChild(dec);
      }
    }
    panel.appendChild(ob);

    // ── Proposed version block (§2.4) — recommended changes grouped by surface_class ──
    var pb=el('div',{class:'rsg-block'});
    pb.appendChild(el('div',{class:'section-label'},'Proposed version'));
    if(!changes.length){
      pb.appendChild(el('div',{class:'muted-note'},'No proposed changes recorded yet.'));
    }else{
      var groups={},order=[];
      changes.forEach(function(rc){var k=rc.surface_class||'Other';if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(rc);});
      order.forEach(function(k){
        pb.appendChild(el('div',{class:'rsg-surface-class'},String(k).replace(/_/g,' ')));
        groups[k].forEach(function(rc){
          var r=el('div',{class:'rsg-change'});
          var ch=el('div',{class:'rsg-change-head'});
          ch.appendChild(el('span',{class:'rsg-change-ref'},String(rc.elor_surface_ref||'—')));
          if(rc.surface_kind)ch.appendChild(el('span',{class:'leg-tag'},String(rc.surface_kind).replace(/_/g,' ')));
          r.appendChild(ch);
          r.appendChild(el('div',{class:'rsg-change-res'},resolutionText(rc)));
          if(rc.recommended_change)r.appendChild(el('div',{class:'rsg-change-text'},String(rc.recommended_change)));
          if(rc.plain_english_impact)r.appendChild(el('div',{class:'rsg-change-impact'},String(rc.plain_english_impact)));
          var clauses=rc.affected_clauses,clauseText='';
          if(Array.isArray(clauses)&&clauses.length)clauseText=clauses.join(', ');
          else if(typeof clauses==='string'&&clauses.trim())clauseText=clauses.trim();
          if(clauseText)r.appendChild(el('div',{class:'rsg-change-clauses'},'Affected clauses: '+clauseText));
          pb.appendChild(r);
        });
      });
    }
    panel.appendChild(pb);

    // ── Ratify / override control (§2.5) — only when opinion ready and not yet ratified ──
    if(opinionReady&&!ratified){
      var rb=el('div',{class:'rsg-block rsg-ratify'});
      rb.appendChild(el('div',{class:'section-label'},'Ratify or override the opinion'));
      var refInput=el('input',{type:'text',class:'rsg-ref-input',placeholder:'Decision reference (minimum 6 characters)','aria-label':'Decision reference'});
      rb.appendChild(refInput);
      var ratifyBtn=el('button',{class:'dbtn accept',type:'button',disabled:'disabled'},'Ratify opinion');
      rb.appendChild(el('div',{class:'btn-row'},ratifyBtn));
      rb.appendChild(el('div',{class:'section-label'},'Or override the finding'));
      var ffSelect=el('select',{class:'rsg-ff-select','aria-label':'Final finding'},
        el('option',{value:''},'Select final finding…'),
        el('option',{value:'aligned'},'Aligned'),
        el('option',{value:'needs_change'},'Needs change'),
        el('option',{value:'material_concern'},'Material concern')
      );
      rb.appendChild(ffSelect);
      var overrideBtn=el('button',{class:'dbtn reviewed',type:'button',disabled:'disabled'},'Override finding');
      rb.appendChild(el('div',{class:'btn-row'},overrideBtn));
      var rmsg=el('div',{class:'inline-msg'});
      rb.appendChild(rmsg);

      var setRmsg=function(kind,text){rmsg.className='inline-msg'+(kind?' '+kind:'');rmsg.textContent=text||'';};
      var refOK=function(){return refInput.value.trim().length>=6;};
      // Mirror the backend gate so the Director never hits the 400: ratify needs ref≥6; override
      // additionally needs a final_finding.
      var gate=function(){var ok=refOK();ratifyBtn.disabled=!ok;overrideBtn.disabled=!(ok&&ffSelect.value);};
      var lock=function(){ratifyBtn.disabled=true;overrideBtn.disabled=true;refInput.disabled=true;ffSelect.disabled=true;};
      var unlock=function(){refInput.disabled=false;ffSelect.disabled=false;gate();};
      var submit=function(payload){
        lock();setRmsg('','Recording your decision…');
        fetch(FUNCTIONS_URL+'/rsg-director-action',{method:'POST',headers:authHeaders(),body:JSON.stringify(payload)})
          .then(function(r){return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});})
          .then(function(res){
            if(res.ok){openAdaptationDetail(item,host);}            // re-GET detail → recorded decision, read-only
            else{unlock();setRmsg('err',ratifyErrorText(res.status,res.body));}
          })
          .catch(function(){unlock();setRmsg('err','Network error — your decision was not recorded. Please try again.');});
      };
      refInput.addEventListener('input',gate);
      ffSelect.addEventListener('change',gate);
      ratifyBtn.addEventListener('click',function(){
        if(!refOK())return;
        submit({adaptation_id:item.id,action:'record_council_posture',decision:'ratify',ref:refInput.value.trim()});
      });
      overrideBtn.addEventListener('click',function(){
        if(!refOK()||!ffSelect.value)return;
        submit({adaptation_id:item.id,action:'record_council_posture',decision:'override',final_finding:ffSelect.value,ref:refInput.value.trim()});
      });
      panel.appendChild(rb);
    }

    // ── Review-note history (§2.6, newest first; the accept/reject submission flow is unchanged) ──
    var nbk=el('div',{class:'rsg-block'});
    nbk.appendChild(el('div',{class:'section-label'},'Review-note history'));
    if(!notes.length){
      nbk.appendChild(el('div',{class:'muted-note'},'No review notes recorded yet.'));
    }else{
      var sorted=notes.slice().sort(function(a,b){return new Date(b.reviewed_at||0).getTime()-new Date(a.reviewed_at||0).getTime();});
      sorted.forEach(function(n){
        var row=el('div',{class:'rsg-note'});
        var top=el('div',{class:'rsg-note-top'});
        if(n.decision)top.appendChild(el('span',{class:'hist-action'},String(n.decision)));
        if(n.word_count!=null)top.appendChild(el('span',{class:'hist-meta'},n.word_count+' words'));
        if(n.reviewed_by)top.appendChild(el('span',{class:'hist-meta'},String(n.reviewed_by)));
        if(n.reviewed_at)top.appendChild(el('span',{class:'hist-meta'},shortDate(n.reviewed_at)));
        row.appendChild(top);
        if(n.note_text)row.appendChild(el('div',{class:'rsg-note-body'},String(n.note_text)));
        nbk.appendChild(row);
      });
    }
    panel.appendChild(nbk);

    host.appendChild(panel);
  }

  /* ============================================================
     LANE B — Legal Pages pending review (NEW)
     legal-page-review-feed → buildCardB → legal-page-accept-action
     ============================================================ */
  function loadLaneB(){
    var s=document.getElementById('laneB-status');
    if(s)s.textContent='Loading the legal-page review feed…';
    fetch(FUNCTIONS_URL+'/legal-page-review-feed',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){renderQueueB((j&&j.items)||[]);})
      .catch(function(){
        // Deterministic backend-not-ready fallback (RULE 33)
        var queue=document.getElementById('laneB-queue');
        if(queue){queue.textContent='';queue.appendChild(el('div',{class:'empty-state'},'Legal-page review feed is awaiting backend deploy.'));}
        COUNTS.legal=null;updateSummary();
      });
  }

  function renderQueueB(items){
    var queue=document.getElementById('laneB-queue');
    if(!queue)return;
    queue.textContent='';
    COUNTS.legal=items?items.length:0;updateSummary();
    if(!items||items.length===0){
      queue.appendChild(el('div',{class:'empty-state'},'No legal pages awaiting review.'));
      return;
    }
    items.forEach(function(item){queue.appendChild(buildCardB(item));});
  }

  var TRIG_CLASS={
    external_drift:{label:'Live page drifted from baseline',cls:'amber'},
    legislative_horizon_due:{label:'Law commenced — review due',cls:'red'},
    governed_update_due:{label:'Governing instrument ratified — review due',cls:'amber'}
  };

  function buildCardB(page){
    var card=el('div',{class:'card review-card'});
    var body=el('div',{class:'card-body'});

    // Title + version + sha + source link
    body.appendChild(el('div',{class:'leg-title'},page.page_title||page.page_slug||'(untitled page)'));

    var meta=el('div',{class:'leg-meta'});
    if(page.displayed_version)meta.appendChild(el('span',{class:'leg-tag'},String(page.displayed_version)));
    if(page.content_sha8)meta.appendChild(el('span',{class:'leg-tag'},String(page.content_sha8)));
    if(page.review_due)meta.appendChild(el('span',{class:'leg-tag'},'Review due '+shortDate(page.review_due)));
    if(Array.isArray(page.governing_instruments)){
      page.governing_instruments.forEach(function(gi){if(gi)meta.appendChild(el('span',{class:'leg-tag'},String(gi)));});
    }
    if(meta.childNodes.length)body.appendChild(meta);

    var src=safeUrl(page.page_url);
    if(src)body.appendChild(el('a',{class:'source-link',href:src,target:'_blank',rel:'noopener'},'Source ↗'));

    // Trigger chips
    var triggers=Array.isArray(page.triggers)?page.triggers:[];
    triggers.forEach(function(t){
      var def=TRIG_CLASS[t.change_class]||{label:String(t.change_class||'change').replace(/_/g,' '),cls:'neutral'};
      var row=el('div',{class:'chip-row',style:'margin-top:10px;'});
      row.appendChild(el('span',{class:'trig-chip '+def.cls},def.label));
      body.appendChild(row);
      var bits=[];
      if(t.trigger_source)bits.push(String(t.trigger_source));
      if(t.detected)bits.push(shortDate(t.detected));
      if(bits.length)body.appendChild(el('div',{class:'trig-meta'},bits.join(' · ')));
    });

    // Review note + word counter
    var note=el('textarea',{class:'review-note',placeholder:'Record your review note (minimum 150 words) before deciding…','aria-label':'Review note'});
    body.appendChild(note);
    var counter=el('div',{class:'word-counter'},'0 / 150 words');
    body.appendChild(counter);

    var btnAccept=el('button',{class:'dbtn accept',type:'button',disabled:'disabled'},'Accept & update (re-baseline + re-gate clients)');
    var btnReviewed=el('button',{class:'dbtn reviewed',type:'button',disabled:'disabled'},'Mark reviewed — no change required');
    var btnCouncil=el('button',{class:'dbtn council',type:'button',disabled:'disabled'},'Convene Legal Council');
    var btnRow=el('div',{class:'btn-row'},btnAccept,btnReviewed,btnCouncil);
    body.appendChild(btnRow);

    var msg=el('div',{class:'inline-msg'});
    body.appendChild(msg);

    var buttons=[btnAccept,btnReviewed,btnCouncil];
    function refreshGate(){
      var n=countWords(note.value);
      counter.textContent=n+' / 150 words';
      var met=n>=150;
      counter.className='word-counter'+(met?' met':'');
      // Accept & update keeps the ≥150-word gate; Mark reviewed and Convene are NOT word-gated. (§2.1/§3)
      btnAccept.disabled=!met;
      btnReviewed.disabled=false;
      btnCouncil.disabled=false;
    }
    note.addEventListener('input',refreshGate);
    refreshGate(); // init: Mark reviewed + Convene enabled immediately; Accept stays gated until 150 words
    function setMsg(kind,text){msg.className='inline-msg'+(kind?' '+kind:'');msg.textContent=text||'';}

    function decide(action){
      if(action==='accept'&&countWords(note.value)<150)return; // ≥150-word gate applies to Accept only (§2.1)
      buttons.forEach(function(b){b.disabled=true;});
      note.disabled=true;
      setMsg('','Recording your decision…');
      fetch(FUNCTIONS_URL+'/legal-page-accept-action',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify({page_slug:page.page_slug,action:action,review_note:note.value})
      }).then(function(r){
        return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});
      }).then(function(res){
        if(res.ok){
          resolveCard(card,res.body&&res.body.status,statusMessageB(res.body&&res.body.status,action));
          // After a successful accept or mark_reviewed, refresh the summary counts.
          if(action==='accept'||action==='mark_reviewed'){
            if(typeof COUNTS.legal==='number'&&COUNTS.legal>0)COUNTS.legal-=1;
            updateSummary();
          }
        }else{
          note.disabled=false;refreshGate();
          var errText=(res.body&&res.body.error==='review_note_too_short')
            ? 'Your review note must reach 150 words before this decision can be recorded.'
            : ((res.body&&res.body.error)||("Couldn't record that decision ("+res.status+"). Please try again."));
          setMsg('err',errText);
        }
      }).catch(function(){
        note.disabled=false;refreshGate();
        setMsg('err','Network error — your decision was not recorded. Please try again.');
      });
    }
    // ── Convene Legal Council (legal-page item) → escalate into the RSG (Forward-law) council flow. (§2.2/§2.3/§3)
    //    promote (rsg-legalpage-promote, NEW) → on 200/409 take adaptation_id →
    //    convene (rsg-director-action {convene_council}) → "Council convened — see Forward law".
    //    Defensive (§2.3): route not yet deployed (404/403/network/no id) → neutral inline note, item stays pending. ──
    var ROUTING_PENDING_MSG='Council routing is being enabled for legal pages — this item can\'t be convened yet.';
    function conveneLegalPage(){
      var changeId=page.legal_page_change_id;
      buttons.forEach(function(b){b.disabled=true;});
      note.disabled=true;
      setMsg('','Convening the Legal Council…');
      if(changeId==null||changeId===''){
        // No legal_page_change_id on the feed item → route can't be exercised yet; safe neutral fallback. (§2.3)
        note.disabled=false;refreshGate();
        setMsg('',ROUTING_PENDING_MSG);
        return;
      }
      fetch(FUNCTIONS_URL+'/rsg-legalpage-promote',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify({legal_page_change_id:changeId})
      }).then(function(r){
        return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});
      }).then(function(res){
        // 200 promoted, 409 already_promoted — both carry the adaptation_id to convene against. (§1/§3)
        if(res.ok||res.status===409){
          var adaptationId=res.body&&res.body.adaptation_id;
          if(adaptationId==null){note.disabled=false;refreshGate();setMsg('',ROUTING_PENDING_MSG);return;}
          conveneAdaptation(adaptationId);
          return;
        }
        // 404 change_not_found / 403 / route absent → neutral fallback; item stays pending. (§2.3/§3)
        if(res.status===404||res.status===403){note.disabled=false;refreshGate();setMsg('',ROUTING_PENDING_MSG);return;}
        // Any other non-2xx → retryable inline error; item stays pending.
        note.disabled=false;refreshGate();
        setMsg('err',(res.body&&res.body.error)?('Couldn\'t convene the council: '+String(res.body.error)+'.'):("Couldn't convene the council ("+res.status+"). Please try again."));
      }).catch(function(){
        // Network error (route not deployed yet) → neutral fallback; item stays pending. (§2.3/§3)
        note.disabled=false;refreshGate();
        setMsg('',ROUTING_PENDING_MSG);
      });
    }
    function conveneAdaptation(adaptationId){
      setMsg('','Convening the Legal Council…');
      fetch(FUNCTIONS_URL+'/rsg-director-action',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify({adaptation_id:adaptationId,action:'convene_council'})
      }).then(function(r){
        return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});
      }).then(function(res){
        if(res.ok){
          // Item now lives in the Forward-law (RSG) lane — reviewed there exactly like a forward-law change. (§2.2/§3)
          resolveCard(card,'council','Council convened — opinion generating; see Forward law.');
          if(typeof COUNTS.legal==='number'&&COUNTS.legal>0)COUNTS.legal-=1;
          updateSummary();
          loadAll();
          return;
        }
        // promote ok but convene rejected (e.g. 409 bad_state) → show the error inline; refresh (may already be convened). (§3)
        note.disabled=false;refreshGate();
        setMsg('err',(res.body&&res.body.error)?('Action declined: '+String(res.body.error)+'.'):("Couldn't convene the council ("+res.status+"). Please try again."));
        loadAll();
      }).catch(function(){
        note.disabled=false;refreshGate();
        setMsg('err','Network error — the council was not convened. Please try again.');
      });
    }

    btnAccept.addEventListener('click',function(){decide('accept');});
    btnReviewed.addEventListener('click',function(){decide('mark_reviewed');});
    btnCouncil.addEventListener('click',conveneLegalPage);

    card.appendChild(body);
    return card;
  }

  function statusMessageB(status,action){
    var byAction={accept:'Accepted & updated — page re-baselined and accepted clients re-gated.',mark_reviewed:'Reviewed — no change required.'};
    if(status){
      var byStatus={accepted:'Accepted & updated — page re-baselined and accepted clients re-gated.',reviewed:'Reviewed — no change required.'};
      if(byStatus[status])return byStatus[status];
    }
    return byAction[action]||('Decision recorded'+(status?' ('+String(status).replace(/_/g,' ')+')':'')+'.');
  }

  /* ============================================================
     Shared card resolution (Lane A + Lane B)
     ============================================================ */
  function resolveCard(card,status,message){
    card.className='card review-card resolved';
    var body=card.querySelector('.card-body');
    if(body){
      body.textContent='';
      body.appendChild(el('div',{class:'resolved-note'},el('span',{},'✓'),message||('Decision recorded'+(status?' ('+String(status).replace(/_/g,' ')+')':'')+'.')));
    }
  }

  /* ============================================================
     HISTORY — ratified & resolved (NEW)
     legal-page-review-history?limit=100
     ============================================================ */
  var HIST_CLASS={
    director_approved_update:'Accepted & updated',
    director_reviewed_no_change:'Reviewed — no change',
    council_convened:'Council convened'
  };

  function loadHistory(){
    var s=document.getElementById('history-status');
    if(s)s.textContent='Loading history…';
    fetch(FUNCTIONS_URL+'/legal-page-review-history?limit=100',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){renderHistory((j&&j.items)||[]);})
      .catch(function(){
        // Deterministic backend-not-ready fallback (RULE 33)
        var body=document.getElementById('history-body');
        if(body){body.textContent='';body.appendChild(el('div',{class:'empty-state'},'History is awaiting backend deploy.'));}
        COUNTS.history=null;updateSummary();
      });
  }

  function renderHistory(items){
    var body=document.getElementById('history-body');
    if(!body)return;
    body.textContent='';
    COUNTS.history=items?items.length:0;updateSummary();
    if(!items||items.length===0){
      body.appendChild(el('div',{class:'empty-state'},'No ratified changes yet.'));
      return;
    }
    items.forEach(function(it){body.appendChild(buildHistoryRow(it));});
  }

  function buildHistoryRow(it){
    var row=el('div',{class:'hist-row'});
    var top=el('div',{class:'hist-top'});
    top.appendChild(el('span',{class:'hist-title'},it.page_title||it.page_slug||'(untitled page)'));
    var actionLabel=HIST_CLASS[it.change_class]||String(it.change_class||'resolved').replace(/_/g,' ');
    top.appendChild(el('span',{class:'hist-action'},actionLabel));
    if(it.director_ref)top.appendChild(el('span',{class:'hist-meta'},String(it.director_ref)));
    if(it.old_sha8&&it.new_sha8)top.appendChild(el('span',{class:'sha-mono'},String(it.old_sha8)+' → '+String(it.new_sha8)));
    if(it.detected_at)top.appendChild(el('span',{class:'hist-meta'},shortDate(it.detected_at)));
    row.appendChild(top);
    if(it.notes){
      row.appendChild(el('details',{class:'hist-note-exp'},
        el('summary',{},'view note'),
        el('div',{class:'hist-note-body'},String(it.notes))
      ));
    }
    return row;
  }

})();
</script>
</body>
