    laneA.appendChild(el('div',{class:'lane-head'},el('div',{class:'t'},'Forward law — estate offering'),el('div',{class:'rule'})));
    laneA.appendChild(el('div',{class:'section-label',id:'laneA-label'},'Changes awaiting your review'));
    laneA.appendChild(el('div',{class:'lane-queue',id:'laneA-queue'},el('div',{class:'empty-state',id:'laneA-status'},'Loading the review queue…')));
    main.appendChild(laneA);

    // ── History (collapsible, ratified & resolved) ──
    var hist=el('details',{id:'sec-history',class:'collapse'},
      el('summary',{},'History — ratified & resolved',el('span',{class:'ts'},'')),
      el('div',{class:'collapse-body',id:'history-body'},el('div',{class:'empty-state',id:'history-status'},'Loading history…'))
    );
    main.appendChild(hist);

    root.appendChild(main);
    updateSummary();
  }

  function makeFilterBtn(key,label,active){
    return el('button',{class:'filter-btn'+(active?' active':''),type:'button','data-filter':key,onclick:function(){applyFilter(key);}},label);
  }
  function applyFilter(key){
    var btns=document.querySelectorAll('.filter-btn');
    for(var i=0;i<btns.length;i++){btns[i].classList.toggle('active',btns[i].getAttribute('data-filter')===key);}
    var map={laneA:'sec-laneA',laneB:'sec-laneB',history:'sec-history'};
    for(var k in map){if(!map.hasOwnProperty(k))continue;var s=document.getElementById(map[k]);if(!s)continue;
      s.style.display=(key==='all'||key===k)?'':'none';}
  }
  function scrollToLane(key){
    applyFilter('all');
    var map={laneA:'sec-laneA',laneB:'sec-laneB',history:'sec-history'};
    var s=document.getElementById(map[key]);
    if(s){if(s.tagName==='DETAILS')s.open=true;s.scrollIntoView({behavior:'smooth',block:'start'});}
  }

  // ── Summary chip state ──
  function setChip(textId,dotId,text,rag){
    var t=document.getElementById(textId);if(t)t.textContent=text;
    var d=document.getElementById(dotId);if(d)d.className='rag-dot'+(rag?' '+rag:'');
  }
  function updateSummary(){
    // Legal pages — red if any pending, green if zero, neutral if unknown
    if(COUNTS.legal==null)setChip('chip-legal-text','rag-legal','Legal pages — — pending','');
    else setChip('chip-legal-text','rag-legal','Legal pages — '+COUNTS.legal+' pending',COUNTS.legal>0?'red':'green');
    // Forward law — amber if any pending, green if zero, neutral if unknown
    if(COUNTS.forward==null)setChip('chip-forward-text','rag-forward','Forward law — — pending','');
    else setChip('chip-forward-text','rag-forward','Forward law — '+COUNTS.forward+' pending',COUNTS.forward>0?'amber':'green');
    // History — resolved count, green/neutral
    if(COUNTS.history==null)setChip('chip-history-text','rag-history','History — — resolved','');
    else setChip('chip-history-text','rag-history','History — '+COUNTS.history+' resolved','green');
  }

  // ── Orchestrator: re-run all three loads (no auto-poll) ──
  function loadAll(){loadLaneA();loadLaneB();loadHistory();}

  /* ============================================================
     LANE A — Forward law (ported verbatim from legal-compliance)
     rsg-director-feed → buildCardA → rsg-director-action
     ============================================================ */
  function loadLaneA(){
    var s=document.getElementById('laneA-status');
    if(s)s.textContent='Loading the review queue…';
    fetch(FUNCTIONS_URL+'/rsg-director-feed',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){renderQueueA((j&&j.items)||[]);})
      .catch(function(){
        var st=document.getElementById('laneA-status');
        if(st)st.textContent="Couldn't load the review queue. Please refresh.";
        COUNTS.forward=null;updateSummary();
      });
  }

  function renderQueueA(items){
    var queue=document.getElementById('laneA-queue');
    var label=document.getElementById('laneA-label');
    if(!queue)return;
    queue.textContent='';
    COUNTS.forward=items?items.length:0;updateSummary();
    if(!items||items.length===0){
      if(label)label.textContent='Changes awaiting your review';
      queue.appendChild(el('div',{class:'empty-state'},'No changes awaiting your review.'));
      return;
    }
    if(label)label.textContent=items.length+(items.length===1?' change':' changes')+' awaiting your review';
    items.forEach(function(item){queue.appendChild(buildCardA(item));});
  }

  function buildCardA(item){
    var kl=item.kl_legislative_horizon||{};
    var title=kl.legislation_short_name||kl.legislation_title||item.instrument_ref||'(untitled change)';

    var card=el('div',{class:'card review-card'});
    var body=el('div',{class:'card-body'});

    body.appendChild(el('div',{class:'leg-title'},title));

    var chips=el('div',{class:'chip-row'});
    var mat=item.materiality;
    if(mat==='material_client')chips.appendChild(el('span',{class:'mat-chip material'},'Material — client-affecting'));
    else if(mat==='minor_non_client')chips.appendChild(el('span',{class:'mat-chip minor'},'Minor — not client-affecting'));
    else if(mat==='pending')chips.appendChild(el('span',{class:'mat-chip pending'},'Materiality pending'));
    else if(mat)chips.appendChild(el('span',{class:'mat-chip pending'},String(mat).replace(/_/g,' ')));
    if(item.council_required===true)chips.appendChild(el('span',{class:'council-marker'},'Council review'));
    if(chips.childNodes.length)body.appendChild(chips);

    var alertStage=item.director_firm_alerted_at?'Firm alert — commencement known':(item.director_alerted_at?'Provisional alert':null);
    var meta=el('div',{class:'leg-meta'});
    if(item.status)meta.appendChild(el('span',{class:'leg-tag'},String(item.status).replace(/_/g,' ')));
    if(alertStage)meta.appendChild(el('span',{class:'leg-tag'},alertStage));
    if(kl.parliament_stage)meta.appendChild(el('span',{class:'leg-tag'},String(kl.parliament_stage)));
    if(item.commencement_date)meta.appendChild(el('span',{class:'leg-tag'},'Commences '+shortDate(item.commencement_date)));
    if(item.jurisdiction)meta.appendChild(el('span',{class:'leg-tag'},String(item.jurisdiction)));
    if(meta.childNodes.length)body.appendChild(meta);

    if(kl.headline_summary)body.appendChild(el('div',{class:'leg-summary'},kl.headline_summary));

    var src=safeUrl(kl.source_url);
    if(src)body.appendChild(el('a',{class:'source-link',href:src,target:'_blank',rel:'noopener'},'Source ↗'));

    if(kl.disclaimer_text)body.appendChild(el('div',{class:'disclaimer-foot'},kl.disclaimer_text));

    // ── Inline status/error message (shared across this card's controls) ──
    var msg=el('div',{class:'inline-msg'});
    function setMsg(kind,text){msg.className='inline-msg'+(kind?' '+kind:'');msg.textContent=text||'';}

    // ── Shared POST to rsg-director-action (the live ordered state machine, AM-002/AMD-238) ──
    // On HTTP-ok: replace the card with a resolved state showing the returned status.
    // On non-2xx: surface the structured `error` string inline (bad_state, council_posture_required,
    //   review_note_too_short, bad_request, …) and re-enable controls so the Director can retry.
    function postAction(payload,reenable){
      setMsg('','Recording your decision…');
      fetch(FUNCTIONS_URL+'/rsg-director-action',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify(payload)
      }).then(function(r){
        return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});
      }).then(function(res){
        if(res.ok){resolveCard(card,res.body&&res.body.status,statusMessageA(res.body&&res.body.status));}
        else{
          if(reenable)reenable();
          var errText=(res.body&&res.body.error)
            ? 'Action declined: '+String(res.body.error)
            : ("Couldn't record that decision ("+res.status+"). Please try again.");
          setMsg('err',errText);
        }
      }).catch(function(){
        if(reenable)reenable();
        setMsg('err','Network error — your decision was not recorded. Please try again.');
      });
    }

    // ── Review-note block (textarea + live counter). The ≥150-word gate applies ONLY to the
    //    submit_review_note actions (Accept / Reject) — never to convene/record-posture/approve. ──
    function buildNoteBlock(placeholder){
      var note=el('textarea',{class:'review-note',placeholder:placeholder||'Record your review note (minimum 150 words) before deciding…','aria-label':'Review note'});
      var counter=el('div',{class:'word-counter'},'0 / 150 words');
      var block={note:note,counter:counter,onGate:null};
      block.words=function(){return countWords(note.value);};
      block.refresh=function(){
        var n=block.words();
        counter.textContent=n+' / 150 words';
        counter.className='word-counter'+(n>=150?' met':'');
        if(block.onGate)block.onGate(n>=150);
      };
      note.addEventListener('input',block.refresh);
      return block;
    }

    var status=String(item.status||'');
    var preCouncil=(status==='detected'||status==='provisional_alert'||status==='director_review');

    if(preCouncil){
      // Convene Legal Council — ALWAYS enabled, NO word gate → convene_council
      var pcConvene=el('button',{class:'dbtn council',type:'button'},'Convene Legal Council');
      body.appendChild(el('div',{class:'btn-row'},pcConvene));

      // Review note + Reject (≥150 words) → submit_review_note / decision:'reject'. (No Accept here —
      // the backend forbids accept before council returns.)
      var pcNb=buildNoteBlock('Record your review note (minimum 150 words) to reject this change…');
      body.appendChild(pcNb.note);
      body.appendChild(pcNb.counter);
      var pcReject=el('button',{class:'dbtn reject',type:'button',disabled:'disabled'},'Reject');
      body.appendChild(el('div',{class:'btn-row'},pcReject));
      pcNb.onGate=function(met){pcReject.disabled=!met;};

      var pcLock=function(){pcConvene.disabled=true;pcReject.disabled=true;pcNb.note.disabled=true;};
      var pcUnlock=function(){pcConvene.disabled=false;pcNb.note.disabled=false;pcNb.refresh();};
      pcConvene.addEventListener('click',function(){
        pcLock();
        postAction({adaptation_id:item.id,action:'convene_council'},pcUnlock);
      });
      pcReject.addEventListener('click',function(){
        if(pcNb.words()<150)return;
        pcLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'reject',review_note:pcNb.note.value},pcUnlock);
      });
      body.appendChild(msg);
    }
    else if(status==='council_requested'){
      body.appendChild(el('div',{class:'muted-note'},'Council convened — awaiting council posture. Record the council’s finding below, or reject.'));

      // Posture mini-form: finding selector (required) + short summary → record_council_posture (NO word gate).
      body.appendChild(el('div',{class:'section-label'},'Council posture'));
      var crFinding=el('select',{'aria-label':'Council finding',style:'width:100%;margin-top:6px;padding:9px 11px;background:var(--bg-base);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:0.74rem;outline:none;'},
        el('option',{value:''},'Select council finding…'),
        el('option',{value:'aligned'},'Aligned'),
        el('option',{value:'needs_change'},'Needs change'),
        el('option',{value:'material_concern'},'Material concern')
      );
      body.appendChild(crFinding);
      var crSummary=el('textarea',{class:'review-note',style:'min-height:70px;',placeholder:'Short council posture summary (optional)…','aria-label':'Council posture summary'});
      body.appendChild(crSummary);
      var crRecord=el('button',{class:'dbtn reviewed',type:'button',disabled:'disabled'},'Record council posture');
      body.appendChild(el('div',{class:'btn-row'},crRecord));
      crFinding.addEventListener('change',function(){crRecord.disabled=!crFinding.value;});

      // Reject (≥150 words) remains available → submit_review_note / decision:'reject'.
      body.appendChild(el('div',{class:'section-label'},'Or reject'));
      var crNb=buildNoteBlock('Record your review note (minimum 150 words) to reject this change…');
      body.appendChild(crNb.note);
      body.appendChild(crNb.counter);
      var crReject=el('button',{class:'dbtn reject',type:'button',disabled:'disabled'},'Reject');
      body.appendChild(el('div',{class:'btn-row'},crReject));
      crNb.onGate=function(met){crReject.disabled=!met;};

      var crLock=function(){crRecord.disabled=true;crReject.disabled=true;crFinding.disabled=true;crSummary.disabled=true;crNb.note.disabled=true;};
      var crUnlock=function(){crFinding.disabled=false;crSummary.disabled=false;crNb.note.disabled=false;crRecord.disabled=!crFinding.value;crNb.refresh();};
      crRecord.addEventListener('click',function(){
        if(!crFinding.value)return;
        crLock();
        postAction({adaptation_id:item.id,action:'record_council_posture',council_posture:{finding:crFinding.value,summary:crSummary.value}},crUnlock);
      });
      crReject.addEventListener('click',function(){
        if(crNb.words()<150)return;
        crLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'reject',review_note:crNb.note.value},crUnlock);
      });
      body.appendChild(msg);
    }
    else if(status==='council_returned'){
      body.appendChild(el('div',{class:'muted-note'},'Council posture returned — record your review note (minimum 150 words), then accept to stage for commencement, or reject.'));
      var rtNb=buildNoteBlock('Record your review note (minimum 150 words) before deciding…');
      body.appendChild(rtNb.note);
      body.appendChild(rtNb.counter);
      var rtAccept=el('button',{class:'dbtn accept',type:'button',disabled:'disabled'},'Accept (stage for commencement)');
      var rtReject=el('button',{class:'dbtn reject',type:'button',disabled:'disabled'},'Reject');
      body.appendChild(el('div',{class:'btn-row'},rtAccept,rtReject));
      rtNb.onGate=function(met){rtAccept.disabled=!met;rtReject.disabled=!met;};

      var rtLock=function(){rtAccept.disabled=true;rtReject.disabled=true;rtNb.note.disabled=true;};
      var rtUnlock=function(){rtNb.note.disabled=false;rtNb.refresh();};
      rtAccept.addEventListener('click',function(){
        if(rtNb.words()<150)return;
        rtLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'accept',review_note:rtNb.note.value},rtUnlock);
      });
      rtReject.addEventListener('click',function(){
        if(rtNb.words()<150)return;
        rtLock();
        postAction({adaptation_id:item.id,action:'submit_review_note',decision:'reject',review_note:rtNb.note.value},rtUnlock);
      });
      body.appendChild(msg);
    }
    else if(status==='drafted'){
      body.appendChild(el('div',{class:'muted-note'},'Documents drafted — approve to stage for commencement.'));
      var apBtn=el('button',{class:'dbtn accept',type:'button'},'Approve documents');
      body.appendChild(el('div',{class:'btn-row'},apBtn));
      apBtn.addEventListener('click',function(){
        apBtn.disabled=true;
        postAction({adaptation_id:item.id,action:'approve_documents'},function(){apBtn.disabled=false;});
      });
      body.appendChild(msg);
    }
    else{
      // accepted / approved_staged / withdrawn / in_force / any other — resolved, no controls.
      card.className='card review-card resolved';
      body.appendChild(el('div',{class:'resolved-note'},el('span',{},'✓'),statusMessageA(status)));
    }

    card.appendChild(body);
    return card;
  }

  function statusMessageA(status){
    var byStatus={
      detected:'Detected — awaiting your review.',
      provisional_alert:'Provisional alert — awaiting your review.',
      director_review:'Director review — awaiting your decision.',
      council_requested:'Council convened — awaiting council posture.',
      council_returned:'Council posture recorded — awaiting your review.',
      accepted:'Accepted — documents will be drafted.',
      drafted:'Drafted — ready for document approval.',
      approved_staged:'Approved — staged for commencement.',
      withdrawn:'Withdrawn.',
      in_force:'In force.'
    };
    if(status&&byStatus[status])return byStatus[status];
    return 'Decision recorded'+(status?' ('+String(status).replace(/_/g,' ')+')':'')+'.';
  }

  /* ============================================================
     LANE B — Legal Pages pending review (NEW)
     legal-page-review-feed → buildCardB → legal-page-accept-action
     ============================================================ */
  function loadLaneB(){
    var s=document.getElementById('laneB-status');
    if(s)s.textContent='Loading the legal-page review feed…';
    fetch(FUNCTIONS_URL+'/legal-page-review-feed',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){renderQueueB((j&&j.items)||[]);})
      .catch(function(){
        // Deterministic backend-not-ready fallback (RULE 33)
        var queue=document.getElementById('laneB-queue');
        if(queue){queue.textContent='';queue.appendChild(el('div',{class:'empty-state'},'Legal-page review feed is awaiting backend deploy.'));}
        COUNTS.legal=null;updateSummary();
      });
  }

  function renderQueueB(items){
    var queue=document.getElementById('laneB-queue');
    if(!queue)return;
    queue.textContent='';
    COUNTS.legal=items?items.length:0;updateSummary();
    if(!items||items.length===0){
      queue.appendChild(el('div',{class:'empty-state'},'No legal pages awaiting review.'));
      return;
    }
    items.forEach(function(item){queue.appendChild(buildCardB(item));});
  }

  var TRIG_CLASS={
    external_drift:{label:'Live page drifted from baseline',cls:'amber'},
    legislative_horizon_due:{label:'Law commenced — review due',cls:'red'},
    governed_update_due:{label:'Governing instrument ratified — review due',cls:'amber'}
  };

  function buildCardB(page){
    var card=el('div',{class:'card review-card'});
    var body=el('div',{class:'card-body'});

    // Title + version + sha + source link
    body.appendChild(el('div',{class:'leg-title'},page.page_title||page.page_slug||'(untitled page)'));

    var meta=el('div',{class:'leg-meta'});
    if(page.displayed_version)meta.appendChild(el('span',{class:'leg-tag'},String(page.displayed_version)));
    if(page.content_sha8)meta.appendChild(el('span',{class:'leg-tag'},String(page.content_sha8)));
    if(page.review_due)meta.appendChild(el('span',{class:'leg-tag'},'Review due '+shortDate(page.review_due)));
    if(Array.isArray(page.governing_instruments)){
      page.governing_instruments.forEach(function(gi){if(gi)meta.appendChild(el('span',{class:'leg-tag'},String(gi)));});
    }
    if(meta.childNodes.length)body.appendChild(meta);

    var src=safeUrl(page.page_url);
    if(src)body.appendChild(el('a',{class:'source-link',href:src,target:'_blank',rel:'noopener'},'Source ↗'));

    // Trigger chips
    var triggers=Array.isArray(page.triggers)?page.triggers:[];
    triggers.forEach(function(t){
      var def=TRIG_CLASS[t.change_class]||{label:String(t.change_class||'change').replace(/_/g,' '),cls:'neutral'};
      var row=el('div',{class:'chip-row',style:'margin-top:10px;'});
      row.appendChild(el('span',{class:'trig-chip '+def.cls},def.label));
      body.appendChild(row);
      var bits=[];
      if(t.trigger_source)bits.push(String(t.trigger_source));
      if(t.detected)bits.push(shortDate(t.detected));
      if(bits.length)body.appendChild(el('div',{class:'trig-meta'},bits.join(' · ')));
    });

    // Review note + word counter
    var note=el('textarea',{class:'review-note',placeholder:'Record your review note (minimum 150 words) before deciding…','aria-label':'Review note'});
    body.appendChild(note);
    var counter=el('div',{class:'word-counter'},'0 / 150 words');
    body.appendChild(counter);

    var btnAccept=el('button',{class:'dbtn accept',type:'button',disabled:'disabled'},'Accept & update (re-baseline + re-gate clients)');
    var btnReviewed=el('button',{class:'dbtn reviewed',type:'button',disabled:'disabled'},'Mark reviewed — no change required');
    var btnCouncil=el('button',{class:'dbtn council',type:'button',disabled:'disabled'},'Convene Legal Council');
    var btnRow=el('div',{class:'btn-row'},btnAccept,btnReviewed,btnCouncil);
    body.appendChild(btnRow);

    var msg=el('div',{class:'inline-msg'});
    body.appendChild(msg);

    var buttons=[btnAccept,btnReviewed,btnCouncil];
    function refreshGate(){
      var n=countWords(note.value);
      counter.textContent=n+' / 150 words';
      var met=n>=150;
      counter.className='word-counter'+(met?' met':'');
      buttons.forEach(function(b){b.disabled=!met;});
    }
    note.addEventListener('input',refreshGate);
    function setMsg(kind,text){msg.className='inline-msg'+(kind?' '+kind:'');msg.textContent=text||'';}

    function decide(action){
      if(countWords(note.value)<150)return;
      buttons.forEach(function(b){b.disabled=true;});
      note.disabled=true;
      setMsg('','Recording your decision…');
      fetch(FUNCTIONS_URL+'/legal-page-accept-action',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify({page_slug:page.page_slug,action:action,review_note:note.value})
      }).then(function(r){
        return r.json().catch(function(){return {};}).then(function(j){return {ok:r.ok,status:r.status,body:j};});
      }).then(function(res){
        if(res.ok){
          resolveCard(card,res.body&&res.body.status,statusMessageB(res.body&&res.body.status,action));
          // After a successful accept or mark_reviewed, refresh the summary counts.
          if(action==='accept'||action==='mark_reviewed'){
            if(typeof COUNTS.legal==='number'&&COUNTS.legal>0)COUNTS.legal-=1;
            updateSummary();
          }
        }else{
          note.disabled=false;refreshGate();
          var errText=(res.body&&res.body.error==='review_note_too_short')
            ? 'Your review note must reach 150 words before this decision can be recorded.'
            : ((res.body&&res.body.error)||("Couldn't record that decision ("+res.status+"). Please try again."));
          setMsg('err',errText);
        }
      }).catch(function(){
        note.disabled=false;refreshGate();
        setMsg('err','Network error — your decision was not recorded. Please try again.');
      });
    }
    btnAccept.addEventListener('click',function(){decide('accept');});
    btnReviewed.addEventListener('click',function(){decide('mark_reviewed');});
    btnCouncil.addEventListener('click',function(){decide('convene_council');});

    card.appendChild(body);
    return card;
  }

  function statusMessageB(status,action){
    var byAction={accept:'Accepted & updated — page re-baselined and accepted clients re-gated.',mark_reviewed:'Reviewed — no change required.',convene_council:'Legal Council convened — item kept pending.'};
    if(status){
      var byStatus={accepted:'Accepted & updated — page re-baselined and accepted clients re-gated.',reviewed:'Reviewed — no change required.',council:'Legal Council convened — item kept pending.'};
      if(byStatus[status])return byStatus[status];
    }
    return byAction[action]||('Decision recorded'+(status?' ('+String(status).replace(/_/g,' ')+')':'')+'.');
  }

  /* ============================================================
     Shared card resolution (Lane A + Lane B)
     ============================================================ */
  function resolveCard(card,status,message){
    card.className='card review-card resolved';
    var body=card.querySelector('.card-body');
    if(body){
      body.textContent='';
      body.appendChild(el('div',{class:'resolved-note'},el('span',{},'✓'),message||('Decision recorded'+(status?' ('+String(status).replace(/_/g,' ')+')':'')+'.')));
    }
  }

  /* ============================================================
     HISTORY — ratified & resolved (NEW)
     legal-page-review-history?limit=100
     ============================================================ */
  var HIST_CLASS={
    director_approved_update:'Accepted & updated',
    director_reviewed_no_change:'Reviewed — no change',
    council_convened:'Council convened'
  };

  function loadHistory(){
    var s=document.getElementById('history-status');
    if(s)s.textContent='Loading history…';
    fetch(FUNCTIONS_URL+'/legal-page-review-history?limit=100',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){renderHistory((j&&j.items)||[]);})
      .catch(function(){
        // Deterministic backend-not-ready fallback (RULE 33)
        var body=document.getElementById('history-body');
        if(body){body.textContent='';body.appendChild(el('div',{class:'empty-state'},'History is awaiting backend deploy.'));}
        COUNTS.history=null;updateSummary();
      });
  }

  function renderHistory(items){
    var body=document.getElementById('history-body');
    if(!body)return;
    body.textContent='';
    COUNTS.history=items?items.length:0;updateSummary();
    if(!items||items.length===0){
      body.appendChild(el('div',{class:'empty-state'},'No ratified changes yet.'));
      return;
    }
    items.forEach(function(it){body.appendChild(buildHistoryRow(it));});
  }

  function buildHistoryRow(it){
    var row=el('div',{class:'hist-row'});
    var top=el('div',{class:'hist-top'});
    top.appendChild(el('span',{class:'hist-title'},it.page_title||it.page_slug||'(untitled page)'));
    var actionLabel=HIST_CLASS[it.change_class]||String(it.change_class||'resolved').replace(/_/g,' ');
    top.appendChild(el('span',{class:'hist-action'},actionLabel));
    if(it.director_ref)top.appendChild(el('span',{class:'hist-meta'},String(it.director_ref)));
    if(it.old_sha8&&it.new_sha8)top.appendChild(el('span',{class:'sha-mono'},String(it.old_sha8)+' → '+String(it.new_sha8)));
    if(it.detected_at)top.appendChild(el('span',{class:'hist-meta'},shortDate(it.detected_at)));
    row.appendChild(top);
    if(it.notes){
      row.appendChild(el('details',{class:'hist-note-exp'},
        el('summary',{},'view note'),
        el('div',{class:'hist-note-body'},String(it.notes))
      ));
    }
    return row;
  }

})();
</script>
</body>
</html>
