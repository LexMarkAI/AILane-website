<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ─── Canonical config — reuses the established AiLaneCEO Supabase constants (no new
//     values invented, §7). Mirrors AiLaneCEO/intelligence-alerts/index.html. ───
const SUPABASE_URL='https://cnbsxwtvazfvzmltkuvx.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
const CEO_EMAIL='mark@ailane.ai';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

// ─── LIVE TOKEN (§2d) ─────────────────────────────────────────────────────────────
// The exemplar (intelligence-alerts) SNAPSHOTS the JWT once at auth time (setToken on
// the access_token) and reuses that snapshot for every RPC. Two estate pages (KL vault,
// KL engine) failed invisibly against verify_jwt functions when Supabase auto-refreshed
// the token behind that snapshot. We deliberately do NOT copy the snapshot pattern:
// getLiveToken() reads the CURRENT session token from getSession() on EVERY request,
// mirroring the KL engine's klLiveToken(). A background refresh can never stale a call.
async function getLiveToken(){
  try{
    const gs = await sb.auth.getSession();
    const t = gs && gs.data && gs.data.session && gs.data.session.access_token;
    return t || null;
  }catch(e){ console.warn('getSession failed', e); return null; }
}

// ─── RPC helper — raw fetch + explicit Bearer + apikey. Reads the token LIVE per call
//     (§2d). Every mutation on the horizon board goes through fn_horizon_review_act;
//     this client never PATCH/POSTs kl_legislative_horizon directly (§6 check 8). ───
async function rpc(fn, params){
  const token = await getLiveToken();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{ 'Authorization':`Bearer ${token||''}`, 'apikey':SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(params||{})
  });
  let json=null;
  try{ json = await res.json(); }catch(e){ json=null; }
  return { ok: res.ok, status: res.status, json };
}

// The three actions all route through the single RPC. Params follow the estate's
// fn_ceo_alert_act convention (p_action / p_note); p_id carries the card id and p_edits
// carries the Edit jsonb. edits is included only for 'edit'.
async function actOnCard(id, action, note, edits){
  const params = { p_id: id, p_action: action, p_note: (note && note.trim()) ? note.trim() : null };
  if(edits != null) params.p_edits = edits;
  return rpc('fn_horizon_review_act', params);
}

// ─── DOMPurify sanitiser (§3.3 / §6 check 4) ──────────────────────────────────────
// business_impact_html and preparatory_steps_html are MODEL-GENERATED HTML. They pass
// through this allowlist before the page's ONLY dangerouslySetInnerHTML. Mirrors the KL
// engine's hubIntelSanitiseHtml (#43) tag/attr/URI allowlist exactly. If DOMPurify is
// somehow unavailable we return '' — we NEVER innerHTML raw model output.
function sanitiseHtml(html){
  if(html==null || html==='') return '';
  if(!window.DOMPurify || !window.DOMPurify.sanitize){
    console.error('DOMPurify unavailable — refusing to render raw model HTML');
    return '';
  }
  try{
    return window.DOMPurify.sanitize(String(html), {
      ALLOWED_TAGS: ['p','br','ul','ol','li','strong','b','em','i','h3','h4','a','span'],
      ALLOWED_ATTR: ['href'],
      ALLOWED_URI_REGEXP: /^https?:\/\//i,
    });
  }catch(e){ console.warn('sanitise failed', e); return ''; }
}

// ─── formatting helpers ───
function humanize(s){ return (s==null||s==='') ? '' : String(s).replace(/_/g,' '); }
function fmtTime(t){ if(!t) return ''; const d=new Date(t); return isNaN(d) ? '' : d.toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function isHttp(u){ return typeof u==='string' && /^https?:\/\//i.test(u.trim()); }

// Card id — the brief's fn_horizon_review_feed rows key on `id` (matches
// kl_legislative_horizon). Fall back defensively so a differently-named key still acts.
function cardId(c){ return c && (c.id!=null?c.id : (c.card_id!=null?c.card_id : (c.horizon_id!=null?c.horizon_id : c.target_id))); }

// Confidence — the single most important fact on the row. The feed does not fix the
// column name in the brief, so read it defensively across the likely names, leading with
// `confidence`. Returns a number in 0..1, or null if genuinely absent (renders "—").
function readConfidence(c){
  if(!c) return null;
  const keys = ['confidence','confidence_score','self_confidence','model_confidence','model_self_confidence','generation_confidence'];
  for(const k of keys){
    const v = c[k];
    if(v!=null && v!=='' && !isNaN(Number(v))) return Number(v);
  }
  return null;
}
function fmtConf(n){ return (n==null || isNaN(n)) ? '—' : Number(n).toFixed(2); }
// Colour band (§3.2): <0.50 red / high-caution · 0.50–0.79 amber · ≥0.80 never appears here.
function confBand(n){
  if(n==null || isNaN(n)) return {cls:'unknown', label:'no score'};
  if(n < 0.50) return {cls:'red', label:'high caution'};
  if(n < 0.80) return {cls:'amber', label:'review'};
  return {cls:'green', label:'auto-publish'};
}

// ─── key_changes — defensive render (§3.3). Mirrors the KL engine hubIntelKeyChanges:
//     JSON.parse a string first; render every element as ESCAPED React children; never
//     String(object) → "[object Object]"; degrade gracefully when empty/unparseable. ───
function KcObject({el}){
  if(el==null || typeof el!=='object') return null;
  const change = el.change!=null ? String(el.change).trim() : '';
  const note = el.note!=null ? String(el.note).trim() : '';
  const primary = change!=='' ? change : note;
  if(primary==='') return null;
  const chips=[];
  if(el.severity!=null && String(el.severity).trim()!==''){
    const sev=String(el.severity).trim();
    const high=/high|critical|severe|urgent/i.test(sev);
    chips.push(<span key="sev" className={'kc-chip'+(high?' high':'')}>Severity: {sev}</span>);
  }
  if(el.expected!=null && String(el.expected).trim()!==''){
    chips.push(<span key="exp" className="kc-chip">Expected: {String(el.expected).trim()}</span>);
  }
  return (
    <div className="kc-item">
      <div>{primary}</div>
      {chips.length>0 && <div className="kc-chips">{chips}</div>}
    </div>
  );
}
function KeyChanges({raw}){
  let val = raw;
  if(val==null) return <div className="kc-empty">No key changes listed.</div>;
  if(typeof val==='string'){
    const s=val.trim();
    if(s==='') return <div className="kc-empty">No key changes listed.</div>;
    try{ val = JSON.parse(s); }
    catch(e){ return <div className="kc-list"><div className="kc-item">{s}</div></div>; }
    if(val==null) return <div className="kc-empty">No key changes listed.</div>;
  }
  if(Array.isArray(val)){
    const nodes=[];
    val.forEach((el,i)=>{
      if(el==null) return;
      if(typeof el==='object'){ nodes.push(<KcObject key={'kc'+i} el={el}/>); }
      else { const t=String(el).trim(); if(t!=='') nodes.push(<div key={'kc'+i} className="kc-item">{t}</div>); }
    });
    return nodes.length ? <div className="kc-list">{nodes}</div> : <div className="kc-empty">No key changes listed.</div>;
  }
  if(typeof val==='object'){ return <div className="kc-list"><KcObject el={val}/></div>; }
  const str=String(val).trim();
  return str!=='' ? <div className="kc-list"><div className="kc-item">{str}</div></div> : <div className="kc-empty">No key changes listed.</div>;
}

// key_changes → a pretty JSON string for the Edit textarea (arrays/objects stringified).
function kcToEditText(raw){
  if(raw==null) return '';
  if(typeof raw==='string'){
    const s=raw.trim();
    if(s==='') return '';
    try{ return JSON.stringify(JSON.parse(s), null, 2); }catch(e){ return raw; }
  }
  try{ return JSON.stringify(raw, null, 2); }catch(e){ return ''; }
}

// ─── the confidence pill (row + detail) ───
function ConfPill({value}){
  const band=confBand(value);
  return (
    <div className="conf">
      <span className={'conf-pill '+band.cls}><span className="conf-dot"/>{fmtConf(value)}</span>
      <span className={'conf-label '+band.cls}>{band.label}</span>
    </div>
  );
}

// ─── one review card — collapsed row (with confidence) → expandable detail ───
function ReviewCard({card, onActed}){
  const id = cardId(card);
  const conf = readConfidence(card);
  const band = confBand(conf);

  const [open,setOpen]=useState(false);
  const [mode,setMode]=useState(null);       // null | 'edit' | 'confirm' | 'reject'
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);         // { text, kind }
  const [done,setDone]=useState(false);      // acted → collapse actions

  // edit-in-place state
  const [eHead,setEHead]=useState('');
  const [eImpact,setEImpact]=useState('');
  const [ePrep,setEPrep]=useState('');
  const [eKc,setEKc]=useState('');
  const [eNote,setENote]=useState('');
  const [kcErr,setKcErr]=useState(null);

  // reject note
  const [rNote,setRNote]=useState('');

  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  function openEdit(){
    setEHead(card.headline_summary!=null ? String(card.headline_summary) : '');
    setEImpact(card.business_impact_html!=null ? String(card.business_impact_html) : '');
    setEPrep(card.preparatory_steps_html!=null ? String(card.preparatory_steps_html) : '');
    setEKc(kcToEditText(card.key_changes));
    setKcErr(null); setMsg(null); setMode('edit');
  }

  async function saveEdit(){
    if(busy) return;
    // Validate key_changes as JSON (an array) before sending — never corrupt the board.
    let kcVal = null;
    const kcRaw = eKc.trim();
    if(kcRaw!==''){
      try{ kcVal = JSON.parse(kcRaw); }
      catch(e){ setKcErr('Key changes must be valid JSON (e.g. an array of items).'); return; }
    }
    setKcErr(null); setBusy(true); setMsg(null);
    const edits = {
      headline_summary: eHead,
      business_impact_html: eImpact,
      preparatory_steps_html: ePrep,
      key_changes: kcRaw==='' ? null : kcVal,
    };
    try{
      const r = await actOnCard(id, 'edit', eNote, edits);
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_horizon_review_act edit HTTP '+r.status, r.json); setMsg({text:'Save failed ('+r.status+'). Your edits were not written.', kind:'err'}); setBusy(false); return; }
      setMsg({text:'Edits saved. Not published — approve when you are satisfied.', kind:'ok'});
      setBusy(false); setMode(null);
      onActed(); // re-fetch so the card shows the saved content
    }catch(e){
      console.error('fn_horizon_review_act edit error', e);
      if(mounted.current){ setMsg({text:"Couldn't reach the review service — retry.", kind:'err'}); setBusy(false); }
    }
  }

  async function approve(){
    if(busy) return;
    setBusy(true); setMsg(null);
    try{
      const r = await actOnCard(id, 'approve', null, null);
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_horizon_review_act approve HTTP '+r.status, r.json); setMsg({text:'Publish failed ('+r.status+'). The card was not published.', kind:'err'}); setBusy(false); return; }
      setMsg({text:'Published to Parliament Live.', kind:'ok'});
      setBusy(false); setMode(null); setDone(true);
      onActed();
    }catch(e){
      console.error('fn_horizon_review_act approve error', e);
      if(mounted.current){ setMsg({text:"Couldn't reach the review service — retry.", kind:'err'}); setBusy(false); }
    }
  }

  async function reject(){
    if(busy) return;
    if(!rNote.trim()){ setMsg({text:'A note is required to reject a card.', kind:'warn'}); return; }
    setBusy(true); setMsg(null);
    try{
      const r = await actOnCard(id, 'reject', rNote, null);
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_horizon_review_act reject HTTP '+r.status, r.json); setMsg({text:'Reject failed ('+r.status+').', kind:'err'}); setBusy(false); return; }
      setMsg({text:'Card rejected and archived.', kind:'ok'});
      setBusy(false); setMode(null); setDone(true);
      onActed();
    }catch(e){
      console.error('fn_horizon_review_act reject error', e);
      if(mounted.current){ setMsg({text:"Couldn't reach the review service — retry.", kind:'err'}); setBusy(false); }
    }
  }

  const impactHtml = sanitiseHtml(card.business_impact_html);
  const prepHtml = sanitiseHtml(card.preparatory_steps_html);

  return (
    <div className={'card'+(open?' open':'')}>
      <button className="card-head" onClick={()=>setOpen(o=>!o)} aria-expanded={open}>
        <span className="card-caret">{open?'▾':'▸'}</span>
        <div className="card-head-main">
          <div className="card-name">{card.legislation_short_name || card.legislation_title || 'Untitled card'}</div>
          <div className="card-meta">
            {card.lifecycle_state && <span className="meta-chip">{humanize(card.lifecycle_state)}</span>}
            {card.relevance_grade && <span className="meta-chip grade">Grade {humanize(card.relevance_grade)}</span>}
            {card.parliament_stage && <span className="meta-chip stage">{humanize(card.parliament_stage)}</span>}
          </div>
        </div>
        {/* confidence rendered on EVERY row (§3.2 / §6 check 5) */}
        <ConfPill value={conf}/>
      </button>

      {open && (
        <div className="detail">
          {/* headline */}
          <div className="detail-section">
            <div className="section-label">Headline</div>
            <div className="headline">{card.headline_summary || '—'}</div>
          </div>

          {/* key changes (JSON array → list) */}
          <div className="detail-section">
            <div className="section-label">Key changes</div>
            <KeyChanges raw={card.key_changes}/>
          </div>

          {/* business impact — MODEL-GENERATED HTML, sanitised */}
          <div className="detail-section">
            <div className="section-label">Business impact</div>
            {impactHtml
              ? <div className="model-html" dangerouslySetInnerHTML={{__html: impactHtml}}/>
              : <div className="model-html-empty">No business impact content.</div>}
          </div>

          {/* preparatory steps — MODEL-GENERATED HTML, sanitised */}
          <div className="detail-section">
            <div className="section-label">Preparatory steps</div>
            {prepHtml
              ? <div className="model-html" dangerouslySetInnerHTML={{__html: prepHtml}}/>
              : <div className="model-html-empty">No preparatory steps content.</div>}
          </div>

          {/* source + generation meta + confidence again (§3.3 / §6 check 5) */}
          <div className="detail-foot">
            {isHttp(card.source_url)
              ? <a className="src-link" href={card.source_url} target="_blank" rel="noopener noreferrer">Open the bill at source ↗</a>
              : <span className="meta-dim">No source link</span>}
            {card.content_generated_at && <span className="meta-dim">Generated {fmtTime(card.content_generated_at)}</span>}
            <span className={'conf-inline '+band.cls}>Model confidence {fmtConf(conf)} · {band.label}</span>
          </div>

          {/* ── Edit-in-place ── */}
          {mode==='edit' && (
            <div className="edit-pane">
              <div className="edit-field">
                <label>Headline</label>
                <input className="edit-input" value={eHead} onChange={e=>setEHead(e.target.value)}/>
              </div>
              <div className="edit-field">
                <label>Business impact <span className="edit-hint">— HTML; sanitised on render</span></label>
                <textarea className="edit-area code" rows={5} value={eImpact} onChange={e=>setEImpact(e.target.value)}/>
              </div>
              <div className="edit-field">
                <label>Preparatory steps <span className="edit-hint">— HTML; sanitised on render</span></label>
                <textarea className="edit-area code" rows={5} value={ePrep} onChange={e=>setEPrep(e.target.value)}/>
              </div>
              <div className="edit-field">
                <label>Key changes <span className="edit-hint">— JSON array</span></label>
                <textarea className="edit-area code" rows={6} value={eKc} onChange={e=>setEKc(e.target.value)}/>
                {kcErr && <div className="field-err">{kcErr}</div>}
              </div>
              <div className="edit-field">
                <label>Note <span className="edit-hint">— optional; filed with the edit</span></label>
                <textarea className="note-area" rows={2} value={eNote} onChange={e=>setENote(e.target.value)} placeholder="What did you change, and why?"/>
              </div>
              <div className="edit-actions">
                <button className="act-btn approve" disabled={busy} onClick={saveEdit}>{busy?<span className="spinner"/>:'Save edits'}</button>
                <button className="act-btn" disabled={busy} onClick={()=>{setMode(null);setKcErr(null);}}>Cancel</button>
                <span className="meta-dim">Editing does not publish.</span>
              </div>
            </div>
          )}

          {/* ── Approve & Publish — confirmation (the sentence stays, §3.4) ── */}
          {mode==='confirm' && (
            <div className="confirm-pane">
              <div className="confirm-copy">
                Publish this card to Parliament Live. It will be visible to all Knowledge Library users. The model's confidence in this content is {fmtConf(conf)}. <span className="judgement">You are approving it on your own judgement.</span>
              </div>
              <div className="confirm-actions">
                <button className="act-btn approve" disabled={busy} onClick={approve}>{busy?<span className="spinner"/>:'Confirm — publish now'}</button>
                <button className="act-btn" disabled={busy} onClick={()=>setMode(null)}>Cancel</button>
              </div>
            </div>
          )}

          {/* ── Reject — note required ── */}
          {mode==='reject' && (
            <div className="note-box reject">
              <span className="nb-label">Reject — a note is required</span>
              <textarea className="note-area" rows={3} value={rNote} onChange={e=>setRNote(e.target.value)} placeholder="Why is this card being rejected? Filed with the archive; the card is not deleted."/>
              <div className="note-actions">
                <button className="act-btn reject" disabled={busy || !rNote.trim()} onClick={reject}>{busy?<span className="spinner"/>:'Reject & archive'}</button>
                <button className="act-btn" disabled={busy} onClick={()=>setMode(null)}>Cancel</button>
              </div>
            </div>
          )}

          {/* ── action bar ── */}
          {!done && mode==null && (
            <div className="actions">
              <button className="act-btn edit" disabled={busy} onClick={openEdit}>Edit</button>
              <button className="act-btn approve" disabled={busy} onClick={()=>{setMsg(null);setMode('confirm');}}>Approve &amp; Publish</button>
              <button className="act-btn reject" disabled={busy} onClick={()=>{setMsg(null);setMode('reject');}}>Reject</button>
            </div>
          )}

          {msg && <div className={'act-msg '+msg.kind}>{msg.text}</div>}
        </div>
      )}
    </div>
  );
}

// ─── error banner (honest — the backend RPC may not be deployed yet, §1) ───
function ErrorBanner({status, onRetry}){
  const notDeployed = status===404;
  return (
    <div className="err-banner">
      <div className="err-body">
        <span>{notDeployed ? 'The review feed is not available yet.' : "Couldn't load the review queue."}</span>
        <span className="err-sub">
          {notDeployed
            ? 'fn_horizon_review_feed() returned 404 — the backend migration (AILANE-CC-BRIEF-HORIZON-REVIEW-BACKEND-001) is likely not deployed.'
            : ('fn_horizon_review_feed() failed'+(status?(' — HTTP '+status):'')+'.')}
        </span>
      </div>
      <button className="retry-btn" onClick={onRetry}>Retry</button>
    </div>
  );
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
function App(){
  const [auth,setAuth]=useState('checking');   // 'checking' | 'ok'
  const [cards,setCards]=useState(null);        // null = loading, [] = empty, [..] = rows
  const [err,setErr]=useState(null);            // { status } on feed failure
  const mounted=useRef(true);
  useEffect(()=>()=>{mounted.current=false;},[]);

  // Auth guard (§3.1 / RULE 26) — CEO only; body hidden until confirmed. getSession →
  // JWT email check → onAuthStateChange fallback (6s) → reveal or silent redirect to '/'
  // (matches the exemplar). The RPCs enforce the gate server-side too; this is UX, not security.
  useEffect(()=>{(async()=>{
    const deny=()=>window.location.replace('/'); // matches the exemplar + estate CEO-page convention
    const grant=()=>{ if(mounted.current) setAuth('ok'); };
    let session=null;
    try{ const r=await sb.auth.getSession(); session = r && r.data && r.data.session; }
    catch(e){ console.warn('getSession failed', e); }
    if(session){
      try{
        const p=JSON.parse(atob(session.access_token.split('.')[1]));
        if(p.email===CEO_EMAIL){ return grant(); }
      }catch(e){ /* malformed token — deny below */ }
      return deny();
    }
    const t=setTimeout(deny, 6000);
    sb.auth.onAuthStateChange((ev,sess)=>{
      if(sess){
        clearTimeout(t);
        try{
          const p=JSON.parse(atob(sess.access_token.split('.')[1]));
          if(p.email===CEO_EMAIL){ grant(); } else { deny(); }
        }catch(e){ deny(); }
      }
    });
  })();},[]);

  useEffect(()=>{ if(auth==='ok') document.body.style.visibility='visible'; },[auth]);

  // The queue (§3.2). fn_horizon_review_feed() returns cards awaiting review, ordered
  // lowest-confidence first — we preserve that server order (no client re-sort).
  const loadFeed=useCallback(async()=>{
    setErr(null);
    try{
      const r=await rpc('fn_horizon_review_feed', {});
      if(!mounted.current) return;
      if(!r.ok){ console.error('fn_horizon_review_feed HTTP '+r.status, r.json); setErr({status:r.status}); setCards(null); return; }
      setCards(Array.isArray(r.json) ? r.json.slice() : []);
    }catch(e){ console.error('fn_horizon_review_feed error', e); if(mounted.current){ setErr({status:0}); setCards(null); } }
  },[]);

  useEffect(()=>{ if(auth==='ok') loadFeed(); },[auth,loadFeed]);

  if(auth!=='ok') return null; // body hidden during check; redirect handles any failure

  const count = Array.isArray(cards) ? cards.length : 0;

  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Horizon <span>Review</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">Human gate · read · edit · approve · reject</div>
        </div>
      </div>

      <div className="main">
        <div className="intro">
          <span className="intro-icon">◈</span>
          <span className="intro-text">
            These cards were <strong>withheld by the confidence gate</strong> — the generator auto-publishes only when its self-confidence is ≥ 0.80. Everything below scored lower and is waiting for you. <strong>Read what the model actually wrote</strong> before you approve it: open a card, check the impact against the source, edit if needed, then decide. Lowest confidence is first.
          </span>
        </div>

        <div className="toolbar">
          <span className="toolbar-count">{cards==null ? 'Loading…' : (<span><strong>{count}</strong> card{count===1?'':'s'} awaiting review</span>)}</span>
          <div className="tab-spacer"/>
          <button className="refresh-btn" onClick={loadFeed}>↻ Refresh</button>
        </div>

        {err && <ErrorBanner status={err.status} onRetry={loadFeed}/>}

        {!err && cards==null && <div className="muted-note">Loading review queue…</div>}

        {!err && cards && cards.length===0 && (
          <div className="empty-state"><span className="es-emoji">✓</span>No cards awaiting review.</div>
        )}

        {!err && cards && cards.length>0 && (
          <div className="queue">
            {cards.map((c,i)=> <ReviewCard key={cardId(c)!=null?cardId(c):i} card={c} onActed={loadFeed}/>)}
          </div>
        )}

        {/* intelligence-not-advice disclaimer (AILANE-SPEC-PLUGIN-001 §14.3) */}
        <footer className="page-disclaimer">
          <span>This page publishes regulatory intelligence for the Director's decision — not legal advice (AILANE-SPEC-PLUGIN-001 Art XIV §14.3).</span>
          <a href="/terms/" target="_blank" rel="noopener noreferrer">Terms</a>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
