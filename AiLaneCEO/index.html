/* ═══════════════════════════════════════════════
   AILANE CEO COMMAND CENTRE — DESIGN SYSTEM
   ═══════════════════════════════════════════════ */

:root {
  /* Deep space palette */
  --bg-void: #050810;
  --bg-base: #070B14;
  --bg-surface: #0C1220;
  --bg-elevated: #111B2E;
  --bg-hover: #162238;
  --bg-glass: rgba(12, 18, 32, 0.85);

  /* Borders & lines */
  --border-subtle: rgba(255, 255, 255, 0.04);
  --border-default: rgba(255, 255, 255, 0.07);
  --border-strong: rgba(255, 255, 255, 0.12);
  --border-accent: rgba(14, 165, 233, 0.3);

  /* Text */
  --text-primary: #E2E8F0;
  --text-secondary: #7A8BA8;
  --text-muted: #4A5568;
  --text-accent: #38BDF8;

  /* Accents */
  --accent-cyan: #0EA5E9;
  --accent-cyan-dim: rgba(14, 165, 233, 0.15);
  --accent-green: #10B981;
  --accent-green-dim: rgba(16, 185, 129, 0.15);
  --accent-red: #EF4444;
  --accent-red-dim: rgba(239, 68, 68, 0.15);
  --accent-amber: #F59E0B;
  --accent-amber-dim: rgba(245, 158, 11, 0.15);
  --accent-purple: #8B5CF6;
  --accent-purple-dim: rgba(139, 92, 246, 0.15);

  /* Radii */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  /* Shadows */
  --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.2);
  --shadow-glow-cyan: 0 0 20px rgba(14, 165, 233, 0.1);
  --shadow-glow-green: 0 0 20px rgba(16, 185, 129, 0.1);

  /* Typography */
  --font-display: 'Outfit', sans-serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(14, 165, 233, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(14, 165, 233, 0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* Subtle top glow */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(14, 165, 233, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

/* ═══════ LOADING SCREEN ═══════ */
.auth-gate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 20px;
}

.auth-gate .logo-mark {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent-cyan);
}

.pulse-ring {
  width: 40px; height: 40px;
  border: 2px solid var(--accent-cyan);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════ TOP BAR ═══════ */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.brand-mark {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.brand-mark span { color: var(--accent-cyan); }

.brand-divider {
  width: 1px;
  height: 20px;
  background: var(--border-strong);
}

.brand-subtitle {
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 0.7rem;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.03em;
}

.status-pill.live {
  background: var(--accent-green-dim);
  color: var(--accent-green);
  border: 1px solid rgba(16, 185, 129, 0.2);
}

.status-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.timestamp-display {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
}

.btn-sm {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-sm:hover {
  border-color: var(--border-accent);
  color: var(--text-accent);
  background: var(--bg-hover);
}

/* ═══════ QUICK ACTIONS ═══════ */
.quick-actions {
  display: flex;
  gap: 8px;
  padding: 12px 32px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border-subtle);
}

.qa-btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 0.73rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  text-decoration: none;
}

.qa-btn:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border-color: var(--border-strong);
}

/* ═══════ DASHBOARD GRID ═══════ */
.dashboard {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 20px 32px 40px;
  max-width: 1440px;
  margin: 0 auto;
}

.grid-row {
  display: grid;
  gap: 16px;
}

.grid-row.two-col { grid-template-columns: 1fr 1fr; }
.grid-row.full { grid-template-columns: 1fr; }

/* ═══════ CARD ═══════ */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent-cyan)), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card:hover {
  border-color: var(--border-strong);
  background: var(--bg-elevated);
  box-shadow: var(--shadow-card);
  transform: translateY(-1px);
}

.card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px 0;
}

.card-title-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.card-icon.cyan { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
.card-icon.green { background: var(--accent-green-dim); color: var(--accent-green); }
.card-icon.purple { background: var(--accent-purple-dim); color: var(--accent-purple); }
.card-icon.amber { background: var(--accent-amber-dim); color: var(--accent-amber); }
.card-icon.red { background: var(--accent-red-dim); color: var(--accent-red); }

.card-title {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.card-badge {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 3px 8px;
  border-radius: 100px;
  background: var(--bg-hover);
  color: var(--text-muted);
  border: 1px solid var(--border-subtle);
}

.card-body { padding: 16px 22px 20px; }

/* ═══════ KPI ROW ═══════ */
.kpi-row {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
}

.kpi {
  flex: 1;
  min-width: 0;
}

.kpi-label {
  font-size: 0.65rem;
  font-family: var(--font-body);
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 3px;
}

.kpi-value {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
}

.kpi-value.positive { color: var(--accent-green); }
.kpi-value.negative { color: var(--accent-red); }
.kpi-value.accent { color: var(--accent-cyan); }

.kpi-sub {
  font-size: 0.65rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 1px;
}

/* ═══════ TRANSACTION LIST ═══════ */
.tx-list { display: flex; flex-direction: column; gap: 0; }

.tx-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-top: 1px solid var(--border-subtle);
}

.tx-row:first-child { border-top: none; }

.tx-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.tx-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tx-indicator.credit { background: var(--accent-green); }
.tx-indicator.debit { background: var(--accent-red); opacity: 0.6; }

.tx-name {
  font-size: 0.78rem;
  color: var(--text-primary);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tx-time {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-muted);
}

.tx-amount {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
  padding-left: 12px;
}

.tx-amount.credit { color: var(--accent-green); }
.tx-amount.debit { color: var(--text-secondary); }

/* ═══════ STAT GRID ═══════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.stat-cell {
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}

.stat-cell-label {
  font-size: 0.62rem;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.stat-cell-value {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
}

/* ═══════ MINI BAR CHART ═══════ */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 32px;
  margin-top: 8px;
}

.bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  min-height: 3px;
  transition: height 0.6s ease;
}

/* ═══════ TAG / CHIP ═══════ */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 100px;
  font-size: 0.65rem;
  font-family: var(--font-mono);
  font-weight: 500;
  border: 1px solid;
}

.chip.cyan { background: var(--accent-cyan-dim); color: var(--accent-cyan); border-color: rgba(14,165,233,0.15); }
.chip.green { background: var(--accent-green-dim); color: var(--accent-green); border-color: rgba(16,185,129,0.15); }
.chip.red { background: var(--accent-red-dim); color: var(--accent-red); border-color: rgba(239,68,68,0.15); }
.chip.amber { background: var(--accent-amber-dim); color: var(--accent-amber); border-color: rgba(245,158,11,0.15); }
.chip.purple { background: var(--accent-purple-dim); color: var(--accent-purple); border-color: rgba(139,92,246,0.15); }

/* ═══════ PRODUCT ROW ═══════ */
.product-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-top: 1px solid var(--border-subtle);
}

.product-row:first-child { border-top: none; }

.product-name {
  font-size: 0.76rem;
  color: var(--text-primary);
  font-weight: 500;
}

.product-price {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  color: var(--accent-cyan);
  font-weight: 600;
}

/* ═══════ FEEDBACK BAR ═══════ */
.feedback-strip {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 16px 22px;
  flex-wrap: wrap;
}

.feedback-metric {
  display: flex;
  align-items: center;
  gap: 8px;
}

.feedback-metric-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
}

.feedback-metric-text {
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.feedback-metric-text strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* ═══════ TIMELINE ═══════ */
.timeline { display: flex; flex-direction: column; gap: 0; }

.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 8px 0;
  border-top: 1px solid var(--border-subtle);
}

.timeline-item:first-child { border-top: none; }

.timeline-date {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  min-width: 72px;
  flex-shrink: 0;
  padding-top: 2px;
}

.timeline-content {
  font-size: 0.76rem;
  color: var(--text-primary);
  font-weight: 400;
  line-height: 1.4;
}

.timeline-content .highlight { color: var(--accent-cyan); font-weight: 500; }

/* ═══════ SKELETON LOADER ═══════ */
.skeleton {
  background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 50%, var(--bg-elevated) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.skeleton-line { height: 14px; margin-bottom: 8px; }
.skeleton-value { height: 28px; width: 80px; margin-bottom: 4px; }

/* ═══════ TOAST ═══════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 0.78rem;
  color: var(--text-primary);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: toast-in 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 360px;
}

@keyframes toast-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════ RESPONSIVE ═══════ */
@media (max-width: 900px) {
  .grid-row.two-col { grid-template-columns: 1fr; }
  .dashboard { padding: 16px; }
  .top-bar { padding: 12px 16px; }
  .quick-actions { padding: 10px 16px; }
  .kpi-value { font-size: 1.1rem; }
}

/* ═══════ CARD LINK ARROW ═══════ */
.card-arrow {
  font-size: 0.85rem;
  color: var(--text-muted);
  transition: all 0.2s ease;
}

.card:hover .card-arrow {
  color: var(--accent-cyan);
  transform: translateX(2px);
}

/* Section label */
.section-label {
  font-family: var(--font-display);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 8px 0 2px;
}

/* Eileen chat styling now provided by /assets/eileen-panel.css */

/* ═══ REGULATORY INTELLIGENCE PANELS (Daily Brief + Notice Board) ═══ */
.card.reg-panel { cursor: default; }
.card.reg-panel:hover { transform: none; border-color: var(--border-default); background: var(--bg-surface); box-shadow: none; }
.card.reg-panel:hover::before { opacity: 0; }
.reg-gen-btn { font-family: var(--font-body); font-size: 0.68rem; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-accent); background: var(--accent-cyan-dim); color: var(--accent-cyan); cursor: pointer; transition: all 0.2s; }
.reg-gen-btn:hover:not(:disabled) { background: rgba(14,165,233,0.22); }
.reg-gen-btn:disabled { opacity: 0.55; cursor: not-allowed; }
.reg-muted { color: var(--text-muted); font-size: 0.78rem; padding: 8px 0; }
.reg-err { color: #DC2626; font-size: 0.72rem; margin-top: 8px; }
.reg-meta { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); margin-top: 12px; }
.reg-sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.reg-source-chip { font-size: 0.62rem; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--border-default); background: var(--bg-base); color: var(--accent-cyan); text-decoration: none; }
.reg-source-chip:hover { border-color: var(--border-accent); }
.reg-count { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); background: var(--bg-base); border: 1px solid var(--border-default); border-radius: 100px; padding: 2px 10px; }
.md-body { margin-top: 4px; }
.md-p { font-size: 0.8rem; line-height: 1.65; color: var(--text-secondary); margin: 0 0 10px; }
.md-h1 { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text-primary); margin: 4px 0 8px; }
.md-h2 { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; color: var(--text-primary); margin: 12px 0 6px; }
.md-h3 { font-family: var(--font-display); font-size: 0.82rem; font-weight: 600; color: var(--text-primary); margin: 10px 0 5px; }

function formatGBP(val) {
  const n = Number(val);
  if (isNaN(n)) return '—';
  return '£' + Math.abs(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatNum(val) {
  const n = Number(val);
  if (isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function friendlySupplier(name) {
  if (!name) return 'Unknown';
  if (name.includes('Mz-Director L2B')) return 'Director Loan';
  if (name.includes('Ailane Limited')) return 'Stripe Test Charge';
  if (name.includes('Anthropic')) return 'Anthropic API';
  if (name.includes('Information Comm')) return 'ICO Registration';
  if (name.includes('Google')) return 'Google';
  return name;
}

// Minimal Markdown → React (headings, bold, lists, links) — no new dependency.
function regInline(text, kb) {
  if (text == null) return null;
  const s = String(text); const nodes = []; let last = 0, k = 0, m;
  const re = /(\[([^\]]+)\]\((https?:\/\/[^\s)]+)\))|(\*\*([^*]+)\*\*)/g;
  while ((m = re.exec(s))) {
    if (m.index > last) nodes.push(s.slice(last, m.index));
    if (m[1]) nodes.push(<a key={kb+'l'+(k++)} href={m[3]} target="_blank" rel="noopener">{m[2]}</a>);
    else if (m[4]) nodes.push(<strong key={kb+'b'+(k++)}>{m[5]}</strong>);
    last = m.index + m[0].length;
  }
  if (last < s.length) nodes.push(s.slice(last));
  return nodes;
}
function renderMarkdown(md) {
  if (!md) return null;
  const lines = String(md).replace(/\r\n/g, '\n').split('\n');
  const out = []; let list = null; let k = 0;
  const flush = () => { if (list) { out.push(<ul key={'ul'+(k++)} className="md-ul">{list}</ul>); list = null; } };
  lines.forEach((raw, i) => {
    const line = raw.replace(/\s+$/, '');
    if (/^\s*[-*]\s+/.test(line)) { (list = list || []).push(<li key={'li'+i}>{regInline(line.replace(/^\s*[-*]\s+/, ''), 'li'+i)}</li>); return; }
    flush();
    if (line.trim() === '') return;
    const mh = line.match(/^(#{1,6})\s+(.*)$/);
    if (mh) { const lvl = Math.min(mh[1].length, 4); out.push(<div key={'h'+i} className={'md-h'+lvl}>{regInline(mh[2], 'h'+i)}</div>); }
    else out.push(<p key={'p'+i} className="md-p">{regInline(line, 'p'+i)}</p>);
  });
  flush();
  return out;
}
function regDateTime(s) { if (!s) return '—'; try { return new Date(s).toLocaleString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); } catch (e) { return String(s); } }

  async function loadIntel() {
    try {
      const r = await fetch(`${SUPABASE_URL}/functions/v1/ceo-reg-intel?section=all`, { headers: H });

    } catch (e) { if (mounted.current) { console.error('ceo-reg-intel', e); setIntelErr('Network error loading regulatory intelligence.'); } }
  }
  async function loadAlerts() {
    try {
      const r = await rest('vw_ceo_governance_alerts?select=*&order=detected_at.desc&limit=50');

        </Tile>

        {/* 6 — GOVERNANCE ALERTS → modal */}
        <Tile iconClass={breached > 0 ? 'red' : 'cyan'} accent={breached > 0 ? 'var(--accent-red)' : 'var(--accent-cyan)'} icon={<Icons.zap />} title="Governance Alerts"
          status={openAlerts != null ? <StatusDot color={breached > 0 ? 'var(--accent-red)' : 'var(--accent-cyan)'} label={String(openAlerts)} /> : null}
          onClick={() => setModal('alerts')}>
          <div className="tile-headline">
            {openAlerts != null ? <span><strong>{openAlerts} open</strong>{breached > 0 ? ' · ' + breached + ' SLA-breached' : ''}</span> : 'Loading…'}
          </div>
        </Tile>

      </div>

      {modal === 'brief' && (
        <Modal title="Daily Brief from Eileen" icon={<Icons.msg />} onClose={() => setModal(null)}
          headRight={<button className="reg-gen-btn" disabled={genBusy} onClick={generateBrief}>{genBusy ? 'Generating…' : 'Generate brief now'}</button>}>
          <BriefModalBody brief={brief} generatedAt={generatedAt} genBusy={genBusy} genMsg={genMsg} />
        </Modal>
      )}
      {modal === 'notices' && (
        <Modal title="Regulatory Notice Board" icon={<Icons.shield />} onClose={() => setModal(null)}
          headRight={noticeTotal != null ? <span className="reg-count">{noticeTotal}</span> : null}>
          <NoticesModalBody data={intel} err={intelErr} />
        </Modal>
      )}
      {modal === 'alerts' && (
        <Modal title="Governance Alerts" icon={<Icons.zap />} onClose={() => setModal(null)}
          headRight={openAlerts != null ? <span className="reg-count">{openAlerts}</span> : null}>
          <AlertsModalBody alerts={alerts} />
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function App() {
  const [authState, setAuthState] = useState('checking'); // checking | needs_login | wrong_user | ok
  const [token, setToken] = useState(null);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [now, setNow] = useState(new Date());

  // Clock tick
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  // Auth check — self-contained: handles PKCE code exchange + existing session + sign-in
  useEffect(() => {
    async function checkAuth() {
      // Step 1: Check for PKCE ?code= parameter (returning from Google OAuth)
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');
      if (code) {
        try {
          const { data: { session: newSession }, error } = await sb.auth.exchangeCodeForSession(code);
          // Clean the URL
          url.searchParams.delete('code');
          window.history.replaceState({}, '', url.pathname);
          if (newSession && !error) {
            const payload = JSON.parse(atob(newSession.access_token.split('.')[1]));
            if (payload.email === CEO_EMAIL) {
              setToken(newSession.access_token);
              setAuthState('ok');
              return;
            }
          }
        } catch (e) {
          console.error('PKCE exchange failed:', e);
        }
        // If code exchange failed or wrong email, fall through to session check
      }

      // Step 2: Check for existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const payload = JSON.parse(atob(session.access_token.split('.')[1]));
        if (payload.email === CEO_EMAIL) {
          setToken(session.access_token);
          setAuthState('ok');
          return;
        } else {
          setAuthState('wrong_user');
          return;
        }
      }

      // Step 3: Listen for auth state changes (handles hash fragment flows)
      const timeout = setTimeout(() => setAuthState('needs_login'), 4000);
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, sess) => {
        if (sess) {
          clearTimeout(timeout);
          const payload = JSON.parse(atob(sess.access_token.split('.')[1]));
          if (payload.email === CEO_EMAIL) {
            setToken(sess.access_token);
            setAuthState('ok');
          } else {
            setAuthState('wrong_user');
          }
        }
      });
      return () => { clearTimeout(timeout); subscription?.unsubscribe(); };
    }
    checkAuth();
  }, []);

  // Fetch data when authenticated
  useEffect(() => {
    if (authState !== 'ok' || !token) return;

    async function load() {
      setLoading(true);
      const result = await fetchDashboardData(token);
      if (result) {
        setData(result);
        setLastRefresh(new Date());
      }
      setLoading(false);
    }
    load();

    // Auto-refresh every 5 minutes
    const interval = setInterval(load, 300000);
    return () => clearInterval(interval);
  }, [authState, token]);

  // Realtime subscription for Monzo
  useEffect(() => {
    if (authState !== 'ok') return;

    const channel = sb
      .channel('ceo-monzo-live')
      .on('postgres_changes', { event: 'INSERT', schema: 'accounts', table: 'transactions' }, (payload) => {
        const tx = payload.new;
        // Add to data
        setData(prev => {
          if (!prev || !prev.sections?.financial) return prev;
          const updated = { ...prev };
          const fin = { ...updated.sections.financial };
          fin.recent_transactions = [tx, ...(fin.recent_transactions || [])].slice(0, 20);
          // Recalc summary
          const amt = Number(tx.amount);
          const sum = { ...fin.summary };
          sum.total_transactions = (sum.total_transactions || 0) + 1;
          if (tx.is_revenue) { sum.total_credits = Number(sum.total_credits || 0) + amt; }
          else { sum.total_debits = Number(sum.total_debits || 0) + amt; }
          sum.net_position = Number(sum.total_credits) - Number(sum.total_debits);
          fin.summary = sum;
          updated.sections = { ...updated.sections, financial: fin };
          return updated;
        });
        // Show toast
        const label = friendlySupplier(tx.supplier_name);
        const prefix = tx.is_revenue ? '+' : '-';
        addToast(`${prefix}£${Number(tx.amount).toFixed(2)} — ${label}`);
      })
      .subscribe();

    return () => { sb.removeChannel(channel); };
  }, [authState]);

  function addToast(msg) {
    setToasts(prev => [...prev, msg]);
    setTimeout(() => setToasts(prev => prev.slice(1)), 4000);
  }

  // Sign in handlers
  const [loginEmail, setLoginEmail] = useState('');
  const [loginPassword, setLoginPassword] = useState('');
  const [loginError, setLoginError] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);

  async function handleEmailSignIn(e) {
    if (e) e.preventDefault();
    setLoginError('');
    setLoginLoading(true);
    const { data: { session: newSession }, error } = await sb.auth.signInWithPassword({
      email: loginEmail,
      password: loginPassword
    });
    if (error) {
      setLoginError(error.message);
      setLoginLoading(false);
      return;
    }
    if (newSession) {
      const payload = JSON.parse(atob(newSession.access_token.split('.')[1]));
      if (payload.email === CEO_EMAIL) {
        setToken(newSession.access_token);
        setAuthState('ok');
      } else {
        await sb.auth.signOut();
        setLoginError('Access restricted to CEO account');
        setLoginLoading(false);
      }
    }
  }

  // Loading / Auth gates
  if (authState === 'checking') {
    return (
      <div className="auth-gate">
        <div className="logo-mark">AILANE</div>
        <div className="pulse-ring" />
        <div style={{color:'var(--text-muted)',fontSize:'0.8rem',fontFamily:'var(--font-mono)'}}>Authenticating...</div>
      </div>
    );
  }

  if (authState === 'needs_login') {
    const inputStyle = {
      width:'100%',
      padding:'11px 14px',
      borderRadius:'var(--radius-sm)',
      border:'1px solid var(--border-strong)',
      background:'var(--bg-base)',
      color:'var(--text-primary)',
      fontFamily:'var(--font-body)',
      fontSize:'0.85rem',
      outline:'none',
      transition:'border-color 0.2s'
    };
    const btnStyle = {
      width:'100%',
      padding:'12px',
      borderRadius:'var(--radius-sm)',
      border:'none',
      background:'var(--accent-cyan)',
      color:'#fff',
      fontFamily:'var(--font-body)',
      fontSize:'0.88rem',
      fontWeight:'600',
      cursor:'pointer',
      opacity: loginLoading ? 0.6 : 1,
      transition:'opacity 0.2s'
    };

    return (
      <div className="auth-gate">
        <div className="logo-mark">AILANE</div>
        <div style={{color:'var(--text-secondary)',fontSize:'0.85rem',marginBottom:'28px',fontFamily:'var(--font-body)'}}>CEO Command Centre</div>
        <div style={{width:'100%',maxWidth:'340px',display:'flex',flexDirection:'column',gap:'12px'}}>
          <input
            type="email"
            placeholder="Email"
            value={loginEmail}
            onChange={e => setLoginEmail(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleEmailSignIn()}
            style={inputStyle}
            autoFocus
          />
          <input
            type="password"
            placeholder="Password"
            value={loginPassword}
            onChange={e => setLoginPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleEmailSignIn()}
            style={inputStyle}
          />
          {loginError && (
            <div style={{color:'var(--accent-red)',fontSize:'0.75rem',fontFamily:'var(--font-mono)'}}>{loginError}</div>
          )}
          <button onClick={handleEmailSignIn} disabled={loginLoading} style={btnStyle}>
            {loginLoading ? 'Signing in...' : 'Sign In'}
          </button>
        </div>
        <div style={{color:'var(--text-muted)',fontSize:'0.65rem',fontFamily:'var(--font-mono)',marginTop:'20px'}}>Restricted access · CEO only</div>
      </div>
    );
  }

  if (authState === 'wrong_user') {
    return (
      <div className="auth-gate">
        <div className="logo-mark">AILANE</div>
        <div style={{color:'var(--accent-red)',fontSize:'0.85rem',marginBottom:'12px'}}>Access restricted to CEO account</div>
        <button onClick={async () => { await sb.auth.signOut(); setAuthState('needs_login'); }} style={{
          padding:'10px 24px',
          borderRadius:'var(--radius-md)',
          border:'1px solid var(--border-default)',
          background:'var(--bg-surface)',
          color:'var(--text-secondary)',
          fontFamily:'var(--font-body)',
          fontSize:'0.82rem',
          cursor:'pointer'
        }}>
          Sign out and try again
        </button>
      </div>
    );
  }

  const sections = data?.sections || {};

  return (
    <div>
      {/* ═══ TOP BAR ═══ */}
      <div className="top-bar">
        <div className="top-bar-left">
          <div className="brand-mark">AI<span>LANE</span></div>
          <div className="brand-divider" />
          <div className="brand-subtitle">CEO Command Centre</div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot" />LIVE</div>
          <div className="timestamp-display">
            {now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })}
            {' · '}
            {now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}
          </div>
          {lastRefresh && (
            <div className="timestamp-display" style={{opacity:0.6}}>
              Refreshed {timeAgo(lastRefresh.toISOString())}
            </div>
          )}
          <a href="/" className="btn-sm"><Icons.ext /> Site</a>
          <button className="btn-sm" onClick={() => sb.auth.signOut().then(() => window.location.href = '/account/')}>
            Sign Out
          </button>
        </div>
      </div>

      {/* ═══ QUICK ACTIONS ═══ */}
      <div className="quick-actions">
        <a href="/contract-scan/" className="qa-btn">⚡ Run Compliance Check</a>
        <a href="/intelligence/" className="qa-btn">🔍 Intelligence Hub</a>
        <a href="https://dashboard.stripe.com" target="_blank" rel="noopener" className="qa-btn">💳 Stripe Dashboard</a>
        <a href="https://ads.google.com" target="_blank" rel="noopener" className="qa-btn">📊 Google Ads</a>
        <a href="https://analytics.google.com" target="_blank" rel="noopener" className="qa-btn">📈 GA4</a>
        <a href="https://cnbsxwtvazfvzmltkuvx.supabase.co" target="_blank" rel="noopener" className="qa-btn">🗄️ Supabase</a>
        <a href="/ticker/" className="qa-btn">📰 Ticker</a>
        <a href="/knowledge-library-preview/" className="qa-btn">📚 Knowledge Library</a>
        <a href="/AiLaneCEO/infrastructure/" className="qa-btn" style={{borderColor:'rgba(14,165,233,0.3)',color:'var(--accent-cyan)'}}>⚙️ Infrastructure</a>
      </div>

      {/* ═══ DASHBOARD GRID ═══ */}
      <div className="dashboard">

        {/* Command tiles — BRIEF CEO-DASH-IA-001 §2 (Deal Rooms · Legal · Brief · Notices · KL/Estate · Alerts) */}
        <CommandCentre token={token} sections={sections} />

        {/* Business operations — retained beneath the command tiles (Director: keep, do not remove) */}
        <div className="section-band"><div className="section-label">Business Operations</div><div className="band-rule" /></div>

        <div className="grid-row two-col">
          {loading ? <SkeletonCard /> : <AccountsCard financial={sections.financial} />}
          {loading ? <SkeletonCard /> : <ClientsCard platform={sections.platform} />}
        </div>

        <div className="grid-row two-col">
          {loading ? <SkeletonCard /> : <AnalyticsCard pipeline={sections.pipeline} />}
          {loading ? <SkeletonCard /> : <ProductsCard financial={sections.financial} compliance={sections.compliance} />}
        </div>

        <div className="grid-row full">
          <FeedbackBar />
        </div>

        <div className="grid-row two-col">
          <CalendarCard />
        </div>

        {/* QTAiLane — demoted to a dormant footer (RULE 14) */}
        <QTAiLaneFooter />

      </div>

      {/* Eileen mounted globally via /assets/eileen-panel.js */}

      <ToastContainer toasts={toasts} />
    </div>
  );
}

</script>
