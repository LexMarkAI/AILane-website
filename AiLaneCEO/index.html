// ─── SIC → ACEI SECTOR MAPPING ───────────────────────────────────────────
const mapSicToSector = (sic) => {
  if (!sic) return null;
  const c = parseInt(String(sic).replace(/\D/g, "").substring(0, 4));
  if (c >= 6400 && c < 6700) return "financial_services";
  if (c >= 6900 && c < 7600) return "professional_services";
  if (c >= 8600 && c < 8900) return "healthcare";
  if (c >= 6200 && c < 6400) return "technology";
  if ((c >= 4700 && c < 4800) || (c >= 5500 && c < 5700)) return "retail_hospitality";
  if (c >= 1000 && c < 3400) return "manufacturing";
  if (c >= 4100 && c < 4400) return "construction";
  if (c >= 8500 && c < 8600) return "education";
  if (c >= 8400 && c < 8500) return "public_sector";
  if ((c >= 9400 && c < 9500) || c === 9000) return "charities";
  if (c >= 4900 && c < 5500) return "transport_logistics";
  if ((c >= 5900 && c < 6200) || (c >= 9000 && c < 9400)) return "media_entertainment";
  return "professional_services";
};

// ─── POSTCODE → JURISDICTION MAPPING ─────────────────────────────────────
const mapPostcodeToJurisdiction = (pc) => {
  if (!pc) return "wales";
  const p = pc.toUpperCase().replace(/\s/g,"");
  if (/^(E\d|EC|N\d|NW|SE|SW|W\d|WC)/.test(p)) return "london";
  if (/^(AB|DD|DG|EH|FK|G\d|IV|KA|KW|KY|ML|PA|PH|TD|ZE)/.test(p)) return "scotland";
  if (/^BT/.test(p)) return "northern_ireland";
  if (/^(AL|CM|CO|EN|HP|LU|MK|OX|RG|RH|SG|SL|SO|TN|TW|UB|WD)/.test(p)) return "south_east";
  if (/^(BL|FY|LA|M\d|OL|PR|SK|WA|WN)/.test(p)) return "north_west";
  if (/^(B\d|CV|DY|ST|TF|WS|WV)/.test(p)) return "west_midlands";
  if (/^(DE|DN|LE|LN|NG|NN|PE)/.test(p)) return "east_midlands";
  if (/^(CF|LD|LL|NP|SA|SY)/.test(p)) return "wales";
  if (/^(BA|BH|BS|DT|EX|GL|GU|PL|PO|TA|TQ|TR)/.test(p)) return "south_west";
  if (/^(DH|DL|HG|HU|HX|LS|NE|SR|TS|YO)/.test(p)) return "north_east";
  return "wales";
};

  public_sector: 72, financial_services: 68, professional_services: 62,
  healthcare: 65, media_entertainment: 58, technology: 52, education: 60,

// ─── CIP ACEI ESTIMATE COMPUTATION ───────────────────────────────────────
const computeACEIEstimate = (sector, jurisdiction) => {
  const baseDi = SECTOR_BASE_DI[sector] || 50;
  const jObj = JURISDICTIONS.find(j => j.id === jurisdiction);
  const jm = jObj ? jObj.jm : 1.0;
  return Math.min(100, Math.round(baseDi * jm));
};

// ─── CIP GRADE COMPUTATION (CIP-SPEC-v1.0 §3.2) ──────────────────────────
const GRADE_BANDS = [
  { min: 85, grade: "A+", label: "Prime Target",    color: "#8B0000", action: "Direct CEO outreach — priority queue" },
  { min: 70, grade: "A",  label: "High Priority",   color: "#C0392B", action: "CEO outreach within 5 business days" },
  { min: 55, grade: "B+", label: "Solid Prospect",  color: "#D4760A", action: "Queue for outreach in next cycle" },
  { min: 40, grade: "B",  label: "Qualified Lead",  color: "#B8860B", action: "Add to watchlist; revisit in 30 days" },
  { min: 20, grade: "C",  label: "Early Stage",     color: "#5588AA", action: "Log only — no active outreach" },
  { min:  0, grade: "D",  label: "Disqualified",    color: "#888888", action: "Exclude from pipeline" },
];
const computeCIPGrade = ({ aceiEst, headcount, hasTribunal, sectorMultiplier, hasEmail, hasWebsite, companyStatus, hasDisputeSignals, newlyIncorporated }) => {
  const dissolved = ["dissolved","removed","liquidation","administration","converted-closed"].includes((companyStatus||"").toLowerCase());
  if (dissolved) return { score: 0, ...GRADE_BANDS[5], signals: [{ label: "Company Status", pts: -50, reason: "Dissolved / removed / administration" }] };
  const signals = [];
  let score = 50;
  // ACEI band
  if (aceiEst >= 80)      { score += 25; signals.push({ label: "ACEI Band", pts: +25, reason: `Critical band (${aceiEst})` }); }
  else if (aceiEst >= 60) { score += 18; signals.push({ label: "ACEI Band", pts: +18, reason: `Elevated band (${aceiEst})` }); }
  else if (aceiEst >= 40) { score += 10; signals.push({ label: "ACEI Band", pts: +10, reason: `Moderate band (${aceiEst})` }); }
  else                    { signals.push({ label: "ACEI Band", pts: 0, reason: `Low/Minimal band (${aceiEst})` }); }
  // Headcount
  if (headcount >= 2000)       { score += 15; signals.push({ label: "Headcount", pts: +15, reason: "2,000+ employees (Institutional range)" }); }
  else if (headcount >= 100)   { score += 20; signals.push({ label: "Headcount", pts: +20, reason: "100–2,000 employees (Governance range)" }); }
  else if (headcount >= 25)    { score += 10; signals.push({ label: "Headcount", pts: +10, reason: "25–100 employees (Operational Readiness range)" }); }
  else if (headcount > 0)      { score -= 10; signals.push({ label: "Headcount", pts: -10, reason: "Under 25 employees" }); }
  else                         { signals.push({ label: "Headcount", pts: 0, reason: "Headcount unknown" }); }
  // Tribunal
  if (hasTribunal) { score += 20; signals.push({ label: "Tribunal History", pts: +20, reason: "Decisions found in Ailane DB" }); }
  else             { signals.push({ label: "Tribunal History", pts: 0, reason: "No tribunal record found" }); }
  // Sector multiplier
  if (sectorMultiplier >= 1.20)      { score += 12; signals.push({ label: "Sector Multiplier", pts: +12, reason: `High-risk sector (×${sectorMultiplier})` }); }
  else if (sectorMultiplier >= 1.05) { score += 6;  signals.push({ label: "Sector Multiplier", pts: +6,  reason: `Elevated sector (×${sectorMultiplier})` }); }
  else                               { signals.push({ label: "Sector Multiplier", pts: 0, reason: `Baseline sector (×${sectorMultiplier})` }); }
  // Contact
  if (hasEmail)        { score += 8; signals.push({ label: "Contact Intelligence", pts: +8, reason: "Decision-maker email identified" }); }
  else if (hasWebsite) { score += 3; signals.push({ label: "Contact Intelligence", pts: +3, reason: "Website only — no direct email" }); }
  else                 { signals.push({ label: "Contact Intelligence", pts: 0, reason: "No contact data found" }); }
  // Dispute signals
  if (hasDisputeSignals) { score += 5; signals.push({ label: "Dispute Signals", pts: +5, reason: "Public dispute/news signals found" }); }
  else                   { signals.push({ label: "Dispute Signals", pts: 0, reason: "No public dispute signals" }); }
  // Newly incorporated
  if (newlyIncorporated) { score -= 8; signals.push({ label: "Incorporation Age", pts: -8, reason: "Incorporated < 18 months ago" }); }
  score = Math.max(0, Math.min(100, score));
  const g = GRADE_BANDS.find(b => score >= b.min) || GRADE_BANDS[5];
  return { score, ...g, signals };
};

const Gauge = ({ value, size = 180 }) => {
  const band = getBand(value);
  const r = size / 2 - 16, cx = size / 2, cy = size / 2 + 10;
  const arc = (pct) => {
    const a = Math.PI + pct * Math.PI;
    return `${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)}`;
  };
  return (
    <svg width={size} height={size * 0.62} viewBox={`0 0 ${size} ${size * 0.62}`}>
      {BANDS.map((b, i) => {
        const s = (i * 20) / 100, e = ((i + 1) * 20) / 100;
        return <path key={i} d={`M ${arc(s)} A ${r} ${r} 0 0 1 ${arc(e)}`} fill="none" stroke={b.color} strokeWidth={10} strokeLinecap="round" opacity={0.25} />;
      })}
      <path d={`M ${arc(0)} A ${r} ${r} 0 0 1 ${arc(Math.min(value, 100) / 100)}`} fill="none" stroke={band.color} strokeWidth={10} strokeLinecap="round" />
      <text x={cx} y={cy - 14} textAnchor="middle" fill={band.color} fontSize={size * 0.22} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{value}</text>
      <text x={cx} y={cy + 8} textAnchor="middle" fill={band.color} fontSize={11} fontWeight="600" opacity={0.9}>{band.label}</text>
    </svg>
  );
};

// ─── MAIN APP ───────────────────────────────────────────────────────────
function AilaneCEO() {
  const [activeTab, setActiveTab] = useState("overview");
  const [token, setToken] = useState(null);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [sideOpen, setSideOpen] = useState(true);

  // Data state
  const [domainScores, setDomainScores] = useState([]);
  const [categoryScores, setCategoryScores] = useState([]);
  const [scraperRuns, setScraperRuns] = useState([]);
  const [signups, setSignups] = useState([]);
  const [employers, setEmployers] = useState({ total: 0, ch_linked: 0, ch_pending: 0 });
  const [segments, setSegments] = useState([]);
  const [legislativeChanges, setLegislativeChanges] = useState([]);
  const [ceoBrief, setCeoBrief] = useState(null);
  const [simQuery, setSimQuery] = useState("");
  const [simResults, setSimResults] = useState(null);
  const [simSector, setSimSector] = useState("technology");
  const [simJurisdiction, setSimJurisdiction] = useState("london");
  const [intelQuery, setIntelQuery] = useState("");
  const [intelResults, setIntelResults] = useState(null);
  const [intelLoading, setIntelLoading] = useState(false);
  const [cipResult, setCipResult] = useState(null);
  const [cipLoading, setCipLoading] = useState(false);
  const [cipStage, setCipStage] = useState("");
  const [cipSaved, setCipSaved] = useState(false);
  const [cipChKeyMissing, setCipChKeyMissing] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [selectedCategory, setSelectedCategory] = useState(null);

  // Auth state
  const [authEmail, setAuthEmail] = useState("mark@ailane.ai");
  const [authPass, setAuthPass] = useState("");
  const [authError, setAuthError] = useState("");
  const [authLoading, setAuthLoading] = useState(false);

  // Restore session on mount
  useEffect(() => {
    const stored = localStorage.getItem("sb-token");
    const storedUser = localStorage.getItem("sb-user");
    if (stored && storedUser) {
      // Verify token is still valid
      (async () => {
        try {
          const res = await fetch(`${SB_URL}/auth/v1/user`, {
            headers: { apikey: SB_ANON, Authorization: `Bearer ${stored}` }
          });
          if (res.ok) {
            const u = await res.json();
            setToken(stored);
            setUser(u);
          } else {
            // Token expired — clear and show login
            localStorage.removeItem("sb-token");
            localStorage.removeItem("sb-user");
          }
        } catch (e) {
          console.error("Session restore error:", e);
        }
        setLoading(false);
      })();
    } else {
      setLoading(false);
    }
  }, []);

  // Login handler
  const handleLogin = async (e) => {
    if (e) e.preventDefault();
    setAuthError("");
    setAuthLoading(true);
    try {
      const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { apikey: SB_ANON, "Content-Type": "application/json" },
        body: JSON.stringify({ email: authEmail, password: authPass }),
      });
      if (res.ok) {
        const d = await res.json();
        setToken(d.access_token);
        setUser(d.user);
        localStorage.setItem("sb-token", d.access_token);
        localStorage.setItem("sb-user", JSON.stringify(d.user));
        setAuthPass("");
      } else {
        const err = await res.json();
        setAuthError(err.error_description || err.msg || "Invalid credentials");
      }
    } catch (e) {
      setAuthError("Connection failed — check your network");
    }
    setAuthLoading(false);
  };

  // Logout handler
  const handleLogout = () => {
    setToken(null);
    setUser(null);
    localStorage.removeItem("sb-token");
    localStorage.removeItem("sb-user");
  };

  // Load data when token available
  useEffect(() => {
    if (!token) return;
    const load = async () => {
      try {
        const [ds, cs, sr, su, lc, cb] = await Promise.all([
          sbFetch("acei_domain_scores?org_id=eq.00000000-0000-0000-0000-000000000000&order=week_start_date.desc&limit=52", token),
          sbFetch("acei_category_scores?org_id=eq.00000000-0000-0000-0000-000000000000&week_start_date=eq.2026-02-23&order=category", token),
          sbFetch("scraper_runs?order=started_at.desc&limit=20", token),
          sbFetch("early_access_signups?order=created_at.desc&limit=20", token),
          sbFetch("legislative_changes?employment_related=eq.true&order=date_published.desc&limit=30", token),
          sbFetch("ceo_daily_briefs?order=brief_date.desc&limit=1", token),
        ]);
        setDomainScores(ds);
        setCategoryScores(cs);
        setScraperRuns(sr);
        setSignups(su);
        setLegislativeChanges(lc);
        if (cb.length) setCeoBrief(cb[0]);
      } catch (e) { console.error("Data load error:", e); }
    };
    load();
  }, [token]);

  // Employer stats (separate — uses RPC or direct)
  useEffect(() => {
    if (!token) return;
    (async () => {
      try {
        // Use count headers
        const res = await fetch(`${SB_URL}/rest/v1/employer_master?select=id&limit=1`, {
          headers: { apikey: SB_ANON, Authorization: `Bearer ${token}`, Prefer: "count=exact" }
        });
        const total = parseInt(res.headers.get("content-range")?.split("/")?.[1] || "0");
        setEmployers(prev => ({ ...prev, total }));
      } catch (e) {}
    })();
  }, [token]);

  // Company simulator search
  const runSimulation = async () => {
    if (!simQuery.trim() || !token) return;
    try {
      const results = await sbFetch(
        `employer_master?or=(raw_name.ilike.*${encodeURIComponent(simQuery)}*,normalised_name.ilike.*${encodeURIComponent(simQuery)}*)&limit=20&select=id,raw_name,normalised_name,companies_house_number,acei_sector,jurisdiction_region,sic_codes,headcount_estimate,ch_fetch_status`,
        token
      );
      // Get tribunal profiles for these employers
      if (results.length) {
        const ids = results.map(r => r.id).join(",");
        const profiles = await sbFetch(`employer_tribunal_profile?employer_id=in.(${ids})&select=*`, token);
        const profileMap = {};
        profiles.forEach(p => profileMap[p.employer_id] = p);
        setSimResults(results.map(r => ({ ...r, profile: profileMap[r.id] || null })));
      } else {
        setSimResults([]);
      }
    } catch (e) { console.error(e); setSimResults([]); }
  };

  // ── FULL CIP LOOKUP ENGINE ───────────────────────────────────────────────
  const runIntelSearch = async () => {
    if (!intelQuery.trim() || !token) return;
    if (CH_API_KEY === "YOUR_CH_API_KEY_HERE") { setCipChKeyMissing(true); return; }
    setCipChKeyMissing(false);
    setCipLoading(true); setCipResult(null); setCipSaved(false);
    try {
      // ── STAGE 1: Ailane DB ────────────────────────────────────────────
      setCipStage("Searching Ailane database…");
      const isChNum = /^\d{6,8}$/.test(intelQuery.trim());
      const [ailaneEmployers, ailaneTribunals] = await Promise.all([
        sbFetch(`employer_master?or=(raw_name.ilike.*${encodeURIComponent(intelQuery)}*,normalised_name.ilike.*${encodeURIComponent(intelQuery)}*${isChNum ? `,companies_house_number.eq.${intelQuery.trim()}` : ""})&limit=5&select=id,raw_name,normalised_name,companies_house_number,acei_sector,jurisdiction_region,headcount_estimate,sic_codes,sic_primary,officers`, token),
        sbFetch(`tribunal_decisions?title.ilike.*${encodeURIComponent(intelQuery)}*&order=decision_date.desc&limit=25&select=id,title,decision_date,acei_category,jurisdiction,case_number,compensation_awarded`, token),
      ]);
      let ailaneProfile = null;
      if (ailaneEmployers.length) {
        const profiles = await sbFetch(`employer_tribunal_profile?employer_id=in.(${ailaneEmployers.map(e=>e.id).join(",")})&select=*`, token);
        if (profiles.length) ailaneProfile = profiles[0];
      }
      const bestAilane = ailaneEmployers[0] || null;

      // ── STAGE 2: Companies House ──────────────────────────────────────
      setCipStage("Querying Companies House…");
      let chCompany = null, chOfficers = [], chNum = null;
      try {
        if (isChNum) {
          chNum = intelQuery.trim().padStart(8, "0");
        } else if (bestAilane?.companies_house_number) {
          chNum = bestAilane.companies_house_number.padStart(8, "0");
        } else {
          const searchRes = await chFetch(`/search/companies?q=${encodeURIComponent(intelQuery.trim())}&items_per_page=3`);
          const items = searchRes.items || [];
          if (items.length) chNum = items[0].company_number;
        }
        if (chNum) {
          [chCompany, chOfficers] = await Promise.all([
            chFetch(`/company/${chNum}`),
            chFetch(`/company/${chNum}/officers?register_type=directors&items_per_page=10`).then(r => r.items || []).catch(() => []),
          ]);
        }
      } catch (e) { console.warn("CH API error:", e.message); }

      // ── STAGE 3: ACEI Estimate ────────────────────────────────────────
      setCipStage("Computing ACEI estimate…");
      const rawSic = chCompany?.sic_codes?.[0] || bestAilane?.sic_primary || bestAilane?.sic_codes?.[0];
      const sector = mapSicToSector(rawSic) || bestAilane?.acei_sector || "professional_services";
      const sObj = SECTORS.find(s => s.id === sector);
      const sectorMultiplier = sObj?.sm || 1.0;
      const regAddress = chCompany?.registered_office_address;
      const postcode = regAddress?.postal_code || regAddress?.postcode || "";
      const jurisdiction = mapPostcodeToJurisdiction(postcode) || bestAilane?.jurisdiction_region || "wales";
      const aceiEst = computeACEIEstimate(sector, jurisdiction);

      // ── STAGE 4: CIP Grade ────────────────────────────────────────────
      setCipStage("Computing CIP grade…");
      const headcount = chCompany?.accounts?.last_accounts?.made_up_to
        ? (bestAilane?.headcount_estimate || 0)
        : (bestAilane?.headcount_estimate || 0);
      const companyStatus = chCompany?.company_status || "active";
      const website = chCompany?.links?.self ? "" : ""; // CH doesn't provide website
      const hasWebsite = false; // Phase 2: website scrape
      const hasEmail = false;   // Phase 2: website scrape
      const hasTribunal = (ailaneProfile?.total_decisions || ailaneTribunals.length) > 0;
      const hasDisputeSignals = ailaneTribunals.length > 0;
      const incDate = chCompany?.date_of_creation ? new Date(chCompany.date_of_creation) : null;
      const newlyIncorporated = incDate && (Date.now() - incDate.getTime()) < (18 * 30 * 24 * 60 * 60 * 1000);
      const grade = computeCIPGrade({ aceiEst, headcount, hasTribunal, sectorMultiplier, hasEmail, hasWebsite, companyStatus, hasDisputeSignals, newlyIncorporated });

      // ── STAGE 5: Assemble CIP ─────────────────────────────────────────
      setCipResult({
        query: intelQuery,
        // Layer 1 — Identity
        chNumber: chCompany?.company_number || bestAilane?.companies_house_number || chNum,
        registeredName: chCompany?.company_name || bestAilane?.normalised_name || bestAilane?.raw_name || intelQuery,
        companyStatus: chCompany?.company_status || "unknown",
        companyType: chCompany?.type || "",
        incorporationDate: chCompany?.date_of_creation || null,
        registeredAddress: regAddress || null,
        sicCodes: chCompany?.sic_codes || (bestAilane?.sic_codes ? bestAilane.sic_codes : []),
        // Layer 2 — Firmographics
        headcount,
        headcountBand: headcount >= 2000 ? "Enterprise (2,000+)" : headcount >= 500 ? "Large (500–1,999)" : headcount >= 100 ? "Medium (100–499)" : headcount >= 25 ? "Small (25–99)" : headcount > 0 ? "Micro (<25)" : "Unknown",
        accountsCategory: chCompany?.accounts?.accounting_reference_date ? `ARD: ${chCompany.accounts.accounting_reference_date.day}/${chCompany.accounts.accounting_reference_date.month}` : "",
        // Layer 3 — Sector
        sector,
        sectorLabel: sObj?.label || sector,
        sectorMultiplier,
        jurisdiction,
        jurisdictionLabel: JURISDICTIONS.find(j=>j.id===jurisdiction)?.label || jurisdiction,
        jurisdictionMultiplier: JURISDICTIONS.find(j=>j.id===jurisdiction)?.jm || 1.0,
        // Layer 4 — ACEI Estimate
        aceiEst,
        aceiModelDisclosure: true,
        // Layer 5 — Tribunal
        ailaneProfile,
        tribunalDecisions: ailaneTribunals,
        ailaneEmployerRecord: bestAilane,
        // Layer 6 — Dispute signals (from tribunal DB — web signals Phase 2)
        disputeSignals: ailaneTribunals.length > 0 ? ailaneTribunals.map(d => ({ text: d.title, date: d.decision_date, category: d.acei_category, caseNo: d.case_number })).slice(0, 5) : [],
        // Layer 7 — Contact
        registeredOfficeAddress: regAddress,
        website: null,
        email: null,
        // Layer 8 — Officers
        officers: chOfficers.filter(o => !o.resigned_on).slice(0, 8),
        // Grade
        grade,
        generatedAt: new Date().toISOString(),
      });
    } catch (e) {
      console.error("CIP error:", e);
      setCipResult({ error: e.message, query: intelQuery });
    }
    setCipLoading(false); setCipStage("");
  };

  const latest = domainScores[0] || {};
  const prev = domainScores[1] || {};
  const delta = (latest.di || 0) - (prev.di || 0);

  // Trend data for chart
  const trendData = useMemo(() =>
    [...domainScores].reverse().map(d => ({
      week: d.week_start_date?.slice(5),
      di: d.di,
      drt: parseFloat(d.drt),
    })), [domainScores]);

  // Segment data for pie chart
  const segmentData = [
    { name: "A — Critical", value: 513, fill: "#ef4444" },
    { name: "B — Elevated", value: 3823, fill: "#f59e0b" },
    { name: "C — Historical", value: 23834, fill: "#22d3ee" },
    { name: "D — Clean", value: 50529, fill: "#10b981" },
  ];

  // ─── RENDER SECTIONS ──────────────────────────────────────────────────

  const renderOverview = () => (
    <div>
      <SectionHeader title="Command Overview" subtitle={`AI Lane Limited · ${new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}`} />

      {ceoBrief && (
        <div style={{ background: "linear-gradient(135deg, rgba(34,211,238,0.06) 0%, rgba(139,92,246,0.04) 100%)", border: "1px solid rgba(34,211,238,0.15)", borderRadius: 10, padding: "16px 20px", marginBottom: 24 }}>
          <div style={{ fontSize: 11, color: "#22d3ee", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Daily Brief — {ceoBrief.mood}</div>
          <div style={{ fontSize: 14, color: "#e2e8f0", lineHeight: 1.5 }}>{ceoBrief.headline}</div>
        </div>
      )}

      {/* KPI Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12, marginBottom: 28 }}>
        <StatCard label="Domain Index" value={latest.di || "—"} sub={`${delta >= 0 ? "+" : ""}${delta} from last week`} accent={getBand(latest.di || 0).color} icon="📈" />
        <StatCard label="Tribunal Decisions" value="130,854" sub="UK database" accent="#22d3ee" icon="⚖️" />
        <StatCard label="Employer Profiles" value="78,699" sub={`${((10849/78699)*100).toFixed(0)}% CH enriched`} accent="#a78bfa" icon="🏢" />
        <StatCard label="Legislation Library" value="30" sub="All 12 ACEI categories" accent="#10b981" icon="📚" />
        <StatCard label="Early Access" value={signups.length || "3"} sub="Signups captured" accent="#f59e0b" icon="👥" />
        <StatCard label="Scrapers" value="7" sub="Automated jobs" accent="#22d3ee" icon="⚙️" />
        <StatCard label="Jurisdictions" value="53" sub="Global coverage" accent="#f472b6" icon="🌍" />
        <StatCard label="EHRC Actions" value="152" sub="Enforcement tracked" accent="#ef4444" icon="🔴" />
      </div>

      {/* Two-column: Gauge + Trend */}
      <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20, marginBottom: 28 }}>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 24, textAlign: "center" }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>ACEI Market Index</div>
          <Gauge value={latest.di || 22} size={200} />
          <div style={{ marginTop: 12, display: "flex", justifyContent: "center", gap: 16 }}>
            <div><div style={{ fontSize: 10, color: "#64748b" }}>DRT</div><div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace" }}>{parseFloat(latest.drt || 0).toFixed(0)}</div></div>
            <div><div style={{ fontSize: 10, color: "#64748b" }}>DMR</div><div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace" }}>{latest.dmr || 300}</div></div>
            <div><div style={{ fontSize: 10, color: "#64748b" }}>Structural</div><div style={{ fontSize: 16, fontWeight: 700, color: latest.structural_flag ? "#ef4444" : "#10b981" }}>{latest.structural_flag ? "⚠️" : "✓"}</div></div>
          </div>
        </div>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "20px 20px 8px" }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Domain Index — 12-Week Trend</div>
          <ResponsiveContainer width="100%" height={180}>
            <AreaChart data={trendData}>
              <defs>
                <linearGradient id="diGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#22d3ee" stopOpacity={0.3} />
                  <stop offset="100%" stopColor="#22d3ee" stopOpacity={0} />
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
              <XAxis dataKey="week" tick={{ fill: "#64748b", fontSize: 10 }} axisLine={false} tickLine={false} />
              <YAxis domain={[0, 100]} tick={{ fill: "#64748b", fontSize: 10 }} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background: "#0f172a", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontSize: 12 }} />
              <Area type="monotone" dataKey="di" stroke="#22d3ee" fill="url(#diGrad)" strokeWidth={2} dot={{ r: 3, fill: "#22d3ee" }} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Category Scores Grid — click to expand */}
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Category Breakdown — Week of {latest.week_start_date || "2026-02-23"} <span style={{ color: "#475569", fontStyle: "italic", textTransform: "none" }}>· click any category for details</span></div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
          {categoryScores.map((c, i) => {
            const pct = Math.min((parseFloat(c.wcs) / 15) * 100, 100);
            const clr = pct > 70 ? "#ef4444" : pct > 40 ? "#f59e0b" : "#22d3ee";
            const detail = CAT_DETAIL[c.category];
            const isSelected = selectedCategory === c.category;
            return (
              <div key={i} onClick={() => setSelectedCategory(isSelected ? null : c.category)}
                style={{ background: isSelected ? "rgba(34,211,238,0.06)" : "rgba(255,255,255,0.02)", border: `1px solid ${isSelected ? "rgba(34,211,238,0.25)" : "rgba(255,255,255,0.06)"}`, borderRadius: 8, padding: "12px 14px", borderLeft: `3px solid ${clr}`, cursor: "pointer", transition: "all 0.2s" }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 6, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {detail ? `${detail.num}. ` : ""}{CAT_LABELS[c.category] || c.category}
                  {detail?.uncapped && <span style={{ marginLeft: 6, padding: "1px 5px", background: "rgba(239,68,68,0.15)", color: "#ef4444", borderRadius: 3, fontSize: 8, fontWeight: 700, letterSpacing: "0.5px" }}>UNCAPPED</span>}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <span style={{ fontSize: 20, fontWeight: 700, color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace" }}>{parseFloat(c.wcs).toFixed(1)}</span>
                  <span style={{ fontSize: 10, color: "#64748b" }}>L={c.l} · I={c.i} · CRS={c.crs}</span>
                </div>
                <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 2 }}>
                  <div style={{ height: "100%", width: `${pct}%`, background: clr, borderRadius: 2, transition: "width 0.6s ease" }} />
                </div>
                <div style={{ fontSize: 10, color: "#475569", marginTop: 4, display: "flex", justifyContent: "space-between" }}>
                  <span>SM: {parseFloat(c.sm).toFixed(2)}</span>
                  <span>JM: {parseFloat(c.jm).toFixed(2)}</span>
                  <span>WCS: {parseFloat(c.wcs).toFixed(1)}</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* Expanded Category Detail Panel */}
        {selectedCategory && CAT_DETAIL[selectedCategory] && (() => {
          const d = CAT_DETAIL[selectedCategory];
          const cs = categoryScores.find(c => c.category === selectedCategory);
          const clr = d.uncapped ? "#ef4444" : "#22d3ee";
          return (
            <div style={{ marginTop: 14, background: "rgba(255,255,255,0.02)", border: `1px solid ${clr}30`, borderRadius: 10, padding: 20, animation: "fadeIn 0.2s ease" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0" }}>
                    {d.num}. {CAT_LABELS[selectedCategory]}
                    {d.uncapped && <span style={{ marginLeft: 10, padding: "2px 8px", background: "rgba(239,68,68,0.15)", color: "#ef4444", borderRadius: 4, fontSize: 10, fontWeight: 700 }}>UNCAPPED</span>}
                  </div>

      <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 16 }}>Acquisition Intelligence — Employer Segments (AIE)</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
          {segmentData.map((s, i) => (
            <div key={i} style={{ padding: 14, background: `${s.fill}10`, border: `1px solid ${s.fill}25`, borderRadius: 8, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", marginBottom: 4 }}>{s.name}</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: s.fill, fontFamily: "'JetBrains Mono',monospace" }}>{s.value.toLocaleString()}</div>
              <div style={{ fontSize: 11, color: "#64748b" }}>{(s.value / 78699 * 100).toFixed(1)}%</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const renderGovernance = () => (
    <div>
      <SectionHeader title="Constitutional Governance" subtitle="ACEI v1.0 · RRI v1.0 · CCI v1.0 — Adopted 26 February 2026" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 28 }}>
        {[
          { name: "ACEI", version: "v1.0", desc: "Aggregate Compliance Exposure Index", status: "Compliant", color: "#22d3ee", categories: "12 categories", engine: "EVI + EII + SCI → L × I → DI" },
          { name: "RRI", version: "v1.0", desc: "Regulatory Readiness Index", status: "Compliant", color: "#10b981", categories: "5 pillars / 9 EIP", engine: "Policy + Contractual + Training + Systems + Governance" },
          { name: "CCI", version: "v1.0", desc: "Corporate Conduct Index", status: "Compliant", color: "#a78bfa", categories: "6 components", engine: "Bayesian credibility framework" },
        ].map((c, i) => (
          <div key={i} style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${c.color}25`, borderRadius: 10, padding: 20, borderTop: `3px solid ${c.color}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: c.color, fontFamily: "'JetBrains Mono',monospace" }}>{c.name}</div>
              <Badge color={c.color}>{c.version}</Badge>
            </div>
            <div style={{ fontSize: 12, color: "#e2e8f0", marginBottom: 8 }}>{c.desc}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>{c.categories}</div>
            <div style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono',monospace" }}>{c.engine}</div>
            <div style={{ marginTop: 12 }}><Badge color="#10b981">{c.status}</Badge></div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 12 }}>Governance Controls</div>
          {[
            { control: "Separation Doctrine", desc: "Index cross-contamination prevention", status: "Enforced" },
            { control: "Deterministic Computation", desc: "Identical inputs → identical outputs", status: "Enforced" },
            { control: "Model Risk Disclosure", desc: "Constitutional audit obligations", status: "Active" },
            { control: "Clinical Neutrality", desc: "No moral judgment in scoring", status: "Active" },
            { control: "Anti-Perverse Incentive", desc: "No reward for suppression", status: "Active" },
            { control: "AIC Governance", desc: "Ailane Index Committee oversight", status: "Active" },
          ].map((g, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
              <div>
                <div style={{ fontSize: 12, color: "#e2e8f0" }}>{g.control}</div>
                <div style={{ fontSize: 10, color: "#64748b" }}>{g.desc}</div>
              </div>
              <Badge color="#10b981">{g.status}</Badge>
            </div>
          ))}
        </div>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 12 }}>ACEI Parameter Calibration</div>
          <div style={{ fontSize: 11, color: "#64748b", marginBottom: 16 }}>Current market baseline parameters (ACEI Article III)</div>
          {[
            { param: "DMR (Domain Max Reference)", value: "300", ref: "Art. III §3.4" },
            { param: "EVI Baseline — Dismissal", value: "15/week", ref: "Annex A" },
            { param: "EVI Baseline — Discrimination", value: "12/week", ref: "Annex A" },
            { param: "EVI Baseline — Wages", value: "8/week", ref: "Annex A" },
            { param: "SM Range", value: "0.90 – 1.30", ref: "Annex B" },
            { param: "JM Range", value: "0.90 – 1.40", ref: "Annex B" },
            { param: "Band Thresholds", value: "20/40/60/80", ref: "Art. IV" },
          ].map((p, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.03)", fontSize: 12 }}>
              <span style={{ color: "#94a3b8" }}>{p.param}</span>
              <div style={{ display: "flex", gap: 12 }}>
                <span style={{ color: "#22d3ee", fontFamily: "'JetBrains Mono',monospace", fontWeight: 600 }}>{p.value}</span>
                <span style={{ color: "#475569", fontSize: 10 }}>{p.ref}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const sections = {
    overview: renderOverview,
    pipeline: renderPipeline,
    simulator: renderSimulator,
    intelligence: renderIntelligence,
    regulatory: renderRegulatory,
    scrapers: renderScrapers,
    notifications: renderNotifications,
    business: renderBusiness,
    governance: renderGovernance,
  };

  // ─── LOADING STATE ──────────────────────────────────────────────────
  if (loading) {
    return (
      <div style={{ minHeight: "100vh", background: "#0a0e1a", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap'); @keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }`}</style>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: "#22d3ee", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 3, marginBottom: 16 }}>AILANE</div>
          <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22d3ee", animation: "pulse 1s ease infinite" }} />
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22d3ee", animation: "pulse 1s ease infinite 0.2s" }} />
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22d3ee", animation: "pulse 1s ease infinite 0.4s" }} />
          </div>
        </div>
      </div>
    );
  }

  // ─── LOGIN SCREEN ─────────────────────────────────────────────────────
  if (!token) {
    return (
      <div style={{ minHeight: "100vh", background: "#0a0e1a", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Inter',-apple-system,sans-serif" }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
          * { box-sizing: border-box; margin: 0; }
          input::placeholder { color: #475569; }
          .login-btn:hover { opacity: 0.9; }
          .login-input:focus { border-color: rgba(34,211,238,0.5) !important; outline: none; }
        `}</style>
        <div style={{ width: 400, padding: 40, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, boxShadow: "0 25px 50px rgba(0,0,0,0.5)" }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: "#22d3ee", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 3, marginBottom: 4 }}>AILANE</div>
            <div style={{ fontSize: 12, color: "#64748b", letterSpacing: 1, textTransform: "uppercase" }}>CEO Command Centre</div>
          </div>
          <div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: "block", fontSize: 11, color: "#94a3b8", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.5px" }}>Email</label>
              <input className="login-input" type="email" value={authEmail} onChange={e => setAuthEmail(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleLogin()}
                style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, color: "#e2e8f0", fontSize: 14, transition: "border-color 0.2s" }} />
            </div>
            <div style={{ marginBottom: 24 }}>
              <label style={{ display: "block", fontSize: 11, color: "#94a3b8", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.5px" }}>Password</label>
              <input className="login-input" type="password" value={authPass} onChange={e => setAuthPass(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleLogin()}
                placeholder="Enter your password"
                style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, color: "#e2e8f0", fontSize: 14, transition: "border-color 0.2s" }} />
            </div>
            {authError && (
              <div style={{ padding: "10px 14px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, fontSize: 12, color: "#ef4444", marginBottom: 16 }}>{authError}</div>
            )}
            <button className="login-btn" onClick={handleLogin} disabled={authLoading}
              style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg, #22d3ee, #06b6d4)", border: "none", borderRadius: 8, color: "#0a0e1a", fontWeight: 700, fontSize: 14, cursor: "pointer", opacity: authLoading ? 0.7 : 1, transition: "opacity 0.2s" }}>
              {authLoading ? "Authenticating..." : "Sign In"}
            </button>
          </div>
          <div style={{ textAlign: "center", marginTop: 24, fontSize: 10, color: "#475569" }}>
            AI Lane Limited · Company No. 17035654 · Internal Use Only
          </div>
        </div>
      </div>
    );
  }

  // ─── AUTHENTICATED DASHBOARD ──────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#0a0e1a", color: "#e2e8f0", fontFamily: "'Inter',-apple-system,sans-serif", display: "flex" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        @keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        input::placeholder { color: #475569; }
        select option { background: #0f172a; color: #e2e8f0; }
        .login-input:focus { border-color: rgba(34,211,238,0.5) !important; outline: none; }
      `}</style>

      {/* Sidebar */}
      <aside style={{ width: sideOpen ? 220 : 56, minHeight: "100vh", background: "rgba(255,255,255,0.02)", borderRight: "1px solid rgba(255,255,255,0.06)", transition: "width 0.2s ease", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        {/* Logo */}
        <div style={{ padding: sideOpen ? "20px 18px" : "20px 12px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setSideOpen(!sideOpen)}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #22d3ee, #06b6d4)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#0a0e1a", flexShrink: 0 }}>A</div>
          {sideOpen && <div style={{ fontSize: 14, fontWeight: 700, color: "#22d3ee", letterSpacing: 2, fontFamily: "'JetBrains Mono',monospace" }}>AILANE<span style={{ color: "#475569", fontSize: 10, display: "block", letterSpacing: 0 }}>CEO Command</span></div>}
        </div>

        {/* Nav Items */}
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {NAV.map(n => (
            <div key={n.id} onClick={() => n.href ? window.open(n.href, "_blank") : setActiveTab(n.id)} style={{
              display: "flex", alignItems: "center", gap: 10, padding: sideOpen ? "10px 12px" : "10px 14px", borderRadius: 8, marginBottom: 2, cursor: "pointer",
              background: activeTab === n.id && !n.href ? "rgba(34,211,238,0.08)" : "transparent",
              color: activeTab === n.id && !n.href ? "#22d3ee" : "#94a3b8",
              transition: "all 0.15s",
            }}
              onMouseEnter={e => { if (activeTab !== n.id) e.currentTarget.style.background = "rgba(255,255,255,0.03)"; }}
              onMouseLeave={e => { if (activeTab !== n.id || n.href) e.currentTarget.style.background = activeTab === n.id && !n.href ? "rgba(34,211,238,0.08)" : "transparent"; }}>
              <span style={{ fontSize: 16, flexShrink: 0 }}>{n.icon}</span>
              {sideOpen && (
                <span style={{ fontSize: 12, fontWeight: activeTab === n.id && !n.href ? 600 : 400, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4 }}>
                  {n.label}
                  {n.href && <span style={{ fontSize: 9, opacity: 0.5 }}>↗</span>}
                </span>
              )}
            </div>
          ))}
        </nav>

        {/* Footer */}
        {sideOpen && (
          <div style={{ padding: "12px 16px", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontSize: 11, color: "#94a3b8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user?.email || "mark@ailane.ai"}</div>
              <button onClick={handleLogout} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 4, padding: "3px 8px", color: "#ef4444", fontSize: 9, fontWeight: 600, cursor: "pointer", textTransform: "uppercase", letterSpacing: "0.5px" }}>Logout</button>
            </div>
            <div style={{ fontSize: 10, color: "#475569" }}>
              <div>AI Lane Limited</div>
              <div>Co. No. 17035654</div>
              <div style={{ marginTop: 4 }}>
                <a href="/dashboard/" style={{ color: "#22d3ee", textDecoration: "none" }}>Client Dashboard</a>
                {" · "}
                <a href="/knowledge-library/" style={{ color: "#22d3ee", textDecoration: "none" }}>Library</a>
                {" · "}
                <a href="/ticker/" style={{ color: "#22d3ee", textDecoration: "none" }}>Ticker</a>
              </div>
            </div>
          </div>
        )}
      </aside>

      {/* Main Content */}
      <main style={{ flex: 1, padding: "28px 36px", overflowY: "auto", maxHeight: "100vh" }}>
        {sections[activeTab]?.() || renderOverview()}
      </main>
    </div>
  );
}

    // ─── MOUNT ──────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AilaneCEO));
  </script>
</body>
</html>
