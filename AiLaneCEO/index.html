// ─── SUPABASE HELPERS ─────────────────────────────────────────────────────
async function sbFetch(path, token, extraHeaders) {
  const headers = { "apikey": SB_ANON, "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  if (extraHeaders) Object.assign(headers, extraHeaders);
  const r = await fetch(SB_URL + path, { headers });
  if (!r.ok) { const t = await r.text(); throw new Error(r.status + ": " + t.slice(0, 120)); }
  return r.json();
}

async function sbCount(table, token, filter) {
  const q = filter ? "?" + filter + "&" : "?";
  const r = await fetch(SB_URL + "/rest/v1/" + table + q + "select=id", {
    headers: { "apikey": SB_ANON, "Authorization": "Bearer " + token, "Prefer": "count=exact", "Range": "0-0" }
  });
  const cr = r.headers.get("content-range");
  return cr ? parseInt(cr.split("/")[1]) : null;
}

async function sbPost(path, body, token) {
  const headers = { "apikey": SB_ANON, "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  const r = await fetch(SB_URL + path, { method: "POST", headers, body: JSON.stringify(body) });
  if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 200)); }
  return r.json();
}

async function signIn(email, password) {
  const r = await fetch(SB_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: { "apikey": SB_ANON, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description || "Login failed");
  return d;
}

async function callCeoAssistant(token, message, context) {
  const r = await fetch(SB_URL + "/functions/v1/ceo-assistant", {
    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ message, context: context || "" })
  });
  if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 200)); }
  const d = await r.json();
  return d.response || d.content || d.message || JSON.stringify(d);
}

  const map = {

    amber: [C.amberBg, "#fbbf24", "#92400e"], blue: [C.blueBg, "#60a5fa", "#1d4ed8"],

    cyan: ["#041820", C.cyan, "#0e7490"]
  };
  const [bg, txt, bdr] = map[color] || map.gray;
  return (
    <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 3, background: bg, color: txt, border: "1px solid " + bdr, fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>

// ─── EMPLOYER DRILL-DOWN ─────────────────────────────────────────────────
function EmployerDrill({ item, token, onClose }) {
  var [cases, setCases] = useState([]);
  var [loadingCases, setLoadingCases] = useState(false);
  var [aiResult, setAiResult] = useState(null);
  var [aiLoading, setAiLoading] = useState(false);

  useEffect(function() {
    if (!item) return;
    setLoadingCases(true);
    var name = encodeURIComponent(item.raw_name || "");
    sbFetch("/rest/v1/tribunal_decisions?select=title,decision_date,acei_category,acei_category_number,case_number,outcome,compensation_awarded&respondent_name=ilike.*" + name + "*&order=decision_date.desc&limit=10", token)
      .then(function(d) { setCases(d || []); })
      .catch(function() { setCases([]); })
      .finally(function() { setLoadingCases(false); });
  }, [item, token]);

  var runAI = async function() {
    setAiLoading(true);
    try {
      var r = await callCeoAssistant(token, "Provide a risk profile for employer: " + item.raw_name + ". Sector: " + (item.acei_sector || "unknown") + ". CH Status: " + (item.companies_house_status || "unknown") + ". Region: " + (item.jurisdiction_region || "unknown") + ". Include: ACEI sector risk, tribunal exposure, compliance priorities, and commercial risk rating.", "Employer Intelligence Hub");
      setAiResult(r);
    } catch (e) { setAiResult("Error: " + e.message); }
    setAiLoading(false);
  };

  if (!item) return null;

  var catColors = { 1: C.red, 2: "#f97316", 3: C.amber, 4: "#a3e635", 5: C.green, 6: C.blue, 7: C.purple, 8: C.cyan, 9: C.muted, 10: "#fb7185", 12: "#c084fc" };

  return (
    <div className="slide-down" style={{ marginTop: 8, padding: 16, background: C.panel, border: "1px solid " + C.blue, borderRadius: 8, position: "relative" }}>
      <button onClick={onClose} style={{ position: "absolute", top: 10, right: 10, background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 18 }}>&times;</button>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
        <Chip label={item.companies_house_status || "unknown"} color={item.companies_house_status === "active" ? "green" : "red"} />
        {item.acei_sector && <Chip label={item.acei_sector} color="blue" />}
        {item.jurisdiction_region && <Chip label={item.jurisdiction_region} color="gray" />}
        {item.is_canonical && <Chip label="Canonical" color="cyan" />}
      </div>

      <div style={{ fontSize: 17, fontWeight: 800, color: C.cyan, marginBottom: 4 }}>{item.raw_name}</div>
      {item.normalised_name !== item.raw_name && <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>Normalised: {item.normalised_name}</div>}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        <Card style={{ padding: 10 }}>
          <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", letterSpacing: 1 }}>Companies House</div>
          {[
            ["CH Number", item.companies_house_number || "Not enriched"],
            ["CH Name", item.ch_registered_name || item.raw_name],
            ["Type", item.company_type || "\u2014"],
            ["Incorporated", item.date_of_creation || "\u2014"],
            ["Insolvency History", item.has_insolvency_history ? "Yes" : "No"]
          ].map(function(pair, i) {
            return (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: "1px solid " + C.border, fontSize: 11 }}>
                <span style={{ color: C.muted }}>{pair[0]}</span>
                <span style={{ color: C.dim }}>{pair[1]}</span>
              </div>
            );
          })}
        </Card>
        <Card style={{ padding: 10 }}>
          <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", letterSpacing: 1 }}>ACEI Profile</div>
          {[
            ["Sector", item.acei_sector || "Unclassified"],
            ["Sector SM", item.acei_sector_multiplier ? "x" + item.acei_sector_multiplier : "\u2014"],
            ["Region JM", item.jurisdiction_multiplier ? "x" + item.jurisdiction_multiplier : "\u2014"],
            ["SIC Primary", item.sic_primary || "\u2014"],
            ["Headcount", item.headcount_estimate ? item.headcount_estimate.toLocaleString() : (item.headcount_band || "Unknown")]

          Tribunal History {loadingCases ? <Spinner /> : cases.length > 0 ? "(" + cases.length + " recent)" : "(none found)"}

        {cases.length > 0 && cases.map(function(c, i) {
          return (
            <div key={i} style={{ padding: "6px 10px", background: C.card, borderRadius: 5, marginBottom: 4, fontSize: 11, display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: "3px solid " + (catColors[c.acei_category_number] || C.border) }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.title}</div>
                <div style={{ color: C.muted, marginTop: 2 }}>{c.acei_category} &middot; {c.case_number}</div>
              </div>
              <div style={{ marginLeft: 10, textAlign: "right", flexShrink: 0 }}>
                <div style={{ color: C.dim, fontFamily: "'JetBrains Mono',monospace" }}>{c.decision_date}</div>

            <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{activeTab} &middot; claude-sonnet-4-6 &middot; JWT verified</div>

          <div className="scrollable" style={{ flex: 1, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>

// ─── TAB: COMMAND ─────────────────────────────────────────────────────────
function CommandTab({ token }) {
  var [counts, setCounts] = useState({});

  var CAT_LABELS = { 1: "Unfair\nDismissal", 2: "Discrimination", 3: "Wages &\nTime", 4: "Whistleblowing", 5: "Emp. Status", 6: "Redundancy", 7: "Family\nRights", 8: "Trade Union", 9: "Contract", 10: "Health &\nSafety", 12: "Transfers" };

  useEffect(function() {
    (async function() {
      try {
        var results = await Promise.all([
          sbCount("tribunal_decisions", token).catch(function() { return 130854; }),
          sbCount("employer_master", token).catch(function() { return null; }),
          sbCount("legislation_library", token).catch(function() { return 47; })
        ]);
        var triCount = results[0], empCount = results[1], legCount = results[2];

        var catRows = await sbFetch("/rest/v1/tribunal_decisions?select=acei_category_number&acei_category_number=not.eq.0&acei_category_number=not.is.null", token).catch(function() { return []; });
        var agg = {};
        (catRows || []).forEach(function(r) { agg[r.acei_category_number] = (agg[r.acei_category_number] || 0) + 1; });
        var max = Math.max.apply(null, Object.values(agg).concat([1]));
        var cd = Object.entries(agg).sort(function(a, b) { return Number(a[0]) - Number(b[0]); }).map(function(pair) {
          return { cat: "C" + pair[0], label: CAT_LABELS[Number(pair[0])] || "Cat " + pair[0], count: pair[1], score: Math.round((pair[1] / max) * 100) };
        });

        var pipeRows = await sbFetch("/rest/v1/pipeline_runs?select=pipeline_code,status,started_at,completed_at,records_found,records_new,error_message&order=started_at.desc&limit=30", token).catch(function() { return []; });

        setCounts({ tri: triCount, emp: empCount, leg: legCount });
        setCatData(cd);
        setPipelines(Object.values(latest).slice(0, 6));
      } catch (e) {
        setCounts({ tri: 130854, emp: null, leg: 47 });
      }
      setLoading(false);
    })();

  var statusC = { success: C.green, failed: C.red, running: C.amber, pending: C.muted };
  var statusI = { success: "\u25CF", failed: "\u2717", running: "\u25CC", pending: "\u25CB" };

    <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>

      {tickerItem && <TickerModal item={tickerItem} onClose={function() { setTickerItem(null); }} />}

      <div className="scrollable fade-in" style={{ flex: 1, padding: 20, paddingBottom: 80 }}>
        <InfoBox color="amber" msg="&#9888; Priority: 0 paying clients &mdash; Innovation Wales panel April 2026. Convert 3 early-access signups before panel." />
        <InfoBox color="blue" msg="&#8505; ACEI-AM-2026-003 (CREE) ratified 7 Mar 2026. REL input live at all tiers. CREE contribution cap: 15% per category." />

        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 20 }}>
          <KpiCard label="Tribunal Decisions" value={loading ? "\u2026" : (counts.tri || 130854).toLocaleString()} sub="Feb 2010 &ndash; 11 Feb 2026 &middot; gap closing" color={C.cyan} icon="&#9878;" />
          <KpiCard label="Employer Profiles" value={loading || !counts.emp ? "\u2026" : counts.emp.toLocaleString()} sub="CH verified ~31.8% &middot; ~50k pending" color={C.blue} icon="&#127970;" />
          <KpiCard label="Legislation Library" value={loading ? "\u2026" : (counts.leg || 47)} sub="47 instruments &middot; 12 ACEI categories" color={C.green} icon="&#128220;" />
          <KpiCard label="Paying Clients" value="0" sub="Priority: convert 3 early access" color={C.red} icon="&#128176;" />
          <KpiCard label="Jurisdictions" value="53" sub="Global scraper network" color={C.purple} icon="&#127760;" />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
          <Card>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.cyan, marginBottom: 12 }}>ACEI Category Volume &mdash; Live Tribunal Data</div>
            {loading ? <div style={{ textAlign: "center", padding: 40 }}><Spinner /></div> : (
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={catData} margin={{ top: 4, right: 4, bottom: 20, left: -16 }}>
                  <CartesianGrid strokeDasharray="2 4" stroke={C.border} />
                  <XAxis dataKey="cat" tick={{ fontSize: 9, fill: C.muted }} />
                  <YAxis tick={{ fontSize: 8, fill: C.muted }} tickFormatter={function(v) { return v >= 1000 ? (v / 1000).toFixed(0) + "k" : v; }} />
                  <Tooltip contentStyle={{ background: C.panel, border: "1px solid " + C.border, borderRadius: 6, fontSize: 11 }}
                    formatter={function(value, name, props) { return [value.toLocaleString() + " cases", props.payload.label]; }}
                    labelFormatter={function() { return ""; }} />
                  <Bar dataKey="count" radius={[3, 3, 0, 0]}>
                    {catData.map(function(d, i) { return <Cell key={i} fill={d.score > 70 ? C.red : d.score > 40 ? C.amber : C.green} />; })}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            )}
          </Card>

          <Card>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.cyan, marginBottom: 12 }}>Pipeline Health &mdash; Live Status</div>
            {loading ? <div style={{ textAlign: "center", padding: 40 }}><Spinner /></div> : pipelines.length > 0 ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {pipelines.map(function(p, i) {
                  return (
                    <div key={i} style={{ padding: "7px 10px", background: C.panel, borderRadius: 5, borderLeft: "3px solid " + (statusC[p.status] || C.muted) }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                          <span style={{ color: statusC[p.status] || C.muted, fontSize: 10 }}>{statusI[p.status] || "?"}</span>
                          <span style={{ fontSize: 11, color: C.dim }}>{pipeLabel(p.pipeline_code)}</span>
                        </div>
                        <div style={{ fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace" }}>

                      </div>
                      {p.error_message && <div style={{ fontSize: 10, color: "#f87171", marginTop: 3 }}>{p.error_message.slice(0, 60)}</div>}

                      </div>
                    </div>

            ) : <div style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: 30 }}>No pipeline data</div>}
          </Card>
        </div>

        <Card>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.cyan, marginBottom: 10 }}>Constitutional Framework &mdash; Status Register</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {[
              { id: "ACEI v1.0 + AM-001/002/003" }, { id: "RRI v1.0" }, { id: "CCI v1.0" },
              { id: "PCIE SPEC-003 v3.0" }, { id: "CAMINT-001 v1.0" }, { id: "LANG-001 v1.0" }

              return (
                <div key={i} style={{ padding: "6px 12px", background: C.panel, borderRadius: 5, display: "flex", gap: 8, alignItems: "center" }}>

              );
            })}

        </Card>
      </div>
    </div>
  );
}

                        {item.summary && <div style={{ fontSize: 11, color: C.muted, marginTop: 3, lineHeight: 1.5 }}>{item.summary.slice(0, 130)}&hellip;</div>}

                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", gap: 5, marginBottom: 6 }}>
                        <Chip label={(e.source || "enforcement").toUpperCase()} color={e.penalty_amount ? "red" : "amber"} />
                        <Chip label={e.action_type || "action"} color="gray" />

                      {e.acei_category && <div style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{e.acei_category}</div>}
                      {e.source_url && <a href={e.source_url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: C.blue, textDecoration: "none", marginTop: 4, display: "inline-block" }}>Source &#8594;</a>}
                    </div>

                    </div>

              );

          </>
        )}
      </div>
    </div>
  );
}


// ─── TAB: KNOWLEDGE LIBRARY ───────────────────────────────────────────────
function KnowledgeLibraryTab({ token }) {
  var [sub, setSub] = useState("all");
  var [items, setItems] = useState([]);
  var [loading, setLoading] = useState(true);
  var [search, setSearch] = useState("");
  var [catFilter, setCatFilter] = useState("all");
  var [drill, setDrill] = useState(null);
  var [analysis, setAnalysis] = useState({});
  var [analysing, setAnalysing] = useState(null);

  useEffect(function() {
    setLoading(true);
    sbFetch("/rest/v1/legislation_library?select=*&order=sci_significance.desc.nullslast", token)
      .then(function(d) { setItems(d || []); }).catch(function() { setItems([]); }).finally(function() { setLoading(false); });
  }, [token]);

  var analyse = async function(item) {
    setAnalysing(item.id);
    try {
      var r = await callCeoAssistant(token, "Comprehensive CEO intelligence briefing for: " + item.short_title + ". Include: key obligations, enforcement body and track record, penalty exposure details, sector impact, compliance priority, and recommended actions for a mid-market UK employer.", item.short_title);
      setAnalysis(function(prev) { return Object.assign({}, prev, { [item.id]: r }); });
    } catch (e) { setAnalysis(function(prev) { return Object.assign({}, prev, { [item.id]: "Error: " + e.message }); }); }
    setAnalysing(null);
  };

  var cats = useMemo(function() {
    var s = new Set(items.map(function(i) { return i.primary_acei_category; }).filter(function(v) { return v != null; }));
    return Array.from(s).sort(function(a, b) { return a - b; });
  }, [items]);

  var stageColor = { in_force: "green", enacted: "blue", pending_bill: "amber", partially_commenced: "amber", repealed: "red", superseded: "red" };
  var CAT_NAMES = { 1: "Unfair Dismissal", 2: "Discrimination & Harassment", 3: "Wages & Working Time", 4: "Whistleblowing", 5: "Employment Status", 6: "Redundancy & Org Change", 7: "Parental & Family", 8: "Trade Union & Collective", 9: "Breach of Contract", 10: "Health & Safety", 12: "Business Transfers" };

  var filtered = useMemo(function() {
    var r = items;
    if (search) {
      var q = search.toLowerCase();
      r = r.filter(function(i) { return (i.short_title || "").toLowerCase().includes(q) || (i.summary || "").toLowerCase().includes(q); });
    }
    if (catFilter !== "all") r = r.filter(function(i) { return String(i.primary_acei_category) === catFilter; });
    if (sub === "recent") r = r.slice().sort(function(a, b) { return new Date(b.updated_at || 0) - new Date(a.updated_at || 0); }).slice(0, 20);
    return r;
  }, [items, search, catFilter, sub]);

  var catGroups = useMemo(function() {
    var g = {};
    filtered.forEach(function(i) { var c = i.primary_acei_category || 0; if (!g[c]) g[c] = []; g[c].push(i); });
    return g;
  }, [filtered]);

  function ItemRow({ item }) {
    return (
      <div style={{ marginBottom: 6 }}>
        <div onClick={function() { setDrill(drill && drill.id === item.id ? null : item); }}
          style={{ padding: "10px 13px", background: C.card, border: "1px solid " + (drill && drill.id === item.id ? C.blue : C.border), borderRadius: 6, cursor: "pointer", transition: "border-color 0.15s" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 5 }}>
                <Chip label={item.lifecycle_stage || "?"} color={stageColor[item.lifecycle_stage] || "gray"} />
                <Chip label={"Cat " + (item.primary_acei_category || "?")} color="blue" />
                {item.tier_access && item.tier_access !== "all" && <Chip label={item.tier_access} color={item.tier_access === "institutional" ? "amber" : "blue"} />}
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{item.short_title}</div>
              {item.summary && <div style={{ fontSize: 11, color: C.muted, marginTop: 3, lineHeight: 1.5 }}>{item.summary.slice(0, 110)}&hellip;</div>}
            </div>
            {item.sci_significance != null && (
              <div style={{ marginLeft: 10, fontFamily: "'JetBrains Mono',monospace", fontSize: 18, fontWeight: 800, color: item.sci_significance > 7 ? C.red : item.sci_significance > 4 ? C.amber : C.green, flexShrink: 0 }}>
                {item.sci_significance}
              </div>
            )}
          </div>
        </div>
        {drill && drill.id === item.id && (
          <LegislationDrill item={drill} analysis={analysis[item.id]} analysing={analysing === item.id}
            onAnalyse={function() { analyse(item); }} onClose={function() { setDrill(null); }} />
        )}
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>
      <SubNav tabs={[{ id: "all", label: "All Instruments" }, { id: "category", label: "By Category" }, { id: "recent", label: "Recent Changes" }]} active={sub} onChange={setSub} />
      <div style={{ padding: "8px 18px", borderBottom: "1px solid " + C.border, display: "flex", gap: 8, background: C.card, flexShrink: 0 }}>
        <input value={search} onChange={function(e) { setSearch(e.target.value); }} placeholder="Search instruments, summaries\u2026"
          style={{ flex: 1, background: C.panel, border: "1px solid " + C.border, borderRadius: 5, color: C.text, padding: "6px 10px", fontSize: 12, outline: "none", fontFamily: "'Syne',sans-serif" }} />
        <select value={catFilter} onChange={function(e) { setCatFilter(e.target.value); }}
          style={{ background: C.panel, border: "1px solid " + C.border, borderRadius: 5, color: C.dim, padding: "6px 10px", fontSize: 12, outline: "none", cursor: "pointer" }}>
          <option value="all">All Categories</option>
          {cats.map(function(c) { return <option key={c} value={String(c)}>Category {c} &mdash; {CAT_NAMES[c] || ""}</option>; })}
        </select>
      </div>
      <div className="scrollable fade-in" style={{ flex: 1, padding: 18, paddingBottom: 80 }}>
        {loading ? <div style={{ textAlign: "center", padding: 60 }}><Spinner /></div> : (
          sub === "category" ? (
            Object.entries(catGroups).sort(function(a, b) { return Number(a[0]) - Number(b[0]); }).map(function(pair) {
              var cat = pair[0], catItems = pair[1];
              return (
                <div key={cat} style={{ marginBottom: 22 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.cyan, padding: "6px 0", borderBottom: "1px solid " + C.border, marginBottom: 10, fontFamily: "'JetBrains Mono',monospace", display: "flex", gap: 10, alignItems: "center" }}>
                    <span>CATEGORY {cat}</span>
                    <span style={{ color: C.muted, fontWeight: 400 }}>{CAT_NAMES[Number(cat)] || ""}</span>
                    <span style={{ marginLeft: "auto", color: C.muted }}>{catItems.length} instruments</span>
                  </div>
                  {catItems.map(function(item) { return <ItemRow key={item.id} item={item} />; })}
                </div>
              );
            })
          ) : (
            <>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>{filtered.length} instrument{filtered.length !== 1 ? "s" : ""}{sub === "recent" ? " (recent changes)" : ""}</div>
              {filtered.map(function(item) { return <ItemRow key={item.id} item={item} />; })}
            </>
          )
        )}
      </div>
    </div>
  );
}


// ─── TAB: INTELLIGENCE HUB ────────────────────────────────────────────────
function IntelligenceHubTab({ token }) {
  var [sub, setSub] = useState("employer");
  var [query, setQuery] = useState("");
  var [empResults, setEmpResults] = useState([]);
  var [triResults, setTriResults] = useState([]);
  var [chResults, setChResults] = useState(null);
  var [loading, setLoading] = useState(false);
  var [empDrill, setEmpDrill] = useState(null);

  var searchEmployer = useCallback(async function() {
    if (!query.trim()) return;
    setLoading(true); setEmpResults([]); setTriResults([]); setChResults(null); setEmpDrill(null);
    var enc = encodeURIComponent(query.trim());
    try {
      var results = await Promise.all([
        sbFetch("/rest/v1/employer_master?select=id,raw_name,normalised_name,companies_house_number,companies_house_status,sic_primary,acei_sector,jurisdiction_region,headcount_estimate,headcount_band,acei_sector_multiplier,jurisdiction_multiplier,is_canonical,ch_registered_name,company_type,date_of_creation,has_insolvency_history&raw_name=ilike.*" + enc + "*&limit=10", token).catch(function() { return []; }),
        sbFetch("/rest/v1/tribunal_decisions?select=title,decision_date,acei_category,acei_category_number,case_number,respondent_name,outcome,compensation_awarded&respondent_name=ilike.*" + enc + "*&order=decision_date.desc&limit=10", token).catch(function() { return []; }),
        fetch("https://api.company-information.service.gov.uk/search/companies?q=" + enc, {
          headers: { Authorization: "Basic " + btoa(CH_API_KEY + ":") }
        }).then(function(r) { return r.json(); }).catch(function() { return null; })
      ]);
      setEmpResults(results[0] || []);
      setTriResults(results[1] || []);
      setChResults(results[2]);
    } catch (e) { console.error(e); }
    setLoading(false);
  }, [query, token]);

  var catColor = { 1: C.red, 2: "#f97316", 3: C.amber, 4: "#a3e635", 5: C.green, 6: C.blue, 7: C.purple, 8: C.cyan };

  var [triStats, setTriStats] = useState(null);
  useEffect(function() {
    if (sub !== "tribunal") return;
    sbFetch("/rest/v1/tribunal_decisions?select=acei_category_number,acei_category,decision_date&acei_category_number=not.eq.0&limit=5000", token)
      .then(function(rows) {
        if (!rows) return;
        var agg = {};
        rows.forEach(function(r) {
          if (!agg[r.acei_category_number]) agg[r.acei_category_number] = { cat: r.acei_category, count: 0 };
          agg[r.acei_category_number].count++;
        });
        var byYear = {};
        rows.forEach(function(r) {
          if (!r.decision_date) return;
          var y = r.decision_date.slice(0, 4);
          if (!byYear[y]) byYear[y] = 0;
          byYear[y]++;
        });
        setTriStats({
          catBreakdown: Object.entries(agg).map(function(pair) { return { cat: "C" + pair[0], label: pair[1].cat, count: pair[1].count }; }).sort(function(a, b) { return b.count - a.count; }),
          byYear: Object.entries(byYear).sort().map(function(pair) { return { year: pair[0], count: pair[1] }; })
        });
      }).catch(function() { setTriStats(null); });
  }, [sub, token]);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>
      <SubNav tabs={[{ id: "employer", label: "Employer Search" }, { id: "tribunal", label: "Tribunal Analytics" }, { id: "graph", label: "Corporate Graph" }]} active={sub} onChange={setSub} />
      <div className="scrollable fade-in" style={{ flex: 1, padding: 18, paddingBottom: 80 }}>

        {sub === "employer" && (
          <>
            <SectionHeader title="Employer Search" sub="Live search across employer_master + tribunal_decisions + Companies House API" />
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <input value={query} onChange={function(e) { setQuery(e.target.value); }} onKeyDown={function(e) { if (e.key === "Enter") searchEmployer(); }}
                placeholder="Search employer name (e.g. NHS, Tesco, Barclays)\u2026"
                style={{ flex: 1, background: C.card, border: "1px solid " + C.border, borderRadius: 5, color: C.text, padding: "9px 12px", fontSize: 12, outline: "none", fontFamily: "'Syne',sans-serif" }} />
              <button onClick={searchEmployer} disabled={loading} style={{ padding: "9px 20px", borderRadius: 5, background: C.blue, border: "none", color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
                {loading ? <><Spinner /> Searching&hellip;</> : "Search"}
              </button>
            </div>

            {empResults.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.dim, marginBottom: 8 }}>Ailane DB &mdash; {empResults.length} employer profile{empResults.length !== 1 ? "s" : ""} matched</div>
                {empResults.map(function(e, i) {
                  return (
                    <div key={i} style={{ marginBottom: 6 }}>
                      <Card onClick={function() { setEmpDrill(empDrill && empDrill.id === e.id ? null : e); }} style={{ border: "1px solid " + (empDrill && empDrill.id === e.id ? C.blue : C.border) }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div>
                            <div style={{ display: "flex", gap: 5, marginBottom: 5 }}>
                              <Chip label={e.companies_house_status || "unknown"} color={e.companies_house_status === "active" ? "green" : e.companies_house_status === "dissolved" ? "red" : "gray"} />
                              {e.acei_sector && <Chip label={e.acei_sector} color="blue" />}
                              {e.jurisdiction_region && <Chip label={e.jurisdiction_region} color="gray" />}
                            </div>
                            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{e.raw_name}</div>
                            {e.ch_registered_name && e.ch_registered_name !== e.raw_name && <div style={{ fontSize: 11, color: C.muted }}>CH: {e.ch_registered_name}</div>}
                          </div>
                          <div style={{ textAlign: "right" }}>
                            {e.companies_house_number && <div style={{ fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace" }}>#{e.companies_house_number}</div>}
                            {e.acei_sector_multiplier && <div style={{ fontSize: 11, color: C.amber }}>SM x{e.acei_sector_multiplier}</div>}
                          </div>
                        </div>
                      </Card>
                      {empDrill && empDrill.id === e.id && (
                        <EmployerDrill item={e} token={token} onClose={function() { setEmpDrill(null); }} />
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {triResults.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.dim, marginBottom: 8 }}>Tribunal Decisions &mdash; {triResults.length} matched</div>
                {triResults.map(function(t, i) {
                  return (
                    <Card key={i} style={{ marginBottom: 6, borderLeft: "3px solid " + (catColor[t.acei_category_number] || C.border) }}>

                        </div>
                      </div>
                    </Card>

              </div>

            {chResults && chResults.items && chResults.items.length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.dim, marginBottom: 8 }}>Companies House API &mdash; {chResults.total_results} total matches</div>
                {chResults.items.slice(0, 6).map(function(c, i) {
                  return (
                    <Card key={i} style={{ marginBottom: 6 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{c.title}</div>
                          <div style={{ fontSize: 11, color: C.muted }}>No. {c.company_number} &middot; {c.company_type}</div>

            {!loading && empResults.length === 0 && !chResults && (

                <div style={{ fontSize: 32, marginBottom: 12 }}>&#128269;</div>

        {sub === "tribunal" && (

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>

  ];

  var [sector, setSector] = useState("financial_services");

            {JURISDICTIONS.map(function(j) { return <option key={j.id} value={j.id}>{j.label} (JM {j.jm})</option>; })}
          </select>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
        {Object.entries(CAT_NAMES).map(function(pair) {
          var k = pair[0], name = pair[1];
          return (
            <div key={k} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: "10px 12px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>

                <span style={{ fontSize: 12, fontWeight: 700, color: C.cyan, fontFamily: "'JetBrains Mono',monospace" }}>{cats[k]}</span>
              </div>
              <input type="range" min={0} max={100} value={cats[k]}
                onChange={function(e) { setCats(function(prev) { return Object.assign({}, prev, { [k]: Number(e.target.value) }); }); }}

              <div style={{ fontSize: 9, color: C.muted, marginTop: 3, fontFamily: "'JetBrains Mono',monospace" }}>Weight: {CAT_WEIGHTS[k]}</div>
            </div>
          );
        })}
      </div>
      <Card style={{ textAlign: "center", border: "2px solid " + diColor }}>
        <div style={{ fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", letterSpacing: 2, marginBottom: 10 }}>Derived Index (DI)</div>

      </Card>
    </div>
  );
}

// ─── COMMUNICATIONS TAB (CCA Layer 2 Triage + Layer 3 Escalations) ───────
function CommunicationsTab({ token }) {
  var [triageItems, setTriageItems] = useState([]);
  var [escalations, setEscalations] = useState([]);
  var [loading, setLoading] = useState(true);
  var [expandedCards, setExpandedCards] = useState({});
  var [editingDrafts, setEditingDrafts] = useState({});
  var [showEscalations, setShowEscalations] = useState(false);
  var [pendingCount, setPendingCount] = useState(0);

  var priorityColors = { P1: "#ef4444", P2: "#f59e0b", P3: "#64748b" };
  var tierColors = { scan: "#64748b", operational: "#22d3ee", governance: "#a78bfa", institutional: "#f59e0b" };

  var loadData = useCallback(async function() {
    if (!token) return;
    setLoading(true);
    try {
      var headers = { "apikey": SB_ANON, "Authorization": "Bearer " + token, "Content-Type": "application/json" };

      var triageRes = await fetch(SB_URL + "/rest/v1/rpc/exec_sql", {
        method: "POST", headers: headers,
        body: JSON.stringify({ sql: "SELECT tq.*, o.name as org_name FROM comms.triage_queue tq LEFT JOIN organisations o ON tq.client_org_id = o.id WHERE tq.status = 'pending' ORDER BY CASE tq.priority WHEN 'P1' THEN 1 WHEN 'P2' THEN 2 ELSE 3 END, tq.created_at ASC" })
      });
      var triageData = triageRes.ok ? await triageRes.json() : [];
      setTriageItems(Array.isArray(triageData) ? triageData : []);
      setPendingCount(Array.isArray(triageData) ? triageData.length : 0);

      var escRes = await fetch(SB_URL + "/rest/v1/rpc/exec_sql", {
        method: "POST", headers: headers,
        body: JSON.stringify({ sql: "SELECT e.*, o.name as org_name FROM comms.escalations e LEFT JOIN organisations o ON e.client_org_id = o.id WHERE e.status IN ('open','in_progress') ORDER BY e.created_at DESC" })
      });
      var escData = escRes.ok ? await escRes.json() : [];
      setEscalations(Array.isArray(escData) ? escData : []);
    } catch (e) { console.error("Comms load error:", e); }
    setLoading(false);
  }, [token]);

  useEffect(function() { loadData(); }, [loadData]);

  var toggleExpand = function(id, section) {
    setExpandedCards(function(prev) { var key = id + "_" + section; var next = Object.assign({}, prev); next[key] = !prev[key]; return next; });
  };

  var handleApprove = async function(item) {
    var response = editingDrafts[item.id] || item.drafted_response;
    try {
      await fetch(SB_URL + "/rest/v1/rpc/exec_sql", {
        method: "POST",
        headers: { "apikey": SB_ANON, "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ sql: "UPDATE comms.triage_queue SET status = 'approved', drafted_response = $1, actioned_at = NOW() WHERE id = $2", params: [response, item.id] })
      });
      loadData();
    } catch (e) { console.error("Approve error:", e); }
  };

  var handleEscalate = async function(item) {
    try {
      await fetch(SB_URL + "/rest/v1/rpc/exec_sql", {
        method: "POST",
        headers: { "apikey": SB_ANON, "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({
          sql: "WITH updated AS (UPDATE comms.triage_queue SET status = 'escalated', actioned_at = NOW() WHERE id = $1) INSERT INTO comms.escalations (triage_id, client_org_id, briefing, recommended_action, status) SELECT $1, client_org_id, interaction_summary, recommended_action, 'open' FROM comms.triage_queue WHERE id = $1",
          params: [item.id]
        })
      });
      loadData();
    } catch (e) { console.error("Escalate error:", e); }
  };

  var updateEscalationStatus = async function(escId, newStatus, notes) {
    try {
      var sql = newStatus === "resolved"
        ? "UPDATE comms.escalations SET status = $1, resolution_notes = $2, resolved_at = NOW() WHERE id = $3"
        : "UPDATE comms.escalations SET status = $1, resolution_notes = $2 WHERE id = $3";
      await fetch(SB_URL + "/rest/v1/rpc/exec_sql", {
        method: "POST",
        headers: { "apikey": SB_ANON, "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ sql: sql, params: [newStatus, notes || "", escId] })
      });
      loadData();
    } catch (e) { console.error("Escalation update error:", e); }
  };

  var timeAgo = function(d) {
    if (!d) return "";
    var mins = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
    if (mins < 60) return mins + "m ago";
    if (mins < 1440) return Math.floor(mins / 60) + "h ago";
    return Math.floor(mins / 1440) + "d ago";
  };

  if (loading) return <div style={{ padding: 40, textAlign: "center", color: C.muted }}>Loading communications...</div>;

  return (
    <div className="scrollable" style={{ height: "100%", padding: "16px 20px" }}>
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>Layer 2 Triage Queue</div>
          {pendingCount > 0 && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "#ef4444", color: "#fff", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{pendingCount}</span>}
          <button onClick={loadData} style={{ marginLeft: "auto", fontSize: 10, color: C.muted, background: "none", border: "1px solid " + C.border, borderRadius: 4, padding: "4px 10px", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace" }}>Refresh</button>
        </div>

        {triageItems.length === 0 ? (
          <div style={{ padding: 40, textAlign: "center", background: C.panel, border: "1px solid " + C.border, borderRadius: 8 }}>
            <div style={{ fontSize: 28, marginBottom: 8, opacity: 0.4 }}>&#9745;</div>
            <div style={{ fontSize: 13, color: C.muted }}>Triage queue is clear. No pending items.</div>
          </div>
        ) : triageItems.map(function(item) {
          return (
            <div key={item.id} style={{ background: C.panel, border: "1px solid " + C.border, borderRadius: 10, marginBottom: 12, overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 8, borderBottom: "1px solid " + C.border }}>
                <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: (priorityColors[item.priority] || "#64748b") + "22", color: priorityColors[item.priority] || "#64748b", border: "1px solid " + (priorityColors[item.priority] || "#64748b") + "44", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{item.priority}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{item.org_name || "Unknown Org"}</span>
                {item.tier && <span style={{ fontSize: 9, padding: "2px 7px", borderRadius: 3, background: (tierColors[item.tier] || "#64748b") + "18", color: tierColors[item.tier] || "#64748b", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>{(item.tier || "").toUpperCase()}</span>}
                <span style={{ marginLeft: "auto", fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace" }}>{timeAgo(item.created_at)}</span>
              </div>

              <div style={{ padding: "12px 16px" }}>
                <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6, marginBottom: 12 }}>{item.interaction_summary}</div>

                {item.ai_analysis && (
                  <div style={{ marginBottom: 10 }}>
                    <button onClick={function() { toggleExpand(item.id, "analysis"); }} style={{ fontSize: 10, color: C.blue, background: "none", border: "none", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, padding: 0 }}>
                      {expandedCards[item.id + "_analysis"] ? "\u25BE" : "\u25B8"} AI ANALYSIS
                    </button>
                    {expandedCards[item.id + "_analysis"] && (
                      <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.65, marginTop: 6, padding: 10, background: C.card + "80", borderRadius: 6 }}>{item.ai_analysis}</div>
                    )}
                  </div>
                )}

                {item.constitutional_position && item.constitutional_position !== "No constitutional position applicable." && (
                  <div style={{ marginBottom: 10 }}>
                    <button onClick={function() { toggleExpand(item.id, "constitutional"); }} style={{ fontSize: 10, color: "#a78bfa", background: "none", border: "none", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, padding: 0 }}>
                      {expandedCards[item.id + "_constitutional"] ? "\u25BE" : "\u25B8"} CONSTITUTIONAL POSITION
                    </button>
                    {expandedCards[item.id + "_constitutional"] && (
                      <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.65, marginTop: 6, padding: 10, background: "rgba(167,139,250,0.06)", border: "1px solid rgba(167,139,250,0.12)", borderRadius: 6 }}>{item.constitutional_position}</div>
                    )}
                  </div>
                )}

                <div style={{ marginTop: 12, marginBottom: 12 }}>
                  <div style={{ fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, marginBottom: 6 }}>DRAFTED RESPONSE ({(item.preferred_language || "en").toUpperCase()})</div>
                  <textarea
                    value={editingDrafts[item.id] !== undefined ? editingDrafts[item.id] : (item.drafted_response || "")}
                    onChange={function(e) { setEditingDrafts(function(prev) { var next = Object.assign({}, prev); next[item.id] = e.target.value; return next; }); }}
                    style={{ width: "100%", minHeight: 100, padding: 10, fontSize: 12, lineHeight: 1.6, color: C.text, background: C.card, border: "1px solid " + C.border, borderRadius: 6, resize: "vertical", outline: "none", fontFamily: "Georgia, serif" }}
                  />
                </div>

                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={function() { handleApprove(item); }} style={{ flex: 1, padding: "8px 14px", fontSize: 11, fontWeight: 700, color: "#fff", background: "linear-gradient(135deg,#22c55e,#16a34a)", border: "none", borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>&#10003; APPROVE &amp; SEND</button>
                  <button onClick={function() { setEditingDrafts(function(prev) { var next = Object.assign({}, prev); next[item.id] = item.drafted_response || ""; return next; }); }} style={{ padding: "8px 14px", fontSize: 11, fontWeight: 700, color: C.blue, background: C.blueBg, border: "1px solid " + C.blue + "33", borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>&#9998; EDIT</button>
                  <button onClick={function() { handleEscalate(item); }} style={{ padding: "8px 14px", fontSize: 11, fontWeight: 700, color: "#ef4444", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>&#8593; ESCALATE</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div>
        <button onClick={function() { setShowEscalations(!showEscalations); }} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "12px 16px", background: C.panel, border: "1px solid " + C.border, borderRadius: 8, cursor: "pointer", marginBottom: 12 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{showEscalations ? "\u25BE" : "\u25B8"} Layer 3 Escalations</span>
          {escalations.length > 0 && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "rgba(239,68,68,0.15)", color: "#ef4444", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{escalations.length}</span>}
        </button>

        {showEscalations && (
          escalations.length === 0 ? (
            <div style={{ padding: 32, textAlign: "center", background: C.panel, border: "1px solid " + C.border, borderRadius: 8 }}>
              <div style={{ fontSize: 13, color: C.muted }}>No open escalations.</div>
            </div>
          ) : escalations.map(function(esc) {
            return (
              <div key={esc.id} style={{ background: C.panel, border: "1px solid rgba(239,68,68,0.15)", borderRadius: 10, marginBottom: 10, padding: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{esc.org_name || "Unknown Org"}</span>
                  <span style={{ fontSize: 9, padding: "2px 7px", borderRadius: 3, background: esc.status === "open" ? "rgba(239,68,68,0.1)" : "rgba(245,158,11,0.1)", color: esc.status === "open" ? "#ef4444" : "#f59e0b", fontFamily: "'JetBrains Mono',monospace" }}>{(esc.status || "").toUpperCase()}</span>
                  <span style={{ marginLeft: "auto", fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace" }}>{timeAgo(esc.created_at)}</span>
                </div>
                <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.6, marginBottom: 10 }}>{esc.briefing || "No briefing available."}</div>
                {esc.recommended_action && <div style={{ fontSize: 11, color: C.blue, marginBottom: 10, fontFamily: "'JetBrains Mono',monospace" }}>Recommended: {esc.recommended_action}</div>}
                <textarea
                  placeholder="Resolution notes..."
                  defaultValue={esc.resolution_notes || ""}
                  id={"esc-notes-" + esc.id}
                  style={{ width: "100%", minHeight: 60, padding: 8, fontSize: 11, color: C.text, background: C.card, border: "1px solid " + C.border, borderRadius: 6, resize: "vertical", outline: "none", marginBottom: 8, fontFamily: "Georgia, serif" }}
                />
                <div style={{ display: "flex", gap: 6 }}>
                  {esc.status === "open" && <button onClick={function() { updateEscalationStatus(esc.id, "in_progress", document.getElementById("esc-notes-" + esc.id).value); }} style={{ fontSize: 10, padding: "6px 12px", color: "#f59e0b", background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 4, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace" }}>Mark In Progress</button>}
                  <button onClick={function() { updateEscalationStatus(esc.id, "resolved", document.getElementById("esc-notes-" + esc.id).value); }} style={{ fontSize: 10, padding: "6px 12px", color: "#22c55e", background: "rgba(34,197,94,0.08)", border: "1px solid rgba(34,197,94,0.2)", borderRadius: 4, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace" }}>&#10003; Resolve</button>
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

      localStorage.setItem("sb-token", d.access_token);
      localStorage.setItem("sb-user", JSON.stringify(d.user));

            style={{ width: "100%", background: C.panel, border: "1px solid " + C.border, borderRadius: 6, color: C.text, padding: "10px 12px", fontSize: 13, outline: "none", fontFamily: "'Syne',sans-serif" }} />
        </div>

          <div style={{ fontSize: 10, color: C.muted, marginBottom: 5, fontFamily: "'JetBrains Mono',monospace", letterSpacing: 1 }}>PASSWORD</div>

            style={{ width: "100%", background: C.panel, border: "1px solid " + C.border, borderRadius: 6, color: C.text, padding: "10px 12px", fontSize: 13, outline: "none", fontFamily: "'Syne',sans-serif" }} />
        </div>
        {err && <div style={{ fontSize: 12, color: C.red, marginBottom: 12 }}>{err}</div>}

          {loading ? "Authenticating\u2026" : "Access Command Centre"}
        </button>
        <div style={{ textAlign: "center", fontSize: 10, color: C.muted }}>AI Lane Limited &middot; Co. No. 17035654 &middot; Internal use only</div>
      </div>
    </div>
  );
}

// ─── QUALITY TAB ──────────────────────────────────────────────────────────
function QualityTab({ token }) {
  var [data, setData] = useState(null);
  var [loading, setLoading] = useState(true);

  useEffect(function() {
    loadQualityTab();
  }, [token]);

  async function loadQualityTab() {
    setLoading(true);
    try {
      var authToken = token || SB_ANON;
      var r = await fetch(
        SB_URL + '/rest/v1/model_performance_log?order=computed_at.desc&limit=1&select=*',
        { headers: { 'Authorization': 'Bearer ' + authToken, 'apikey': SB_ANON } }
      );
      var rows = await r.json();
      var d = Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
      setData(d);
    } catch (err) {
      console.error('Quality tab load error:', err);
    }
    setLoading(false);
  }

  var d = data;
  var ucr = d && typeof d.under_critical_rate === 'number' ? d.under_critical_rate : 0;
  var ucrDisplay = d ? (ucr * 100).toFixed(2) + '%' : '—';
  var ucrElevated = d && ucr > 0;

  var sessions = d ? (d.total_sessions ?? '—') : '—';
  var findings = d ? (d.total_findings ?? '—') : '—';
  var complaints = d ? (d.complaint_volume ?? '—') : '—';
  var fmb = d ? (d.failure_mode_b_count ?? 0) : 0;

  var dist = d ? (d.severity_distribution || {}) : {};
  var cp = dist.critical_pct ?? 0;
  var mp = dist.major_pct ?? 0;
  var mn = dist.minor_pct ?? 0;

  var lastAuditText = 'No audit data yet — first run Sunday 07:00 UTC.';
  if (d && d.computed_at) {
    var ts = new Date(d.computed_at);
    lastAuditText = 'Last audit: ' + ts.toLocaleDateString('en-GB') +
      ' at ' + ts.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) +
      ' UTC. Week ending ' + new Date(d.period_end).toLocaleDateString('en-GB') + '.';
  }

  return (
    <div className="scrollable fade-in" style={{ padding: "20px 24px", height: "100%" }}>
      <div style={{ marginBottom: "1.5rem" }}>
        <h2 style={{ fontSize: "1.3rem", fontWeight: 700, color: "#F0F4FA", marginBottom: "0.25rem" }}>Quality Assurance</h2>
        <p style={{ fontSize: "0.8rem", color: "#64748B" }}>Governed by AILANE-SPEC-QAI-001 v1.0 (AMD-019)</p>
      </div>

      <div style={{
        borderLeft: "3px solid " + (ucrElevated ? "#F59E0B" : "#EF4444"),
        background: ucrElevated ? "rgba(245,158,11,0.06)" : "rgba(239,68,68,0.05)",
        borderRadius: "0 8px 8px 0", padding: "1rem 1.25rem", marginBottom: "1.5rem"
      }}>
        <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#EF4444", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "0.25rem" }}>under_critical_rate — Existential Metric</div>
        <div style={{ fontSize: "2rem", fontWeight: 800, color: "#F0F4FA" }}>{ucrDisplay}</div>
        <div style={{ fontSize: "0.82rem", color: ucrElevated ? "#F59E0B" : (d ? "#10B981" : "#94A3B8"), marginTop: "0.25rem" }}>
          {!d ? "Proportion of sessions where a Critical finding was not surfaced. Zero tolerance."
            : ucrElevated ? "\u26A0 ELEVATED — Mandatory investigation required per QAI-001 \u00A75.3"
            : "\u2713 Within tolerance this week"}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "1rem", marginBottom: "1.5rem" }}>
        <div style={{ background: "#1B2A4A", border: "1px solid #2A3A5C", borderRadius: 8, padding: "1rem" }}>
          <div style={{ fontSize: "0.75rem", color: "#94A3B8", marginBottom: "0.25rem" }}>Sessions this week</div>
          <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#F0F4FA" }}>{sessions}</div>
        </div>
        <div style={{ background: "#1B2A4A", border: "1px solid #2A3A5C", borderRadius: 8, padding: "1rem" }}>
          <div style={{ fontSize: "0.75rem", color: "#94A3B8", marginBottom: "0.25rem" }}>Findings this week</div>
          <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#F0F4FA" }}>{findings}</div>
        </div>
        <div style={{ background: "#1B2A4A", border: "1px solid #2A3A5C", borderRadius: 8, padding: "1rem" }}>
          <div style={{ fontSize: "0.75rem", color: "#94A3B8", marginBottom: "0.25rem" }}>Complaints this week</div>
          <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#F0F4FA" }}>{complaints}</div>
        </div>
        <div style={{ background: "#1B2A4A", border: fmb > 0 ? "1px solid rgba(239,68,68,0.4)" : "1px solid #2A3A5C", borderRadius: 8, padding: "1rem" }}>
          <div style={{ fontSize: "0.75rem", color: "#94A3B8", marginBottom: "0.25rem" }}>Failure Mode B</div>
          <div style={{ fontSize: "1.5rem", fontWeight: 700, color: fmb > 0 ? "#EF4444" : "#F0F4FA" }}>{fmb}</div>
        </div>
      </div>

      <div style={{ marginBottom: "1.5rem" }}>
        <div style={{ fontSize: "0.85rem", fontWeight: 700, color: "#F0F4FA", marginBottom: "0.75rem" }}>Severity Distribution — this week</div>
        <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
            <span style={{ width: 64, fontSize: "0.78rem", fontWeight: 600, color: "#EF4444" }}>Critical</span>
            <div style={{ flex: 1, height: 10, background: "rgba(255,255,255,0.06)", borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: cp + "%", background: "#EF4444", borderRadius: 5, transition: "width 0.5s" }}></div>
            </div>
            <span style={{ width: 36, fontSize: "0.78rem", color: "#94A3B8", textAlign: "right" }}>{cp}%</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
            <span style={{ width: 64, fontSize: "0.78rem", fontWeight: 600, color: "#F59E0B" }}>Major</span>
            <div style={{ flex: 1, height: 10, background: "rgba(255,255,255,0.06)", borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: mp + "%", background: "#F59E0B", borderRadius: 5, transition: "width 0.5s" }}></div>
            </div>
            <span style={{ width: 36, fontSize: "0.78rem", color: "#94A3B8", textAlign: "right" }}>{mp}%</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
            <span style={{ width: 64, fontSize: "0.78rem", fontWeight: 600, color: "#10B981" }}>Minor</span>
            <div style={{ flex: 1, height: 10, background: "rgba(255,255,255,0.06)", borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: mn + "%", background: "#10B981", borderRadius: 5, transition: "width 0.5s" }}></div>
            </div>
            <span style={{ width: 36, fontSize: "0.78rem", color: "#94A3B8", textAlign: "right" }}>{mn}%</span>
          </div>
        </div>
      </div>

      <div style={{ fontSize: "0.82rem", color: "#64748B" }}>{lastAuditText}</div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────
function App() {
  var [token, setToken] = useState(null);
  var [user, setUser] = useState(null);
  var [activeTab, setActiveTab] = useState("\u26A1 Command");

  useEffect(function() {
    try {
      var sbSession = localStorage.getItem("sb-cnbsxwtvazfvzmltkuvx-auth-token");
      if (sbSession) {
        var parsed = JSON.parse(sbSession);
        if (parsed && parsed.access_token && parsed.user) {
          setToken(parsed.access_token);
          setUser(parsed.user);
          return;
        }
      }
      var legacyToken = localStorage.getItem("sb-token");
      var legacyUser = localStorage.getItem("sb-user");
      if (legacyToken && legacyUser) {
        setToken(legacyToken);
        try { setUser(JSON.parse(legacyUser)); } catch(e) {}
      }
    } catch(e) {}
  }, []);

  var TABS = ["\u26A1 Command", "\uD83D\uDCE8 Communications", "\uD83D\uDCF0 Regulatory Intel", "\uD83D\uDCDA Knowledge Library", "\uD83D\uDD0D Intelligence Hub", "\uD83D\uDCCA Client Pipeline", "\u2699\uFE0F Data Systems", "\uD83C\uDFE2 Business Office", "\uD83D\uDD2C Simulator", "\uD83D\uDCDC Governance", "\uD83D\uDCC8 Analytics", "\uD83E\uDD16 AI Assistant", "\u2705 Quality"];

  var renderTab = function() {
    switch (activeTab) {
      case "\u26A1 Command": return <CommandTab token={token} />;
      case "\uD83D\uDCE8 Communications": return <CommunicationsTab token={token} />;
      case "\uD83D\uDCF0 Regulatory Intel": return <RegulatoryIntelTab token={token} />;
      case "\uD83D\uDCDA Knowledge Library": return <KnowledgeLibraryTab token={token} />;
      case "\uD83D\uDD0D Intelligence Hub": return <IntelligenceHubTab token={token} />;
      case "\uD83D\uDCCA Client Pipeline": return <ClientPipelineTab token={token} />;
      case "\u2699\uFE0F Data Systems": return <DataSystemsTab token={token} />;
      case "\uD83C\uDFE2 Business Office": return <BusinessOfficeTab />;
      case "\uD83D\uDD2C Simulator": return <SimulatorTab />;
      case "\uD83D\uDCDC Governance": return <GovernanceTab />;
      case "\uD83D\uDCC8 Analytics": return <AnalyticsTab token={token} />;
      case "\uD83E\uDD16 AI Assistant": return <AIAssistantTab token={token} />;
      case "\u2705 Quality": return <QualityTab token={token} />;
      default: return <CommandTab token={token} />;
    }
  };

  if (!token) return <Login onAuth={function(t, u) { setToken(t); setUser(u); }} />;

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
      {/* Sidebar */}
      <div style={{ width: 196, background: "#07101d", borderRight: "1px solid " + C.border, display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "15px 14px", borderBottom: "1px solid " + C.border }}>
          <div style={{ fontSize: 17, fontWeight: 800, color: C.cyan, letterSpacing: -0.5 }}>AILANE</div>
          <div style={{ fontSize: 8, color: C.muted, fontFamily: "'JetBrains Mono',monospace", letterSpacing: 1.5, marginTop: 3, textTransform: "uppercase" }}>CEO Command Centre v4</div>
        </div>
        <div className="scrollable" style={{ flex: 1, paddingTop: 6, paddingBottom: 6 }}>
          {TABS.map(function(t) {
            return (
              <button key={t} onClick={function() { setActiveTab(t); }} style={{
                width: "100%", padding: "8px 14px", background: activeTab === t ? C.blueBg : "transparent",
                border: "none", borderLeft: "2px solid " + (activeTab === t ? C.blue : "transparent"),
                color: activeTab === t ? C.text : C.muted, cursor: "pointer", textAlign: "left",
                fontSize: 11.5, fontFamily: "'Syne',sans-serif", fontWeight: activeTab === t ? 600 : 400,
                transition: "all 0.12s", display: "block"
              }}>{t}</button>
            );
          })}
        </div>
        <div style={{ padding: "10px 14px", borderTop: "1px solid " + C.border }}>
          <div style={{ fontSize: 9, color: C.muted, marginBottom: 2, fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", letterSpacing: 1 }}>Authenticated</div>
          <div style={{ fontSize: 10, color: C.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user ? user.email : "mark@ailane.ai"}</div>
          <button onClick={function() { setToken(null); setUser(null); localStorage.removeItem("sb-cnbsxwtvazfvzmltkuvx-auth-token"); localStorage.removeItem("sb-token"); localStorage.removeItem("sb-user"); }} style={{ marginTop: 7, fontSize: 10, color: C.muted, background: "none", border: "none", cursor: "pointer", padding: 0 }}>Sign out</button>
        </div>
      </div>

      {/* Content area */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
        {/* Topbar */}
        <div style={{ padding: "9px 18px", borderBottom: "1px solid " + C.border, background: C.card, display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{activeTab}</div>
            <div style={{ fontSize: 9, color: C.muted, fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>
              AI Lane Limited &middot; Co. 17035654 &middot; ICO 00013389720 &middot; {new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ fontSize: 9, padding: "3px 8px", borderRadius: 3, background: C.greenBg, color: "#4ade80", border: "1px solid #15803d", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>&#9679; LIVE</span>
            <span style={{ fontSize: 10, color: C.muted }}>Supabase Pro &middot; eu-central-1</span>
          </div>
        </div>
        <div style={{ flex: 1, overflow: "hidden" }}>{renderTab()}</div>
      </div>

      <FloatingAI token={token} activeTab={activeTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
