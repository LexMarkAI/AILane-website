<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}

@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
input::placeholder{color:#475569}
select option{background:#0f172a;color:#e2e8f0}

</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, Tooltip, CartesianGrid } = Recharts;

// ─── SUPABASE CONFIG ────────────────────────────────────────────────────
const SB_URL = "https://cnbsxwtvazfvzmltkuvx.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g";

// ─── CONSTANTS ──────────────────────────────────────────────────────────
const SECTORS = [
  { id: "public_sector", label: "Public Sector", sm: 1.30 },
  { id: "financial_services", label: "Financial Services", sm: 1.25 },
  { id: "professional_services", label: "Professional Services", sm: 1.20 },
  { id: "healthcare", label: "Healthcare", sm: 1.15 },
  { id: "media_entertainment", label: "Media & Entertainment", sm: 1.15 },
  { id: "technology", label: "Technology", sm: 1.10 },
  { id: "education", label: "Education", sm: 1.10 },
  { id: "retail_hospitality", label: "Retail & Hospitality", sm: 1.05 },
  { id: "transport_logistics", label: "Transport & Logistics", sm: 1.05 },
  { id: "manufacturing", label: "Manufacturing", sm: 1.00 },
  { id: "construction", label: "Construction", sm: 0.95 },
  { id: "charities", label: "Charities & Non-Profits", sm: 0.90 },
];
const JURISDICTIONS = [
  { id: "london", label: "London", jm: 1.40 },
  { id: "south_east", label: "South East", jm: 1.25 },
  { id: "scotland", label: "Scotland", jm: 1.20 },
  { id: "northern_ireland", label: "Northern Ireland", jm: 1.15 },
  { id: "north_west", label: "North West", jm: 1.10 },
  { id: "west_midlands", label: "West Midlands", jm: 1.10 },
  { id: "east_midlands", label: "East Midlands", jm: 1.05 },
  { id: "wales", label: "Wales", jm: 1.00 },
  { id: "south_west", label: "South West", jm: 0.95 },
  { id: "north_east", label: "North East", jm: 0.90 },
];
const BANDS = [
  { max: 20, label: "Low Exposure", color: "#10b981", bg: "rgba(16,185,129,0.12)" },
  { max: 40, label: "Controlled", color: "#22d3ee", bg: "rgba(34,211,238,0.12)" },
  { max: 60, label: "Elevated", color: "#f59e0b", bg: "rgba(245,158,11,0.12)" },
  { max: 80, label: "High", color: "#f97316", bg: "rgba(249,115,22,0.12)" },
  { max: 100, label: "Critical", color: "#ef4444", bg: "rgba(239,68,68,0.12)" },
];
const getBand = (v) => BANDS.find(b => v <= b.max) || BANDS[4];
const CAT_LABELS = {
  unfair_dismissal: "Unfair Dismissal", discrimination_harassment: "Discrimination & Harassment",
  wages_working_time: "Wages & Working Time", whistleblowing: "Whistleblowing",
  health_safety: "Health & Safety", redundancy_org_change: "Redundancy & Org Change",
  breach_of_contract: "Breach of Contract", employment_status: "Employment Status",
  parental_family_rights: "Parental & Family Rights", trade_union_collective: "Trade Union & Collective",
  business_transfers_insolvency: "Business Transfers (TUPE)", data_protection_privacy: "Data Protection",
};

// ─── API HELPER ─────────────────────────────────────────────────────────
const sbFetch = async (path, token) => {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_ANON, Authorization: `Bearer ${token || SB_ANON}`, "Content-Type": "application/json" }
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
};

// ─── COMPONENTS ─────────────────────────────────────────────────────────
const Gauge = ({ value, size = 180 }) => {
  const band = getBand(value);
  const r = size / 2 - 16, cx = size / 2, cy = size / 2 + 10;
  const arc = (pct) => {
    const a = Math.PI + pct * Math.PI;
    return `${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)}`;
  };
  return (
    <svg width={size} height={size * 0.62} viewBox={`0 0 ${size} ${size * 0.62}`}>
      {BANDS.map((b, i) => {
        const s = (i * 20) / 100, e = ((i + 1) * 20) / 100;
        return <path key={i} d={`M ${arc(s)} A ${r} ${r} 0 0 1 ${arc(e)}`} fill="none" stroke={b.color} strokeWidth={10} strokeLinecap="round" opacity={0.25} />;
      })}
      <path d={`M ${arc(0)} A ${r} ${r} 0 0 1 ${arc(Math.min(value, 100) / 100)}`} fill="none" stroke={band.color} strokeWidth={10} strokeLinecap="round" />
      <text x={cx} y={cy - 14} textAnchor="middle" fill={band.color} fontSize={size * 0.22} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{value}</text>
      <text x={cx} y={cy + 8} textAnchor="middle" fill={band.color} fontSize={11} fontWeight="600" opacity={0.9}>{band.label}</text>
    </svg>
  );
};

const StatCard = ({ label, value, sub, accent, icon }) => (
  <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "16px 18px", display: "flex", flexDirection: "column", gap: 4 }}>
    <div style={{ fontSize: 11, color: "#64748b", letterSpacing: "0.5px", textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}>
      {icon && <span style={{ fontSize: 14 }}>{icon}</span>}{label}
    </div>
    <div style={{ fontSize: 26, fontWeight: 700, color: accent || "#e2e8f0", fontFamily: "'JetBrains Mono',monospace" }}>{value}</div>
    {sub && <div style={{ fontSize: 11, color: "#94a3b8" }}>{sub}</div>}
  </div>
);

const Badge = ({ children, color = "#22d3ee" }) => (
  <span style={{ display: "inline-flex", padding: "3px 10px", borderRadius: 4, fontSize: 10, fontWeight: 600, letterSpacing: "0.5px", textTransform: "uppercase", background: `${color}18`, color, border: `1px solid ${color}30` }}>{children}</span>
);

const SectionHeader = ({ title, subtitle, action }) => (
  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 20, paddingBottom: 12, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, color: "#e2e8f0", margin: 0 }}>{title}</h2>
      {subtitle && <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>{subtitle}</div>}
    </div>
    {action}
  </div>
);

const Table = ({ columns, rows, onRowClick }) => (
  <div style={{ overflowX: "auto", borderRadius: 8, border: "1px solid rgba(255,255,255,0.06)" }}>
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
      <thead>
        <tr style={{ background: "rgba(255,255,255,0.03)" }}>
          {columns.map((c, i) => <th key={i} style={{ padding: "10px 14px", textAlign: "left", color: "#64748b", fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.5px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>{c.label}</th>)}
        </tr>
      </thead>
      <tbody>
        {rows.map((row, ri) => (
          <tr key={ri} onClick={() => onRowClick && onRowClick(row)} style={{ cursor: onRowClick ? "pointer" : "default", borderBottom: "1px solid rgba(255,255,255,0.03)" }}
            onMouseEnter={e => e.currentTarget.style.background = "rgba(34,211,238,0.04)"}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            {columns.map((c, ci) => <td key={ci} style={{ padding: "10px 14px", color: "#cbd5e1" }}>{c.render ? c.render(row) : row[c.key]}</td>)}
          </tr>
        ))}
      </tbody>
    </table>
  </div>
);

const LoadingPulse = () => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: 60, gap: 8 }}>
    <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22d3ee", animation: "pulse 1s ease infinite" }} />
    <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22d3ee", animation: "pulse 1s ease infinite 0.2s" }} />
    <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22d3ee", animation: "pulse 1s ease infinite 0.4s" }} />
  </div>
);

// ─── NAV CONFIG ─────────────────────────────────────────────────────────
const NAV = [
  { id: "overview", label: "Command Overview", icon: "\u26A1" },
  { id: "pipeline", label: "Client Pipeline", icon: "\uD83D\uDCCA" },
  { id: "simulator", label: "Company Simulator", icon: "\uD83D\uDD2C" },
  { id: "intelligence", label: "Intelligence Hub", icon: "\uD83D\uDD0D" },
  { id: "regulatory", label: "Regulatory Feed", icon: "\uD83D\uDCF0" },
  { id: "scrapers", label: "Data Pipeline", icon: "\u2699\uFE0F" },
  { id: "notifications", label: "Notifications", icon: "\uD83D\uDD14" },
  { id: "business", label: "Business Hub", icon: "\uD83C\uDFE2" },
  { id: "governance", label: "Governance", icon: "\uD83D\uDCDC" },
];

// ─── MAIN APP ───────────────────────────────────────────────────────────
function AilaneCEO() {
  const [activeTab, setActiveTab] = useState("overview");
  const [token, setToken] = useState(null);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [sideOpen, setSideOpen] = useState(true);

  // Data state
  const [domainScores, setDomainScores] = useState([]);
  const [categoryScores, setCategoryScores] = useState([]);
  const [scraperRuns, setScraperRuns] = useState([]);
  const [signups, setSignups] = useState([]);
  const [employers, setEmployers] = useState({ total: 0, ch_linked: 0, ch_pending: 0 });
  const [legislativeChanges, setLegislativeChanges] = useState([]);
  const [ceoBrief, setCeoBrief] = useState(null);
  const [simQuery, setSimQuery] = useState("");
  const [simResults, setSimResults] = useState(null);
  const [simSector, setSimSector] = useState("technology");
  const [simJurisdiction, setSimJurisdiction] = useState("london");
  const [intelQuery, setIntelQuery] = useState("");
  const [intelResults, setIntelResults] = useState(null);
  const [intelLoading, setIntelLoading] = useState(false);

  // Auth
  useEffect(() => {
    const stored = localStorage.getItem("sb-token");
    if (stored) {
      setToken(stored);
      setUser({ email: "mark@ailane.ai" });
    }
    (async () => {
      try {
        const pw = prompt("Enter password:");
        if (!pw) { setLoading(false); return; }
        const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
          method: "POST",
          headers: { apikey: SB_ANON, "Content-Type": "application/json" },
          body: JSON.stringify({ email: "mark@ailane.ai", password: pw }),
        });
        if (res.ok) {
          const d = await res.json();
          setToken(d.access_token);
          setUser(d.user);
          localStorage.setItem("sb-token", d.access_token);
        }
      } catch (e) { console.error(e); }
      setLoading(false);
    })();
  }, []);

  // Load data
  useEffect(() => {
    if (!token) return;
    const load = async () => {
      try {
        const [ds, cs, sr, su, lc, cb] = await Promise.all([
          sbFetch("acei_domain_scores?org_id=eq.00000000-0000-0000-0000-000000000000&order=week_start_date.desc&limit=52", token),
          sbFetch("acei_category_scores?org_id=eq.00000000-0000-0000-0000-000000000000&week_start_date=eq.2026-02-23&order=category", token),
          sbFetch("scraper_runs?order=started_at.desc&limit=20", token),
          sbFetch("early_access_signups?order=created_at.desc&limit=20", token),
          sbFetch("legislative_changes?employment_related=eq.true&order=date_published.desc&limit=30", token),
          sbFetch("ceo_daily_briefs?order=brief_date.desc&limit=1", token),
        ]);
        setDomainScores(ds);
        setCategoryScores(cs);
        setScraperRuns(sr);
        setSignups(su);
        setLegislativeChanges(lc);
        if (cb.length) setCeoBrief(cb[0]);
      } catch (e) { console.error("Data load error:", e); }
    };
    load();
  }, [token]);

  // Employer count
  useEffect(() => {
    if (!token) return;
    (async () => {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/employer_master?select=id&limit=1`, {
          headers: { apikey: SB_ANON, Authorization: `Bearer ${token}`, Prefer: "count=exact" }
        });
        const total = parseInt((res.headers.get("content-range") || "").split("/")[1] || "0");
        setEmployers(prev => ({ ...prev, total }));
      } catch (e) {}
    })();
  }, [token]);

  // Company simulator
  const runSimulation = async () => {
    if (!simQuery.trim() || !token) return;
    try {
      const results = await sbFetch(
        `employer_master?or=(raw_name.ilike.*${encodeURIComponent(simQuery)}*,normalised_name.ilike.*${encodeURIComponent(simQuery)}*)&limit=20&select=id,raw_name,normalised_name,companies_house_number,acei_sector,jurisdiction_region,sic_codes,headcount_estimate,ch_fetch_status`,
        token
      );
      if (results.length) {
        const ids = results.map(r => r.id).join(",");
        const profiles = await sbFetch(`employer_tribunal_profile?employer_id=in.(${ids})&select=*`, token);
        const profileMap = {};
        profiles.forEach(p => profileMap[p.employer_id] = p);
        setSimResults(results.map(r => ({ ...r, profile: profileMap[r.id] || null })));
      } else {
        setSimResults([]);
      }
    } catch (e) { console.error(e); setSimResults([]); }
  };

  // Intelligence search
  const runIntelSearch = async () => {
    if (!intelQuery.trim() || !token) return;
    setIntelLoading(true);
    try {
      const [emps, decisions] = await Promise.all([
        sbFetch(`employer_master?or=(raw_name.ilike.*${encodeURIComponent(intelQuery)}*,normalised_name.ilike.*${encodeURIComponent(intelQuery)}*)&limit=10&select=id,raw_name,normalised_name,companies_house_number,acei_sector,jurisdiction_region,headcount_estimate`, token),
        sbFetch(`tribunal_decisions?title.ilike.*${encodeURIComponent(intelQuery)}*&order=decision_date.desc&limit=20&select=id,title,decision_date,acei_category,jurisdiction,case_number,compensation_awarded`, token),
      ]);
      let profiles = [];
      if (emps.length) {
        const ids = emps.map(r => r.id).join(",");
        profiles = await sbFetch(`employer_tribunal_profile?employer_id=in.(${ids})&select=*`, token);
      }
      const profileMap = {};
      profiles.forEach(p => profileMap[p.employer_id] = p);
      setIntelResults({
        employers: emps.map(e => ({ ...e, profile: profileMap[e.id] })),
        decisions,
      });
    } catch (e) { console.error(e); }
    setIntelLoading(false);
  };

  const latest = domainScores[0] || {};
  const prev = domainScores[1] || {};
  const delta = (latest.di || 0) - (prev.di || 0);

  const trendData = useMemo(() =>
    [...domainScores].reverse().map(d => ({
      week: d.week_start_date ? d.week_start_date.slice(5) : "",
      di: d.di,
      drt: parseFloat(d.drt),
    })), [domainScores]);

  const segmentData = [
    { name: "A \u2014 Critical", value: 513, fill: "#ef4444" },
    { name: "B \u2014 Elevated", value: 3823, fill: "#f59e0b" },
    { name: "C \u2014 Historical", value: 23834, fill: "#22d3ee" },
    { name: "D \u2014 Clean", value: 50529, fill: "#10b981" },
  ];

  // ─── RENDER SECTIONS ──────────────────────────────────────────────────
  const renderOverview = () => (
    <div>
      <SectionHeader title="Command Overview" subtitle={`AI Lane Limited \u00B7 ${new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}`} />
      {ceoBrief && (
        <div style={{ background: "linear-gradient(135deg, rgba(34,211,238,0.06) 0%, rgba(139,92,246,0.04) 100%)", border: "1px solid rgba(34,211,238,0.15)", borderRadius: 10, padding: "16px 20px", marginBottom: 24 }}>
          <div style={{ fontSize: 11, color: "#22d3ee", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Daily Brief \u2014 {ceoBrief.mood}</div>
          <div style={{ fontSize: 14, color: "#e2e8f0", lineHeight: 1.5 }}>{ceoBrief.headline}</div>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12, marginBottom: 28 }}>
        <StatCard label="Domain Index" value={latest.di || "\u2014"} sub={`${delta >= 0 ? "+" : ""}${delta} from last week`} accent={getBand(latest.di || 0).color} icon="\uD83D\uDCC8" />
        <StatCard label="Tribunal Decisions" value="130,854" sub="UK database" accent="#22d3ee" icon="\u2696\uFE0F" />
        <StatCard label="Employer Profiles" value="78,699" sub={`${((10849/78699)*100).toFixed(0)}% CH enriched`} accent="#a78bfa" icon="\uD83C\uDFE2" />
        <StatCard label="Legislation Library" value="30" sub="All 12 ACEI categories" accent="#10b981" icon="\uD83D\uDCDA" />
        <StatCard label="Early Access" value={signups.length || "3"} sub="Signups captured" accent="#f59e0b" icon="\uD83D\uDC65" />
        <StatCard label="Scrapers" value="7" sub="Automated jobs" accent="#22d3ee" icon="\u2699\uFE0F" />
        <StatCard label="Jurisdictions" value="53" sub="Global coverage" accent="#f472b6" icon="\uD83C\uDF0D" />
        <StatCard label="EHRC Actions" value="152" sub="Enforcement tracked" accent="#ef4444" icon="\uD83D\uDD34" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20, marginBottom: 28 }}>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 24, textAlign: "center" }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>ACEI Market Index</div>
          <Gauge value={latest.di || 22} size={200} />
          <div style={{ marginTop: 12, display: "flex", justifyContent: "center", gap: 16 }}>
            <div><div style={{ fontSize: 10, color: "#64748b" }}>DRT</div><div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace" }}>{parseFloat(latest.drt || 0).toFixed(0)}</div></div>
            <div><div style={{ fontSize: 10, color: "#64748b" }}>DMR</div><div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace" }}>{latest.dmr || 300}</div></div>
            <div><div style={{ fontSize: 10, color: "#64748b" }}>Structural</div><div style={{ fontSize: 16, fontWeight: 700, color: latest.structural_flag ? "#ef4444" : "#10b981" }}>{latest.structural_flag ? "\u26A0\uFE0F" : "\u2713"}</div></div>
          </div>
        </div>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "20px 20px 8px" }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Domain Index \u2014 12-Week Trend</div>
          <ResponsiveContainer width="100%" height={180}>
            <AreaChart data={trendData}>
              <defs>
                <linearGradient id="diGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#22d3ee" stopOpacity={0.3} />
                  <stop offset="100%" stopColor="#22d3ee" stopOpacity={0} />
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
              <XAxis dataKey="week" tick={{ fill: "#64748b", fontSize: 10 }} axisLine={false} tickLine={false} />
              <YAxis domain={[0, 100]} tick={{ fill: "#64748b", fontSize: 10 }} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background: "#0f172a", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontSize: 12 }} />
              <Area type="monotone" dataKey="di" stroke="#22d3ee" fill="url(#diGrad)" strokeWidth={2} dot={{ r: 3, fill: "#22d3ee" }} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Category Breakdown \u2014 Week of {latest.week_start_date || "2026-02-23"}</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
          {categoryScores.map((c, i) => {
            const pct = Math.min((parseFloat(c.wcs) / 15) * 100, 100);
            const clr = pct > 70 ? "#ef4444" : pct > 40 ? "#f59e0b" : "#22d3ee";
            return (
              <div key={i} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, padding: "12px 14px", borderLeft: `3px solid ${clr}` }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 6, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{CAT_LABELS[c.category] || c.category}</div>
