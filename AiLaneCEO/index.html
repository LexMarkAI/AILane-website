async function fetchDashboardData(token) {
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/ceo-dashboard-data?section=all`, {
      headers: {
        'Authorization': `Bearer ${token}`,

function formatGBP(val) {
  const n = Number(val);
  if (isNaN(n)) return '—';
  return '£' + Math.abs(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatNum(val) {
  const n = Number(val);
  if (isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function friendlySupplier(name) {

  if (name.includes('Mz-Director L2B')) return 'Director Loan';
  if (name.includes('Ailane Limited')) return 'Stripe Test Charge';

}

// MAIN APP
// ═══════════════════════════════════════════════
function App() {
  const [authState, setAuthState] = useState('checking'); // checking | needs_login | wrong_user | ok
  const [token, setToken] = useState(null);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [now, setNow] = useState(new Date());

  // Clock tick
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  // Auth check — self-contained: handles PKCE code exchange + existing session + sign-in
  useEffect(() => {
    async function checkAuth() {
      // Step 1: Check for PKCE ?code= parameter (returning from Google OAuth)
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');
      if (code) {
        try {
          const { data: { session: newSession }, error } = await sb.auth.exchangeCodeForSession(code);
          // Clean the URL
          url.searchParams.delete('code');
          window.history.replaceState({}, '', url.pathname);
          if (newSession && !error) {
            const payload = JSON.parse(atob(newSession.access_token.split('.')[1]));
            if (payload.email === CEO_EMAIL) {
              setToken(newSession.access_token);
              setAuthState('ok');
              return;
            }
          }
        } catch (e) {
          console.error('PKCE exchange failed:', e);
        }
        // If code exchange failed or wrong email, fall through to session check
      }

      // Step 2: Check for existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const payload = JSON.parse(atob(session.access_token.split('.')[1]));
        if (payload.email === CEO_EMAIL) {
          setToken(session.access_token);
          setAuthState('ok');
          return;
        } else {
          setAuthState('wrong_user');
          return;
        }
      }

      // Step 3: Listen for auth state changes (handles hash fragment flows)
      const timeout = setTimeout(() => setAuthState('needs_login'), 4000);
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, sess) => {
        if (sess) {
          clearTimeout(timeout);
          const payload = JSON.parse(atob(sess.access_token.split('.')[1]));
          if (payload.email === CEO_EMAIL) {
            setToken(sess.access_token);
            setAuthState('ok');
          } else {
            setAuthState('wrong_user');
          }
        }
      });
      return () => { clearTimeout(timeout); subscription?.unsubscribe(); };
    }
    checkAuth();
  }, []);

  // Fetch data when authenticated
  useEffect(() => {
    if (authState !== 'ok' || !token) return;

    async function load() {
      setLoading(true);
      const result = await fetchDashboardData(token);
      if (result) {
        setData(result);
        setLastRefresh(new Date());
      }
      setLoading(false);
    }
    load();

    // Auto-refresh every 5 minutes
    const interval = setInterval(load, 300000);
    return () => clearInterval(interval);
  }, [authState, token]);

  // Realtime subscription for Monzo
  useEffect(() => {
    if (authState !== 'ok') return;

    const channel = sb
      .channel('ceo-monzo-live')
      .on('postgres_changes', { event: 'INSERT', schema: 'accounts', table: 'transactions' }, (payload) => {
        const tx = payload.new;
        // Add to data
        setData(prev => {
          if (!prev || !prev.sections?.financial) return prev;
          const updated = { ...prev };
          const fin = { ...updated.sections.financial };
          fin.recent_transactions = [tx, ...(fin.recent_transactions || [])].slice(0, 20);
          // Recalc summary
          const amt = Number(tx.amount);
          const sum = { ...fin.summary };
          sum.total_transactions = (sum.total_transactions || 0) + 1;
          if (tx.is_revenue) { sum.total_credits = Number(sum.total_credits || 0) + amt; }
          else { sum.total_debits = Number(sum.total_debits || 0) + amt; }
          sum.net_position = Number(sum.total_credits) - Number(sum.total_debits);
          fin.summary = sum;
          updated.sections = { ...updated.sections, financial: fin };
          return updated;
        });
        // Show toast
        const label = friendlySupplier(tx.supplier_name);
        const prefix = tx.is_revenue ? '+' : '-';
        addToast(`${prefix}£${Number(tx.amount).toFixed(2)} — ${label}`);
      })
      .subscribe();

    return () => { sb.removeChannel(channel); };
  }, [authState]);

  function addToast(msg) {
    setToasts(prev => [...prev, msg]);
    setTimeout(() => setToasts(prev => prev.slice(1)), 4000);
  }

  // Sign in handler
  async function handleGoogleSignIn() {
    setAuthState('checking');
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/AiLaneCEO/',
        queryParams: { prompt: 'select_account' }
      }
    });
    if (error) {
      console.error('Google sign-in error:', error);
      setAuthState('needs_login');
    }
  }

  // Loading / Auth gates
  if (authState === 'checking') {
    return (
      <div className="auth-gate">
        <div className="logo-mark">AILANE</div>
        <div className="pulse-ring" />
        <div style={{color:'var(--text-muted)',fontSize:'0.8rem',fontFamily:'var(--font-mono)'}}>Authenticating...</div>
      </div>
    );
  }

  if (authState === 'needs_login') {
    return (
      <div className="auth-gate">
        <div className="logo-mark">AILANE</div>
        <div style={{color:'var(--text-secondary)',fontSize:'0.85rem',marginBottom:'24px',fontFamily:'var(--font-body)'}}>CEO Command Centre</div>
        <button onClick={handleGoogleSignIn} style={{
          display:'flex', alignItems:'center', gap:'10px',
          padding:'12px 28px',
          borderRadius:'var(--radius-md)',
          border:'1px solid var(--border-strong)',
          background:'var(--bg-elevated)',
          color:'var(--text-primary)',
          fontFamily:'var(--font-body)',
          fontSize:'0.88rem',
          fontWeight:'500',
          cursor:'pointer',
          transition:'all 0.2s ease'
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign in with Google
        </button>
        <div style={{color:'var(--text-muted)',fontSize:'0.7rem',fontFamily:'var(--font-mono)',marginTop:'16px'}}>Restricted access · CEO only</div>
      </div>
    );
  }

  if (authState === 'wrong_user') {
    return (
      <div className="auth-gate">
        <div className="logo-mark">AILANE</div>
        <div style={{color:'var(--accent-red)',fontSize:'0.85rem',marginBottom:'12px'}}>Access restricted to CEO account</div>
        <button onClick={async () => { await sb.auth.signOut(); setAuthState('needs_login'); }} style={{
          padding:'10px 24px',
          borderRadius:'var(--radius-md)',
          border:'1px solid var(--border-default)',
          background:'var(--bg-surface)',
          color:'var(--text-secondary)',
          fontFamily:'var(--font-body)',
          fontSize:'0.82rem',
          cursor:'pointer'
        }}>
          Sign out and try again
        </button>
      </div>
    );
  }

  const sections = data?.sections || {};

  return (
    <div>
      {/* ═══ TOP BAR ═══ */}
      <div className="top-bar">
        <div className="top-bar-left">
          <div className="brand-mark">AI<span>LANE</span></div>
          <div className="brand-divider" />
          <div className="brand-subtitle">CEO Command Centre</div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot" />LIVE</div>
          <div className="timestamp-display">
            {now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })}
            {' · '}
            {now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}
          </div>
          {lastRefresh && (
            <div className="timestamp-display" style={{opacity:0.6}}>
              Refreshed {timeAgo(lastRefresh.toISOString())}
            </div>
          )}
          <a href="/" className="btn-sm"><Icons.ext /> Site</a>
          <button className="btn-sm" onClick={() => sb.auth.signOut().then(() => window.location.href = '/account/')}>
            Sign Out
          </button>
        </div>
      </div>

      {/* ═══ QUICK ACTIONS ═══ */}
      <div className="quick-actions">
        <a href="/contract-scan/" className="qa-btn">⚡ Run Compliance Check</a>
        <a href="/intelligence/" className="qa-btn">🔍 Intelligence Hub</a>
        <a href="https://dashboard.stripe.com" target="_blank" rel="noopener" className="qa-btn">💳 Stripe Dashboard</a>
        <a href="https://ads.google.com" target="_blank" rel="noopener" className="qa-btn">📊 Google Ads</a>
        <a href="https://analytics.google.com" target="_blank" rel="noopener" className="qa-btn">📈 GA4</a>
        <a href="https://cnbsxwtvazfvzmltkuvx.supabase.co" target="_blank" rel="noopener" className="qa-btn">🗄️ Supabase</a>
        <a href="/ticker/" className="qa-btn">📰 Ticker</a>
        <a href="/knowledge-library-preview/" className="qa-btn">📚 Knowledge Library</a>
      </div>

      {/* ═══ DASHBOARD GRID ═══ */}
      <div className="dashboard">

        {/* Row 1: Business & Clients */}
        <div className="grid-row two-col">
          {loading ? <SkeletonCard /> : <AccountsCard financial={sections.financial} />}
          {loading ? <SkeletonCard /> : <ClientsCard platform={sections.platform} />}
        </div>

        {/* Row 2: Analytics & Products */}
        <div className="grid-row two-col">
          {loading ? <SkeletonCard /> : <AnalyticsCard pipeline={sections.pipeline} />}
          {loading ? <SkeletonCard /> : <ProductsCard financial={sections.financial} compliance={sections.compliance} />}
        </div>

        {/* Row 3: Feedback (full width) */}
        <div className="grid-row full">
          <FeedbackBar />
        </div>

        {/* Row 4: Legal & Calendar */}
        <div className="grid-row two-col">
          <LegalCard platform={sections.platform} />
          <CalendarCard />
        </div>

      </div>

      <ToastContainer toasts={toasts} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
