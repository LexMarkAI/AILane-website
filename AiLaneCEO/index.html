      "Content-Type": "application/json",

const Gauge = ({ value=0, size=160 }) => {
  const b = getBand(value), r=size/2-14, cx=size/2, cy=size/2+8;
  const arc = p => { const a=Math.PI+p*Math.PI; return `${cx+r*Math.cos(a)} ${cy+r*Math.sin(a)}`; };
  return (
    <svg width={size} height={size*0.6} viewBox={`0 0 ${size} ${size*0.6}`} style={{overflow:"visible"}}>
      {BANDS.map((bd,i)=>{
        const s=(i*20)/100,e=((i+1)*20)/100;
        return <path key={i} d={`M ${arc(s)} A ${r} ${r} 0 0 1 ${arc(e)}`} fill="none" stroke={bd.color} strokeWidth={9} strokeLinecap="round" opacity={0.2}/>;
      })}
      <path d={`M ${arc(0)} A ${r} ${r} 0 0 1 ${arc(Math.min(value,99.9)/100)}`} fill="none" stroke={b.color} strokeWidth={9} strokeLinecap="round" style={{filter:`drop-shadow(0 0 6px ${b.color})`}}/>
      <text x={cx} y={cy-10} textAnchor="middle" fill={b.color} fontSize={size*0.2} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{value}</text>
      <text x={cx} y={cy+8} textAnchor="middle" fill={b.color} fontSize={10} fontWeight="600" opacity={0.85}>{b.label}</text>
    </svg>
  );
};

  const TickerStrip = () => {
    const items = tickerItems.length>0 ? tickerItems : [
      {id:1,text:"GOV.UK Tribunal Decisions database: 130,854 classified decisions · Feb 2010–Feb 2026",type:"intel"},
      {id:2,text:"Parliament Bills pipeline: active and running · 3 new bills ingested today",type:"parliament"},
      {id:3,text:"Companies House enrichment: 25,274 verified profiles · 32.1% coverage",type:"intel"},
      {id:4,text:"ACEI-AM-2026-003 CREE ratified 7 March 2026 — Client-Reported Enforcement Events live at all tiers",type:"intel"},
      {id:5,text:"PSC Scraper: populating corporate_relationships table · EEI Phase 2 in progress",type:"intel"},
    ];
    const doubled = [...items,...items];
    return (
      <div style={{height:32,background:C.bg2,borderBottom:`1px solid ${C.gold}20`,overflow:"hidden",display:"flex",alignItems:"center",flexShrink:0}}>
        <div style={{background:`${C.gold}15`,borderRight:`1px solid ${C.gold}30`,padding:"0 12px",height:"100%",display:"flex",alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:9,color:C.gold,fontWeight:700,letterSpacing:"1.5px",fontFamily:"'Syne',sans-serif"}}>AILANE LIVE</span>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          <div style={{display:"flex",animation:"scroll-x 60s linear infinite",width:"max-content"}}>
            {doubled.map((item,i)=>(
              <span key={i} style={{fontSize:11,color:item.type==="parliament"?C.purple:C.t2,whiteSpace:"nowrap",padding:"0 20px",borderRight:`1px solid ${C.border}`}}>
                <span style={{color:item.type==="parliament"?C.purple:C.gold,marginRight:6}}>
                  {item.type==="parliament"?"◆":"◇"}
                </span>
                {item.text}
              </span>
            ))}
          </div>
        </div>
        <div style={{padding:"0 12px",flexShrink:0}}>
          <span style={{fontSize:9,color:C.t3,fontFamily:"'JetBrains Mono',monospace"}}>{new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>
        </div>
      </div>
    );
  };

  // ─── SECTIONS MAP ──────────────────────────────────────────────────────────
  const sections = {
    command:renderCommand, assistant:renderAssistant, pipeline:renderPipeline,
    systems:renderSystems, intel:renderIntel, regulatory:renderRegulatory,
    business:renderBusiness, accounts:renderAccounts,
    simulator:renderSimulator, governance:renderGovernance,
  };

  // ─── LOADING ───────────────────────────────────────────────────────────────
  if(booting) return (
    <div style={{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:24,fontWeight:800,color:C.cyan,fontFamily:"'Syne',sans-serif",letterSpacing:3}}>AILANE</div>
      <div style={{display:"flex",gap:6}}>{[0,1,2].map(i=><span key={i} style={{width:8,height:8,borderRadius:"50%",background:C.cyan,display:"inline-block",animation:`pulse 1s ease infinite`,animationDelay:`${i*0.2}s`}}/>)}</div>
    </div>
  );

  // ─── LOGIN ─────────────────────────────────────────────────────────────────
  if(!token) return (
    <div style={{height:"100vh",background:`radial-gradient(ellipse at 30% 50%, #0d1e35 0%, ${C.bg} 60%)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:380,padding:40,background:"rgba(13,20,37,0.8)",border:`1px solid ${C.border}`,borderRadius:16,backdropFilter:"blur(10px)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:28,fontWeight:800,color:C.cyan,letterSpacing:4,fontFamily:"'Syne',sans-serif"}}>AILANE</div>
          <div style={{fontSize:11,color:C.t3,letterSpacing:1,marginTop:4}}>CEO COMMAND CENTRE</div>
        </div>
        {[["Email",email,setEmail,"email"],["Password",pass,setPass,"password"]].map(([label,val,setter,type])=>(
          <div key={label} style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C.t3,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.6px"}}>{label}</div>
            <input type={type} value={val} onChange={e=>setter(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}
              style={{width:"100%",padding:"12px 16px",background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:8,color:C.t1,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          </div>
        ))}
        {authErr && <div style={{padding:"9px 14px",background:`${C.red}12`,border:`1px solid ${C.red}30`,borderRadius:6,fontSize:12,color:C.red,marginBottom:16}}>{authErr}</div>}
        <button onClick={login} disabled={authLoading} style={{width:"100%",padding:14,background:`linear-gradient(135deg,${C.cyan},#06b6d4)`,border:"none",borderRadius:9,color:"#080c18",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Syne',sans-serif",letterSpacing:"0.5px",opacity:authLoading?0.7:1}}>
          {authLoading?"AUTHENTICATING...":"SIGN IN"}
        </button>
        <div style={{textAlign:"center",marginTop:20,fontSize:10,color:C.t3}}>AI Lane Limited · Co. No. 17035654 · Internal Use Only</div>
      </div>
    </div>
  );

  // ─── DASHBOARD ─────────────────────────────────────────────────────────────
  return (
    <div style={{height:"100vh",background:C.bg,color:C.t1,fontFamily:"'Syne','system-ui',sans-serif",display:"flex",flexDirection:"column"}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
        @keyframes scroll-x{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
        @keyframes spin{to{transform:rotate(360deg)}}
        input,select,textarea{font-family:inherit}
        input::placeholder{color:${C.t3}}
        select option{background:#0d1425;color:${C.t1}}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
      `}</style>

      {/* Ticker */}
      <TickerStrip/>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Sidebar */}
        <aside style={{width:sideOpen?230:56,minHeight:0,background:"rgba(255,255,255,0.015)",borderRight:`1px solid ${C.border}`,transition:"width 0.2s ease",display:"flex",flexDirection:"column",flexShrink:0}}>
          {/* Logo */}
          <div onClick={()=>setSideOpen(!sideOpen)} style={{padding:sideOpen?"18px 16px":"18px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10,cursor:"pointer",flexShrink:0}}>
            <div style={{width:30,height:30,borderRadius:7,background:`linear-gradient(135deg,${C.cyan},#06b6d4)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#080c18",flexShrink:0}}>A</div>
            {sideOpen&&<div style={{fontFamily:"'Syne',sans-serif"}}>
              <div style={{fontSize:13,fontWeight:800,color:C.cyan,letterSpacing:2}}>AILANE</div>
              <div style={{fontSize:9,color:C.t3,letterSpacing:0.5}}>CEO Command</div>
            </div>}
          </div>
          {/* Nav */}
          <nav style={{flex:1,padding:"10px 8px",overflowY:"auto"}}>
            {NAV.map(n=>{
              const hasBadge = n.id==="pipeline"&&unseen>0;
              const isActive = tab===n.id&&!n.href;
              return (
                <div key={n.id} onClick={()=>{ if(n.href) window.open(n.href,"_blank"); else { setTab(n.id); if(n.id==="pipeline"){setSeenSignups(signups.length);localStorage.setItem("seen_signups",signups.length);} } }}
                  style={{display:"flex",alignItems:"center",gap:9,padding:sideOpen?"9px 11px":"9px 13px",borderRadius:7,marginBottom:2,cursor:"pointer",
                    background:isActive?"rgba(34,211,238,0.08)":"transparent",
                    color:isActive?C.cyan:C.t3,transition:"all 0.15s",position:"relative"}}
                  onMouseEnter={e=>{ if(!isActive) e.currentTarget.style.background="rgba(255,255,255,0.03)"; }}
                  onMouseLeave={e=>{ if(!isActive) e.currentTarget.style.background="transparent"; }}>
                  <span style={{fontSize:15,flexShrink:0}}>{n.icon}</span>
                  {sideOpen&&<span style={{fontSize:12,fontWeight:isActive?700:400,whiteSpace:"nowrap",flex:1,display:"flex",alignItems:"center",gap:4}}>
                    {n.label}{n.href&&<span style={{fontSize:9,opacity:.4}}>↗</span>}
                  </span>}
                  {hasBadge&&<span style={{position:"absolute",right:sideOpen?10:4,top:6,background:C.gold,borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#080c18"}}>{unseen}</span>}
                </div>
              );
            })}
          </nav>
          {/* Footer */}
          {sideOpen&&(
            <div style={{padding:"12px 14px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:10,color:C.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email||"mark@ailane.ai"}</div>
                <button onClick={logout} style={{background:`${C.red}12`,border:`1px solid ${C.red}25`,borderRadius:4,padding:"3px 7px",color:C.red,fontSize:9,fontWeight:600,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.5px"}}>Out</button>
              </div>
              <div style={{fontSize:10,color:C.t3,display:"flex",gap:8,flexWrap:"wrap"}}>
                {[["Dashboard","/dashboard/"],["Ticker","/ticker/"],["Library","/knowledge-library/"]].map(([l,h])=>(
                  <a key={l} href={h} style={{color:C.cyan,textDecoration:"none"}}>{l}</a>
                ))}
              </div>
            </div>
          )}
        </aside>

        {/* Main */}
        <main style={{flex:1,padding:"28px 32px",overflowY:"auto"}}>
          {(sections[tab]||renderCommand)()}
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
