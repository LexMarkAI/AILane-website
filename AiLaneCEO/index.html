// ─── SUPABASE HELPERS ─────────────────────────────────────────────────────
async function sb(path, token, opts) {
const h = { apikey: ANON, “Content-Type”: “application/json”, …opts };
if (token) h[“Authorization”] = “Bearer “ + token;
const r = await fetch(SB + path, { headers: h });
if (!r.ok) { const t = await r.text(); throw new Error(r.status + “: “ + t.slice(0, 120)); }
return r.json();
}

async function sbCount(table, token, filter) {
const q = filter ? “?” + filter + “&” : “?”;
const r = await fetch(SB + “/rest/v1/” + table + q + “select=id”, {
headers: { apikey: ANON, Authorization: “Bearer “ + token, Prefer: “count=exact”, Range: “0-0” }
});
const cr = r.headers.get(“content-range”);
return cr ? parseInt(cr.split(”/”)[1]) : null;
}

async function signIn(email, password) {
const r = await fetch(SB + “/auth/v1/token?grant_type=password”, {
method: “POST”, headers: { apikey: ANON, “Content-Type”: “application/json” },
body: JSON.stringify({ email, password })
});
const d = await r.json();
if (!r.ok) throw new Error(d.error_description || “Login failed”);
return d;
}

async function ceoAI(token, message, ctx) {
const r = await fetch(SB + “/functions/v1/ceo-assistant”, {
method: “POST”,
headers: { Authorization: “Bearer “ + token, “Content-Type”: “application/json” },
body: JSON.stringify({ message, context: ctx || “” })
});
if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 200)); }
const d = await r.json();
return d.response || d.content || d.message || JSON.stringify(d);
}

// ─── EMPLOYER DRILL DOWN ─────────────────────────────────────────────────
function EmployerDrill({ item, token, onClose }) {
const [cases, setCases] = useState([]);
const [loadingCases, setLoadingCases] = useState(false);
const [aiResult, setAiResult] = useState(null);
const [aiLoading, setAiLoading] = useState(false);

useEffect(() => {
if (!item) return;
setLoadingCases(true);
const name = encodeURIComponent(item.raw_name || “”);
sb(”/rest/v1/tribunal_decisions?select=title,decision_date,acei_category,acei_category_number,case_number,outcome,compensation_awarded&respondent_name=ilike.*” + name + “*&order=decision_date.desc&limit=10”, token)
.then(d => setCases(d || []))
.catch(() => setCases([]))
.finally(() => setLoadingCases(false));
}, [item, token]);

const runAI = async () => {
setAiLoading(true);
try {
const r = await ceoAI(token, “Provide a risk profile for employer: “ + item.raw_name + “. Sector: “ + (item.acei_sector || “unknown”) + “. CH Status: “ + (item.companies_house_status || “unknown”) + “. Region: “ + (item.jurisdiction_region || “unknown”) + “. Include: ACEI sector risk, tribunal exposure, compliance priorities, and commercial risk rating.”, “Employer Intelligence Hub”);
setAiResult(r);
} catch (e) { setAiResult(“Error: “ + e.message); }
setAiLoading(false);
};

if (!item) return null;

const catColors = { 1: C.red, 2: “#f97316”, 3: C.amber, 4: “#a3e635”, 5: C.green, 6: C.blue, 7: C.purple, 8: C.cyan, 9: C.muted, 10: “#fb7185”, 12: “#c084fc” };

return (
<div className=“slide-down” style={{ marginTop: 8, padding: 16, background: C.panel, border: “1px solid “ + C.blue, borderRadius: 8, position: “relative” }}>
<button onClick={onClose} style={{ position: “absolute”, top: 10, right: 10, background: “none”, border: “none”, color: C.muted, cursor: “pointer”, fontSize: 18 }}>✕</button>

  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
    <Chip label={item.companies_house_status || "unknown"} color={item.companies_house_status === "active" ? "green" : "red"} />
    {item.acei_sector && <Chip label={item.acei_sector} color="blue" />}
    {item.jurisdiction_region && <Chip label={item.jurisdiction_region} color="gray" />}
    {item.is_canonical && <Chip label="Canonical" color="cyan" />}
  </div>

  <div style={{ fontSize: 17, fontWeight: 800, color: C.cyan, marginBottom: 4 }}>{item.raw_name}</div>
  {item.normalised_name !== item.raw_name && <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>Normalised: {item.normalised_name}</div>}

  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
    <Card style={{ padding: 10 }}>
      <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", letterSpacing: 1 }}>Companies House</div>
      {[
        ["CH Number", item.companies_house_number || "Not enriched"],
        ["CH Name", item.ch_registered_name || item.raw_name],
        ["Type", item.company_type || "—"],
        ["Incorporated", item.date_of_creation || "—"],
        ["Insolvency History", item.has_insolvency_history ? "Yes" : "No"],
      ].map(([k, v], i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: "1px solid " + C.border, fontSize: 11 }}>
          <span style={{ color: C.muted }}>{k}</span>
          <span style={{ color: C.dim }}>{v}</span>
        </div>
      ))}
    </Card>
    <Card style={{ padding: 10 }}>
      <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", letterSpacing: 1 }}>ACEI Profile</div>
      {[
        ["Sector", item.acei_sector || "Unclassified"],
        ["Sector SM", item.acei_sector_multiplier ? "x" + item.acei_sector_multiplier : "—"],
        ["Region JM", item.jurisdiction_multiplier ? "x" + item.jurisdiction_multiplier : "—"],

  {!aiResult ? (
    <button onClick={runAI} disabled={aiLoading} style={{ padding: "8px 16px", borderRadius: 5, background: aiLoading ? C.purpleD : C.purple, border: "none", color: "#fff", cursor: aiLoading ? "not-allowed" : "pointer", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", gap: 7 }}>
      {aiLoading ? <><Spin /> Generating risk profile&hellip;</> : "&#x1F916; AI Risk Profile"}
    </button>

// ─── TAB: KNOWLEDGE LIBRARY ───────────────────────────────────────────────
function KnowledgeLibraryTab({ token }) {
const [sub, setSub] = useState(“all”);
const [items, setItems] = useState([]);
const [loading, setLoading] = useState(true);
const [search, setSearch] = useState(””);
const [catFilter, setCatFilter] = useState(“all”);
const [drill, setDrill] = useState(null);
const [analysis, setAnalysis] = useState({});
const [analysing, setAnalysing] = useState(null);

useEffect(() => {
setLoading(true);
sb(”/rest/v1/legislation_library?select=*&order=sci_significance.desc.nullslast”, token)
.then(d => setItems(d || [])).catch(() => setItems([])).finally(() => setLoading(false));
}, [token]);

const analyse = async (item) => {
setAnalysing(item.id);
try {
const r = await ceoAI(token, “Comprehensive CEO intelligence briefing for: “ + item.short_title + “. Include: key obligations, enforcement body and track record, penalty exposure details, sector impact, compliance priority, and recommended actions for a mid-market UK employer.”, item.short_title);
setAnalysis(prev => ({ …prev, [item.id]: r }));
} catch (e) { setAnalysis(prev => ({ …prev, [item.id]: “Error: “ + e.message })); }
setAnalysing(null);
};

const cats = useMemo(() => {
const s = new Set(items.map(i => i.primary_acei_category).filter(v => v != null));
return Array.from(s).sort((a, b) => a - b);
}, [items]);

const filtered = useMemo(() => {
let r = items;
if (search) {
const q = search.toLowerCase();
r = r.filter(i => (i.short_title || “”).toLowerCase().includes(q) || (i.summary || “”).toLowerCase().includes(q));
}
if (catFilter !== “all”) r = r.filter(i => String(i.primary_acei_category) === catFilter);
if (sub === “recent”) r = […r].sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0)).slice(0, 20);
return r;
}, [items, search, catFilter, sub]);

const catGroups = useMemo(() => {
const g = {};
filtered.forEach(i => { const c = i.primary_acei_category || 0; if (!g[c]) g[c] = []; g[c].push(i); });
return g;
}, [filtered]);

const stageColor = { in_force: “green”, enacted: “blue”, pending_bill: “amber”, partially_commenced: “amber”, repealed: “red”, superseded: “red” };
const CAT_NAMES = { 1: “Unfair Dismissal”, 2: “Discrimination & Harassment”, 3: “Wages & Working Time”, 4: “Whistleblowing”, 5: “Employment Status”, 6: “Redundancy & Org Change”, 7: “Parental & Family”, 8: “Trade Union & Collective”, 9: “Breach of Contract”, 10: “Health & Safety”, 12: “Business Transfers” };

const ItemRow = ({ item }) => (
<div style={{ marginBottom: 6 }}>
<div onClick={() => setDrill(drill && drill.id === item.id ? null : item)}
style={{ padding: “10px 13px”, background: C.card, border: “1px solid “ + (drill && drill.id === item.id ? C.blue : C.border), borderRadius: 6, cursor: “pointer”, transition: “border-color 0.15s” }}>
<div style={{ display: “flex”, justifyContent: “space-between”, alignItems: “flex-start” }}>
<div style={{ flex: 1, minWidth: 0 }}>
<div style={{ display: “flex”, gap: 5, flexWrap: “wrap”, marginBottom: 5 }}>
<Chip label={item.lifecycle_stage || “?”} color={stageColor[item.lifecycle_stage] || “gray”} />
<Chip label={“Cat “ + (item.primary_acei_category || “?”)} color=“blue” />
{item.tier_access && item.tier_access !== “all” && <Chip label={item.tier_access} color={item.tier_access === “institutional” ? “amber” : “blue”} />}
</div>
<div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{item.short_title}</div>
{item.summary && <div style={{ fontSize: 11, color: C.muted, marginTop: 3, lineHeight: 1.5 }}>{item.summary.slice(0, 110)}…</div>}
</div>
{item.sci_significance != null && (
<div style={{ marginLeft: 10, fontFamily: “‘JetBrains Mono’,monospace”, fontSize: 18, fontWeight: 800, color: item.sci_significance > 7 ? C.red : item.sci_significance > 4 ? C.amber : C.green, flexShrink: 0 }}>
{item.sci_significance}
</div>
)}
</div>
</div>
{drill && drill.id === item.id && (
<LegislationDrill item={drill} analysis={analysis[item.id]} analysing={analysing === item.id}
onAnalyse={() => analyse(item)} onClose={() => setDrill(null)} />
)}
</div>
);

return (
<div style={{ display: “flex”, flexDirection: “column”, height: “100%”, overflow: “hidden” }}>
<SubNav tabs={[{ id: “all”, label: “All Instruments” }, { id: “category”, label: “By Category” }, { id: “recent”, label: “Recent Changes” }]} active={sub} onChange={setSub} />
<div style={{ padding: “8px 18px”, borderBottom: “1px solid “ + C.border, display: “flex”, gap: 8, background: C.card, flexShrink: 0 }}>
<input value={search} onChange={e => setSearch(e.target.value)} placeholder=“Search instruments, summaries\u2026”
style={{ flex: 1, background: C.panel, border: “1px solid “ + C.border, borderRadius: 5, color: C.text, padding: “6px 10px”, fontSize: 12, outline: “none”, fontFamily: “‘Syne’,sans-serif” }} />
<select value={catFilter} onChange={e => setCatFilter(e.target.value)}
style={{ background: C.panel, border: “1px solid “ + C.border, borderRadius: 5, color: C.dim, padding: “6px 10px”, fontSize: 12, outline: “none”, cursor: “pointer” }}>
<option value="all">All Categories</option>
{cats.map(c => <option key={c} value={String(c)}>Category {c} — {CAT_NAMES[c] || “”}</option>)}
</select>
</div>
<div className=“scrollable fade-in” style={{ flex: 1, padding: 18, paddingBottom: 80 }}>
{loading ? <div style={{ textAlign: “center”, padding: 60 }}><Spin /></div> : (
sub === “category” ? (
Object.entries(catGroups).sort((a, b) => Number(a[0]) - Number(b[0])).map(([cat, catItems]) => (
<div key={cat} style={{ marginBottom: 22 }}>
<div style={{ fontSize: 11, fontWeight: 700, color: C.cyan, padding: “6px 0”, borderBottom: “1px solid “ + C.border, marginBottom: 10, fontFamily: “‘JetBrains Mono’,monospace”, display: “flex”, gap: 10, alignItems: “center” }}>
<span>CATEGORY {cat}</span>
<span style={{ color: C.muted, fontWeight: 400 }}>{CAT_NAMES[Number(cat)] || “”}</span>
<span style={{ marginLeft: “auto”, color: C.muted }}>{catItems.length} instruments</span>
</div>
{catItems.map(item => <ItemRow key={item.id} item={item} />)}
</div>
))
) : (
<>
<div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>{filtered.length} instrument{filtered.length !== 1 ? “s” : “”}{sub === “recent” ? “ (recent changes)” : “”}</div>
{filtered.map(item => <ItemRow key={item.id} item={item} />)}
</>
)
)}
</div>
</div>
);
}

{ id: “london”, label: “London”, jm: 1.40 }, { id: “south_east”, label: “South East”, jm: 1.25 },
{ id: “east_anglia”, label: “East Anglia”, jm: 1.10 }, { id: “north_west”, label: “North West”, jm: 1.05 },

{ id: “northern_ireland”, label: “Northern Ireland”, jm: 1.15 }
];

const [sector, setSector] = useState(“financial_services”);
const [jurisdiction, setJurisdiction] = useState(“london”);
const [cats, setCats] = useState(Object.fromEntries(Object.keys(CAT_NAMES).map(k => [k, 0])));

const jm = JURISDICTIONS.find(j => j.id === jurisdiction)?.jm || 1.0;
const baseSum = Object.entries(cats).reduce((acc, [k, v]) => acc + (CAT_WEIGHTS[k] || 0) * v, 0);
const di = Math.min(100, baseSum * sm * jm);
const diColor = di > 70 ? C.red : di > 40 ? C.amber : C.green;

{JURISDICTIONS.map(j => <option key={j.id} value={j.id}>{j.label} (JM {j.jm})</option>)}
</select>
</div>
</div>
<div style={{ display: “grid”, gridTemplateColumns: “1fr 1fr”, gap: 10, marginBottom: 20 }}>
{Object.entries(CAT_NAMES).map(([k, name]) => (
<div key={k} style={{ background: C.card, border: “1px solid “ + C.border, borderRadius: 6, padding: “10px 12px” }}>
<div style={{ display: “flex”, justifyContent: “space-between”, marginBottom: 6 }}>
<div style={{ fontSize: 11, color: C.dim }}><span style={{ color: C.muted, fontFamily: “‘JetBrains Mono’,monospace”, fontSize: 10 }}>C{k} </span>{name}</div>
<span style={{ fontSize: 12, fontWeight: 700, color: C.cyan, fontFamily: “‘JetBrains Mono’,monospace” }}>{cats[k]}</span>
</div>
<input type=“range” min={0} max={100} value={cats[k]}
onChange={e => setCats(prev => ({ …prev, [k]: Number(e.target.value) }))}
style={{ width: “100%”, accentColor: C.blue, cursor: “pointer” }} />
<div style={{ fontSize: 9, color: C.muted, marginTop: 3, fontFamily: “‘JetBrains Mono’,monospace” }}>Weight: {CAT_WEIGHTS[k]}</div>
</div>
))}

<div style={{ fontSize: 10, color: C.muted, fontFamily: “‘JetBrains Mono’,monospace”, textTransform: “uppercase”, letterSpacing: 2, marginBottom: 10 }}>Derived Index (DI)</div>

// ─── COMMUNICATIONS TAB (CCA Layer 2 Triage + Layer 3 Escalations) ───────
function CommunicationsTab({ token }) {
const [triageItems, setTriageItems] = useState([]);
const [escalations, setEscalations] = useState([]);
const [loading, setLoading] = useState(true);
const [expandedCards, setExpandedCards] = useState({});
const [editingDrafts, setEditingDrafts] = useState({});
const [showEscalations, setShowEscalations] = useState(false);
const [pendingCount, setPendingCount] = useState(0);

const priorityColors = { P1: "#ef4444", P2: "#f59e0b", P3: "#64748b" };
const tierColors = { scan: "#64748b", operational: "#22d3ee", governance: "#a78bfa", institutional: "#f59e0b" };

const loadData = useCallback(async () => {
  if (!token) return;
  setLoading(true);
  try {
    const headers = { apikey: ANON, Authorization: "Bearer " + token, "Content-Type": "application/json" };

    // Fetch triage queue
    const triageRes = await fetch(SB + "/rest/v1/rpc/exec_sql", {
      method: "POST", headers,
      body: JSON.stringify({ sql: "SELECT tq.*, o.name as org_name FROM comms.triage_queue tq LEFT JOIN organisations o ON tq.client_org_id = o.id WHERE tq.status = 'pending' ORDER BY CASE tq.priority WHEN 'P1' THEN 1 WHEN 'P2' THEN 2 ELSE 3 END, tq.created_at ASC" })
    });
    const triageData = triageRes.ok ? await triageRes.json() : [];
    setTriageItems(Array.isArray(triageData) ? triageData : []);
    setPendingCount(Array.isArray(triageData) ? triageData.length : 0);

    // Fetch escalations
    const escRes = await fetch(SB + "/rest/v1/rpc/exec_sql", {
      method: "POST", headers,
      body: JSON.stringify({ sql: "SELECT e.*, o.name as org_name FROM comms.escalations e LEFT JOIN organisations o ON e.client_org_id = o.id WHERE e.status IN ('open','in_progress') ORDER BY e.created_at DESC" })
    });
    const escData = escRes.ok ? await escRes.json() : [];
    setEscalations(Array.isArray(escData) ? escData : []);
  } catch (e) { console.error("Comms load error:", e); }
  setLoading(false);
}, [token]);

useEffect(() => { loadData(); }, [loadData]);

const toggleExpand = (id, section) => {
  setExpandedCards(prev => ({ ...prev, [id + "_" + section]: !prev[id + "_" + section] }));
};

const handleApprove = async (item) => {
  const response = editingDrafts[item.id] || item.drafted_response;
  try {
    await fetch(SB + "/rest/v1/rpc/exec_sql", {
      method: "POST",
      headers: { apikey: ANON, Authorization: "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify({ sql: "UPDATE comms.triage_queue SET status = 'approved', drafted_response = $1, actioned_at = NOW() WHERE id = $2", params: [response, item.id] })
    });
    loadData();
  } catch (e) { console.error("Approve error:", e); }
};

const handleEscalate = async (item) => {
  try {
    await fetch(SB + "/rest/v1/rpc/exec_sql", {
      method: "POST",
      headers: { apikey: ANON, Authorization: "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify({
        sql: "WITH updated AS (UPDATE comms.triage_queue SET status = 'escalated', actioned_at = NOW() WHERE id = $1) INSERT INTO comms.escalations (triage_id, client_org_id, briefing, recommended_action, status) SELECT $1, client_org_id, interaction_summary, recommended_action, 'open' FROM comms.triage_queue WHERE id = $1",
        params: [item.id]
      })
    });
    loadData();
  } catch (e) { console.error("Escalate error:", e); }
};

const updateEscalationStatus = async (escId, newStatus, notes) => {
  try {
    const sql = newStatus === "resolved"
      ? "UPDATE comms.escalations SET status = $1, resolution_notes = $2, resolved_at = NOW() WHERE id = $3"
      : "UPDATE comms.escalations SET status = $1, resolution_notes = $2 WHERE id = $3";
    await fetch(SB + "/rest/v1/rpc/exec_sql", {
      method: "POST",
      headers: { apikey: ANON, Authorization: "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify({ sql, params: [newStatus, notes || "", escId] })
    });
    loadData();
  } catch (e) { console.error("Escalation update error:", e); }
};

const timeAgo = (d) => {
  if (!d) return "";
  const mins = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
  if (mins < 60) return mins + "m ago";
  if (mins < 1440) return Math.floor(mins / 60) + "h ago";
  return Math.floor(mins / 1440) + "d ago";
};

if (loading) return <div style={{ padding: 40, textAlign: "center", color: C.muted }}>Loading communications...</div>;

return (
<div className="scrollable" style={{ height: "100%", padding: "16px 20px" }}>
  {/* PANEL 1: TRIAGE QUEUE */}
  <div style={{ marginBottom: 32 }}>
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>Layer 2 Triage Queue</div>
      {pendingCount > 0 && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "#ef4444", color: "#fff", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{pendingCount}</span>}
      <button onClick={loadData} style={{ marginLeft: "auto", fontSize: 10, color: C.muted, background: "none", border: "1px solid " + C.border, borderRadius: 4, padding: "4px 10px", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace" }}>Refresh</button>
    </div>

    {triageItems.length === 0 ? (
      <div style={{ padding: 40, textAlign: "center", background: C.panel, border: "1px solid " + C.border, borderRadius: 8 }}>
        <div style={{ fontSize: 28, marginBottom: 8, opacity: 0.4 }}>&#9745;</div>
        <div style={{ fontSize: 13, color: C.muted }}>Triage queue is clear. No pending items.</div>
      </div>
    ) : triageItems.map(item => (
      <div key={item.id} style={{ background: C.panel, border: "1px solid " + C.border, borderRadius: 10, marginBottom: 12, overflow: "hidden" }}>
        {/* Header */}
        <div style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 8, borderBottom: "1px solid " + C.border }}>
          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: priorityColors[item.priority] + "22", color: priorityColors[item.priority], border: "1px solid " + priorityColors[item.priority] + "44", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{item.priority}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{item.org_name || "Unknown Org"}</span>
          {item.tier && <span style={{ fontSize: 9, padding: "2px 7px", borderRadius: 3, background: (tierColors[item.tier] || "#64748b") + "18", color: tierColors[item.tier] || "#64748b", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>{item.tier?.toUpperCase()}</span>}
          <span style={{ marginLeft: "auto", fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace" }}>{timeAgo(item.created_at)}</span>
        </div>

        {/* Summary */}
        <div style={{ padding: "12px 16px" }}>
          <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6, marginBottom: 12 }}>{item.interaction_summary}</div>

          {/* AI Analysis (collapsible) */}
          {item.ai_analysis && (
            <div style={{ marginBottom: 10 }}>
              <button onClick={() => toggleExpand(item.id, "analysis")} style={{ fontSize: 10, color: C.blue, background: "none", border: "none", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, padding: 0 }}>
                {expandedCards[item.id + "_analysis"] ? "▾" : "▸"} AI ANALYSIS
              </button>
              {expandedCards[item.id + "_analysis"] && (
                <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.65, marginTop: 6, padding: 10, background: C.card + "80", borderRadius: 6 }}>{item.ai_analysis}</div>
              )}
            </div>
          )}

          {/* Constitutional Position (collapsible) */}
          {item.constitutional_position && item.constitutional_position !== "No constitutional position applicable." && (
            <div style={{ marginBottom: 10 }}>
              <button onClick={() => toggleExpand(item.id, "constitutional")} style={{ fontSize: 10, color: "#a78bfa", background: "none", border: "none", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, padding: 0 }}>
                {expandedCards[item.id + "_constitutional"] ? "▾" : "▸"} CONSTITUTIONAL POSITION
              </button>
              {expandedCards[item.id + "_constitutional"] && (
                <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.65, marginTop: 6, padding: 10, background: "rgba(167,139,250,0.06)", border: "1px solid rgba(167,139,250,0.12)", borderRadius: 6 }}>{item.constitutional_position}</div>
              )}
            </div>
          )}

          {/* Drafted Response */}
          <div style={{ marginTop: 12, marginBottom: 12 }}>
            <div style={{ fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, marginBottom: 6 }}>DRAFTED RESPONSE ({item.preferred_language?.toUpperCase() || "EN"})</div>
            <textarea
              value={editingDrafts[item.id] !== undefined ? editingDrafts[item.id] : (item.drafted_response || "")}
              onChange={e => setEditingDrafts(prev => ({ ...prev, [item.id]: e.target.value }))}
              style={{ width: "100%", minHeight: 100, padding: 10, fontSize: 12, lineHeight: 1.6, color: C.text, background: C.card, border: "1px solid " + C.border, borderRadius: 6, resize: "vertical", outline: "none", fontFamily: "'EB Garamond',Georgia,serif" }}
            />
          </div>

          {/* Actions */}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => handleApprove(item)} style={{ flex: 1, padding: "8px 14px", fontSize: 11, fontWeight: 700, color: "#fff", background: "linear-gradient(135deg,#22c55e,#16a34a)", border: "none", borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>&#10003; APPROVE &amp; SEND</button>
            <button onClick={() => { setEditingDrafts(prev => ({ ...prev, [item.id]: item.drafted_response || "" })); }} style={{ padding: "8px 14px", fontSize: 11, fontWeight: 700, color: C.blue, background: C.blueBg, border: "1px solid " + C.blue + "33", borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>&#9998; EDIT</button>
            <button onClick={() => handleEscalate(item)} style={{ padding: "8px 14px", fontSize: 11, fontWeight: 700, color: "#ef4444", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 6, cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5 }}>&#8593; ESCALATE</button>
          </div>
        </div>
      </div>
    ))}
  </div>

  {/* PANEL 2: ESCALATIONS */}
  <div>
    <button onClick={() => setShowEscalations(!showEscalations)} style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "12px 16px", background: C.panel, border: "1px solid " + C.border, borderRadius: 8, cursor: "pointer", marginBottom: 12 }}>

      {escalations.length > 0 && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "rgba(239,68,68,0.15)", color: "#ef4444", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>{escalations.length}</span>}

            <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{esc.org_name || "Unknown Org"}</span>
            <span style={{ fontSize: 9, padding: "2px 7px", borderRadius: 3, background: esc.status === "open" ? "rgba(239,68,68,0.1)" : "rgba(245,158,11,0.1)", color: esc.status === "open" ? "#ef4444" : "#f59e0b", fontFamily: "'JetBrains Mono',monospace" }}>{esc.status?.toUpperCase()}</span>
            <span style={{ marginLeft: "auto", fontSize: 10, color: C.muted, fontFamily: "'JetBrains Mono',monospace" }}>{timeAgo(esc.created_at)}</span>
          </div>
          <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.6, marginBottom: 10 }}>{esc.briefing || "No briefing available."}</div>
          {esc.recommended_action && <div style={{ fontSize: 11, color: C.blue, marginBottom: 10, fontFamily: "'JetBrains Mono',monospace" }}>Recommended: {esc.recommended_action}</div>}
          <textarea
            placeholder="Resolution notes..."
            defaultValue={esc.resolution_notes || ""}
            id={"esc-notes-" + esc.id}
            style={{ width: "100%", minHeight: 60, padding: 8, fontSize: 11, color: C.text, background: C.card, border: "1px solid " + C.border, borderRadius: 6, resize: "vertical", outline: "none", marginBottom: 8, fontFamily: "'EB Garamond',Georgia,serif" }}

        </div>

    )}
  </div>
</div>
);

        <span style={{ fontSize: 9, padding: "3px 8px", borderRadius: 3, background: C.greenBg, color: "#4ade80", border: "1px solid #15803d", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>&#x25CF; LIVE</span>
        <span style={{ fontSize: 10, color: C.muted }}>Supabase Pro &middot; eu-central-1</span>
      </div>
    </div>
    <div style={{ flex: 1, overflow: "hidden" }}>{renderTab()}</div>
  </div>

  <FloatingAI token={token} activeTab={activeTab} />
</div>

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>
