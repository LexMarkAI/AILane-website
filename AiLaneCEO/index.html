const KPICard = ({label,value,sub,accent="#22d3ee",icon,delta,onClick,draggable,onDragStart,onDragOver,onDrop,highlight}) => {
  const isPos = delta > 0, isNeg = delta < 0;
  return (

      {draggable && <div style={{position:"absolute",top:8,right:10,fontSize:10,opacity:.25,cursor:"grab"}}>⠿</div>}

        {icon&&<span style={{fontSize:14}}>{icon}</span>}{label}

      <div style={{fontSize:28,fontWeight:800,color:accent,fontFamily:"var(--mono)",lineHeight:1,marginBottom:4}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{sub}</div>}
      {delta!==undefined&&delta!==null&&(
        <div style={{fontSize:10,color:isPos?"var(--green)":isNeg?"var(--red)":"var(--text3)",marginTop:4,fontFamily:"var(--mono)"}}>
          {isPos?"▲":isNeg?"▼":"–"} {Math.abs(delta)} vs prior week
        </div>
      )}
      {onClick&&<div style={{position:"absolute",bottom:10,right:12,fontSize:9,color:"var(--text3)",opacity:.5}}>click to explore →</div>}
    </div>
  );
};

const Gauge = ({value=0,size=200}) => {
  const band=getBand(value);
  const r=size/2-18,cx=size/2,cy=size/2+12;
  const arc=pct=>{const a=Math.PI+pct*Math.PI;return`${cx+r*Math.cos(a)} ${cy+r*Math.sin(a)}`;};
  const pct=Math.min(value,100)/100;
  return (
    <svg width={size} height={size*.6} viewBox={`0 0 ${size} ${size*.6}`}>
      {BANDS.map((b,i)=>{const s=(i*20)/100,e=((i+1)*20)/100;return(
        <path key={i} d={`M ${arc(s)} A ${r} ${r} 0 0 1 ${arc(e)}`} fill="none" stroke={b.color} strokeWidth={8} strokeLinecap="round" opacity={.2}/>
      );})}
      <path d={`M ${arc(0)} A ${r} ${r} 0 0 1 ${arc(pct)}`} fill="none" stroke={band.color} strokeWidth={10} strokeLinecap="round"
        style={{filter:`drop-shadow(0 0 6px ${band.color})`}}/>
      <text x={cx} y={cy-10} textAnchor="middle" fill={band.color} fontSize={size*.22} fontWeight="800" fontFamily="var(--mono)">{value}</text>
      <text x={cx} y={cy+8} textAnchor="middle" fill={band.color} fontSize={10} fontWeight="600" opacity={.9}>{band.label}</text>
    </svg>
  );
};

const DonutChart = ({value,total,color,size=80}) => {
  const pct=total>0?value/total:0;
  const r=30,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const dash=circ*pct,gap=circ*(1-pct);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth={6}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={6}

      </div>
      {results&&results.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text3)"}}>No employers found matching "{q}"</div>}

          <nav style={{flex:1,padding:"10px 8px",overflowY:"auto"}}>
            {NAV.map(n=>(
              <div key={n.id} className={`nav-item ${activeTab===n.id?"active":""}`} onClick={()=>setActiveTab(n.id)} title={!sideOpen?n.label:""}>
                <span style={{fontSize:15,flexShrink:0}}>{n.icon}</span>
                {sideOpen&&<span style={{fontWeight:activeTab===n.id?600:400}}>{n.label}</span>}
                {sideOpen&&BADGE_COUNT[n.id]>0&&<span style={{marginLeft:"auto",background:"var(--cyan)",color:"var(--bg)",borderRadius:10,padding:"1px 6px",fontSize:9,fontWeight:700,fontFamily:"var(--mono)"}}>{BADGE_COUNT[n.id]}</span>}
              </div>
            ))}

            {sideOpen&&<>
              <div style={{height:1,background:"var(--border)",margin:"10px 4px"}}/>
              <a href="/governance-dashboard/" target="_blank" className="nav-item" style={{display:"flex"}}>
                <span style={{fontSize:15}}>🖥</span>
                <span>Client Dashboard</span>
                <span style={{marginLeft:"auto",fontSize:9,opacity:.4}}>↗</span>
              </a>
              <a href="/ticker/" target="_blank" className="nav-item" style={{display:"flex"}}>
                <span style={{fontSize:15}}>📡</span>
                <span>Ticker</span>
                <span style={{marginLeft:"auto",fontSize:9,opacity:.4}}>↗</span>
              </a>
              <a href="/intelligence/" target="_blank" className="nav-item" style={{display:"flex"}}>
                <span style={{fontSize:15}}>🌐</span>
                <span>PCIE</span>
                <span style={{marginLeft:"auto",fontSize:9,opacity:.4}}>↗</span>
              </a>
            </>}
          </nav>

          {/* Footer */}
          {sideOpen&&<div style={{padding:"12px 14px",borderTop:"1px solid var(--border)"}}>
            <div style={{fontSize:10,color:"var(--text3)",lineHeight:1.8}}>
              <div style={{color:"var(--text2)",fontWeight:600,marginBottom:2}}>AI Lane Limited</div>
              <div style={{fontFamily:"var(--mono)"}}>Co. No. 17035654</div>
              <div>4 Min-Y-Mor, Barry</div>
              <div>Wales, CF62 6QG</div>
              <div style={{marginTop:4,display:"flex",alignItems:"center",gap:4}}>
                <LiveDot/><span>Pro Plan · Live</span>
              </div>
            </div>
          </div>}
        </aside>

        {/* Main */}
        <main style={{flex:1,overflowY:"auto",padding:"28px 32px",minHeight:"calc(100vh - var(--topbar))"}}>
          {activeTab==="overview"&&<OverviewTab domainScores={domainScores} categoryScores={categoryScores} signups={signups} employers={employers} legislativeChanges={legislativeChanges} scraperRuns={scraperRuns} onOpenDetail={setOpenDetail}/>}
          {activeTab==="pipeline"&&<PipelineTab signups={signups} onOpenDetail={setOpenDetail}/>}
          {activeTab==="simulator"&&<SimulatorTab token={token} domainScores={domainScores}/>}
          {activeTab==="intelligence"&&<IntelligenceTab token={token}/>}
          {activeTab==="regulatory"&&<RegulatoryTab legislativeChanges={legislativeChanges}/>}
          {activeTab==="scrapers"&&<ScrapersTab scraperRuns={scraperRuns} token={token}/>}
          {activeTab==="accounts"&&<AccountsTab token={token}/>}
          {activeTab==="business"&&<BusinessTab/>}
          {activeTab==="governance"&&<GovernanceTab onOpenDetail={setOpenDetail}/>}
        </main>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AilaneCEO));
</script>
</body>
</html>
