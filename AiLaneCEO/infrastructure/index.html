  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
            Hub
          </a>
          <div className="page-title">Operations & <span>Infrastructure</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot" />LIVE</div>
          <div className="ts">System Operations Centre</div>
        </div>
      </div>

      <div className="main">
        {loading ? (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="kpi-strip">{[1,2,3,4,5,6].map(i => <div key={i} className="skeleton" style={{height:80}} />)}</div>
            <div className="skeleton" style={{height:300}} />
          </div>
        ) : (
          <>
            {/* KPI STRIP */}
            <div className="kpi-strip">
              <div className="kpi-card"><div className="label">Edge Functions</div><div className="value" style={{color:'var(--accent-cyan)'}}>{EDGE_FUNCTIONS.length}</div><div className="sub">Deployed</div></div>
              <div className="kpi-card"><div className="label">Database Tables</div><div className="value" style={{color:'var(--accent-green)'}}>102</div><div className="sub">4 schemas</div></div>
              <div className="kpi-card"><div className="label">Connectors</div><div className="value" style={{color:'var(--accent-purple)'}}>{CONNECTORS.length}</div><div className="sub">All active</div></div>
              <div className="kpi-card"><div className="label">Pipelines</div><div className="value" style={{color:'var(--accent-amber)'}}>{pipeRegistry.length}</div><div className="sub">Registered</div></div>
              <div className="kpi-card"><div className="label">Webhook Events</div><div className="value" style={{color:'var(--text-secondary)'}}>{whStats.total || 0}</div><div className="sub">{whStats.errored || 0} errors</div></div>
              <div className="kpi-card"><div className="label">Pipe Failures</div><div className="value" style={{color:failedPipes.length > 0 ? 'var(--accent-red)' : 'var(--accent-green)'}}>{failedPipes.length}</div><div className="sub">Last 20 runs</div></div>
            </div>

            {/* CONNECTOR STATUS BOARD */}
            <div className="card">
              <div className="card-head"><div className="card-head-title">Connector Status Board</div><div className="card-head-badge">{CONNECTORS.length} integrations</div></div>
              <div className="card-body">
                <div className="three-col">
                  {CONNECTORS.map((c, i) => (
                    <div className="node" key={i}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <div className="node-name"><span className="node-dot ok" />{c.name}</div>
                        <span style={{fontSize:'0.55rem',fontFamily:'var(--font-mono)',color:'var(--accent-green)'}}>{c.plan}</span>
                      </div>
                      <div className="node-sub">{c.detail}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* PIPELINE MONITOR + RECENT RUNS */}
            <div className="two-col">
              <div className="card">
                <div className="card-head"><div className="card-head-title">Pipeline Registry</div><div className="card-head-badge">{pipeRegistry.length} registered</div></div>
                <div className="card-body">
                  {pipeRegistry.map((p, i) => (
                    <div className="pipe-row" key={i}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:'0.74rem',fontWeight:500,color:'var(--text-primary)'}}>{p.pipeline_name}</div>
                        <div style={{fontSize:'0.58rem',color:'var(--text-muted)',marginTop:2}}>{p.cron_expression} | {p.target_table}</div>
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <span className="node-dot" style={{background: p.is_active ? 'var(--accent-green)' : 'var(--text-muted)'}} />
                        <span className="ts">{timeAgo(p.last_run_at)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="card">
                <div className="card-head"><div className="card-head-title">Recent Pipeline Runs</div><div className="card-head-badge">{failedPipes.length > 0 ? failedPipes.length + ' failures' : 'Healthy'}</div></div>
                <div className="card-body">
                  {pipeRuns.slice(0, 12).map((p, i) => (
                    <div className="pipe-row" key={i}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span className={'pipe-status ' + p.status}>{p.status}</span>
                        <span style={{fontSize:'0.72rem',color:'var(--text-primary)'}}>{p.pipeline_code.replace(/_/g, ' ')}</span>
                      </div>
                      <div style={{display:'flex',gap:10,alignItems:'center'}}>
                        <span className="ts">{p.records_new || 0} new</span>
                        <span className="ts">{timeAgo(p.started_at)}</span>
                      </div>
                    </div>
                  ))}
                  {failedPipes.length > 0 && (
                    <div style={{marginTop:12,padding:'10px 12px',background:'var(--accent-red-dim)',borderRadius:'var(--radius-sm)',border:'1px solid rgba(239,68,68,0.15)'}}>
                      <div style={{fontSize:'0.72rem',fontWeight:600,color:'var(--accent-red)',marginBottom:4}}>Active Failures</div>
                      {failedPipes.map((f, i) => (
                        <div key={i} style={{fontSize:'0.65rem',color:'var(--text-secondary)',marginBottom:4}}>
                          <span style={{fontFamily:'var(--font-mono)',color:'var(--accent-red)'}}>{f.pipeline_code}</span>: {f.error_message || 'Unknown error'}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* EDGE FUNCTION REGISTRY */}
            <div className="card">
              <div className="card-head"><div className="card-head-title">Edge Function Registry</div><div className="card-head-badge">{EDGE_FUNCTIONS.length} deployed</div></div>
              <div className="card-body">
                <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
                  {efCats.map(c => (
                    <button key={c} onClick={() => setEfFilter(c)} style={{
                      padding:'4px 10px', borderRadius:'var(--radius-sm)',
                      border: efFilter===c ? '1px solid var(--border-accent)' : '1px solid var(--border-default)',
                      background: efFilter===c ? 'var(--bg-hover)' : 'var(--bg-surface)',
                      color: efFilter===c ? 'var(--text-primary)' : 'var(--text-muted)',
                      fontSize:'0.62rem', fontFamily:'var(--font-body)', cursor:'pointer', textTransform:'capitalize'
                    }}>{c} ({c === 'all' ? EDGE_FUNCTIONS.length : EDGE_FUNCTIONS.filter(f => f.cat === c).length})</button>
                  ))}
                </div>
                {filteredEF.map((f, i) => (
                  <div className="ef-row" key={i}>
                    <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                      <span className="ef-name">{f.name}</span>
                      <span className="ef-ver">v{f.v}</span>
                      <span className={'ef-jwt ' + (f.jwt ? 'on' : 'off')}>{f.jwt ? 'JWT' : 'open'}</span>
                    </div>
                    <span style={{fontSize:'0.62rem',color:'var(--text-muted)',textAlign:'right'}}>{f.desc}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* DATABASE SCHEMA + DOCUMENT CATALOGUE */}
            <div className="two-col">
              <div className="card">
                <div className="card-head"><div className="card-head-title">Database Architecture</div><div className="card-head-badge">102 tables</div></div>
                <div className="card-body">
                  {SCHEMAS.map((s, i) => (
                    <div key={i} style={{padding:'10px 0',borderBottom: i < 3 ? '1px solid var(--border-subtle)' : 'none'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span className={'schema-tag ' + s.name}>{s.name}</span>
                          <span style={{fontSize:'0.74rem',fontWeight:600,color:'var(--text-primary)'}}>{s.tables} tables</span>
                        </div>
                      </div>
                      <div style={{fontSize:'0.62rem',color:'var(--text-muted)',marginTop:4,lineHeight:1.5}}>{s.desc}</div>
                    </div>
                  ))}
                  <div style={{marginTop:12,fontSize:'0.65rem',color:'var(--text-secondary)',lineHeight:1.5}}>
                    Non-public schemas (accounts, cis, comms) require .schema('name').from('table') pattern in supabase-js v2. Dot-notation in .from() silently fails. All schemas exposed via Dashboard Settings API Exposed Schemas.
                  </div>
                </div>
              </div>

              <div className="card">
                <div className="card-head"><div className="card-head-title">Project Document Catalogue</div><div className="card-head-badge">{SPEC_DOCS.length + (docs || []).length} documents</div></div>
                <div className="card-body">
                  <div className="section-label">Specification Documents</div>
                  {SPEC_DOCS.map((d, i) => (
                    <div className="doc-row" key={i}>
                      <div>
                        <div className="doc-title">{d.ref}</div>
                        <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>{d.title}</div>
                      </div>
                      <span className={'doc-cat ' + d.category}>{d.category}</span>
                    </div>
                  ))}
                  {docs && docs.length > 0 && (
                    <>
                      <div className="section-label" style={{marginTop:12}}>Company Documents (Supabase)</div>
                      {docs.map((d, i) => (
                        <div className="doc-row" key={i}>
                          <div>
                            <div className="doc-title">{d.title}</div>
                            <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>{d.document_ref || ''}</div>
                          </div>
                          <span className={'doc-cat ' + d.category}>{d.category}</span>
                        </div>
                      ))}
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* WEBSITE ARCHITECTURE + BACKUP PROCEDURES */}
            <div className="two-col">
              <div className="card">
                <div className="card-head"><div className="card-head-title">Website Architecture</div><div className="card-head-badge">{SITE_PAGES.length} pages</div></div>
                <div className="card-body">
                  {SITE_PAGES.map((p, i) => (
                    <div className="site-row" key={i}>
                      <span className="site-path">{p.path}</span>
                      <span className="site-desc">{p.desc}</span>
                      <span style={{fontSize:'0.55rem',fontFamily:'var(--font-mono)',marginLeft:'auto',color: p.auth ? 'var(--accent-amber)' : 'var(--accent-green)'}}>{p.auth ? 'auth' : 'public'}</span>
                    </div>
                  ))}
                  <div style={{marginTop:8,fontSize:'0.62rem',color:'var(--text-muted)',lineHeight:1.5}}>
                    Hosted on GitHub Pages (LexMarkAI/AILane-website). Custom domain ailane.ai. Each page is [feature]/index.html in repo root. GA4 G-NTNXWZN31C on every page.
                  </div>
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                <div className="card">
                  <div className="card-head"><div className="card-head-title">Scraper Network</div><div className="card-head-badge">International</div></div>
                  <div className="card-body">
                    {scraperRuns.map((s, i) => (
                      <div className="pipe-row" key={i}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span className={'pipe-status ' + s.status}>{s.status}</span>
                          <span style={{fontSize:'0.72rem',color:'var(--text-primary)'}}>{s.scraper_name}</span>
                        </div>
                        <div style={{display:'flex',gap:8,alignItems:'center'}}>
                          <span className="ts">{s.decisions_found} found</span>
                          <span className="ts">{timeAgo(s.started_at)}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="card" style={{borderColor:'rgba(14,165,233,0.15)'}}>
                  <div className="card-head"><div className="card-head-title" style={{color:'var(--accent-cyan)'}}>Recovery Procedures</div></div>
                  <div className="card-body">
                    {[
                      {proc:'Edge Function rollback',action:'Download zip from Supabase Dashboard, inspect, redeploy previous version. compliance-check v23 is production engine.'},
                      {proc:'Stripe webhook failure',action:'Check Supabase Edge Function logs. Verify stripe-webhook v16 secret. Re-register events in Stripe Dashboard if needed.'},
                      {proc:'Auth recovery',action:'Canonical pattern: decode JWT directly, raw fetch with Bearer header. Never revert to Supabase JS client for profile queries.'},
                      {proc:'Monzo webhook outage',action:'Check monzo-webhook v17 logs. Uses accounts schema .schema("accounts").from() pattern. 180 events processed, 0 errors to date.'},
                      {proc:'Scraper failure',action:'Check pipeline_runs for error_message. GOV.UK 422 errors are transient API issues. Retry manually via Edge Function invocation.'},
                      {proc:'Database backup',action:'Supabase Pro Plan includes daily automated backups with point-in-time recovery up to 7 days.'},
                    ].map((r, i) => (
                      <div key={i} style={{padding:'8px 0',borderBottom: i < 5 ? '1px solid var(--border-subtle)' : 'none'}}>
                        <div style={{fontSize:'0.74rem',fontWeight:600,color:'var(--text-primary)'}}>{r.proc}</div>
                        <div style={{fontSize:'0.62rem',color:'var(--text-secondary)',lineHeight:1.5,marginTop:3}}>{r.action}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* DATA FLOW ARCHITECTURE */}
            <div className="card">
              <div className="card-head"><div className="card-head-title">Core Data Flow Architecture</div></div>
              <div className="card-body">
                <div className="three-col">
                  {[
                    {title:'Compliance Check Flow',nodes:['Customer lands on contract-scan/ or contract-check-worker/','Stripe Checkout (portal-upload)','Document upload to Supabase Storage','compliance-check v23 (Anthropic API)','Findings stored in compliance_findings','generate-report + generate-report-pdf','send-report-email to customer','Portal session tracks in compliance_portal_sessions'],color:'var(--accent-cyan)'},
                    {title:'Payment & Revenue Flow',nodes:['Stripe Checkout initiated by portal-upload','stripe-webhook receives checkout.session.completed','Transaction created in accounts.transactions via monzo-webhook','Monzo webhook logs to accounts.monzo_webhook_log','Revenue tracked: is_revenue flag + stripe_payment_id','17 products across 4 tiers in stripe_products'],color:'var(--accent-green)'},
                    {title:'Intelligence Pipeline Flow',nodes:['6 daily cron pipelines (GOV.UK, Parliament, BBC, Hansard)','Records ingested to parliamentary_intelligence','Tribunal scraper feeds tribunal_decisions (130.9K)','generate-event-summary creates ticker_briefings','Employer enrichment from Companies House API','ACEI scoring: tribunal + employer + legislation'],color:'var(--accent-purple)'},
                  ].map((flow, i) => (
                    <div key={i} style={{background:'var(--bg-base)',border:'1px solid var(--border-subtle)',borderRadius:'var(--radius-md)',padding:'14px 16px'}}>
                      <div style={{fontSize:'0.76rem',fontWeight:700,color:flow.color,marginBottom:10}}>{flow.title}</div>
                      {flow.nodes.map((n, j) => (
                        <div key={j} style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:6}}>
                          <div style={{width:18,height:18,borderRadius:'50%',background:flow.color.replace(')',',0.15)'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.55rem',fontFamily:'var(--font-mono)',color:flow.color,flexShrink:0,marginTop:1}}>{j+1}</div>
                          <div style={{fontSize:'0.65rem',color:'var(--text-secondary)',lineHeight:1.4}}>{n}</div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* CRITICAL PATTERNS */}
            <div className="card" style={{borderColor:'rgba(245,158,11,0.15)'}}>
              <div className="card-head"><div className="card-head-title" style={{color:'var(--accent-amber)'}}>Critical Technical Patterns</div><div className="card-head-badge">Must preserve</div></div>
              <div className="card-body">
                <div className="two-col" style={{gap:12}}>
                  {[
                    {pattern:'Non-public schema access',rule:'Always use .schema("name").from("table"). Dot-notation in .from() silently fails in supabase-js v2.'},
                    {pattern:'Auth callback',rule:'Decode JWT directly: JSON.parse(atob(token.split(".")[1])).sub. Raw fetch() with Authorization: Bearer header. Never revert to Supabase JS client.'},
                    {pattern:'Edge Function verify_jwt',rule:'true for user-facing functions. false for service-to-service (webhooks, pipelines). Gateway rejects stale anon keys.'},
                    {pattern:'Schema DDL changes',rule:'Use apply_migration (transactional, rolls back on failure). execute_sql for targeted queries/DML only.'},
                    {pattern:'PostgREST schema exposure',rule:'Two steps: SQL grants AND manual checkbox in Dashboard Settings API Exposed Schemas. Cannot be done programmatically.'},
                    {pattern:'Edge Function deployment',rule:'Supabase CLI not installed. Manage via Dashboard only. Never deploy replacement without reading production source first.'},
                  ].map((p, i) => (
                    <div key={i} style={{background:'var(--bg-base)',border:'1px solid var(--border-subtle)',borderRadius:'var(--radius-sm)',padding:'10px 12px'}}>
                      <div style={{fontSize:'0.72rem',fontWeight:600,color:'var(--accent-amber)'}}>{p.pattern}</div>
                      <div style={{fontSize:'0.62rem',color:'var(--text-secondary)',lineHeight:1.5,marginTop:4}}>{p.rule}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
