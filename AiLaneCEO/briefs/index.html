<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Briefs — Ailane CEO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a13;--bg2:#0c1221;--bg3:#111a2e;--bg4:#162035;--bdr:#1a2d4d;--bdr2:#243656;
  --t1:#e8edf5;--t2:#94a3b8;--t3:#5a6e8a;--cyan:#06d6d6;--blue:#3b82f6;--indigo:#6366f1;
  --violet:#8b5cf6;--emerald:#10b981;--amber:#f59e0b;--rose:#f43f5e;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 50% 35% at 20% 10%,rgba(6,214,214,.05) 0%,transparent 60%),
  radial-gradient(ellipse 40% 40% at 80% 85%,rgba(99,102,241,.03) 0%,transparent 55%)}
/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:12px 28px;
  background:rgba(6,10,19,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
.nav-logo{font-family:'Fraunces',serif;font-weight:700;font-size:19px;color:var(--cyan)}
.nav-sep{width:1px;height:22px;background:var(--bdr);margin:0 4px}
.nav-tabs{display:flex;gap:1px}
.nav-tab{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--t3);
  cursor:pointer;transition:.2s;text-decoration:none;display:flex;align-items:center;gap:5px}
.nav-tab:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.nav-tab.active{color:var(--cyan);background:rgba(6,214,214,.08);box-shadow:inset 0 -2px 0 var(--cyan)}
.nav-tab svg{width:14px;height:14px}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px}
.badge-ceo{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.nav-user{font-size:11.5px;color:var(--t3);display:flex;align-items:center;gap:6px}
.avatar{width:26px;height:26px;border-radius:99px;background:linear-gradient(135deg,var(--cyan),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
/* PAGE */
.page{max-width:900px;margin:0 auto;padding:32px 28px 60px;position:relative;z-index:1}
.page h1{font-family:'Fraunces',serif;font-size:28px;font-weight:700;
  background:linear-gradient(135deg,var(--t1),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--t3);margin-bottom:28px}
/* BRIEF CARD */
.brief{background:var(--bg3);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:20px}
.brief-header{padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;gap:14px}
.brief-date-box{flex-shrink:0;width:56px;text-align:center;padding:8px 0;border-radius:8px;
  background:rgba(6,214,214,.06);border:1px solid rgba(6,214,214,.12)}
.brief-day{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--cyan);line-height:1}
.brief-month{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--t3);margin-top:2px}
.brief-headline{font-size:16px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:4px}
.brief-mood{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:4px}
.mood-exceptional{background:rgba(16,185,129,.12);color:var(--emerald)}
.mood-positive{background:rgba(59,130,246,.12);color:var(--blue)}
.mood-steady{background:rgba(148,163,184,.1);color:var(--t2)}
.mood-challenging{background:rgba(245,158,11,.12);color:var(--amber)}
.brief-body{padding:20px 24px}
.brief-section{margin-bottom:20px}
.brief-section:last-child{margin-bottom:0}
.brief-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.brief-section-title svg{width:13px;height:13px;color:var(--cyan)}
.brief-text{font-size:13px;color:var(--t2);line-height:1.7}
/* Metrics Grid */
.metrics-mini{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:6px}
.metric-mini{text-align:center;padding:10px 8px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.metric-mini-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--cyan)}
.metric-mini-label{font-size:10px;color:var(--t3);margin-top:2px}
/* Achievement list */
.achievement{display:flex;gap:8px;padding:5px 0;font-size:12.5px;color:var(--t2);line-height:1.4}
.achievement::before{content:'✓';color:var(--emerald);font-weight:700;flex-shrink:0}
/* Priority list */
.priority{display:flex;gap:8px;padding:5px 0;font-size:12.5px;color:var(--t2);line-height:1.4}
.priority-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--cyan);
  width:18px;height:18px;border-radius:4px;background:rgba(6,214,214,.1);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
/* Milestone */
.milestone{display:flex;gap:8px;padding:4px 0;font-size:12px;color:var(--t2);line-height:1.4}
.milestone-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.milestone-hit .milestone-dot{background:var(--emerald)}
.milestone-upcoming .milestone-dot{background:var(--amber)}
/* Pipeline bars */
.pipe-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.pipe-label{font-size:11px;color:var(--t3);width:180px;flex-shrink:0}
.pipe-track{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.pipe-fill{height:100%;border-radius:3px}
.pipe-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);width:40px;text-align:right}
/* Valuation card */
.val-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.val-item{padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.val-item-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.val-item-val{font-size:12px;color:var(--t2);line-height:1.4}
/* Constitutional */
.const-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.const-badge{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600}
/* Archive section */
.archive-title{font-size:14px;font-weight:700;color:var(--t1);margin:32px 0 16px;
  display:flex;align-items:center;gap:8px}
.archive-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
.archive-list{display:flex;flex-direction:column;gap:6px}
.archive-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--bdr);cursor:pointer;transition:.2s}
.archive-item:hover{background:var(--bg4);border-color:var(--bdr2)}
.archive-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cyan);width:90px;flex-shrink:0}
.archive-headline{font-size:13px;color:var(--t2);flex:1}
.archive-mood{font-size:10px;font-weight:600;text-transform:uppercase;padding:2px 6px;border-radius:3px}
/* Loading */
.loading{text-align:center;padding:60px;font-size:13px;color:var(--t3)}
@media(max-width:768px){.page{padding:16px 14px 40px}.metrics-mini{grid-template-columns:1fr 1fr}
  .val-grid{grid-template-columns:1fr}.brief-header{flex-direction:column}}
</style>
</head>
<body>
<div class="amb"></div>
<nav class="nav">
  <div class="nav-logo">ailane</div>
  <div class="nav-sep"></div>
  <div class="nav-tabs">
    <a class="nav-tab" href="/AiLaneCEO/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Command Centre
    </a>
    <a class="nav-tab active" href="/AiLaneCEO/briefs/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Daily Briefs
    </a>
    <a class="nav-tab" href="/dashboard/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Client Dashboard
    </a>
    <a class="nav-tab" href="/knowledge-library/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Knowledge Library
    </a>
    <a class="nav-tab" href="/ticker/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Ticker
    </a>
  </div>
  <div class="nav-r">
    <div class="badge badge-ceo">CEO</div>
    <div class="nav-user"><div class="avatar">M</div>mark@ailane.ai</div>
  </div>
</nav>
<div class="page">
  <h1>Daily Briefs</h1>
  <div class="page-sub">End-of-day platform intelligence — auto-generated at 00:30 daily</div>

  <div id="todayBrief"><div class="loading">Loading today's brief...</div></div>

  <div class="archive-title">Archive</div>
  <div class="archive-list" id="archiveList"><div class="loading">Loading archive...</div></div>
</div>
<script>
const SB='https://cnbsxwtvazfvzmltkuvx.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`};
function num(n){return typeof n!=='number'?n:n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(n>=10e3?0:1)+'K':n.toLocaleString()}
function parseJ(v){try{return typeof v==='string'?JSON.parse(v):v||{}}catch{return {}}}
function parseA(v){try{return typeof v==='string'?JSON.parse(v):v||[]}catch{return []}}
function renderBrief(b,expanded=true){
  const d=new Date(b.brief_date+'T12:00:00');
  const day=d.getDate();
  const mon=d.toLocaleDateString('en-GB',{month:'short'}).toUpperCase();
  const yr=d.getFullYear();
  const metrics=parseJ(b.metrics_snapshot);
  const pipeline=parseJ(b.pipeline_status);
  const achievements=parseA(b.key_achievements);
  const priorities=parseA(b.tomorrow_priorities);
  const milestonesHit=parseA(b.milestones_hit);
  const milestonesUp=parseA(b.milestones_upcoming);
  const valuation=parseJ(b.company_valuation);
  const financials=parseJ(b.financials);
  const constStatus=parseJ(b.constitutional_status);
  const assets=valuation.key_assets||{};
  const revenue=valuation.revenue_streams||{};
  let html=`<div class="brief">
    <div class="brief-header">
      <div class="brief-date-box"><div class="brief-day">${day}</div><div class="brief-month">${mon} ${yr}</div></div>
      <div>
        <div class="brief-headline">${b.headline}</div>
        <span class="brief-mood mood-${b.mood}">${b.mood}</span>
      </div>
    </div>`;
  if(!expanded){html+=`</div>`;return html}
  html+=`<div class="brief-body">`;
  // Progress
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Today's Progress</div>
    <div class="brief-text">${b.progress_summary}</div></div>`;
  // Metrics
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Platform Snapshot</div>
    <div class="metrics-mini">
      <div class="metric-mini"><div class="metric-mini-val">${num(metrics.tribunal_decisions||0)}</div><div class="metric-mini-label">Decisions</div></div>
      <div class="metric-mini"><div class="metric-mini-val">${num(metrics.employers||0)}</div><div class="metric-mini-label">Employers</div></div>
      <div class="metric-mini"><div class="metric-mini-val">${metrics.legislation||0}</div><div class="metric-mini-label">Legislation</div></div>
      <div class="metric-mini"><div class="metric-mini-val">${metrics.domain_index||'—'}</div><div class="metric-mini-label">Domain Index</div></div>
      <div class="metric-mini"><div class="metric-mini-val">${metrics.jurisdictions||0}</div><div class="metric-mini-label">Jurisdictions</div></div>
      <div class="metric-mini"><div class="metric-mini-val">${metrics.app_users||0}</div><div class="metric-mini-label">Users</div></div>
    </div></div>`;
  // Pipelines
  const pipes=[
    {l:'Companies House',pct:pipeline.companies_house_enrichment_pct||0,c:'var(--blue)'},
    {l:'Deep Enrichment',pct:pipeline.deep_metadata_enrichment_pct||0,c:'var(--violet)'},
    {l:'ACEI Classification',pct:pipeline.acei_classification_pct||100,c:'var(--emerald)'},
    {l:'Legislation Seed',pct:pipeline.legislation_seed_pct||0,c:'var(--indigo)'},
  ];
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>Pipeline Status</div>
    ${pipes.map(p=>`<div class="pipe-row"><div class="pipe-label">${p.l}</div><div class="pipe-track"><div class="pipe-fill" style="width:${p.pct}%;background:${p.c}"></div></div><div class="pipe-pct">${p.pct}%</div></div>`).join('')}</div>`;
  // Achievements
  if(achievements.length>0){
    html+=`<div class="brief-section">
      <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Key Achievements</div>
      ${achievements.map(a=>`<div class="achievement">${a}</div>`).join('')}</div>`}
  // Tomorrow
  if(priorities.length>0){
    html+=`<div class="brief-section">
      <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Tomorrow's Focus</div>
      ${priorities.map((p,i)=>`<div class="priority"><div class="priority-num">${i+1}</div>${p}</div>`).join('')}</div>`}
  // Week
  if(b.week_focus){
    html+=`<div class="brief-section">
      <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>Week Ahead</div>
      <div class="brief-text">${b.week_focus}</div></div>`}
  // Milestones
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>Company Milestones</div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:600;color:var(--emerald)">ACHIEVED</div>
    ${milestonesHit.slice(-6).map(m=>`<div class="milestone milestone-hit"><div class="milestone-dot"></div>${m}</div>`).join('')}
    <div style="margin:10px 0 8px;font-size:11px;font-weight:600;color:var(--amber)">UPCOMING</div>
    ${milestonesUp.slice(0,5).map(m=>`<div class="milestone milestone-upcoming"><div class="milestone-dot"></div>${m}</div>`).join('')}
  </div>`;
  // Valuation
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Valuation & Assets</div>
    <div style="font-family:'JetBrains Mono';font-size:18px;font-weight:700;color:var(--cyan);margin-bottom:10px">${valuation.estimated_pre_revenue_value||'—'}</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:12px">${valuation.basis||''}</div>
    <div class="val-grid">
      ${Object.entries(assets).map(([k,v])=>`<div class="val-item"><div class="val-item-label">${k.replace(/_/g,' ')}</div><div class="val-item-val">${v}</div></div>`).join('')}
    </div></div>`;
  // Financials
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Financial Position</div>
    <div class="val-grid">
      <div class="val-item"><div class="val-item-label">Innovation Wales</div><div class="val-item-val">£${num(financials.innovation_wales_funding||0)} — ${financials.funding_status||''}</div></div>
      <div class="val-item"><div class="val-item-label">Current MRR</div><div class="val-item-val">£${financials.current_mrr||0}</div></div>
      <div class="val-item"><div class="val-item-label">Target ARR</div><div class="val-item-val">£${num(financials.target_arr||0)}</div></div>
      <div class="val-item"><div class="val-item-label">Runway</div><div class="val-item-val">${financials.runway||'—'}</div></div>
    </div></div>`;
  // Constitutional
  html+=`<div class="brief-section">
    <div class="brief-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Constitutional Compliance</div>
    <div class="const-badges">
      <span class="const-badge" style="background:rgba(6,214,214,.1);color:var(--cyan);border:1px solid rgba(6,214,214,.2)">ACEI v1.0 ${constStatus.acei_v1_compliant?'✓ Compliant':'✗'}</span>
      <span class="const-badge" style="background:rgba(99,102,241,.1);color:var(--indigo);border:1px solid rgba(99,102,241,.2)">RRI v1.0 ${constStatus.rri_v1_compliant?'✓ Compliant':'✗'}</span>
      <span class="const-badge" style="background:rgba(139,92,246,.1);color:var(--violet);border:1px solid rgba(139,92,246,.2)">CCI v1.0 ${constStatus.cci_v1_compliant?'✓ Compliant':'✗'}</span>
      <span class="const-badge" style="background:rgba(16,185,129,.1);color:var(--emerald);border:1px solid rgba(16,185,129,.2)">Separation Doctrine: ${constStatus.separation_doctrine||'Enforced'}</span>
      <span class="const-badge" style="background:rgba(148,163,184,.08);color:var(--t2);border:1px solid rgba(148,163,184,.15)">Amendments Pending: ${constStatus.amendments_pending||0}</span>
    </div></div>`;
  html+=`</div></div>`;
  return html;
}
async function loadBriefs(){
  try{
    const r=await fetch(`${SB}/rest/v1/ceo_daily_briefs?select=*&order=brief_date.desc&limit=30`,{headers:H});
    const briefs=await r.json();

    if(!briefs.length){
      document.getElementById('todayBrief').innerHTML='<div class="loading">No briefs yet. First auto-generated brief arrives at 00:30 tonight.</div>';
      document.getElementById('archiveList').innerHTML='';
      return;
    }
    // Today's brief (or most recent)
    document.getElementById('todayBrief').innerHTML=renderBrief(briefs[0],true);
    // Archive (rest)
    if(briefs.length>1){
      document.getElementById('archiveList').innerHTML=briefs.slice(1).map(b=>{
        const d=new Date(b.brief_date+'T12:00:00');
        return `<div class="archive-item" onclick="this.outerHTML=renderBrief(window._briefs.find(x=>x.brief_date==='${b.brief_date}'),true)">
          <div class="archive-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
          <div class="archive-headline">${b.headline}</div>
          <span class="archive-mood mood-${b.mood}">${b.mood}</span>
        </div>`;
      }).join('');
      window._briefs=briefs;
    } else {
      document.getElementById('archiveList').innerHTML='<div style="font-size:13px;color:var(--t3);padding:16px">Archive builds automatically. Tomorrow you will see today\'s brief here.</div>';
    }
  }catch(e){
    document.getElementById('todayBrief').innerHTML=`<div class="loading">Error: ${e.message}</div>`;
  }
}
// Expose renderBrief globally for archive expansion
window.renderBrief=renderBrief;
loadBriefs();
</script>
</body>
</html>
