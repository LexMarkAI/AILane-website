<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
const CEO_EMAIL = 'mark@ailane.ai';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function num(n){if(n==null) return '0';return Number(n).toLocaleString('en-GB');}
function shortDate(d){if(!d) return '—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function friendly(s){if(s==null||s==='') return '—';return String(s).replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());}

function App() {
  const [auth, setAuth] = useState('checking');
  const [token, setToken] = useState(null);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [eileenOpen, setEileenOpen] = useState(false);
  const [entAlin, setEntAlin] = useState(null);
  const openEntity = (alin) => { if(alin) setEntAlin(alin); };

  // ─── Auth gate (CEO-only; identical pattern to module pages) ───
  useEffect(() => {
    (async()=>{
      const {data:{session}}=await sb.auth.getSession();
      if(session){const p=JSON.parse(atob(session.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(session.access_token);setAuth('ok');return;}}
      const t=setTimeout(()=>{window.location.href='/AiLaneCEO/';},5000);
      sb.auth.onAuthStateChange((ev,sess)=>{if(sess){clearTimeout(t);const p=JSON.parse(atob(sess.access_token.split('.')[1]));if(p.email===CEO_EMAIL){setToken(sess.access_token);setAuth('ok');}else window.location.href='/AiLaneCEO/';}});
    })();
  }, []);

  // ─── Live data from ceo-portfolio-data ───
  useEffect(() => {
    if(auth!=='ok'||!token) return;
    (async()=>{
      setLoading(true);
      try{const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=cohort_leagues`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
      if(r.ok){const j=await r.json();setData(j.sections?.cohort_leagues||null);}else{console.error('ceo-portfolio-data',r.status);}}catch(e){console.error(e);}
      setLoading(false);
    })();
  }, [auth, token]);

  if(auth==='checking') return <div className="auth-gate"><div className="logo-mark">AILANE</div><div className="pulse-ring"/><div className="ts">Verifying clearance…</div></div>;

  const d = data || {};
  const summary = d.summary || {};
  const families = Array.isArray(d.families) ? d.families : [];
  const entities = Array.isArray(d.entities) ? d.entities : [];
  const staleDays = d.snapshot_stale_days;
  const junctionRows = summary.membership_junction_rows;

  // Status classification per family
  function statusOf(f){
    const s = Number(f.super_league_tier_s_count||0)+Number(f.super_league_tier_p_count||0)+Number(f.super_league_tier_d_count||0);
    if(s>0) return {cls:'tiered',label:'Tier-allocated'};
    if(Number(f.entity_count_total||0)>0) return {cls:'populated',label:'Populated · untiered'};
    return {cls:'awaiting',label:'Awaiting allocation'};
  }
  // Populated families first, by total entities desc; awaiting families last (alphabetical)
  const ordered = [...families].sort((a,b)=>{
    const at=Number(a.entity_count_total||0), bt=Number(b.entity_count_total||0);
    if((at>0)!==(bt>0)) return at>0?-1:1;
    if(bt!==at) return bt-at;
    return String(a.cohort_family||'').localeCompare(String(b.cohort_family||''));
  });

  const selFam = selected ? families.find(f=>f.cohort_family===selected) : null;
  const selEntities = selected ? entities.filter(e=>e.cohort_family===selected) : [];

  return (
    <div>
      <div className="top-bar">
        <div className="top-bar-left">
          <a href="/AiLaneCEO/" className="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>Hub</a>
          <div className="page-title">Cohort <span>Leagues</span></div>
        </div>
        <div className="top-bar-right">
          <div className="status-pill live"><div className="dot"/>LIVE</div>
          <div className="ts">Snapshot {shortDate(d.snapshot_at)}</div>
        </div>
      </div>

      <div className="main">
        {loading ? (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="kpi-strip">{[1,2,3,4,5].map(i=><div key={i} className="skeleton" style={{height:80}}/>)}</div>
            <div className="skeleton" style={{height:360}}/>
          </div>
        ) : !data ? (
          <div className="card"><div className="card-body"><div className="empty-note">Unable to load cohort league data. The portfolio service returned no payload for this session.</div></div></div>
        ) : (
          <>
            {/* KPI STRIP */}
            <div className="kpi-strip">
              <div className="kpi-card">
                <div className="label">League Families</div>
                <div className="value" style={{color:'var(--accent-cyan)'}}>{num(summary.family_count)}</div>
                <div className="sub">cohort registry</div>
              </div>
              <div className="kpi-card">
                <div className="label">Active</div>
                <div className="value" style={{color:'var(--accent-green)'}}>{num(summary.families_active)}</div>
                <div className="sub">populated families</div>
              </div>
              <div className="kpi-card">
                <div className="label">Awaiting</div>
                <div className="value" style={{color:'var(--text-secondary)'}}>{num(summary.families_awaiting)}</div>
                <div className="sub">unallocated</div>
              </div>
              <div className="kpi-card">
                <div className="label">Register Entities</div>
                <div className="value" style={{color:'var(--accent-purple)'}}>{num(summary.entities_total)}</div>
                <div className="sub">{num(summary.entities_in_register)} in register</div>
              </div>
              <div className="kpi-card">
                <div className="label">Snapshot Age</div>
                <div className="value" style={{color:(staleDays!=null&&staleDays>7)?'var(--accent-amber)':'var(--text-primary)'}}>{staleDays==null?'—':staleDays+'d'}</div>
                <div className="sub">{shortDate(d.snapshot_at)}</div>
              </div>
            </div>

            {/* DATA-INTEGRITY FLAGS */}
            {staleDays!=null && staleDays>7 && (
              <div className="banner warn">
                <svg className="bicon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <div><strong>Snapshot is {staleDays} days old</strong> (threshold 7). League figures may be stale — a scheduled rebuild is pending under AMD-153.</div>
              </div>
            )}
            {junctionRows!=null && Number(junctionRows)===0 && (
              <div className="banner note">
                <svg className="bicon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <div><strong>Multi-family membership not yet populated</strong> (membership junction rows = 0). Each register entity currently maps to a single cohort family; cross-family membership is a follow-up.</div>
              </div>
            )}

            {/* LEAGUE TABLE */}
            <div className="card">
              <div className="card-head">
                <div className="card-head-title">League Table</div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="card-head-badge">{families.length} families · populated first</div>
                  <button className="refresh-btn" disabled title="Scheduled refresh pending (AMD-153 follow-up)">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh snapshot
                  </button>
                </div>
              </div>
              <div className="card-body">
                <div className="lg-table-wrap">
                  <table className="lg-table">
                    <thead>
                      <tr>
                        <th style={{width:24}}></th>
                        <th>Family</th>
                        <th>Entities (T / A / L / D)</th>
                        <th>Super-League Tiers</th>
                        <th>Exclusivity (held / avail)</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {ordered.map((f,i)=>{
                        const st = statusOf(f);
                        const sC=Number(f.super_league_tier_s_count||0), pC=Number(f.super_league_tier_p_count||0), dC=Number(f.super_league_tier_d_count||0);
                        const isSel = selected===f.cohort_family;
                        return (
                          <tr key={i} className={'lg-row'+(isSel?' sel':'')} onClick={()=>setSelected(isSel?null:f.cohort_family)}>
                            <td>
                              <svg className="chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
                            </td>
                            <td>
                              <div className="fam-name">{f.cohort_family}</div>

                            <td>
                              <div className="cluster">
                                <div className="ct"><b style={{color:'var(--text-primary)'}}>{num(f.entity_count_total)}</b><small>total</small></div>
                                <div className="ct"><b style={{color:'var(--accent-green)'}}>{num(f.entity_count_active)}</b><small>active</small></div>
                                <div className="ct"><b style={{color:'var(--accent-amber)'}}>{num(f.entity_count_lapsed)}</b><small>lapsed</small></div>
                                <div className="ct"><b style={{color:'var(--text-muted)'}}>{num(f.entity_count_dissolved)}</b><small>diss.</small></div>
                              </div>
                            </td>
                            <td>
                              {(sC+pC+dC)>0 ? (
                                <span>
                                  {sC>0 && <span className="tier-chip s">S · {sC}</span>}
                                  {pC>0 && <span className="tier-chip p">P · {pC}</span>}

                            </td>
                            <td>

                            </td>
                            <td>
                              <span className={'alloc-pill '+st.cls}><span className="dot2"/>{st.label}</span>
                            </td>
                          </tr>
                        );
                      })}
                      {ordered.length===0 && <tr><td colSpan="6"><div className="empty-note">No league families in the current snapshot.</div></td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* DRILL: FAMILY ENTITIES */}
            {selFam && (
              <div className="card">
                <div className="card-head">
                  <div className="card-head-title">Family {selFam.cohort_family} — Register Entities</div>
                  <div className="card-head-badge">{selEntities.length} of {num(selFam.entity_count_total)}</div>
                </div>
                <div className="card-body">
                  <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
                    <span className="meta-chip">Active <b>{num(selFam.entity_count_active)}</b></span>
                    <span className="meta-chip">Lapsed <b>{num(selFam.entity_count_lapsed)}</b></span>
                    <span className="meta-chip">Dissolved <b>{num(selFam.entity_count_dissolved)}</b></span>
                    <span className="meta-chip">Exclusivity held <b>{num(selFam.exclusivity_held_count)}</b> / {num(selFam.exclusivity_available_count)}</span>
                    {selFam.league_table_position && <span className="meta-chip">League rank <b>{selFam.league_table_position.position||selFam.league_table_position.rank||JSON.stringify(selFam.league_table_position)}</b></span>}
                    {selFam.size_band_distribution && Object.keys(selFam.size_band_distribution).length>0 && Object.entries(selFam.size_band_distribution).map(([k,v])=>(
                      <span className="meta-chip" key={k}>{friendly(k)} <b>{num(v)}</b></span>
                    ))}
                  </div>
                  {selEntities.length>0 ? (
                    <div className="lg-table-wrap">
                      <table className="ent-table">
                        <thead>
                          <tr>
                            <th>ALIN</th><th>Company</th><th>CHN</th><th>Tier</th><th>Size</th><th>Exposure</th><th>Tribunals</th><th>Sev.Wtd</th><th>Allocation</th>
                          </tr>
                        </thead>
                        <tbody>
                          {selEntities.map((e,i)=>(
                            <tr key={i} className={e.alin?'ent-row':undefined} onClick={e.alin?()=>openEntity(e.alin):undefined} style={e.alin?{cursor:'pointer'}:undefined} title={e.alin?'Open entity record':undefined}>
                              <td className="mono" style={{color:'var(--accent-cyan)'}}>{e.alin||'—'}</td>
                              <td>
                                <div className="ent-name">{e.company_name||'—'}</div>
                                {e.is_repeat_respondent && <span className="repeat-flag" style={{marginTop:3,display:'inline-block'}}>repeat respondent</span>}
                              </td>
                              <td className="mono" style={{color:'var(--text-muted)'}}>{e.companies_house_number||'—'}</td>
                              <td>{e.super_league_tier ? <span className={'mini-tier '+String(e.super_league_tier).toUpperCase().charAt(0)}>{e.super_league_tier}</span> : '—'}</td>
                              <td>{friendly(e.size_band)}</td>
                              <td>{friendly(e.exposure_band)}</td>
                              <td className="mono">{num(e.tribunal_count)}</td>
                              <td className="mono">{e.severity_weighted!=null?Number(e.severity_weighted).toLocaleString('en-GB',{maximumFractionDigits:1}):'—'}</td>
                              <td>{friendly(e.allocation_status)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : (
                    <div className="empty-note">No individual register entities returned for this family in the current snapshot.</div>
                  )}
                </div>
              </div>
            )}

            {!selFam && (
              <div style={{fontSize:'0.7rem',color:'var(--text-muted)',textAlign:'center',padding:'2px 0 8px'}}>Select a family row to drill into its register entities.</div>
            )}
          </>
        )}
      </div>

      {/* ENTITY DRILL-DOWN PANEL */}
      {entAlin&&<EntityPanel alin={entAlin} token={token} onClose={()=>setEntAlin(null)}/>}

      {/* EILEEN */}
      {!eileenOpen&&<div className="eileen-orb" onClick={()=>setEileenOpen(true)}><EileenNexus active={false} size={44}/></div>}
      {eileenOpen&&<EileenChat token={token} onClose={()=>setEileenOpen(false)}/>}
    </div>
  );
}

// ═══════ COHORT ENTITY DRILL-DOWN PANEL (read-only) ═══════
function EntityPanel({alin, token, onClose}){
  const [loading,setLoading]=useState(true);
  const [ent,setEnt]=useState(null);
  const [err,setErr]=useState(null);
  useEffect(()=>{
    let alive=true;
    (async()=>{
      setLoading(true);setErr(null);setEnt(null);
      try{
        const r=await fetch(`${SUPABASE_URL}/functions/v1/ceo-portfolio-data?section=cohort_entity_detail&alin=${encodeURIComponent(alin)}`,{headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY}});
        const j=await r.json();
        if(!alive) return;
        const ee=j?.sections?.cohort_entity_detail;
        if(!ee){ setErr('No entity detail returned.'); }
        else if(ee.error){ setErr(ee.error==='entity_not_found'?'Entity not found for this ALIN.':friendly(ee.error)); }
        else setEnt(ee);
      }catch(e){ if(alive){ console.error(e); setErr('Network error loading entity record.'); } }
      if(alive) setLoading(false);
    })();
    return ()=>{alive=false;};
  },[alin]);

  function chips(arr){
    const a = Array.isArray(arr)?arr:(arr&&typeof arr==='object'?Object.values(arr):[]);
    if(!a||a.length===0) return <span className="dd-muted">—</span>;
    return <div className="chip-wrap">{a.map((x,i)=><span key={i} className="ent-chip">{typeof x==='object'?JSON.stringify(x):String(x)}</span>)}</div>;
  }

  const en = ent||{};
  return (
    <div>
      <div className="dd-overlay" onClick={onClose}/>
      <div className="dd-drawer" role="dialog" aria-modal="true">
        <div className="dd-head">
          <div>
            <h2>{loading?'Loading…':(en.company_name||alin)}</h2>
            <div className="dd-sub">{alin}{en.companies_house_number?' · CHN '+en.companies_house_number:''}</div>
          </div>
          <button className="dd-close" onClick={onClose}>×</button>
        </div>
        <div className="dd-body">
          {loading ? (
            <div className="dd-loading"><div className="pulse-ring"/><div className="ts">Loading entity record…</div></div>
          ) : err ? (
            <div className="empty-note">{err}</div>
          ) : (
            <>
              <div className="dd-sec">
                <div className="dd-sec-title">Classification</div>
                <div className="dd-kv-grid">
                  <div className="dd-kv"><div className="k">Cohort Family</div><div className="v">{en.cohort_family||'—'}</div></div>
                  <div className="dd-kv"><div className="k">Membership Kind</div><div className="v">{friendly(en.cohort_membership_kind)}</div></div>
                  <div className="dd-kv"><div className="k">Super-League Tier</div><div className="v">{en.super_league_tier?<span className={'mini-tier '+String(en.super_league_tier).toUpperCase().charAt(0)}>{en.super_league_tier}</span>:'—'}</div></div>
                  <div className="dd-kv"><div className="k">Allocation Status</div><div className="v">{friendly(en.allocation_status)}</div></div>
                </div>
                {en.super_league_tier_basis && <div className="dd-kv"><div className="k">Tier Basis</div><div className="v" style={{fontWeight:400}}>{en.super_league_tier_basis}</div></div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Scale & Exposure</div>
                <div className="dd-kv-grid">
                  <div className="dd-kv"><div className="k">Size Band</div><div className="v">{friendly(en.size_band)}</div></div>
                  <div className="dd-kv"><div className="k">Exposure Band</div><div className="v">{friendly(en.exposure_band)}</div></div>
                  <div className="dd-kv"><div className="k">Tribunal Count</div><div className="v mono">{num(en.tribunal_count)}</div></div>
                  <div className="dd-kv"><div className="k">Severity Weighted</div><div className="v mono">{en.severity_weighted!=null?Number(en.severity_weighted).toLocaleString('en-GB',{maximumFractionDigits:1}):'—'}</div></div>
                  <div className="dd-kv"><div className="k">Repeat Respondent</div><div className="v">{en.is_repeat_respondent?'Yes':'No'}</div></div>
                  <div className="dd-kv"><div className="k">Derivative Basis</div><div className="v">{friendly(en.derivative_basis)}</div></div>
                </div>
                {en.size_band_evidence_basis && <div className="dd-kv"><div className="k">Size Band Evidence</div><div className="v" style={{fontWeight:400}}>{en.size_band_evidence_basis}</div></div>}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Footprint</div>
                <div className="dd-kv"><div className="k">Operating Regions</div>{chips(en.operating_regions)}</div>
                <div className="dd-kv"><div className="k">Market Segments</div>{chips(en.market_segments)}</div>
                <div className="dd-kv"><div className="k">SIC Codes</div>{chips(en.sic_codes)}</div>
                {en.regulatory_profile && (typeof en.regulatory_profile==='object'
                  ? <div className="dd-kv"><div className="k">Regulatory Profile</div><div className="chip-wrap">{Object.entries(en.regulatory_profile).map(([k,v],i)=><span key={i} className="ent-chip">{friendly(k)}: {typeof v==='object'?JSON.stringify(v):String(v)}</span>)}</div></div>
                  : <div className="dd-kv"><div className="k">Regulatory Profile</div><div className="v" style={{fontWeight:400}}>{friendly(en.regulatory_profile)}</div></div>)}
              </div>

              <div className="dd-sec">
                <div className="dd-sec-title">Provenance</div>
                <div className="dd-kv-grid">
                  <div className="dd-kv"><div className="k">Evidence Tier</div><div className="v">{friendly(en.evidence_tier)}</div></div>
                  <div className="dd-kv"><div className="k">Source Authority</div><div className="v">{friendly(en.evidence_source_authority)}</div></div>
                  <div className="dd-kv"><div className="k">Ratification</div><div className="v mono">{en.ratification_amd_ref||'—'}</div></div>
                  <div className="dd-kv"><div className="k">Recorded</div><div className="v mono">{shortDate(en.recorded_at)}</div></div>
                </div>
                {en.notes && <div className="dd-kv"><div className="k">Notes</div><div className="v" style={{fontWeight:400}}>{en.notes}</div></div>}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════ EILEEN INTELLIGENCE ENTITY ═══════
function EileenNexus({active,size}){
  const canvasRef=React.useRef(null);const frameRef=React.useRef(0);const timeRef=React.useRef(0);
  React.useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;const ctx=canvas.getContext('2d');
    const w=size*2,h=size*2;canvas.width=w;canvas.height=h;const cx=w/2,cy=h/2;
    const nodes=[];const nc=active?18:12;
    for(let i=0;i<nc;i++){const ring=i<5?0.2:i<11?0.55:0.82;const angle=(i/nc)*Math.PI*2+Math.random()*0.5;const r=ring*(w*0.38);
      nodes.push({x:cx+Math.cos(angle)*r,y:cy+Math.sin(angle)*r,bx:cx+Math.cos(angle)*r,by:cy+Math.sin(angle)*r,r:2+Math.random()*3,sp:0.3+Math.random()*0.7,ph:Math.random()*Math.PI*2});}
    function draw(){
      timeRef.current+=active?0.025:0.012;const t=timeRef.current;ctx.clearRect(0,0,w,h);
      const cs=active?28:18;const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,cs*3);
      grd.addColorStop(0,active?'rgba(212,160,23,0.5)':'rgba(212,160,23,0.25)');
      grd.addColorStop(0.4,active?'rgba(139,92,246,0.15)':'rgba(14,165,233,0.08)');grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,cs*3,0,Math.PI*2);ctx.fill();
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,cs);cg.addColorStop(0,'rgba(255,255,255,0.95)');
      cg.addColorStop(0.25,'#D4A017');cg.addColorStop(0.6,active?'#8B5CF6':'rgba(212,160,23,0.5)');
      cg.addColorStop(1,'rgba(212,160,23,0)');ctx.fillStyle=cg;
      ctx.beginPath();ctx.arc(cx,cy,cs*(1+Math.sin(t*1.5)*0.1),0,Math.PI*2);ctx.fill();
      nodes.forEach(n=>{const dr=active?8:3;n.x=n.bx+Math.sin(t*n.sp+n.ph)*dr;n.y=n.by+Math.cos(t*n.sp*0.7+n.ph)*dr;});
      nodes.forEach((a,i)=>{nodes.forEach((b,j)=>{if(j<=i)return;const dx=a.x-b.x,dy=a.y-b.y;const dist=Math.sqrt(dx*dx+dy*dy);const mx=active?w*0.45:w*0.35;
        if(dist<mx){const al=(1-dist/mx)*(active?0.35:0.15);const pu=0.5+Math.sin(t*2+i*0.3)*0.5;
          ctx.strokeStyle='rgba(212,160,23,'+(al*pu)+')';ctx.lineWidth=active?1.2:0.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}});});
      nodes.forEach(n=>{const pu=0.7+Math.sin(t*2+n.ph)*0.3;const na=active?0.9:0.5;
        ctx.fillStyle='rgba(212,160,23,'+(na*pu)+')';ctx.beginPath();ctx.arc(n.x,n.y,n.r*pu,0,Math.PI*2);ctx.fill();});
      frameRef.current=requestAnimationFrame(draw);}
    draw();return()=>cancelAnimationFrame(frameRef.current);
  },[active,size]);
  return React.createElement('canvas',{ref:canvasRef,style:{width:size,height:size}});
}

function EileenChat({token,onClose}){
  const[msgs,setMsgs]=useState([{role:'eileen',text:'Good evening. I have full Gold Clearance access to the cohort league registry and portfolio intelligence. What would you like to know?'}]);
  const[input,setInput]=useState('');const[thinking,setThinking]=useState(false);const endRef=React.useRef(null);
  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs,thinking]);
  async function send(){if(!input.trim()||thinking)return;const q=input.trim();setInput('');setMsgs(m=>[...m,{role:'user',text:q}]);setThinking(true);
    try{const r=await fetch(SUPABASE_URL+'/functions/v1/ceo-assistant',{method:'POST',headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify({message:q})});
      if(r.ok){const d=await r.json();setMsgs(m=>[...m,{role:'eileen',text:d.response||d.content||'Response received.'}]);}
      else{setMsgs(m=>[...m,{role:'eileen',text:'I encountered a '+r.status+' response. Try again.'}]);}}
    catch(e){setMsgs(m=>[...m,{role:'eileen',text:'Connection interrupted. Please try again.'}]);}setThinking(false);}
  return React.createElement('div',{className:'eileen-panel'},
    React.createElement('div',{className:'eileen-header'},
      React.createElement(EileenNexus,{active:thinking,size:40}),
      React.createElement('div',{style:{flex:1}},
        React.createElement('div',{className:'eileen-header-name'},'Eileen'),
        React.createElement('div',{className:'eileen-header-status'},thinking?'Processing intelligence...':'CEO Command · Gold Clearance')),
      React.createElement('button',{className:'eileen-close',onClick:onClose},'×')),
    React.createElement('div',{className:'eileen-messages'},
      msgs.map((m,i)=>React.createElement('div',{key:i,className:'eileen-msg '+m.role},m.text)),
      thinking&&React.createElement('div',{className:'eileen-typing'},
        React.createElement('div',{className:'eileen-typing-dot'}),React.createElement('div',{className:'eileen-typing-dot'}),React.createElement('div',{className:'eileen-typing-dot'})),
      React.createElement('div',{ref:endRef})),
    React.createElement('div',{className:'eileen-input-bar'},
      React.createElement('input',{className:'eileen-input',value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(),placeholder:'Ask Eileen anything...'}),
      React.createElement('button',{className:'eileen-send',onClick:send},'Send')));
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
