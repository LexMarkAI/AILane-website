<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailane Intelligence — Pre-Client Intelligence Environment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #080f1c;
    --navy-mid: #0d1929;
    --navy-surface: #111e33;
    --navy-card: #141f35;
    --navy-raised: #1a2844;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --text: #e8edf5;
    --text-muted: #7a8ba8;
    --text-faint: #4a5a73;
    --teal: #0e8f8f;
    --teal-bright: #12b0b0;
    --teal-glow: rgba(14,143,143,0.15);
    --red: #e05252;
    --red-muted: rgba(224,82,82,0.12);
    --amber: #d4840a;
    --amber-muted: rgba(212,132,10,0.12);
    --green: #1fa775;
    --green-muted: rgba(31,167,117,0.12);
    --gold: #f59e0b;
    --gold-muted: rgba(245,158,11,0.12);
    --gold-glow: rgba(245,158,11,0.2);
    --locked-overlay: rgba(8,15,28,0.85);
    --op-accent: #3b82f6;
    --gov-accent: #0e8f8f;
    --inst-accent: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--navy-raised); border-radius: 3px; }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,15,28,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }
  .topbar-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: #fff;
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .topbar-logo span { color: var(--teal-bright); }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .pcie-badge {
    background: var(--teal-glow);
    border: 1px solid rgba(14,143,143,0.3);
    color: var(--teal-bright);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .back-link {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  /* ENTITY HEADER */
  .entity-header {
    background: linear-gradient(135deg, var(--navy-surface) 0%, var(--navy-mid) 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px;
  }
  .entity-header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 24px;
  }
  .entity-meta { flex: 1; min-width: 300px; }
  .entity-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .demo-pill {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 3px;
  }
  .entity-name {
    font-family: 'DM Serif Display', serif;
    font-size: 28px; font-weight: 400; color: #fff;
    letter-spacing: -0.02em; margin-bottom: 6px;
  }
  .entity-details { font-size: 12px; color: var(--text-muted); }
  .entity-details span { color: var(--text); }
  .entity-details .sep { margin: 0 8px; color: var(--text-faint); }

  /* TIER SELECTOR */
  .tier-selector-wrap {
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  }
  .tier-selector-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .tier-selector {
    display: flex; background: var(--navy); border: 1px solid var(--border-strong);
    border-radius: 8px; padding: 4px; gap: 4px;
  }
  .tier-btn {
    padding: 8px 20px; border: none; border-radius: 6px;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; background: transparent;
    color: var(--text-muted); letter-spacing: 0.02em;
  }
  .tier-btn:hover { color: var(--text); background: var(--navy-raised); }
  .tier-btn.active-op { background: rgba(59,130,246,0.15); color: #93bbfc; border: 1px solid rgba(59,130,246,0.3); }
  .tier-btn.active-gov { background: var(--teal-glow); color: var(--teal-bright); border: 1px solid rgba(14,143,143,0.35); }
  .tier-btn.active-inst { background: var(--gold-muted); color: var(--gold); border: 1px solid rgba(245,158,11,0.35); }

  /* MAIN CONTENT */
  .main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* INDEX SCORE ROW */
  .index-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 24px;
  }
  .score-card {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .score-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .score-card.acei::before { background: linear-gradient(90deg, var(--op-accent), transparent); }
  .score-card.rri::before { background: linear-gradient(90deg, var(--gov-accent), transparent); }
  .score-card.cci::before { background: linear-gradient(90deg, #8b5cf6, transparent); }
  .score-card-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;
  }
  .score-card-name { font-size: 12px; color: var(--text-faint); margin-bottom: 16px; }
  .score-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 48px; font-weight: 600; line-height: 1;
    margin-bottom: 4px;
  }
  .score-card.acei .score-number { color: #93bbfc; }
  .score-card.rri .score-number { color: var(--teal-bright); }
  .score-card.cci .score-number { color: #c084fc; }
  .score-band {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    padding: 3px 9px; border-radius: 4px; margin-bottom: 12px;
  }
  .band-elevated { background: var(--amber-muted); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .band-moderate { background: var(--teal-glow); color: var(--teal-bright); border: 1px solid rgba(14,143,143,0.25); }
  .band-high { background: var(--red-muted); color: var(--red); border: 1px solid rgba(224,82,82,0.2); }
  .score-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .constitution-ref {
    position: absolute; bottom: 16px; right: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; color: var(--text-faint); letter-spacing: 0.05em;
  }

  /* SECTION GRID */
  .section-grid {
    display: grid; gap: 16px;
  }
  .section-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .section-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .section-grid.cols-2-1 { grid-template-columns: 2fr 1fr; }
  .section-grid.cols-1-2 { grid-template-columns: 1fr 2fr; }

  /* PANEL */
  .panel {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden; position: relative;
  }
  .panel-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-icon { width: 16px; height: 16px; }
  .panel-body { padding: 20px; }
  .panel-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 3px;
  }
  .badge-op { background: rgba(59,130,246,0.1); color: #93bbfc; }
  .badge-gov { background: var(--teal-glow); color: var(--teal-bright); }
  .badge-inst { background: var(--gold-muted); color: var(--gold); }
  .badge-all { background: rgba(255,255,255,0.06); color: var(--text-muted); }

  /* LOCKED PANEL */
  .panel-locked {
    position: relative; overflow: hidden;
  }
  .panel-locked .panel-body {
    filter: blur(3px);
    pointer-events: none;
    opacity: 0.35;
  }
  .lock-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--locked-overlay);
    backdrop-filter: blur(4px);
    z-index: 10; padding: 24px; text-align: center;
    gap: 12px;
  }
  .lock-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .lock-icon-gov { background: var(--teal-glow); border: 1px solid rgba(14,143,143,0.3); }
  .lock-icon-inst { background: var(--gold-muted); border: 1px solid rgba(245,158,11,0.3); }
  .lock-label { font-size: 12px; color: var(--text); line-height: 1.5; }
  .lock-cta {
    margin-top: 4px; padding: 8px 20px; border-radius: 6px;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em; cursor: pointer; border: none;
    text-decoration: none; display: inline-block;
    transition: opacity 0.2s;
  }
  .lock-cta:hover { opacity: 0.85; }
  .lock-cta-gov { background: var(--teal-bright); color: #fff; }
  .lock-cta-inst { background: var(--gold); color: #000; }

  /* ACEI 12-CAT BARS */
  .cat-bar-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-bar-item { }
  .cat-bar-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 5px;
  }
  .cat-bar-name { font-size: 11px; color: var(--text); font-weight: 500; }
  .cat-bar-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--text-muted); font-weight: 600;
  }
  .cat-bar-track {
    height: 5px; background: var(--navy-raised); border-radius: 3px; overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.8s ease;
  }
  .fill-high { background: linear-gradient(90deg, #f87171, #ef4444); }
  .fill-elevated { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
  .fill-moderate { background: linear-gradient(90deg, var(--teal-bright), #0e8f8f); }
  .fill-standard { background: var(--navy-raised); }

  /* RRI PILLARS */
  .rri-pillar-list { display: flex; flex-direction: column; gap: 14px; }
  .rri-pillar { }
  .rri-pillar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .rri-pillar-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .rri-pillar-score-wrap { display: flex; align-items: center; gap: 8px; }
  .rri-pillar-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
  }
  .rri-pillar-label { font-size: 10px; color: var(--text-muted); }
  .rri-dot-track { display: flex; gap: 5px; margin-bottom: 5px; }
  .rri-dot {
    width: 24px; height: 8px; border-radius: 2px;
  }
  .rri-dot.filled-3 { background: var(--teal-bright); }
  .rri-dot.filled-2 { background: #fbbf24; }
  .rri-dot.filled-empty { background: var(--navy-raised); }
  .rri-pillar-gap { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  /* CCI COMPONENTS */
  .cci-event-list { display: flex; flex-direction: column; gap: 10px; }
  .cci-event {
    background: var(--navy-raised);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: grid; grid-template-columns: 1fr auto; gap: 8px;
  }
  .cci-event-label { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .cci-event-outcome { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .cci-event-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px; font-weight: 600; text-align: right;
  }
  .cci-event-weight { font-size: 10px; color: var(--text-faint); text-align: right; }
  .cci-total-row {
    background: rgba(192,132,252,0.07);
    border: 1px solid rgba(192,132,252,0.2);
    border-radius: 8px; padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .cci-total-label { font-size: 12px; font-weight: 700; color: var(--text); }
  .cci-total-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px; font-weight: 600; color: #c084fc;
  }

  /* DOCUMENT VAULT */
  .vault-wcc-bar {
    background: var(--navy-raised); border-radius: 8px; padding: 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 16px;
  }
  .vault-wcc-label { font-size: 11px; color: var(--text-muted); flex: 1; }
  .vault-wcc-score { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; color: #fbbf24; }
  .vault-wcc-desc { font-size: 10px; color: var(--text-faint); text-align: right; }
  .vault-contract-list { display: flex; flex-direction: column; gap: 8px; }
  .vault-contract {
    background: var(--navy-raised);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
  }
  .vault-contract-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .vault-contract-role { font-size: 11px; color: var(--text-muted); }
  .vault-contract-score { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }
  .vault-contract-gaps { font-size: 10px; color: var(--red); }
  .vault-contract-finding { font-size: 10px; color: var(--text-faint); grid-column: 1/-1; }
  .score-good { color: var(--green); }
  .score-ok { color: #fbbf24; }
  .score-poor { color: var(--red); }

  /* KNOWLEDGE LIBRARY */
  .kl-item-list { display: flex; flex-direction: column; gap: 8px; }
  .kl-item {
    background: var(--navy-raised);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .kl-item-icon {
    width: 28px; height: 28px; flex-shrink: 0; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; background: var(--teal-glow); color: var(--teal-bright);
    border: 1px solid rgba(14,143,143,0.25);
  }
  .kl-item-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .kl-item-meta { font-size: 11px; color: var(--text-muted); }
  .kl-item-tag {
    margin-top: 4px; display: inline-block;
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 3px;
  }
  .tag-in-force { background: var(--green-muted); color: var(--green); }
  .tag-enacted { background: var(--amber-muted); color: #fbbf24; }
  .tag-partial { background: rgba(139,92,246,0.12); color: #a78bfa; }
  .kl-count-badge {
    background: var(--navy-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; text-align: center;
    font-size: 12px; color: var(--text-muted);
  }
  .kl-count-badge strong { color: var(--teal-bright); font-family: 'IBM Plex Mono', monospace; }

  /* TICKER */
  .ticker-item-list { display: flex; flex-direction: column; gap: 8px; }
  .ticker-item {
    background: var(--navy-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .ticker-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ticker-sig {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px;
  }
  .sig-high { background: var(--red-muted); color: var(--red); }
  .sig-medium { background: var(--amber-muted); color: #fbbf24; }
  .ticker-cat { font-size: 10px; color: var(--text-faint); }
  .ticker-item-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .ticker-item-summary { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
  .ticker-item-footer {
    margin-top: 8px; display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-faint);
  }
  .ticker-ai-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    background: var(--teal-glow); color: var(--teal-bright);
    border: 1px solid rgba(14,143,143,0.25); padding: 2px 7px; border-radius: 3px;
  }

  /* REL FORM */
  .rel-form { display: flex; flex-direction: column; gap: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .form-input, .form-select, .form-textarea {
    background: var(--navy-raised);
    border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 8px 12px;
    font-family: 'Syne', sans-serif; font-size: 12px; color: var(--text);
    outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--teal-bright);
  }
  .form-select option { background: var(--navy-mid); }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-submit {
    padding: 10px 24px; border-radius: 7px;
    background: var(--teal-bright); color: #fff;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.04em; border: none; cursor: pointer;
    transition: opacity 0.2s; align-self: flex-start;
  }
  .form-submit:hover { opacity: 0.85; }
  .rel-submitted {
    background: var(--green-muted); border: 1px solid rgba(31,167,117,0.25);
    border-radius: 8px; padding: 16px; text-align: center;
    font-size: 13px; color: var(--green);
  }

  /* COMPLIANCE CHECKER */
  .cc-upload-zone {
    border: 2px dashed var(--border-strong);
    border-radius: 10px; padding: 32px; text-align: center;
    cursor: pointer; transition: border-color 0.2s;
    background: var(--navy-raised);
  }
  .cc-upload-zone:hover { border-color: var(--teal-bright); }
  .cc-upload-icon { font-size: 28px; margin-bottom: 10px; }
  .cc-upload-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .cc-upload-hint { font-size: 11px; color: var(--text-muted); }

  /* LOADING */
  .loading-state {
    display: flex; align-items: center; justify-content: center;
    padding: 48px; gap: 12px;
  }
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border-strong);
    border-top-color: var(--teal-bright);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TIER SEPARATOR */
  .tier-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-faint);
    padding: 24px 0 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .tier-section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* UPSELL BAR */
  .upsell-bar {
    background: linear-gradient(135deg, var(--navy-surface), var(--navy-card));
    border: 1px solid var(--teal-glow);
    border-radius: 10px; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-top: 16px;
  }
  .upsell-bar-text { font-size: 13px; color: var(--text); }
  .upsell-bar-text strong { color: var(--teal-bright); }
  .upsell-bar-cta {
    flex-shrink: 0; padding: 9px 20px; border-radius: 7px;
    background: var(--teal-bright); color: #fff;

    </div>
    <div class="panel-body">
      ${hasSubRegional ? `<div style="margin-bottom:12px;padding:8px 12px;background:var(--teal-glow);border:1px solid rgba(14,143,143,0.25);border-radius:6px;font-size:11px;color:var(--teal-bright)">
        ⚡ Sub-regional alerts active — you'll receive intelligence on enforcement activity in your area
      </div>` : ''}
      <form class="rel-form" onsubmit="submitREL(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Regulatory Body</label>
            <select class="form-select">
              <option>HSE</option><option>EHO (Local Authority)</option>
              <option>ICO</option><option>EHRC</option>
              <option>HMRC</option><option>Home Office</option>
              <option>Environment Agency</option><option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Visit / Contact Type</label>
            <select class="form-select">
              <option>Routine inspection</option>
              <option>Complaint-triggered</option>
              <option>Investigation</option>
              <option>Enforcement notice issued</option>
              <option>Prohibition notice issued</option>
              <option>Advisory visit</option>
              <option>Correspondence only</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date of Event</label>
            <input type="month" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Outcome</label>
            <select class="form-select">
              <option>No further action</option>
              <option>Advisory letter issued</option>
              <option>Improvement notice</option>
              <option>Prohibition notice</option>
              <option>Prosecution referral</option>
              <option>Under investigation</option>
              <option>Outcome pending</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Narrative (optional · 500 chars max · not shared with network)</label>
          <textarea class="form-textarea" maxlength="500" placeholder="Internal notes only. Not entered into network layer."></textarea>
        </div>
        <div style="font-size:10px;color:var(--text-faint);line-height:1.5">
          Your occurrence is anonymised (sector, sub-region, month/year, body, outcome only) before entering the network layer. Day, company identity, and any narrative never leave your account. Constitutional requirement under ACEI-AM-2026-003.
        </div>
        <button type="submit" class="form-submit">Log Occurrence</button>
      </form>
    </div>
  </div>`;
}

function submitREL(e) {
  e.preventDefault();
  relSubmitted = true;
  renderDashboard();
}

// ─── BOOT ────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
