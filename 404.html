<!DOCTYPE html>
<html lang="en">
<head>
  <!-- AILANE-SPEC-DRPS-001 §6.1 — 404-status SPA fallback.
       GitHub Pages serves this file for any unmatched path. The shared module
       boots a counterparty workspace for /partners/<slug>/ with zero per-room
       commit; every other unmatched path renders normal not-found content.
       Readiness is asserted on rendered DOM, never HTTP-200 (DRPS-001 §9). -->

  <!-- Supabase CDN FIRST (RULE 26 — the shell is a protected auth surface) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- GA4 (mandatory — G-NTNXWZN31C) consent-gated per AMD-156 §2D.
       Defines window.dataLayer/gtag immediately; the GA4 tag loads only after
       consent (strip surfaced by the shell after the terms gate is accepted). -->
  <script src="/assets/js/ailane-cookie-consent.js"></script>

  <!-- CSP Meta Tag (SEC-001 §3.2) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://js.stripe.com https://www.googletagmanager.com https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.stripe.com https://www.google-analytics.com; connect-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co https://cnbsxwtvazfvzmltkuvx.functions.supabase.co https://api.stripe.com https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AI Lane — Deal Room</title>
  <meta name="description" content="Private engagement workspace.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/partners/_shared/dealroom.css">
  <!-- Ailane favicon / app icons — estate head standard (AMD-246) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0e1a">
</head>
<body style="visibility:hidden">
  <div id="dr-app"></div>

  <!-- The shared serving shell (DRPS-001 §6.2). Auto-boots; reveals <body>. -->
  <script type="module" src="/partners/_shared/dealroom.js"></script>

  <!-- Resilience watchdog: if the module never runs (e.g. it failed to load),
       reveal the page with a minimal fallback rather than leaving it blank. -->
  <script>
    setTimeout(function () {
      if (!document.documentElement.getAttribute('data-dealroom-state')) {
        document.body.style.visibility = 'visible';
        var app = document.getElementById('dr-app');
        if (app && !app.innerHTML.trim()) {
          app.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:\'DM Sans\',sans-serif;color:#94A3B8">'
            + '<div><h1 style="font-family:\'DM Serif Display\',serif;color:#F1F5F9;font-weight:400">Page not found</h1>'
            + '<p>Return to <a href="/" style="color:#0EA5E9;text-decoration:none">ailane.ai</a>.</p></div></div>';
        }
      }
    }, 12000);
  </script>
</body>
</html>
