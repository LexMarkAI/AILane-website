// ── CONFIG ────────────────────────────────────────────────────────────────
const SB_URL  = "https://cnbsxwtvazfvzmltkuvx.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g";
const DEMO_ORG = "de000001-0000-4000-8000-000000000001";

// Fallback for Social Partnership Act 2023 (not yet in OGL XML feed)
const OGL_FALLBACK = {
  '7aa72110-4a20-4843-81a4-f8bb5a07b1d8': 'https://www.legislation.gov.uk/asc/2023/34/enacted'
};

// ── HELPERS ───────────────────────────────────────────────────────────────
const getToken = () => {
  try {
    const keys = Object.keys(localStorage).filter(k => k.includes("supabase") && k.includes("auth"));
    for (const k of keys) {
      const d = JSON.parse(localStorage.getItem(k) || "{}");
      if (d?.access_token) return d.access_token;
      if (d?.session?.access_token) return d.session.access_token;
    }
  } catch {}
  return null;
};

const getOrgId = (token) => {
  if (!token) return DEMO_ORG;
  try {
    const p = JSON.parse(atob(token.split(".")[1]));
    return p?.org_id || DEMO_ORG;
  } catch { return DEMO_ORG; }
};

const sbFetch = async (path, token) => {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_ANON, Authorization: `Bearer ${token || SB_ANON}`, "Content-Type": "application/json" }
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
};

const sbRpc = async (fn, params, token) => {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: "POST",
    headers: { apikey: SB_ANON, Authorization: `Bearer ${token || SB_ANON}`, "Content-Type": "application/json" },
    body: JSON.stringify(params),
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
};

// ── CONTENTS PANEL ────────────────────────────────────────────────────────
const ContentsPanel = ({ html, lang, ui, visible, onClose }) => {
  const headings = useMemo(() => {
    if (!html) return [];
    const div = document.createElement("div");
    div.innerHTML = html;
    const items = [];
    div.querySelectorAll(".parl-part-heading, .parl-section-heading, .parl-schedule-heading").forEach(el => {
      const isPart = el.classList.contains("parl-part-heading") || el.classList.contains("parl-schedule-heading");
      const numEl = el.querySelector(".parl-section-num, .parl-label");
      const titleEl = el.querySelector(".parl-section-title, .parl-part-title, .parl-sched-title");
      const num = numEl?.textContent?.trim() || "";
      const title = titleEl?.textContent?.trim() || "";
      const parentSection = el.closest(".parl-section, .parl-part, .parl-schedule");
      const id = parentSection?.id || null;
      if (num || title) items.push({ num, title, isPart, id });
    });
    return items;
  }, [html]);

  if (!visible) return null;

  return (
    <div style={{
      position: "fixed", left: 0, top: 0, bottom: 0, width: 280,
      background: "#f0ede6", borderRight: "1px solid #d4c9b0",
      overflowY: "auto", zIndex: 200, padding: "16px 0",
      boxShadow: "4px 0 20px rgba(0,0,0,0.12)",
      transition: "transform 0.3s ease",
    }}>
      <div style={{ padding: "0 16px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #d4c9b0" }}>
        <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "1.5px", color: "#6b5e45" }}>
          {ui.contents.toUpperCase()}
        </span>
        <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#8a6b45", fontSize: 16 }}>✕</button>
      </div>
      <div style={{ padding: "12px 0" }}>
        {headings.map((h, i) => (
          <a
            key={i}
            href={h.id ? `#${h.id}` : "#"}
            onClick={() => { if (window.innerWidth < 768) onClose(); }}
            style={{
              display: "block",
              padding: h.isPart ? "6px 16px" : "3px 16px 3px 28px",
              fontSize: h.isPart ? 11 : 13,
              fontFamily: h.isPart ? "'JetBrains Mono', monospace" : "'EB Garamond', Georgia, serif",
              color: h.isPart ? "#c41230" : "#4a3b28",
              letterSpacing: h.isPart ? "0.8px" : "0",
              textDecoration: "none",
              borderLeft: h.isPart ? "2px solid #c41230" : "none",
              textTransform: h.isPart ? "uppercase" : "none",
              lineHeight: 1.4,
            }}
          >
            {h.num && <span style={{ color: h.isPart ? "#c41230" : "#8a6b45", marginRight: 6, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{h.num}</span>}
            {h.title || (h.num && !h.title ? "" : "—")}
          </a>
        ))}
      </div>
    </div>
  );
};

// ── INSTRUMENT SELECTOR ───────────────────────────────────────────────────
const InstrumentSelector = ({ instruments, selected, onSelect, lang, ui }) => (
  <div style={{ padding: "12px 24px", borderBottom: "1px solid #d4c9b0", background: "#f0ede6", display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
    <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "1px", color: "#8a6b45" }}>
      🏴󠁧󠁢󠁷󠁬󠁳󠁿 {ui.selectInstrument.toUpperCase()}
    </span>
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
      {instruments.map(inst => {
        const title = (lang === "cy" && inst.title_cy) ? inst.title_cy : inst.short_title;
        const isSelected = selected?.id === inst.id;
        return (
          <button
            key={inst.id}
            onClick={() => onSelect(inst)}
            style={{
              background: isSelected ? "#c41230" : "rgba(196,18,48,0.06)",
              color: isSelected ? "#fff" : "#c41230",
              border: `1px solid ${isSelected ? "#c41230" : "rgba(196,18,48,0.25)"}`,
              borderRadius: 5, padding: "5px 12px", cursor: "pointer",
              fontSize: 13, fontFamily: "'EB Garamond', Georgia, serif",
              transition: "all 0.15s ease", lineHeight: 1.3,
              maxWidth: 280, textAlign: "left",
            }}
          >
            {title}
          </button>
        );
      })}
    </div>
  </div>
);

// ── MAIN APP ──────────────────────────────────────────────────────────────
const App = () => {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("ailane_lang") || "en"; } catch { return "en"; }
  });
  const [instruments, setInstruments] = useState([]);
  const [selected, setSelected] = useState(null);
  const [fulltext, setFulltext] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingInstruments, setLoadingInstruments] = useState(true);
  const [contentsOpen, setContentsOpen] = useState(false);
  const [copied, setCopied] = useState(false);
  const docRef = useRef(null);

  const ui = UI[lang];

  // Persist lang
  useEffect(() => {
    try { localStorage.setItem("ailane_lang", lang); } catch {}
    document.documentElement.lang = lang;
  }, [lang]);

  // Load Welsh instruments
  useEffect(() => {
    const load = async () => {
      try {
        const token = getToken();
        const orgId = getOrgId(token);
        const data = await sbRpc("get_legislation_for_org", { p_org_id: orgId }, token);
        const welsh = (data || []).filter(i => i.jurisdiction_codes?.includes("Wales"));
        setInstruments(welsh);
        if (welsh.length > 0) setSelected(welsh[0]);
      } catch (e) {
        console.error(e);
      } finally {
        setLoadingInstruments(false);
      }
    };
    load();
  }, []);

  // Load full text when instrument or language changes
  useEffect(() => {
    if (!selected) return;
    const load = async () => {
      setLoading(true);
      setFulltext(null);
      try {
        const token = getToken();
        const orgId = getOrgId(token);
        const data = await sbRpc("get_fulltext_for_org", {
          p_org_id: orgId,
          p_legislation_id: selected.id,
          p_language_code: lang,
        }, token);
        setFulltext(data?.[0] || null);
      } catch (e) {
        console.error(e);
      } finally {
        setLoading(false);
      }
    };
    load();
  }, [selected, lang]);

  // Scroll to top on instrument change
  useEffect(() => {
    if (docRef.current) docRef.current.scrollTop = 0;
  }, [selected, lang]);

  const hasFallback = selected && OGL_FALLBACK[selected.id];

  const copyLink = () => {
    navigator.clipboard.writeText(window.location.href).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#f8f6f1" }}>

      {/* HEADER */}
      <header style={{
        background: "#1a1505",
        borderBottom: "3px solid #c41230",
        padding: "0 24px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        minHeight: 52, flexShrink: 0, gap: 12, flexWrap: "wrap",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 30, height: 30, borderRadius: 6, background: "linear-gradient(135deg, #22d3ee, #0e7490)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, fontSize: 15, color: "#080c18" }}>A</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#f5f0e8", fontFamily: "'EB Garamond', Georgia, serif" }}>{ui.appTitle}</div>
            <div style={{ fontSize: 10, color: "#8a6b45", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "1.2px" }}>
              AILANE · 🏴󠁧󠁢󠁷󠁬󠁳󠁿 {ui.walesLayer.toUpperCase()} · {ui.govTier.toUpperCase()}
            </div>
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {/* Language toggle */}
          <div style={{ display: "flex", background: "rgba(255,255,255,0.07)", borderRadius: 6, padding: 3, gap: 3 }}>
            {["en","cy"].map(l => (
              <button key={l} onClick={() => setLang(l)} style={{
                background: lang === l ? "#c41230" : "transparent",
                color: lang === l ? "#fff" : "#8a6b45",
                border: "none", borderRadius: 4, padding: "4px 10px", cursor: "pointer",
                fontSize: 11, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600,
                letterSpacing: "0.5px", transition: "all 0.15s ease",
              }}>
                {l.toUpperCase()}
              </button>
            ))}
          </div>
          {/* Contents toggle */}
          {fulltext && (
            <button onClick={() => setContentsOpen(v => !v)} style={{
              background: contentsOpen ? "rgba(196,18,48,0.2)" : "rgba(255,255,255,0.07)",
              color: "#d4c9b0", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 5,
              padding: "4px 12px", cursor: "pointer", fontSize: 11,
              fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.5px",
            }}>
              ≡ {ui.contents}
            </button>
          )}
          {/* Back to library */}
          <a href="/governance-dashboard/" style={{
            color: "#8a6b45", fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
            textDecoration: "none", letterSpacing: "0.5px",
            padding: "4px 10px", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 5,
          }}>← {lang === "cy" ? "Llyfrgell" : "Library"}</a>
        </div>
      </header>

      {/* INSTRUMENT SELECTOR */}
      {!loadingInstruments && instruments.length > 0 && (
        <InstrumentSelector
          instruments={instruments}
          selected={selected}
          onSelect={setSelected}
          lang={lang}
          ui={ui}
        />
      )}

      {/* MAIN LAYOUT */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* CONTENTS SIDEBAR */}
        <ContentsPanel
          html={fulltext?.html_rendered}
          lang={lang}
          ui={ui}
          visible={contentsOpen}
          onClose={() => setContentsOpen(false)}
        />

        {/* DOCUMENT PANE */}
        <div
          ref={docRef}
          style={{
            flex: 1,
            overflowY: "auto",
            marginLeft: contentsOpen ? 280 : 0,
            transition: "margin-left 0.3s ease",
            padding: "0 0 80px 0",
          }}
        >
          {/* Document meta bar */}
          {selected && (
            <div style={{
              background: "#edeadf",
              borderBottom: "1px solid #d4c9b0",
              padding: "10px 32px",
              display: "flex", alignItems: "center", justifyContent: "space-between",
              gap: 12, flexWrap: "wrap",
            }}>
              <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                {fulltext && (
                  <>
                    <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: "#6b5e45" }}>
                      {fulltext.word_count?.toLocaleString()} {ui.words}
                    </span>
                    <span style={{ color: "#c8b89a" }}>·</span>
                    <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: "#6b5e45" }}>
                      {fulltext.section_count > 0 ? `${fulltext.section_count} ${ui.sections}` : `${fulltext.schedule_count} ${ui.schedules}`}
                    </span>
                    <span style={{ color: "#c8b89a" }}>·</span>
                    <span style={{
                      fontSize: 10, fontFamily: "'JetBrains Mono', monospace",
                      padding: "2px 7px", borderRadius: 3,
                      background: "rgba(45,90,27,0.08)", border: "1px solid rgba(45,90,27,0.2)",
                      color: "#2d5a1b",
                    }}>
                      ✓ {ui.official}
                    </span>
                  </>
                )}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {selected.legislation_gov_url && (
                  <a href={selected.legislation_gov_url} target="_blank" rel="noreferrer" style={{
                    fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
                    color: "#6b5e45", textDecoration: "none",
                    padding: "3px 8px", border: "1px solid #d4c9b0", borderRadius: 4,
                  }}>
                    ↗ legislation.gov.uk
                  </a>
                )}
                <button onClick={copyLink} style={{
                  fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
                  color: "#6b5e45", background: "none",
                  padding: "3px 8px", border: "1px solid #d4c9b0", borderRadius: 4, cursor: "pointer",
                }}>
                  {copied ? "✓" : ui.copyLink}
                </button>
              </div>
            </div>
          )}

          {/* Document content */}
          <div style={{ maxWidth: 860, margin: "0 auto", padding: "40px 40px" }}>

            {loadingInstruments && (
              <div style={{ color: "#8a6b45", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, padding: 40 }}>
                ◌ {ui.loadingInstruments}
              </div>
            )}

            {loading && (
              <div style={{ color: "#8a6b45", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, padding: 40 }}>
                ◌ {ui.loading}
              </div>
            )}

            {!loading && selected && !fulltext && !hasFallback && (
              <div style={{ padding: "32px 0" }}>
                <p style={{ color: "#8a6b45", fontFamily: "'EB Garamond', Georgia, serif", fontSize: 16, marginBottom: 16 }}>
                  {ui.noFullText}
                </p>
              </div>
            )}

            {!loading && selected && !fulltext && hasFallback && (
              <div style={{ padding: "32px 0" }}>
                <h2 style={{ fontSize: 22, fontWeight: 600, color: "#1a1505", marginBottom: 16, fontFamily: "'EB Garamond', Georgia, serif" }}>
                  {lang === "cy" && selected.title_cy ? selected.title_cy : selected.short_title}
                </h2>
                <div style={{
                  background: "#fff8e8", border: "1px solid #d4a843", borderRadius: 8,
                  padding: "18px 24px", marginBottom: 20,
                }}>
                  <p style={{ fontSize: 14, color: "#6b4a0e", fontFamily: "'JetBrains Mono', monospace", marginBottom: 10 }}>
                    ⚠ Full XML text not yet available in OGL feed (2023 Act — processing lag expected)
                  </p>
                  <a
                    href={OGL_FALLBACK[selected.id]}
                    target="_blank"
                    rel="noreferrer"
                    style={{
                      display: "inline-flex", alignItems: "center", gap: 6,
                      background: "#c41230", color: "#fff", borderRadius: 6,
                      padding: "8px 18px", textDecoration: "none",
                      fontSize: 14, fontFamily: "'EB Garamond', Georgia, serif",
                    }}
                  >
                    ↗ {ui.viewOnLegislation}
                  </a>
                </div>
                <div style={{ background: "#f0ede6", borderRadius: 8, padding: "18px 24px" }}>
                  <h3 style={{ fontSize: 15, fontWeight: 600, color: "#4a3b28", marginBottom: 10 }}>
                    {lang === "cy" ? "Crynodeb" : "Summary"}
                  </h3>
                  <p style={{ fontSize: 16, color: "#4a3b28", lineHeight: 1.7 }}>
                    {lang === "cy" ? selected.summary_cy : selected.summary}
                  </p>
                </div>
              </div>
            )}

            {/* PARLIAMENTARY DOCUMENT */}
            {!loading && fulltext?.html_rendered && (
              <>
                <style>{PARL_CSS}</style>
                <div
                  dangerouslySetInnerHTML={{ __html: fulltext.html_rendered }}
                  style={{ wordBreak: "break-word" }}
                />
                <div style={{ marginTop: 48, paddingTop: 20, borderTop: "1px solid #d4c9b0" }}>
                  <p style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: "#a89880", letterSpacing: "0.5px" }}>
                    {ui.footerNote} · {fulltext.fetch_url}
                  </p>
                  {fulltext.translation_notice && (
                    <p style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: "#2d5a1b", marginTop: 6 }}>
                      ✓ {fulltext.translation_notice}
                    </p>
                  )}
                </div>
              </>
            )}

          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
