    input[type=text]:focus, input[type=search]:focus { border-color: rgba(13,115,119,0.5); }
  </style>
</head>

  // ── COMPLIANCE CHECKER FINDINGS ────────────────────────────────────────

  ];

  const getCCIBand  = s => s>=80?{label:"Strong Conduct",color:C.rri}:s>=60?{label:"Adequate Conduct",color:C.cci}:s>=40?{label:"Concerning Conduct",color:C.warn}:{label:"Poor Conduct",color:C.danger};

            {["⚡ Employment Rights Bill progresses · ACEI Forward Exposure flagged","📊 ET Q4 2025: 11,400 Discrimination claims (↑8% YoY)","⚖ ICO: £210,000 penalty · Tech sector · ACEI Cat 12","📜 Workers Act T-27 days · RRI activation required","📈 South East tribunal volumes: 4-quarter high","🔬 HSE: 12 notices in Technology sector · Jan 2026","⚡ Employment Rights Bill progresses · ACEI Forward Exposure flagged","📊 ET Q4 2025: 11,400 Discrimination claims (↑8% YoY)"].map((t,i)=>(
              <span key={i} style={{fontSize:11,color:"#94a3b8",padding:"0 20px",borderLeft:i>0?`1px solid ${C.border}`:"none"}}>{t}</span>
            ))}
          </div>
        </div>
        <Lock title="Global Intelligence Feeds — Institutional" desc="53 jurisdictions, 6 continents. API integration. Custom sector filtering at categorical depth."/>
      </Card>
    </div>
  );

  const ReportsTab=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div className="fade-up" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
        {[
          {title:"Monthly ACEI Exposure Report",  icon:"📊",desc:"Full 12-category breakdown, sector context, band classification, trend.",cta:"Generate PDF"},
          {title:"Monthly Full Triad Report",     icon:"📋",desc:"ACEI, RRI PCS, and CCI_pub combined. Quadrant interpretation. Board-ready.",cta:"Generate PDF"},
          {title:"Quarterly Board Briefing Pack", icon:"📁",desc:"Executive summary, triad trends, legislative pipeline, tribunal intelligence.",cta:"Generate Pack"},
          {title:"Audit Trail Export",            icon:"🔐",desc:"Constitutional compliance evidence: ACEI logs, RRI register, CCI record.",cta:"Export CSV/JSON"},
        ].map((r,i)=>(
          <div key={i} style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20,display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:22}}>{r.icon}</div><Pill label="Governance" color={C.tealXL} small/></div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:6}}>{r.title}</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>{r.desc}</div>
            </div>
            <div style={{marginTop:"auto",paddingTop:12,borderTop:`1px solid ${C.border}`}}>
              <button style={{background:`${C.teal}15`,border:`1px solid ${C.teal}40`,color:C.tealXL,borderRadius:7,padding:"8px 16px",fontSize:11,fontWeight:700,cursor:"pointer",...mono}}>{r.cta} →</button>
            </div>
          </div>
        ))}
      </div>
      <Card className="fade-up-5">
        <SectionTitle sub="Available on upgrade to Institutional">Institutional Reports</SectionTitle>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Lock title="White-label Reports" desc="Company-branded board packs and executive summaries."/>
          <Lock title="Custom Reporting Frequency" desc="On-demand generation and event-triggered report dispatch."/>
          <Lock title="Benchmarking Report" desc="Anonymised sector comparison — ACEI, RRI, and CCI vs comparable employers."/>
          <Lock title="API Data Access" desc="Programmatic access to full scoring history. JSON/REST."/>
        </div>
      </Card>
    </div>
  );

  const AlertsTab=()=>(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {CLIENT.alerts.map(a=>(
        <div key={a.id} style={{background:C.bgCard,border:`1px solid ${a.read?C.border:C.borderM}`,borderLeft:`3px solid ${a.read?C.border:C.teal}`,borderRadius:10,padding:16,display:"flex",gap:14,alignItems:"flex-start"}}>
          <div style={{fontSize:14,marginTop:2}}>{{velocity:"⚡",legislation:"📜",tribunal:"⚖️",rri:"🎯",cci:"🔬"}[a.type]||"🔔"}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <div style={{fontSize:12,fontWeight:700,color:a.read?"#64748b":"#e2e8f0"}}>{a.title}</div>
              {!a.read&&<div style={{width:7,height:7,borderRadius:"50%",background:C.teal,marginTop:3}}/>}
            </div>
            <div style={{fontSize:11,color:a.read?"#475569":"#94a3b8",lineHeight:1.6}}>{a.detail}</div>
            <div style={{fontSize:10,color:"#334155",marginTop:6,...mono}}>{a.date}</div>
          </div>
        </div>
      ))}
      <Card>
        <SectionTitle sub="Institutional tier delivery">Advanced Notifications</SectionTitle>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Lock title="Webhook / Slack Integration" desc="Push alerts to your internal channels instantly."/>
          <Lock title="Individual Tribunal Decision Alerts" desc="Real-time alerts when a decision matches your sector, size, and claim category."/>
        </div>
      </Card>
    </div>
  );

  // ── APP SHELL ───────────────────────────────────────────────────────────
  const TABS=[
    {id:"overview",  label:"Overview",          icon:"◈"},
    {id:"compliance",label:"Compliance Posture", icon:"◎"},
    {id:"tribunal",  label:"Tribunal Intel",     icon:"⚖"},
    {id:"regulatory",label:"Regulatory Feed",    icon:"📜"},
    {id:"library",   label:"Knowledge Library",  icon:"📚"},
    {id:"checker",   label:"Compliance Checker", icon:"📋"},
    {id:"reports",   label:"Reports & Exports",  icon:"📁"},
    {id:"alerts",    label:"Alerts",             icon:"🔔",badge:3},
  ];

  const App=()=>{
    const [tab,setTab]=useState("overview");
    const [showUp,setShowUp]=useState(false);
    const renderTab=()=>{
      if(tab==="overview")   return <OverviewTab/>;
      if(tab==="compliance") return <ComplianceTab/>;
      if(tab==="tribunal")   return <TribunalTab/>;
      if(tab==="regulatory") return <RegulatoryTab/>;
      if(tab==="library")    return <KnowledgeLibraryTab/>;
      if(tab==="checker")    return <ComplianceCheckerTab/>;
      if(tab==="reports")    return <ReportsTab/>;
      if(tab==="alerts")     return <AlertsTab/>;
      return <OverviewTab/>;
    };
    return(
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
        {/* Header */}
        <div style={{background:"rgba(13,21,37,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"sticky",top:0,zIndex:100}}>

            <div style={{display:"flex",alignItems:"center",gap:20}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:30,height:30,borderRadius:7,background:C.teal,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#fff",...mono}}>A</div>
                <div>
                  <div style={{fontSize:13,fontWeight:800,color:"#fff",letterSpacing:"-0.02em"}}>ailane</div>
                  <div style={{fontSize:9,color:"#334155",letterSpacing:"0.1em",...mono}}>REGULATORY INTELLIGENCE</div>
                </div>
              </div>
              <div style={{width:1,height:28,background:C.border}}/>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{CLIENT.name}</div>
                <div style={{fontSize:10,color:C.muted}}>{CLIENT.sector} · {CLIENT.jurisdiction} · {CLIENT.headcount} employees</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <Pill label="GOVERNANCE TIER" color={C.tealXL}/>
              <div style={{fontSize:11,color:C.muted}}>Data as of <span style={{color:"#94a3b8",...mono}}>{CLIENT.dataAsOf}</span></div>
              <button onClick={()=>setShowUp(!showUp)} style={{background:`${C.cci}15`,border:`1px solid ${C.cci}35`,color:C.cci,borderRadius:7,padding:"6px 14px",fontSize:11,fontWeight:700,cursor:"pointer",...mono}}>Upgrade ↑</button>
            </div>
          </div>
          <div style={{display:"flex",padding:"0 28px",maxWidth:1600,margin:"0 auto",width:"100%",borderTop:"1px solid rgba(255,255,255,0.03)",gap:2,overflowX:"auto"}}>
            {TABS.map(t=>{
              const active=tab===t.id;
              return(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 14px",background:"none",border:"none",borderBottom:active?`2px solid ${C.tealXL}`:"2px solid transparent",color:active?C.tealXL:C.muted,fontSize:12,fontWeight:active?700:500,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"color 0.2s",letterSpacing:"0.01em",whiteSpace:"nowrap"}}>
                <span>{t.icon}</span><span>{t.label}</span>
                {t.badge&&<span style={{background:C.teal,color:"#fff",borderRadius:10,fontSize:9,fontWeight:800,padding:"1px 5px",...mono}}>{t.badge}</span>}
              </button>);
            })}
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,maxWidth:1600,margin:"0 auto",width:"100%",padding:"24px 28px"}}>
          {showUp&&(
            <div style={{background:"linear-gradient(135deg,rgba(27,42,74,0.8),rgba(13,115,119,0.15))",border:"1px solid rgba(13,115,119,0.4)",borderRadius:14,padding:24,marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",color:C.cci,...mono}}>INSTITUTIONAL TIER</div><Pill label="Custom Pricing" color={C.cci} small/></div>
                  <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:8}}>Ready to scale your compliance infrastructure?</div>
                  <div style={{fontSize:12,color:"#64748b",lineHeight:1.7,maxWidth:580}}>CEO-ready executive summaries, white-label board packs, API access, real-time recomputation, Tier II/III evidence pathways, Ailane Controlled Assurance, and a dedicated account manager with SLA.</div>
                  <div style={{marginTop:14,padding:12,background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.rri,marginBottom:4}}>✓ Seamless Migration Guaranteed</div>
                    <div style={{fontSize:11,color:"#475569",lineHeight:1.6}}>All ACEI history, RRI evidence, CCI baseline, tribunal intelligence, Knowledge Library, Compliance Checker findings, and legislative data migrate automatically. No re-onboarding. No data loss.</div>
                  </div>
                </div>
                <div style={{marginLeft:24,textAlign:"center",flexShrink:0}}>
                  <button style={{background:`linear-gradient(135deg,${C.teal},${C.tealL})`,border:"none",color:"#fff",borderRadius:10,padding:"12px 24px",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:"0.05em",boxShadow:`0 4px 20px ${C.teal}40`}}>Request Upgrade →</button>
                  <div style={{fontSize:10,color:"#334155",marginTop:8}}>Account team in touch within 24h</div>
                </div>
              </div>
            </div>
          )}
          {renderTab()}
        </div>

        {/* Footer */}
        <div style={{borderTop:`1px solid ${C.border}`,padding:"12px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:1600,margin:"0 auto",width:"100%"}}>
          <div style={{fontSize:10,color:"#1e2d3d",...mono}}>AILANE · AI Lane Limited (Co. No. 17035624) · ACEI v1.0 · RRI v1.0 · CCI v1.0 · Adopted 26 Feb 2026</div>
          <div style={{display:"flex",gap:14,fontSize:10,color:"#334155"}}>
            {["Support","Constitutional Reference","AIC Governance","Model Risk Disclosure"].map(l=><span key={l} style={{cursor:"pointer"}}>{l}</span>)}
          </div>
        </div>
      </div>
    );
  };

  ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
