<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ailane · Governance Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body {
      background: #080d1a;
      font-family: 'Manrope', sans-serif;
      color: #e2e8f0;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(13,115,119,0.4); border-radius: 2px; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-1 { animation: fadeUp 0.4s 0.05s ease both; }
    .fade-up-2 { animation: fadeUp 0.4s 0.1s ease both; }
    .fade-up-3 { animation: fadeUp 0.4s 0.15s ease both; }
    .fade-up-4 { animation: fadeUp 0.4s 0.2s ease both; }
    .fade-up-5 { animation: fadeUp 0.4s 0.25s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
            AreaChart, Area, RadarChart, Radar, PolarGrid, PolarAngleAxis,
            LineChart, Line, CartesianGrid, Cell, PieChart, Pie, Legend } = Recharts;

    const C = {
      navy:    "#1B2A4A",
      teal:    "#0D7377",
      tealL:   "#14A9AF",
      tealXL:  "#22d3e7",
      acei:    "#22d3e7",
      rri:     "#10b981",
      cci:     "#a78bfa",
      warn:    "#f59e0b",
      danger:  "#ef4444",
      ok:      "#10b981",
      bg:      "#080d1a",
      bgCard:  "#0d1525",
      bgPanel: "#111827",
      border:  "rgba(255,255,255,0.06)",
      borderM: "rgba(255,255,255,0.10)",
      text:    "#e2e8f0",
      muted:   "#64748b",
      subtle:  "#1e2d45",
    };

    const CLIENT = {
      name: "Meridian Systems Limited",
      regNo: "08241673",
      sector: "Technology",
      jurisdiction: "South East",
      headcount: 180,
      tier: "governance",
      tierLabel: "Governance",
      tierPrice: "£799/mo",
      onboardedDate: "1 December 2025",
      dataAsOf: "5 March 2026",
      contactName: "Sarah Whitfield",
      contactRole: "HR Director",
      acei: {
        score: 52,
        band: "Elevated Exposure",
        bandColor: "#f59e0b",
        prevScore: 48,
        delta: "+4",
        sectorMultiplier: 1.10,
        jurisdictionMultiplier: 1.25,
        velocityFlag: true,
        categories: [
          { key: "unfair_dismissal",            label: "Unfair Dismissal",          score: 68, weight: 1.0 },
          { key: "discrimination_harassment",    label: "Discrimination",            score: 72, weight: 1.5 },
          { key: "wages_working_time",           label: "Wages & Working Time",      score: 41, weight: 1.0 },
          { key: "whistleblowing",               label: "Whistleblowing",            score: 58, weight: 1.2 },
          { key: "health_safety",                label: "Health & Safety",           score: 35, weight: 1.0 },
          { key: "redundancy_org_change",        label: "Redundancy & Org Change",   score: 29, weight: 1.0 },
          { key: "breach_of_contract",           label: "Breach of Contract",        score: 55, weight: 1.0 },
          { key: "employment_status",            label: "Employment Status",         score: 63, weight: 1.1 },
          { key: "parental_family_rights",       label: "Parental & Family Rights",  score: 44, weight: 1.0 },
          { key: "trade_union_collective",       label: "Trade Union & Collective",  score: 22, weight: 0.9 },
          { key: "business_transfers_insolvency",label: "TUPE / Transfers",          score: 31, weight: 1.0 },
          { key: "data_protection_privacy",      label: "Data Protection",           score: 47, weight: 1.1 },
        ],
        trend: [
          { q: "Q1 2025", score: 43 }, { q: "Q2 2025", score: 46 },
          { q: "Q3 2025", score: 48 }, { q: "Q4 2025", score: 48 }, { q: "Q1 2026", score: 52 }
        ],
      },
      rri: {
        pcs: 61,
        band: "Operational Readiness",
        bandColor: "#3b82f6",
        prevPcs: 55,
        delta: "+6",
        drPcs: 72,
        eIntP: { ec: 81, ef: 88, def: 1 },
        pillars: [
          { id: "policy",       label: "Policy Alignment",          score: 70, maxScore: 100 },
          { id: "contractual",  label: "Contractual Conformity",    score: 58, maxScore: 100 },
          { id: "training",     label: "Training Deployment",       score: 65, maxScore: 100 },
          { id: "systems",      label: "Systems & Process",         score: 52, maxScore: 100 },
          { id: "governance",   label: "Governance Oversight",      score: 61, maxScore: 100 },
        ],
        activeRCEs: 3,
        highestDR: { label: "Workers (Predictability of Pay) Act 2025", drScore: 78 },
        trend: [
          { q: "Q1 2025", score: 44 }, { q: "Q2 2025", score: 50 },
          { q: "Q3 2025", score: 55 }, { q: "Q4 2025", score: 55 }, { q: "Q1 2026", score: 61 }
        ],
      },
      cci: {
        pub: 69,
        raw: 71,
        band: "Adequate Conduct",
        bandColor: "#a78bfa",
        cw: 0.38,
        mode: "Full CCI",
        scbTier: "SCB-A",
        prevPub: 66,
        delta: "+3",
        ect: "Stable",
        components: [
          { id: "tcf",  label: "Tribunal Claim Frequency",    score: 64, weight: 0.25 },
          { id: "aor",  label: "Adverse Outcome Rate",        score: 58, weight: 0.20 },
          { id: "psi",  label: "Penalty Severity Index",      score: 64, weight: 0.20 },
          { id: "ree",  label: "Regulatory Enforcement Rate", score: 85, weight: 0.15 },
          { id: "gr",   label: "Governance Responsiveness",   score: 85, weight: 0.10 },
          { id: "rap",  label: "Recurrence & Pattern",        score: 72, weight: 0.10 },
        ],
        trend: [
          { q: "Q1 2025", score: 61 }, { q: "Q2 2025", score: 64 },
          { q: "Q3 2025", score: 64 }, { q: "Q4 2025", score: 66 }, { q: "Q1 2026", score: 69 }
        ],
      },
      tribunal: {
        total: 7,
        won: 3,
        lost: 2,
        settled: 2,
        totalCompensation: "£142,800",
        avgPerCase: "£20,400",
        sectorAvg: 6.2,
        topCategories: ["Discrimination & Harassment", "Unfair Dismissal", "Employment Status"],
        recent: [
          { ref: "ET/3200147/2025", cat: "Discrimination & Harassment", outcome: "Lost",    compensation: "£42,000", date: "Nov 2025" },
          { ref: "ET/3100892/2025", cat: "Unfair Dismissal",            outcome: "Settled", compensation: "£18,500", date: "Aug 2025" },
          { ref: "ET/2900441/2025", cat: "Employment Status",           outcome: "Won",     compensation: "—",       date: "Jun 2025" },
          { ref: "ET/2800223/2025", cat: "Discrimination & Harassment", outcome: "Lost",    compensation: "£38,200", date: "Mar 2025" },
        ],
        compensationTrend: [
          { q: "Q1 2025", amount: 38200 }, { q: "Q2 2025", amount: 18500 },
          { q: "Q3 2025", amount: 0 },     { q: "Q4 2025", amount: 42000 }, { q: "Q1 2026", amount: 0 }
        ],
      },
      legislation: [
        { title: "Employment Rights Bill",                        stage: "Royal Assent",          stageNo: 2, impact: "High",   aceiCat: "Unfair Dismissal, Whistleblowing", commenceDate: "Oct 2026",          rriActive: true  },
        { title: "Workers (Predictability of Pay) Act 2025",     stage: "In Force",              stageNo: 3, impact: "High",   aceiCat: "Wages & Working Time",            commenceDate: "1 Apr 2026",        rriActive: true  },
        { title: "Equality (Race and Disability) Bill",          stage: "Parliamentary Passage", stageNo: 1, impact: "Medium", aceiCat: "Discrimination & Harassment",     commenceDate: "TBC",               rriActive: false },
        { title: "Data Protection & Digital Information Act",    stage: "Post-Commencement",     stageNo: 4, impact: "Low",    aceiCat: "Data Protection",                 commenceDate: "Already in Force",  rriActive: false },
      ],
      alerts: [
        { id: 1, type: "velocity",    title: "ACEI velocity flag triggered",              detail: "Discrimination & Harassment category score increased 14 points Q-o-Q",                   date: "3 Mar 2026",   read: false },
        { id: 2, type: "legislation", title: "Employment Rights Bill — Royal Assent",     detail: "Full Act text now available. RRI pre-registration recommended.",                           date: "28 Feb 2026",  read: false },
        { id: 3, type: "tribunal",    title: "Sector tribunal digest — Technology",       detail: "12 new decisions in Technology sector this week. 4 involve Employment Status claims.",     date: "28 Feb 2026",  read: true  },
        { id: 4, type: "rri",         title: "RRI Deadline Risk: Workers Act",            detail: "Commencement date 1 April 2026 — 27 days. RRI DR-PCS: 78.",                               date: "5 Mar 2026",   read: false },
        { id: 5, type: "cci",         title: "CCI Quarterly Recomputation",              detail: "Q4 2025 CCI published. Score: 69 (+3 Q-o-Q). Classification: Adequate Conduct. SCB-A.",   date: "15 Feb 2026",  read: true  },
      ],
    };

    const getAceiBand = (s) => {
      if (s <= 20) return { label: "Low Exposure",      color: "#10b981", bg: "rgba(16,185,129,0.1)"  };
      if (s <= 40) return { label: "Controlled",        color: "#22d3e7", bg: "rgba(34,211,238,0.1)"  };
      if (s <= 60) return { label: "Elevated Exposure", color: "#f59e0b", bg: "rgba(245,158,11,0.1)"  };
      if (s <= 80) return { label: "High Exposure",     color: "#f97316", bg: "rgba(249,115,22,0.1)"  };
      return              { label: "Critical Exposure", color: "#ef4444", bg: "rgba(239,68,68,0.1)"   };
    };
    const getRRIBand = (s) => {
      if (s >= 80) return { label: "Advanced Readiness",    color: "#10b981" };
      if (s >= 60) return { label: "Operational Readiness", color: "#3b82f6" };
      if (s >= 40) return { label: "Developing Readiness",  color: "#f59e0b" };
      return              { label: "Emerging Readiness",    color: "#ef4444" };
    };
    const getCCIBand = (s) => {
      if (s >= 80) return { label: "Strong Conduct",     color: "#10b981" };
      if (s >= 60) return { label: "Adequate Conduct",   color: "#a78bfa" };
      if (s >= 40) return { label: "Concerning Conduct", color: "#f59e0b" };
      return              { label: "Poor Conduct",       color: "#ef4444" };
    };
    const getQuadrant = (rri, cci) => {
      const rriHigh = rri >= 60, cciHigh = cci >= 60;
      if (rriHigh && cciHigh)  return { id: "strong",  label: "Strong Position",   color: "#10b981", desc: "Prepared for change and historically well-governed. Priority: maintain."                              };
      if (rriHigh && !cciHigh) return { id: "govgap",  label: "Governance Gap",    color: "#f59e0b", desc: "Prepared for change but historical track record raises credibility concerns."                         };
      if (!rriHigh && cciHigh) return { id: "impgap",  label: "Implementation Gap",color: "#3b82f6", desc: "Historically compliant culture but slow on current implementation."                                   };
      return                          { id: "highest", label: "Highest Priority",  color: "#ef4444", desc: "Both current readiness and historical conduct require immediate attention." };
    };

    const mono = { fontFamily: "'IBM Plex Mono', monospace" };

    const Pill = ({ label, color, small }) => (
      <span style={{
        display: "inline-block", background: `${color}18`, color,
        border: `1px solid ${color}35`, borderRadius: 4,
        padding: small ? "1px 6px" : "3px 9px",
        fontSize: small ? 10 : 11, fontWeight: 600, letterSpacing: "0.04em", ...mono,
      }}>{label}</span>
    );

    const Card = ({ children, style = {}, glowColor }) => (
      <div style={{
        background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20,
        ...(glowColor ? { boxShadow: `0 0 0 1px ${glowColor}20, inset 0 1px 0 rgba(255,255,255,0.04)` } : {}),
        ...style,
      }}>{children}</div>
    );

    const SectionTitle = ({ children, sub }) => (
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.muted, marginBottom: 4 }}>{children}</div>
        {sub && <div style={{ fontSize: 11, color: "#475569" }}>{sub}</div>}
      </div>
    );

    const ScoreGauge = ({ score, color, size = 80 }) => {
      const R = (size / 2) - 8;
      const circ = 2 * Math.PI * R;
      const dash = (score / 100) * circ * 0.75;
      const cx = size / 2, cy = size / 2;
      return (
        <svg width={size} height={size * 0.7} viewBox={`0 0 ${size} ${size * 0.85}`} style={{ overflow: "visible" }}>
          <circle cx={cx} cy={cy} r={R} fill="none" stroke={`${color}18`} strokeWidth={6}
            strokeDasharray={`${circ * 0.75} ${circ * 0.25}`} strokeDashoffset={circ * 0.125}
            strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`} />
          <circle cx={cx} cy={cy} r={R} fill="none" stroke={color} strokeWidth={6}
            strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={circ * 0.125}
            strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`}
            style={{ filter: `drop-shadow(0 0 6px ${color}60)` }} />
          <text x={cx} y={cy + 4} textAnchor="middle" fill={color}
            style={{ ...mono, fontSize: size * 0.25, fontWeight: 700 }}>{score}</text>
        </svg>
      );
    };

    const TrendBadge = ({ delta }) => (
      <span style={{ fontSize: 11, fontWeight: 600, color: delta.startsWith("+") ? C.warn : C.rri, ...mono }}>{delta}</span>
    );

    const PillarBar = ({ label, score, color }) => (
      <div style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
          <span style={{ fontSize: 12, color: "#94a3b8" }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 600, color, ...mono }}>{score}</span>
        </div>
        <div style={{ height: 5, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${score}%`, background: color, borderRadius: 3, boxShadow: `0 0 6px ${color}50`, transition: "width 0.6s ease" }} />
        </div>
      </div>
    );

    const OutcomePill = ({ outcome }) => {
      const map = { Won: C.rri, Settled: C.warn, Lost: C.danger };
      return <Pill label={outcome} color={map[outcome] || C.muted} small />;
    };
    const ImpactPill = ({ impact }) => {
      const map = { High: C.danger, Medium: C.warn, Low: C.rri };
      return <Pill label={impact} color={map[impact] || C.muted} small />;
    };
    const StageChip = ({ stageNo }) => {
      const stages = ["", "Parliamentary Passage", "Royal Assent", "Commencement", "Post-Commencement"];
      const colors = ["", "#64748b", C.warn, C.rri, C.tealXL];
      return <Pill label={`Stage ${stageNo}: ${stages[stageNo]}`} color={colors[stageNo] || C.muted} small />;
    };
    const AlertIcon = ({ type }) => {
      const icons = { velocity: "⚡", legislation: "📜", tribunal: "⚖️", rri: "🎯", cci: "🔬" };
      return <span style={{ fontSize: 14 }}>{icons[type] || "🔔"}</span>;
    };
    const UpgradeLockedBlock = ({ title, desc, targetTier = "Institutional" }) => (
      <div style={{ background: "rgba(167,139,250,0.05)", border: "1px dashed rgba(167,139,250,0.25)", borderRadius: 10, padding: 16, display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{ fontSize: 20, opacity: 0.6 }}>🔒</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#a78bfa", marginBottom: 2 }}>{title}</div>
          <div style={{ fontSize: 11, color: C.muted }}>{desc}</div>
        </div>
        <div style={{ fontSize: 10, fontWeight: 600, color: "#a78bfa", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 5, padding: "3px 8px", whiteSpace: "nowrap", cursor: "pointer", ...mono }}>{targetTier} ↑</div>
      </div>
    );

    const QuadrantPanel = ({ rri, cci }) => {
      const q = getQuadrant(rri, cci);
      const quadrants = [
        { id: "impgap",  label: "Implementation Gap", rriHigh: false, cciHigh: true,  color: "#3b82f6", desc: "Historically compliant but slow on implementation." },
        { id: "strong",  label: "Strong Position",    rriHigh: true,  cciHigh: true,  color: "#10b981", desc: "Prepared and well-governed. Priority: maintain."   },
        { id: "highest", label: "Highest Priority",   rriHigh: false, cciHigh: false, color: "#ef4444", desc: "Both readiness and conduct require attention."      },
        { id: "govgap",  label: "Governance Gap",     rriHigh: true,  cciHigh: false, color: "#f59e0b", desc: "Prepared but historical credibility concerns."      },
      ];
      return (
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 12 }}>CCI Art. 7.4.1 — Standard Quadrant Interpretation · RRI PCS vs CCI_pub</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 14 }}>
            {quadrants.map(({ id, label, rriHigh, cciHigh, color, desc }) => {
              const active = id === q.id;
              return (
                <div key={id} style={{ background: active ? `${color}15` : "rgba(255,255,255,0.02)", border: `1px solid ${active ? `${color}50` : C.border}`, borderRadius: 8, padding: 12, boxShadow: active ? `0 0 16px ${color}20` : "none", transition: "all 0.3s ease" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: active ? color : "#475569" }}>{label}</div>
                    {active && <div style={{ fontSize: 10, background: `${color}20`, color, border: `1px solid ${color}40`, borderRadius: 4, padding: "1px 6px", ...mono, fontWeight: 600 }}>YOUR POSITION</div>}
                  </div>
                  <div style={{ fontSize: 10, color: C.muted, lineHeight: 1.5 }}>{desc}</div>
                  <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                    <Pill label={`RRI ${rriHigh ? "≥60" : "<60"}`} color={rriHigh ? C.rri : "#64748b"} small />
                    <Pill label={`CCI ${cciHigh ? "≥60" : "<60"}`} color={cciHigh ? C.cci : "#64748b"} small />
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ background: `${q.color}10`, border: `1px solid ${q.color}30`, borderRadius: 8, padding: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: q.color, marginBottom: 4 }}>◆ Active Interpretation: {q.label}</div>
            <div style={{ fontSize: 11, color: "#94a3b8" }}>{q.desc}</div>
          </div>
        </div>
      );
    };

    const OverviewTab = () => {
      const aceiBand = getAceiBand(CLIENT.acei.score);
      const rriBand  = getRRIBand(CLIENT.rri.pcs);
      const cciBand  = getCCIBand(CLIENT.cci.pub);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          {CLIENT.alerts.filter(a => !a.read).length > 0 && (
            <div className="fade-up" style={{ background: "rgba(245,158,11,0.07)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 10, padding: "10px 16px", display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 14 }}>⚡</span>
              <div style={{ flex: 1 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: C.warn }}>{CLIENT.alerts.filter(a => !a.read).length} unread alerts</span>
                <span style={{ fontSize: 12, color: "#94a3b8", marginLeft: 8 }}>— ACEI velocity flag active · Employment Rights Bill at Royal Assent · DR-PCS 78 on Workers Act</span>
              </div>
              <span style={{ fontSize: 11, color: C.warn, cursor: "pointer", ...mono }}>View All →</span>
            </div>
          )}
          <div>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: "#334155", marginBottom: 12, ...mono }}>
              INDEX TRIAD — ACEI v1.0 · RRI v1.0 · CCI v1.0 · Strict Separation Doctrine (ACEI Art. 12A.3)
            </div>
            <div className="fade-up-1" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {[
                { key: "acei", label: "ACEI", desc: "Adverse Claim Exposure Index",  color: C.acei, score: CLIENT.acei.score, band: aceiBand, delta: CLIENT.acei.delta,
                  meta: [
                    { label: "Sector Multiplier (Tech)", value: `×${CLIENT.acei.sectorMultiplier}` },
                    { label: "Jurisdiction Multiplier (SE)", value: `×${CLIENT.acei.jurisdictionMultiplier}` },
                  ],
                  warn: CLIENT.acei.velocityFlag ? "⚡ Velocity flag active — rapid score increase detected" : null,
                  foot: "Model Risk Disclosure: ACEI measures market-level regulatory exposure. Not legal advice. ACEI v1.0 Art. XII, Annex D.",
                },
                { key: "rri", label: "RRI", desc: "Regulatory Readiness Index", color: C.rri, score: CLIENT.rri.pcs, band: rriBand, delta: CLIENT.rri.delta,
                  meta: [
                    { label: "Active RCEs (deadline risk)", value: `${CLIENT.rri.activeRCEs}` },
                    { label: "DR-PCS (highest)", value: `${CLIENT.rri.drPcs}` },
                    { label: "Evidence Coverage", value: `${CLIENT.rri.eIntP.ec}%` },
                  ],
                  warn: "⚠ Workers Act commencement in 27 days — DR-PCS 78",
                  foot: null,
                },
                { key: "cci", label: "CCI", desc: "Compliance Conduct Index", color: C.cci, score: CLIENT.cci.pub, band: cciBand, delta: CLIENT.cci.delta,
                  meta: [
                    { label: "Credibility Weight (CW)", value: `${CLIENT.cci.cw}` },
                    { label: "Computation Mode", value: CLIENT.cci.mode },
                    { label: "Sector Conduct Baseline", value: CLIENT.cci.scbTier },
                    { label: "Extended Conduct Trend", value: CLIENT.cci.ect },

                <button style={{ background: `${C.teal}15`, border: `1px solid ${C.teal}40`, color: C.tealXL, borderRadius: 7, padding: "8px 16px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: "0.04em", ...mono }}>{r.cta} →</button>
              </div>
            </div>
          ))}
        </div>
        <Card className="fade-up-5">
          <SectionTitle sub="Available on upgrade to Institutional">Institutional Reports</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <UpgradeLockedBlock title="White-label Reports"         desc="Company-branded board packs and executive summaries." />
            <UpgradeLockedBlock title="Custom Reporting Frequency"  desc="On-demand generation and event-triggered report dispatch." />
            <UpgradeLockedBlock title="Benchmarking Report"         desc="Anonymised sector comparison — where your ACEI, RRI, and CCI stand against comparable employers." />
            <UpgradeLockedBlock title="API Data Access"             desc="Programmatic access to your full scoring history and real-time scores. JSON/REST." />
          </div>
        </Card>
      </div>
    );

    const AlertsTab = () => (
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {CLIENT.alerts.map((a, i) => (
          <div key={a.id} className={`fade-up-${i}`} style={{ background: C.bgCard, border: `1px solid ${a.read ? C.border : C.borderM}`, borderLeft: `3px solid ${a.read ? C.border : C.teal}`, borderRadius: 10, padding: 16, display: "flex", gap: 14, alignItems: "flex-start" }}>
            <div style={{ marginTop: 2 }}><AlertIcon type={a.type} /></div>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: a.read ? "#64748b" : "#e2e8f0" }}>{a.title}</div>
                {!a.read && <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.teal, marginTop: 3, flexShrink: 0 }} />}
              </div>
              <div style={{ fontSize: 11, color: a.read ? "#475569" : "#94a3b8", lineHeight: 1.6 }}>{a.detail}</div>
              <div style={{ fontSize: 10, color: "#334155", marginTop: 6, ...mono }}>{a.date}</div>
            </div>
          </div>
        ))}
        <Card className="fade-up-5">
          <SectionTitle sub="Institutional tier delivery channels">Advanced Notifications</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <UpgradeLockedBlock title="Webhook / Slack Integration"          desc="Push alerts to your internal channels instantly." />
            <UpgradeLockedBlock title="Individual Tribunal Decision Alerts"  desc="Real-time alerts when a new decision matches your sector, size, and claim category profile." />
          </div>
        </Card>
      </div>
    );

    const UpgradePanel = () => (
      <div style={{ background: "linear-gradient(135deg, rgba(27,42,74,0.8) 0%, rgba(13,115,119,0.15) 100%)", border: "1px solid rgba(13,115,119,0.4)", borderRadius: 14, padding: 24, marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: C.cci, ...mono }}>INSTITUTIONAL TIER</div>
              <Pill label="Custom Pricing" color={C.cci} small />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>Ready to scale your compliance infrastructure?</div>
            <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.7, maxWidth: 600 }}>Upgrade to Institutional for CEO-ready executive summaries, white-label board packs, API access to your full scoring history, real-time event-triggered recomputation, and a dedicated account manager backed by SLA.</div>
            <div style={{ marginTop: 14, padding: 12, background: "rgba(16,185,129,0.06)", border: "1px solid rgba(16,185,129,0.2)", borderRadius: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.rri, marginBottom: 4 }}>✓ Seamless Data Migration Guaranteed</div>
              <div style={{ fontSize: 11, color: "#475569", lineHeight: 1.6 }}>Your complete ACEI scoring history, RRI evidence profile, CCI baseline, tribunal intelligence, and legislative tracker data migrate automatically upon upgrade. No re-onboarding. No data loss. Your compliance history is preserved in full.</div>
            </div>
          </div>
          <div style={{ marginLeft: 24, textAlign: "center", flexShrink: 0 }}>
            <button style={{ background: `linear-gradient(135deg, ${C.teal}, ${C.tealL})`, border: "none", color: "#fff", borderRadius: 10, padding: "12px 24px", fontSize: 13, fontWeight: 700, cursor: "pointer", letterSpacing: "0.05em", boxShadow: `0 4px 20px ${C.teal}40` }}>Request Upgrade →</button>
            <div style={{ fontSize: 10, color: "#334155", marginTop: 8 }}>Account team in touch within 24h</div>
          </div>
        </div>
      </div>
    );

    const TABS = [
      { id: "overview",   label: "Overview",          icon: "◈"  },
      { id: "compliance", label: "Compliance Posture", icon: "◎"  },
      { id: "tribunal",   label: "Tribunal Intel",     icon: "⚖"  },
      { id: "regulatory", label: "Regulatory Feed",    icon: "📜" },
      { id: "reports",    label: "Reports & Exports",  icon: "📁" },
      { id: "alerts",     label: "Alerts",             icon: "🔔", badge: 3 },
    ];

    const App = () => {
      const [activeTab, setActiveTab] = useState("overview");
      const [showUpgrade, setShowUpgrade] = useState(false);
      const renderTab = () => {
        switch (activeTab) {
          case "overview":   return <OverviewTab />;
          case "compliance": return <ComplianceTab />;
          case "tribunal":   return <TribunalTab />;
          case "regulatory": return <RegulatoryTab />;
          case "reports":    return <ReportsTab />;
          case "alerts":     return <AlertsTab />;
          default:           return <OverviewTab />;
        }
      };
      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column" }}>
          <div style={{ background: "rgba(13,21,37,0.95)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(255,255,255,0.05)", position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 28px", maxWidth: 1400, margin: "0 auto", width: "100%" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 30, height: 30, borderRadius: 7, background: C.teal, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 800, color: "#fff", ...mono }}>A</div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>ailane</div>
                    <div style={{ fontSize: 9, color: "#334155", letterSpacing: "0.1em", ...mono }}>REGULATORY INTELLIGENCE</div>
                  </div>
                </div>
                <div style={{ width: 1, height: 28, background: C.border }} />
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{CLIENT.name}</div>
                  <div style={{ fontSize: 10, color: C.muted }}>{CLIENT.sector} · {CLIENT.jurisdiction} · {CLIENT.headcount} employees</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Pill label="GOVERNANCE TIER" color={C.tealXL} />
                <div style={{ fontSize: 11, color: C.muted }}>Data as of <span style={{ color: "#94a3b8", ...mono }}>{CLIENT.dataAsOf}</span></div>
                <button onClick={() => setShowUpgrade(!showUpgrade)} style={{ background: `${C.cci}15`, border: `1px solid ${C.cci}35`, color: C.cci, borderRadius: 7, padding: "6px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: "0.04em", ...mono }}>Upgrade ↑</button>
              </div>
            </div>
            <div style={{ display: "flex", padding: "0 28px", maxWidth: 1400, margin: "0 auto", width: "100%", borderTop: "1px solid rgba(255,255,255,0.03)", gap: 2 }}>
              {TABS.map(t => {
                const active = activeTab === t.id;
                return (
                  <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: "10px 16px", background: "none", border: "none", borderBottom: active ? `2px solid ${C.tealXL}` : "2px solid transparent", color: active ? C.tealXL : C.muted, fontSize: 12, fontWeight: active ? 700 : 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, transition: "color 0.2s", letterSpacing: "0.01em" }}>
                    <span>{t.icon}</span><span>{t.label}</span>
                    {t.badge && <span style={{ background: C.teal, color: "#fff", borderRadius: 10, fontSize: 9, fontWeight: 800, padding: "1px 5px", ...mono }}>{t.badge}</span>}
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ flex: 1, maxWidth: 1400, margin: "0 auto", width: "100%", padding: "24px 28px" }}>
            {showUpgrade && <UpgradePanel />}
            {renderTab()}
          </div>
          <div style={{ borderTop: `1px solid ${C.border}`, padding: "12px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: 1400, margin: "0 auto", width: "100%" }}>
            <div style={{ fontSize: 10, color: "#1e2d3d", ...mono }}>AILANE · AI Lane Limited (Co. No. 17035624) · ACEI v1.0 · RRI v1.0 · CCI v1.0 · Adopted 26 Feb 2026</div>
            <div style={{ display: "flex", gap: 14, fontSize: 10, color: "#334155" }}>
              <span style={{ cursor: "pointer" }}>Support</span>
              <span style={{ cursor: "pointer" }}>Constitutional Reference</span>
              <span style={{ cursor: "pointer" }}>AIC Governance</span>
              <span style={{ cursor: "pointer" }}>Model Risk Disclosure</span>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
