// ── SUPABASE HELPERS ──────────────────────────────────────────────────────
const getToken = () => {
  try {
    // Read shared Supabase session first
    const sbSession = localStorage.getItem("sb-cnbsxwtvazfvzmltkuvx-auth-token");
    if (sbSession) {
      const parsed = JSON.parse(sbSession);
      if (parsed?.access_token) return parsed.access_token;
      if (parsed?.session?.access_token) return parsed.session.access_token;
    }
    // Fallback: search for any supabase auth key
    const keys = Object.keys(localStorage).filter(k => k.includes("supabase") && k.includes("auth"));
    for (const k of keys) {
      const d = JSON.parse(localStorage.getItem(k) || "{}");
      if (d?.access_token) return d.access_token;
      if (d?.session?.access_token) return d.session.access_token;
    }
  } catch {}
  return null;
};

const getOrgId = (token) => {
  if (!token) return DEMO_ORG;
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    return payload?.org_id || DEMO_ORG;
  } catch { return DEMO_ORG; }
};

const sbRpc = async (fn, params, token) => {
  const res = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: "POST",
    headers: {
      apikey: SB_ANON,
      Authorization: `Bearer ${token || SB_ANON}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(params),
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
};

// ── AI QUERY WIDGET (Governance & Institutional only) ────────────────────
const AIQueryWidget = ({ lang }) => {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  const ui = {
    en: { title: "Ask Ailane AI", placeholder: "Ask about your compliance, scores, or legislation...", powered: "Powered by Ailane Constitutional Intelligence", helpful: "Helpful", notHelpful: "Not Helpful" },
    cy: { title: "Gofynnwch i AI Ailane", placeholder: "Gofynnwch am eich cydymffurfiad, sgoriau, neu ddeddfwriaeth...", powered: "Wedi'i bweru gan Ddeallusrwydd Cyfansoddiadol Ailane", helpful: "Defnyddiol", notHelpful: "Ddim yn ddefnyddiol" },
  };
  const t = ui[lang] || ui.en;

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const sendQuery = async () => {
    if (!input.trim() || loading) return;
    const query = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role: "user", text: query }]);
    setLoading(true);

    try {
      const token = getToken();
      if (!token) throw new Error("Not authenticated");
      const res = await fetch(SB_URL + "/functions/v1/comms-resolve", {
        method: "POST",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json", apikey: SB_ANON },
        body: JSON.stringify({ query, channel: "in_platform", preferred_language: lang }),
      });
      const data = await res.json();
      if (data.response) {
        setMessages(prev => [...prev, { role: "ai", text: data.response, id: data.interaction_id }]);
      } else {
        setMessages(prev => [...prev, { role: "ai", text: data.error || "Unable to process your query. Please try again.", error: true }]);
      }
    } catch (e) {
      setMessages(prev => [...prev, { role: "ai", text: "Connection error. Please check you are signed in and try again.", error: true }]);
    }
    setLoading(false);
  };

  const sendFeedback = async (interactionId, rating) => {
    try {
      const token = getToken();
      if (!token) return;
      await fetch(SB_URL + "/rest/v1/rpc/exec_sql", {
        method: "POST",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json", apikey: SB_ANON },
        body: JSON.stringify({
          sql: "INSERT INTO comms.feedback_signals (interaction_id, signal_type, rating) VALUES ($1, 'rating', $2)",
          params: [interactionId, rating],
        }),
      });
      setMessages(prev => prev.map(m => m.id === interactionId ? { ...m, feedbackSent: true } : m));
    } catch (e) { /* silent */ }
  };

  // Floating button
  if (!open) {
    return (
      <button onClick={() => setOpen(true)} style={{
        position: "fixed", bottom: 24, right: 24, zIndex: 1000,
        width: 56, height: 56, borderRadius: 28,
        background: "linear-gradient(135deg, #22d3ee, #0891b2)",
        border: "none", cursor: "pointer",
        boxShadow: "0 4px 24px rgba(34,211,238,0.3)",
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "transform 0.2s, box-shadow 0.2s",
      }}
        onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.08)"; e.currentTarget.style.boxShadow = "0 6px 32px rgba(34,211,238,0.4)"; }}
        onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.boxShadow = "0 4px 24px rgba(34,211,238,0.3)"; }}
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    );
  }

  // Chat panel
  return (
    <div style={{
      position: "fixed", bottom: 24, right: 24, zIndex: 1000,
      width: 360, height: 520, borderRadius: 14,
      background: "#0c1221", border: "1px solid rgba(34,211,238,0.15)",
      boxShadow: "0 8px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(34,211,238,0.08)",
      display: "flex", flexDirection: "column", overflow: "hidden",
      animation: "slideUp 0.25s ease",
    }}>
      {/* Header */}
      <div style={{
        padding: "14px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#dde4f0" }}>{t.title}</div>
          <div style={{ fontSize: 9, color: "#4a5568", fontFamily: "'JetBrains Mono',monospace", letterSpacing: 0.5, marginTop: 2 }}>ACEI v1.0 · RRI v1.0 · CCI v1.0</div>
        </div>
        <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: "#4a5568", cursor: "pointer", fontSize: 18, padding: 4 }}>&#10005;</button>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: "12px 14px" }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 16px", color: "#4a5568" }}>
            <div style={{ fontSize: 28, marginBottom: 12, opacity: 0.4 }}>&#128172;</div>
            <div style={{ fontSize: 12, lineHeight: 1.6 }}>{t.powered}</div>
          </div>
        )}
        {messages.map((msg, i) => (
          <div key={i} style={{ marginBottom: 12 }}>
            <div style={{
              padding: "10px 14px", borderRadius: msg.role === "user" ? "12px 12px 4px 12px" : "12px 12px 12px 4px",
              background: msg.role === "user" ? "rgba(34,211,238,0.1)" : msg.error ? "rgba(239,68,68,0.08)" : "rgba(255,255,255,0.03)",
              border: "1px solid " + (msg.role === "user" ? "rgba(34,211,238,0.15)" : msg.error ? "rgba(239,68,68,0.15)" : "rgba(255,255,255,0.05)"),
              marginLeft: msg.role === "user" ? 40 : 0, marginRight: msg.role === "ai" ? 20 : 0,
            }}>
              <div style={{ fontSize: 12, color: msg.error ? "#ef4444" : "#c8d0de", lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{msg.text}</div>
            </div>
            {msg.role === "ai" && msg.id && !msg.feedbackSent && (
              <div style={{ display: "flex", gap: 6, marginTop: 4, paddingLeft: 4 }}>
                <button onClick={() => sendFeedback(msg.id, "helpful")} style={{ fontSize: 10, color: "#4a5568", background: "none", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace" }}>&#128077; {t.helpful}</button>
                <button onClick={() => sendFeedback(msg.id, "not_helpful")} style={{ fontSize: 10, color: "#4a5568", background: "none", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace" }}>&#128078; {t.notHelpful}</button>
              </div>
            )}
            {msg.feedbackSent && msg.role === "ai" && (
              <div style={{ fontSize: 9, color: "#22d3ee", marginTop: 3, paddingLeft: 4, fontFamily: "'JetBrains Mono',monospace" }}>&#10003; Feedback recorded</div>
            )}
          </div>
        ))}
        {loading && (
          <div style={{ padding: "10px 14px", fontSize: 11, color: "#4a5568", fontFamily: "'JetBrains Mono',monospace" }}>Generating response...</div>
        )}
      </div>

      {/* Input */}
      <div style={{ padding: "10px 14px", borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 8 }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendQuery()}
          placeholder={t.placeholder}
          style={{ flex: 1, padding: "10px 12px", fontSize: 12, color: "#dde4f0", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, outline: "none", fontFamily: "'EB Garamond',Georgia,serif" }}
        />
        <button onClick={sendQuery} disabled={loading || !input.trim()} style={{
          padding: "8px 14px", background: loading ? "#1a2332" : "linear-gradient(135deg, #22d3ee, #0891b2)",
          border: "none", borderRadius: 8, cursor: loading ? "not-allowed" : "pointer", color: "#0a0e1a", fontWeight: 700, fontSize: 12,
        }}>&#8594;</button>
      </div>
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────────────
const App = () => {
  const [lang, setLang] = useState("en");
  const [instruments, setInstruments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [jurisdictionFilter, setJurisdictionFilter] = useState("all");
  const [sortMode, setSortMode] = useState("sig");
  const [expandedId, setExpandedId] = useState(null);
  const [hasWelsh, setHasWelsh] = useState(false);

  const ui = UI[lang];

  useEffect(() => {
    const load = async () => {
      try {
        setLoading(true);
        const token = getToken();
        const orgId = getOrgId(token);
        const data = await sbRpc("get_legislation_for_org", { p_org_id: orgId }, token);
        setInstruments(data || []);
        const welsh = (data || []).some(i => i.jurisdiction_codes?.includes("Wales"));
        setHasWelsh(welsh);
      } catch (e) {
        setError(e.message);
      } finally {
        setLoading(false);
      }
    };
    load();
  }, []);

  const filtered = useMemo(() => {
    let list = [...instruments];

    // Jurisdiction filter
    if (jurisdictionFilter === "wales") {
      list = list.filter(i => i.jurisdiction_codes?.includes("Wales"));
    } else if (jurisdictionFilter === "gb") {
      list = list.filter(i => i.jurisdiction_codes?.includes("GB"));
    }

    // Search
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(i => {
        const enMatch = (i.short_title + " " + (i.summary || "") + " " + (i.tags || []).join(" ")).toLowerCase().includes(q);
        const cyMatch = lang === "cy" && ((i.title_cy || "") + " " + (i.summary_cy || "")).toLowerCase().includes(q);
        return enMatch || cyMatch;
      });
    }

    // Sort
    if (sortMode === "sig") {
      list.sort((a, b) => {
        // Wales-specific always first
        const aW = a.jurisdiction_codes?.includes("Wales") ? 1 : 0;
        const bW = b.jurisdiction_codes?.includes("Wales") ? 1 : 0;
        if (bW !== aW) return bW - aW;
        return (b.sci_significance || 0) - (a.sci_significance || 0);
      });
    } else {
      list.sort((a, b) => {
        const aTitle = (lang === "cy" && a.title_cy) ? a.title_cy : a.short_title;
        const bTitle = (lang === "cy" && b.title_cy) ? b.title_cy : b.short_title;
        return aTitle.localeCompare(bTitle);
      });
    }

    return list;
  }, [instruments, search, jurisdictionFilter, sortMode, lang]);

  const walesCount = instruments.filter(i => i.jurisdiction_codes?.includes("Wales")).length;

  return (
    <div style={{ minHeight: "100vh", background: "#080c18", display: "flex", flexDirection: "column" }}>
      {/* ── HEADER ─────────────────────────────────────────────────────── */}
      <header style={{
        background: "linear-gradient(180deg, rgba(15,22,45,0.98) 0%, rgba(10,14,26,0.98) 100%)",
        borderBottom: "1px solid rgba(255,255,255,0.07)",
        padding: "0 28px",
        position: "sticky", top: 0, zIndex: 100,
        backdropFilter: "blur(12px)",
      }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "14px 0", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
          {/* Logo + Title */}
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 7,
              background: "linear-gradient(135deg, #22d3ee, #0e7490)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: "'JetBrains Mono', monospace",
              fontWeight: 700, fontSize: 16, color: "#080c18",
            }}>A</div>
            <div>
              <div style={{
                fontSize: 16, fontWeight: 600, color: "#e2e8f0",
                fontFamily: "'EB Garamond', Georgia, serif", letterSpacing: "0.3px",
              }}>
                {ui.title}
              </div>
              <div style={{
                fontSize: 10, color: "#475569",
                fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: "1.5px", textTransform: "uppercase",
              }}>
                AILANE · {ui.subtitle}
              </div>
            </div>
          </div>

          {/* Right: Wales layer indicator + lang toggle */}
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {hasWelsh && (
              <div style={{
                display: "flex", alignItems: "center", gap: 6,
                fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
                padding: "5px 10px", borderRadius: 6,
                background: "rgba(185,28,28,0.1)",
                border: "1px solid rgba(239,68,68,0.2)",
                color: "#fca5a5",
              }}>
                🏴󠁧󠁢󠁷󠁬󠁳󠁿 {ui.walesLayer}
              </div>
            )}
            <LangToggle lang={lang} setLang={setLang} hasWelsh={hasWelsh} />
          </div>
        </div>
      </header>

      {/* ── CONTROLS BAR ───────────────────────────────────────────────── */}
      <div style={{
        background: "rgba(12,17,35,0.9)",
        borderBottom: "1px solid rgba(255,255,255,0.05)",
        padding: "12px 28px",
        position: "sticky", top: 65, zIndex: 99,
      }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
          {/* Search */}
          <div style={{ flex: 1, minWidth: 220, position: "relative" }}>
            <span style={{
              position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)",
              color: "#475569", fontSize: 13,
            }}>⌕</span>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder={ui.searchPlaceholder}
              style={{
                width: "100%", background: "rgba(255,255,255,0.04)",
                border: "1px solid rgba(255,255,255,0.08)", borderRadius: 7,
                padding: "8px 10px 8px 30px",
                color: "#dde4f0", fontSize: 14,
                fontFamily: "'EB Garamond', Georgia, serif",
                outline: "none",
              }}
            />
          </div>

          {/* Jurisdiction filter */}
          <div style={{ display: "flex", gap: 4, background: "rgba(255,255,255,0.03)", borderRadius: 7, padding: 3 }}>
            {[
              { key: "all", label: ui.filterAll },
              { key: "wales", label: ui.filterWales },
              { key: "gb", label: ui.filterGB },
            ].map(f => (
              <button key={f.key} onClick={() => setJurisdictionFilter(f.key)} style={{
                background: jurisdictionFilter === f.key ? "rgba(34,211,238,0.12)" : "transparent",
                color: jurisdictionFilter === f.key ? "#22d3ee" : "#64748b",
                border: jurisdictionFilter === f.key ? "1px solid rgba(34,211,238,0.25)" : "1px solid transparent",
                borderRadius: 5, padding: "5px 12px", cursor: "pointer",
                fontSize: 12, fontFamily: "'JetBrains Mono', monospace",
                transition: "all 0.15s ease",
              }}>
                {f.key === "wales" && "🏴󠁧󠁢󠁷󠁬󠁳󠁿 "}{f.label}
              </button>
            ))}
          </div>

          {/* Sort */}
          <div style={{ display: "flex", gap: 4, background: "rgba(255,255,255,0.03)", borderRadius: 7, padding: 3 }}>
            {[
              { key: "sig", label: ui.sortSig },
              { key: "alpha", label: ui.sortTitle },
            ].map(s => (
              <button key={s.key} onClick={() => setSortMode(s.key)} style={{
                background: sortMode === s.key ? "rgba(255,255,255,0.08)" : "transparent",
                color: sortMode === s.key ? "#dde4f0" : "#64748b",
                border: "1px solid transparent",
                borderRadius: 5, padding: "5px 12px", cursor: "pointer",
                fontSize: 12, fontFamily: "'JetBrains Mono', monospace",
                transition: "all 0.15s ease",
              }}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Count */}
          <div style={{
            marginLeft: "auto", fontSize: 11,
            fontFamily: "'JetBrains Mono', monospace",
            color: "#475569",
          }}>
            {ui.instrumentCount(filtered.length)}
            {hasWelsh && walesCount > 0 && ` · ${walesCount} ${lang === "cy" ? "Cymru" : "Wales"}`}
          </div>
        </div>
      </div>

      {/* ── LIBRARY BODY ───────────────────────────────────────────────── */}
      <main style={{ flex: 1, padding: "20px 28px 40px", maxWidth: 1100, margin: "0 auto", width: "100%" }}>
        {loading && (
          <div style={{ textAlign: "center", color: "#475569", padding: 60, fontFamily: "'JetBrains Mono', monospace", fontSize: 13 }}>
            <div style={{ fontSize: 24, marginBottom: 12 }}>◌</div>
            {ui.loading}
          </div>
        )}

        {error && (
          <div style={{
            background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)",
            borderRadius: 8, padding: 20, color: "#fca5a5", fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
          }}>
            {ui.error} ({error})
          </div>
        )}

        {!loading && !error && filtered.length === 0 && (
          <div style={{ textAlign: "center", color: "#475569", padding: 60, fontFamily: "'EB Garamond', Georgia, serif", fontSize: 16 }}>
            {ui.noResults}
          </div>
        )}

        {/* Wales section header */}
        {!loading && !error && jurisdictionFilter !== "gb" && walesCount > 0 && (
          <div style={{
            display: "flex", alignItems: "center", gap: 10,
            marginBottom: 12,
            padding: "8px 12px",
            background: "rgba(185,28,28,0.06)",
            border: "1px solid rgba(239,68,68,0.12)",
            borderRadius: 7,
          }}>
            <span style={{ fontSize: 16 }}>🏴󠁧󠁢󠁷󠁬󠁳󠁿</span>
            <span style={{
              fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
              color: "#fca5a5", letterSpacing: "1px",
            }}>
              {lang === "cy" ? "HAEN CYMRU · DEDDFWRIAETH BENODOL I GYMRU" : "WALES LAYER · WALES-SPECIFIC LEGISLATION"}
            </span>
            <div style={{ flex: 1, height: 1, background: "rgba(239,68,68,0.12)" }} />
            <span style={{
              fontSize: 10, fontFamily: "'JetBrains Mono', monospace",
              color: "#64748b",
            }}>
              {lang === "cy" ? "GWEDDILL YN DILYN ·" : "GB INSTRUMENTS FOLLOW ·"} {walesCount} {lang === "cy" ? "CYMRU" : "WALES"}
            </span>
          </div>
        )}

        {/* Instrument list */}
        {!loading && !error && filtered.map(inst => (
          <InstrumentCard
            key={inst.id}
            inst={inst}
            lang={lang}
            ui={ui}
            expanded={expandedId === inst.id}
            onToggle={() => setExpandedId(expandedId === inst.id ? null : inst.id)}
          />
        ))}
      </main>

      {/* ── FOOTER ─────────────────────────────────────────────────────── */}
      <footer style={{
        borderTop: "1px solid rgba(255,255,255,0.05)",
        padding: "12px 28px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        flexWrap: "wrap", gap: 8,
      }}>
        <span style={{ fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: "#2d3748", letterSpacing: "1px" }}>
          © 2026 AI LANE LIMITED · {ui.poweredBy.toUpperCase()}
        </span>
        <span style={{ fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: "#2d3748" }}>
          {lang === "cy" ? "AI-ASSISTED TRANSLATIONS · NIFER CYFANSWM:" : "AI-ASSISTED TRANSLATIONS · TOTAL INSTRUMENTS:"} {instruments.length}
        </span>
      </footer>

      {/* AI Query Widget — Governance & Institutional tier only */}
      <AIQueryWidget lang={lang} />

      <style>{`
        @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        button:hover { opacity: 0.85; }
        a:hover { opacity: 0.75; }
      `}</style>
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
