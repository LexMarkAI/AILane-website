  <script>
  (function() {
    // ── Constants ─────────────────────────────────────────────────────────
    var SUPA_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
    var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzkxNTM5NjAsImV4cCI6MjA1NDcyOTk2MH0.1TYFiSdOeMHLH_dPBR-YB2JlAgrLH3F7G9k7WlDVZ5g';

    var sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

    var statusView = document.getElementById('status-view');
    var loginView  = document.getElementById('login-view');
    var statusText = document.getElementById('status-text');
    var errorMsg   = document.getElementById('error-msg');
    var btnLogin   = document.getElementById('btn-login');
    var emailInput = document.getElementById('email');
    var passInput  = document.getElementById('password');

    function showStatus(msg) {
      statusView.classList.remove('hidden');
      loginView.classList.add('hidden');
      statusText.textContent = msg;
    }

    function showLogin() {
      loginView.classList.remove('hidden');
      statusView.classList.add('hidden');
    }

    function showError(msg) {
      errorMsg.textContent = msg;
    }

    // ── Route by tier ────────────────────────────────────────────────────
    // This function is used by BOTH the boot check and the login handler.
    // It queries the profile via raw fetch (canonical pattern) and redirects.
    async function routeBySession(session) {
      var payload = JSON.parse(atob(session.access_token.split('.')[1]));
      var userId = payload.sub;

      // Query profile — raw fetch with Bearer token
      var tier = null;
      try {
        var resp = await fetch(
          SUPA_URL + '/rest/v1/kl_account_profiles?select=subscription_tier&user_id=eq.' + userId + '&limit=1',
          {
            headers: {
              'apikey':        SUPA_KEY,
              'Authorization': 'Bearer ' + session.access_token,
              'Accept':        'application/json'
            }
          }
        );
        if (resp.ok) {
          var rows = await resp.json();
          if (rows && rows.length > 0) tier = rows[0].subscription_tier;
        }
      } catch(e) { /* tier stays null */ }

      // Routing matrix — locked rules
      var dest = '/account/';
      if (tier === 'per_session' || tier === 'monthly' || tier === 'guest_free' || tier === 'guest') {
        dest = '/account/dashboard/';
      } else if (tier === 'operational' || tier === 'operational_readiness') {
        dest = '/intelligence/';
      } else if (tier === 'governance' || tier === 'institutional') {
        dest = '/governance-dashboard/';
      }

      // GA4 event
      try {
        if (window.gtag) {
          gtag('event', 'login', { method: 'email', subscription_tier: tier || 'none' });
        }
      } catch(e) {}

      // Go
      window.location.href = dest;
    }

    // ── Boot: check for existing session ─────────────────────────────────
    // If already logged in, route directly. NO redirect to /auth/callback/.
    async function boot() {
      showStatus('Checking session...');

      try {
        var result = await sb.auth.getSession();
        if (result.data && result.data.session) {
          showStatus('Signing you in...');
          await routeBySession(result.data.session);
          return; // redirect will happen
        }
      } catch(e) {
        // No session — that's fine, show login
      }

      // No session — show the login form
      showLogin();
    }

    // ── Login handler ────────────────────────────────────────────────────
    async function handleLogin() {
      var email = emailInput.value.trim();
      var pass  = passInput.value;

      showError('');

      if (!email || !pass) {
        showError('Please enter your email and password.');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Signing in...';

      try {
        var result = await sb.auth.signInWithPassword({
          email: email,
          password: pass
        });

        if (result.error) {
          showError(result.error.message);
          btnLogin.disabled = false;
          btnLogin.textContent = 'Sign In';
          return;
        }

        if (!result.data || !result.data.session) {
          showError('Sign-in succeeded but no session was returned. Please try again.');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Sign In';
          return;
        }

        // ── Session in hand — route directly ──────────────────────────
        showStatus('Signing you in...');
        await routeBySession(result.data.session);

      } catch(err) {
        showError('An unexpected error occurred. Please try again.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Sign In';
      }
    }

    // ── Wire up events ───────────────────────────────────────────────────
    btnLogin.addEventListener('click', handleLogin);
    passInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
    emailInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') passInput.focus();
    });

    // ── Start ────────────────────────────────────────────────────────────
    boot();
  })();
  </script>

</body>
