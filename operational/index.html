  // THE NEXUS — Eileen Visual Identity (AILANE-SPEC-EILEEN-001 §3)
  // Operational tier: cyan #38bdf8 + green #22c55e, 12-14 nodes, 2 rings
  // ══════════════════════════════════════════════════════════════════
  function NexusAvatar({ size = 40, active = false, processing = false }) {
    const canvasRef = useRef(null);
    const frameRef = useRef(0);
    const timeRef = useRef(0);
    useEffect(() => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = size * dpr;
      const h = size * dpr;
      canvas.width = w;
      canvas.height = h;
      const cx = w / 2;
      const cy = h / 2;
      const nodeCount = processing ? 14 : active ? 13 : 10;
      const nodes = [];
      for (let i = 0; i < nodeCount; i++) {
        const ring = i < 5 ? 0.25 : 0.62;
        const angle = (i / (i < 5 ? 5 : nodeCount - 5)) * Math.PI * 2 + (i * 0.4);
        const r = ring * (w * 0.4);
        nodes.push({
          bx: cx + Math.cos(angle) * r,
          by: cy + Math.sin(angle) * r,
          r: (1.2 + Math.random() * 1.8) * dpr,
          speed: 0.4 + Math.random() * 0.6,
          phase: Math.random() * Math.PI * 2,
          ring,
        });
      }
      function draw() {
        timeRef.current += processing ? 0.035 : active ? 0.02 : 0.01;
        const t = timeRef.current;
        ctx.clearRect(0, 0, w, h);
        const breathe = 1 + Math.sin(t * 0.8) * (processing ? 0.15 : 0.08);
        const coreR = (processing ? 6 : active ? 5 : 3.5) * dpr;
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 4 * breathe);
        glow.addColorStop(0, processing ? "rgba(56,189,248,0.6)" : active ? "rgba(56,189,248,0.4)" : "rgba(56,189,248,0.2)");
        glow.addColorStop(0.4, processing ? "rgba(34,197,94,0.25)" : active ? "rgba(34,197,94,0.15)" : "rgba(34,197,94,0.05)");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, coreR * 4 * breathe, 0, Math.PI * 2);
        ctx.fill();
        const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * breathe);
        coreGrd.addColorStop(0, "rgba(255,255,255,0.9)");
        coreGrd.addColorStop(0.3, "rgba(56,189,248,0.8)");
        coreGrd.addColorStop(0.7, "rgba(34,197,94,0.4)");
        coreGrd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = coreGrd;
        ctx.beginPath();
        ctx.arc(cx, cy, coreR * breathe, 0, Math.PI * 2);
        ctx.fill();
        const nodePositions = nodes.map((n) => {
          const drift = Math.sin(t * n.speed + n.phase) * 3 * dpr;
          const drift2 = Math.cos(t * n.speed * 0.7 + n.phase) * 2 * dpr;
          return { x: n.bx + drift, y: n.by + drift2, r: n.r, ring: n.ring };
        });
        for (let i = 0; i < nodePositions.length; i++) {
          for (let j = i + 1; j < nodePositions.length; j++) {
            const a = nodePositions[i];
            const b = nodePositions[j];
            const dist = Math.hypot(a.x - b.x, a.y - b.y);
            const maxDist = w * 0.45;
            if (dist < maxDist) {
              const alpha = (1 - dist / maxDist) * (processing ? 0.35 : active ? 0.2 : 0.1);
              const pulse = processing ? (Math.sin(t * 3 + i + j) + 1) * 0.5 : 0;
              ctx.strokeStyle = pulse > 0.7
                ? `rgba(34,197,94,${alpha + pulse * 0.2})`
                : `rgba(56,189,248,${alpha})`;
              ctx.lineWidth = (0.5 + pulse * 0.5) * dpr;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
          const n = nodePositions[i];
          const coreDist = Math.hypot(n.x - cx, n.y - cy);
          const coreAlpha = (1 - coreDist / (w * 0.45)) * (active ? 0.15 : 0.06);
          ctx.strokeStyle = `rgba(56,189,248,${coreAlpha})`;
          ctx.lineWidth = 0.5 * dpr;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(n.x, n.y);
          ctx.stroke();
        }
        nodePositions.forEach((n, i) => {
          const pulse = Math.sin(t * 2 + i) * 0.3 + 0.7;
          const nodeGlow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 3);
          const isCyan = n.ring < 0.4;
          nodeGlow.addColorStop(0, isCyan
            ? `rgba(56,189,248,${pulse * (active ? 0.9 : 0.6)})`
            : `rgba(34,197,94,${pulse * (active ? 0.8 : 0.5)})`);
          nodeGlow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = nodeGlow;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = isCyan ? `rgba(56,189,248,${pulse})` : `rgba(34,197,94,${pulse})`;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * (active ? 1 : 0.8), 0, Math.PI * 2);
          ctx.fill();
        });
        frameRef.current = requestAnimationFrame(draw);
      }
      draw();
      return () => cancelAnimationFrame(frameRef.current);
    }, [size, active, processing]);
    return (
      <canvas
        ref={canvasRef}
        style={{ width: size, height: size, borderRadius: "50%" }}
      />
    );
  }

  const PARLIAMENT_PROCESS = `Here\u2019s how legislation moves through Parliament \u2014 it\u2019s worth understanding because it directly affects when your compliance obligations change.\n\nA Bill starts with a First Reading \u2014 essentially a formal introduction, no debate. Then Second Reading, where the principle of the Bill is debated. Committee Stage follows, where it\u2019s examined line by line. Report Stage brings amendments to the full House, and Third Reading is the final vote.\n\nAfter one House passes it, the process repeats in the other House. If they make changes, it goes back and forth (\u2018ping pong\u2019) until both Houses agree.\n\nBut here\u2019s the part that matters most for your compliance planning: many provisions don\u2019t come into force when they receive Royal Assent. They require commencement orders \u2014 separate statutory instruments that bring specific sections into force on specific dates. That\u2019s why ERA 2025 exists as law but many of its provisions aren\u2019t yet live. Your Legislative Tracker monitors these commencement dates.`;

  const TRIBUNAL_PROCESS = `The employment tribunal process has several stages, and understanding them helps you prepare properly.\n\nFirst, ACAS Early Conciliation \u2014 mandatory before any claim. The employee contacts ACAS, you\u2019re notified, and there\u2019s a period (usually one month, extendable to six weeks) to try to resolve it. About 60% of cases settle at this stage.\n\nIf conciliation doesn\u2019t work, the employee files an ET1 claim form. You respond with an ET3 \u2014 usually within 28 days. Missing this deadline can mean a default judgment.\n\nThen there\u2019s typically a Preliminary Hearing to sort out case management \u2014 what the issues are, what evidence is needed, and the timetable.\n\nThe Full Hearing is where evidence is heard. You\u2019ll need witness statements, a bundle of documents, and potentially expert evidence. Hearings can last from a day to several weeks.\n\nRemedies if the employee succeeds: reinstatement (rare), re-engagement (also rare), or compensation. Basic award (calculated like redundancy pay) plus compensatory award (capped at the lower of one year\u2019s pay or the statutory cap, currently around \u00A3115,000 \u2014 but uncapped for discrimination and whistleblowing).\n\nThe reason this matters for your documents is that tribunals scrutinise your procedures closely. If your handbook doesn\u2019t reflect current law, that\u2019s evidence of non-compliance.`;

  const GRIEVANCE_PROCESS = `When an employee raises a grievance, the process needs to follow the ACAS Code of Practice. Here\u2019s the structure.\n\nThe employee should put their grievance in writing. Then you hold a meeting without unreasonable delay. The employee has the right to be accompanied by a colleague or trade union representative.\n\nAfter the meeting, you investigate and communicate your decision in writing. The investigation needs to be proportionate to the grievance \u2014 a complaint about car parking doesn\u2019t need a six-week investigation, but an allegation of bullying does.\n\nThe employee must have a right of appeal to a more senior manager where possible. The appeal should be a genuine review, not a rubber stamp.\n\nWhat matters in practice: document everything. The investigation needs to be thorough and fair. If it reaches a tribunal, they\u2019ll look at whether you followed a fair process \u2014 not just whether the outcome was right.\n\nIf you\u2019re dealing with a specific grievance right now, this is one of those areas where speaking to a qualified professional early is valuable. It\u2019s much cheaper to get the process right at the start than to defend a claim later.`;

  const DISCIPLINARY_PROCESS = `The disciplinary process needs to follow the ACAS Code of Practice \u2014 here\u2019s the framework.\n\nFirst, investigate. Gather facts before taking any action. The investigation should be proportionate \u2014 establish whether there\u2019s a case to answer.\n\nIf there is, write to the employee setting out the allegations and the evidence. Give them reasonable time to prepare.\n\nThe disciplinary meeting: the employee has the right to be accompanied. Present the evidence, hear their response, and adjourn to consider.\n\nPossible outcomes: no action, first written warning, final written warning, or dismissal. The sanction must be proportionate. What constitutes gross misconduct should be defined in your handbook.\n\nRight of appeal \u2014 this is essential. The appeal should be heard by someone more senior who wasn\u2019t involved in the original decision.\n\nYour handbook covers the basic structure, but the detail on what constitutes gross misconduct needs reviewing against current case law.\n\nFor any live disciplinary situation, professional advice at the outset is valuable \u2014 particularly if dismissal is a possible outcome.`;

  const DOC_TYPES = `Good question \u2014 they serve different legal purposes and carry different compliance obligations.\n\nYour employment contract is the binding legal agreement between you and each employee. It must include the written particulars required by ERA 1996 s.1: job title, pay, hours, holiday, notice period, pension, and more. Changes require agreement or a fair process.\n\nYour employee handbook contains the policies and procedures that govern the employment relationship day-to-day: disciplinary, grievance, absence, flexible working, data protection, whistleblowing. These are typically non-contractual \u2014 but if incorporated into the contract (by reference or by practice), they become binding.\n\nThe critical difference: changing a contract term requires employee consent or a fair process (potentially with fire-and-rehire risks). Changing a handbook policy requires consultation but not individual consent \u2014 unless it\u2019s been incorporated into the contract.\n\nFor your documents, the contract findings relate primarily to statutory compliance \u2014 the qualifying period issue. The handbook findings are procedural \u2014 your processes don\u2019t match current law.`;

  const EU_BREXIT = `Since Brexit, EU employment law doesn\u2019t directly apply to UK employers anymore. But the practical impact is smaller than you might expect.\n\nMost EU-derived employment protections were transposed into UK law before exit and are preserved by the Retained EU Law Act 2023. The Working Time Regulations, TUPE, anti-discrimination principles \u2014 all still in force.\n\nWhere it gets interesting is in interpretation. Pre-exit EU case law from the Court of Justice remains persuasive but not binding. UK courts can now depart from it. This creates a slow divergence that your compliance planning needs to account for.\n\nFor your compliance planning, the practical position is: the core protections are still in place, but the direction of travel is toward UK-specific interpretation. ERA 2025 represents the first major legislative divergence.`;

  const INTERNATIONAL = `Ailane covers UK employment law \u2014 that\u2019s our core. The ACEI, compliance checker, and Knowledge Library are all built around UK statutes, regulations, and tribunal decisions.\n\nIf you have employees working internationally, the jurisdictional questions get complex quickly. Which country\u2019s employment law applies depends on where the work is performed, the terms of the contract, and sometimes the nationality of the employer.\n\nAt Institutional tier, we extend into EU regulatory monitoring and some international statute tracking. But for your current operations across Cardiff, Swansea, Bristol, and Birmingham \u2014 you\u2019re fully within UK jurisdiction and the platform covers everything you need.`;

  const WELSH_LANG = `Good question, and particularly relevant given your Cardiff headquarters.\n\nFour Acts have official Welsh texts with equal legal standing: the Welsh Language Act 1993, the Government of Wales Act 2006, the Welsh Language (Wales) Measure 2011, and the Legislation (Wales) Act 2019.\n\nFor employment purposes, the Welsh Language Standards can require bilingual policies, communications, and service delivery for organisations dealing with the public in Wales. Whether they apply to you depends on your client contracts and public-facing operations.\n\nThe Knowledge Library includes instruments with Welsh language relevance. Something worth checking given your Cardiff and Swansea operations.`;

  const DEVOL_GEN = `Employment law is mostly reserved to Westminster \u2014 the same core legislation applies across England, Scotland, and Wales. But there are important devolved intersections.\n\nHealth and safety enforcement can operate differently across devolved jurisdictions. Public sector equality duties have devolved elements. And the interplay between reserved employment law and devolved areas like education, health, and local government creates complexity.\n\nNorthern Ireland is the significant exception \u2014 employment law is substantially devolved there with separate but parallel legislation.\n\nFor a company operating across Cardiff, Swansea, Bristol, and Birmingham, you\u2019re primarily in a unified legal framework with Welsh language considerations for your Welsh sites.`;

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {CATS.map((c) => (
                    <div key={c.id} onClick={() => setXC(xC === c.id ? null : c.id)} style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 8, padding: "12px 16px", cursor: "pointer" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontSize: 13 }}>{c.n}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ color: tc2(c.t), fontSize: 12 }}>{ti(c.t)}</span>
                          <span style={{ fontWeight: 700, color: bc(c.s), fontFamily: "'Space Mono',monospace", fontSize: 16 }}>{c.s}</span>
                        </div>
                      </div>
                      {xC === c.id && (
                        <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #1e293b", fontSize: 12, color: "#94a3b8", lineHeight: 1.5 }}>
                          <div>{c.i}</div>
                          <div style={{ marginTop: 6, color: "#64748b" }}>{c.c.toLocaleString()} tribunal decisions in the last 12 months</div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* DOCUMENTS */}
            {sec === "documents" && (
              <div>
                <SH t="Compliance Documents" s="5 slots \u00B7 Full analysis \u00B7 Auto-rescanned on legislative change" />
                <div style={{ display: "grid", gap: 12 }}>
                  {DOCS.map((d, i) => (
                    <div key={i} style={{ background: "#0A1628", border: `1px solid ${d.type === "empty" ? "#1e293b" : d.status === "flagged" ? "#f59e0b30" : "#1e293b"}`, borderRadius: 10, padding: 16 }}>
                      {d.type === "empty" ? (
                        <div style={{ textAlign: "center", color: "#475569", fontSize: 13 }}>Empty slot \u2014 upload a contract, handbook, or policy</div>
                      ) : (
                        <div>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 14 }}>{d.name}</div>
                              <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>Uploaded {d.uploaded}</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontSize: 28, fontWeight: 700, color: bc(d.score), fontFamily: "'Space Mono',monospace" }}>{d.score}%</div>
                              <div style={{ fontSize: 10, color: "#64748b" }}>{d.gaps} gaps \u00B7 {d.crit} critical</div>
                            </div>
                          </div>
                          {d.status === "flagged" && (
                            <div style={{ marginTop: 10, padding: "8px 12px", background: "rgba(245,158,11,0.08)", borderRadius: 6, fontSize: 12, color: "#f59e0b" }}>
                              \u26A0 {d.crit} critical finding{d.crit > 1 ? "s" : ""} \u2014 ask Eileen "why is this flagged?"
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* KNOWLEDGE LIBRARY */}
            {sec === "library" && (
              <div>
                <SH t="UK Knowledge Library" s="47 instruments \u00B7 Full read-only access" />
                <p style={{ fontSize: 13, color: "#94a3b8", marginBottom: 16 }}>Browse all UK employment law instruments. Ask Eileen about any statute.</p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {KL_I.map((item, i) => (
                    <div key={i} style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 6, padding: "10px 14px", fontSize: 13 }}>{item}</div>
                  ))}
                  <div style={{ background: "#0A1628", border: "1px dashed #334155", borderRadius: 6, padding: "10px 14px", fontSize: 13, color: "#475569" }}>+ 35 more instruments available</div>
                </div>
                <div style={{ marginTop: 16, padding: "12px 16px", background: "rgba(168,85,247,0.06)", borderRadius: 8, fontSize: 12, color: "#a855f7" }}>\uD83D\uDD12 AI-powered search & analysis available at Governance tier</div>
              </div>
            )}
            {/* TICKER */}
            {sec === "ticker" && (
              <div>
                <SH t="Regulatory Ticker" s="UK events \u00B7 Significance filtered \u00B7 Your sector" />
                <div style={{ display: "grid", gap: 10 }}>
                  {TICKER_D.map((t) => (
                    <div key={t.id} style={{ background: tpb(t.type), border: `1px solid ${tpc(t.type)}30`, borderRadius: 8, padding: 16 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 11, color: tpc(t.type), fontWeight: 600, textTransform: "uppercase" }}>{t.type}</span>
                        <span style={{ fontSize: 11, color: "#64748b" }}>{t.date}</span>
                      </div>
                      <div style={{ fontSize: 13, lineHeight: 1.4 }}>{t.title}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}>
                        <span style={{ fontSize: 11, color: "#64748b" }}>Significance:</span>
                        <div style={{ width: 60, height: 4, background: "#1e293b", borderRadius: 2 }}>
                          <div style={{ width: `${t.sig}%`, height: "100%", background: tpc(t.type), borderRadius: 2 }} />
                        </div>
                        <span style={{ fontSize: 11, color: "#94a3b8" }}>{t.sig}/100</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* LEGISLATION */}
            {sec === "legislation" && (
              <div>
                <SH t="Legislative Tracker" s="Commencement tracking" />
                <div style={{ display: "grid", gap: 10 }}>
                  {LEGIS_D.map((l, i) => (
                    <div key={i} style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 8, padding: 16 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontWeight: 600, fontSize: 14 }}>{l.name}</span>
                        <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 12, background: l.stage === "In Force" ? "rgba(34,197,94,0.1)" : "rgba(245,158,11,0.1)", color: l.stage === "In Force" ? "#22c55e" : "#f59e0b" }}>{l.stage}</span>
                      </div>
                      <div style={{ fontSize: 12, color: "#64748b", marginTop: 6 }}>Commencement: {l.cd} \u00B7 Significance: {l.sig} \u00B7 Affects categories: {l.cats.join(", ")}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* TRIBUNAL */}
            {sec === "tribunal" && (
              <div>
                <SH t="Tribunal Digest" s="Claims \u00B7 Compensation \u00B7 Trends" />
                <div style={{ display: "grid", gap: 10 }}>
                  {TRIB_D.map((t, i) => (
                    <div key={i} style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 8, padding: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{t.cat}</div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>{t.claims.toLocaleString()} claims \u00B7 Avg: {t.avg}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ color: tc2(t.t), fontSize: 14 }}>{ti(t.t)}</span>
                        <span style={{ fontSize: 11, color: tc2(t.t) }}>{t.t}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* ALERTS */}
            {sec === "alerts" && (
              <div>
                <SH t="Alerts" s="Weekly digest" />
                {ALERTS_D.map((a) => (
                  <div key={a.id} style={{ background: "#0A1628", border: `1px solid ${sc(a.sev)}30`, borderRadius: 8, padding: 14, marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: sc(a.sev) }} />
                        <span style={{ fontSize: 13 }}>{a.msg}</span>
                      </div>
                      <span style={{ fontSize: 11, color: "#64748b" }}>{a.date}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {/* REL */}
            {sec === "rel" && (
              <div>
                <SH t="Regulatory Event Log" s="CREE intelligence" />
                <div style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 10, padding: 20 }}>
                  <p style={{ color: "#64748b", fontSize: 13, margin: 0 }}>Regulatory Event Log collects client-reported enforcement events (CREE) under ACEI-AM-2026-003. Available at all tiers.</p>
                  <p style={{ color: "#475569", fontSize: 12, marginTop: 8 }}>Minimum threshold: \u22655 events from \u22653 clients before data appears.</p>
                </div>
              </div>
            )}
            {/* REPORTS */}
            {sec === "reports" && (
              <div>
                <SH t="Reports" s="Monthly ACEI PDF" />
                <div style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 10, padding: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 600 }}>Monthly ACEI Report</div>
                      <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>Domain score, 12-category breakdown, document summary</div>
                    </div>
                    <span style={{ fontSize: 11, color: "#38bdf8", background: "rgba(56,189,248,0.08)", padding: "6px 12px", borderRadius: 6 }}>Generate PDF</span>
                  </div>
                </div>
                <div style={{ marginTop: 12, padding: "12px 16px", background: "rgba(168,85,247,0.06)", borderRadius: 8, fontSize: 12, color: "#a855f7" }}>\uD83D\uDD12 Board-ready PDF with executive summary available at Governance tier</div>
              </div>
            )}
            {/* WORKSPACE */}
            {sec === "workspace" && (
              <div>
                <SH t="Workspace" s="Notes, drafts \u00B7 100MB" />
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {["notes", "drafts"].map((tab) => (
                    <button key={tab} onClick={() => setWsT(tab)} style={{ padding: "6px 16px", background: wsT === tab ? "rgba(56,189,248,0.08)" : "transparent", border: `1px solid ${wsT === tab ? "#38bdf8" : "#1e293b"}`, borderRadius: 6, color: wsT === tab ? "#38bdf8" : "#64748b", cursor: "pointer", fontSize: 12 }}>{tab}</button>
                  ))}
                </div>
                {wsT === "notes" && (
                  <div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                      <input value={nI} onChange={(e) => setNI(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addNote()} placeholder="Add a note..." style={{ flex: 1, padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }} />
                      <button onClick={addNote} style={{ padding: "8px 16px", background: "#38bdf8", border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontSize: 13 }}>Add</button>
                    </div>
                    {notes.map((n) => (
                      <div key={n.id} style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 8, padding: 14, marginBottom: 8 }}>
                        <div style={{ fontSize: 13, lineHeight: 1.4, whiteSpace: "pre-wrap" }}>{n.text}</div>
                        <div style={{ fontSize: 10, color: "#64748b", marginTop: 6 }}>{n.source} \u00B7 {n.date}</div>
                      </div>
                    ))}
                  </div>
                )}
                {wsT === "drafts" && (
                  <div style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 10, padding: 20 }}>
                    <p style={{ color: "#64748b", fontSize: 13, margin: 0 }}>Save Eileen conversations as drafts from the chat panel.</p>
                  </div>
                )}
              </div>
            )}
            {/* CALENDAR */}
            {sec === "calendar" && (
              <div>
                <SH t="Calendar" s="Reminders \u00B7 Deadlines" />
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {["upcoming", "add"].map((tab) => (
                    <button key={tab} onClick={() => setCT(tab)} style={{ padding: "6px 16px", background: cT === tab ? "rgba(56,189,248,0.08)" : "transparent", border: `1px solid ${cT === tab ? "#38bdf8" : "#1e293b"}`, borderRadius: 6, color: cT === tab ? "#38bdf8" : "#64748b", cursor: "pointer", fontSize: 12 }}>{tab}</button>
                  ))}
                </div>
                {cT === "upcoming" && (
                  <div>
                    {evts.sort((a, b) => new Date(a.date) - new Date(b.date)).map((e) => (
                      <div key={e.id} style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 8, padding: 14, marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <span style={{ fontWeight: 600, fontSize: 13 }}>{e.title}</span>
                          <span style={{ fontSize: 11, color: "#64748b" }}>{e.date}</span>
                        </div>
                        {e.note && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{e.note}</div>}
                      </div>
                    ))}
                  </div>
                )}
                {cT === "add" && (
                  <div style={{ background: "#0A1628", border: "1px solid #1e293b", borderRadius: 10, padding: 20 }}>
                    <div style={{ display: "grid", gap: 10 }}>
                      <input value={nE.title} onChange={(e) => setNE({ ...nE, title: e.target.value })} placeholder="Event title" style={{ padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }} />
                      <input type="date" value={nE.date} onChange={(e) => setNE({ ...nE, date: e.target.value })} style={{ padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }} />
                      <input value={nE.note} onChange={(e) => setNE({ ...nE, note: e.target.value })} placeholder="Notes (optional)" style={{ padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }} />
                      <button onClick={addEvt} style={{ padding: "10px", background: "#38bdf8", border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontSize: 13 }}>Add Event</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
        {/* EILEEN PANEL */}
        {eO && !eM && (
          <div style={{ position: "fixed", bottom: 20, right: 20, width: 420, maxHeight: "75vh", background: "#0A1628", border: "1px solid #1e293b", borderRadius: 16, display: "flex", flexDirection: "column", boxShadow: "0 8px 32px rgba(0,0,0,0.4)", zIndex: 100 }}>
            <div style={{ padding: "12px 16px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <NexusAvatar size={32} active={eO} processing={eileenThinking || voicePlaying} />
                <span style={{ fontWeight: 600, fontSize: 14 }}>Eileen</span>
                <span style={{ fontSize: 10, color: "#64748b" }}>Operational</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <button onClick={() => { if (voicePlaying) stopVoice(); else setVoiceOn(!voiceOn); }} style={{ background: voiceOn ? "rgba(56,189,248,0.15)" : "none", border: `1px solid ${voiceOn ? "#38bdf8" : "#1e293b"}`, borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 14, color: voiceOn ? "#38bdf8" : "#64748b" }} title={voiceOn ? "Voice enabled" : "Enable voice"}>
                  {voicePlaying ? "\uD83D\uDD0A" : "\uD83D\uDD08"}
                </button>
                <button onClick={() => setEM(true)} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 16 }}>\u2014</button>
                <button onClick={() => setEO(false)} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 16 }}>\u00D7</button>
              </div>
            </div>
            <div ref={cr} style={{ flex: 1, overflowY: "auto", padding: "14px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
              {msgs.map((m, i) => (
                <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
                  <div style={{ maxWidth: "85%", padding: "10px 14px", borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px", background: m.role === "user" ? "rgba(56,189,248,0.12)" : "#0f172a", fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>
                    {m.text}
                  </div>
                </div>
              ))}
              {wt >= 0 && wt < WT.length && (
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
                  {WT[wt].acts.map((a, i) => (
                    <button key={i} onClick={() => wtAct(i)} style={{ padding: "8px 14px", background: "rgba(56,189,248,0.06)", border: "1px solid rgba(56,189,248,0.2)", borderRadius: 8, color: "#38bdf8", cursor: "pointer", fontSize: 12 }}>{a}</button>
                  ))}
                </div>
              )}
              {sSC && (
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  <button onClick={() => saveChat(true)} style={{ padding: "8px 14px", background: "rgba(56,189,248,0.06)", border: "1px solid rgba(56,189,248,0.2)", borderRadius: 8, color: "#38bdf8", cursor: "pointer", fontSize: 12 }}>Summary</button>
                  <button onClick={() => saveChat(false)} style={{ padding: "8px 14px", background: "rgba(56,189,248,0.06)", border: "1px solid rgba(56,189,248,0.2)", borderRadius: 8, color: "#38bdf8", cursor: "pointer", fontSize: 12 }}>Full conversation</button>
                </div>
              )}
            </div>
            <div style={{ padding: "10px 16px", borderTop: "1px solid #1e293b", display: "flex", gap: 10, alignItems: "center" }}>
              <input
                value={inp} onChange={(e) => setInp(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()}
                placeholder="Ask Eileen about employment law, your findings, processes..."
                style={{ flex: 1, padding: "10px 14px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, color: "#e2e8f0", fontSize: 13, outline: "none" }}
              />
              <button onClick={send} style={{ width: 44, height: 44, borderRadius: "50%", background: inp.trim() ? "rgba(56,189,248,0.08)" : "transparent", border: inp.trim() ? "1px solid rgba(56,189,248,0.25)" : "1px solid #1e293b", cursor: inp.trim() ? "pointer" : "default", padding: 0, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", flexShrink: 0 }} title="Send to Eileen">
                <NexusAvatar size={38} active={!!inp.trim()} processing={eileenThinking} />
              </button>
            </div>
            {voiceOn && (
              <div style={{ padding: "4px 16px 6px", fontSize: 10, color: "#38bdf8", display: "flex", justifyContent: "space-between" }}>
                <span>\uD83C\uDFA4</span>
                <span>{voicePlaying ? "Speaking..." : `Voice: ${selectedVoiceRef.current?.name || "loading..."}`}</span>
                {voicePlaying && (<button onClick={stopVoice} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 10 }}>Stop</button>)}
              </div>
            )}
            <div style={{ height: 3, background: "linear-gradient(90deg, #38bdf8, #22c55e)", borderRadius: "0 0 16px 16px" }} />
          </div>
        )}
        {(eM || !eO) && (
          <button onClick={() => { setEO(true); setEM(false); }} style={{ position: "fixed", bottom: 20, right: 20, width: 60, height: 60, borderRadius: "50%", background: "#0A1628", border: "1px solid #1e293b", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 16px rgba(0,0,0,0.3)", zIndex: 100 }}>
            <NexusAvatar size={52} active={false} processing={false} />
          </button>
        )}
        <footer style={{ background: "#0A1628", borderTop: "1px solid #1e293b", padding: "8px 24px", display: "flex", justifyContent: "space-between", fontSize: 10, color: "#475569", flexShrink: 0 }}>
          <span>AI Lane Limited (Company No. 17035654) \u00B7 ailane.ai \u00B7 Governed by AILANE-AMD-REG-001</span>
          <span>ACEI v1.0 \u00B7 RRI v1.0 \u00B7 CCI v1.0</span>
        </footer>
      </div>
    );
  }

  // Render
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Dashboard />);
  </script>

</body>
</html>
