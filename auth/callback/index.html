<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in — Ailane</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://js.stripe.com https://www.googletagmanager.com https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.stripe.com https://www.google-analytics.com; connect-src 'self' https://cnbsxwtvazfvzmltkuvx.supabase.co https://cnbsxwtvazfvzmltkuvx.functions.supabase.co https://api.stripe.com https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#060D1B;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
    .wrap{text-align:center;color:#fff}
    .brand{font-size:1.6rem;font-weight:700;letter-spacing:0.15em;margin-bottom:12px}
    .status{font-size:0.95rem;color:rgba(255,255,255,0.5)}
    .spinner{width:36px;height:36px;border:3px solid rgba(56,189,248,0.15);border-top-color:#38bdf8;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 18px}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
  <!-- Ailane favicon / app icons — estate head standard (AMD-246) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0e1a">
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="brand">AILANE</div>
    <div class="status" id="st">Signing you in...</div>
  </div>
  <script>
  var SB_URL='https://cnbsxwtvazfvzmltkuvx.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
  var sb=window.supabase.createClient(SB_URL,SB_KEY);
  function st(m){var e=document.getElementById('st');if(e)e.textContent=m}
  function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
  function dest(t){
    if(t==='operational'||t==='operational_readiness')return'/operational/';
    if(t==='governance')return'/governance/';
    if(t==='enterprise'||t==='institutional')return'/enterprise/';
    if(t==='per_session'||t==='monthly'||t==='guest_free'||t==='guest')return'/knowledge-library/';
    return'/login/';
  }
  async function getTier(token){
    var p=JSON.parse(atob(token.split('.')[1]));
    var r=await fetch(SB_URL+'/rest/v1/kl_account_profiles?select=subscription_tier&user_id=eq.'+p.sub+'&limit=1',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Accept':'application/json'}
    });
    if(!r.ok)return null;
    var rows=await r.json();
    return(rows&&rows.length>0)?rows[0].subscription_tier:null;
  }
  // KL per-session entitlement (brief §1 · KLUI-001). RULE 2 raw-fetch Bearer, mirroring the
  // vault's own gate on /knowledge-library/ and /login/'s checkKLSession: same RPC + p_user_id;
  // live = a row whose expires_at is in the future — the exact signal /knowledge-library/ uses
  // to grant access. A KL pass holder has subscription_tier=NULL, so getTier→null and
  // dest(null)→'/login/'; this lets a live pass carry them to the vault instead. Fails closed to
  // false on any non-OK/parse/network error. No service key, no new secret — the user's own JWT.
  async function hasLiveKlPass(token){
    try{
      var p=JSON.parse(atob(token.split('.')[1]));
      if(!p.sub)return false;
      var r=await fetch(SB_URL+'/rest/v1/rpc/kl_session_entitlement',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({p_user_id:p.sub})
      });
      if(!r.ok)return false;
      var rows=await r.json();
      var ent=Array.isArray(rows)?(rows[0]||null):(rows||null);
      return !!(ent&&ent.expires_at&&new Date(ent.expires_at).getTime()>Date.now());
    }catch(e){return false}
  }
  (async function(){
    try{
      var session=null;
      var params=new URLSearchParams(window.location.search);
      if(params.has('code')){
        st('Completing sign-in...');
        try{var cr=await sb.auth.exchangeCodeForSession(params.get('code'));if(cr.data&&cr.data.session)session=cr.data.session}catch(e){}
      }
      if(!session){for(var i=0;i<8;i++){var g=await sb.auth.getSession();if(g.data&&g.data.session){session=g.data.session;break}if(i<7)await sleep(500)}}
      if(!session){
        if(params.has('checkout')){
          try{if(window.gtag)gtag('event','subscription_checkout_landed',{method:'stripe'})}catch(e){}
          var sp=document.querySelector('.spinner');if(sp)sp.style.display='none';
          var br=document.querySelector('.brand');if(br)br.textContent='AILANE';
          st('Payment received — your account is being set up. Your secure sign-in link is on its way to your email (usually within a minute). Open it on this device to enter your workspace. If it has not arrived in a few minutes, check your spam folder or contact support@ailane.ai.');
          return;
        }
        window.location.replace('/login/');return}
      // LOVR P0 — reviewer routing: an active legal reviewer enters the Legal Oversight Room.
      // RULE 2: JWT decode + raw fetch only (never sb.from() at the callback). Additive — on any
      // miss/error this falls through to the existing tier routing below, untouched.
      try{
        var rvSub=JSON.parse(atob(session.access_token.split('.')[1])).sub;
        var rvRes=await fetch(SB_URL+'/rest/v1/legal_reviewer_contacts?user_id=eq.'+rvSub+'&status=eq.active&select=contact_id',{
          headers:{'apikey':SB_KEY,'Authorization':'Bearer '+session.access_token,'Accept':'application/json'}
        });
        if(rvRes.ok){var rvRows=await rvRes.json();if(Array.isArray(rvRows)&&rvRows.length>0){window.location.replace('/legal-oversight/');return}}
      }catch(e){}
      st('Loading your dashboard...');
      var tier=await getTier(session.access_token);
      var d=dest(tier);
      // returnTo: redirect preservation (P0 — KLUI-001 workspace redirect)
      // Honour stored returnTo instead of default tier route, if valid.
      // Also accept a returnTo query param, so /account/?returnTo=/knowledge-library/
      // from the KL auth guard fallback works without sessionStorage plumbing.
      var returnTo=sessionStorage.getItem('ailane_returnTo')||params.get('returnTo');
      sessionStorage.removeItem('ailane_returnTo');
      if(returnTo){
        var allowedPrefixes=['/account/','/intelligence/','/governance-dashboard/','/knowledge-library/','/partners/','/billing/'];
        var isAllowed=allowedPrefixes.some(function(p){return returnTo.startsWith(p)});
        if(isAllowed)d=returnTo;
      }
      try{if(window.gtag)gtag('event','login',{method:'callback',subscription_tier:tier||'none'})}catch(e){}
      // KL per-session routing (brief §1): only when the subscription-tier routing would
      // otherwise dead-end at /login/ (no recognised tier, no valid returnTo) do we check the
      // pass — a live KL entitlement carries the buyer to the vault. Subscription (Operational/
      // Governance/Enterprise), reviewer and returnTo-allowlist routing above are untouched.
      if(d==='/login/'&&await hasLiveKlPass(session.access_token))d='/knowledge-library/';
      window.location.replace(d);
    }catch(e){window.location.replace('/login/?error=callback_failed')}
  })();
  </script>
</body>
</html>
