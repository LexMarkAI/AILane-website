<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in — Ailane</title>
  <!-- GA4 — REQUIRED ON EVERY PAGE -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060d1a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .wrap { text-align: center; color: #fff; }
    .brand { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 12px; }
    .status { font-size: 0.95rem; color: rgba(255,255,255,0.6); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(56,189,248,0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="brand">AILANE</div>
    <div class="status" id="status-msg">Signing you in...</div>
  </div>

  <script>
  (async function() {
    var SUPABASE_URL  = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzkxNTM5NjAsImV4cCI6MjA1NDcyOTk2MH0.1TYFiSdOeMHLH_dPBR-YB2JlAgrLH3F7G9k7WlDVZ5g';

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── Utility: update status text ──────────────────────────────────────
    function setStatus(msg) {
      var el = document.getElementById('status-msg');
      if (el) el.textContent = msg;
    }

    // ── Utility: sleep ───────────────────────────────────────────────────
    function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

    // ── Step 1: Read UTM data from sessionStorage ────────────────────────
    var storedUtm = sessionStorage.getItem('ailane_utm');
    var utmData = {};
    try { if (storedUtm) utmData = JSON.parse(storedUtm); } catch(e) {}

    try {
      var session = null;

      // ── Step 2: Check for OAuth code (PKCE flow) ──────────────────────
      var params = new URLSearchParams(window.location.search);
      var hasCode = params.has('code');

      if (hasCode) {
        setStatus('Completing sign-in...');
        var result = await sb.auth.exchangeCodeForSession(params.get('code'));
        if (result.data && result.data.session) {
          session = result.data.session;
        }
      }

      // ── Step 3: No code or code failed — get existing session ─────────
      //    Retry up to 6 times (3 seconds) for password-flow propagation
      if (!session) {
        for (var attempt = 0; attempt < 6; attempt++) {
          var gs = await sb.auth.getSession();
          if (gs.data && gs.data.session) {
            session = gs.data.session;
            break;
          }
          if (attempt < 5) await sleep(500);
        }
      }

      // ── Step 4: Still no session — bail cleanly ───────────────────────
      if (!session) {
        window.location.replace('/account/?error=no_session');
        return;
      }

      // ── Step 5: Decode JWT for user ID ────────────────────────────────
      var userId, isNewUser;
      try {
        var payload = JSON.parse(atob(session.access_token.split('.')[1]));
        userId = payload.sub;
        var created = session.user ? new Date(session.user.created_at) : null;
        isNewUser = created ? (new Date() - created < 15000) : false;
      } catch(e) {
        window.location.replace('/account/?error=jwt_decode_failed');
        return;
      }

      // ── Step 6: Query profile — raw fetch with Bearer token ───────────
      //    CANONICAL PATTERN: never use sb.from() at callback time
      var tier = null;
      try {
        var resp = await fetch(
          SUPABASE_URL + '/rest/v1/kl_account_profiles?select=subscription_tier&user_id=eq.' + userId + '&limit=1',
          {
            headers: {
              'apikey':        SUPABASE_ANON,
              'Authorization': 'Bearer ' + session.access_token,
              'Accept':        'application/json'
            }
          }
        );
        if (resp.ok) {
          var rows = await resp.json();
          if (rows && rows.length > 0) tier = rows[0].subscription_tier;
        }
      } catch(e) { /* fall through — tier stays null */ }

      // ── Step 7: Routing matrix — LOCKED RULES ─────────────────────────
      var destination = '/account/';  // default: no profile → registration
      if (tier === 'per_session' || tier === 'monthly' || tier === 'guest_free' || tier === 'guest') {
        destination = '/account/dashboard/';
      } else if (tier === 'operational' || tier === 'operational_readiness') {
        destination = '/intelligence/';
      } else if (tier === 'governance' || tier === 'institutional') {
        destination = '/governance-dashboard/';
      }

      // ── Step 8: Fire GA4 conversion event (non-blocking) ──────────────
      try {
        if (window.gtag) {
          gtag('event', isNewUser ? 'sign_up' : 'login', {
            method:            utmData.utm_source  || 'direct',
            campaign:          utmData.utm_campaign || 'none',
            subscription_tier: tier || 'none'
          });
        }
      } catch(e) {}

      // ── Step 9: Append UTMs to destination, clean up, redirect ────────
      try {
        var destUrl = new URL(destination, window.location.origin);
        Object.entries(utmData).forEach(function(kv) {
          destUrl.searchParams.set(kv[0], kv[1]);
        });
        sessionStorage.removeItem('ailane_utm');
        window.location.replace(destUrl.toString());
      } catch(e) {
        window.location.replace(destination);
      }

    } catch(err) {
      window.location.replace('/account/?error=router_error');
    }
  })();
  </script>
</body>
</html>
