<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ailane — Signing in</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0A2240;display:flex;align-items:center;
  justify-content:center;height:100vh;margin:0;font-family:Arial,sans-serif;">
  <div style="text-align:center;color:#ffffff;">
    <div style="font-size:28px;font-weight:700;letter-spacing:2px;">AILANE</div>
    <div style="font-size:14px;margin-top:12px;opacity:0.7;">Signing you in...</div>
  </div>
  <script>
    const SUPABASE_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function routeUser(session) {
      // Retrieve UTM data captured before auth
      const storedUtm = sessionStorage.getItem('ailane_utm');
      const utmData = storedUtm ? JSON.parse(storedUtm) : {};

      // Fire GA4 login event
      if (typeof gtag !== 'undefined') {
        gtag('event', 'login', {
          method: utmData.utm_source || 'direct',
          ...utmData
        });
      }

      // Resolve org ID — sole permitted mechanism
      const { data: orgId, error: orgError } = await supabase.rpc('get_my_org_id');

      if (orgError || !orgId) {
        window.location.replace('/account/?error=no_org');
        return;
      }

      // Query organisations directly — organisation_subscriptions does not exist
      const { data: orgData, error: orgErr } = await supabase
        .from('organisations')
        .select('tier, status')
        .eq('id', orgId)
        .single();

      if (orgErr || !orgData || orgData.status !== 'active') {
        window.location.replace('/account/#upgrade');
        return;
      }

      // Build UTM string for attribution continuity
      const utmString = storedUtm
        ? '?' + new URLSearchParams(JSON.parse(storedUtm)).toString()
        : '';

      // Route by tier: 'governance' | 'institutional' | 'operational_readiness'
      const tier = orgData.tier;

      if (tier === 'governance' || tier === 'institutional') {
        window.location.replace('/governance-dashboard/' + utmString);
      } else {
        // operational_readiness and any other tier → operational dashboard
        window.location.replace('/account/dashboard/' + utmString);
      }
    }

    (async () => {
      // Step 1 — Capture UTM parameters before any auth call
      const utmKeys = ['utm_source','utm_medium','utm_campaign',
                       'utm_content','utm_term','gclid'];
      const params = new URLSearchParams(window.location.search);
      const utmData = {};
      utmKeys.forEach(k => { if (params.get(k)) utmData[k] = params.get(k); });
      if (Object.keys(utmData).length) {
        sessionStorage.setItem('ailane_utm', JSON.stringify(utmData));
      }

      // Step 2 — Check for existing valid session FIRST
      // Do not call exchangeCodeForSession on an already-authenticated user
      const { data: { session: existingSession } } = await supabase.auth.getSession();
      if (existingSession) {
        await routeUser(existingSession);
        return;
      }

      // Step 3 — Exchange code for session (new authentication only)
      const code = params.get('code');
      if (!code) {
        window.location.replace('/account/');
        return;
      }
      const { data: { session }, error } = await supabase.auth.exchangeCodeForSession(code);
      if (error || !session) {
        console.error('Session exchange failed:', error);
        window.location.replace('/account/?error=auth_failed');
        return;
      }
      await routeUser(session);
    })();
  </script>
</body>
</html>
