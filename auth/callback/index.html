<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in — Ailane</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTNXWZN31C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NTNXWZN31C');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .container {
      text-align: center;
      color: #fff;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 158, 11, 0.2);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Signing you in&hellip;</p>
  </div>

  <script>
  (async function() {
    try {
      const SUPABASE_URL  = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
      const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g';
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      // ── Step 1: Retrieve stored UTM data ─────────────────────────────────
      var utmData = {};
      try {
        var stored = sessionStorage.getItem('ailane_utm');
        if (stored) utmData = JSON.parse(stored);
      } catch(e) {}

      // ── Step 2: Exchange auth code for session ────────────────────────────
      var session = null;
      var user    = null;

      // Handle PKCE code exchange (OAuth + magic link)
      var params = new URLSearchParams(window.location.search);
      var code   = params.get('code');

      if (code) {
        var exchangeResult = await sb.auth.exchangeCodeForSession(window.location.search);
        if (exchangeResult.error || !exchangeResult.data.session) {
          window.location.replace('/account/?error=auth_failed');
          return;
        }
        session = exchangeResult.data.session;
        user    = exchangeResult.data.session.user;
      } else {
        // No code — check for existing session (password sign-in)
        var sessionResult = await sb.auth.getSession();
        if (sessionResult.error || !sessionResult.data.session) {
          window.location.replace('/account/?error=no_session');
          return;
        }
        session = sessionResult.data.session;
        user    = sessionResult.data.session.user;
      }

      if (!session || !user) {
        window.location.replace('/account/?error=no_session');
        return;
      }

      // ── Step 3: Determine if new user ─────────────────────────────────────
      var accountAge = new Date() - new Date(user.created_at);
      var isNewUser  = accountAge < 15000;

      // ── Step 4: Query subscription tier ──────────────────────────────────
      var profileResult = await sb
        .from('kl_account_profiles')
        .select('subscription_tier')
        .eq('user_id', user.id)
        .single();

      var tier = profileResult.data ? profileResult.data.subscription_tier : null;

      // ── Step 5: Determine destination ────────────────────────────────────
      var destination = '/account/';
      if (tier === 'per_session' || tier === 'monthly' || tier === 'guest_free') {
        destination = '/account/dashboard/';
      } else if (tier === 'operational') {
        destination = '/intelligence/';
      } else if (tier === 'governance' || tier === 'institutional') {
        destination = '/governance-dashboard/';
      }
      // null / no profile → /account/ (already set as default)

      // ── Step 6: Fire GA4 conversion ───────────────────────────────────────
      try {
        if (window.gtag) {
          gtag('event', isNewUser ? 'sign_up' : 'login', {
            method:            utmData.utm_source  || 'direct',
            campaign:          utmData.utm_campaign || 'none',
            subscription_tier: tier || 'none'
          });
        }
      } catch(e) {}

      // ── Step 7: Append UTMs to destination, clear storage, redirect ───────
      try {
        var destUrl = new URL(destination, window.location.origin);
        Object.entries(utmData).forEach(function(kv) {
          destUrl.searchParams.set(kv[0], kv[1]);
        });
        sessionStorage.removeItem('ailane_utm');
        window.location.replace(destUrl.toString());
      } catch(e) {
        window.location.replace(destination);
      }

    } catch(err) {
      // Any unhandled error — redirect safely
      window.location.replace('/account/?error=router_error');
    }
  })();
  </script>

</body>
</html>
