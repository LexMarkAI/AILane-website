<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailane — Loading</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0d14; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'JetBrains Mono',monospace; }
  .wrap { text-align:center; }
  .logo { font-family:sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#e8eaf2; margin-bottom:28px; }
  .logo span { color:#c9a84c; }
  .spinner { width:32px; height:32px; border:2px solid #1e2840; border-top-color:#c9a84c; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .status { font-size:11px; color:#4a5270; letter-spacing:0.08em; }
  .error-box { display:none; background:#1a0a0a; border:1px solid rgba(224,82,82,0.3); border-radius:8px; padding:16px 24px; max-width:320px; margin-top:20px; }
  .error-title { color:#e05252; font-size:12px; font-weight:600; margin-bottom:6px; }
  .error-text { color:#8a92b2; font-size:11px; line-height:1.6; }
  .login-link { display:inline-block; margin-top:12px; color:#c9a84c; font-size:11px; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">ai<span>lane</span></div>
  <div class="spinner"></div>
  <div class="status" id="status">Authenticating session…</div>
  <div class="error-box" id="errorBox">
    <div class="error-title">Unable to load your dashboard</div>
    <div class="error-text" id="errorText">Session not found. Please sign in again.</div>
    <a class="login-link" href="/dashboard/">← Return to login</a>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://cnbsxwtvazfvzmltkuvx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk1MDU3ODIsImV4cCI6MjA1NTA4MTc4Mn0.t2oABiPFfZAGt5OFGGOCOq3-LeN0iBcF3dZhxWL6WlDVZ5g';
  const CEO_EMAIL = 'mark@ailane.ai';
  const PLAN_ROUTES = { starter:'/dashboard/operational/', growth:'/dashboard/governance/', enterprise:'/dashboard/institutional/', trial:'/dashboard/operational/' };
  function setStatus(msg) { document.getElementById('status').textContent = msg; }
  function showError(msg) { document.querySelector('.spinner').style.display='none'; document.getElementById('status').style.display='none'; document.getElementById('errorText').textContent=msg; document.getElementById('errorBox').style.display='block'; }
  async function getSession() {
    const keys = Object.keys(localStorage).filter(k => k.includes('supabase') || k.includes('sb-'));
    for (const key of keys) { try { const val = JSON.parse(localStorage.getItem(key)); if (val?.access_token) return val; if (val?.session?.access_token) return val.session; } catch {} }
    return null;
  }
  async function route() {
    setStatus('Authenticating session…');
    const session = await getSession();
    if (!session?.access_token) { showError('No active session found. Please sign in again.'); return; }
    let email = null;
    try { const payload = JSON.parse(atob(session.access_token.split('.')[1])); email = payload.email; } catch { showError('Session token could not be read. Please sign in again.'); return; }
    if (!email) { showError('Could not identify your account. Please sign in again.'); return; }
    if (email === CEO_EMAIL) { setStatus('Welcome back, Mark. Loading Command Centre…'); setTimeout(() => window.location.href = '/AiLaneCEO/', 600); return; }
    setStatus('Loading your organisation…');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/app_users?select=org_id,organisations(plan)&email=eq.${encodeURIComponent(email)}&limit=1`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${session.access_token}`, 'Accept': 'application/json' } });
      if (!res.ok) { showError(`Could not load your account details (${res.status}). Please contact support.`); return; }
      const data = await res.json();
      if (!data || data.length === 0) { showError('No organisation found for your account. Please contact support at support@ailane.ai'); return; }
      const plan = data[0]?.organisations?.plan;
      if (!plan || !PLAN_ROUTES[plan]) { showError(`Unrecognised subscription plan (${plan || 'none'}). Please contact support.`); return; }
      setStatus(`Loading your ${plan} dashboard…`);
      setTimeout(() => window.location.href = PLAN_ROUTES[plan], 500);
    } catch (err) { showError('Network error loading your account. Please try again.'); console.error(err); }
  }
  route();
</script>
</body>
</html>
