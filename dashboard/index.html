    function AuthGate({ onAuth }) {
      const { useState } = React;
      const [email] = useState("mark@ailane.ai");
      const [password, setPassword] = useState("");
      const [error, setError] = useState(null);

// MINI GAUGE COMPONENT
// ════════════════════════════════════════════════════════════════════
function MiniGauge({ score, size = 72 }) {
  const band = getBand(score);
  const r = (size - 8) / 2;
  const circ = Math.PI * r;
  const pct = Math.min(100, Math.max(0, score)) / 100;
  return (
    <div style={{ position: "relative", width: size, height: size / 2 + 10, margin: "0 auto" }}>
      <svg width={size} height={size / 2 + 10} viewBox={`0 0 ${size} ${size / 2 + 10}`}>
        <path d={`M 4 ${size / 2 + 4} A ${r} ${r} 0 0 1 ${size - 4} ${size / 2 + 4}`}
          fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={6} strokeLinecap="round" />
        <path d={`M 4 ${size / 2 + 4} A ${r} ${r} 0 0 1 ${size - 4} ${size / 2 + 4}`}
          fill="none" stroke={band.color} strokeWidth={6} strokeLinecap="round"
          strokeDasharray={`${circ * pct} ${circ}`} style={{ transition: "stroke-dasharray 0.8s ease" }} />
      </svg>
      <div style={{ position: "absolute", bottom: 2, left: "50%", transform: "translate(-50%,0)", textAlign: "center" }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: band.color, fontFamily: "'Courier New', monospace" }}>{score}</div>
      </div>
    </div>
  );
}

}

                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 8, color: "rgba(255,255,255,0.2)" }}>
                <span>W/C 1 Dec</span><span>W/C 23 Feb (Current)</span>
              </div>
            </div>
          </>
        )}

        {/* ═══════════════════════════════════════════════════════════ */}
        {/* EVENTS                                                     */}
        {/* ═══════════════════════════════════════════════════════════ */}
        {activeView === "events" && (
          <>
            {eventsLoading ? (
              <div style={{ padding: 60, textAlign: "center", color: "rgba(255,255,255,0.3)" }}>Loading events...</div>
            ) : eventsData ? (
              <div style={{ animation: "fadeIn 0.4s ease" }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 16 }}>
                  {[
                    { label: "Enforcement Events", value: eventsData.enforcement.length, color: "#E74C3C" },
                    { label: "Legislative Changes", value: eventsData.legislative.length, color: "#8E44AD" },
                    { label: "Employment-Related", value: eventsData.legislative.filter(l => l.employment_related).length, color: "#C9A227" },
                  ].map((card, i) => (
                    <div key={i} style={{ padding: 14, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8, borderTop: `2px solid ${card.color}` }}>
                      <div style={{ fontSize: 9, color: "rgba(255,255,255,0.35)", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 4 }}>{card.label}</div>
                      <div style={{ fontSize: 28, fontWeight: 700, color: card.color }}>{card.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
                  {[
                    { id: "all", label: "All Events" },
                    { id: "enforcement", label: "Enforcement" },
                    { id: "legislative", label: "Legislative" },
                    { id: "employment", label: "Employment Law Only" },
                  ].map(f => (
                    <button key={f.id} onClick={() => setEventsFilter(f.id)} style={{
                      background: eventsFilter === f.id ? "rgba(201,162,39,0.15)" : "rgba(255,255,255,0.03)",
                      border: `1px solid ${eventsFilter === f.id ? "rgba(201,162,39,0.3)" : "rgba(255,255,255,0.06)"}`,
                      borderRadius: 6, padding: "5px 12px", fontSize: 10, fontWeight: 500,
                      color: eventsFilter === f.id ? "#C9A227" : "rgba(255,255,255,0.4)", cursor: "pointer"
                    }}>{f.label}</button>
                  ))}
                </div>
                <div style={{ padding: 16, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#fff", marginBottom: 12 }}>Regulatory Event Feed</div>
                  {(() => {
                    let events = [];
                    if (eventsFilter !== "legislative") {
                      events = events.concat(eventsData.enforcement.map(e => ({ type: "enforcement", date: e.date_issued, title: e.organisation || "Unknown", source: e.source?.toUpperCase(), category: e.acei_category, catNum: e.acei_category_number, penalty: e.penalty_amount, url: e.source_url })));
                    }
                    if (eventsFilter !== "enforcement") {
                      const legItems = eventsFilter === "employment" ? eventsData.legislative.filter(l => l.employment_related) : eventsData.legislative;
                      events = events.concat(legItems.map(l => ({ type: "legislative", date: l.date_published, title: l.title, source: l.legislation_type?.toUpperCase(), category: (l.acei_categories || []).join(", ").replace(/_/g, " "), impact: l.sci_impact_level, url: l.source_url, jurisdiction: l.jurisdiction_code })));
                    }
                    events.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                    return events.slice(0, 50).map((evt, i) => (
                      <div key={i} style={{ display: "flex", gap: 12, padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,0.03)", animation: `fadeIn 0.2s ease ${Math.min(i * 0.03, 0.5)}s both` }}>
                        <div style={{ minWidth: 60, textAlign: "right" }}>
                          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{evt.date ? new Date(evt.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" }) : "\u2014"}</div>
                          <div style={{ fontSize: 8, padding: "1px 5px", borderRadius: 2, marginTop: 3, display: "inline-block", background: evt.type === "enforcement" ? "rgba(231,76,60,0.1)" : "rgba(142,68,173,0.1)", color: evt.type === "enforcement" ? "#E74C3C" : "#8E44AD" }}>{evt.type === "enforcement" ? "ENF" : "LEG"}</div>
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.8)", lineHeight: 1.4 }}>{evt.title}</div>
                          <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
                            {evt.source && <span style={{ fontSize: 9, color: "rgba(255,255,255,0.25)" }}>{evt.source}</span>}
                            {evt.category && <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 2, background: "rgba(46,117,182,0.1)", color: accent }}>{evt.category}</span>}
                            {evt.penalty && <span style={{ fontSize: 9, color: "#E74C3C" }}>\u00A3{parseFloat(evt.penalty).toLocaleString()}</span>}
                            {evt.impact && <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 2, background: `rgba(201,162,39,${evt.impact * 0.08})`, color: "#C9A227" }}>SCI Impact: {evt.impact}</span>}
                            {evt.jurisdiction && <span style={{ fontSize: 9, color: "rgba(255,255,255,0.2)" }}>{evt.jurisdiction}</span>}
                          </div>
                        </div>
                      </div>
                    ));
                  })()}
                </div>
              </div>
            ) : (
              <div style={{ padding: 60, textAlign: "center", color: "rgba(255,255,255,0.2)" }}>Failed to load events data</div>
            )}
          </>
        )}

      </div>
      </>
      )}
    </div>
  );
}

    // ════════════════════════════════════════════════════════════════════
    // ROOT APP — Session Management
    // ════════════════════════════════════════════════════════════════════
    function App() {
      const { useState, useEffect } = React;
      const [session, setSession] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        // Check existing session
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setChecking(false);
        });

        // Listen for auth changes
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
          (_event, session) => setSession(session)
        );
        return () => subscription.unsubscribe();
      }, []);

      if (checking) {
        return (
          <div style={{
            minHeight: "100vh",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            background: "#0d1117",
            color: "rgba(255,255,255,0.3)",
            fontSize: 13,
            letterSpacing: 3,
            textTransform: "uppercase"
          }}>
            <span className="auth-spinner" style={{ width: 20, height: 20, borderColor: "rgba(201,162,39,0.3)", borderTopColor: "#C9A227" }}></span>
            Initialising...
          </div>
        );
      }

      if (!session) {
        return <AuthGate onAuth={setSession} />;
      }

      return <CEODashboard />;
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
