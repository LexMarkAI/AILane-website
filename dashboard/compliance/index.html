<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compliance Checker — Ailane</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2322d3ee'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%230a0e1a' font-weight='700' font-size='18' font-family='monospace'%3EA%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #0a0e1a; font-family: 'DM Sans', -apple-system, sans-serif; color: #e2e8f0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    input[type="file"]::file-selector-button {
      background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3); color: #22d3ee;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; transition: all 0.2s;
    }
    input[type="file"]::file-selector-button:hover { background: rgba(34,211,238,0.2); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { PieChart, Pie, Cell, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, CartesianGrid } = Recharts;

// ─── CONFIG ──────────────────────────────────────────────────────────
const SB_URL = "https://cnbsxwtvazfvzmltkuvx.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g";

const SEVERITY_COLORS = { compliant: "#10b981", minor: "#f59e0b", major: "#f97316", critical: "#ef4444" };
const SEVERITY_LABELS = { compliant: "Compliant", minor: "Minor Gap", major: "Major Gap", critical: "Critical Gap" };
const PILLAR_LABELS = { PA: "Policy Alignment", CC: "Contractual Conformity", TD: "Training Deployment", SPA: "Systems & Process", GO: "Governance Oversight" };
const PILLAR_COLORS = { PA: "#8b5cf6", CC: "#22d3ee", TD: "#f59e0b", SPA: "#10b981", GO: "#f97316" };
const TRACK_LABELS = { attestation: "Track A — Attestation", documentary: "Track B — Documentary" };

const sbFetch = async (path, token) => {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_ANON, Authorization: `Bearer ${token || SB_ANON}`, "Content-Type": "application/json" }
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
};

// ─── SHARED COMPONENTS ───────────────────────────────────────────────
const Badge = ({ children, color = "#22d3ee" }) => (
  <span style={{ display: "inline-flex", padding: "3px 10px", borderRadius: 4, fontSize: 10, fontWeight: 600, letterSpacing: "0.5px", textTransform: "uppercase", background: `${color}18`, color, border: `1px solid ${color}30` }}>{children}</span>
);

const ScoreRing = ({ score, size = 120, trackCeiling = 3 }) => {
  const r = size / 2 - 12;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(score, 100) / 100;
  const color = score >= 65 ? "#10b981" : score >= 30 ? "#f59e0b" : score > 0 ? "#f97316" : "#64748b";
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={8} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: "stroke-dashoffset 1s ease" }} />
      <text x={size/2} y={size/2 - 6} textAnchor="middle" fill={color} fontSize={size * 0.24} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{score}%</text>
      <text x={size/2} y={size/2 + 14} textAnchor="middle" fill="#64748b" fontSize={10} fontWeight="500">Score {trackCeiling > 0 ? `≤${trackCeiling}` : ""}</text>
    </svg>
  );
};

const PillarScore = ({ pillar, score }) => {
  const color = PILLAR_COLORS[pillar] || "#22d3ee";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0" }}>
      <div style={{ width: 36, height: 36, borderRadius: 8, background: `${color}18`, border: `1px solid ${color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color }}>{score}</div>
      <div>
        <div style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0" }}>{PILLAR_LABELS[pillar] || pillar}</div>
        <div style={{ fontSize: 10, color: "#64748b" }}>{pillar} Pillar · Tier I</div>
      </div>
    </div>
  );
};

const LoadingSpinner = () => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: 60 }}>
    <div style={{ width: 32, height: 32, border: "3px solid rgba(34,211,238,0.2)", borderTopColor: "#22d3ee", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
  </div>
);

// ─── COMPLIANCE DASHBOARD APP ────────────────────────────────────────
function ComplianceDashboard() {
  const [token, setToken] = useState(null);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [authEmail, setAuthEmail] = useState("");
  const [authPass, setAuthPass] = useState("");
  const [authError, setAuthError] = useState("");

  // Data
  const [uploads, setUploads] = useState([]);
  const [findings, setFindings] = useState([]);
  const [requirements, setRequirements] = useState([]);
  const [selectedUpload, setSelectedUpload] = useState(null);
  const [view, setView] = useState("overview"); // overview | upload | report
  const [uploadLoading, setUploadLoading] = useState(false);
  const [uploadResult, setUploadResult] = useState(null);
  const fileRef = useRef(null);

  // Auth restore
  useEffect(() => {
    const stored = localStorage.getItem("sb-token");
    if (stored) {
      fetch(`${SB_URL}/auth/v1/user`, { headers: { apikey: SB_ANON, Authorization: `Bearer ${stored}` } })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(u => { setToken(stored); setUser(u); })
        .catch(() => { localStorage.removeItem("sb-token"); })
        .finally(() => setLoading(false));
    } else setLoading(false);
  }, []);

  const handleLogin = async () => {
    setAuthError("");
    try {
      const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
        method: "POST", headers: { apikey: SB_ANON, "Content-Type": "application/json" },
        body: JSON.stringify({ email: authEmail, password: authPass }),
      });
      if (res.ok) {
        const d = await res.json();
        setToken(d.access_token); setUser(d.user);
        localStorage.setItem("sb-token", d.access_token);
      } else { const e = await res.json(); setAuthError(e.error_description || "Invalid credentials"); }
    } catch { setAuthError("Connection failed"); }
  };

  // Load data
  useEffect(() => {
    if (!token) return;
    Promise.all([
      sbFetch("compliance_uploads?order=created_at.desc&limit=50", token),
      sbFetch("regulatory_requirements?order=category,requirement_name", token),
    ]).then(([u, r]) => { setUploads(u); setRequirements(r); }).catch(console.error);
  }, [token, uploadResult]);

  // Load findings for selected upload
  useEffect(() => {
    if (!selectedUpload || !token) { setFindings([]); return; }
    sbFetch(`compliance_findings?upload_id=eq.${selectedUpload.id}&order=severity.desc,clause_category`, token)
      .then(setFindings).catch(console.error);
  }, [selectedUpload, token]);

  // File upload handler (Track B)
  const handleFileUpload = async (docType) => {
    const file = fileRef.current?.files?.[0];
    if (!file) return;
    setUploadLoading(true); setUploadResult(null);
    try {
      const form = new FormData();
      form.append("file", file);
      form.append("document_type", docType);
      const res = await fetch(`${SB_URL}/functions/v1/compliance-upload`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, apikey: SB_ANON },
        body: form,
      });
      const data = await res.json();
      setUploadResult(data);
      if (data.upload_id) {
        // Poll for completion
        const poll = setInterval(async () => {
          try {
            const check = await sbFetch(`compliance_uploads?id=eq.${data.upload_id}`, token);
            if (check[0]?.status === "complete" || check[0]?.status === "error") {
              clearInterval(poll);
              setUploadResult({ ...data, ...check[0] });
              setSelectedUpload(check[0]);
              setView("report");
              // Refresh uploads list
              sbFetch("compliance_uploads?order=created_at.desc&limit=50", token).then(setUploads);
            }
          } catch {}
        }, 2000);
        setTimeout(() => clearInterval(poll), 60000);
      }
    } catch (e) { setUploadResult({ error: e.message }); }
    setUploadLoading(false);
  };

  // ─── RENDER: LOGIN ───────────────────────────────────────────────────
  if (loading) return <LoadingSpinner />;
  if (!token) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0a0e1a 0%, #0f172a 100%)" }}>
      <div style={{ width: 380, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: 36, animation: "fadeIn 0.4s ease" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: "#22d3ee", fontFamily: "'JetBrains Mono',monospace", letterSpacing: "-1px" }}>AILANE</div>
          <div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>Compliance Checker</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <input value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="Email" style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, outline: "none", fontFamily: "'DM Sans', sans-serif" }} />
          <input value={authPass} onChange={e => setAuthPass(e.target.value)} type="password" placeholder="Password" onKeyDown={e => e.key === "Enter" && handleLogin()} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, outline: "none", fontFamily: "'DM Sans', sans-serif" }} />
          <button onClick={handleLogin} style={{ background: "linear-gradient(135deg, #0d9488, #22d3ee)", border: "none", borderRadius: 8, padding: "11px 0", color: "#0a0e1a", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>Sign In</button>
          {authError && <div style={{ fontSize: 12, color: "#ef4444", textAlign: "center" }}>{authError}</div>}
        </div>
      </div>
    </div>
  );

  // ─── FINDINGS SUMMARY ────────────────────────────────────────────────
  const sevCounts = findings.reduce((acc, f) => { acc[f.severity] = (acc[f.severity] || 0) + 1; return acc; }, {});
  const pillarCounts = findings.reduce((acc, f) => {
    if (!acc[f.pillar_mapping]) acc[f.pillar_mapping] = { compliant: 0, total: 0 };
    acc[f.pillar_mapping].total++;
    if (f.severity === "compliant") acc[f.pillar_mapping].compliant++;
    return acc;
  }, {});

  const pieData = Object.entries(sevCounts).map(([k, v]) => ({ name: SEVERITY_LABELS[k], value: v, color: SEVERITY_COLORS[k] }));

  // ─── RENDER: MAIN APP ────────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#0a0e1a" }}>
      {/* Header */}
      <header style={{ padding: "16px 32px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.02)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <span style={{ fontSize: 22, fontWeight: 700, color: "#22d3ee", fontFamily: "'JetBrains Mono',monospace", letterSpacing: "-1px" }}>AILANE</span>
          <span style={{ width: 1, height: 20, background: "rgba(255,255,255,0.1)" }} />
          <span style={{ fontSize: 14, color: "#94a3b8", fontWeight: 500 }}>Compliance Checker</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <Badge color="#10b981">RRI v1.0</Badge>
          <span style={{ fontSize: 12, color: "#64748b" }}>{user?.email}</span>
          <a href="/dashboard/" style={{ fontSize: 11, color: "#22d3ee", textDecoration: "none" }}>← Dashboard</a>
        </div>
      </header>

      {/* Tab Bar */}
      <div style={{ padding: "0 32px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 4 }}>
        {[
          { id: "overview", label: "Overview", icon: "📊" },
          { id: "upload", label: "Upload Document", icon: "📄" },
          { id: "report", label: "Compliance Report", icon: "📋", disabled: !selectedUpload },
        ].map(t => (
          <button key={t.id} onClick={() => !t.disabled && setView(t.id)} disabled={t.disabled} style={{
            padding: "12px 18px", background: "transparent", border: "none", borderBottom: view === t.id ? "2px solid #22d3ee" : "2px solid transparent",
            color: t.disabled ? "#334155" : view === t.id ? "#22d3ee" : "#94a3b8", fontSize: 13, fontWeight: view === t.id ? 600 : 400,
            cursor: t.disabled ? "not-allowed" : "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "'DM Sans', sans-serif",
          }}>
            <span style={{ fontSize: 14 }}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: "28px 32px", maxWidth: 1200, margin: "0 auto" }}>
        {/* ─── OVERVIEW ─────────────────────────────────────────── */}
        {view === "overview" && (
          <div style={{ animation: "fadeIn 0.3s ease" }}>
            {/* Stats row */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 28 }}>
              {[
                { label: "Total Analyses", value: uploads.length, icon: "📄", color: "#22d3ee" },
                { label: "Track A (Attestation)", value: uploads.filter(u => u.evidence_track === "attestation").length, icon: "☑️", color: "#8b5cf6" },
                { label: "Track B (Documentary)", value: uploads.filter(u => u.evidence_track === "documentary").length, icon: "📎", color: "#10b981" },
                { label: "Requirements Checked", value: requirements.length, icon: "⚖️", color: "#f59e0b" },
              ].map((s, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "18px 20px", animation: `slideUp 0.3s ease ${i * 0.05}s both` }}>
                  <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.5px", display: "flex", alignItems: "center", gap: 6 }}>
                    <span>{s.icon}</span>{s.label}
                  </div>
                  <div style={{ fontSize: 28, fontWeight: 700, color: s.color, fontFamily: "'JetBrains Mono',monospace", marginTop: 6 }}>{s.value}</div>
                </div>
              ))}
            </div>

            {/* Recent Analyses Table */}
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <h3 style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0" }}>Recent Compliance Analyses</h3>
                  <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>Click any row to view the full compliance report</div>
                </div>
                <button onClick={() => setView("upload")} style={{ background: "rgba(34,211,238,0.1)", border: "1px solid rgba(34,211,238,0.3)", borderRadius: 8, padding: "8px 16px", color: "#22d3ee", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>+ New Analysis</button>
              </div>
              {uploads.length === 0 ? (
                <div style={{ padding: 48, textAlign: "center" }}>
                  <div style={{ fontSize: 36, marginBottom: 12 }}>📄</div>
                  <div style={{ fontSize: 14, color: "#94a3b8" }}>No compliance analyses yet</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>Upload a contract or handbook to get started</div>
                  <button onClick={() => setView("upload")} style={{ marginTop: 16, background: "linear-gradient(135deg, #0d9488, #22d3ee)", border: "none", borderRadius: 8, padding: "10px 24px", color: "#0a0e1a", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Upload Document</button>
                </div>
              ) : (
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "rgba(255,255,255,0.02)" }}>
                      {["Document", "Type", "Track", "Score", "Pillar Score", "Status", "Date"].map((h, i) => (
                        <th key={i} style={{ padding: "10px 14px", textAlign: "left", color: "#64748b", fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.5px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {uploads.map((u, i) => (
                      <tr key={u.id} onClick={() => { setSelectedUpload(u); setView("report"); }} style={{ cursor: "pointer", borderBottom: "1px solid rgba(255,255,255,0.03)", animation: `slideUp 0.3s ease ${i * 0.03}s both` }}
                        onMouseEnter={e => e.currentTarget.style.background = "rgba(34,211,238,0.04)"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <td style={{ padding: "10px 14px", color: "#e2e8f0", fontWeight: 500 }}>{u.file_name || "Attestation"}</td>
                        <td style={{ padding: "10px 14px" }}><Badge color="#8b5cf6">{u.document_type}</Badge></td>
                        <td style={{ padding: "10px 14px" }}><Badge color={u.evidence_track === "documentary" ? "#10b981" : "#f59e0b"}>{u.evidence_track === "documentary" ? "Track B" : "Track A"}</Badge></td>
                        <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono',monospace", fontWeight: 600, color: u.overall_score >= 65 ? "#10b981" : u.overall_score >= 30 ? "#f59e0b" : "#f97316" }}>{u.overall_score != null ? `${u.overall_score}%` : "—"}</td>
                        <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: "#22d3ee" }}>{u.translated_pillar_score ?? "—"}<span style={{ fontSize: 10, color: "#64748b", fontWeight: 400 }}>/{ u.evidence_track === "documentary" ? "3" : "2"}</span></td>
                        <td style={{ padding: "10px 14px" }}><Badge color={u.status === "complete" ? "#10b981" : u.status === "error" ? "#ef4444" : "#f59e0b"}>{u.status}</Badge></td>
                        <td style={{ padding: "10px 14px", color: "#64748b", fontSize: 12 }}>{new Date(u.created_at).toLocaleDateString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

        {/* ─── UPLOAD VIEW ──────────────────────────────────────── */}
        {view === "upload" && (
          <div style={{ animation: "fadeIn 0.3s ease", maxWidth: 700 }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>Upload Document for Analysis</h2>
            <p style={{ fontSize: 13, color: "#64748b", marginBottom: 28 }}>Upload an employment contract or staff handbook for compliance checking against statutory requirements.</p>

            {/* Track B: Documentary Upload */}
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(34,211,238,0.15)", borderRadius: 12, padding: 24, marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                <Badge color="#10b981">Track B — Documentary</Badge>
                <span style={{ fontSize: 11, color: "#64748b" }}>Score ceiling: 3 (Developed)</span>
              </div>
              <p style={{ fontSize: 12, color: "#94a3b8", marginBottom: 16 }}>Upload the actual document for computational verification. The engine will parse clauses, check against statutory requirements, and generate a detailed compliance report.</p>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                <input ref={fileRef} type="file" accept=".docx,.pdf" style={{ flex: 1, color: "#94a3b8", fontSize: 13 }} />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => handleFileUpload("contract")} disabled={uploadLoading} style={{ background: "linear-gradient(135deg, #0d9488, #22d3ee)", border: "none", borderRadius: 8, padding: "10px 20px", color: "#0a0e1a", fontSize: 13, fontWeight: 700, cursor: uploadLoading ? "wait" : "pointer", opacity: uploadLoading ? 0.6 : 1 }}>
                  {uploadLoading ? "Analysing..." : "Analyse as Contract"}
                </button>
                <button onClick={() => handleFileUpload("handbook")} disabled={uploadLoading} style={{ background: "rgba(139,92,246,0.15)", border: "1px solid rgba(139,92,246,0.3)", borderRadius: 8, padding: "10px 20px", color: "#8b5cf6", fontSize: 13, fontWeight: 700, cursor: uploadLoading ? "wait" : "pointer", opacity: uploadLoading ? 0.6 : 1 }}>
                  {uploadLoading ? "Analysing..." : "Analyse as Handbook"}
                </button>
              </div>
              {uploadResult && (
                <div style={{ marginTop: 16, padding: 12, borderRadius: 8, background: uploadResult.error ? "rgba(239,68,68,0.1)" : "rgba(16,185,129,0.1)", border: `1px solid ${uploadResult.error ? "rgba(239,68,68,0.2)" : "rgba(16,185,129,0.2)"}`, fontSize: 12, color: uploadResult.error ? "#ef4444" : "#10b981" }}>
                  {uploadResult.error || uploadResult.message || "Processing..."}
                </div>
              )}
            </div>

            {/* Info panel */}
            <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 8 }}>How Scoring Works</div>
              <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.7 }}>
                Your document is checked against {requirements.length} statutory requirements derived from the Employment Rights Act 1996 s.1 written particulars, ACAS Code of Practice, and key employment legislation. Each finding maps to an RRI pillar under the Regulatory Readiness Index v1.0 constitutional framework.
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 16 }}>
                <div style={{ padding: 12, borderRadius: 8, background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.15)" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#f59e0b", marginBottom: 4 }}>Track A — Attestation</div>
                  <div style={{ fontSize: 11, color: "#94a3b8" }}>Checkbox confirmation. Score ceiling: 2 (Initiated). Best for establishing breadth across many requirements.</div>
                </div>
                <div style={{ padding: 12, borderRadius: 8, background: "rgba(16,185,129,0.06)", border: "1px solid rgba(16,185,129,0.15)" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#10b981", marginBottom: 4 }}>Track B — Documentary</div>
                  <div style={{ fontSize: 11, color: "#94a3b8" }}>Upload actual document. Score ceiling: 3 (Developed). Computationally verified for higher evidentiary value.</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ─── REPORT VIEW ──────────────────────────────────────── */}
        {view === "report" && selectedUpload && (
          <div style={{ animation: "fadeIn 0.3s ease" }}>
            {/* Report Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>Compliance Report</h2>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <Badge color="#8b5cf6">{selectedUpload.document_type}</Badge>
                  <Badge color={selectedUpload.evidence_track === "documentary" ? "#10b981" : "#f59e0b"}>
                    {TRACK_LABELS[selectedUpload.evidence_track]}
                  </Badge>
                  <span style={{ fontSize: 11, color: "#64748b" }}>{selectedUpload.file_name || "Attestation"} · {new Date(selectedUpload.created_at).toLocaleString()}</span>
                </div>
              </div>
              <ScoreRing score={Math.round(selectedUpload.overall_score || 0)} trackCeiling={selectedUpload.evidence_track === "documentary" ? 3 : 2} />
            </div>

            {/* Score Cards Row */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12, marginBottom: 24 }}>
              {["compliant", "minor", "major", "critical"].map(sev => (
                <div key={sev} style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${SEVERITY_COLORS[sev]}25`, borderRadius: 10, padding: "14px 16px" }}>
                  <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.5px" }}>{SEVERITY_LABELS[sev]}</div>
                  <div style={{ fontSize: 24, fontWeight: 700, color: SEVERITY_COLORS[sev], fontFamily: "'JetBrains Mono',monospace", marginTop: 4 }}>{sevCounts[sev] || 0}</div>
                </div>
              ))}
              <div style={{ background: "rgba(34,211,238,0.05)", border: "1px solid rgba(34,211,238,0.15)", borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.5px" }}>RRI Pillar Score</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: "#22d3ee", fontFamily: "'JetBrains Mono',monospace", marginTop: 4 }}>
                  {selectedUpload.translated_pillar_score ?? "—"}<span style={{ fontSize: 14, color: "#64748b", fontWeight: 400 }}>/{selectedUpload.evidence_track === "documentary" ? "3" : "2"}</span>
                </div>
              </div>
            </div>

            {/* Charts Row */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
              {/* Severity Distribution */}
              <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 20 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 12 }}>Finding Distribution</div>
                <ResponsiveContainer width="100%" height={180}>
                  <PieChart>
                    <Pie data={pieData} cx="50%" cy="50%" innerRadius={45} outerRadius={70} dataKey="value" strokeWidth={0}>
                      {pieData.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie>
                    <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontSize: 12, color: "#e2e8f0" }} />
                  </PieChart>
                </ResponsiveContainer>
              </div>

              {/* Pillar Breakdown */}
              <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 20 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 12 }}>RRI Pillar Compliance</div>
                {Object.entries(pillarCounts).map(([pillar, data]) => (
                  <div key={pillar} style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 4 }}>
                      <span style={{ color: PILLAR_COLORS[pillar], fontWeight: 600 }}>{PILLAR_LABELS[pillar]}</span>
                      <span style={{ color: "#94a3b8", fontFamily: "'JetBrains Mono',monospace" }}>{data.compliant}/{data.total}</span>
                    </div>
                    <div style={{ height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(data.compliant / data.total) * 100}%`, background: PILLAR_COLORS[pillar], borderRadius: 3, transition: "width 0.8s ease" }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Findings Table */}
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                <h3 style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0" }}>Detailed Findings ({findings.length})</h3>
              </div>
              {findings.length === 0 ? <LoadingSpinner /> : (
                <div style={{ maxHeight: 500, overflowY: "auto" }}>
                  {findings.map((f, i) => (
                    <div key={f.id} style={{ padding: "14px 20px", borderBottom: "1px solid rgba(255,255,255,0.03)", animation: `slideUp 0.2s ease ${i * 0.02}s both` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: SEVERITY_COLORS[f.severity], flexShrink: 0 }} />
                          <span style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>{f.statutory_ref}</span>
                          <Badge color={PILLAR_COLORS[f.pillar_mapping]}>{f.pillar_mapping}</Badge>
                        </div>
                        <Badge color={SEVERITY_COLORS[f.severity]}>{SEVERITY_LABELS[f.severity]}</Badge>
                      </div>
                      <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6, marginLeft: 16 }}>{f.finding_detail}</div>
                      {f.remediation && (
                        <div style={{ marginTop: 8, marginLeft: 16, padding: "8px 12px", background: "rgba(34,211,238,0.04)", border: "1px solid rgba(34,211,238,0.1)", borderRadius: 6, fontSize: 11, color: "#22d3ee", lineHeight: 1.5 }}>
                          <span style={{ fontWeight: 600 }}>Remediation: </span>{f.remediation}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Disclaimer */}
            <div style={{ marginTop: 20, padding: "14px 18px", background: "rgba(245,158,11,0.05)", border: "1px solid rgba(245,158,11,0.15)", borderRadius: 8, fontSize: 10, color: "#94a3b8", lineHeight: 1.7 }}>
              <strong style={{ color: "#f59e0b" }}>Important Notice:</strong> This report is provided by AI Lane Limited for general educational and reference purposes only. It does not constitute legal advice and should not be relied upon as such. The analysis identifies potential compliance gaps against statutory requirements but does not guarantee regulatory compliance. Professional legal review is recommended for all critical findings. Constitutional basis: RRI v1.0, Tier I evidence classification.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ComplianceDashboard));
  </script>
</body>
</html>
