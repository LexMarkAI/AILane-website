<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compliance Checker — Ailane</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2322d3ee'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%230a0e1a' font-weight='700' font-size='18' font-family='monospace'%3EA%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a; --bg2: #0f1422; --bg3: rgba(255,255,255,0.03); --bg4: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
      --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b; --text4: #475569;
      --cyan: #22d3ee; --cyan-bg: rgba(34,211,238,0.08); --cyan-border: rgba(34,211,238,0.2);
      --green: #10b981; --green-bg: rgba(16,185,129,0.08);
      --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.08);
      --orange: #f97316; --red: #ef4444; --red-bg: rgba(239,68,68,0.08);
      --purple: #8b5cf6; --purple-bg: rgba(139,92,246,0.08);
      --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', -apple-system, sans-serif;
      --sidebar-w: 260px; --header-h: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: var(--bg); font-family: var(--sans); color: var(--text); }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes dropGlow { 0%,100% { box-shadow: 0 0 20px rgba(34,211,238,0.1); } 50% { box-shadow: 0 0 40px rgba(34,211,238,0.25); } }
    @keyframes checkPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    input::placeholder, textarea::placeholder { color: var(--text4); }
    input[type="file"] { display: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script>
    // Fallback if unpkg fails
    if (typeof Recharts === 'undefined') {
      document.write('<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"><\/script>');
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const _RC = typeof Recharts !== 'undefined' ? Recharts : {};
const { PieChart, Pie, Cell, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, CartesianGrid } = _RC;
const chartsAvailable = typeof Recharts !== 'undefined';

// ─── CONFIG ────────────────────────────────────────────────────────────
const SB = "https://cnbsxwtvazfvzmltkuvx.supabase.co";
const AK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g";
const api = async (path, token, opts = {}) => {
  const r = await fetch(`${SB}/rest/v1/${path}`, {
    ...opts, headers: { apikey: AK, Authorization: `Bearer ${token || AK}`, "Content-Type": "application/json", ...opts.headers }
  });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  return opts.method === "DELETE" ? null : r.json();
};

// ─── CONSTANTS ─────────────────────────────────────────────────────────
const SEV = { compliant: { color: "#10b981", label: "Compliant", icon: "✓" }, minor: { color: "#f59e0b", label: "Minor Gap", icon: "△" }, major: { color: "#f97316", label: "Major Gap", icon: "▲" }, critical: { color: "#ef4444", label: "Critical", icon: "⬆" } };
const PILLARS = { PA: { label: "Policy Alignment", color: "#8b5cf6" }, CC: { label: "Contractual Conformity", color: "#22d3ee" }, TD: { label: "Training Deployment", color: "#f59e0b" }, SPA: { label: "Systems & Process", color: "#10b981" }, GO: { label: "Governance Oversight", color: "#f97316" } };
const DOC_ICONS = { contract: "📄", handbook: "📘", policy: "📋" };
const STATUS_COLORS = { complete: "#10b981", processing: "#f59e0b", pending: "#64748b", error: "#ef4444" };

// ─── MICRO COMPONENTS ──────────────────────────────────────────────────
const Badge = ({ children, color = "var(--cyan)", small }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: small ? "2px 6px" : "3px 10px", borderRadius: 4, fontSize: small ? 9 : 10, fontWeight: 600, letterSpacing: "0.4px", textTransform: "uppercase", background: `${color}16`, color, border: `1px solid ${color}28` }}>{children}</span>
);

const Btn = ({ children, onClick, variant = "primary", disabled, icon, small, style: s }) => {
  const styles = {
    primary: { background: "linear-gradient(135deg, #0d9488, #22d3ee)", color: "#0a0e1a", border: "none" },
    secondary: { background: "var(--bg4)", color: "var(--text2)", border: "1px solid var(--border2)" },
    danger: { background: "var(--red-bg)", color: "var(--red)", border: "1px solid rgba(239,68,68,0.2)" },
    ghost: { background: "transparent", color: "var(--text3)", border: "1px solid transparent" },
    accent: { background: "var(--purple-bg)", color: "var(--purple)", border: "1px solid rgba(139,92,246,0.2)" },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...styles[variant], borderRadius: 8, padding: small ? "5px 10px" : "9px 18px", fontSize: small ? 11 : 13, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", fontFamily: "var(--sans)", display: "inline-flex", alignItems: "center", gap: 6, opacity: disabled ? 0.5 : 1, transition: "all 0.15s", whiteSpace: "nowrap", ...s }}>{icon && <span style={{ fontSize: small ? 12 : 14 }}>{icon}</span>}{children}</button>
  );
};

const Input = ({ value, onChange, placeholder, style: s, ...props }) => (
  <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} {...props}
    style={{ background: "var(--bg4)", border: "1px solid var(--border2)", borderRadius: 8, padding: "9px 14px", color: "var(--text)", fontSize: 13, outline: "none", fontFamily: "var(--sans)", width: "100%", transition: "border-color 0.2s", ...s }}
    onFocus={e => e.target.style.borderColor = "var(--cyan-border)"} onBlur={e => e.target.style.borderColor = "var(--border2)"} />
);

const Spinner = ({ size = 28 }) => <div style={{ width: size, height: size, border: `3px solid var(--cyan-bg)`, borderTopColor: "var(--cyan)", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />;

const Modal = ({ open, onClose, title, children, wide }) => {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: "var(--bg2)", border: "1px solid var(--border2)", borderRadius: 16, padding: 0, width: wide ? 720 : 480, maxHeight: "85vh", overflow: "hidden", display: "flex", flexDirection: "column", animation: "fadeIn 0.2s ease", boxShadow: "0 25px 60px rgba(0,0,0,0.5)" }}>
        <div style={{ padding: "16px 22px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: "var(--text)" }}>{title}</div>
          <div onClick={onClose} style={{ cursor: "pointer", color: "var(--text3)", fontSize: 18, lineHeight: 1, padding: "4px 8px", borderRadius: 4 }}>✕</div>
        </div>
        <div style={{ padding: "20px 22px", overflowY: "auto", flex: 1 }}>{children}</div>
      </div>
    </div>
  );
};

const ScoreRing = ({ score, size = 100, ceiling = 3 }) => {
  const r = size / 2 - 10, circ = 2 * Math.PI * r, pct = Math.min(score, 100) / 100;
  const color = score >= 65 ? "var(--green)" : score >= 30 ? "var(--amber)" : score > 0 ? "var(--orange)" : "var(--text3)";
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={7} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={7}
        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: "stroke-dashoffset 0.8s ease" }} />
      <text x={size/2} y={size/2 - 4} textAnchor="middle" fill={color} fontSize={size * 0.22} fontWeight="700" fontFamily="var(--mono)">{Math.round(score)}%</text>
      <text x={size/2} y={size/2 + 12} textAnchor="middle" fill="var(--text3)" fontSize={9}>Pillar ≤{ceiling}</text>
    </svg>
  );
};

// ─── MAIN APPLICATION ──────────────────────────────────────────────────
function ComplianceApp() {
  // Auth
  const [token, setToken] = useState(null);
  const [user, setUser] = useState(null);
  const [orgId, setOrgId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [authEmail, setAuthEmail] = useState("");
  const [authPass, setAuthPass] = useState("");
  const [authErr, setAuthErr] = useState("");

  // Data
  const [folders, setFolders] = useState([]);
  const [uploads, setUploads] = useState([]);
  const [findings, setFindings] = useState([]);
  const [requirements, setRequirements] = useState([]);

  // UI State
  const [view, setView] = useState("library"); // library | upload-b | upload-a | report
  const [activeFolder, setActiveFolder] = useState(null); // null = all documents
  const [selectedUpload, setSelectedUpload] = useState(null);
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterTrack, setFilterTrack] = useState("all");
  const [filterType, setFilterType] = useState("all");
  const [viewMode, setViewMode] = useState("grid"); // grid | list

  // Modals
  const [folderModal, setFolderModal] = useState(false);
  const [renameModal, setRenameModal] = useState(null);
  const [moveModal, setMoveModal] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  // Upload state
  const [dragOver, setDragOver] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [uploadProgress, setUploadProgress] = useState("");
  const fileRef = useRef(null);
  const [uploadDocType, setUploadDocType] = useState("contract");
  const [uploadFolder, setUploadFolder] = useState(null);
  const [uploadName, setUploadName] = useState("");
  const [uploadNotes, setUploadNotes] = useState("");

  // Attestation state
  const [attestDocType, setAttestDocType] = useState("contract");
  const [attestFolder, setAttestFolder] = useState(null);
  const [attestChecks, setAttestChecks] = useState({});
  const [attestNotes, setAttestNotes] = useState({});
  const [attestSubmitting, setAttestSubmitting] = useState(false);
  const [attestStep, setAttestStep] = useState(0); // 0 = setup, 1 = checklist, 2 = review

  // Folder creation
  const [newFolderName, setNewFolderName] = useState("");
  const [newFolderColor, setNewFolderColor] = useState("#22d3ee");
  const [newFolderParent, setNewFolderParent] = useState(null);
  const [newFolderIcon, setNewFolderIcon] = useState("📁");

  // Resolve org_id from app_users
  const resolveOrg = async (t, uid) => {
    try {
      const rows = await api(`app_users?id=eq.${uid}&select=org_id&org_id=neq.00000000-0000-0000-0000-000000000000&limit=1`, t);
      if (rows.length) { setOrgId(rows[0].org_id); return rows[0].org_id; }
      const all = await api(`app_users?id=eq.${uid}&select=org_id&limit=1`, t);
      if (all.length) { setOrgId(all[0].org_id); return all[0].org_id; }
    } catch (e) { console.error("Org resolve error:", e); }
    return null;
  };

  // Token refresh — Supabase access tokens expire after 1 hour
  const refreshSession = async () => {
    const rt = localStorage.getItem("sb-refresh");
    if (!rt) return null;
    try {
      const r = await fetch(`${SB}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST", headers: { apikey: AK, "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: rt }),
      });
      if (r.ok) {
        const d = await r.json();
        setToken(d.access_token); setUser(d.user);
        // Write to shared session key
        localStorage.setItem("sb-cnbsxwtvazfvzmltkuvx-auth-token", JSON.stringify({
          access_token: d.access_token,
          user: d.user
        }));
        localStorage.setItem("sb-token", d.access_token);
        localStorage.setItem("sb-refresh", d.refresh_token);
        return d.access_token;
      } else {
        // Refresh token also expired — force re-login
        localStorage.removeItem("sb-cnbsxwtvazfvzmltkuvx-auth-token");
        localStorage.removeItem("sb-token");
        localStorage.removeItem("sb-refresh");
        setToken(null); setUser(null);
        return null;
      }
    } catch { return null; }
  };

  // Get a valid token — refreshes automatically if expired
  const getFreshToken = async () => {
    const t = token || localStorage.getItem("sb-token");
    if (!t) return null;
    // Quick check: verify token is still valid
    try {
      const r = await fetch(`${SB}/auth/v1/user`, { headers: { apikey: AK, Authorization: `Bearer ${t}` } });
      if (r.ok) return t;
    } catch {}
    // Token expired, try refresh
    return await refreshSession();
  };

  // ─── AUTH ──────────────────────────────────────────────────────────────
  useEffect(() => {
    // Read shared Supabase session first, fallback to legacy
    let t = null;
    try {
      const sbSession = localStorage.getItem("sb-cnbsxwtvazfvzmltkuvx-auth-token");
      if (sbSession) {
        const parsed = JSON.parse(sbSession);
        t = parsed?.access_token || null;
      }
    } catch(e) {}
    if (!t) t = localStorage.getItem("sb-token");
    if (t) {
      fetch(`${SB}/auth/v1/user`, { headers: { apikey: AK, Authorization: `Bearer ${t}` } })
        .then(r => {
          if (r.ok) return r.json();
          // Token expired on load — try refresh
          return refreshSession().then(newT => {
            if (newT) return fetch(`${SB}/auth/v1/user`, { headers: { apikey: AK, Authorization: `Bearer ${newT}` } }).then(r2 => r2.ok ? r2.json() : Promise.reject());
            return Promise.reject();
          });
        })
        .then(async (u) => { setToken(localStorage.getItem("sb-token")); setUser(u); await resolveOrg(localStorage.getItem("sb-token"), u.id); })
        .catch(() => { localStorage.removeItem("sb-token"); localStorage.removeItem("sb-refresh"); })
        .finally(() => setLoading(false));
    } else setLoading(false);
  }, []);

  const login = async () => {
    setAuthErr("");
    try {
      const r = await fetch(`${SB}/auth/v1/token?grant_type=password`, {
        method: "POST", headers: { apikey: AK, "Content-Type": "application/json" },
        body: JSON.stringify({ email: authEmail, password: authPass }),
      });
      if (r.ok) {
        const d = await r.json();
        setToken(d.access_token); setUser(d.user);
        // Write to shared session key
        localStorage.setItem("sb-cnbsxwtvazfvzmltkuvx-auth-token", JSON.stringify({
          access_token: d.access_token,
          user: d.user
        }));
        localStorage.setItem("sb-token", d.access_token);
        localStorage.setItem("sb-refresh", d.refresh_token);
        await resolveOrg(d.access_token, d.user.id);
      } else { const e = await r.json(); setAuthErr(e.error_description || "Invalid credentials"); }
    } catch { setAuthErr("Connection failed"); }
  };

  const logout = () => { setToken(null); setUser(null); setOrgId(null); localStorage.removeItem("sb-cnbsxwtvazfvzmltkuvx-auth-token"); localStorage.removeItem("sb-token"); localStorage.removeItem("sb-refresh"); };

  // ─── DATA LOADING ────────────────────────────────────────────────────
  const loadAll = useCallback(async () => {
    if (!token) return;
    try {
      const [f, u, r] = await Promise.all([
        api("compliance_folders?order=sort_order,name", token),
        api("compliance_uploads?order=created_at.desc&limit=500", token),
        api("regulatory_requirements?effective_to=is.null&order=category,requirement_name", token),
      ]);
      setFolders(f); setUploads(u); setRequirements(r);
    } catch (e) { console.error("Load error:", e); }
  }, [token]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Load findings for selected upload
  useEffect(() => {
    if (!selectedUpload || !token) { setFindings([]); return; }
    api(`compliance_findings?upload_id=eq.${selectedUpload.id}&order=severity.desc,clause_category`, token).then(setFindings);
  }, [selectedUpload, token]);

  // ─── FOLDER OPERATIONS ───────────────────────────────────────────────
  const createFolder = async () => {
    if (!newFolderName.trim() || !orgId) return;
    try {
      await api("compliance_folders", token, {
        method: "POST", headers: { Prefer: "return=minimal" },
        body: JSON.stringify({ organisation_id: orgId, name: newFolderName.trim(), color: newFolderColor, icon: newFolderIcon, parent_id: newFolderParent, created_by: user.id }),
      });
      setFolderModal(false); setNewFolderName(""); setNewFolderParent(null);
      loadAll();
    } catch (e) { console.error("Create folder error:", e); alert("Failed to create folder: " + e.message); }
  };

  const deleteFolder = async (id) => {
    try {
      // Move any uploads in this folder to root
      await api(`compliance_uploads?folder_id=eq.${id}`, token, {
        method: "PATCH", body: JSON.stringify({ folder_id: null }),
      });
      await api(`compliance_folders?id=eq.${id}`, token, { method: "DELETE" });
      if (activeFolder === id) setActiveFolder(null);
      setDeleteConfirm(null); loadAll();
    } catch (e) { console.error(e); }
  };

  const renameFolder = async (id, newName) => {
    try {
      await api(`compliance_folders?id=eq.${id}`, token, {
        method: "PATCH", body: JSON.stringify({ name: newName }),
      });
      setRenameModal(null); loadAll();
    } catch (e) { console.error(e); }
  };

  // ─── DOCUMENT OPERATIONS ─────────────────────────────────────────────
  const moveDocument = async (uploadId, folderId) => {
    try {
      await api(`compliance_uploads?id=eq.${uploadId}`, token, {
        method: "PATCH", body: JSON.stringify({ folder_id: folderId }),
      });
      setMoveModal(null); loadAll();
    } catch (e) { console.error(e); }
  };

  const renameDocument = async (uploadId, name, notes) => {
    try {
      await api(`compliance_uploads?id=eq.${uploadId}`, token, {
        method: "PATCH", body: JSON.stringify({ display_name: name, notes }),
      });
      setRenameModal(null); loadAll();
    } catch (e) { console.error(e); }
  };

  // ─── TRACK B UPLOAD ──────────────────────────────────────────────────
  const handleFileDrop = (e) => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer?.files?.[0]; if (f) startUpload(f); };
  const handleFileSelect = (e) => { const f = e.target.files?.[0]; if (f) startUpload(f); };

  const startUpload = async (file) => {
    const ext = file.name.toLowerCase();
    if (!ext.endsWith(".docx") && !ext.endsWith(".pdf")) { setUploadProgress("Error: Only .docx and .pdf files accepted"); return; }
    if (file.size > 10 * 1024 * 1024) { setUploadProgress("Error: File exceeds 10MB limit"); return; }

    setUploading(true); setUploadProgress("Uploading document...");
    try {
      // Ensure we have a valid token before calling Edge Function
      const freshToken = await getFreshToken();
      if (!freshToken) { setUploadProgress("Error: Session expired. Please log in again."); setUploading(false); return; }

      const form = new FormData();
      form.append("file", file);
      form.append("document_type", uploadDocType);
      if (uploadFolder) form.append("folder_id", uploadFolder);
      if (uploadName.trim()) form.append("display_name", uploadName.trim());
      if (uploadNotes.trim()) form.append("notes", uploadNotes.trim());

      const r = await fetch(`${SB}/functions/v1/compliance-upload`, {
        method: "POST", headers: { Authorization: `Bearer ${freshToken}`, apikey: AK }, body: form,
      });

      if (!r.ok) {
        const errText = await r.text();
        setUploadProgress(`Error (${r.status}): ${errText}`);
        setUploading(false); return;
      }

      const data = await r.json();
      if (data.error) { setUploadProgress(`Error: ${data.error}`); setUploading(false); return; }

      setUploadProgress("Document uploaded. Running compliance analysis (3–8 seconds)...");

      // Poll for completion — typical contract takes 8-15 seconds with AI analysis
      let polls = 0;
      const maxPolls = 30; // 75 seconds max
      const poll = setInterval(async () => {
        polls++;
        try {
          const currentToken = localStorage.getItem("sb-token");
          const [check] = await api(`compliance_uploads?id=eq.${data.upload_id}`, currentToken);
          if (check?.status === "complete") {
            clearInterval(poll);
            setUploadProgress("Analysis complete!");
            setSelectedUpload(check); setView("report");
            setUploading(false); setUploadName(""); setUploadNotes("");
            loadAll();
          } else if (check?.status === "error") {
            clearInterval(poll);
            setUploadProgress(`Error: ${check.processing_error || "Analysis failed — the document may not contain extractable text."}`);
            setUploading(false); loadAll();
          } else if (polls >= maxPolls) {
            clearInterval(poll);
            setUploadProgress("Analysis is taking longer than expected. Check back in the document list shortly.");
            setUploading(false); loadAll();
          } else if (polls > 4) {
            setUploadProgress(`Analysing document... (${polls * 2.5}s)`);
          }
        } catch (e) {
          console.error("Poll error:", e);
        }
      }, 2500);
    } catch (e) { setUploadProgress(`Error: Upload failed — ${e.message}`); setUploading(false); }

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 24 }}>
              <div>
                <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Document Type</label>
                <div style={{ display: "flex", gap: 8 }}>
                  {["contract", "handbook"].map(t => (
                    <Btn key={t} variant={attestDocType === t ? "primary" : "secondary"} onClick={() => { setAttestDocType(t); setAttestChecks({}); setAttestNotes({}); }} icon={DOC_ICONS[t]}>{t}</Btn>
                  ))}
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Save to Folder</label>
                <select value={attestFolder || ""} onChange={e => setAttestFolder(e.target.value || null)} style={{ background: "var(--bg4)", border: "1px solid var(--border2)", borderRadius: 8, padding: "9px 12px", color: "var(--text)", fontSize: 13, width: "100%", fontFamily: "var(--sans)" }}>
                  <option value="">No folder (root)</option>
                  {folders.map(f => <option key={f.id} value={f.id}>{f.icon} {f.name}</option>)}
                </select>
              </div>
            </div>

            <div style={{ padding: "14px 18px", background: "var(--amber-bg)", border: "1px solid rgba(245,158,11,0.15)", borderRadius: 8, fontSize: 12, color: "var(--text2)", lineHeight: 1.6, marginBottom: 20 }}>
              You'll be asked to confirm whether your {attestDocType} addresses each of the {attestReqs.length} statutory requirements. This creates a compliance baseline — you can upgrade to Track B by uploading the actual document later for a higher score.
            </div>

            <Btn onClick={() => setAttestStep(1)} icon="→">Begin Checklist ({attestReqs.length} requirements)</Btn>
          </div>
        )}

        {/* Step 1: Checklist */}
        {attestStep === 1 && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "var(--text)" }}>Requirements Checklist</div>
                <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 2 }}>Tick each requirement your {attestDocType} addresses · {attestCheckedCount}/{attestReqs.length} confirmed</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "var(--mono)", color: attestCheckedCount === attestReqs.length ? "var(--green)" : "var(--cyan)" }}>{Math.round((attestCheckedCount / attestReqs.length) * 100)}%</div>
              </div>
            </div>

            {/* Progress bar */}
            <div style={{ height: 6, background: "var(--border)", borderRadius: 3, marginBottom: 24, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(attestCheckedCount / attestReqs.length) * 100}%`, background: attestCheckedCount === attestReqs.length ? "var(--green)" : "var(--cyan)", borderRadius: 3, transition: "width 0.3s ease" }} />
            </div>

            {Object.entries(grouped).map(([cat, reqs]) => (
              <div key={cat} style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid var(--border)" }}>
                  {cat === "written_particulars" ? "📄 Written Particulars (s.1 ERA 1996)" : "📘 Handbook Policies"}
                </div>
                {reqs.map(r => (
                  <div key={r.id} style={{ padding: "12px 14px", marginBottom: 6, background: attestChecks[r.id] ? "var(--green-bg)" : "var(--bg3)", border: `1px solid ${attestChecks[r.id] ? "rgba(16,185,129,0.2)" : "var(--border)"}`, borderRadius: 10, transition: "all 0.2s" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                      {/* Checkbox */}
                      <div onClick={() => setAttestChecks(p => ({ ...p, [r.id]: !p[r.id] }))}
                        style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${attestChecks[r.id] ? "var(--green)" : "var(--border2)"}`, background: attestChecks[r.id] ? "var(--green)" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s" }}>
                        {attestChecks[r.id] && <span style={{ color: "#fff", fontSize: 14, fontWeight: 700, animation: "checkPop 0.2s ease" }}>✓</span>}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                          <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{r.requirement_name}</span>
                          {r.mandatory ? <Badge small color="var(--red)">mandatory</Badge> : <Badge small color="var(--text3)">recommended</Badge>}
                          <Badge small color={PILLARS[r.pillar_mapping]?.color}>{r.pillar_mapping}</Badge>
                        </div>
                        <div style={{ fontSize: 11, color: "var(--text3)", lineHeight: 1.5 }}>{r.description}</div>
                        <div style={{ fontSize: 10, color: "var(--text4)", marginTop: 2 }}>{r.statutory_basis}</div>
                        {/* Optional details field */}
                        {attestChecks[r.id] && (
                          <input value={attestNotes[r.id] || ""} onChange={e => setAttestNotes(p => ({ ...p, [r.id]: e.target.value }))}
                            placeholder="Optional: add details (e.g. 'Section 4 of our contract')"
                            style={{ marginTop: 8, background: "var(--bg4)", border: "1px solid var(--border2)", borderRadius: 6, padding: "6px 10px", color: "var(--text)", fontSize: 11, width: "100%", fontFamily: "var(--sans)", outline: "none" }} />
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ))}

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
              <Btn variant="secondary" onClick={() => setAttestStep(0)} icon="←">Back</Btn>
              <Btn onClick={() => setAttestStep(2)} icon="→">Review ({attestCheckedCount}/{attestReqs.length})</Btn>
            </div>
          </div>
        )}

        {/* Step 2: Review & Submit */}
        {attestStep === 2 && (
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "var(--text)", marginBottom: 4 }}>Review & Submit</div>
            <div style={{ fontSize: 13, color: "var(--text3)", marginBottom: 20 }}>Please review your attestation before submitting.</div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
              <div style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase" }}>Confirmed</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: "var(--green)", fontFamily: "var(--mono)" }}>{attestCheckedCount}</div>
              </div>
              <div style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase" }}>Not Confirmed</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: "var(--red)", fontFamily: "var(--mono)" }}>{attestReqs.length - attestCheckedCount}</div>
              </div>
              <div style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase" }}>Completion</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: "var(--cyan)", fontFamily: "var(--mono)" }}>{Math.round((attestCheckedCount / attestReqs.length) * 100)}%</div>
              </div>
            </div>

            {/* Missing items warning */}
            {attestCheckedCount < attestReqs.length && (
              <div style={{ padding: "12px 16px", background: "var(--red-bg)", border: "1px solid rgba(239,68,68,0.15)", borderRadius: 8, marginBottom: 20, fontSize: 12, color: "var(--text2)", lineHeight: 1.6 }}>
                <strong style={{ color: "var(--red)" }}>{attestReqs.length - attestCheckedCount} requirement(s) not confirmed.</strong> These will be flagged as gaps. You can always return to improve your score later, or upload the actual document for Track B scoring.
              </div>
            )}

            <div style={{ padding: "10px 14px", background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.12)", borderRadius: 8, marginBottom: 16, fontSize: 10, color: "var(--text3)", lineHeight: 1.7 }}>
              By submitting this attestation you confirm the information provided is accurate to the best of your knowledge. This analysis does not constitute legal advice. All findings should be reviewed by a qualified employment law professional.
            </div>

            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <Btn variant="secondary" onClick={() => setAttestStep(1)} icon="←">Back to Checklist</Btn>
              <Btn onClick={submitAttestation} disabled={attestSubmitting}>{attestSubmitting ? "Submitting..." : "Submit Attestation"}</Btn>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ─── MAIN LAYOUT ─────────────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <header style={{ height: "var(--header-h)", padding: "0 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--bg2)", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <span style={{ fontSize: 20, fontWeight: 700, color: "var(--cyan)", fontFamily: "var(--mono)", letterSpacing: "-1px" }}>AILANE</span>
          <span style={{ width: 1, height: 18, background: "var(--border2)" }} />
          <span style={{ fontSize: 13, color: "var(--text2)", fontWeight: 500 }}>Compliance Checker</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <Badge color="var(--green)">RRI v1.0</Badge>
          <span style={{ fontSize: 11, color: "var(--text3)" }}>{user?.email}</span>
          <a href="/dashboard/" style={{ fontSize: 11, color: "var(--cyan)", textDecoration: "none", fontWeight: 500 }}>← Dashboard</a>
        </div>
      </header>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        {/* ─── SIDEBAR ─────────────────────────────────────────────── */}
        <aside style={{ width: "var(--sidebar-w)", borderRight: "1px solid var(--border)", background: "var(--bg2)", display: "flex", flexDirection: "column", flexShrink: 0, overflow: "hidden" }}>
          {/* Upload buttons */}
          <div style={{ padding: "16px 14px 12px", borderBottom: "1px solid var(--border)" }}>
            <Btn onClick={() => { setView("upload-b"); setUploadProgress(""); }} style={{ width: "100%", justifyContent: "center", marginBottom: 8 }} icon="📎">Upload Document</Btn>
            <Btn variant="accent" onClick={() => { setView("upload-a"); setAttestStep(0); setAttestChecks({}); setAttestNotes({}); }} style={{ width: "100%", justifyContent: "center" }} icon="☑️">Attestation Wizard</Btn>
          </div>

          {/* Folders */}
          <div style={{ flex: 1, overflowY: "auto", padding: "8px 6px" }}>
            {/* All documents */}
            <div onClick={() => { setActiveFolder(null); setView("library"); }}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, cursor: "pointer", marginBottom: 2,
                background: !activeFolder && view === "library" ? "var(--cyan-bg)" : "transparent",
                color: !activeFolder && view === "library" ? "var(--cyan)" : "var(--text2)" }}
              onMouseEnter={e => { if (activeFolder || view !== "library") e.currentTarget.style.background = "var(--bg4)"; }}
              onMouseLeave={e => { if (activeFolder || view !== "library") e.currentTarget.style.background = "transparent"; }}>
              <span style={{ fontSize: 14 }}>📂</span>
              <span style={{ fontSize: 12, fontWeight: !activeFolder && view === "library" ? 600 : 400, flex: 1 }}>All Documents</span>
              <span style={{ fontSize: 10, color: "var(--text4)", fontFamily: "var(--mono)" }}>{uploads.length}</span>
            </div>

            {/* Unfoldered */}
            {unfolderedCount > 0 && unfolderedCount < uploads.length && (
              <div onClick={() => { setActiveFolder("__unfiled"); setView("library"); }}
                style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, cursor: "pointer", marginBottom: 2,
                  background: activeFolder === "__unfiled" ? "var(--cyan-bg)" : "transparent",
                  color: activeFolder === "__unfiled" ? "var(--cyan)" : "var(--text3)" }}>
                <span style={{ fontSize: 14 }}>📄</span>
                <span style={{ fontSize: 12, flex: 1 }}>Unfiled</span>
                <span style={{ fontSize: 10, color: "var(--text4)", fontFamily: "var(--mono)" }}>{unfolderedCount}</span>
              </div>
            )}

            <div style={{ height: 1, background: "var(--border)", margin: "8px 10px" }} />

            {/* Folder tree */}
            {rootFolders.map(f => (
              <div key={f.id}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, cursor: "pointer", marginBottom: 1,
                  background: activeFolder === f.id ? `${f.color}14` : "transparent",
                  color: activeFolder === f.id ? f.color : "var(--text2)" }}
                  onClick={() => { setActiveFolder(f.id); setView("library"); }}
                  onMouseEnter={e => { if (activeFolder !== f.id) e.currentTarget.style.background = "var(--bg4)"; }}
                  onMouseLeave={e => { if (activeFolder !== f.id) e.currentTarget.style.background = activeFolder === f.id ? `${f.color}14` : "transparent"; }}
                  onContextMenu={e => { e.preventDefault(); setRenameModal(f); }}>
                  <span style={{ fontSize: 14 }}>{f.icon}</span>
                  <span style={{ fontSize: 12, fontWeight: activeFolder === f.id ? 600 : 400, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
                  <span style={{ fontSize: 10, color: "var(--text4)", fontFamily: "var(--mono)" }}>{folderDocCount(f.id)}</span>
                </div>
                {/* Children */}
                {childFolders(f.id).map(cf => (
                  <div key={cf.id} onClick={() => { setActiveFolder(cf.id); setView("library"); }}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px 6px 30px", borderRadius: 8, cursor: "pointer", marginBottom: 1,
                      background: activeFolder === cf.id ? `${cf.color}14` : "transparent",
                      color: activeFolder === cf.id ? cf.color : "var(--text3)" }}
                    onContextMenu={e => { e.preventDefault(); setRenameModal(cf); }}>
                    <span style={{ fontSize: 12 }}>{cf.icon}</span>
                    <span style={{ fontSize: 11, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cf.name}</span>
                    <span style={{ fontSize: 9, color: "var(--text4)", fontFamily: "var(--mono)" }}>{folderDocCount(cf.id)}</span>
                  </div>
                ))}
              </div>
            ))}

            {/* New folder button */}
            <div onClick={() => setFolderModal(true)}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, cursor: "pointer", marginTop: 4, color: "var(--text4)" }}
              onMouseEnter={e => e.currentTarget.style.color = "var(--cyan)"} onMouseLeave={e => e.currentTarget.style.color = "var(--text4)"}>
              <span style={{ fontSize: 14 }}>+</span>
              <span style={{ fontSize: 11 }}>New Folder</span>
            </div>
          </div>

          {/* Sidebar footer */}
          <div style={{ padding: "10px 14px", borderTop: "1px solid var(--border)", fontSize: 10, color: "var(--text4)" }}>
            <div>AI Lane Limited</div>
            <div>RRI v1.0 · Tier I</div>
          </div>
        </aside>

        {/* ─── MAIN CONTENT ───────────────────────────────────────── */}
        <main style={{ flex: 1, overflowY: "auto", padding: "24px 28px" }}>
          {view === "library" && (
            <div style={{ animation: "fadeIn 0.2s ease" }}>
              {/* Toolbar */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "var(--text)" }}>
                    {activeFolder && activeFolder !== "__unfiled" ? folders.find(f => f.id === activeFolder)?.name || "Documents" : activeFolder === "__unfiled" ? "Unfiled Documents" : "All Documents"}
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 2 }}>{filteredUploads.length} document{filteredUploads.length !== 1 ? "s" : ""}</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <Input value={search} onChange={setSearch} placeholder="Search documents..." style={{ width: 220 }} />
                  {/* View toggle */}
                  <div style={{ display: "flex", border: "1px solid var(--border2)", borderRadius: 6, overflow: "hidden" }}>
                    <div onClick={() => setViewMode("grid")} style={{ padding: "6px 10px", cursor: "pointer", background: viewMode === "grid" ? "var(--cyan-bg)" : "transparent", color: viewMode === "grid" ? "var(--cyan)" : "var(--text3)", fontSize: 12, fontWeight: 600 }}>⊞</div>
                    <div onClick={() => setViewMode("list")} style={{ padding: "6px 10px", cursor: "pointer", background: viewMode === "list" ? "var(--cyan-bg)" : "transparent", color: viewMode === "list" ? "var(--cyan)" : "var(--text3)", fontSize: 12, fontWeight: 600 }}>☰</div>
                  </div>
                </div>
              </div>

              {/* Filters */}
              <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
                {[{ key: "filterStatus", val: filterStatus, set: setFilterStatus, opts: ["all", "complete", "processing", "pending", "error"], label: "Status" },
                  { key: "filterTrack", val: filterTrack, set: setFilterTrack, opts: ["all", "documentary", "attestation"], label: "Track" },
                  { key: "filterType", val: filterType, set: setFilterType, opts: ["all", "contract", "handbook", "policy"], label: "Type" },
                ].map(f => (
                  <div key={f.key} style={{ display: "flex", gap: 4 }}>
                    {f.opts.map(o => (
                      <Btn key={o} variant={f.val === o ? "primary" : "ghost"} small onClick={() => f.set(o)}>
                        {o === "all" ? `All ${f.label}` : o === "documentary" ? "Track B" : o === "attestation" ? "Track A" : o}
                      </Btn>
                    ))}
                  </div>
                ))}
              </div>

              {/* Documents Grid / List */}
              {filteredUploads.length === 0 ? (
                <div style={{ padding: "60px 20px", textAlign: "center", background: "var(--bg3)", borderRadius: 16, border: "1px solid var(--border)" }}>
                  <div style={{ fontSize: 44, marginBottom: 12 }}>📋</div>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text)", marginBottom: 6 }}>No documents yet</div>
                  <div style={{ fontSize: 13, color: "var(--text3)", marginBottom: 20 }}>Upload a contract or handbook, or use the attestation wizard to get started.</div>
                  <div style={{ display: "flex", justifyContent: "center", gap: 10 }}>
                    <Btn onClick={() => setView("upload-b")} icon="📎">Upload Document</Btn>
                    <Btn variant="accent" onClick={() => { setView("upload-a"); setAttestStep(0); }} icon="☑️">Attestation Wizard</Btn>
                  </div>
                </div>
              ) : viewMode === "grid" ? (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 14 }}>
                  {filteredUploads.map((u, i) => {
                    const scoreColor = u.overall_score >= 65 ? "var(--green)" : u.overall_score >= 30 ? "var(--amber)" : u.overall_score > 0 ? "var(--orange)" : "var(--text4)";
                    const folder = folders.find(f => f.id === u.folder_id);
                    return (
                      <div key={u.id} onClick={() => { setSelectedUpload(u); setView("report"); }}
                        style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 12, padding: "16px 18px", cursor: "pointer", transition: "all 0.15s", animation: `slideUp 0.2s ease ${i * 0.02}s both`, position: "relative" }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--cyan-border)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = "translateY(0)"; }}>
                        {/* Top row: icon + type + track */}
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                          <span style={{ fontSize: 24 }}>{DOC_ICONS[u.document_type]}</span>
                          <div style={{ display: "flex", gap: 4 }}>
                            <Badge small color={u.evidence_track === "documentary" ? "var(--green)" : "var(--amber)"}>{u.evidence_track === "documentary" ? "B" : "A"}</Badge>
                            <Badge small color={STATUS_COLORS[u.status]}>{u.status}</Badge>
                          </div>
                        </div>
                        {/* Name */}
                        <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {u.display_name || u.file_name || "Attestation"}
                        </div>
                        <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 10 }}>{u.document_type} · {new Date(u.created_at).toLocaleDateString("en-GB")}</div>
                        {/* Score bar */}
                        {u.status === "complete" && (
                          <div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                              <span style={{ fontSize: 18, fontWeight: 700, color: scoreColor, fontFamily: "var(--mono)" }}>{Math.round(u.overall_score || 0)}%</span>
                              <span style={{ fontSize: 11, color: "var(--cyan)", fontFamily: "var(--mono)", fontWeight: 600 }}>Pillar {u.translated_pillar_score}/{u.evidence_track === "documentary" ? 3 : 2}</span>
                            </div>
                            <div style={{ height: 4, background: "var(--border)", borderRadius: 2, overflow: "hidden" }}>
                              <div style={{ height: "100%", width: `${u.overall_score || 0}%`, background: scoreColor, borderRadius: 2 }} />
                            </div>
                          </div>
                        )}
                        {/* Folder tag */}
                        {folder && <div style={{ marginTop: 8, fontSize: 10, color: folder.color, display: "flex", alignItems: "center", gap: 4 }}><span>{folder.icon}</span>{folder.name}</div>}
                        {/* Context menu */}
                        <div onClick={e => { e.stopPropagation(); setMoveModal(u); }} style={{ position: "absolute", top: 8, right: 8, width: 22, height: 22, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "var(--text4)", fontSize: 14 }}
                          onMouseEnter={e => e.currentTarget.style.background = "var(--bg4)"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>⋮</div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                /* List view */
                <div style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: "var(--bg4)" }}>
                        {["Document", "Type", "Track", "Score", "Pillar", "Folder", "Status", "Date", ""].map((h, i) => (
                          <th key={i} style={{ padding: "9px 12px", textAlign: "left", color: "var(--text3)", fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.4px", borderBottom: "1px solid var(--border)" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filteredUploads.map((u, i) => {
                        const folder = folders.find(f => f.id === u.folder_id);
                        return (
                          <tr key={u.id} onClick={() => { setSelectedUpload(u); setView("report"); }}
                            style={{ cursor: "pointer", borderBottom: "1px solid rgba(255,255,255,0.02)", animation: `slideUp 0.15s ease ${i * 0.015}s both` }}
                            onMouseEnter={e => e.currentTarget.style.background = "var(--cyan-bg)"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                            <td style={{ padding: "9px 12px", color: "var(--text)", fontWeight: 500, maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.display_name || u.file_name || "Attestation"}</td>
                            <td style={{ padding: "9px 12px" }}><Badge small color="var(--purple)">{u.document_type}</Badge></td>
                            <td style={{ padding: "9px 12px" }}><Badge small color={u.evidence_track === "documentary" ? "var(--green)" : "var(--amber)"}>{u.evidence_track === "documentary" ? "Track B" : "Track A"}</Badge></td>
                            <td style={{ padding: "9px 12px", fontFamily: "var(--mono)", fontWeight: 600, color: u.overall_score >= 65 ? "var(--green)" : u.overall_score >= 30 ? "var(--amber)" : "var(--orange)" }}>{u.overall_score != null ? `${Math.round(u.overall_score)}%` : "—"}</td>
                            <td style={{ padding: "9px 12px", fontFamily: "var(--mono)", fontWeight: 700, color: "var(--cyan)" }}>{u.translated_pillar_score ?? "—"}</td>
                            <td style={{ padding: "9px 12px", fontSize: 11, color: folder ? folder.color : "var(--text4)" }}>{folder ? `${folder.icon} ${folder.name}` : "—"}</td>
                            <td style={{ padding: "9px 12px" }}><Badge small color={STATUS_COLORS[u.status]}>{u.status}</Badge></td>
                            <td style={{ padding: "9px 12px", color: "var(--text3)", fontSize: 11 }}>{new Date(u.created_at).toLocaleDateString("en-GB")}</td>
                            <td style={{ padding: "9px 12px" }}>
                              <span onClick={e => { e.stopPropagation(); setMoveModal(u); }} style={{ cursor: "pointer", color: "var(--text4)", fontSize: 14 }}>⋮</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {view === "upload-b" && renderUploadB()}
          {view === "upload-a" && renderUploadA()}
          {view === "report" && renderReport()}
        </main>
      </div>

      {/* ─── MODALS ───────────────────────────────────────────────── */}

      {/* New Folder */}
      <Modal open={folderModal} onClose={() => setFolderModal(false)} title="Create Folder">
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Folder Name</label>
            <Input value={newFolderName} onChange={setNewFolderName} placeholder="e.g. Head Office Contracts" />
          </div>
          <div>
            <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Parent Folder (optional)</label>
            <select value={newFolderParent || ""} onChange={e => setNewFolderParent(e.target.value || null)} style={{ background: "var(--bg4)", border: "1px solid var(--border2)", borderRadius: 8, padding: "9px 12px", color: "var(--text)", fontSize: 13, width: "100%", fontFamily: "var(--sans)" }}>
              <option value="">Root level</option>
              {rootFolders.map(f => <option key={f.id} value={f.id}>{f.icon} {f.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Icon & Colour</label>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <div style={{ display: "flex", gap: 4 }}>
                {["📁", "📂", "🏢", "📋", "⚖️", "🔒", "🌍", "👥"].map(ic => (
                  <div key={ic} onClick={() => setNewFolderIcon(ic)} style={{ width: 32, height: 32, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 16, background: newFolderIcon === ic ? "var(--cyan-bg)" : "var(--bg4)", border: `1px solid ${newFolderIcon === ic ? "var(--cyan-border)" : "var(--border)"}` }}>{ic}</div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>
                {["#22d3ee", "#10b981", "#8b5cf6", "#f59e0b", "#f97316", "#ef4444", "#ec4899", "#64748b"].map(c => (
                  <div key={c} onClick={() => setNewFolderColor(c)} style={{ width: 24, height: 24, borderRadius: "50%", background: c, cursor: "pointer", border: newFolderColor === c ? "2px solid white" : "2px solid transparent" }} />
                ))}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}>
            <Btn variant="secondary" onClick={() => setFolderModal(false)}>Cancel</Btn>
            <Btn onClick={createFolder} disabled={!newFolderName.trim() || !orgId}>{orgId ? "Create Folder" : "Loading org..."}</Btn>
          </div>
        </div>
      </Modal>

      {/* Move / Manage Document */}
      <Modal open={!!moveModal} onClose={() => setMoveModal(null)} title={moveModal ? `Manage: ${moveModal.display_name || moveModal.file_name || "Attestation"}` : ""}>
        {moveModal && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Move to Folder</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <div onClick={() => moveDocument(moveModal.id, null)} style={{ padding: "8px 12px", borderRadius: 8, cursor: "pointer", background: !moveModal.folder_id ? "var(--cyan-bg)" : "var(--bg4)", border: `1px solid ${!moveModal.folder_id ? "var(--cyan-border)" : "var(--border)"}`, fontSize: 12, color: "var(--text)" }}>📂 Root (no folder)</div>
                {folders.map(f => (
                  <div key={f.id} onClick={() => moveDocument(moveModal.id, f.id)} style={{ padding: "8px 12px", borderRadius: 8, cursor: "pointer", background: moveModal.folder_id === f.id ? `${f.color}14` : "var(--bg4)", border: `1px solid ${moveModal.folder_id === f.id ? `${f.color}30` : "var(--border)"}`, fontSize: 12, color: "var(--text)", display: "flex", gap: 8, alignItems: "center" }}>
                    <span>{f.icon}</span>{f.name}{f.parent_id && <span style={{ fontSize: 10, color: "var(--text4)" }}>(subfolder)</span>}
                  </div>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Rename Document</label>
              <div style={{ display: "flex", gap: 8 }}>
                <Input value={moveModal._rename ?? (moveModal.display_name || moveModal.file_name || "")} onChange={v => setMoveModal(p => ({ ...p, _rename: v }))} placeholder="Document name" />
                <Btn small onClick={() => renameDocument(moveModal.id, moveModal._rename || moveModal.display_name, moveModal._notes || moveModal.notes)}>Save</Btn>
              </div>
            </div>
            <div>
              <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Notes</label>
              <textarea value={moveModal._notes ?? (moveModal.notes || "")} onChange={e => setMoveModal(p => ({ ...p, _notes: e.target.value }))} placeholder="Add internal notes..." rows={3}
                style={{ background: "var(--bg4)", border: "1px solid var(--border2)", borderRadius: 8, padding: "9px 14px", color: "var(--text)", fontSize: 13, width: "100%", fontFamily: "var(--sans)", resize: "vertical", outline: "none" }} />
            </div>
          </div>
        )}
      </Modal>

      {/* Rename Folder */}
      <Modal open={!!renameModal} onClose={() => setRenameModal(null)} title={renameModal ? `Edit: ${renameModal.name}` : ""}>
        {renameModal && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div>
              <label style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.4px", display: "block", marginBottom: 6 }}>Folder Name</label>
              <Input value={renameModal._name ?? renameModal.name} onChange={v => setRenameModal(p => ({ ...p, _name: v }))} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <Btn variant="danger" small onClick={() => { setDeleteConfirm(renameModal.id); setRenameModal(null); }}>Delete Folder</Btn>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn variant="secondary" onClick={() => setRenameModal(null)}>Cancel</Btn>
                <Btn onClick={() => renameFolder(renameModal.id, renameModal._name || renameModal.name)}>Save</Btn>
              </div>
            </div>
          </div>
        )}
      </Modal>

      {/* Delete Folder Confirm */}
      <Modal open={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} title="Delete Folder?">
        <div style={{ fontSize: 13, color: "var(--text2)", lineHeight: 1.6, marginBottom: 20 }}>
          This will delete the folder. Documents inside will be moved to root (unfiled). This action cannot be undone.
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <Btn variant="secondary" onClick={() => setDeleteConfirm(null)}>Cancel</Btn>
          <Btn variant="danger" onClick={() => deleteFolder(deleteConfirm)}>Delete Folder</Btn>
        </div>
      </Modal>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ComplianceApp));
  </script>
</body>
</html>
